<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>520 我爱你</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #1a0a18 0%, #3a1028 40%, #6b2040 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 背景极光 === */
.body-aurora {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.body-aurora::before {
  content: '';
  position: absolute; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,80,120,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(220,40,90,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,150,180,0.1) 0%, transparent 60%);
  animation: auroraPulse 9s ease-in-out infinite;
}
.body-aurora::after {
  content: '';
  position: absolute; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 20% 70%, rgba(255,100,150,0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 30%, rgba(240,60,110,0.18) 0%, transparent 50%);
  animation: auroraPulse 12s ease-in-out infinite reverse;
}
@keyframes auroraPulse {
  0%, 100% { transform: scale(1) translate(0,0); opacity: 0.8; }
  50% { transform: scale(1.06) translate(1%, 1%); opacity: 1; }
}

/* === 飘浮爱心 === */
.heart {
  position: fixed; font-size: 16px;
  animation: heartRise linear infinite;
  z-index: 1; pointer-events: none;
  filter: drop-shadow(0 0 6px rgba(255,100,150,0.5));
}
@keyframes heartRise {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0; }
  8% { opacity: 0.8; }
  92% { opacity: 0.7; }
  100% { transform: translateY(-8vh) rotate(35deg) scale(1.1); opacity: 0; }
}

/* === 音符飘落 === */
.music-note {
  position: fixed; font-size: 14px;
  animation: noteFall linear infinite;
  z-index: 1; pointer-events: none;
  filter: drop-shadow(0 0 5px rgba(255,200,120,0.5));
}
@keyframes noteFall {
  0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.5; }
  100% { transform: translateY(105vh) rotate(20deg) translateX(50px); opacity: 0; }
}

/* === 星光闪烁 === */
.star {
  position: fixed; width: 3px; height: 3px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffdd88, #ffaa44);
  animation: starTwinkle ease-in-out infinite;
  z-index: 1; pointer-events: none;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* === 粉红边框 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 34px;
  background: linear-gradient(135deg,
    #ff6b9d,
    #ff8ab5,
    #ff6b9d,
    #ff8ab5,
    #ff6b9d);
  background-size: 300% 300%;
  animation: pinkBorder 4s ease infinite;
  box-shadow:
    0 0 30px rgba(255,107,157,0.4),
    0 0 70px rgba(255,107,157,0.18),
    inset 0 0 20px rgba(255,200,220,0.15);
  z-index: 10;
}
@keyframes pinkBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(255,107,157,0.4), 0 0 70px rgba(255,107,157,0.18); }
  50% { background-position: 100% 50%; box-shadow: 0 0 45px rgba(255,130,180,0.6), 0 0 90px rgba(255,107,157,0.28); }
  100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(255,107,157,0.4), 0 0 70px rgba(255,107,157,0.18); }
}

/* === 3D场景 === */
.scene {
  background: rgba(255,245,250,0.06);
  border-radius: 32px;
  padding: 40px;
  perspective: 1200px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.card-inner {
  width: 300px;
  height: 430px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  transform: rotateY(-180deg);
}
.card-inner.opened {
  transform: rotateY(0deg);
}

/* 两面通用 */
.card-front, .card-back {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px; text-align: center;
}

/* 封面：520主题 */
.card-front {
  background: linear-gradient(135deg, rgba(255,220,235,0.5) 0%, rgba(255,180,210,0.65) 100%);
  border: 1px solid rgba(255,107,157,0.5);
  box-shadow: 0 10px 40px rgba(200,80,130,0.25);
}
.cover-520 {
  font-size: clamp(52px, 14vw, 80px);
  font-weight: bold;
  background: linear-gradient(135deg, #ff4488, #ff6b9d, #ff4488);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(255,68,136,0.5));
  animation: pulse520 2s ease-in-out infinite;
  margin-bottom: 12px;
}
@keyframes pulse520 {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
.cover-label {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(180,60,110,0.8);
  letter-spacing: 6px;
  margin-bottom: 6px;
  opacity: 1;
}
.cover-sub {
  font-size: clamp(10px, 2.5vw, 13px);
  color: rgba(200,80,130,0.5);
  letter-spacing: 4px;
  margin-bottom: 4px;
}
.cover-hint {
  position: absolute; bottom: 28px;
  font-size: clamp(10px, 2vw, 12px);
  color: rgba(180,60,110,0.35);
  letter-spacing: 3px;
  animation: hintBlink 2s ease-in-out infinite;
}
@keyframes hintBlink {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* 背面内容 */
.card-back {
  background: linear-gradient(135deg, rgba(255,240,245,0.12) 0%, rgba(255,220,235,0.06) 100%);
  border: 1px solid rgba(255,107,157,0.35);
  transform: rotateY(180deg);
  box-shadow: 0 10px 40px rgba(180,60,110,0.2);
}
.love-deco {
  font-size: clamp(28px, 6vw, 40px);
  margin-bottom: 12px;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.5s both;
}
.deco-line {
  width: 60px; height: 2px;
  background: linear-gradient(to right, transparent, rgba(255,107,157,0.5), transparent);
  margin: 12px 0;
  opacity: 1;
  animation: fadeIn 1s ease-out 1.7s both;
}
.name {
  font-size: clamp(26px, 7vw, 42px);
  color: #ffddee;
  text-shadow: 0 0 20px rgba(255,150,190,0.6);
  margin-bottom: 12px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.4s both;
}
.date {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(255,200,220,0.55);
  letter-spacing: 4px;
  margin-bottom: 16px;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.9s both;
}
.blessing {
  font-size: clamp(13px, 3.5vw, 18px);
  color: rgba(255,230,240,0.85);
  line-height: 1.8;
  max-width: 240px;
  margin-bottom: 20px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 1s both;
}
.from {
  font-size: clamp(11px, 2.5vw, 13px);
  color: rgba(255,200,225,0.5);
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeIn 1s ease-out 1.4s both;
}

/* 动画 */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* === 响应式 === */
@media (max-width: 360px) {
  .scene { padding: 28px; }
  .card-inner { width: 260px; height: 380px; }
  .card-front, .card-back { padding: 28px; }
}
</style>
</head>
<body>

<div class="body-aurora"></div>

<!-- 飘浮爱心 -->
<script>
(function(){
  const hearts = ['💕','❤️','💗','💖','💓','💝'];
  function spawnHeart() {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    el.style.left = (Math.random()*100) + 'vw';
    el.style.fontSize = (10 + Math.random()*14) + 'px';
    el.style.animationDuration = (4 + Math.random()*5) + 's';
    el.style.animationDelay = Math.random()*2 + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', function(){ el.remove(); });
  }
  setInterval(spawnHeart, 600);
  spawnHeart();
})();
</script>

<!-- 音符 -->
<script>
(function(){
  const notes = ['♪','♫','♬','🎵'];
  function spawnNote() {
    const el = document.createElement('div');
    el.className = 'music-note';
    el.textContent = notes[Math.floor(Math.random()*notes.length)];
    el.style.left = (Math.random()*100) + 'vw';
    el.style.fontSize = (10 + Math.random()*10) + 'px';
    el.style.animationDuration = (5 + Math.random()*5) + 's';
    el.style.animationDelay = Math.random()*3 + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', function(){ el.remove(); });
  }
  setInterval(spawnNote, 900);
  spawnNote();
})();
</script>

<!-- 星光 -->
<script>
(function(){
  function spawnStar() {
    const el = document.createElement('div');
    el.className = 'star';
    el.style.left = (Math.random()*100) + 'vw';
    el.style.top = (Math.random()*100) + 'vh';
    el.style.animationDuration = (1.5 + Math.random()*2) + 's';
    el.style.animationDelay = Math.random()*2 + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', function(){ el.remove(); });
  }
  for(let i=0;i<20;i++){
    setTimeout(spawnStar, i*300);
  }
  setInterval(spawnStar, 500);
})();
</script>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="scene">
    <div class="card-inner" id="cardInner" onclick="this.classList.toggle('opened')">
      <!-- 封面 -->
      <div class="card-front">
        <div class="cover-520">520</div>
        <div class="cover-label">我 爱 你</div>
        <div class="cover-sub">FOREVER</div>
        <div class="deco-line"></div>
        <div class="cover-hint">点击翻开</div>
      </div>
      <!-- 背面 -->
      <div class="card-back">
        <div class="love-deco">💕</div>
        <div class="deco-line"></div>
        <div class="name" id="nameEl"></div>
        <div class="date" id="dateEl"></div>
        <div class="blessing" id="blessingEl"></div>
        <div class="from" id="fromEl"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const p = new URLSearchParams(location.search);
  var n = p.get('n') || '亲爱的';
  var d = p.get('d') || '';
  var b = p.get('b') || '愿你永远被温柔以待';
  var f = p.get('f') || '';
  document.getElementById('nameEl').textContent = n;
  document.getElementById('dateEl').textContent = d;
  document.getElementById('blessingEl').textContent = b;
  document.getElementById('fromEl').textContent = f ? '— ' + f : '';
  // 自动翻开（可选延迟）
  // setTimeout(function(){ document.getElementById('cardInner').classList.add('opened'); }, 1200);
})();
</script>

</body>
</html>
