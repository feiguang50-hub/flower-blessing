<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金榜题名</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0a1628 0%, #1a3a5c 40%, #2a5a8c 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 光芒射线 === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(255,220,80,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%, rgba(100,180,255,0.15) 0%, transparent 40%),
    radial-gradient(ellipse at 20% 50%, rgba(255,200,80,0.08) 0%, transparent 35%),
    radial-gradient(ellipse at 80% 50%, rgba(255,200,80,0.08) 0%, transparent 35%);
  animation: rayPulse 4s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes rayPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.03); }
}

/* === 学士帽飞起 === */
.cap {
  position: fixed;
  font-size: 28px;
  z-index: 2;
  animation: capFly ease-out forwards;
  filter: drop-shadow(0 4px 12px rgba(255,200,50,0.5));
}
@keyframes capFly {
  0% { transform: translateY(80vh) rotate(0deg) scale(0.6); opacity: 0; }
  20% { opacity: 1; transform: translateY(60vh) rotate(10deg) scale(1); }
  60% { transform: translateY(30vh) rotate(-5deg) scale(1.1); opacity: 1; }
  100% { transform: translateY(-10vh) rotate(15deg) scale(0.8); opacity: 0; }
}

/* === 星星闪烁 === */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

/* === 书本漂浮 === */
.book {
  position: fixed;
  font-size: 20px;
  animation: bookFloat ease-in-out infinite;
  z-index: 2;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
}
@keyframes bookFloat {
  0%, 100% { transform: translateY(0) rotate(-5deg); opacity: 0.6; }
  50% { transform: translateY(-20px) rotate(5deg); opacity: 1; }
}

/* === 金色光点 === */
.sparkle {
  position: fixed;
  width: 4px; height: 4px;
  background: #ffd700;
  border-radius: 50%;
  animation: sparkleRise linear infinite;
  z-index: 1;
  box-shadow: 0 0 6px #ffd700;
}
@keyframes sparkleRise {
  0% { transform: translateY(100vh); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* === 卡片 === */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 28px;
  background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700, #ffaa00);
  background-size: 300% 300%;
  animation: borderGlow 3s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(255,215,0,0.35), 0 0 60px rgba(255,215,0,0.15);
}
@keyframes borderGlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(255,215,0,0.35), 0 0 60px rgba(255,215,0,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 50px rgba(255,215,0,0.55), 0 0 80px rgba(255,215,0,0.25); }
}

.card {
  background: linear-gradient(145deg, rgba(10,22,40,0.95), rgba(26,58,92,0.95));
  border-radius: 26px;
  padding: clamp(32px, 7vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  max-width: 480px;
  width: 90vw;
  border: 1px solid rgba(255,215,0,0.25);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: -80px; left: -80px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,215,0,0.12) 0%, transparent 70%);
  animation: cardShimmer 4s ease-in-out infinite;
}
@keyframes cardShimmer {
  0%, 100% { transform: translate(0, 0); opacity: 0.5; }
  50% { transform: translate(40px, 40px); opacity: 1; }
}

.name {
  font-size: clamp(28px, 7vw, 52px);
  font-weight: bold;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
  margin-bottom: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out both;
}
.blessing {
  font-size: clamp(16px, 4vw, 22px);
  color: #e8f4ff;
  line-height: 1.8;
  margin: 16px 0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.2s both;
}
.date {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(200,220,255,0.7);
  letter-spacing: 2px;
  margin-bottom: 8px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.35s both;
}
.from {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(255,215,0,0.8);
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}

.tag {
  display: inline-block;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  color: #1a3a5c;
  font-size: clamp(12px, 2.5vw, 15px);
  font-weight: bold;
  padding: 6px 18px;
  border-radius: 20px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.1s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.card { animation: cardFloat 4s ease-in-out infinite; }
</style>
</head>
<body>

<script>
// 学士帽
(function spawnCap(){
  const el = document.createElement('div');
  el.className = 'cap';
  el.textContent = '🎓';
  el.style.left = (20 + Math.random() * 60) + 'vw';
  el.style.top = '0';
  el.style.animationDuration = (4 + Math.random() * 3) + 's';
  el.style.animationDelay = Math.random() * 2 + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 8000);
})();
setInterval(() => {
  const el = document.createElement('div');
  el.className = 'cap';
  el.textContent = '🎓';
  el.style.left = (20 + Math.random() * 60) + 'vw';
  el.style.top = '0';
  el.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 8000);
}, 4000);

// 星星
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = 2 + Math.random() * 3;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*80}vh;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
  document.body.appendChild(s);
}

// 书本
const bookEmojis = ['📚', '📖', '✏️', '📝'];
for (let i = 0; i < 6; i++) {
  const b = document.createElement('div');
  b.className = 'book';
  b.textContent = bookEmojis[i % bookEmojis.length];
  b.style.cssText = `left:${5+Math.random()*88}vw;top:${10+Math.random()*70}vh;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*3}s;`;
  document.body.appendChild(b);
}

// 光点
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'sparkle';
  p.style.cssText = `left:${Math.random()*100}vw;animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*5}s;`;
  document.body.appendChild(p);
}

// URL参数
const p = new URLSearchParams(location.search);
const name = p.get('n') || '金榜题名';
const blessing = p.get('b') || '愿你笔下生花，金榜题名，前程似锦';
const date = p.get('d') || '';
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').textContent = blessing;
if (date) document.getElementById('dateEl').textContent = date;
if (from) document.getElementById('fromEl').textContent = '— ' + from;
</script>

<div class="card-wrap">
  <div class="card">
    <div class="tag">🎓 金榜题名</div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
