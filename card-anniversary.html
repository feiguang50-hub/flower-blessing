<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纪念日祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a0515 0%, #2a0a25 40%, #3a1535 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 背景光斑 === */
.body-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.body-glow::before {
  content: ''; position: absolute; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(200,80,120,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(180,80,160,0.1) 0%, transparent 50%);
  animation: bodyGlow 6s ease-in-out infinite;
}
@keyframes bodyGlow {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.05); opacity: 1; }
}

/* === 漂浮爱心 === */
.heart {
  position: fixed; font-size: 18px;
  animation: heartFloat linear infinite;
  z-index: 1; pointer-events: none;
  filter: drop-shadow(0 0 6px rgba(255,100,150,0.4));
}
@keyframes heartFloat {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(-10vh) rotate(30deg) scale(1); opacity: 0; }
}

/* === 玫瑰花瓣 === */
.petal {
  position: fixed; font-size: 14px;
  animation: petalSway linear infinite;
  z-index: 1; pointer-events: none;
}
@keyframes petalSway {
  0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  50% { transform: translateY(50vh) translateX(30px) rotate(180deg); opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) translateX(-20px) rotate(360deg); opacity: 0; }
}

/* === 玫瑰边框 === */
.card-wrap {
  position: relative;
  padding: 2px;
  border-radius: 34px;
  background: linear-gradient(135deg,
    rgba(255,150,180,0.7),
    rgba(200,80,130,0.4),
    rgba(255,150,180,0.7),
    rgba(180,60,110,0.4),
    rgba(255,150,180,0.7));
  background-size: 300% 300%;
  animation: roseBorder 5s ease infinite;
  box-shadow:
    0 0 25px rgba(255,100,150,0.35),
    0 0 60px rgba(200,80,130,0.15),
    inset 0 0 20px rgba(255,150,180,0.15);
  z-index: 10;
}
@keyframes roseBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(255,100,150,0.35), 0 0 60px rgba(200,80,130,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(255,100,150,0.55), 0 0 80px rgba(200,80,130,0.25); }
  100% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(255,100,150,0.35), 0 0 60px rgba(200,80,130,0.15); }
}

/* === 3D场景 === */
.scene {
  background: rgba(255,255,255,0.03);
  border-radius: 32px;
  padding: 40px;
  perspective: 1200px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.card-inner {
  width: 300px;
  height: 420px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  transform: rotateY(-180deg);
}
.card-inner.opened {
  transform: rotateY(0deg);
}

/* 卡片两面 */
.card-front, .card-back {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px; text-align: center;
}

/* 封面 */
.card-front {
  background: linear-gradient(135deg, rgba(180,60,100,0.35) 0%, rgba(120,40,80,0.55) 100%);
  border: 1px solid rgba(255,180,200,0.35);
  box-shadow: 0 10px 40px rgba(180,60,100,0.25);
}
.cover-emoji {
  font-size: 72px; margin-bottom: 24px;
  animation: coverPulse 2s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(255,150,180,0.5));
}
@keyframes coverPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.cover-text {
  font-size: clamp(14px, 3vw, 18px);
  color: rgba(255,200,220,0.85); letter-spacing: 8px; margin-bottom: 12px;
}
.cover-sub {
  font-size: clamp(11px, 2vw, 13px);
  color: rgba(255,180,200,0.5); letter-spacing: 4px;
}
.cover-hint {
  position: absolute; bottom: 28px;
  font-size: clamp(10px, 2vw, 12px);
  color: rgba(255,200,220,0.4); letter-spacing: 4px;
  animation: hintPulse 2s ease-in-out infinite;
}
@keyframes hintPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* 背面 */
.card-back {
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.04) 100%);
  border: 1px solid rgba(255,255,255,0.18);
  transform: rotateY(180deg);
  box-shadow: 0 10px 40px rgba(100,60,160,0.2);
}

/* 装饰线 */
.deco-line {
  width: 60px; height: 2px;
  background: linear-gradient(to right, transparent, rgba(255,180,220,0.5), transparent);
  margin: 12px auto;
  animation: lineExpand 1s ease-out 2.5s both;
}
@keyframes lineExpand {
  from { transform: scaleX(0); opacity: 0; }
  to { transform: scaleX(1); opacity: 1; }
}
.anniversary-label {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(255,200,220,0.7); letter-spacing: 8px; margin-bottom: 16px;
  opacity: 1; animation: fadeUp 1s ease-out 1.6s both;
}
.name {
  font-size: clamp(26px, 6.5vw, 44px); color: #fff;
  letter-spacing: 8px; margin-bottom: 20px;
  text-shadow: 0 0 30px rgba(255,180,220,0.5), 0 0 60px rgba(255,150,180,0.2);
  opacity: 1; animation: nameIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 1.9s both;
}
@keyframes nameIn {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.date-display {
  font-size: clamp(15px, 3.5vw, 22px);
  color: rgba(255,200,220,0.85); letter-spacing: 4px; margin-bottom: 24px;
  opacity: 1; animation: fadeUp 1s ease-out 2.2s both;
}
.blessing {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(255,255,255,0.88); line-height: 2; letter-spacing: 2px;
  opacity: 1; animation: fadeUp 1s ease-out 2.5s both;
}
.from {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(255,200,220,0.55); margin-top: 20px; letter-spacing: 4px;
  opacity: 1; animation: fadeUp 1s ease-out 2.8s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.rose-deco {
  font-size: 26px; margin-top: 16px;
  animation: rosePulse 2s ease-in-out 0.5s infinite;
  display: block;
}
@keyframes rosePulse {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.15) rotate(5deg); }
}

/* 点击提示 */
.tap-hint {
  position: fixed; bottom: 40px;
  font-size: 12px; color: rgba(255,200,220,0.4);
  letter-spacing: 4px; animation: hintPulse 2s ease-in-out infinite;
  z-index: 100;
}
</style>
</head>
<body>

<div class="body-glow"></div>

<div class="card-wrap">
  <div class="scene">
    <div class="card-inner" id="cardInner" onclick="this.classList.toggle('opened')">
      <div class="card-front">
        <div class="cover-emoji">💌</div>
        <div class="cover-text">一份心意</div>
        <div class="cover-sub">致最珍贵的你</div>
        <div class="cover-hint">✦ 点击打开 ✦</div>
      </div>
      <div class="card-back">
        <div class="anniversary-label">✦ ANNIVERSARY ✦</div>
        <div class="name" id="nameEl"></div>
        <div class="date-display" id="dateEl"></div>
        <div class="deco-line"></div>
        <div class="blessing" id="blessingEl"></div>
        <div class="from" id="fromEl"></div>
        <span class="rose-deco">🌹</span>
      </div>
    </div>
  </div>
</div>

<div class="tap-hint">点击卡片打开</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

for (let i = 0; i < 20; i++) {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.textContent = ['💕','💗','💖','💓','♥️'][i % 5];
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.fontSize = (10 + Math.random() * 16) + 'px';
  heart.style.animationDuration = (6 + Math.random() * 6) + 's';
  heart.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(heart);
}
for (let i = 0; i < 12; i++) {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.textContent = '🌸';
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.fontSize = (10 + Math.random() * 12) + 'px';
  petal.style.animationDuration = (8 + Math.random() * 6) + 's';
  petal.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(petal);
}
</script>
</body>
</html>
