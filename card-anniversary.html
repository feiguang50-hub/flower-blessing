<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纪念日祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a0a1a 0%, #2a0a2a 50%, #3a1a3a 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 装饰心形 */
.heart {
  position: fixed;
  font-size: 20px;
  animation: floatHeart linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes floatHeart {
  0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) rotate(30deg); opacity: 0; }
}

/* 3D场景 */
.scene {
  perspective: 1200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-inner {
  width: 340px;
  height: 480px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  transform: rotateY(-180deg);
}
.card-inner.opened {
  transform: rotateY(0deg);
}

/* 卡片两面 */
.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-align: center;
}
.card-front {
  background: linear-gradient(135deg, rgba(180,80,120,0.3) 0%, rgba(120,40,80,0.5) 100%);
  border: 2px solid rgba(255,180,200,0.3);
  box-shadow: 0 20px 60px rgba(180,80,120,0.3);
}

/* 封面 */
.cover-emoji {
  font-size: 72px;
  margin-bottom: 24px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.cover-text {
  font-size: clamp(14px, 3vw, 18px);
  color: rgba(255,200,220,0.8);
  letter-spacing: 6px;
}
.cover-hint {
  position: absolute;
  bottom: 30px;
  font-size: clamp(10px, 2vw, 12px);
  color: rgba(255,200,220,0.4);
  letter-spacing: 3px;
}

/* 背面 */
.card-back {
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
  border: 2px solid rgba(255,255,255,0.2);
  transform: rotateY(180deg);
  box-shadow: 0 20px 60px rgba(100,80,180,0.3);
}

.anniversary-label {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(255,200,220,0.6);
  letter-spacing: 6px;
  margin-bottom: 16px;
  opacity: 1;
  animation: fadeIn 1s ease-out 1.5s both;
}
.name {
  font-size: clamp(28px, 7vw, 48px);
  color: #fff;
  letter-spacing: 8px;
  margin-bottom: 20px;
  text-shadow: 0 0 30px rgba(255,180,220,0.5);
  opacity: 1;
  animation: fadeIn 1s ease-out 1.8s both;
}
.date-display {
  font-size: clamp(16px, 4vw, 24px);
  color: rgba(255,200,220,0.8);
  letter-spacing: 4px;
  margin-bottom: 28px;
  opacity: 1;
  animation: fadeIn 1s ease-out 2.1s both;
}
.blessing {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(255,255,255,0.85);
  line-height: 2;
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeIn 1s ease-out 2.4s both;
}
.from {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(255,200,220,0.5);
  margin-top: 24px;
  letter-spacing: 4px;
  opacity: 1;
  animation: fadeIn 1s ease-out 2.7s both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 玫瑰装饰 */
.rose-emoji {
  font-size: 28px;
  margin-top: 16px;
  animation: pulse 2s ease-in-out 0.5s infinite;
}

/* 点击提示闪烁 */
.tap-hint {
  position: fixed;
  bottom: 40px;
  font-size: 12px;
  color: rgba(255,200,220,0.4);
  letter-spacing: 4px;
  animation: blink 2s ease-in-out infinite;
  z-index: 100;
}
@keyframes blink {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}
</style>
</head>
<body>

<div class="scene">
  <div class="card-inner" id="cardInner" onclick="this.classList.toggle('opened')">
    <div class="card-front">
      <div class="cover-emoji">💌</div>
      <div class="cover-text">一份心意</div>
      <div class="cover-hint">点击打开</div>
    </div>
    <div class="card-back">
      <div class="anniversary-label">ANNIVERSARY</div>
      <div class="name" id="nameEl"></div>
      <div class="date-display" id="dateEl"></div>
      <div class="blessing" id="blessingEl"></div>
      <div class="from" id="fromEl"></div>
      <div class="rose-emoji">🌹</div>
    </div>
  </div>
</div>

<div class="tap-hint">点击卡片打开</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 装饰爱心
for (let i = 0; i < 18; i++) {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.textContent = '💕';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.fontSize = (10 + Math.random() * 16) + 'px';
  heart.style.animationDuration = (6 + Math.random() * 6) + 's';
  heart.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(heart);
}
</script>
</body>
</html>
