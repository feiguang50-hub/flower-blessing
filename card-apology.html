<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道歉贺卡</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #f3e8ff 0%, #e8d5f7 40%, #f5e1fa 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 柔光漏光效果 === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 35% 25%, rgba(220,180,255,0.3) 0%, transparent 50%),
              radial-gradient(ellipse at 65% 75%, rgba(255,200,240,0.2) 0%, transparent 45%);
  animation: gentleFlare 7s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes gentleFlare {
  0%, 100% { transform: translate(0, 0); opacity: 0.8; }
  40% { transform: translate(1.5%, 1%); opacity: 1; }
  70% { transform: translate(-1%, 0.5%); opacity: 0.7; }
}

/* === 飘落花瓣（紫粉色系） === */
.petal {
  position: fixed;
  font-size: 13px;
  animation: petalFall linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 2px 5px rgba(150,80,160,0.12));
}
@keyframes petalFall {
  0% { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity: 0; }
  8% { opacity: 0.9; }
  88% { opacity: 0.7; }
  100% { transform: translateY(105vh) translateX(50px) rotate(320deg); opacity: 0; }
}

/* === 卡片外框发光脉冲 === */
.card-wrap {
  position: relative;
  z-index: 10;
  border-radius: 34px;
  padding: 2px;
  background: linear-gradient(135deg, #c9a0dc, #e8b0d8, #d8a0d8, #e0b0e0, #d5a0d5);
  background-size: 300% 300%;
  animation: borderPulse 5s ease infinite;
  box-shadow: 0 8px 32px rgba(180,120,200,0.25), 0 0 60px rgba(200,150,220,0.15);
}
@keyframes borderPulse {
  0% { background-position: 0% 50%; box-shadow: 0 8px 32px rgba(180,120,200,0.25), 0 0 40px rgba(200,150,220,0.1); }
  50% { background-position: 100% 50%; box-shadow: 0 8px 40px rgba(200,140,210,0.35), 0 0 80px rgba(220,160,230,0.2); }
  100% { background-position: 0% 50%; box-shadow: 0 8px 32px rgba(180,120,200,0.25), 0 0 40px rgba(200,150,220,0.1); }
}

.card {
  background: rgba(255,252,255,0.82);
  border-radius: 32px;
  padding: 48px 52px;
  text-align: center;
  max-width: 520px;
  width: 90vw;
  box-shadow: 0 16px 48px rgba(160,100,180,0.18), inset 0 0 30px rgba(240,210,255,0.2);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.4deg); }
  50% { transform: translateY(-8px) rotate(0.4deg); }
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(240,210,255,0.25) 0%, transparent 60%);
  animation: shimmer 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(8%, 8%); }
}

/* 图标 */
.card-icon {
  font-size: 42px; display: block; margin-bottom: 14px;
  animation: iconBounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(180,100,180,0.3));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  30% { transform: scale(1.12) translateY(-4px); }
  60% { transform: scale(0.96) translateY(0); }
  80% { transform: scale(1.06) translateY(-2px); }
}

/* === 文字动画 === */
.name {
  font-size: clamp(26px, 7vw, 50px);
  color: #7b4a8a; letter-spacing: 6px; margin-bottom: 14px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) both, nameGlow 3.5s ease-in-out infinite 1.2s;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(22px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes nameGlow {
  0%, 100% { text-shadow: 0 2px 8px rgba(160,80,160,0.15); }
  50% { text-shadow: 0 2px 18px rgba(180,100,180,0.3), 0 0 28px rgba(220,160,220,0.2); }
}

.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: #a070b0; letter-spacing: 3px; margin-bottom: 30px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
.blessing {
  font-size: clamp(15px, 3.5vw, 21px);
  color: #9040a0; line-height: 1.9; letter-spacing: 1.5px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.6s both;
}
.from {
  font-size: clamp(11px, 2vw, 14px);
  color: #b080c0; margin-top: 22px; letter-spacing: 2px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.9s both;
}

/* === 背景气泡 === */
.bubble {
  position: fixed; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(240,200,255,0.7), rgba(220,160,240,0.2));
  animation: bubbleRise linear infinite;
  z-index: 1; pointer-events: none;
}
@keyframes bubbleRise {
  0% { transform: translateY(100vh) scale(0.4); opacity: 0; }
  10% { opacity: 0.5; }
  90% { opacity: 0.5; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .petal, .bubble, .card, .card::before, .card-wrap { animation: none !important; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">🌸</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 飘落花瓣
const petals = ['🌸', '💮', '🩷', '🪷', '🌺'];
for (let i = 0; i < 20; i++) {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = petals[Math.floor(Math.random() * petals.length)];
  el.style.cssText = `
    left: ${Math.random() * 100}vw;
    font-size: ${10 + Math.random() * 10}px;
    animation-duration: ${6 + Math.random() * 6}s;
    animation-delay: ${Math.random() * 8}s;
    opacity: ${0.5 + Math.random() * 0.5};
  `;
  document.body.appendChild(el);
}

// 背景气泡
for (let i = 0; i < 12; i++) {
  const el = document.createElement('div');
  el.className = 'bubble';
  const size = 6 + Math.random() * 14;
  el.style.cssText = `
    width: ${size}px; height: ${size}px;
    left: ${Math.random() * 100}vw;
    animation-duration: ${8 + Math.random() * 8}s;
    animation-delay: ${Math.random() * 10}s;
  `;
  document.body.appendChild(el);
}
</script>
</body>
</html>
