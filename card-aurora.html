<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦幻极光</title>
<meta property="og:title" content="🌌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #0a0520 0%, #12083a 30%, #1a0a40 60%, #0d1f3c 100%);
  font-family: 'Georgia', 'PingFang SC', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 极光背景 */
.aurora {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.aurora::before,
.aurora::after {
  content: '';
  position: absolute;
  width: 180%; height: 50%;
  left: -40%;
  opacity: 0.35;
  filter: blur(40px);
  animation: auroraWave 12s ease-in-out infinite;
}
.aurora::before {
  top: 5%;
  background: linear-gradient(90deg, transparent, #00cfff, #7b2fff, #ff6ec7, transparent);
  background-size: 60% 100%;
  animation-duration: 14s;
}
.aurora::after {
  top: 15%;
  background: linear-gradient(90deg, transparent, #40ff90, #00d4ff, #a855f7, transparent);
  background-size: 70% 100%;
  animation-duration: 11s;
  animation-delay: -5s;
  opacity: 0.25;
}
@keyframes auroraWave {
  0%, 100% { transform: translateX(-15%) skewX(-5deg); }
  50% { transform: translateX(10%) skewX(3deg); }
}

/* 星空背景 */
.star-field {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.7); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 流星 */
.shooting-star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: linear-gradient(225deg, #fff, rgba(255,255,255,0));
  border-radius: 50%;
  animation: shoot linear infinite;
  z-index: 2;
  pointer-events: none;
}
@keyframes shoot {
  0% { transform: translateX(0) translateY(0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translateX(-300px) translateY(300px); opacity: 0; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 20;
  animation: cardFloat 6s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-12px) rotate(0.5deg); }
}

/* 极光边框 */
.card-wrap::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 22px;
  background: linear-gradient(135deg, #00cfff, #7b2fff, #ff6ec7, #40ff90, #00cfff);
  background-size: 400% 400%;
  animation: auroraBorder 6s ease infinite;
  z-index: -1;
}
@keyframes auroraBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 卡片发光 */
.card-wrap::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 28px;
  background: transparent;
  box-shadow: 0 0 30px rgba(0,207,255,0.2), 0 0 60px rgba(123,47,255,0.15), 0 0 90px rgba(255,110,199,0.1);
  animation: glowPulse 4s ease-in-out infinite;
  z-index: -2;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* 卡片主体 */
.card {
  position: relative;
  background: rgba(10,5,32,0.75);
  border-radius: 20px;
  padding: clamp(32px, 6vw, 52px) clamp(28px, 5vw, 48px);
  max-width: 90vw;
  width: 430px;
  text-align: center;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(150,120,255,0.25);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* 极光装饰文字 */
.card::before {
  content: '✦';
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: rgba(0,207,255,0.5);
  animation: starTwinkle 3s ease-in-out infinite;
}

/* 图标 */
.icon {
  font-size: clamp(36px, 8vw, 56px);
  display: block;
  margin-bottom: 14px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes iconDrop {
  from { transform: translateY(-30px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* 收礼人名 */
.name {
  font-size: clamp(24px, 6vw, 42px);
  font-weight: bold;
  background: linear-gradient(135deg, #00cfff, #7b2fff, #ff6ec7, #40ff90);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 4vw, 19px);
  color: rgba(200,190,255,0.9);
  line-height: 1.9;
  margin: 12px 0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
}

/* 日期 */
.date {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(150,130,220,0.75);
  letter-spacing: 3px;
  margin-bottom: 6px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.85s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(180,150,210,0.7);
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.0s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card-wrap, .aurora::before, .aurora::after { animation: none; }
  .shooting-star { animation: none; }
  .card, .name, .blessing, .date, .from { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<div class="aurora"></div>
<div class="star-field" id="starField"></div>

<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">🌌</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
(function() {
  const p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的心愿如星光璀璨，在极光下静静绽放';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');

  // 星星
  const starField = document.getElementById('starField');
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    const size = 1 + Math.random() * 3;
    el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${1.5+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
    starField.appendChild(el);
  }

  // 流星
  function spawnShootingStar() {
    const el = document.createElement('div');
    el.className = 'shooting-star';
    el.style.cssText = `left:${50+Math.random()*50}vw;top:${Math.random()*40}vh;animation-duration:${1.2+Math.random()*1.5}s;animation-delay:${Math.random()*3}s;width:${40+Math.random()*80}px;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
  setInterval(spawnShootingStar, 3500);
  setTimeout(spawnShootingStar, 1000);
  setTimeout(spawnShootingStar, 2500);
})();
</script>
</body>
</html>
