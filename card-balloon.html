<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热气球之旅</title>
<meta property="og:title" content="🎈 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-top: #6ab0e8;
  --sky-mid: #a8d8f0;
  --sky-bottom: #f0e4c8;
  --cloud-white: rgba(255,255,255,0.9);
  --balloon-red: #e84040;
  --balloon-yellow: #f5c518;
  --balloon-orange: #f0883e;
  --balloon-blue: #4a90d9;
  --balloon-green: #52b788;
  --balloon-pink: #e879c9;
  --text-primary: #5a3825;
  --card-bg: rgba(255,248,240,0.88);
  --border-warm: #d4956a;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    var(--sky-top) 0%,
    #89c4e8 25%,
    var(--sky-mid) 55%,
    var(--sky-bottom) 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 阳光光晕 */
body::before {
  content: '';
  position: fixed;
  top: -30px;
  right: -30px;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(255,240,150,0.5) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: sunPulse 4s ease-in-out infinite;
}

@keyframes sunPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* 云朵 */
.clouds { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

.cloud {
  position: absolute;
  background: var(--cloud-white);
  border-radius: 50px;
  animation: cloudDrift linear infinite;
  filter: blur(1px);
}

.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: inherit;
  border-radius: 50%;
}

.cloud-1 { width: 120px; height: 38px; top: 12%; left: -150px; animation-duration: 28s; opacity: 0.7; }
.cloud-1::before { width: 55px; height: 55px; top: -25px; left: 20px; }
.cloud-1::after { width: 40px; height: 40px; top: -18px; left: 55px; }

.cloud-2 { width: 90px; height: 28px; top: 22%; left: -120px; animation-duration: 35s; animation-delay: -12s; opacity: 0.6; }
.cloud-2::before { width: 40px; height: 40px; top: -18px; left: 15px; }
.cloud-2::after { width: 30px; height: 30px; top: -12px; left: 40px; }

.cloud-3 { width: 150px; height: 45px; top: 8%; left: -180px; animation-duration: 40s; animation-delay: -5s; opacity: 0.5; }
.cloud-3::before { width: 65px; height: 65px; top: -30px; left: 25px; }
.cloud-3::after { width: 50px; height: 50px; top: -22px; left: 70px; }

@keyframes cloudDrift {
  from { transform: translateX(0); }
  to { transform: translateX(calc(100vw + 250px)); }
}

/* 热气球 */
.balloons { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

.balloon {
  position: absolute;
  animation: balloonRise ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}

@keyframes balloonRise {
  0% { transform: translateY(105vh) rotate(-3deg); opacity: 0; }
  8% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-25vh) rotate(3deg); opacity: 0; }
}

.balloon-body {
  width: 56px;
  height: 68px;
  border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
  position: relative;
  box-shadow: inset -8px -6px 20px rgba(0,0,0,0.18), inset 8px 8px 15px rgba(255,255,255,0.3);
}

.balloon-body::after {
  content: '';
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 14px solid currentColor;
}

.balloon-basket {
  width: 22px;
  height: 14px;
  background: linear-gradient(135deg, #8b6914, #c49a2a);
  border-radius: 0 0 4px 4px;
  margin: 0 auto;
  position: relative;
  top: -4px;
  border: 1px solid rgba(0,0,0,0.2);
}

.balloon-basket::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 20px;
  background: rgba(100,80,40,0.5);
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg, #f5c518, #f0883e, #e84040, #f5c518);
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
  box-shadow: 0 0 30px rgba(245,197,24,0.4), 0 0 60px rgba(240,136,62,0.2);
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card {
  background: var(--card-bg);
  border-radius: 21px;
  padding: 40px 36px;
  text-align: center;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  max-width: 380px;
  width: 88vw;
  position: relative;
  overflow: hidden;
}

.icon-emoji {
  font-size: clamp(38px, 10vw, 58px);
  display: block;
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.6); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(22px, 6vw, 32px);
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 14px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
  letter-spacing: 2px;
}

.blessing {
  font-size: clamp(15px, 4vw, 18px);
  color: #7a5040;
  line-height: 1.8;
  margin-bottom: 16px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
}

.date {
  font-size: clamp(12px, 3vw, 14px);
  color: #a08070;
  margin-bottom: 6px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.85s both;
}

.from {
  font-size: clamp(12px, 3vw, 14px);
  color: #b09080;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1s both;
  font-style: italic;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 小鸟 */
.birds { position: fixed; inset: 0; pointer-events: none; z-index: 2; }

.bird {
  position: absolute;
  font-size: 14px;
  animation: birdFly linear infinite;
  opacity: 0.5;
}

@keyframes birdFly {
  from { transform: translateX(-30px); }
  to { transform: translateX(calc(100vw + 30px)); }
}

@media (prefers-reduced-motion: reduce) {
  .cloud, .balloon, .bird, body::before { animation: none; }
  .card-wrap { animation: none; background: linear-gradient(135deg, #f5c518, #f0883e); }
}
</style>
</head>
<body>

<div class="clouds">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
</div>

<div class="balloons" id="balloons"></div>

<div class="birds" id="birds"></div>

<script>
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!reducedMotion) {
  // 热气球颜色
  const colors = ['#e84040','#f5c518','#f0883e','#4a90d9','#52b788','#e879c9'];
  const balloons = document.getElementById('balloons');

  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'balloon';
      const color = colors[i % colors.length];
      const size = 0.75 + Math.random() * 0.5;
      const left = 8 + Math.random() * 75;
      const dur = 10 + Math.random() * 6;
      const delay = Math.random() * 5;
      b.style.cssText = `
        left: ${left}%;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        color: ${color};
        transform: scale(${size});
      `;
      b.innerHTML = `
        <div class="balloon-body" style="background: linear-gradient(135deg, ${color}, ${color}dd);"></div>
        <div class="balloon-basket"></div>
      `;
      balloons.appendChild(b);
    }, i * 1400);
  }

  // 小鸟
  const birds = document.getElementById('birds');
  for (let i = 0; i < 3; i++) {
    const bird = document.createElement('div');
    bird.className = 'bird';
    bird.textContent = '🕊';
    bird.style.cssText = `
      top: ${10 + Math.random() * 20}%;
      animation-duration: ${12 + Math.random() * 8}s;
      animation-delay: ${i * 3}s;
      font-size: ${10 + Math.random() * 8}px;
    `;
    birds.appendChild(bird);
  }
}

// URL参数
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活像热气球一样，越飞越高，看见更美的风景';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>

<div class="card-wrap">
  <div class="card">
    <span class="icon-emoji" id="iconEl">🎈</span>
    <div class="name" id="nameEl">亲爱的你</div>
    <div class="blessing" id="blessingEl">愿你的生活像热气球一样，越飞越高，看见更美的风景</div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
