<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热气球之旅</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-orange: #ff9a56;
  --sky-pink: #ff6b8a;
  --sky-purple: #c471ed;
  --sky-blue: #8e54e9;
  --balloon-red: #ff4757;
  --balloon-orange: #ffa502;
  --balloon-yellow: #ffd32a;
  --balloon-green: #26de81;
  --balloon-blue: #45aaf2;
  --text-light: #fff5f0;
  --card-bg: rgba(255, 255, 255, 0.15);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #87ceeb 0%,
    #f0c27b 30%,
    #ff9a56 55%,
    #ff6b8a 80%,
    #c471ed 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 阳光光晕 */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 60vw;
  height: 60vw;
  background: radial-gradient(circle, rgba(255,220,100,0.35) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* 云朵 */
.clouds {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.cloud {
  position: absolute;
  background: rgba(255,255,255,0.7);
  border-radius: 50px;
  animation: cloudDrift linear infinite;
}

.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
}

.cloud:nth-child(1) { width: 90px; height: 30px; top: 12%; left: -100px; animation-duration: 40s; }
.cloud:nth-child(1)::before { width: 45px; height: 45px; top: -22px; left: 12px; }
.cloud:nth-child(1)::after { width: 35px; height: 35px; top: -16px; left: 45px; }

.cloud:nth-child(2) { width: 110px; height: 35px; top: 22%; left: -120px; animation-duration: 50s; animation-delay: 15s; }
.cloud:nth-child(2)::before { width: 55px; height: 55px; top: -28px; left: 18px; }
.cloud:nth-child(2)::after { width: 42px; height: 42px; top: -20px; left: 58px; }

.cloud:nth-child(3) { width: 80px; height: 28px; top: 8%; left: -90px; animation-duration: 35s; animation-delay: 8s; }
.cloud:nth-child(3)::before { width: 40px; height: 40px; top: -20px; left: 10px; }
.cloud:nth-child(3)::after { width: 30px; height: 30px; top: -14px; left: 40px; }

@keyframes cloudDrift {
  0% { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 200px)); }
}

/* 气球群 */
.balloons {
  position: fixed; inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

.balloon {
  position: absolute;
  border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
  animation: balloonRise linear infinite;
  opacity: 0;
}

.balloon::before {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 10px solid currentColor;
}

.balloon::after {
  content: '';
  position: absolute;
  bottom: -60px;
  left: 50%;
  width: 1px;
  height: 50px;
  background: rgba(255,255,255,0.4);
}

@keyframes balloonRise {
  0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
  8% { opacity: 0.85; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-20vh) rotate(15deg); opacity: 0; }
}

/* 气球颜色 */
.balloon:nth-child(1) { width: 40px; height: 52px; background: radial-gradient(circle at 35% 30%, #ff6b8a, #ff4757); color: #ff4757; left: 8%; animation-duration: 14s; animation-delay: 0s; }
.balloon:nth-child(2) { width: 50px; height: 65px; background: radial-gradient(circle at 35% 30%, #ffd32a, #ffa502); color: #ffa502; left: 20%; animation-duration: 16s; animation-delay: 3s; }
.balloon:nth-child(3) { width: 35px; height: 46px; background: radial-gradient(circle at 35% 30%, #7bed9f, #26de81); color: #26de81; left: 35%; animation-duration: 13s; animation-delay: 6s; }
.balloon:nth-child(4) { width: 55px; height: 72px; background: radial-gradient(circle at 35% 30%, #70a1ff, #45aaf2); color: #45aaf2; left: 50%; animation-duration: 17s; animation-delay: 1s; }
.balloon:nth-child(5) { width: 42px; height: 55px; background: radial-gradient(circle at 35% 30%, #ff9ff3, #f368e0); color: #f368e0; left: 65%; animation-duration: 15s; animation-delay: 8s; }
.balloon:nth-child(6) { width: 48px; height: 62px; background: radial-gradient(circle at 35% 30%, #ffeaa7, #fdcb6e); color: #fdcb6e; left: 78%; animation-duration: 14s; animation-delay: 4s; }
.balloon:nth-child(7) { width: 38px; height: 50px; background: radial-gradient(circle at 35% 30%, #a29bfe, #6c5ce7); color: #6c5ce7; left: 90%; animation-duration: 16s; animation-delay: 10s; }

/* 纸筐 */
.basket {
  position: fixed;
  bottom: -80px;
  width: 100%;
  z-index: 3;
  pointer-events: none;
  display: flex;
  justify-content: center;
}

.basket-body {
  width: 60px;
  height: 35px;
  background: linear-gradient(180deg, #d4a574, #b8834a);
  border-radius: 0 0 10px 10px;
  border: 2px solid #a07040;
  border-top: none;
  animation: basketSway 4s ease-in-out infinite;
  transform-origin: top center;
}

@keyframes basketSway {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(400px, 90vw);
  min-height: 500px;
  background: rgba(255, 255, 255, 0.18);
  border-radius: 28px;
  padding: 44px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 2px solid rgba(255, 255, 255, 0.4);
  animation: cardFloat 5s ease-in-out infinite;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow:
    0 12px 40px rgba(180, 80, 60, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.4);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-10px) rotate(0.5deg); }
}

/* 彩色边框流光 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 30px;
  background: linear-gradient(135deg,
    rgba(255,107,138,0.6),
    rgba(255,165,2,0.4),
    rgba(69,170,242,0.4),
    rgba(196,113,237,0.6),
    rgba(255,107,138,0.6));
  background-size: 300% 300%;
  animation: rainbowBorder 4s ease-in-out infinite;
  z-index: -1;
  opacity: 0.5;
}

@keyframes rainbowBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 气球图标 */
.icon {
  font-size: 52px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(255,100,80,0.4));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分隔线 */
.divider {
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字 */
.name {
  font-size: clamp(24px, 7vw, 42px);
  color: var(--text-light);
  font-weight: 700;
  text-align: center;
  letter-spacing: 3px;
  text-shadow: 0 2px 14px rgba(0,0,0,0.25);
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(255,245,240,0.75);
  letter-spacing: 4px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(14px, 4vw, 17px);
  color: rgba(255,245,240,0.9);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  font-style: italic;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(12px, 3.5vw, 14px);
  color: rgba(255,245,240,0.65);
  letter-spacing: 3px;
  margin-top: 4px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

/* 底部文字 */
.travel-text {
  position: absolute;
  bottom: 18px;
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 2px;
  text-align: center;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .cloud, .balloon, .basket-body {
    animation: none;
  }
  .name, .date, .blessing, .from, .divider, .travel-text {
    opacity: 1;
  }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; min-height: 450px; }
  .balloon:nth-child(4),
  .balloon:nth-child(6) { display: none; }
}
</style>
</head>
<body>

<div class="clouds">
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
</div>

<div class="balloons">
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
  <div class="balloon"></div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🎈</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="travel-text">热气球之旅 · 万物可爱</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的旅程充满惊喜，每一天都像热气球一样轻盈美好';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
