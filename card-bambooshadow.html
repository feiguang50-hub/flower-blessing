<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竹影清风</title>
<meta property="og:title" content="🎋 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bam-deep: #0a1a10;
  --bam-green: #2d5a3d;
  --bam-light: #4a8c5a;
  --bam-moon: #d4e8d0;
  --bam-silver: #b8d4b8;
  --text-light: #c8eac8;
  --card-bg: rgba(10, 26, 16, 0.82);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #050d08 0%,
    #0a1a10 25%,
    #0f2a18 50%,
    #0a1a10 75%,
    #050d08 100%
  );
  font-family: 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 月光 */
.moonlight {
  position: fixed;
  top: 8%;
  right: 18%;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%,
    #f0f8e0 0%,
    #d4e8c0 40%,
    #a8c890 70%,
    transparent 100%
  );
  box-shadow:
    0 0 20px 8px rgba(200, 230, 160, 0.25),
    0 0 60px 20px rgba(180, 210, 140, 0.12);
  z-index: 1;
  animation: moonGlow 4s ease-in-out infinite alternate;
}

@keyframes moonGlow {
  0% { box-shadow: 0 0 20px 8px rgba(200, 230, 160, 0.25), 0 0 60px 20px rgba(180, 210, 140, 0.12); }
  100% { box-shadow: 0 0 30px 12px rgba(200, 230, 160, 0.35), 0 0 80px 30px rgba(180, 210, 140, 0.18); }
}

/* 竹子 */
.bamboo-forest {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.bamboo {
  position: absolute;
  bottom: 0;
  background: linear-gradient(90deg, #1a3a20 0%, #2d5a38 50%, #1a3a20 100%);
  border-radius: 4px 4px 0 0;
  transform-origin: bottom center;
}

.bamboo::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 6px;
  background: rgba(0,0,0,0.25);
  border-radius: 1px;
}

.b1 { width: 12px; height: 65%; left: 8%; animation: bambooSway 5s ease-in-out infinite; }
.b1::before { top: 20%; }
.b2 { width: 9px; height: 55%; left: 15%; animation: bambooSway 4.2s ease-in-out infinite 0.3s; }
.b2::before { top: 25%; }
.b3 { width: 14px; height: 72%; left: 22%; animation: bambooSway 5.5s ease-in-out infinite 0.8s; }
.b3::before { top: 18%; }
.b4 { width: 10px; height: 50%; left: 75%; animation: bambooSway 4.8s ease-in-out infinite 0.5s; }
.b4::before { top: 28%; }
.b5 { width: 13px; height: 68%; left: 82%; animation: bambooSway 5.2s ease-in-out infinite 1.1s; }
.b5::before { top: 22%; }
.b6 { width: 8px; height: 45%; left: 88%; animation: bambooSway 4.5s ease-in-out infinite 0.2s; }
.b6::before { top: 30%; }

/* 竹叶 */
.bamboo-leaves {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 20px;
}

.bleaf {
  position: absolute;
  font-size: 16px;
  opacity: 0.7;
}

.bl1 { left: 0; top: 0; animation: leafDrip 6s ease-in-out infinite; }
.bl2 { left: 14px; top: 2px; animation: leafDrip 5s ease-in-out infinite 1s; }
.bl3 { left: 26px; top: 0; animation: leafDrip 7s ease-in-out infinite 2s; }

@keyframes bambooSway {
  0%, 100% { transform: rotate(-1.5deg); }
  50% { transform: rotate(1.5deg); }
}

@keyframes leafDrip {
  0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
  50% { transform: translateY(8px) rotate(5deg); opacity: 0.5; }
  100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
}

/* 竹影（投射到地面的影子） */
.bamboo-shadow-layer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 30%;
  pointer-events: none;
  z-index: 0;
  background: linear-gradient(to top,
    rgba(0,0,0,0.35) 0%,
    transparent 100%
  );
}

.shadow-strip {
  position: absolute;
  bottom: 0;
  background: rgba(0,0,0,0.2);
  border-radius: 2px;
  transform-origin: top center;
  animation: shadowMove 8s ease-in-out infinite;
}

.ss1 { width: 20px; height: 80px; left: 10%; animation-duration: 9s; }
.ss2 { width: 15px; height: 60px; left: 18%; animation-duration: 7s; animation-delay: 2s; }
.ss3 { width: 25px; height: 90px; left: 78%; animation-duration: 8s; animation-delay: 1s; }
.ss4 { width: 18px; height: 70px; left: 85%; animation-duration: 10s; animation-delay: 3s; }

@keyframes shadowMove {
  0%, 100% { transform: skewX(-8deg) scaleX(1); }
  50% { transform: skewX(8deg) scaleX(0.9); }
}

/* 萤火虫光点 */
.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.fly {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #c8f0a0;
  box-shadow: 0 0 6px 2px rgba(200, 240, 120, 0.6);
  animation: flyFloat var(--dur, 4s) ease-in-out infinite;
}

@keyframes flyFloat {
  0% { opacity: 0; transform: translate(0, 0); }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translate(var(--tx, 20px), var(--ty, -30px)); }
}

/* 卡片外框呼吸光 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 20px;
  background: linear-gradient(135deg, #4a8c5a, #2d5a3d, #1a3a20, #2d5a3d);
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
  box-shadow:
    0 0 20px rgba(74, 140, 90, 0.3),
    0 0 40px rgba(45, 90, 61, 0.2),
    inset 0 0 20px rgba(74, 140, 90, 0.1);
}

@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 毛玻璃卡片 */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(18px) saturate(1.3);
  -webkit-backdrop-filter: blur(18px) saturate(1.3);
  border-radius: 18px;
  padding: clamp(32px, 7vw, 56px) clamp(28px, 6vw, 52px);
  max-width: 520px;
  width: 90vw;
  text-align: center;
  border: 1px solid rgba(180, 220, 180, 0.15);
  animation: cardFloat 3s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.name {
  font-size: clamp(24px, 6vw, 42px);
  font-weight: 600;
  color: var(--bam-moon);
  margin-bottom: 12px;
  text-shadow: 0 0 20px rgba(200, 230, 160, 0.4);
  letter-spacing: 2px;
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--bam-silver);
  margin-bottom: 20px;
  letter-spacing: 3px;
  opacity: 0.8;
}

.blessing {
  font-size: clamp(16px, 4vw, 22px);
  color: var(--text-light);
  line-height: 1.8;
  margin-bottom: 24px;
  opacity: 1;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--bam-silver);
  opacity: 0.75;
  letter-spacing: 2px;
}

/* 装饰竹叶 */
.deco-leaf {
  position: absolute;
  font-size: 22px;
  opacity: 0.4;
  pointer-events: none;
}

.dl1 { top: -12px; left: -8px; transform: rotate(-20deg); }
.dl2 { top: -12px; right: -8px; transform: rotate(20deg); }
.dl3 { bottom: -12px; left: -8px; transform: rotate(200deg); }
.dl4 { bottom: -12px; right: -8px; transform: rotate(160deg); }

/* 底部签名装饰 */
.signature {
  margin-top: 20px;
  font-size: 13px;
  color: rgba(180, 210, 180, 0.5);
  letter-spacing: 4px;
}
</style>
</head>
<body>

<!-- 月光 -->
<div class="moonlight"></div>

<!-- 竹林 -->
<div class="bamboo-forest">
  <div class="bamboo b1">
    <div class="bamboo-leaves">
      <span class="bleaf bl1">🎋</span>
      <span class="bleaf bl2">🎋</span>
      <span class="bleaf bl3">🎋</span>
    </div>
  </div>
  <div class="bamboo b2">
    <div class="bamboo-leaves">
      <span class="bleaf bl1">🎋</span>
      <span class="bleaf bl2">🎋</span>
    </div>
  </div>
  <div class="bamboo b3">
    <div class="bamboo-leaves">
      <span class="bleaf bl1">🎋</span>
      <span class="bleaf bl2">🎋</span>
      <span class="bleaf bl3">🎋</span>
    </div>
  </div>
  <div class="bamboo b4">
    <div class="bamboo-leaves">
      <span class="bleaf bl1">🎋</span>
      <span class="bleaf bl2">🎋</span>
    </div>
  </div>
  <div class="bamboo b5">
    <div class="bamboo-leaves">
      <span class="bleaf bl1">🎋</span>
      <span class="bleaf bl2">🎋</span>
      <span class="bleaf bl3">🎋</span>
    </div>
  </div>
  <div class="bamboo b6">
    <div class="bamboo-leaves">
      <span class="bleaf bl1">🎋</span>
      <span class="bleaf bl2">🎋</span>
    </div>
  </div>
</div>

<!-- 地面竹影 -->
<div class="bamboo-shadow-layer">
  <div class="shadow-strip ss1"></div>
  <div class="shadow-strip ss2"></div>
  <div class="shadow-strip ss3"></div>
  <div class="shadow-strip ss4"></div>
</div>

<!-- 萤火虫 -->
<div class="fireflies">
  <div class="fly" style="top:20%;left:15%;--dur:5s;--tx:30px;--ty:-25px"></div>
  <div class="fly" style="top:35%;left:80%;--dur:4s;--tx:-25px;--ty:-30px;animation-delay:1s"></div>
  <div class="fly" style="top:55%;left:25%;--dur:6s;--tx:20px;--ty:-20px;animation-delay:2.5s"></div>
  <div class="fly" style="top:45%;left:70%;--dur:4.5s;--tx:-30px;--ty:-35px;animation-delay:0.8s"></div>
  <div class="fly" style="top:65%;left:45%;--dur:5.5s;--tx:15px;--ty:-15px;animation-delay:3s"></div>
  <div class="fly" style="top:30%;left:55%;--dur:4s;--tx:-20px;--ty:-40px;animation-delay:1.5s"></div>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="deco-leaf dl1">🎋</div>
    <div class="deco-leaf dl2">🎋</div>
    <div class="deco-leaf dl3">🎋</div>
    <div class="deco-leaf dl4">🎋</div>
    <div class="name" id="nameEl">清风伴你</div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl">竹影摇曳，月光如水<br>愿你心静如水，事事皆安</div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '清风伴你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').innerHTML = (p.get('b') || '竹影摇曳，月光如水<br>愿你心静如水，事事皆安').replace(/\n/g, '<br>');
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>
</body>
</html>
