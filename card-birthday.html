<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 气球 */
.balloon {
  position: fixed;
  width: 40px;
  height: 52px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  animation: rise linear infinite;
  z-index: 1;
}
.balloon::before {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 8px solid inherit;
}
.balloon::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: 50%;
  width: 1px;
  height: 70px;
  background: rgba(255,255,255,0.3);
}
@keyframes rise {
  0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  5%   { opacity: 0.9; }
  95%  { opacity: 0.9; }
  100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
}

/* 蛋糕 */
.cake {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  font-size: 80px;
  z-index: 2;
  animation: cakeFloat 3s ease-in-out infinite;
}
@keyframes cakeFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}

/* 蜡烛火焰 */
.flame {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 16px;
  background: radial-gradient(ellipse at bottom, #fff 0%, #ffd700 30%, #ff6600 60%, transparent 100%);
  border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
  animation: flicker 0.3s ease-in-out infinite alternate;
}
@keyframes flicker {
  0%   { transform: translateX(-50%) scaleY(1) scaleX(1); }
  100% { transform: translateX(-50%) scaleY(1.2) scaleX(0.8); }
}

/* 卡片 */
.card {
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 32px;
  padding: 52px 60px;
  text-align: center;
  max-width: 540px;
  width: 90vw;
  backdrop-filter: blur(8px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: cardIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  position: relative;
  z-index: 10;
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.7) translateY(60px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.happy {
  font-size: clamp(18px, 4vw, 28px);
  color: #ffd700;
  letter-spacing: 12px;
  margin-bottom: 20px;
  animation: slideIn 1s ease-out 0.5s both;
}
.name {
  font-size: clamp(32px, 8vw, 60px);
  color: #ffffff;
  letter-spacing: 10px;
  margin-bottom: 16px;
  text-shadow: 0 0 30px rgba(255,215,0,0.5);
  animation: slideIn 1s ease-out 0.8s both;
}
.age {
  font-size: clamp(48px, 12vw, 88px);
  color: #ffd700;
  font-weight: bold;
  line-height: 1;
  margin-bottom: 8px;
  text-shadow: 0 0 40px rgba(255,215,0,0.6);
  animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s both;
}
.age-label {
  font-size: clamp(14px, 3vw, 20px);
  color: rgba(255,215,0,0.7);
  letter-spacing: 8px;
  margin-bottom: 28px;
  animation: slideIn 1s ease-out 1.2s both;
}
.blessing {
  font-size: clamp(14px, 3vw, 18px);
  color: rgba(255,255,255,0.9);
  line-height: 2;
  letter-spacing: 3px;
  animation: slideIn 1s ease-out 1.4s both;
}
.from {
  font-size: clamp(12px, 2.5vw, 16px);
  color: rgba(255,255,255,0.5);
  margin-top: 24px;
  letter-spacing: 4px;
  animation: slideIn 1s ease-out 1.6s both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.3); }
  to   { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<!-- 气球 -->
<script>
const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'];
for (let i = 0; i < 14; i++) {
  const b = document.createElement('div');
  b.className = 'balloon';
  b.style.left = Math.random() * 100 + 'vw';
  b.style.animationDuration = (6 + Math.random() * 6) + 's';
  b.style.animationDelay = Math.random() * 8 + 's';
  b.style.background = colors[i % colors.length];
  document.body.appendChild(b);
}
</script>

<!-- 蛋糕 -->
<div class="cake">🎂</div>

<!-- 卡片 -->
<div class="card">
  <div class="happy">HAPPY BIRTHDAY</div>
  <div class="name" id="nameEl"></div>
  <div class="age" id="ageEl"></div>
  <div class="age-label">周岁了</div>
  <div class="blessing" id="blessingEl"></div>
  <div class="from" id="fromEl"></div>
</div>

<script>
const p = new URLSearchParams(location.search);
// n=收礼人 d=日期(用于算年龄或显示) b=祝福语 f=送礼人
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 用日期算年龄：今年 - 出生年，或直接显示日期
const d = p.get('d');
if (d) {
  const birthYear = parseInt(d.split(/[年月日.\-]/)[0]);
  if (birthYear > 1900) {
    const age = new Date().getFullYear() - birthYear;
    if (age > 0 && age < 150) {
      document.getElementById('ageEl').textContent = age;
    } else {
      document.getElementById('ageEl').textContent = d;
    }
  } else {
    document.getElementById('ageEl').textContent = d;
  }
}
</script>
</body>
</html>
