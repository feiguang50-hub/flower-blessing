<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 星空背景 === */
.stars-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(100,80,200,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 0% 100%, rgba(200,100,150,0.1) 0%, transparent 50%);
  animation: bgShift 8s ease-in-out infinite;
}
@keyframes bgShift {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

/* === 星星粒子 === */
.star {
  position: fixed; background: #fff; border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

/* === 气球 === */
.balloon {
  position: fixed; width: 38px; height: 50px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  animation: balloonRise linear infinite;
  z-index: 2; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
}
.balloon::before {
  content: ''; position: absolute; bottom: -8px; left: 50%;
  transform: translateX(-50%); width: 0; height: 0;
  border-left: 6px solid transparent; border-right: 6px solid transparent;
  border-top: 10px solid inherit;
}
.balloon::after {
  content: ''; position: absolute; bottom: -90px; left: 50%;
  width: 1px; height: 80px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
}
@keyframes balloonRise {
  0% { transform: translateY(100vh) rotate(-5deg); opacity: 0; }
  5% { opacity: 0.9; }
  95% { opacity: 0.9; }
  100% { transform: translateY(-100px) rotate(5deg); opacity: 0; }
}

/* === 蛋糕 === */
.cake-wrap {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%); font-size: 80px;
  z-index: 2; animation: cakeBob 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(255,200,100,0.4));
}
@keyframes cakeBob {
  0%, 100% { transform: translateX(-50%) translateY(0) rotate(-1deg); }
  50% { transform: translateX(-50%) translateY(-8px) rotate(1deg); }
}
.flame {
  position: absolute; top: -22px; left: 50%;
  transform: translateX(-50%); width: 12px; height: 18px;
  background: radial-gradient(ellipse at bottom, #fff 0%, #ffd700 30%, #ff6600 70%, transparent 100%);
  border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
  animation: flameFlicker 0.25s ease-in-out infinite alternate;
}
@keyframes flameFlicker {
  0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
  100% { transform: translateX(-50%) scaleY(1.3) scaleX(0.7); }
}

/* === 金色流光边框 === */
.card-wrap {
  position: relative;
  padding: 2px;
  border-radius: 34px;
  background: linear-gradient(90deg, #ffd700, #ffec8b, #ffd700, #daa520, #ffd700);
  background-size: 200% 100%;
  animation: goldFlow 3s linear infinite;
  box-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.2);
  z-index: 10;
}
@keyframes goldFlow {
  0% { background-position: 0% 0%; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
  50% { background-position: 100% 0%; box-shadow: 0 0 35px rgba(255,215,0,0.6), 0 0 70px rgba(255,215,0,0.3); }
  100% { background-position: 0% 0%; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
}

/* 卡片 */
.card {
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
  border-radius: 32px;
  padding: 52px 60px;
  text-align: center;
  max-width: 540px;
  width: 90vw;
  backdrop-filter: blur(12px);
  box-shadow: inset 0 0 40px rgba(255,215,0,0.05);
  animation: cardPop cubic-bezier(0.34,1.56,0.64,1) both;
  position: relative; overflow: hidden;
}
@keyframes cardPop {
  from { opacity: 0; transform: scale(0.6) translateY(60px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* 文字 */
.happy {
  font-size: clamp(16px, 3.5vw, 24px); color: #ffd700;
  letter-spacing: 14px; margin-bottom: 20px;
  opacity: 1; animation: happyIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.4s both;
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
}
@keyframes happyIn {
  from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}
.name {
  font-size: clamp(32px, 8vw, 60px); color: #fff;
  letter-spacing: 10px; margin-bottom: 16px;
  opacity: 1; animation: nameIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
  text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 0 60px rgba(255,215,0,0.3);
}
@keyframes nameIn {
  from { opacity: 0; transform: translateY(30px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.age {
  font-size: clamp(52px, 14vw, 96px); color: #ffd700;
  font-weight: bold; line-height: 1; margin-bottom: 8px;
  opacity: 1; animation: agePop 0.8s cubic-bezier(0.34,1.56,0.64,1) 1s both;
  text-shadow: 0 0 40px rgba(255,215,0,0.7), 0 0 80px rgba(255,215,0,0.3);
}
@keyframes agePop {
  0% { opacity: 0; transform: scale(0.3); }
  60% { transform: scale(1.2); }
  100% { opacity: 1; transform: scale(1); }
}
.age-label {
  font-size: clamp(14px, 3vw, 20px); color: rgba(255,215,0,0.7);
  letter-spacing: 10px; margin-bottom: 28px;
  opacity: 1; animation: labelIn 0.8s ease-out 1.2s both;
}
@keyframes labelIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.blessing {
  font-size: clamp(14px, 3vw, 18px); color: rgba(255,255,255,0.9);
  line-height: 2; letter-spacing: 3px;
  opacity: 1; animation: textIn 0.8s ease-out 1.4s both;
}
.from {
  font-size: clamp(12px, 2.5vw, 16px); color: rgba(255,255,255,0.5);
  margin-top: 24px; letter-spacing: 4px;
  opacity: 1; animation: textIn 0.8s ease-out 1.6s both;
}
@keyframes textIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.cake-icon {
  font-size: 28px; margin-top: 20px;
  animation: iconPulse 2s ease-in-out infinite;
  display: block;
}
@keyframes iconPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <div class="happy">✦ HAPPY BIRTHDAY ✦</div>
    <div class="name" id="nameEl"></div>
    <div class="age" id="ageEl"></div>
    <div class="age-label">周岁了</div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <span class="cake-icon">🎂</span>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

const d = p.get('d');
if (d) {
  const birthYear = parseInt(d.split(/[年月日.\-]/)[0]);
  if (birthYear > 1900) {
    const age = new Date().getFullYear() - birthYear;
    if (age > 0 && age < 150) document.getElementById('ageEl').textContent = age;
    else document.getElementById('ageEl').textContent = d;
  } else {
    document.getElementById('ageEl').textContent = d;
  }
}

for (let i = 0; i < 80; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + 'vw';
  star.style.top = Math.random() * 100 + 'vh';
  const size = 1 + Math.random() * 2.5;
  star.style.width = star.style.height = size + 'px';
  star.style.animationDuration = (1 + Math.random() * 2) + 's';
  star.style.animationDelay = Math.random() * 3 + 's';
  document.body.appendChild(star);
}

const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#ff85c0'];
for (let i = 0; i < 16; i++) {
  const b = document.createElement('div');
  b.className = 'balloon';
  b.style.left = (5 + Math.random() * 90) + 'vw';
  b.style.animationDuration = (8 + Math.random() * 6) + 's';
  b.style.animationDelay = Math.random() * 8 + 's';
  b.style.background = colors[i % colors.length];
  document.body.appendChild(b);
}

const cake = document.createElement('div');
cake.className = 'cake-wrap';
cake.innerHTML = '🎂<div class="flame"></div><div class="flame" style="left:30%;top:-18px;animation-delay:0.15s"></div>';
document.body.appendChild(cake);
</script>
</body>
</html>
