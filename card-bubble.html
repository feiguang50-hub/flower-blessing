<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦幻泡泡祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bubble-pink: #ffb6d9;
  --bubble-blue: #a8d8ff;
  --bubble-purple: #d4b8ff;
  --bubble-yellow: #fff0b3;
  --bubble-green: #b8f0d4;
  --card-bg: rgba(255,255,255,0.75);
  --text-violet: #9b59b6;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #e8f4fd 0%, #fce4ec 30%, #f3e5f5 60%, #e1f5fe 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 背景光晕 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(168,216,255,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255,182,217,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(212,184,255,0.2) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* 泡泡容器 */
.bubbles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.bubble-item {
  position: absolute;
  border-radius: 50%;
  animation: rise linear infinite;
  opacity: 0;
}

/* 泡泡大小 */
.b1 { width: 18px; height: 18px; left: 8%; animation-duration: 7s; animation-delay: 0s; }
.b2 { width: 28px; height: 28px; left: 18%; animation-duration: 9s; animation-delay: 1s; }
.b3 { width: 14px; height: 14px; left: 30%; animation-duration: 6s; animation-delay: 0.5s; }
.b4 { width: 22px; height: 22px; left: 42%; animation-duration: 8s; animation-delay: 2s; }
.b5 { width: 16px; height: 16px; left: 55%; animation-duration: 7.5s; animation-delay: 0.8s; }
.b6 { width: 32px; height: 32px; left: 65%; animation-duration: 10s; animation-delay: 1.5s; }
.b7 { width: 12px; height: 12px; left: 75%; animation-duration: 6.5s; animation-delay: 3s; }
.b8 { width: 24px; height: 24px; left: 88%; animation-duration: 8.5s; animation-delay: 0.3s; }
.b9 { width: 20px; height: 20px; left: 12%; animation-duration: 7.8s; animation-delay: 4s; }
.b10 { width: 15px; height: 15px; left: 50%; animation-duration: 6.8s; animation-delay: 2.5s; }
.b11 { width: 26px; height: 26px; left: 35%; animation-duration: 9.2s; animation-delay: 1.2s; }
.b12 { width: 19px; height: 19px; left: 70%; animation-duration: 7.2s; animation-delay: 3.5s; }

@keyframes rise {
  0% { bottom: -60px; opacity: 0; transform: scale(0.5) translateX(0); }
  10% { opacity: 0.7; transform: scale(1) translateX(5px); }
  30% { transform: scale(1.1) translateX(-5px); }
  50% { transform: scale(1) translateX(8px); }
  70% { transform: scale(1.05) translateX(-3px); }
  90% { opacity: 0.5; transform: scale(0.9) translateX(0); }
  100% { bottom: 110vh; opacity: 0; transform: scale(0.6) translateX(5px); }
}

/* 星星装饰 */
.star-decor {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.star-item {
  position: absolute;
  opacity: 0;
  animation: twinkle ease-in-out infinite;
}

.s1 { top: 8%; left: 5%; font-size: 12px; animation-duration: 3s; animation-delay: 0s; }
.s2 { top: 15%; left: 90%; font-size: 10px; animation-duration: 2.5s; animation-delay: 0.5s; }
.s3 { top: 25%; left: 3%; font-size: 8px; animation-duration: 3.5s; animation-delay: 1s; }
.s4 { top: 10%; left: 75%; font-size: 14px; animation-duration: 2.8s; animation-delay: 1.5s; }
.s5 { top: 30%; left: 95%; font-size: 9px; animation-duration: 3.2s; animation-delay: 0.3s; }
.s6 { top: 5%; left: 50%; font-size: 11px; animation-duration: 2.6s; animation-delay: 2s; }
.s7 { top: 20%; left: 25%; font-size: 8px; animation-duration: 3.8s; animation-delay: 0.8s; }
.s8 { top: 35%; left: 15%; font-size: 10px; animation-duration: 2.9s; animation-delay: 1.8s; }

@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 爱心装饰 */
.heart-decor {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.heart-item {
  position: absolute;
  opacity: 0;
  animation: floatHeart ease-in-out infinite;
  font-size: 14px;
}

.h1 { left: 6%; top: 40%; animation-duration: 5s; animation-delay: 0s; }
.h2 { left: 90%; top: 30%; animation-duration: 6s; animation-delay: 1s; }
.h3 { left: 2%; top: 60%; animation-duration: 4.5s; animation-delay: 2s; }
.h4 { left: 95%; top: 55%; animation-duration: 5.5s; animation-delay: 0.5s; }
.h5 { left: 85%; top: 70%; animation-duration: 6.5s; animation-delay: 3s; }

@keyframes floatHeart {
  0%, 100% { opacity: 0; transform: translateY(0) rotate(0deg); }
  25% { opacity: 0.7; transform: translateY(-10px) rotate(5deg); }
  75% { opacity: 0.5; transform: translateY(-20px) rotate(-5deg); }
}

/* 卡片包装 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 28px;
  background: linear-gradient(135deg,
    rgba(255,182,217,0.8),
    rgba(168,216,255,0.8),
    rgba(212,184,255,0.8),
    rgba(255,240,179,0.8),
    rgba(184,240,212,0.8),
    rgba(255,182,217,0.8));
  background-size: 400% 400%;
  animation: rainbowBorder 6s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(255,182,217,0.3),
    0 0 40px rgba(168,216,255,0.2),
    0 8px 32px rgba(0,0,0,0.1);
}

@keyframes rainbowBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card {
  background: rgba(255,255,255,0.85);
  border-radius: 26px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  max-width: 90vw;
  width: 420px;
}

.icon {
  font-size: clamp(40px, 10vw, 64px);
  display: block;
  margin-bottom: 12px;
  animation: bounceIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  filter: drop-shadow(0 4px 8px rgba(255,182,217,0.4));
}

@keyframes bounceIn {
  from { opacity: 0; transform: scale(0.3) translateY(30px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.name {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: 700;
  background: linear-gradient(90deg, #ff9aad, #a8d8ff, #d4b8ff, #ffb6d9);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: nameShimmer 4s ease-in-out infinite;
  margin-bottom: 10px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both, nameShimmer 4s ease-in-out 1.7s infinite;
}

@keyframes nameShimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.blessing {
  font-size: clamp(16px, 4.5vw, 22px);
  color: #7b5ea7;
  line-height: 1.6;
  margin-bottom: 14px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.8s both;
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: #b39ddb;
  margin-bottom: 6px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: #ce93d8;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.3s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动画 */
@media (prefers-reduced-motion: reduce) {
  .bubble-item, .star-item, .heart-item, .card-wrap {
    animation: none;
  }
  .name, .blessing, .date, .from { animation: none; opacity: 1; }
  .icon { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 泡泡 -->
<div class="bubbles">
  <div class="bubble-item b1" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(255,182,217,0.4));box-shadow:inset -2px -2px 4px rgba(255,182,217,0.3),0 0 8px rgba(255,182,217,0.2);"></div>
  <div class="bubble-item b2" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(168,216,255,0.4));box-shadow:inset -2px -2px 4px rgba(168,216,255,0.3),0 0 8px rgba(168,216,255,0.2);"></div>
  <div class="bubble-item b3" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(212,184,255,0.4));box-shadow:inset -2px -2px 4px rgba(212,184,255,0.3),0 0 8px rgba(212,184,255,0.2);"></div>
  <div class="bubble-item b4" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(255,240,179,0.4));box-shadow:inset -2px -2px 4px rgba(255,240,179,0.3),0 0 8px rgba(255,240,179,0.2);"></div>
  <div class="bubble-item b5" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(184,240,212,0.4));box-shadow:inset -2px -2px 4px rgba(184,240,212,0.3),0 0 8px rgba(184,240,212,0.2);"></div>
  <div class="bubble-item b6" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(255,182,217,0.4));box-shadow:inset -2px -2px 4px rgba(255,182,217,0.3),0 0 8px rgba(255,182,217,0.2);"></div>
  <div class="bubble-item b7" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(168,216,255,0.4));box-shadow:inset -2px -2px 4px rgba(168,216,255,0.3),0 0 8px rgba(168,216,255,0.2);"></div>
  <div class="bubble-item b8" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(212,184,255,0.4));box-shadow:inset -2px -2px 4px rgba(212,184,255,0.3),0 0 8px rgba(212,184,255,0.2);"></div>
  <div class="bubble-item b9" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(255,240,179,0.4));box-shadow:inset -2px -2px 4px rgba(255,240,179,0.3),0 0 8px rgba(255,240,179,0.2);"></div>
  <div class="bubble-item b10" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(184,240,212,0.4));box-shadow:inset -2px -2px 4px rgba(184,240,212,0.3),0 0 8px rgba(184,240,212,0.2);"></div>
  <div class="bubble-item b11" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(255,182,217,0.4));box-shadow:inset -2px -2px 4px rgba(255,182,217,0.3),0 0 8px rgba(255,182,217,0.2);"></div>
  <div class="bubble-item b12" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(168,216,255,0.4));box-shadow:inset -2px -2px 4px rgba(168,216,255,0.3),0 0 8px rgba(168,216,255,0.2);"></div>
</div>

<!-- 星星 -->
<div class="star-decor">
  <div class="star-item s1">✨</div>
  <div class="star-item s2">⭐</div>
  <div class="star-item s3">🌟</div>
  <div class="star-item s4">✨</div>
  <div class="star-item s5">⭐</div>
  <div class="star-item s6">🌟</div>
  <div class="star-item s7">✨</div>
  <div class="star-item s8">⭐</div>
</div>

<!-- 爱心 -->
<div class="heart-decor">
  <div class="heart-item h1">💕</div>
  <div class="heart-item h2">💗</div>
  <div class="heart-item h3">💖</div>
  <div class="heart-item h4">💕</div>
  <div class="heart-item h5">💗</div>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">🫧</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活如泡泡般轻盈闪耀每一天';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
</script>
</body>
</html>
