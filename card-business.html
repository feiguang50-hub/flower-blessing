<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商务祝福</title>
<meta property="og:title" content="🏆 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="🏆 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0a1628 0%, #1a2d4a 40%, #0d1f3c 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 金色光芒背景 === */
.body-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.body-glow::before {
  content: '';
  position: absolute; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(200,170,50,0.1) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 80%, rgba(200,170,50,0.1) 0%, transparent 45%);
  animation: goldGlow 10s ease-in-out infinite;
}
@keyframes goldGlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* === 金色粒子 === */
.gold-particle {
  position: fixed;
  background: radial-gradient(circle, #ffd700, #b8860b);
  border-radius: 50%;
  animation: goldRise linear infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 4px rgba(255,215,0,0.6);
}
@keyframes goldRise {
  0% { transform: translateY(105vh) scale(0.3); opacity: 0; }
  10% { opacity: 0.9; }
  85% { opacity: 0.5; }
  100% { transform: translateY(-8vh) scale(0.8); opacity: 0; }
}

/* === 星光 === */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* === 光芒射线 === */
.ray {
  position: fixed;
  top: 0; left: 50%;
  width: 2px;
  height: 40px;
  background: linear-gradient(to bottom, rgba(255,215,0,0.7), transparent);
  animation: rayFade linear infinite;
  z-index: 1; pointer-events: none;
  transform-origin: top center;
}
@keyframes rayFade {
  0% { opacity: 0; transform: scaleY(0) rotate(0deg); }
  20% { opacity: 0.8; transform: scaleY(1) rotate(var(--rot, 0deg)); }
  80% { opacity: 0.3; }
  100% { opacity: 0; transform: scaleY(1.2) rotate(var(--rot, 0deg)); }
}

/* === 卡片外框 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ffd700, #b8860b, #ffd700, #daa520);
  background-size: 400% 400%;
  animation: goldPulse 4s ease infinite;
  z-index: 10;
  box-shadow: 0 0 35px rgba(255,215,0,0.5), 0 12px 40px rgba(0,0,0,0.3);
}
@keyframes goldPulse {
  0% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(255,215,0,0.4), 0 12px 40px rgba(0,0,0,0.3); }
  50% { background-position: 100% 50%; box-shadow: 0 0 50px rgba(255,215,0,0.7), 0 12px 40px rgba(0,0,0,0.3); }
  100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(255,215,0,0.4), 0 12px 40px rgba(0,0,0,0.3); }
}

.card {
  background: linear-gradient(145deg, #0d1f3c, #1a2d4a, #0d1f3c);
  border-radius: 18px;
  padding: clamp(32px, 7vw, 52px) clamp(24px, 6vw, 44px);
  text-align: center;
  position: relative;
  overflow: hidden;
  max-width: min(500px, 92vw);
  width: 100%;
}

/* 卡片内边框光效 */
.card::before {
  content: '';
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 12px;
  pointer-events: none;
}

/* 图标 */
.biz-icon {
  font-size: clamp(50px, 11vw, 76px);
  display: block;
  margin: 0 auto 14px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  filter: drop-shadow(0 4px 14px rgba(255,215,0,0.5));
}
@keyframes iconDrop {
  from { transform: translateY(-50px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* 标题 */
.title {
  font-size: clamp(18px, 4.5vw, 28px);
  font-weight: bold;
  color: #ffd700;
  letter-spacing: 8px;
  margin-bottom: 10px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.2s both;
  text-transform: uppercase;
}

/* 名字 */
.name {
  font-size: clamp(28px, 7.5vw, 48px);
  font-weight: bold;
  background: linear-gradient(135deg, #ffd700, #fff8dc, #ffd700, #daa520);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldShimmer 3s ease infinite, fadeUp 1.2s ease-out 0.4s both;
  margin-bottom: 14px;
}
@keyframes goldShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 3.8vw, 19px);
  color: #daa520;
  line-height: 1.9;
  margin-bottom: 16px;
  opacity: 1;
  animation: fadeUp 1.4s ease-out 0.6s both;
  letter-spacing: 1px;
}

/* 署名 */
.from {
  font-size: clamp(12px, 3.2vw, 16px);
  color: #b8860b;
  opacity: 1;
  animation: fadeUp 1.4s ease-out 0.8s both;
  letter-spacing: 2px;
}

/* 底部装饰 */
.card-footer {
  display: block;
  margin-top: 18px;
  font-size: clamp(16px, 3.5vw, 22px);
  opacity: 1;
  animation: fadeUp 1.4s ease-out 1s both;
}
</style>
</head>
<body>

<div class="body-glow"></div>

<div class="card-wrap">
  <div class="card">
    <span class="biz-icon" id="iconEl">🏆</span>
    <div class="title" id="titleEl">商务祝福</div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="card-footer">✨</div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '恭喜您';
document.getElementById('blessingEl').textContent = p.get('b') || '事业蒸蒸日上，再创辉煌！';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
if (p.get('t') === 'opening') {
  document.getElementById('titleEl').textContent = '开业大吉';
  document.getElementById('iconEl').textContent = '🎊';
} else if (p.get('t') === 'promotion') {
  document.getElementById('titleEl').textContent = '升职贺喜';
  document.getElementById('iconEl').textContent = '🎖️';
} else if (p.get('t') === 'award') {
  document.getElementById('titleEl').textContent = '荣誉时刻';
  document.getElementById('iconEl').textContent = '🏅';
} else if (p.get('t') === 'achievement') {
  document.getElementById('titleEl').textContent = '成就达成';
  document.getElementById('iconEl').textContent = '🌟';
}

// 金色粒子
for (let i = 0; i < 20; i++) {
  const el = document.createElement('div');
  el.className = 'gold-particle';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.width = el.style.height = (3 + Math.random() * 5) + 'px';
  el.style.animationDuration = (5 + Math.random() * 7) + 's';
  el.style.animationDelay = Math.random() * 10 + 's';
  document.body.appendChild(el);
}

// 星光
for (let i = 0; i < 40; i++) {
  const el = document.createElement('div');
  el.className = 'star';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = Math.random() * 100 + 'vh';
  el.style.width = el.style.height = (1 + Math.random() * 3) + 'px';
  el.style.animationDuration = (2 + Math.random() * 4) + 's';
  el.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(el);
}

// 光芒射线
for (let i = 0; i < 8; i++) {
  const el = document.createElement('div');
  el.className = 'ray';
  el.style.setProperty('--rot', (i * 45) + 'deg');
  el.style.left = (20 + i * 10) + '%';
  el.style.height = (30 + Math.random() * 30) + 'px';
  el.style.animationDuration = (3 + Math.random() * 4) + 's';
  el.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(el);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.gold-particle,.star,.ray').forEach(el => el.remove());
}
</script>
</body>
</html>
