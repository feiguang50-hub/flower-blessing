<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>篝火</title>
<meta property="og:title" content="🔥 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-deep: #030d05;
  --night-mid: #0a1f0a;
  --night-top: #06120a;
  --fire-orange: #ff6b35;
  --fire-yellow: #ffd700;
  --fire-red: #ff4500;
  --fire-glow: rgba(255, 140, 50, 0.35);
  --text-warm: #f5e6d0;
  --text-muted: rgba(245, 230, 208, 0.55);
  --card-bg: rgba(15, 25, 15, 0.88);
  --card-border: rgba(255, 200, 100, 0.25);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #06120a 0%,
    #0a1f0a 25%,
    #0d2810 50%,
    #071508 75%,
    #030d05 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 篝火光晕 */
body::before {
  content: '';
  position: fixed;
  bottom: 12%;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 200px;
  background: radial-gradient(ellipse, rgba(255,120,30,0.4) 0%, rgba(255,80,0,0.2) 40%, transparent 70%);
  z-index: 1;
  pointer-events: none;
  animation: fireGlow 2s ease-in-out infinite;
}
@keyframes fireGlow {
  0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
}

/* 星空 */
.stars {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}
.star {
  position: absolute;
  background: rgba(255, 255, 220, 0.8);
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.4); }
}

/* 萤火虫 */
.fireflies {
  position: fixed; inset: 0;
  z-index: 2; pointer-events: none;
}
.firefly {
  position: absolute;
  font-size: 12px;
  animation: fireflyFloat 5s ease-in-out infinite;
}
@keyframes fireflyFloat {
  0% { opacity: 0; transform: translateY(0) translateX(0); }
  20% { opacity: 0.9; }
  80% { opacity: 0.9; }
  100% { opacity: 0; transform: translateY(-60px) translateX(20px); }
}

/* 篝火火焰 */
.campfire {
  position: fixed;
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  pointer-events: none;
  font-size: 56px;
  animation: flameDance 1.5s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(255,100,0,0.6)) drop-shadow(0 0 40px rgba(255,150,0,0.3));
}
@keyframes flameDance {
  0%, 100% { transform: translateX(-50%) scaleY(1) rotate(-2deg); }
  33% { transform: translateX(-50%) scaleY(1.1) rotate(2deg); }
  66% { transform: translateX(-50%) scaleY(0.95) rotate(-1deg); }
}

/* 木柴 */
.wood {
  position: fixed;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  pointer-events: none;
  font-size: 32px;
  filter: drop-shadow(0 0 8px rgba(100,60,20,0.5));
}

/* 边框呼吸光效 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(255,100,0,0.7), rgba(255,200,50,0.7), rgba(255,80,0,0.7));
  background-size: 200% 200%;
  animation: fireBorder 4s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(255, 120, 30, 0.35),
    0 0 40px rgba(255, 80, 0, 0.2),
    0 8px 32px rgba(0, 0, 0, 0.4);
}
@keyframes fireBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(255,120,30,0.35), 0 0 40px rgba(255,80,0,0.2), 0 8px 32px rgba(0,0,0,0.4); }
  50% { background-position: 100% 50%; box-shadow: 0 0 30px rgba(255,160,50,0.5), 0 0 60px rgba(255,100,0,0.3), 0 8px 32px rgba(0,0,0,0.5); }
}

.card {
  background: var(--card-bg);
  border-radius: 18px;
  padding: clamp(28px, 6vw, 52px) clamp(24px, 5vw, 48px);
  text-align: center;
  max-width: min(520px, 92vw);
  min-height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
  animation: cardFloat 5s ease-in-out infinite;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--card-border);
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-7px); }
}

.name {
  font-size: clamp(28px, 7vw, 50px);
  font-weight: bold;
  color: var(--fire-yellow);
  opacity: 1;
  animation: slideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  text-shadow: 0 0 20px rgba(255,200,50,0.5), 0 2px 8px rgba(0,0,0,0.5);
}
.date {
  font-size: clamp(13px, 3vw, 17px);
  color: var(--text-warm);
  opacity: 0.55;
  opacity: 1;
  animation: slideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
  letter-spacing: 2px;
}
.blessing {
  font-size: clamp(16px, 4vw, 23px);
  color: var(--text-warm);
  line-height: 1.7;
  max-width: 380px;
  opacity: 1;
  animation: slideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
}
.from {
  font-size: clamp(13px, 3vw, 16px);
  color: var(--text-warm);
  opacity: 0.5;
  opacity: 1;
  animation: slideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 1.1s both;
  margin-top: 4px;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .card, .campfire, .firefly, .star { animation: none; }
  .name, .date, .blessing, .from { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>

<!-- 萤火虫 -->
<div class="fireflies" id="fireflies"></div>

<!-- 篝火 -->
<div class="campfire">🔥</div>
<div class="wood">🪵🪵</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
// 生成星空
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 40; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.cssText = `
    left: ${Math.random() * 100}%;
    top: ${Math.random() * 65}%;
    width: ${1 + Math.random() * 2}px;
    height: ${1 + Math.random() * 2}px;
    animation-duration: ${2 + Math.random() * 4}s;
    animation-delay: ${-Math.random() * 4}s;
  `;
  starsContainer.appendChild(star);
}

// 生成萤火虫
const firefliesContainer = document.getElementById('fireflies');
const ffPositions = [
  {x:12,y:30},{x:25,y:55},{x:40,y:25},{x:60,y:45},{x:75,y:20},
  {x:88,y:50},{x:15,y:60},{x:55,y:35},{x:70,y:60},{x:30,y:40},
  {x:82,y:35},{x:45,y:55}
];
ffPositions.forEach((pos, i) => {
  const ff = document.createElement('div');
  ff.className = 'firefly';
  ff.textContent = '✨';
  ff.style.cssText = `
    left: ${pos.x}%;
    top: ${pos.y}%;
    animation-duration: ${4 + Math.random() * 3}s;
    animation-delay: ${-i * 0.7}s;
    font-size: ${8 + Math.random() * 8}px;
  `;
  firefliesContainer.appendChild(ff);
});

// 参数读取
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的夜晚总有星光相伴';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>
</body>
</html>
