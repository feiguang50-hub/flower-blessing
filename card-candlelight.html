<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烛光温暖</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --flame-orange: #ff8c42;
  --flame-gold: #ffd166;
  --flame-red: #e85d4c;
  --candle-cream: #fef3e2;
  --text-warm: #5a3d2b;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #1a0a05 0%, #2d1810 30%, #3d2418 60%, #1a0a05 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 烛光光晕背景 */
body::before {
  content: '';
  position: fixed;
  top: 20%; left: 50%;
  transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(ellipse at 50% 80%, rgba(255,140,66,0.25) 0%, rgba(255,209,102,0.12) 30%, transparent 70%);
  animation: flameGlow 3s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes flameGlow {
  0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
}

/* 火星粒子 */
.cinders {
  position: fixed; inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

.cinder {
  position: absolute;
  width: 4px; height: 4px;
  background: radial-gradient(circle, #ffd166, #ff8c42);
  border-radius: 50%;
  animation: cinderRise linear infinite;
  opacity: 0;
}

@keyframes cinderRise {
  0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  10% { opacity: 0.9; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-120px) translateX(var(--drift, 10px)) scale(0.3); opacity: 0; }
}

.cinder:nth-child(1) { left: 48%; bottom: 52%; animation-duration: 3s; animation-delay: 0s; --drift: 8px; }
.cinder:nth-child(2) { left: 50%; bottom: 52%; animation-duration: 3.5s; animation-delay: 0.5s; --drift: -12px; }
.cinder:nth-child(3) { left: 49%; bottom: 52%; animation-duration: 2.8s; animation-delay: 1s; --drift: 15px; }
.cinder:nth-child(4) { left: 51%; bottom: 52%; animation-duration: 3.2s; animation-delay: 1.5s; --drift: -6px; }
.cinder:nth-child(5) { left: 47%; bottom: 52%; animation-duration: 4s; animation-delay: 2s; --drift: 20px; }
.cinder:nth-child(6) { left: 52%; bottom: 52%; animation-duration: 3.6s; animation-delay: 0.3s; --drift: -18px; }

/* 蜡烛 */
.candle {
  position: absolute;
  bottom: 18%; left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.candle-body {
  width: 28px; height: 80px;
  background: linear-gradient(90deg, #f5e6d3, #fff8f0, #f0dfc8);
  border-radius: 4px 4px 6px 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  position: relative;
}

.candle-body::before {
  content: '';
  position: absolute;
  top: -8px; left: 50%;
  transform: translateX(-50%);
  width: 2px; height: 12px;
  background: linear-gradient(180deg, #333, #222);
  border-radius: 1px;
}

.candle-body::after {
  content: '';
  position: absolute;
  top: -26px; left: 50%;
  transform: translateX(-50%);
  width: 16px; height: 22px;
  background: radial-gradient(ellipse at 50% 70%, #ffd166 0%, #ff8c42 40%, #e85d4c 70%, transparent 100%);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  animation: flameFlicker 0.5s ease-in-out infinite alternate;
  filter: blur(1px);
}

@keyframes flameFlicker {
  0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
  30% { transform: translateX(-50%) scaleY(1.08) scaleX(0.92); }
  60% { transform: translateX(-50%) scaleY(0.95) scaleX(1.05); }
  100% { transform: translateX(-50%) scaleY(1.05) scaleX(0.96); }
}

/* 烛光内层火焰 */
.candle-body .flame-inner {
  position: absolute;
  top: -22px; left: 50%;
  transform: translateX(-50%);
  width: 8px; height: 14px;
  background: radial-gradient(ellipse at 50% 80%, #fff 0%, #ffd166 50%, transparent 100%);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  animation: innerFlame 0.3s ease-in-out infinite alternate;
}

@keyframes innerFlame {
  0% { opacity: 0.9; transform: translateX(-50%) scale(1); }
  100% { opacity: 1; transform: translateX(-50%) scale(1.05); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(400px, 90vw);
  min-height: 480px;
  background: linear-gradient(160deg, rgba(254,243,226,0.95) 0%, rgba(250,235,215,0.92) 100%);
  border-radius: 24px;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  box-shadow:
    0 12px 40px rgba(90,61,43,0.3),
    0 4px 12px rgba(90,61,43,0.2),
    inset 0 1px 0 rgba(255,255,255,0.8);
  border: 2px solid rgba(255,140,66,0.3);
  animation: cardFloat 5s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-8px) rotate(0.5deg); }
}

/* 暖橙边框呼吸 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, rgba(255,140,66,0.5), rgba(255,209,102,0.3), rgba(255,140,66,0.5));
  background-size: 200% 200%;
  animation: warmBorder 3s ease-in-out infinite;
  z-index: -1;
  opacity: 0.5;
}

@keyframes warmBorder {
  0%, 100% { background-position: 0% 50%; opacity: 0.4; }
  50% { background-position: 100% 50%; opacity: 0.6; }
}

/* 图标 */
.icon {
  font-size: 50px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(255,140,66,0.4));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分隔线 */
.divider {
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,140,66,0.6), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字样式 */
.name {
  font-size: clamp(26px, 7vw, 42px);
  color: var(--text-warm);
  font-weight: 700;
  text-align: center;
  letter-spacing: 3px;
  text-shadow: 0 2px 8px rgba(90,61,43,0.15);
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(90,61,43,0.6);
  letter-spacing: 4px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(14px, 4vw, 17px);
  color: rgba(90,61,43,0.85);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(12px, 3.5vw, 14px);
  color: rgba(90,61,43,0.55);
  letter-spacing: 3px;
  margin-top: 6px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

/* 底部烛光文字 */
.warm-text {
  position: absolute;
  bottom: 18px;
  font-size: 11px;
  color: rgba(255,140,66,0.5);
  letter-spacing: 2px;
  text-align: center;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .cinder, .flame-inner {
    animation: none;
  }
  .name, .date, .blessing, .from, .divider, .warm-text {
    opacity: 1;
  }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; min-height: 420px; }
  .candle-body { width: 22px; height: 64px; }
  .candle-body::after { top: -20px; width: 14px; height: 18px; }
  .candle-body .flame-inner { top: -17px; width: 6px; height: 11px; }
}
</style>
</head>
<body>

<div class="cinders">
  <div class="cinder"></div>
  <div class="cinder"></div>
  <div class="cinder"></div>
  <div class="cinder"></div>
  <div class="cinder"></div>
  <div class="cinder"></div>
</div>

<div class="candle">
  <div class="candle-body">
    <div class="flame-inner"></div>
  </div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🕯️</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="warm-text">愿烛光温暖你的每一个夜晚</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活像烛光一样温暖美好';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
