<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糖果屋祝福</title>
<meta property="og:title" content="🍬 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-top: #a8e6cf;
  --sky-bottom: #fdffff;
  --candy-pink: #ff6b9d;
  --candy-yellow: #ffd93d;
  --candy-blue: #6bcfff;
  --candy-purple: #c59cff;
  --candy-green: #6dd672;
  --roof-red: #ff8a9b;
  --wall-cream: #fff5f5;
  --text-pink: #d63384;
  --card-bg: rgba(255, 255, 255, 0.88);
  --card-border: rgba(255, 107, 157, 0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #a8e6cf 0%,
    #c8f7dc 30%,
    #d4f1e4 50%,
    #f0fafa 75%,
    #fdffff 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 彩色棉花糖云 */
.clouds {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.cloud {
  position: absolute;
  font-size: 60px;
  opacity: 0.7;
  animation: cloudFloat 8s ease-in-out infinite;
  filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
}

.cloud1 { top: 8%; left: 5%; animation-delay: 0s; }
.cloud2 { top: 12%; right: 8%; animation-delay: 2s; font-size: 50px; }
.cloud3 { top: 5%; left: 40%; animation-delay: 4s; font-size: 45px; }

@keyframes cloudFloat {
  0%, 100% { transform: translateY(0) translateX(0); }
  25% { transform: translateY(-8px) translateX(5px); }
  50% { transform: translateY(-3px) translateX(10px); }
  75% { transform: translateY(-10px) translateX(3px); }
}

/* 糖果飘落 */
.candies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.candy {
  position: absolute;
  animation: candyFall linear infinite;
  opacity: 0;
}

.c1 { left: 8%; animation-duration: 6s; animation-delay: 0s; font-size: 28px; }
.c2 { left: 18%; animation-duration: 7s; animation-delay: 0.5s; font-size: 22px; }
.c3 { left: 30%; animation-duration: 5.5s; animation-delay: 1s; font-size: 30px; }
.c4 { left: 42%; animation-duration: 8s; animation-delay: 1.5s; font-size: 20px; }
.c5 { left: 55%; animation-duration: 6.5s; animation-delay: 0.3s; font-size: 26px; }
.c6 { left: 68%; animation-duration: 7.5s; animation-delay: 0.8s; font-size: 24px; }
.c7 { left: 80%; animation-duration: 5s; animation-delay: 1.2s; font-size: 32px; }
.c8 { left: 92%; animation-duration: 6s; animation-delay: 0.6s; font-size: 22px; }

@keyframes candyFall {
  0% { top: -10%; opacity: 0; transform: rotate(0deg) scale(0.5); }
  10% { opacity: 1; transform: rotate(20deg) scale(1); }
  90% { opacity: 1; transform: rotate(-20deg) scale(1); }
  100% { top: 105%; opacity: 0; transform: rotate(30deg) scale(0.8); }
}

/* 棒棒糖旋转 */
.lollipop {
  position: absolute;
  font-size: 35px;
  animation: lollipopSpin 4s ease-in-out infinite;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.15));
}

.lp1 { bottom: 18%; left: 8%; animation-delay: 0s; }
.lp2 { bottom: 22%; right: 10%; animation-delay: 1.5s; }

@keyframes lollipopSpin {
  0%, 100% { transform: rotate(-8deg) scale(1); }
  50% { transform: rotate(8deg) scale(1.1); }
}

/* 糖果屋 */
.candyhouse {
  position: fixed;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 100px;
  z-index: 2;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
  animation: houseBounce 3s ease-in-out infinite;
}

@keyframes houseBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-8px); }
}

/* 地面草地 */
.ground {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 18%;
  background: linear-gradient(180deg, #90EE90 0%, #7DC87D 50%, #5DB85D 100%);
  z-index: 1;
}

.ground::before {
  content: '🌱🌿🌱🌿🌱🌿🌱🌿🌱';
  position: absolute;
  top: -15px;
  left: 0;
  right: 0;
  font-size: 20px;
  letter-spacing: 30px;
  overflow: hidden;
  animation: grassWave 3s ease-in-out infinite;
}

@keyframes grassWave {
  0%, 100% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
}

/* 卡片包装 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, #ff6b9d, #ffd93d, #6bcfff, #c59cff, #ff6b9d);
  background-size: 300% 300%;
  border-radius: 24px;
  animation: borderFlow 4s ease infinite;
  box-shadow: 0 8px 32px rgba(255, 107, 157, 0.35);
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 8px 32px rgba(255, 107, 157, 0.35); }
  50% { background-position: 100% 50%; box-shadow: 0 12px 48px rgba(255, 107, 157, 0.5); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: 50px 55px;
  text-align: center;
  min-width: 300px;
  max-width: 90vw;
  position: relative;
  overflow: hidden;
}

/* 卡片装饰角 */
.card::before,
.card::after {
  content: '✨';
  position: absolute;
  font-size: 24px;
  opacity: 0.6;
  animation: sparkle 2s ease-in-out infinite;
}

.card::before { top: 15px; left: 20px; }
.card::after { bottom: 15px; right: 20px; animation-delay: 1s; }

@keyframes sparkle {
  0%, 100% { opacity: 0.4; transform: scale(0.9); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 顶部装饰 */
.top-decoration {
  font-size: 50px;
  margin-bottom: 15px;
  animation: iconDrop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-40px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(32px, 8vw, 52px);
  font-weight: bold;
  background: linear-gradient(135deg, #ff6b9d, #c59cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 15px;
  animation: slideUp 1.2s ease-out 0.3s both;
}

.date {
  font-size: clamp(14px, 3vw, 18px);
  color: rgba(200, 100, 130, 0.7);
  margin-bottom: 25px;
  animation: slideUp 1.2s ease-out 0.5s both;
}

.blessing {
  font-size: clamp(18px, 4.5vw, 26px);
  color: #555;
  line-height: 1.8;
  margin-bottom: 25px;
  animation: slideUp 1.2s ease-out 0.7s both;
}

.from {
  font-size: clamp(14px, 3vw, 18px);
  color: rgba(150, 100, 120, 0.7);
  animation: slideUp 1.2s ease-out 0.9s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 底部装饰 */
.bottom-icons {
  margin-top: 20px;
  font-size: 28px;
  opacity: 0.8;
  animation: slideUp 1.2s ease-out 1.1s both;
}

.bottom-icons span {
  margin: 0 6px;
  display: inline-block;
  animation: iconBounce 1s ease-in-out infinite;
}

.bottom-icons span:nth-child(1) { animation-delay: 0s; }
.bottom-icons span:nth-child(2) { animation-delay: 0.2s; }
.bottom-icons span:nth-child(3) { animation-delay: 0.4s; }
.bottom-icons span:nth-child(4) { animation-delay: 0.6s; }
.bottom-icons span:nth-child(5) { animation-delay: 0.8s; }

@keyframes iconBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* 响应式 */
@media (max-width: 480px) {
  .card { padding: 40px 35px; }
  .candyhouse { font-size: 70px; bottom: 20%; }
  .lollipop { font-size: 28px; }
  .cloud { font-size: 40px; }
}
</style>
</head>
<body>

<!-- 棉花糖云 -->
<div class="clouds">
  <div class="cloud cloud1">☁️</div>
  <div class="cloud cloud2">☁️</div>
  <div class="cloud cloud3">☁️</div>
</div>

<!-- 糖果飘落 -->
<div class="candies">
  <div class="candy c1">🍭</div>
  <div class="candy c2">🍬</div>
  <div class="candy c3">🧁</div>
  <div class="candy c4">🍡</div>
  <div class="candy c5">🍩</div>
  <div class="candy c6">🍭</div>
  <div class="candy c7">🍬</div>
  <div class="candy c8">🧁</div>
</div>

<!-- 棒棒糖 -->
<div class="lollipop lp1">🍭</div>
<div class="lollipop lp2">🍡</div>

<!-- 糖果屋 -->
<div class="candyhouse">🏠</div>

<!-- 地面 -->
<div class="ground"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="top-decoration" id="iconEl">🍬</div>
    <div class="name" id="nameEl">亲爱的朋友</div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl">愿你的生活像糖果一样甜蜜<br>每一天都充满小小的惊喜</div>
    <div class="from" id="fromEl"></div>
    <div class="bottom-icons">
      <span>🍭</span><span>🍬</span><span>🧁</span><span>🍡</span><span>🍩</span>
    </div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的朋友';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').innerHTML = (p.get('b') || '愿你的生活像糖果一样甜蜜\n每一天都充满小小的惊喜').replace(/\n/g, '<br>');
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');

// 减少动效
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (reducedMotion) {
  document.querySelectorAll('.candy, .cloud, .lollipop, .candyhouse').forEach(el => {
    el.style.animation = 'none';
  });
}
</script>
</body>
</html>
