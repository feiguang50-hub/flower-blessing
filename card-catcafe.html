<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫咪咖啡馆</title>
<meta property="og:title" content="🐱 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cafe-warm: #f5e6d3;
  --cafe-brown: #8b6f5c;
  --cafe-dark: #5c3d2e;
  --cat-peach: #ffb07c;
  --cat-cream: #ffe4c9;
  --cat-pink: #ff9a9e;
  --card-bg: rgba(255, 250, 245, 0.92);
  --text-coffee: #4a2c17;
  --glow-warm: rgba(255, 180, 120, 0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #fef6f0 0%,
    #fde8d8 20%,
    #f8d5c0 40%,
    #f5c8a8 60%,
    #f0b890 80%,
    #e8a078 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 温暖阳光 */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 60%;
  height: 60%;
  background: radial-gradient(ellipse, rgba(255, 220, 150, 0.4) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* 猫头装饰 */
.cats {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

@keyframes catSleep {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.cat-face {
  position: absolute;
  animation: catSleep var(--dur) ease-in-out var(--delay) infinite;
  font-size: clamp(18px, 4vw, 28px);
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}

/* 漂浮猫粮/爪印 */
@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  80% { opacity: 0.5; }
  100% { transform: translateY(-80vh) rotate(180deg); opacity: 0; }
}

.float-item {
  position: absolute;
  bottom: -30px;
  font-size: clamp(12px, 3vw, 18px);
  animation: floatUp var(--dur) ease-in-out var(--delay) infinite;
  pointer-events: none;
  z-index: 1;
}

/* ===== 卡片 ===== */
.card-wrap {
  position: relative;
  width: clamp(300px, 85vw, 420px);
  z-index: 10;
}

.card {
  background: var(--card-bg);
  border-radius: 24px;
  padding: clamp(28px, 6vw, 40px);
  text-align: center;
  box-shadow:
    0 0 30px var(--glow-warm),
    0 20px 60px rgba(139, 90, 60, 0.25),
    inset 0 0 60px rgba(255, 255, 255, 0.5);
  border: 2px solid rgba(255, 180, 120, 0.5);
  animation: cardFloat 4s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* 咖啡杯 */
.coffee-cup {
  font-size: clamp(40px, 10vw, 60px);
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  filter: drop-shadow(0 4px 12px var(--glow-warm));
}

/* 猫耳朵装饰 */
.cat-ear {
  position: absolute;
  top: -12px;
  font-size: clamp(20px, 5vw, 28px);
  animation: earWiggle 2s ease-in-out infinite;
}

.cat-ear.left { left: 20%; animation-delay: 0s; }
.cat-ear.right { right: 20%; animation-delay: 0.3s; }

@keyframes earWiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-8deg); }
  75% { transform: rotate(8deg); }
}

/* 文字 */
.icon {
  font-size: clamp(32px, 8vw, 48px);
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
}

.name {
  font-size: clamp(28px, 8vw, 46px);
  color: var(--text-coffee);
  font-weight: 700;
  margin: 12px 0;
  animation: fadeInUp 1.2s ease-out 0.3s both;
  text-shadow: 0 2px 10px var(--glow-warm);
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: #a08060;
  margin-bottom: 16px;
  animation: fadeInUp 1s ease-out 0.5s both;
  letter-spacing: 2px;
}

.blessing {
  font-size: clamp(14px, 3.5vw, 18px);
  color: #5a3820;
  line-height: 1.9;
  max-width: 90%;
  margin: 0 auto 20px;
  animation: fadeInUp 1s ease-out 0.7s both;
}

.from {
  font-size: clamp(12px, 2.8vw, 15px);
  color: #a08070;
  animation: fadeInUp 1s ease-out 0.9s both;
  letter-spacing: 1px;
}

.paw-line {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 16px 0;
  animation: fadeInUp 1s ease-out 0.6s both;
}

.paw {
  font-size: clamp(14px, 3vw, 18px);
  animation: pawTap 1.5s ease-in-out infinite;
}

.paw:nth-child(2) { animation-delay: 0.2s; }
.paw:nth-child(3) { animation-delay: 0.4s; }
.paw:nth-child(4) { animation-delay: 0.6s; }
.paw:nth-child(5) { animation-delay: 0.8s; }

@keyframes pawTap {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-5px) scale(1.1); }
}

/* 动画 */
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.6); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 咖啡蒸汽 */
.steam-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 8px;
}

@keyframes steamRise {
  0% { transform: translateY(0) scaleX(1); opacity: 0; }
  20% { opacity: 0.6; }
  80% { opacity: 0.3; }
  100% { transform: translateY(-20px) scaleX(1.5); opacity: 0; }
}

.steam {
  position: absolute;
  font-size: clamp(8px, 2vw, 12px);
  animation: steamRise 2s ease-out infinite;
  pointer-events: none;
  filter: blur(0.5px);
  z-index: 2;
}

.steam:nth-child(1) { left: 30%; animation-delay: 0s; }
.steam:nth-child(2) { left: 50%; animation-delay: 0.5s; }
.steam:nth-child(3) { left: 70%; animation-delay: 1s; }
</style>
</head>
<body>

<!-- 猫咪 -->
<div class="cats" id="cats"></div>

<!-- 漂浮物 -->
<div id="floats"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <!-- 猫耳朵 -->
    <span class="cat-ear left">🐱</span>
    <span class="cat-ear right">🐱</span>

    <!-- 咖啡杯 -->
    <div class="steam-wrap">
      <div class="coffee-cup">☕</div>
      <div class="steam">☁️</div>
      <div class="steam">☁️</div>
      <div class="steam">☁️</div>
    </div>

    <div class="icon" id="iconEl">🐾</div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>

    <div class="paw-line">
      <span class="paw">🐾</span>
      <span class="paw">🐾</span>
      <span class="paw">🐾</span>
      <span class="paw">🐾</span>
      <span class="paw">🐾</span>
    </div>

    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的每一天都像猫咪一样慵懒而幸福';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 猫咪
const catsEl = document.getElementById('cats');
const catFaces = ['😺', '😸', '😻', '😽', '🐱'];
const catPositions = [
  {left: '5%', top: '8%', size: 28},
  {left: '88%', top: '12%', size: 22},
  {left: '3%', top: '60%', size: 20},
  {left: '90%', top: '55%', size: 24},
  {left: '15%', top: '85%', size: 18},
  {left: '80%', top: '80%', size: 20},
];

catPositions.forEach((pos, i) => {
  const cat = document.createElement('div');
  cat.className = 'cat-face';
  cat.textContent = catFaces[i % catFaces.length];
  cat.style.cssText = `
    left: ${pos.left};
    top: ${pos.top};
    font-size: ${pos.size}px;
    --dur: ${2 + Math.random() * 2}s;
    --delay: ${Math.random() * 2}s;
  `;
  catsEl.appendChild(cat);
});

// 漂浮物
const floatsEl = document.getElementById('floats');
const floatItems = ['🐾', '🐟', '☕', '🍪', '🧶', '🐱'];
for (let i = 0; i < 10; i++) {
  const f = document.createElement('div');
  f.className = 'float-item';
  f.textContent = floatItems[Math.floor(Math.random() * floatItems.length)];
  f.style.cssText = `
    left: ${Math.random() * 100}%;
    --dur: ${Math.random() * 8 + 10}s;
    --delay: ${Math.random() * 10}s;
  `;
  floatsEl.appendChild(f);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.cat-face, .float-item, .steam, .paw').forEach(el => el.style.animation = 'none');
}
</script>
</body>
</html>
