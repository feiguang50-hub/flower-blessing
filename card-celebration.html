<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>庆典祝福</title>
<meta property="og:title" content="🎉 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #1a0a2e 0%, #2d1060 30%, #4a1880 60%, #6b2fa0 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 庆典光晕 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,200,50,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 90%, rgba(255,100,100,0.1) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 80%, rgba(100,200,255,0.08) 0%, transparent 40%);
  animation: festGlow 4s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes festGlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* 气球 */
.balloon {
  position: fixed;
  font-size: 28px;
  animation: balloonRise linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes balloonRise {
  0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
  8% { opacity: 0.9; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
}

/* 彩带 */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  animation: confettiFall linear infinite;
  z-index: 2;
  pointer-events: none;
}
@keyframes confettiFall {
  0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 0.9; }
  85% { opacity: 0.5; }
  100% { transform: translateY(105vh) rotate(540deg) translateX(40px); opacity: 0; }
}

/* 金色光点 */
.gold-particle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: #ffd700;
  border-radius: 50%;
  animation: goldRise linear infinite;
  z-index: 2;
  pointer-events: none;
  box-shadow: 0 0 6px rgba(255,215,0,0.6);
}
@keyframes goldRise {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  15% { opacity: 1; transform: scale(1); }
  85% { opacity: 0.5; }
  100% { transform: translateY(-8vh) scale(0.4); opacity: 0; }
}

/* 边框流光 */
.card-wrap {
  position: relative;
  padding: 2px;
  border-radius: 24px;
  background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700, #ffe566, #ffd700);
  background-size: 300% 300%;
  animation: borderFlow 2.5s ease-in-out infinite;
  z-index: 10;
}
@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.card-wrap::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 27px;
  background: inherit;
  filter: blur(14px);
  opacity: 0.45;
  z-index: -1;
  animation: shadowPulse 2.5s ease-in-out infinite;
}
@keyframes shadowPulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.03); }
}

/* 卡片主体 */
.card {
  position: relative;
  background: rgba(30, 10, 60, 0.92);
  border-radius: 22px;
  padding: clamp(36px, 7vw, 56px) clamp(28px, 5vw, 48px);
  max-width: 88vw;
  width: 420px;
  text-align: center;
  border: 1px solid rgba(255,200,50,0.3);
  box-shadow: 0 12px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,200,50,0.15);
}

/* 庆典图标 */
.icon {
  font-size: clamp(40px, 9vw, 64px);
  display: block;
  margin-bottom: 16px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes iconDrop {
  from { transform: translateY(-30px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* 收礼人名 */
.name {
  font-size: clamp(26px, 6.5vw, 44px);
  font-weight: bold;
  background: linear-gradient(135deg, #ffd700, #ff8c00, #ffe566, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 14px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
}

/* 祝福语 */
.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: rgba(255,240,200,0.92);
  line-height: 1.8;
  margin: 12px 0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
}

/* 日期 */
.date {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(255,200,50,0.55);
  letter-spacing: 3px;
  margin-top: 16px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.85s both;
}

/* 署名 */
.from {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(255,220,120,0.75);
  font-style: italic;
  margin-top: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.0s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card-wrap, body::before, .card-wrap::before { animation: none; }
  .balloon, .confetti, .gold-particle { animation: none; }
  .card, .name, .blessing, .date, .from, .icon { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="icon">🎉</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
(function() {
  const p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
  const b = p.get('b') || '恭喜恭喜！\n愿这份喜悦永远伴随着你';
  document.getElementById('blessingEl').innerHTML = b.replace(/\\n/g, '<br>');
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

  const balloonEmojis = ['🎈', '🎉', '🎊', '🎈', '🎁'];
  const confettiColors = ['#ff6b6b','#ffd700','#4ecdc4','#ff8c00','#a855f7','#ff69b4','#00d4ff'];

  // 气球
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div');
    b.className = 'balloon';
    b.textContent = balloonEmojis[Math.floor(Math.random()*balloonEmojis.length)];
    b.style.cssText = `
      left: ${5 + Math.random()*90}%;
      animation-duration: ${8 + Math.random()*6}s;
      animation-delay: ${Math.random()*8}s;
      font-size: ${20 + Math.random()*18}px;
    `;
    document.body.appendChild(b);
  }

  // 彩带
  for (let i = 0; i < 15; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    const color = confettiColors[Math.floor(Math.random()*confettiColors.length)];
    c.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${color};
      animation-duration: ${3 + Math.random()*4}s;
      animation-delay: ${Math.random()*6}s;
      transform: rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(c);
  }

  // 金色光点
  for (let i = 0; i < 12; i++) {
    const g = document.createElement('div');
    g.className = 'gold-particle';
    g.style.cssText = `
      left: ${10 + Math.random()*80}%;
      animation-duration: ${4 + Math.random()*5}s;
      animation-delay: ${Math.random()*6}s;
    `;
    document.body.appendChild(g);
  }
})();
</script>
</body>
</html>
