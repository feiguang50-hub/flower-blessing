<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加油祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #fff8f0 0%, #ffe8cc 50%, #ffd8a8 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 动漫漏光暖色 === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(255,200,100,0.3) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(255,150,50,0.15) 0%, transparent 40%);
  animation: warmFlare 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes warmFlare {
  0%, 100% { transform: translate(0, 0); opacity: 0.7; }
  33% { transform: translate(2%, 1%); opacity: 0.9; }
  66% { transform: translate(-1%, 2%); opacity: 0.5; }
}

/* === 飘浮羽毛 === */
.feather {
  position: fixed;
  width: 10px; height: 18px;
  background: linear-gradient(135deg, #f5c842, #e8a820);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  opacity: 0.7;
  animation: featherFloat linear infinite;
  z-index: 1;
  filter: blur(0.3px);
}
@keyframes featherFloat {
  0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
  8% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(100vh) rotate(360deg) translateX(60px); opacity: 0; }
}

/* === 金色光点 === */
.golden-dot {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,230,120,0.9), rgba(245,180,50,0.6));
  animation: goldenRise linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes goldenRise {
  0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
  10% { opacity: 0.8; }
  85% { opacity: 0.8; }
  100% { transform: translateY(-5vh) scale(1); opacity: 0; }
}

/* === 速度线（暖色） === */
.speed-line {
  position: fixed; width: 90px; height: 2px;
  background: linear-gradient(to right, transparent, rgba(255,220,120,0.7), transparent);
  border-radius: 2px; animation: speedLineWarm linear infinite;
  z-index: 2; pointer-events: none;
}
@keyframes speedLineWarm {
  0% { transform: translateX(-100px); opacity: 0; }
  20% { opacity: 0.7; }
  80% { opacity: 0.7; }
  100% { transform: translateX(100vw); opacity: 0; }
}

/* === 卡片主体 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 34px;
  background: linear-gradient(135deg, #f5c842, #e8a820, #f5c842, #f0a830, #f5c842);
  background-size: 300% 300%;
  animation: borderGold 4s ease infinite;
  z-index: 10;
}
@keyframes borderGold {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: rgba(255,252,240,0.78);
  border-radius: 31px;
  padding: 48px 56px;
  text-align: center;
  max-width: 520px;
  width: 90vw;
  box-shadow: 0 16px 48px rgba(200,140,30,0.2), inset 0 0 30px rgba(255,230,150,0.15);
  animation: cardFloat 4s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-10px) rotate(0.5deg); }
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,255,220,0.2) 0%, transparent 60%);
  animation: shimmer 4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(10%, 10%); }
}

/* 图标 */
.card-icon {
  font-size: 40px; display: block; margin-bottom: 16px;
  animation: iconBounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 10px rgba(200,140,30,0.35));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  25% { transform: scale(1.15) translateY(-5px); }
  50% { transform: scale(0.95) translateY(0); }
  75% { transform: scale(1.08) translateY(-3px); }
}

/* === 文字动画 === */
.name {
  font-size: clamp(28px, 7vw, 52px);
  color: #8b5e00; letter-spacing: 8px; margin-bottom: 16px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) both, nameGlow 3s ease-in-out infinite 1.2s;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(24px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes nameGlow {
  0%, 100% { text-shadow: 0 2px 8px rgba(200,140,30,0.2); }
  50% { text-shadow: 0 2px 16px rgba(200,140,30,0.4), 0 0 30px rgba(255,200,80,0.3); }
}
.date {
  font-size: clamp(12px, 2.5vw, 16px);
  color: #b07830; letter-spacing: 4px; margin-bottom: 32px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
.blessing {
  font-size: clamp(16px, 3.5vw, 22px);
  color: #c07010; line-height: 1.9; letter-spacing: 2px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.6s both;
}
.from {
  font-size: clamp(12px, 2vw, 15px);
  color: #d4a060; margin-top: 24px; letter-spacing: 3px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.9s both;
}

/* === 背景气泡（暖色） === */
.bubble {
  position: fixed; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,240,180,0.8), rgba(255,220,100,0.2));
  animation: bubbleRise linear infinite;
  z-index: 1; pointer-events: none;
}
@keyframes bubbleRise {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">🌟</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 羽毛
for (let i = 0; i < 18; i++) {
  const f = document.createElement('div');
  f.className = 'feather';
  f.style.left = Math.random() * 100 + 'vw';
  f.style.animationDuration = (5 + Math.random() * 5) + 's';
  f.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(f);
}
// 金色光点
for (let i = 0; i < 20; i++) {
  const d = document.createElement('div');
  d.className = 'golden-dot';
  d.style.left = Math.random() * 100 + 'vw';
  d.style.width = d.style.height = (5 + Math.random() * 10) + 'px';
  d.style.animationDuration = (6 + Math.random() * 6) + 's';
  d.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(d);
}
// 速度线
for (let i = 0; i < 5; i++) {
  const l = document.createElement('div');
  l.className = 'speed-line';
  l.style.top = (8 + Math.random() * 84) + 'vh';
  l.style.animationDuration = (2.5 + Math.random() * 2) + 's';
  l.style.animationDelay = Math.random() * 5 + 's';
  document.body.appendChild(l);
}
// 气泡
for (let i = 0; i < 8; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  b.style.left = Math.random() * 100 + 'vw';
  b.style.width = b.style.height = (5 + Math.random() * 10) + 'px';
  b.style.animationDuration = (7 + Math.random() * 5) + 's';
  b.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(b);
}
</script>
</body>
</html>
