<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱桃甜蜜</title>
<meta property="og:title" content="🍒 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cherry-red: #e8354a;
  --cherry-dark: #c41e3a;
  --cherry-pink: #ff8fa3;
  --cream-white: #fff8f9;
  --cream-pink: #ffe4ea;
  --leaf-green: #3d8c40;
  --leaf-dark: #2a6128;
  --text-dark: #6b1a28;
  --text-light: #fff0f3;
  --card-bg: rgba(255, 248, 250, 0.9);
  --card-border: rgba(232, 53, 74, 0.35);
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #fff0f3 0%, #ffe4ea 30%, #ffd6de 60%, #ffc8d0 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 背景光斑 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 10% 15%, rgba(255,150,170,0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 80%, rgba(255,180,200,0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* 漂浮樱桃 */
.cherry {
  position: fixed;
  font-size: 18px;
  z-index: 2;
  pointer-events: none;
  animation: cherryFloat ease-in-out infinite;
}

@keyframes cherryFloat {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-18px) rotate(5deg); }
}

/* 漂浮草莓 */
.strawberry {
  position: fixed;
  font-size: 16px;
  z-index: 2;
  pointer-events: none;
  animation: berryFloat ease-in-out infinite;
}

@keyframes berryFloat {
  0%, 100% { transform: translateY(0) rotate(3deg); }
  50% { transform: translateY(-14px) rotate(-3deg); }
}

/* 爱心 */
.heart {
  position: fixed;
  font-size: 14px;
  z-index: 1;
  pointer-events: none;
  animation: heartRise linear infinite;
  opacity: 0;
}

@keyframes heartRise {
  0% { transform: translateY(0) scale(0.8); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.5; }
  100% { transform: translateY(-100vh) scale(1); opacity: 0; }
}

/* 气泡 */
.bubble {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,220,230,0.4));
  z-index: 1;
  pointer-events: none;
  animation: bubbleRise linear infinite;
}

@keyframes bubbleRise {
  0% { transform: translateY(0) scale(0.5); opacity: 0; }
  20% { opacity: 0.7; }
  100% { transform: translateY(-100vh) scale(1); opacity: 0; }
}

/* 星星闪烁 */
.sparkle {
  position: fixed;
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
  animation: sparkleAnim ease-in-out infinite;
}

@keyframes sparkleAnim {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(420px, 90vw);
  min-height: 480px;
  background: var(--card-bg);
  border-radius: 24px;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  box-shadow:
    0 16px 50px rgba(200,30,60,0.15),
    0 4px 16px rgba(220,60,90,0.1),
    inset 0 1px 0 rgba(255,255,255,0.8);
  border: 1px solid var(--card-border);
  animation: cardFloat 6s ease-in-out infinite;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-8px) rotate(0.5deg); }
}

/* 边框流光 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, rgba(232,53,74,0.45), rgba(255,150,170,0.2), rgba(232,53,74,0.45));
  background-size: 200% 200%;
  animation: borderFlow 5s ease-in-out infinite;
  z-index: -1;
  opacity: 0.5;
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; opacity: 0.3; }
  50% { background-position: 100% 50%; opacity: 0.6; }
}

/* 角花装饰 */
.corner {
  position: absolute;
  font-size: 20px;
  opacity: 0.5;
}
.corner-tl { top: 12px; left: 12px; }
.corner-tr { top: 12px; right: 12px; transform: scaleX(-1); }
.corner-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
.corner-br { bottom: 12px; right: 12px; transform: scale(-1); }

/* 图标 */
.icon {
  font-size: 48px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(232,53,74,0.3));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分割线 */
.divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(220,60,90,0.45), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字 */
.name {
  font-size: clamp(26px, 7vw, 44px);
  color: var(--text-dark);
  font-weight: 600;
  text-align: center;
  letter-spacing: 4px;
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(11px, 3.5vw, 14px);
  color: rgba(160,40,70,0.6);
  letter-spacing: 5px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(13px, 4vw, 16px);
  color: rgba(100,30,60,0.82);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(11px, 3.5vw, 13px);
  color: rgba(160,40,70,0.55);
  letter-spacing: 3px;
  margin-top: 4px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

.bottom-text {
  position: absolute;
  bottom: 18px;
  font-size: 10px;
  color: rgba(200,60,90,0.4);
  letter-spacing: 3px;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .cherry, .strawberry { animation: none; }
  .name, .date, .blessing, .from, .divider, .bottom-text, .icon { opacity: 1; }
}

@media (max-width: 480px) {
  .card { padding: 36px 24px; min-height: 420px; }
}
</style>
</head>
<body>

<!-- 漂浮樱桃 -->
<div class="cherry" style="top:8%;left:12%;animation-duration:4s;animation-delay:0s;">🍒</div>
<div class="cherry" style="top:15%;right:15%;animation-duration:5s;animation-delay:1s;font-size:14px;">🍒</div>
<div class="cherry" style="top:35%;left:6%;animation-duration:4.5s;animation-delay:2s;font-size:16px;">🍒</div>
<div class="cherry" style="top:50%;right:8%;animation-duration:5.5s;animation-delay:0.5s;font-size:20px;">🍒</div>
<div class="cherry" style="top:65%;left:10%;animation-duration:4s;animation-delay:3s;">🍒</div>

<!-- 漂浮草莓 -->
<div class="strawberry" style="top:12%;left:55%;animation-duration:5s;animation-delay:1.5s;font-size:14px;">🍓</div>
<div class="strawberry" style="top:40%;right:12%;animation-duration:4.5s;animation-delay:2.5s;font-size:16px;">🍓</div>
<div class="strawberry" style="top:70%;right:18%;animation-duration:5s;animation-delay:0.8s;">🍓</div>
<div class="strawberry" style="top:25%;left:3%;animation-duration:4s;animation-delay:3.5s;font-size:12px;">🍓</div>

<!-- 爱心上浮 -->
<div class="heart" style="left:20%;animation-duration:8s;animation-delay:0s;font-size:12px;">💗</div>
<div class="heart" style="left:45%;animation-duration:9s;animation-delay:2s;font-size:10px;">💕</div>
<div class="heart" style="left:70%;animation-duration:7s;animation-delay:4s;font-size:12px;">💗</div>
<div class="heart" style="left:30%;animation-duration:10s;animation-delay:1s;font-size:11px;">💖</div>
<div class="heart" style="left:82%;animation-duration:8s;animation-delay:3s;font-size:10px;">💕</div>

<!-- 气泡 -->
<div class="bubble" style="left:15%;bottom:-20px;width:12px;height:12px;animation-duration:7s;animation-delay:0s;"></div>
<div class="bubble" style="left:35%;bottom:-20px;width:8px;height:8px;animation-duration:8s;animation-delay:2s;"></div>
<div class="bubble" style="left:55%;bottom:-20px;width:10px;height:10px;animation-duration:6s;animation-delay:1s;"></div>
<div class="bubble" style="left:75%;bottom:-20px;width:14px;height:14px;animation-duration:9s;animation-delay:3s;"></div>
<div class="bubble" style="left:88%;bottom:-20px;width:9px;height:9px;animation-duration:7s;animation-delay:4.5s;"></div>
<div class="bubble" style="left:5%;bottom:-20px;width:11px;height:11px;animation-duration:8s;animation-delay:5.5s;"></div>

<!-- 闪烁星星 -->
<div class="sparkle" style="top:20%;left:30%;animation-duration:2.5s;animation-delay:0s;"></div>
<div class="sparkle" style="top:30%;right:25%;animation-duration:3s;animation-delay:1s;width:5px;height:5px;"></div>
<div class="sparkle" style="top:55%;left:20%;animation-duration:2s;animation-delay:0.5s;width:4px;height:4px;"></div>
<div class="sparkle" style="top:45%;right:15%;animation-duration:2.8s;animation-delay:1.5s;"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="corner corner-tl">✿</div>
    <div class="corner corner-tr">✿</div>
    <div class="corner corner-bl">✿</div>
    <div class="corner corner-br">✿</div>

    <div class="icon" id="iconEl">🍒</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="bottom-text">樱桃甜蜜 · 满满心意</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活像樱桃一样甜美，每一天都充满小小的幸福';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
