<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #fff5f8 0%, #ffe4f0 40%, #ffd6ec 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 彩虹极光背景 === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255,180,200,0.35) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 80%, rgba(200,160,255,0.25) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 10%, rgba(255,220,100,0.2) 0%, transparent 40%);
  animation: auroraShift 7s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes auroraShift {
  0%, 100% { transform: translate(0,0) rotate(0deg); opacity: 0.8; }
  33% { transform: translate(1.5%, 1%) rotate(1deg); opacity: 1; }
  66% { transform: translate(-1%, 1.5%) rotate(-0.5deg); opacity: 0.9; }
}

/* === 彩虹气球 === */
.balloon {
  position: fixed;
  border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
  animation: balloonBounce linear infinite;
  z-index: 2;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.15));
}
@keyframes balloonBounce {
  0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { transform: translateY(-15vh) rotate(20deg); opacity: 0; }
}
.balloon::before {
  content: '';
  position: absolute;
  bottom: -10px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 10px solid currentColor;
}
.balloon::after {
  content: '';
  position: absolute;
  bottom: -60px; left: 50%;
  width: 1.5px;
  height: 50px;
  background: linear-gradient(to bottom, rgba(150,150,150,0.6), transparent);
}

/* === 星星闪烁 === */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: starPop ease-in-out infinite;
  z-index: 1;
}
@keyframes starPop {
  0%, 100% { opacity: 0.2; transform: scale(1) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.6) rotate(180deg); }
}

/* === 糖果粒子 === */
.candy {
  position: fixed;
  border-radius: 4px;
  animation: candyFloat linear infinite;
  z-index: 2;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.12));
}
@keyframes candyFloat {
  0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
  8% { opacity: 1; }
  92% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* === 卡片外框（彩虹脉冲） === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 28px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffd1ff, #a18cd1, #9af0ff, #ff9a9e);
  background-size: 300% 300%;
  animation: rainbowBorder 4s ease infinite;
  z-index: 10;
  box-shadow: 0 0 30px rgba(255,150,200,0.35), 0 12px 40px rgba(0,0,0,0.12);
}
@keyframes rainbowBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(255,154,158,0.4), 0 12px 40px rgba(0,0,0,0.12); }
  50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(161,140,209,0.5), 0 12px 40px rgba(0,0,0,0.12); }
  100% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(255,154,158,0.4), 0 12px 40px rgba(0,0,0,0.12); }
}

.card {
  background: linear-gradient(145deg, #fffbfd, #fff0f7);
  border-radius: 26px;
  padding: clamp(32px, 7vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  position: relative;
  overflow: hidden;
  max-width: min(520px, 92vw);
  width: 100%;
}

/* 蛋糕图标 */
.cake-icon {
  font-size: clamp(48px, 10vw, 72px);
  display: block;
  margin: 0 auto 12px;
  animation: cakeBounce 2.5s cubic-bezier(0.34,1.56,0.64,1) infinite;
  filter: drop-shadow(0 4px 12px rgba(255,150,180,0.4));
}
@keyframes cakeBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  30% { transform: translateY(-10px) scale(1.05); }
  60% { transform: translateY(-4px) scale(1.02); }
}

/* 蜡烛火焰 */
.flame {
  position: absolute;
  top: -14px; left: 50%;
  transform: translateX(-50%);
  width: 10px; height: 16px;
  background: radial-gradient(ellipse at 50% 80%, #fff9c4, #ffeb3b, #ff9800, #f44336);
  border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
  animation: flameFlicker 0.4s ease-in-out infinite alternate;
  filter: blur(0.5px);
  box-shadow: 0 0 8px rgba(255,180,0,0.7), 0 0 20px rgba(255,100,0,0.3);
}
@keyframes flameFlicker {
  0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
  100% { transform: translateX(-50%) scaleY(1.2) scaleX(0.85); }
}

/* 名字 */
.name {
  font-size: clamp(32px, 8vw, 58px);
  font-weight: bold;
  background: linear-gradient(135deg, #ff6b9d, #c94bff, #9b59ff, #ff6b9d);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: nameShimmer 3s ease infinite;
  margin-bottom: 14px;
  line-height: 1.2;
}
@keyframes nameShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 日期 */
.date {
  font-size: clamp(13px, 3vw, 17px);
  color: #d470a5;
  letter-spacing: 3px;
  margin-bottom: 18px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.3s both;
}

/* 祝福语 */
.blessing {
  font-size: clamp(17px, 4.5vw, 24px);
  color: #7a3a6a;
  line-height: 1.8;
  margin-bottom: 22px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.6s both;
}

/* 署名 */
.from {
  font-size: clamp(14px, 3.5vw, 18px);
  color: #c0709a;
  font-style: italic;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.9s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 纸屑 === */
.confetti {
  position: fixed;
  width: 8px; height: 8px;
  animation: confettiFall linear infinite;
  z-index: 3;
}
@keyframes confettiFall {
  0% { transform: translateY(-5vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0.5; }
}

/* === 减少动画 === */
@media (prefers-reduced-motion: reduce) {
  .balloon, .candy, .confetti, .star, body::before { animation: none !important; }
  .name, .date, .blessing, .from { animation: none !important; opacity: 1 !important; }
}
</style>
</head>
<body>

<script>
const p = new URLSearchParams(location.search);
const nameEl = document.getElementById('nameEl');
const dateEl = document.getElementById('dateEl');
const blessingEl = document.getElementById('blessingEl');
const fromEl = document.getElementById('fromEl');
if (nameEl) nameEl.textContent = p.get('n') || '亲爱的宝贝';
if (dateEl) dateEl.textContent = p.get('d') || '';
if (blessingEl) blessingEl.textContent = p.get('b') || '生日快乐！愿你天天开心，健康成长！';
if (fromEl) fromEl.textContent = p.get('f') ? '— ' + p.get('f') : '';

// 彩虹气球
const colors = ['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#c94bff','#ff9a9e','#a8e6cf','#fdcb6e'];
function createBalloon() {
  const b = document.createElement('div');
  b.className = 'balloon';
  const c = colors[Math.floor(Math.random() * colors.length)];
  b.style.cssText = `
    left: ${Math.random() * 90 + 5}%;
    width: ${Math.random() * 20 + 30}px;
    height: ${Math.random() * 18 + 42}px;
    background: linear-gradient(160deg, ${c}dd, ${c});
    color: c;
    animation-duration: ${Math.random() * 6 + 8}s;
    animation-delay: ${Math.random() * 5}s;
  `;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 14000);
}
for (let i = 0; i < 10; i++) setTimeout(createBalloon, i * 800);

// 星星
function createStar() {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `
    left: ${Math.random() * 95}%;
    top: ${Math.random() * 85}%;
    width: ${Math.random() * 5 + 2}px;
    height: ${Math.random() * 5 + 2}px;
    animation-duration: ${Math.random() * 2 + 1.5}s;
    animation-delay: ${Math.random() * 3}s;
    background: hsl(${Math.random() * 360}, 80%, 80%);
  `;
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 5000);
}
for (let i = 0; i < 18; i++) createStar();

// 糖果
function createCandy() {
  const c = document.createElement('div');
  c.className = 'candy';
  const candyColors = ['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#c94bff'];
  const color = candyColors[Math.floor(Math.random() * candyColors.length)];
  c.style.cssText = `
    left: ${Math.random() * 92 + 4}%;
    width: ${Math.random() * 10 + 6}px;
    height: ${Math.random() * 10 + 6}px;
    background: ${color};
    border-radius: ${Math.random() > 0.5 ? '50%' : '3px'};
    animation-duration: ${Math.random() * 5 + 7}s;
    animation-delay: ${Math.random() * 4}s;
  `;
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 12000);
}
for (let i = 0; i < 14; i++) setTimeout(createCandy, i * 600);

// 纸屑
function createConfetti() {
  const c = document.createElement('div');
  c.className = 'confetti';
  const cc = ['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#c94bff','#ff9a9e','#fff'];
  const color = cc[Math.floor(Math.random() * cc.length)];
  c.style.cssText = `
    left: ${Math.random() * 95}%;
    width: ${Math.random() * 7 + 4}px;
    height: ${Math.random() * 7 + 4}px;
    background: ${color};
    border-radius: ${Math.random() > 0.5 ? '50%' : '1px'};
    animation-duration: ${Math.random() * 3 + 3}s;
    animation-delay: ${Math.random() * 2}s;
  `;
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 6000);
}
for (let i = 0; i < 20; i++) setTimeout(createConfetti, i * 200);

// 减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.balloon,.candy,.confetti,.star').forEach(el => el.remove());
}
</script>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="cake-icon">
      🎂
      <div class="flame" style="left: calc(50% - 12px);"></div>
      <div class="flame" style="left: calc(50%);"></div>
      <div class="flame" style="left: calc(50% + 12px);"></div>
    </div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
