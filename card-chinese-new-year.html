<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新春祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(165deg, #1a0808 0%, #8b0000 40%, #cc1a1a 70%, #ff6600 100%);
  font-family: 'Georgia', 'Songti SC', 'SimSun', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 背景光晕 === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(255,100,0,0.25) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 85%, rgba(255,200,0,0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(255,50,0,0.1) 0%, transparent 60%);
  animation: bgBreath 5s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes bgBreath {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

/* === 掉落的金币 === */
.gold-coin {
  position: fixed;
  width: 10px; height: 10px;
  background: radial-gradient(circle at 35% 35%, #ffe066, #ffcc00, #e6a800);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(255,200,0,0.6);
  animation: coinDrop linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes coinDrop {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 0.9; }
  90% { opacity: 0.9; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* === 烟花粒子 === */
.spark {
  position: fixed;
  width: 4px; height: 4px;
  border-radius: 50%;
  animation: sparkFly linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes sparkFly {
  0% { transform: translate(0, 0) scale(1); opacity: 0; }
  15% { opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
}

/* === 灯笼（CSS绘制） === */
.lantern {
  position: fixed;
  width: 28px;
  z-index: 2;
  pointer-events: none;
  animation: lanternSwing ease-in-out infinite;
  transform-origin: top center;
}
.lantern-body {
  width: 28px; height: 36px;
  background: radial-gradient(ellipse at 50% 40%, #ff3333, #cc0000, #880000);
  border-radius: 50% 50% 45% 45%;
  box-shadow: 0 0 12px rgba(255,80,0,0.5), inset 0 0 8px rgba(255,150,0,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: rgba(255,220,0,0.9);
  font-weight: bold;
  font-family: 'SimSun','Songti SC',serif;
}
.lantern-top {
  width: 14px; height: 6px;
  background: linear-gradient(to bottom, #ffd700, #e6a800);
  border-radius: 3px 3px 0 0;
  margin: 0 auto;
}
.lantern-bottom {
  width: 14px; height: 6px;
  background: linear-gradient(to top, #ffd700, #e6a800);
  border-radius: 0 0 3px 3px;
  margin: 0 auto;
}
.lantern-tassel {
  width: 4px; height: 20px;
  background: linear-gradient(to bottom, #ffd700, #cc9900, #ffd700);
  margin: 0 auto;
  border-radius: 0 0 2px 2px;
}
@keyframes lanternSwing {
  0%, 100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

/* === 卡片外框 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 28px;
  background: linear-gradient(135deg, #ffd700, #ff6600, #ffd700, #ff4400, #ffd700);
  background-size: 300% 300%;
  animation: borderCNY 4s ease infinite;
  z-index: 10;
}
@keyframes borderCNY {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: rgba(20, 5, 5, 0.88);
  border-radius: 25px;
  padding: 48px 52px;
  text-align: center;
  max-width: 520px;
  width: 88vw;
  box-shadow: 0 16px 48px rgba(200,80,0,0.35), inset 0 0 40px rgba(255,150,0,0.1);
  animation: cardPulse 4s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
@keyframes cardPulse {
  0%, 100% { box-shadow: 0 16px 48px rgba(200,80,0,0.35), inset 0 0 40px rgba(255,150,0,0.1); }
  50% { box-shadow: 0 16px 60px rgba(255,120,0,0.5), inset 0 0 60px rgba(255,180,0,0.18); }
}

/* 卡片内流光 */
.card::before {
  content: '';
  position: absolute;
  top: -60%; left: -60%;
  width: 220%; height: 220%;
  background: conic-gradient(from 0deg, transparent, rgba(255,180,0,0.08), transparent, rgba(255,100,0,0.06), transparent);
  animation: innerGlow 6s linear infinite;
  pointer-events: none;
}
@keyframes innerGlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 春联装饰 */
.couplet-left, .couplet-right {
  position: absolute;
  top: 18px;
  width: 30px;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-size: 13px;
  color: rgba(255,200,0,0.7);
  letter-spacing: 4px;
  line-height: 1.8;
  font-family: 'SimSun', 'Songti SC', serif;
}
.couplet-left { left: 14px; }
.couplet-right { right: 14px; }

/* 图标 */
.card-icon {
  font-size: 42px;
  display: block;
  margin-bottom: 14px;
  animation: iconBounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(255,120,0,0.5));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  25% { transform: scale(1.15) translateY(-6px); }
  50% { transform: scale(0.95) translateY(0); }
  75% { transform: scale(1.1) translateY(-3px); }
}

/* 文字 */
.name {
  font-size: clamp(28px, 7vw, 52px);
  color: #ffd700;
  letter-spacing: 10px;
  margin-bottom: 12px;
  opacity: 1;
  animation: textIn 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
  text-shadow: 0 0 20px rgba(255,180,0,0.6), 0 2px 8px rgba(0,0,0,0.5);
}
@keyframes textIn {
  from { opacity: 0; transform: translateY(24px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: rgba(255,200,100,0.7);
  letter-spacing: 4px;
  margin-bottom: 30px;
  opacity: 1;
  animation: textIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}

.blessing {
  font-size: clamp(15px, 3.5vw, 21px);
  color: #ffe0a0;
  line-height: 1.9;
  letter-spacing: 2px;
  opacity: 1;
  animation: textIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.6s both;
  text-shadow: 0 1px 6px rgba(255,150,0,0.3);
}

.blessing-title {
  font-size: clamp(20px, 4vw, 30px);
  color: #ff6600;
  letter-spacing: 6px;
  margin-bottom: 18px;
  opacity: 1;
  animation: textIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
  text-shadow: 0 0 16px rgba(255,120,0,0.5);
}

.from {
  font-size: clamp(11px, 2vw, 14px);
  color: rgba(255,200,120,0.6);
  margin-top: 24px;
  letter-spacing: 3px;
  opacity: 1;
  animation: textIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.9s both;
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <div class="couplet-left" id="coupletLeft">新春吉祥</div>
    <div class="couplet-right" id="coupletRight">万事如意</div>
    <span class="card-icon" id="iconEl">🎊</span>
    <div class="blessing-title" id="titleEl">新春快乐</div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '蛇年大吉，万事如意！';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
if (p.get('tt')) document.getElementById('titleEl').textContent = p.get('tt');
if (p.get('cl')) document.getElementById('coupletLeft').textContent = p.get('cl');
if (p.get('cr')) document.getElementById('coupletRight').textContent = p.get('cr');

// 金币掉落
for (let i = 0; i < 18; i++) {
  const c = document.createElement('div');
  c.className = 'gold-coin';
  c.style.left = Math.random() * 100 + 'vw';
  c.style.animationDuration = (3 + Math.random() * 4) + 's';
  c.style.animationDelay = Math.random() * 8 + 's';
  c.style.width = c.style.height = (6 + Math.random() * 8) + 'px';
  document.body.appendChild(c);
}

// 烟花火花
const sparkColors = ['#ffd700','#ff6600','#ff3333','#ffe066','#ffaa00'];
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'spark';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = (Math.random() * 70) + 'vh';
  s.style.background = sparkColors[Math.floor(Math.random() * sparkColors.length)];
  s.style.boxShadow = '0 0 4px ' + s.style.background;
  var angle = Math.random() * Math.PI * 2;
  var dist = 40 + Math.random() * 80;
  s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
  s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
  s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
  s.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(s);
}

// 灯笼
const lanternCount = 5;
const lanternChars = ['福','喜','春','乐','缘'];
for (let i = 0; i < lanternCount; i++) {
  const ln = document.createElement('div');
  ln.className = 'lantern';
  ln.style.left = (8 + i * 22) + '%';
  ln.style.top = (Math.random() * 20) + 'vh';
  ln.style.animationDuration = (3 + Math.random() * 2) + 's';
  ln.style.animationDelay = Math.random() * 3 + 's';
  const char = lanternChars[i % lanternChars.length];
  ln.innerHTML = `
    <div class="lantern-top"></div>
    <div class="lantern-body">${char}</div>
    <div class="lantern-bottom"></div>
    <div class="lantern-tassel"></div>`;
  document.body.appendChild(ln);
}
</script>
</body>
</html>
