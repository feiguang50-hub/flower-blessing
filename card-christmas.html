<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圣诞祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #0a1628 0%, #0d2840 40%, #1a3a5c 70%, #0d2840 100%);
  font-family: 'Georgia', 'Songti SC', 'SimSun', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 圣诞背景光效 === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(200,20,20,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 20%, rgba(20,120,20,0.1) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(180,80,20,0.08) 0%, transparent 50%);
  animation: bgBreath 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes bgBreath {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* === 雪花 === */
.snowflake {
  position: fixed;
  color: #fff;
  text-shadow: 0 0 4px rgba(200,220,255,0.8);
  animation: snowFall linear infinite;
  z-index: 1;
  pointer-events: none;
  opacity: 0.85;
}
@keyframes snowFall {
  0% { transform: translateY(-30px) rotate(0deg) translateX(0); opacity: 0; }
  8% { opacity: 0.85; }
  90% { opacity: 0.85; }
  100% { transform: translateY(100vh) rotate(360deg) translateX(40px); opacity: 0; }
}

/* === 星星闪烁 === */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

/* === 铃铛/礼物光点 === */
.gift-spark {
  position: fixed;
  width: 5px; height: 5px;
  background: radial-gradient(circle at 35% 35%, #ffe066, #e6a800);
  border-radius: 50%;
  animation: sparkRise linear infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 6px rgba(255,200,0,0.7);
}
@keyframes sparkRise {
  0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
  10% { opacity: 0.9; }
  85% { opacity: 0.9; }
  100% { transform: translateY(-5vh) scale(1); opacity: 0; }
}

/* === 边框脉冲（圣诞红绿） === */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg, #c41e3a, #228b22, #c41e3a, #228b22);
  background-size: 300% 300%;
  animation: borderPulse 4s ease-in-out infinite;
  box-shadow: 0 0 24px rgba(196,30,58,0.4), 0 0 48px rgba(34,139,34,0.2);
}
@keyframes borderPulse {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 24px rgba(196,30,58,0.4), 0 0 48px rgba(34,139,34,0.2); }
  50% { background-position: 100% 50%; box-shadow: 0 0 36px rgba(196,30,58,0.6), 0 0 72px rgba(34,139,34,0.3); }
}

/* === 卡片主体 === */
.card {
  position: relative;
  background: linear-gradient(165deg, rgba(240,248,255,0.97), rgba(220,235,250,0.94));
  border-radius: 22px;
  padding: clamp(28px, 7vw, 56px) clamp(24px, 6vw, 48px);
  max-width: 520px;
  width: 90vw;
  text-align: center;
  box-shadow: inset 0 2px 12px rgba(255,255,255,0.5), 0 8px 32px rgba(0,0,0,0.2);
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%, rgba(196,30,58,0.03) 100%);
  border-radius: 22px;
  pointer-events: none;
}

/* === 顶部圣诞树图标 === */
.card-icon {
  font-size: clamp(42px, 10vw, 68px);
  margin-bottom: 12px;
  display: block;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-40px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* === 名字 === */
.name {
  font-size: clamp(22px, 6vw, 38px);
  font-weight: bold;
  color: #1a3a5c;
  margin-bottom: 8px;
  letter-spacing: 0.08em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
  text-shadow: 0 1px 4px rgba(196,30,58,0.15);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === 祝福语 === */
.blessing {
  font-size: clamp(16px, 4.5vw, 24px);
  color: #2a4a6c;
  line-height: 1.7;
  margin: 16px 0;
  padding: 0 8px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.7s both;
}

/* === 日期 === */
.date {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #4a6a8c;
  letter-spacing: 0.12em;
  margin-bottom: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
}

/* === 署名 === */
.from {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #3a5a7c;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}

/* === 底部装饰 === */
.card-footer {
  margin-top: 18px;
  font-size: clamp(11px, 2.8vw, 14px);
  color: #7a9abc;
  letter-spacing: 0.2em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.3s both;
}

/* === 角落装饰 === */
.deco-corner {
  position: absolute;
  font-size: 20px;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
.deco-corner:nth-child(1) { top: 10%; left: 8%; transform: rotate(-10deg); }
.deco-corner:nth-child(2) { top: 15%; right: 10%; transform: rotate(15deg); }
.deco-corner:nth-child(3) { bottom: 15%; left: 6%; transform: rotate(8deg); }
.deco-corner:nth-child(4) { bottom: 10%; right: 8%; transform: rotate(-12deg); }

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .snowflake, .star, .gift-spark { animation: none; opacity: 0.5; }
  .card-icon, .name, .blessing, .date, .from, .card-footer { animation: none; }
  .card-wrap { animation: none; }
}
</style>
</head>
<body>

<script>
(function(){
  // 雪花
  const snowCount = 18;
  const snowChars = ['\u2744','\u2745','\u2746','\u2744'];
  for(let i=0; i<snowCount; i++){
    const sf = document.createElement('div');
    sf.className = 'snowflake';
    sf.textContent = snowChars[i % snowChars.length];
    sf.style.left = Math.random() * 100 + 'vw';
    sf.style.fontSize = (10 + Math.random() * 16) + 'px';
    sf.style.animationDuration = (5 + Math.random() * 5) + 's';
    sf.style.animationDelay = Math.random() * 8 + 's';
    document.body.appendChild(sf);
  }

  // 星星背景
  const starCount = 30;
  for(let i=0; i<starCount; i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.width = s.style.height = (1 + Math.random() * 3) + 'px';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    s.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(s);
  }

  // 金色光点
  const dotCount = 10;
  for(let i=0; i<dotCount; i++){
    const dot = document.createElement('div');
    dot.className = 'gift-spark';
    dot.style.left = Math.random() * 100 + 'vw';
    dot.style.animationDuration = (4 + Math.random() * 4) + 's';
    dot.style.animationDelay = Math.random() * 6 + 's';
    document.body.appendChild(dot);
  }

  // URL参数
  const p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '圣诞快乐';
  document.getElementById('blessingEl').textContent = p.get('b') || '圣诞钟声响起，愿你被温暖包围，幸福如约而至';
  const d = p.get('d');
  document.getElementById('dateEl').textContent = d ? '\u738b\u51e4\u5fc3\u613f \u00b7 ' + d : '\u738b\u51e4\u5fc3\u613f';
  document.getElementById('fromEl').textContent = p.get('f') ? '\u2014 ' + p.get('f') : '';
})();
</script>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="deco-corner">\u{1F381}</span>
    <span class="deco-corner">\u{1F381}</span>
    <span class="deco-corner">\u{1F381}</span>
    <span class="deco-corner">\u{1F381}</span>

    <span class="card-icon">\u{1F384}</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="card-footer">\u2606 \u2606 \u2606 \u2606 \u2606</div>
  </div>
</div>

</body>
</html>
