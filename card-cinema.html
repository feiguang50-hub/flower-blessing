<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>胶片电影风格</title>
<meta property="og:title" content="🎬 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --film-black: #0d0d0d;
  --film-gold: #d4a853;
  --film-gold-light: #f0d080;
  --film-red: #8b1a1a;
  --film-cream: #f5e6c8;
  --glow-gold: rgba(212, 168, 83, 0.5);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #0a0a0a 0%, #1a1208 40%, #0d0d0d 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 胶片孔洞装饰 — 顶部 */
.film-strip-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 28px;
  background: repeating-linear-gradient(
    90deg,
    #1a1a1a 0px, #1a1a1a 24px,
    transparent 24px, transparent 36px,
    #1a1a1a 36px, #1a1a1a 60px
  );
  z-index: 2;
}

.film-strip-top::before,
.film-strip-top::after {
  content: '';
  position: absolute;
  width: 12px; height: 16px;
  background: #0d0d0d;
  top: 6px;
  border-radius: 2px;
}
.film-strip-top::before { left: 6px; }
.film-strip-top::after { right: 6px; }

/* 胶片孔洞装饰 — 底部 */
.film-strip-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  background: repeating-linear-gradient(
    90deg,
    #1a1a1a 0px, #1a1a1a 24px,
    transparent 24px, transparent 36px,
    #1a1a1a 36px, #1a1a1a 60px
  );
  z-index: 2;
}

.film-strip-bottom::before,
.film-strip-bottom::after {
  content: '';
  position: absolute;
  width: 12px; height: 16px;
  background: #0d0d0d;
  bottom: 6px;
  border-radius: 2px;
}
.film-strip-bottom::before { left: 6px; }
.film-strip-bottom::after { right: 6px; }

/* 放映室光束 */
.spotlight {
  position: fixed;
  top: -30%;
  width: 40vw;
  height: 80vh;
  background: conic-gradient(
    from 180deg at 50% 0%,
    transparent 35%,
    rgba(255,240,180,0.04) 45%,
    rgba(255,240,180,0.08) 50%,
    rgba(255,240,180,0.04) 55%,
    transparent 65%
  );
  pointer-events: none;
  z-index: 1;
  animation: spotlightSway 8s ease-in-out infinite;
}

@keyframes spotlightSway {
  0%, 100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

/* 星星闪烁 */
.stars {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--film-gold);
  border-radius: 50%;
  animation: starTwinkle 3s ease-in-out infinite;
}

@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, var(--film-gold), var(--film-gold-light), var(--film-gold));
  background-size: 200% 200%;
  animation: goldFlow 4s ease-in-out infinite;
  border-radius: 12px;
  box-shadow: 0 0 30px var(--glow-gold), 0 0 60px rgba(212,168,83,0.2);
}

@keyframes goldFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 卡片主体 */
.card {
  background: rgba(10, 8, 5, 0.92);
  border-radius: 10px;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 44px);
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(212, 168, 83, 0.3);
  min-width: 280px;
  max-width: 480px;
  animation: cardFloat 5s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* 胶片边框装饰 */
.card::before {
  content: '';
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px solid rgba(212, 168, 83, 0.2);
  border-radius: 6px;
  pointer-events: none;
}

/* 电影放映图标 */
.film-icon {
  font-size: clamp(36px, 8vw, 56px);
  margin-bottom: 12px;
  animation: iconDrop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 0 12px var(--glow-gold));
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-20px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 装饰线条 */
.decor-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 10px auto;
  opacity: 0.6;
}

.decor-line span {
  display: block;
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--film-gold), transparent);
}

.decor-line .diamond {
  width: 6px; height: 6px;
  background: var(--film-gold);
  transform: rotate(45deg);
}

/* 名字 */
.name {
  font-size: clamp(24px, 7vw, 44px);
  font-weight: bold;
  color: var(--film-gold-light);
  text-shadow: 0 0 20px var(--glow-gold), 0 0 40px rgba(212,168,83,0.3);
  margin: 10px 0 6px;
  opacity: 1;
  animation: fadeSlideUp 1.2s ease-out 0.4s both;
  letter-spacing: 2px;
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 日期 */
.date {
  font-size: clamp(12px, 3vw, 16px);
  color: var(--film-gold);
  opacity: 0.7;
  margin-bottom: 16px;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeSlideUp 1.2s ease-out 0.6s both;
}

/* 分隔装饰 */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 16px auto;
  opacity: 0.5;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--film-gold));
}

.divider::after {
  background: linear-gradient(90deg, var(--film-gold), transparent);
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 4vw, 20px);
  color: var(--film-cream);
  line-height: 1.8;
  margin: 14px 0;
  opacity: 1;
  animation: fadeSlideUp 1.2s ease-out 0.8s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--film-gold);
  opacity: 0.75;
  margin-top: 10px;
  font-style: italic;
  opacity: 1;
  animation: fadeSlideUp 1.2s ease-out 1s both;
}

/* 底部胶片装饰 */
.bottom-film {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  opacity: 0.3;
  pointer-events: none;
  z-index: 5;
}

.bottom-film .frame {
  width: 32px;
  height: 22px;
  background: rgba(30,25,15,0.8);
  border: 1px solid rgba(212,168,83,0.3);
  border-radius: 2px;
}

/* 底部提示 */
.bottom-tip {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(212,168,83,0.4);
  letter-spacing: 2px;
  z-index: 5;
  white-space: nowrap;
}

/* 减少动画 */
@media (prefers-reduced-motion: reduce) {
  .card, .card-wrap, .spotlight, .film-icon, .name, .date, .blessing, .from {
    animation: none !important;
  }
}
</style>
</head>
<body>

<div class="film-strip-top"></div>
<div class="film-strip-bottom"></div>
<div class="spotlight"></div>

<div class="stars" id="starsEl"></div>

<div class="card-wrap">
  <div class="card">
    <div class="film-icon">🎬</div>
    <div class="decor-line"><span></span><div class="diamond"></div><span></span></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<div class="bottom-film">
  <div class="frame"></div>
  <div class="frame"></div>
  <div class="frame"></div>
  <div class="frame"></div>
  <div class="frame"></div>
</div>
<div class="bottom-tip">🎬 胶片定格 · 珍藏此刻</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿光影永存，愿美好常伴';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 星星
const starsEl = document.getElementById('starsEl');
for (let i = 0; i < 30; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.animationDelay = Math.random() * 3 + 's';
  star.style.animationDuration = (2 + Math.random() * 2) + 's';
  starsEl.appendChild(star);
}
</script>
</body>
</html>
