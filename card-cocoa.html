<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暖心可可</title>
<meta property="og:title" content="☕ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cocoa-dark: #5c3317;
  --cocoa-mid: #8b4513;
  --cocoa-light: #c4824a;
  --cream: #f5e6d3;
  --marshmallow: #fff8f0;
  --card-bg: rgba(255, 248, 240, 0.88);
  --text-coffee: #4a2c17;
  --glow-warm: rgba(200, 130, 74, 0.5);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #1a0f0a 0%,
    #2d1810 15%,
    #3d2015 30%,
    #4a2a1a 45%,
    #5c3820 60%,
    #6b4025 75%,
    #7a4828 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 温馨暖光 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 50% 60%, rgba(200, 130, 74, 0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 80%, rgba(139, 69, 19, 0.2) 0%, transparent 40%),
    radial-gradient(ellipse at 70% 30%, rgba(255, 200, 100, 0.1) 0%, transparent 35%);
  pointer-events: none;
  z-index: 0;
}

/* 蒸汽袅袅 */
@keyframes steamRise {
  0% { transform: translateY(0) scaleX(1); opacity: 0; }
  15% { opacity: 0.7; }
  50% { transform: translateY(-30px) scaleX(1.3); opacity: 0.5; }
  80% { opacity: 0.2; }
  100% { transform: translateY(-55px) scaleX(0.8); opacity: 0; }
}

.steam {
  position: fixed;
  font-size: clamp(10px, 2.5vw, 16px);
  z-index: 3;
  pointer-events: none;
  animation: steamRise var(--dur) ease-out var(--delay) infinite;
  filter: blur(1px);
}

/* 棉花糖跳动 */
@keyframes marshmallowBob {
  0%, 100% { transform: translateY(0) rotate(var(--rot)); }
  50% { transform: translateY(-8px) rotate(calc(var(--rot) + 5deg)); }
}

.marshmallow {
  position: fixed;
  font-size: clamp(8px, 2vw, 14px);
  z-index: 3;
  pointer-events: none;
  animation: marshmallowBob var(--dur) ease-in-out var(--d) infinite;
}

/* 可可豆漂浮 */
@keyframes cocoaFloat {
  0%, 100% { transform: translateY(0) rotate(var(--rot)); opacity: 0.7; }
  50% { transform: translateY(-10px) rotate(calc(var(--rot) + 20deg)); opacity: 1; }
}

.cocoa-bean {
  position: fixed;
  font-size: clamp(8px, 2vw, 12px);
  z-index: 2;
  pointer-events: none;
  animation: cocoaFloat var(--dur) ease-in-out var(--d) infinite;
}

/* 星星光点 */
@keyframes warmGlow {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

.warm-star {
  position: fixed;
  font-size: clamp(6px, 1.5vw, 10px);
  z-index: 2;
  pointer-events: none;
  animation: warmGlow var(--dur) ease-in-out var(--d) infinite;
}

/* 雪花飘落 */
@keyframes snowDrift {
  0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 0.9; }
  90% { opacity: 0.9; }
  100% { transform: translateY(105vh) rotate(360deg) translateX(var(--dx)); opacity: 0; }
}

.snowflake {
  position: fixed;
  top: -20px;
  z-index: 1;
  pointer-events: none;
  animation: snowDrift var(--dur) linear var(--delay) infinite;
}

/* 卡片外框 - 温暖可可边框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg,
    #c4824a 0%,
    #8b4513 30%,
    #d4956a 50%,
    #8b4513 70%,
    #c4824a 100%);
  background-size: 400% 400%;
  animation: cocoaBorder 5s ease-in-out infinite;
  box-shadow:
    0 0 30px rgba(200, 130, 74, 0.6),
    0 0 60px rgba(139, 69, 19, 0.3),
    0 8px 32px rgba(0, 0, 0, 0.4);
}

@keyframes cocoaBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(200, 130, 74, 0.6), 0 0 60px rgba(139, 69, 19, 0.3), 0 8px 32px rgba(0,0,0,0.4); }
  50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(212, 149, 106, 0.7), 0 0 60px rgba(200, 130, 74, 0.4), 0 8px 32px rgba(0,0,0,0.4); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: clamp(28px, 7vw, 48px) clamp(24px, 6vw, 48px);
  text-align: center;
  max-width: 90vw;
  width: 420px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* 可可光泽 */
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(200,160,120,0.1) 50%, rgba(255,255,255,0.2) 100%);
  pointer-events: none;
  border-radius: 22px;
}

.icon-emoji {
  font-size: clamp(40px, 10vw, 60px);
  display: block;
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}

@keyframes iconDrop {
  from { transform: translateY(-40px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.name {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: 700;
  color: var(--text-coffee);
  margin-bottom: 12px;
  letter-spacing: 2px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.3s both;
  text-shadow: 0 2px 8px rgba(74, 44, 23, 0.12);
}

.blessing {
  font-size: clamp(14px, 4vw, 18px);
  color: var(--text-coffee);
  line-height: 1.8;
  margin-bottom: 14px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.5s both;
}

.date {
  font-size: clamp(11px, 3vw, 14px);
  color: rgba(74, 44, 23, 0.55);
  letter-spacing: 2px;
  margin-bottom: 6px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.8s both;
}

.from {
  font-size: clamp(11px, 3vw, 14px);
  color: rgba(74, 44, 23, 0.5);
  font-style: italic;
  opacity: 1;
  animation: textIn 1.2s ease-out 1.0s both;
}

@keyframes textIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 杯子装饰 */
@keyframes cupShine {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

@media (prefers-reduced-motion: reduce) {
  .steam, .marshmallow, .cocoa-bean, .warm-star, .snowflake, .card-wrap, .name, .blessing, .date, .from, .icon-emoji {
    animation: none !important;
  }
}
</style>
</head>
<body>

<script>
// 蒸汽
function createSteam() {
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'steam';
    s.textContent = ['☁️', '~', '∼'][Math.floor(Math.random() * 3)];
    s.style.cssText = `
      left: ${40 + Math.random() * 20}%;
      top: ${20 + Math.random() * 15}%;
      --dur: ${2.5 + Math.random() * 2}s;
      --delay: ${Math.random() * 3}s;
      color: rgba(255, 248, 240, ${0.4 + Math.random() * 0.4});
    `;
    document.body.appendChild(s);
  }
}

// 棉花糖
function createMarshmallows() {
  const items = ['☁️', '🧊', '✨', '💛'];
  for (let i = 0; i < 8; i++) {
    const m = document.createElement('div');
    m.className = 'marshmallow';
    m.textContent = items[Math.floor(Math.random() * items.length)];
    m.style.cssText = `
      left: ${10 + Math.random() * 80}%;
      top: ${15 + Math.random() * 70}%;
      --dur: ${3 + Math.random() * 2}s;
      --d: ${Math.random() * 3}s;
      --rot: ${(Math.random() - 0.5) * 20}deg;
      opacity: 0.6;
    `;
    document.body.appendChild(m);
  }
}

// 可可豆
function createCocoaBeans() {
  const beans = ['🫘', '☕', '🍫'];
  for (let i = 0; i < 6; i++) {
    const b = document.createElement('div');
    b.className = 'cocoa-bean';
    b.textContent = beans[Math.floor(Math.random() * beans.length)];
    b.style.cssText = `
      left: ${5 + Math.random() * 88}%;
      top: ${10 + Math.random() * 78}%;
      --dur: ${4 + Math.random() * 3}s;
      --d: ${Math.random() * 3}s;
      --rot: ${(Math.random() - 0.5) * 40}deg;
    `;
    document.body.appendChild(b);
  }
}

// 温暖星星
function createWarmStars() {
  for (let i = 0; i < 14; i++) {
    const w = document.createElement('div');
    w.className = 'warm-star';
    w.textContent = '✦';
    w.style.cssText = `
      left: ${Math.random() * 95}%;
      top: ${Math.random() * 90}%;
      --dur: ${2 + Math.random() * 3}s;
      --d: ${Math.random() * 3}s;
      color: rgba(255, 200, 120, ${0.3 + Math.random() * 0.5});
    `;
    document.body.appendChild(w);
  }
}

// 雪花
function createSnow() {
  const flakes = ['❄', '❅', '❆', '✻', '✼'];
  for (let i = 0; i < 16; i++) {
    const f = document.createElement('div');
    f.className = 'snowflake';
    f.textContent = flakes[Math.floor(Math.random() * flakes.length)];
    f.style.cssText = `
      left: ${Math.random() * 100}%;
      --dur: ${8 + Math.random() * 8}s;
      --delay: ${Math.random() * 8}s;
      --dx: ${(Math.random() - 0.5) * 60}px;
      font-size: ${8 + Math.random() * 12}px;
      color: rgba(255, 248, 240, ${0.4 + Math.random() * 0.5});
    `;
    document.body.appendChild(f);
  }
}

// URL参数
const p = new URLSearchParams(location.search);
const nameEl = document.getElementById('nameEl');
const dateEl = document.getElementById('dateEl');
const blessingEl = document.getElementById('blessingEl');
const fromEl = document.getElementById('fromEl');
if (nameEl) nameEl.textContent = p.get('n') || '亲爱的你';
if (dateEl) dateEl.textContent = p.get('d') || '';
if (blessingEl) blessingEl.textContent = p.get('b') || '天冷了，喝杯热可可，暖到心里去';
if (fromEl) fromEl.textContent = p.get('f') ? '— ' + p.get('f') : '';

createSteam();
createMarshmallows();
createCocoaBeans();
createWarmStars();
createSnow();
</script>

<div class="card-wrap">
  <div class="card">
    <span class="icon-emoji">☕</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>
</body>
</html>
