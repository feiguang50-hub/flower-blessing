<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>派对庆祝祝福</title>
<meta property="og:title" content="🎉 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --confetti-red: #ff6b6b;
  --confetti-yellow: #ffd93d;
  --confetti-green: #6bcb77;
  --confetti-blue: #4d96ff;
  --confetti-pink: #ff85a2;
  --confetti-purple: #c77dff;
  --card-bg: rgba(255, 255, 255, 0.92);
  --text-dark: #2d3436;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 25%, #fecfef 50%, #a8edea 75%, #fed6e3 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 彩虹渐变背景动画 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: linear-gradient(45deg, 
    rgba(255,107,107,0.15) 0%, 
    rgba(255,217,61,0.15) 25%, 
    rgba(107,203,119,0.15) 50%, 
    rgba(77,150,255,0.15) 75%, 
    rgba(255,133,162,0.15) 100%
  );
  background-size: 400% 400%;
  animation: rainbowBg 8s ease infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes rainbowBg {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 装饰容器 */
.decor {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

/* 气球 */
.balloon {
  position: absolute;
  font-size: 40px;
  animation: balloonFloat 6s ease-in-out infinite;
}

.balloon:nth-child(1) { left: 8%; top: 10%; animation-delay: 0s; }
.balloon:nth-child(2) { left: 85%; top: 15%; animation-delay: -2s; font-size: 36px; }
.balloon:nth-child(3) { left: 15%; top: 60%; animation-delay: -4s; font-size: 32px; }

@keyframes balloonFloat {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-25px) rotate(5deg); }
}

/* 彩带飘落 */
.ribbon {
  position: absolute;
  width: 12px;
  height: 40px;
  border-radius: 3px;
  animation: ribbonFall linear infinite;
}

@keyframes ribbonFall {
  0% { transform: translateY(-60px) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* 星星闪烁 */
.star {
  position: absolute;
  font-size: 18px;
  animation: starTwinkle 2s ease-in-out infinite;
}

.star:nth-child(1) { left: 20%; top: 25%; animation-delay: 0s; }
.star:nth-child(2) { left: 70%; top: 35%; animation-delay: -0.5s; }
.star:nth-child(3) { left: 45%; top: 15%; animation-delay: -1s; }
.star:nth-child(4) { left: 85%; top: 55%; animation-delay: -1.5s; }

@keyframes starTwinkle {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}

/* 卡片包装 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, var(--confetti-red), var(--confetti-yellow), var(--confetti-green), var(--confetti-blue), var(--confetti-pink));
  background-size: 400% 400%;
  border-radius: 24px;
  animation: confettiBorder 4s ease-in-out infinite, cardBounce 5s ease-in-out infinite;
  box-shadow: 
    0 0 40px rgba(255, 107, 107, 0.4),
    0 8px 32px rgba(0, 0, 0, 0.15);
}

@keyframes confettiBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes cardBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-6px) scale(1.01); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  max-width: 90vw;
}

.name {
  font-size: clamp(28px, 8vw, 52px);
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 12px;
  opacity: 1;
  animation: bounceIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  background: linear-gradient(90deg, var(--confetti-red), var(--confetti-purple), var(--confetti-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.date {
  font-size: clamp(14px, 3.5vw, 18px);
  color: #636e72;
  margin-bottom: 20px;
  opacity: 1;
  animation: slideUp 1s ease-out 0.4s both;
  letter-spacing: 2px;
}

.blessing {
  font-size: clamp(18px, 5vw, 28px);
  color: var(--text-dark);
  line-height: 1.6;
  margin-bottom: 24px;
  opacity: 1;
  animation: slideUp 1s ease-out 0.6s both;
  font-weight: 500;
}

.blessing::before { content: '🎊 '; }
.blessing::after { content: ' 🎊'; }

.from {
  font-size: clamp(14px, 3.5vw, 18px);
  color: #636e72;
  opacity: 1;
  animation: slideUp 1s ease-out 0.8s both;
}

.from::before { content: '— '; }

@keyframes bounceIn {
  0% { opacity: 0; transform: scale(0.3) translateY(-30px); }
  50% { transform: scale(1.05); }
  70% { transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 礼花爆炸 */
.confetti-pop {
  position: fixed;
  font-size: 28px;
  animation: confettiPop 1s ease-out forwards;
  pointer-events: none;
  z-index: 100;
}

@keyframes confettiPop {
  0% { transform: scale(0); opacity: 1; }
  50% { transform: scale(1.5); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

/* 减少动画 */
@media (prefers-reduced-motion: reduce) {
  .balloon, .ribbon, .star, .card-wrap { animation: none; }
  .name, .date, .blessing, .from { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<div class="decor">
  <!-- 气球 -->
  <div class="balloon">🎈</div>
  <div class="balloon">🎈</div>
  <div class="balloon">🎈</div>
  
  <!-- 星星 -->
  <div class="star">⭐</div>
  <div class="star">✨</div>
  <div class="star">💫</div>
  <div class="star">⭐</div>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
// URL参数读取
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '祝你生日快乐，天天开心！';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 彩带飘落
const ribbonColors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff85a2', '#c77dff'];
function createRibbon() {
  const ribbon = document.createElement('div');
  ribbon.className = 'ribbon';
  ribbon.style.left = Math.random() * 100 + '%';
  ribbon.style.background = ribbonColors[Math.floor(Math.random() * ribbonColors.length)];
  ribbon.style.animationDuration = (6 + Math.random() * 4) + 's';
  ribbon.style.animationDelay = Math.random() * 3 + 's';
  document.querySelector('.decor').appendChild(ribbon);
  
  setTimeout(() => ribbon.remove(), 12000);
}
setInterval(createRibbon, 400);
for (let i = 0; i < 8; i++) createRibbon();

// 点击卡片触发礼花
document.querySelector('.card-wrap').addEventListener('click', function(e) {
  const emojis = ['🎉', '🎊', '✨', '💫', '⭐', '🎈', '🎁'];
  for (let i = 0; i < 5; i++) {
    const pop = document.createElement('div');
    pop.className = 'confetti-pop';
    pop.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    pop.style.left = (e.clientX + (Math.random() - 0.5) * 100) + 'px';
    pop.style.top = (e.clientY + (Math.random() - 0.5) * 60) + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 1000);
  }
});

// 减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.ribbon').forEach(r => r.remove());
}
</script>
</body>
</html>
