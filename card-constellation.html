<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星座密语</title>
<meta property="og:title" content="✨ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #03060f 0%, #060d1f 30%, #0a1230 60%, #03060f 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 夜空光晕 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 50% 10%, rgba(160,120,255,0.07) 0%, transparent 45%),
    radial-gradient(ellipse at 20% 80%, rgba(80,60,180,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 60%, rgba(120,80,200,0.05) 0%, transparent 40%);
  animation: cosmicShift 10s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes cosmicShift {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

/* 星星 */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: twinkle ease-in-out infinite;
  z-index: 2;
  pointer-events: none;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 边框 */
.card-wrap {
  position: relative;
  padding: 2px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(180,150,255,0.5), rgba(100,80,200,0.3), rgba(200,160,255,0.5));
  animation: constellationGlow 3s ease-in-out infinite;
  z-index: 10;
}
@keyframes constellationGlow {
  0%, 100% { box-shadow: 0 0 12px 2px rgba(160,130,255,0.3), 0 0 30px 6px rgba(100,80,200,0.15); }
  50% { box-shadow: 0 0 22px 4px rgba(180,150,255,0.5), 0 0 50px 10px rgba(120,100,220,0.22); }
}

.card {
  background: linear-gradient(160deg, rgba(6,10,24,0.94) 0%, rgba(10,16,36,0.96) 100%);
  border-radius: 18px;
  padding: clamp(32px, 8vw, 54px) clamp(24px, 6vw, 44px);
  text-align: center;
  max-width: 500px;
  width: 90vw;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(160,130,255,0.12);
}

.card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(160,120,255,0.05) 0%, transparent 55%);
  pointer-events: none;
}

/* 星座图标 */
.constellation-icon {
  font-size: clamp(28px, 6vw, 40px);
  margin-bottom: 8px;
  opacity: 1;
  animation: fadeIn 1s ease-out both;
}

.name {
  font-size: clamp(26px, 7vw, 48px);
  font-weight: bold;
  background: linear-gradient(135deg, #d4c8ff, #e8e0ff, #fff8ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 14px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.1s both;
}

.date {
  font-size: clamp(11px, 2.8vw, 15px);
  color: rgba(180,160,255,0.5);
  margin-bottom: 24px;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.2s both;
}

.blessing {
  font-size: clamp(15px, 4vw, 22px);
  color: rgba(220,210,255,0.88);
  line-height: 1.9;
  margin-bottom: 26px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.35s both;
}

/* 星座连线装饰 */
.constellation-line {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 22px;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.45s both;
}
.constellation-dot {
  width: 5px; height: 5px;
  background: rgba(200,180,255,0.6);
  border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite;
}
.constellation-dot:nth-child(2) { animation-delay: 0.3s; }
.constellation-dot:nth-child(3) { animation-delay: 0.6s; }
.constellation-dot:nth-child(4) { animation-delay: 0.9s; }
.constellation-dot:nth-child(5) { animation-delay: 1.2s; }

.from {
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(180,160,255,0.55);
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.55s both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的你';
const date = p.get('d') || '';
const blessing = p.get('b') || '你是夜空中最亮的那颗星';
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('dateEl').textContent = date;
document.getElementById('blessingEl').textContent = blessing;
document.getElementById('fromEl').textContent = from ? '— ' + from : '';

// 生成背景星星
for (let i = 0; i < 60; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + 'vw';
  star.style.top = Math.random() * 100 + 'vh';
  const size = 1 + Math.random() * 2.5;
  star.style.width = size + 'px';
  star.style.height = size + 'px';
  star.style.animationDuration = (1.5 + Math.random() * 3) + 's';
  star.style.animationDelay = (-Math.random() * 5) + 's';
  document.body.appendChild(star);
}
</script>

<div class="card-wrap">
  <div class="card">
    <div class="constellation-icon">✦</div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="constellation-line">
      <div class="constellation-dot"></div>
      <div class="constellation-dot"></div>
      <div class="constellation-dot"></div>
      <div class="constellation-dot"></div>
      <div class="constellation-dot"></div>
    </div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
