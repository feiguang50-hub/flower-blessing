<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<title>宇宙星云祝福</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(180deg,#000010 0%,#0a0025 30%,#1a0050 60%,#0a0025 100%);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  font-family:'Microsoft YaHei',sans-serif;
  position:relative;
}
/* 星云层 */
.nebula{
  position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%,rgba(120,40,180,0.22) 0%,transparent 70%),
    radial-gradient(ellipse 60% 80% at 75% 60%,rgba(40,80,200,0.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 50% 80%,rgba(180,20,80,0.14) 0%,transparent 70%);
  animation:nebulaPulse 8s ease-in-out infinite alternate;
}
@keyframes nebulaPulse{
  0%{opacity:0.7;transform:scale(1)}
  100%{opacity:1;transform:scale(1.05)}
}
/* 背景星星 */
.stars-bg{
  position:fixed;inset:0;pointer-events:none;
}
.star-dot{
  position:absolute;
  border-radius:50%;
  background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate;
}
@keyframes twinkle{
  0%{opacity:0.2;transform:scale(0.8)}
  100%{opacity:1;transform:scale(1.2)}
}
/* 流星 */
.shooting-star{
  position:absolute;
  width:2px;height:2px;
  background:linear-gradient(45deg,#fff,#88ccff);
  border-radius:50%;
  box-shadow:0 0 6px 2px rgba(136,200,255,0.8);
  animation:shoot var(--d,3s) linear infinite;
  opacity:0;
}
@keyframes shoot{
  0%{transform:translate(0,0);opacity:0}
  5%{opacity:1}
  30%{transform:translate(-120px,120px);opacity:0}
  100%{transform:translate(-120px,120px);opacity:0}
}
/* 行星 */
.planet{
  position:absolute;
  border-radius:50%;
  animation:planetFloat 6s ease-in-out infinite alternate;
}
.planet::before{
  content:'';position:absolute;inset:0;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.3),transparent 60%);
}
.planet::after{
  content:'';position:absolute;
  border-radius:50%;
}
@keyframes planetFloat{
  0%{transform:translateY(0)}
  100%{transform:translateY(-12px)}
}
/* 卡片外框 */
.card-wrap{
  position:relative;
  padding:2px;
  background:linear-gradient(135deg,#6a3d9a,#c084fc,#e040fb,#6a3d9a);
  background-size:300% 300%;
  border-radius:20px;
  animation:borderFlow 6s linear infinite;
  box-shadow:0 0 24px rgba(160,60,250,0.4),0 0 48px rgba(100,30,200,0.2);
  z-index:10;
}
@keyframes borderFlow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
/* 卡片主体 */
.card{
  background:linear-gradient(180deg,rgba(10,0,30,0.92) 0%,rgba(20,0,50,0.95) 100%);
  border-radius:18px;
  padding:clamp(32px,8vw,56px) clamp(24px,6vw,48px);
  text-align:center;
  max-width:min(520px,94vw);
  min-height:min(420px,80vh);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
  animation:cardFloat 5s ease-in-out infinite alternate;
  border:1px solid rgba(180,130,252,0.2);
}
@keyframes cardFloat{
  0%{transform:translateY(0)}
  100%{transform:translateY(-8px)}
}
/* 内发光 */
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 20%,rgba(160,80,255,0.08),transparent 70%);
  pointer-events:none;
}
/* 图标 */
.icon{
  font-size:clamp(40px,10vw,64px);
  margin-bottom:16px;
  animation:iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  filter:drop-shadow(0 0 12px rgba(200,160,255,0.6));
}
@keyframes iconDrop{
  from{transform:translateY(-40px) scale(0.5);opacity:0}
  to{transform:translateY(0) scale(1);opacity:1}
}
/* 姓名 */
.name{
  font-size:clamp(24px,6vw,40px);
  font-weight:700;
  background:linear-gradient(135deg,#e040fb,#c084fc,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
  animation:slideUp 1.2s ease-out 0.5s both;
  text-shadow:none;
  opacity:1;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
/* 日期 */
.date{
  font-size:clamp(13px,3vw,17px);
  color:rgba(180,150,220,0.7);
  margin-bottom:20px;
  letter-spacing:3px;
  animation:slideUp 1.2s ease-out 0.8s both;
  opacity:1;
}
/* 祝福语 */
.blessing{
  font-size:clamp(16px,4vw,22px);
  line-height:1.8;
  color:rgba(230,210,255,0.92);
  margin-bottom:24px;
  animation:slideUp 1.2s ease-out 1.1s both;
  opacity:1;
}
/* 署名 */
.from{
  font-size:clamp(13px,3vw,16px);
  color:rgba(180,150,220,0.6);
  animation:slideUp 1.2s ease-out 1.4s both;
  opacity:1;
}
/* 角落装饰 */
.corner-star{
  position:absolute;
  font-size:16px;
  opacity:0.4;
  animation:twinkle 2s ease-in-out infinite alternate;
}
.corner-star:nth-child(1){top:12px;left:16px;animation-delay:0s}
.corner-star:nth-child(2){top:12px;right:16px;animation-delay:0.5s}
.corner-star:nth-child(3){bottom:12px;left:16px;animation-delay:1s}
.corner-star:nth-child(4){bottom:12px;right:16px;animation-delay:1.5s}
@media(prefers-reduced-motion:reduce){
  .nebula,.card,.shooting-star,.planet,.star-dot,.card-wrap{animation:none!important}
}
</style>
</head>
<body>

<div class="nebula"></div>
<div class="stars-bg" id="starsBg"></div>

<div class="card-wrap">
  <div class="card">
    <span class="corner-star">✦</span>
    <span class="corner-star">✦</span>
    <span class="corner-star">✦</span>
    <span class="corner-star">✦</span>
    <div class="icon" id="iconEl">🌌</div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
(function(){
  // 背景星星
  var bg=document.getElementById('starsBg');
  for(var i=0;i<90;i++){
    var d=document.createElement('div');
    d.className='star-dot';
    var size=Math.random()*2.5+0.5;
    d.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;--d:'+(Math.random()*4+2)+'s;animation-delay:'+(Math.random()*4)+'s';
    bg.appendChild(d);
  }
  // 行星
  var planets=[
    {w:36,h:36,bg:'radial-gradient(circle,#7c3aed,#4c1d95)',top:'8%',left:'8%',dur:7},
    {w:22,h:22,bg:'radial-gradient(circle,#f59e0b,#92400e)',top:'15%',right:'10%',dur:5},
    {w:16,h:16,bg:'radial-gradient(circle,#60a5fa,#1e3a8a)',bottom:'12%',left:'12%',dur:6}
  ];
  planets.forEach(function(p){
    var pl=document.createElement('div');
    pl.className='planet';
    pl.style.cssText='width:'+p.w+'px;height:'+p.h+'px;background:'+p.bg+';top:'+p.top+';left:'+p.left+';right:'+p.right+';bottom:'+p.bottom+';animation-duration:'+p.dur+'s;box-shadow:0 0 12px rgba(160,80,255,0.3)';
    bg.appendChild(pl);
  });
  // 流星
  for(var j=0;j<3;j++){
    var s=document.createElement('div');
    s.className='shooting-star';
    s.style.cssText='top:'+(Math.random()*50+5)+'%;left:'+(Math.random()*60+20)+'%;--d:'+(Math.random()*3+4)+'s;animation-delay:'+(Math.random()*6)+'s';
    bg.appendChild(s);
  }
  // 参数
  var p=new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent=p.get('n')||'亲爱的';
  document.getElementById('dateEl').textContent=p.get('d')||'';
  document.getElementById('blessingEl').textContent=p.get('b')||'愿你像星辰一样闪耀，永不陨落';
  var from=p.get('f');
  if(from) document.getElementById('fromEl').textContent='— '+from;
  var icon=p.get('i');
  if(icon) document.getElementById('iconEl').textContent=icon;
})();
</script>
</body>
</html>
