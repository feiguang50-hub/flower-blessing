<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韩系奶油祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream-pink: #f8c8dc;
  --cream-white: #fff9fb;
  --cream-yellow: #fff1b0;
  --cream-mint: #c5e8d5;
  --cream-peach: #ffdac1;
  --card-bg: rgba(255,255,255,0.7);
  --text-pink: #d4727a;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #fdf2f8 0%, #fff9fb 30%, #fef3f7 60%, #f8e8f0 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 奶油纹理背景 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(248,200,220,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 75%, rgba(255,218,193,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 90%, rgba(197,232,213,0.2) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* 漂浮装饰 */
.decor {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.decor .item {
  position: absolute;
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0;
}

.decor .heart {
  width: 14px; height: 14px;
  background: #f8c8dc;
  transform: rotate(45deg);
  animation: floatHeart 6s ease-in-out infinite;
}

.decor .star {
  width: 10px; height: 10px;
  background: var(--cream-yellow);
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  animation: floatStar 7s ease-in-out infinite;
}

.decor .bubble {
  width: 16px; height: 16px;
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(248,200,220,0.4);
  animation: floatBubble 8s ease-in-out infinite;
}

@keyframes floatHeart {
  0% { transform: rotate(45deg) translateY(0) scale(1); opacity: 0.8; }
  50% { transform: rotate(45deg) translateY(-20px) scale(1.1); opacity: 1; }
  100% { transform: rotate(45deg) translateY(-40px) scale(1); opacity: 0; }
}

@keyframes floatStar {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; }
  50% { transform: translateY(-30px) rotate(180deg) scale(1.2); opacity: 1; }
  100% { transform: translateY(-60px) rotate(360deg) scale(1); opacity: 0; }
}

@keyframes floatBubble {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  20% { opacity: 0.6; }
  80% { opacity: 0.4; }
  100% { transform: translateY(-100px) scale(1.3); opacity: 0; }
}

.decor .item:nth-child(1) { left: 8%; top: 80%; animation-delay: 0s; }
.decor .item:nth-child(2) { left: 18%; top: 85%; animation-delay: 1.2s; }
.decor .item:nth-child(3) { left: 75%; top: 82%; animation-delay: 0.6s; }
.decor .item:nth-child(4) { left: 85%; top: 78%; animation-delay: 2.1s; }
.decor .item:nth-child(5) { left: 30%; top: 90%; animation-delay: 1.8s; }
.decor .item:nth-child(6) { left: 60%; top: 88%; animation-delay: 3s; }
.decor .item:nth-child(7) { left: 92%; top: 85%; animation-delay: 0.3s; }
.decor .item:nth-child(8) { left: 45%; top: 92%; animation-delay: 2.5s; }
.decor .item:nth-child(9) { left: 5%; top: 75%; animation-delay: 4s; }
.decor .item:nth-child(10) { left: 95%; top: 80%; animation-delay: 1.5s; }

/* 丝带装饰 */
.ribbon {
  position: fixed;
  width: 100px; height: 100px;
  z-index: 2;
}

.ribbon-tl {
  top: -10px; left: -10px;
  border-top: 30px solid #f8c8dc;
  border-right: 30px solid transparent;
  border-bottom: 30px solid transparent;
  border-left: 30px solid #f8c8dc;
}

.ribbon-tr {
  top: -10px; right: -10px;
  border-top: 30px solid #c5e8d5;
  border-left: 30px solid transparent;
  border-bottom: 30px solid transparent;
  border-right: 30px solid #c5e8d5;
}

.ribbon-bl {
  bottom: -10px; left: -10px;
  border-bottom: 30px solid #ffdac1;
  border-right: 30px solid transparent;
  border-top: 30px solid transparent;
  border-left: 30px solid #ffdac1;
}

.ribbon-br {
  bottom: -10px; right: -10px;
  border-bottom: 30px solid var(--cream-yellow);
  border-left: 30px solid transparent;
  border-top: 30px solid transparent;
  border-right: 30px solid var(--cream-yellow);
}

/* 卡片包装 */
.card-wrap {
  position: relative;
  z-index: 10;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(420px, 92vw);
  min-height: 560px;
  background: var(--card-bg);
  border-radius: 32px;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  box-shadow:
    0 8px 32px rgba(212,114,122,0.1),
    0 2px 8px rgba(212,114,122,0.08),
    inset 0 1px 0 rgba(255,255,255,0.8);
  border: 2px solid rgba(248,200,220,0.5);
  animation: cardFloat 4s ease-in-out infinite;
  transform-style: preserve-3d;
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

.card:hover {
  transform: translateY(-6px) rotateX(2deg);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* 卡片边框流光 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 34px;
  background: linear-gradient(135deg, #f8c8dc, #c5e8d5, #ffdac1, #fff1b0, #f8c8dc);
  background-size: 400% 400%;
  animation: borderFlow 6s ease infinite;
  z-index: -1;
  opacity: 0.6;
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 装饰图标 */
.icon {
  font-size: 52px;
  animation: iconBounce 2s cubic-bezier(0.34,1.56,0.64,1) both;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

@keyframes iconBounce {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.2) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 收礼人姓名 */
.name {
  font-size: clamp(26px, 7vw, 42px);
  color: var(--text-pink);
  font-weight: 700;
  text-align: center;
  letter-spacing: 2px;
  text-shadow: 0 2px 8px rgba(212,114,122,0.2);
  animation: slideUp 1.2s ease-out 0.3s both;
  opacity: 1;
}

/* 日期 */
.date {
  font-size: clamp(13px, 3.5vw, 16px);
  color: #b0888c;
  letter-spacing: 3px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

/* 祝福语 */
.blessing {
  font-size: clamp(15px, 4vw, 18px);
  color: #7a5c60;
  text-align: center;
  line-height: 1.9;
  max-width: 320px;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

/* 署名 */
.from {
  font-size: clamp(13px, 3.5vw, 15px);
  color: #c49aa0;
  letter-spacing: 2px;
  margin-top: 8px;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

/* 装饰线 */
.divider {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #f8c8dc, transparent);
  animation: slideUp 1.2s ease-out 0.6s both;
  opacity: 1;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 底部奶油波浪 */
.cream-wave {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  z-index: 0;
  overflow: hidden;
}

.cream-wave::before {
  content: '';
  position: absolute;
  bottom: 0; left: -10%;
  width: 120%;
  height: 100%;
  background:
    radial-gradient(ellipse at 20% 100%, rgba(248,200,220,0.5) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(255,218,193,0.4) 0%, transparent 60%);
  animation: waveBreath 4s ease-in-out infinite;
}

@keyframes waveBreath {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(1.15); }
}

/* 彩带飘落 */
.ribbon-fall {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 3;
  overflow: hidden;
}

.ribbon-fall .ribbon-piece {
  position: absolute;
  width: 8px; height: 20px;
  top: -20px;
  border-radius: 2px;
  animation: ribbonDrop linear infinite;
}

@keyframes ribbonDrop {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
}

.ribbon-fall .ribbon-piece:nth-child(1) { left: 10%; background: #f8c8dc; animation-duration: 4s; animation-delay: 0s; }
.ribbon-fall .ribbon-piece:nth-child(2) { left: 25%; background: #c5e8d5; animation-duration: 5s; animation-delay: 1s; }
.ribbon-fall .ribbon-piece:nth-child(3) { left: 40%; background: #ffdac1; animation-duration: 4.5s; animation-delay: 0.5s; }
.ribbon-fall .ribbon-piece:nth-child(4) { left: 55%; background: #fff1b0; animation-duration: 5.5s; animation-delay: 2s; }
.ribbon-fall .ribbon-piece:nth-child(5) { left: 70%; background: #f8c8dc; animation-duration: 4s; animation-delay: 1.5s; }
.ribbon-fall .ribbon-piece:nth-child(6) { left: 85%; background: #c5e8d5; animation-duration: 5s; animation-delay: 0.8s; }

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .decor .item, .ribbon-fall .ribbon-piece {
    animation: none;
  }
  .name, .date, .blessing, .from, .divider {
    opacity: 1;
  }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; min-height: 480px; }
  .ribbon { width: 60px; height: 60px; }
  .ribbon-tl, .ribbon-tr, .ribbon-bl, .ribbon-br { border-width: 18px; }
}
</style>
</head>
<body>

<div class="decor">
  <div class="item heart"></div>
  <div class="item star"></div>
  <div class="item bubble"></div>
  <div class="item heart"></div>
  <div class="item star"></div>
  <div class="item bubble"></div>
  <div class="item heart"></div>
  <div class="item star"></div>
  <div class="item bubble"></div>
  <div class="item heart"></div>
</div>

<div class="ribbon ribbon-tl"></div>
<div class="ribbon ribbon-tr"></div>
<div class="ribbon ribbon-bl"></div>
<div class="ribbon ribbon-br"></div>

<div class="ribbon-fall">
  <div class="ribbon-piece"></div>
  <div class="ribbon-piece"></div>
  <div class="ribbon-piece"></div>
  <div class="ribbon-piece"></div>
  <div class="ribbon-piece"></div>
  <div class="ribbon-piece"></div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🌸</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<div class="cream-wave"></div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的每一天都像奶油一样甜蜜美好';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
