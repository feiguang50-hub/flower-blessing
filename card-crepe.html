<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糖果包装纸</title>
<meta property="og:title" content="🍬 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --candy-pink: #ff9ec4;
  --candy-mint: #7fded5;
  --candy-lavender: #c4a8e0;
  --candy-peach: #ffb8a8;
  --candy-yellow: #ffe066;
  --candy-coral: #ff7f8a;
  --card-bg: rgba(255, 255, 255, 0.82);
  --text-dark: #6a4a5a;
  --glow-candy: rgba(255, 158, 196, 0.5);
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg,
    #ffe0ee 0%,
    #e8d0f8 20%,
    #d0eef8 40%,
    #d8f8e8 60%,
    #fff0d8 80%,
    #ffe0e8 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 彩虹折射光 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255, 220, 240, 0.5) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 80%, rgba(200, 240, 255, 0.4) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* 糖纸碎片 */
@keyframes candyDrift {
  0% { transform: translateY(-40px) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 0.9; }
  85% { opacity: 0.9; }
  100% { transform: translateY(105vh) rotate(720deg) translateX(var(--dx)); opacity: 0; }
}

.candy-piece {
  position: fixed;
  top: -40px;
  z-index: 1;
  pointer-events: none;
  animation: candyDrift var(--dur) var(--ease) var(--delay) infinite;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
}

/* 爱心气泡 */
@keyframes heartFloat {
  0% { transform: translateY(0) scale(1); opacity: 0.8; }
  50% { transform: translateY(-10px) scale(1.1); opacity: 1; }
  100% { transform: translateY(0) scale(1); opacity: 0.8; }
}

.heart-bubble {
  position: fixed;
  font-size: clamp(10px, 2.5vw, 16px);
  z-index: 1;
  pointer-events: none;
  animation: heartFloat var(--dur) ease-in-out var(--d) infinite;
}

/* 星星闪烁 */
@keyframes starShimmer {
  0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
}

.star-spark {
  position: fixed;
  font-size: clamp(8px, 2vw, 12px);
  z-index: 2;
  pointer-events: none;
  animation: starShimmer var(--dur) ease-in-out var(--d) infinite;
}

/* 彩色圆点 */
@keyframes dotPop {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.3); opacity: 0.9; }
}

.color-dot {
  position: fixed;
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
  animation: dotPop var(--dur) ease-in-out var(--d) infinite;
}

/* 卡片外框 - 糖纸质感彩虹边框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg,
    var(--candy-pink) 0%,
    var(--candy-lavender) 25%,
    var(--candy-mint) 50%,
    var(--candy-yellow) 75%,
    var(--candy-coral) 100%);
  background-size: 400% 400%;
  animation: candyBorder 4s ease-in-out infinite;
  box-shadow:
    0 0 24px rgba(255, 158, 196, 0.5),
    0 0 48px rgba(196, 168, 224, 0.3),
    0 8px 32px rgba(0, 0, 0, 0.15);
}

@keyframes candyBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 24px rgba(255, 158, 196, 0.5), 0 8px 32px rgba(0,0,0,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 36px rgba(127, 222, 213, 0.6), 0 8px 32px rgba(0,0,0,0.15); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: clamp(28px, 7vw, 48px) clamp(24px, 6vw, 48px);
  text-align: center;
  max-width: 90vw;
  width: 420px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* 糖纸光泽 */
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.5) 0%,
    rgba(255,200,220,0.2) 30%,
    rgba(200,220,255,0.2) 70%,
    rgba(255,255,255,0.4) 100%);
  pointer-events: none;
  border-radius: 22px;
}

.icon-emoji {
  font-size: clamp(36px, 9vw, 56px);
  display: block;
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

@keyframes iconDrop {
  from { transform: translateY(-40px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.name {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 12px;
  letter-spacing: 2px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.3s both;
  text-shadow: 0 2px 8px rgba(106, 74, 90, 0.12);
}

.blessing {
  font-size: clamp(14px, 4vw, 18px);
  color: var(--text-dark);
  line-height: 1.8;
  margin-bottom: 14px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.5s both;
}

.date {
  font-size: clamp(11px, 3vw, 14px);
  color: rgba(106, 74, 90, 0.55);
  letter-spacing: 2px;
  margin-bottom: 6px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.8s both;
}

.from {
  font-size: clamp(11px, 3vw, 14px);
  color: rgba(106, 74, 90, 0.5);
  font-style: italic;
  opacity: 1;
  animation: textIn 1.2s ease-out 1.0s both;
}

@keyframes textIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 彩带飘落 */
@keyframes ribbonDrift {
  0% { transform: translateY(-20px) rotate(var(--start-rot)) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(105vh) rotate(calc(var(--start-rot) + 360deg)) translateX(var(--dx)); opacity: 0; }
}

.ribbon {
  position: fixed;
  top: -20px;
  width: 12px;
  height: 30px;
  border-radius: 6px;
  z-index: 1;
  pointer-events: none;
  animation: ribbonDrift var(--dur) var(--ease) var(--delay) infinite;
}

@media (prefers-reduced-motion: reduce) {
  .candy-piece, .heart-bubble, .star-spark, .color-dot, .card-wrap, .name, .blessing, .date, .from, .icon-emoji, .ribbon {
    animation: none !important;
  }
}
</style>
</head>
<body>

<script>
// 糖纸碎片
function createCandyPieces() {
  const colors = ['#ff9ec4', '#7fded5', '#c4a8e0', '#ffb8a8', '#ffe066', '#ff7f8a'];
  const shapes = ['■', '●', '▲', '◆'];
  for (let i = 0; i < 18; i++) {
    const c = document.createElement('div');
    c.className = 'candy-piece';
    c.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    const color = colors[Math.floor(Math.random() * colors.length)];
    c.style.cssText = `
      left: ${Math.random() * 100}%;
      --dur: ${7 + Math.random() * 6}s;
      --delay: ${Math.random() * 8}s;
      --ease: ${Math.random() > 0.5 ? 'ease-in-out' : 'linear'};
      --dx: ${(Math.random() - 0.5) * 100}px;
      color: ${color};
      font-size: ${8 + Math.random() * 14}px;
      text-shadow: 0 0 6px ${color};
    `;
    document.body.appendChild(c);
  }
}

// 爱心气泡
function createHearts() {
  for (let i = 0; i < 10; i++) {
    const h = document.createElement('div');
    h.className = 'heart-bubble';
    h.textContent = ['💖', '💕', '💗', '💓', '✨'][Math.floor(Math.random() * 5)];
    h.style.cssText = `
      left: ${5 + Math.random() * 88}%;
      top: ${10 + Math.random() * 75}%;
      --dur: ${2.5 + Math.random() * 2}s;
      --d: ${Math.random() * 3}s;
    `;
    document.body.appendChild(h);
  }
}

// 星星闪烁
function createStars() {
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'star-spark';
    s.textContent = '✦';
    s.style.cssText = `
      left: ${Math.random() * 95}%;
      top: ${Math.random() * 90}%;
      --dur: ${1.5 + Math.random() * 2}s;
      --d: ${Math.random() * 2}s;
    `;
    document.body.appendChild(s);
  }
}

// 彩色圆点
function createDots() {
  const colors = ['#ff9ec4', '#7fded5', '#c4a8e0', '#ffb8a8', '#ffe066'];
  for (let i = 0; i < 8; i++) {
    const d = document.createElement('div');
    d.className = 'color-dot';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 6 + Math.random() * 10;
    d.style.cssText = `
      left: ${Math.random() * 92}%;
      top: ${Math.random() * 88}%;
      width: ${size}px;
      height: ${size}px;
      background: ${color};
      box-shadow: 0 0 ${size}px ${color};
      --dur: ${2 + Math.random() * 2}s;
      --d: ${Math.random() * 2}s;
    `;
    document.body.appendChild(d);
  }
}

// 彩带
function createRibbons() {
  const colors = ['#ff9ec4', '#7fded5', '#c4a8e0', '#ffb8a8', '#ffe066'];
  for (let i = 0; i < 6; i++) {
    const r = document.createElement('div');
    r.className = 'ribbon';
    const color = colors[Math.floor(Math.random() * colors.length)];
    r.style.cssText = `
      left: ${Math.random() * 100}%;
      background: linear-gradient(180deg, ${color}, ${color}88);
      --dur: ${6 + Math.random() * 5}s;
      --delay: ${Math.random() * 6}s;
      --ease: ${Math.random() > 0.5 ? 'ease-in-out' : 'linear'};
      --dx: ${(Math.random() - 0.5) * 60}px;
      --start-rot: ${(Math.random() - 0.5) * 40}deg;
    `;
    document.body.appendChild(r);
  }
}

// URL参数
const p = new URLSearchParams(location.search);
const nameEl = document.getElementById('nameEl');
const dateEl = document.getElementById('dateEl');
const blessingEl = document.getElementById('blessingEl');
const fromEl = document.getElementById('fromEl');
if (nameEl) nameEl.textContent = p.get('n') || '亲爱的你';
if (dateEl) dateEl.textContent = p.get('d') || '';
if (blessingEl) blessingEl.textContent = p.get('b') || '愿你的生活甜甜蜜蜜，每一天都像糖果一样美好';
if (fromEl) fromEl.textContent = p.get('f') ? '— ' + p.get('f') : '';

createCandyPieces();
createHearts();
createStars();
createDots();
createRibbons();
</script>

<div class="card-wrap">
  <div class="card">
    <span class="icon-emoji">🍬</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>
</body>
</html>
