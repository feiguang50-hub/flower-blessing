<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水晶球占卜</title>
<meta property="og:title" content="🔮 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --crystal-purple: #6b3fa0;
  --crystal-deep: #1a0a2e;
  --crystal-violet: #8b5cf6;
  --crystal-pink: #c084fc;
  --crystal-blue: #818cf8;
  --crystal-cyan: #22d3ee;
  --crystal-glow: rgba(139, 92, 246, 0.6);
  --card-bg: rgba(15, 5, 30, 0.88);
  --border-purple: rgba(139, 92, 246, 0.5);
  --text-light: #e9d5ff;
  --text-gold: #c4a7ff;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 50% 45%, rgba(107, 63, 160, 0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 80%, rgba(129, 140, 248, 0.2) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 20%, rgba(192, 132, 252, 0.2) 0%, transparent 40%),
    linear-gradient(180deg,
      #0a0515 0%,
      #12082a 25%,
      #1a0a35 45%,
      #12082a 65%,
      #0a0515 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星光背景 */
.star {
  position: fixed;
  width: 3px;
  height: 3px;
  background: #fff;
  border-radius: 50%;
  z-index: 0;
  pointer-events: none;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

/* 浮动符文 */
.rune {
  position: fixed;
  font-size: 18px;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  animation: runeFloat linear infinite;
  color: var(--crystal-violet);
  text-shadow: 0 0 8px var(--crystal-glow);
}
@keyframes runeFloat {
  0% { opacity: 0; transform: translateY(10px) rotate(0deg); }
  20% { opacity: 0.7; }
  80% { opacity: 0.5; }
  100% { opacity: 0; transform: translateY(-80px) rotate(20deg); }
}

/* 边框 */
.border-frame {
  position: fixed;
  inset: 18px;
  border: 1px solid var(--border-purple);
  border-radius: 8px;
  z-index: 2;
  pointer-events: none;
  box-shadow:
    inset 0 0 20px rgba(139, 92, 246, 0.15),
    0 0 15px rgba(139, 92, 246, 0.2);
  animation: borderPulse 4s ease-in-out infinite;
}
@keyframes borderPulse {
  0%, 100% { border-color: rgba(139,92,246,0.4); box-shadow: inset 0 0 20px rgba(139,92,246,0.15), 0 0 15px rgba(139,92,246,0.2); }
  50% { border-color: rgba(139,92,246,0.7); box-shadow: inset 0 0 30px rgba(139,92,246,0.25), 0 0 25px rgba(139,92,246,0.35); }
}

/* 卡片容器 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg,
    var(--crystal-purple) 0%,
    var(--crystal-violet) 25%,
    var(--crystal-pink) 50%,
    var(--crystal-blue) 75%,
    var(--crystal-purple) 100%);
  background-size: 400% 400%;
  border-radius: 16px;
  animation: borderGlow 6s ease-in-out infinite;
  box-shadow:
    0 0 30px rgba(139, 92, 246, 0.5),
    0 0 60px rgba(139, 92, 246, 0.25),
    0 0 90px rgba(139, 92, 246, 0.1);
}
@keyframes borderGlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card {
  background: var(--card-bg);
  border-radius: 14px;
  padding: clamp(28px, 7vw, 52px) clamp(24px, 6vw, 48px);
  text-align: center;
  position: relative;
  overflow: hidden;
  min-width: min(340px, 88vw);
  backdrop-filter: blur(4px);
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(139,92,246,0.08), transparent, rgba(192,132,252,0.06), transparent);
  animation: shimmerRotate 12s linear infinite;
  z-index: 0;
}
@keyframes shimmerRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 水晶球装饰 */
.crystal-orb {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 50px;
  z-index: 1;
  filter: drop-shadow(0 0 15px var(--crystal-glow));
  animation: orbFloat 5s ease-in-out infinite;
}
@keyframes orbFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-8px); }
}

/* 标题 */
.name {
  font-size: clamp(28px, 7vw, 52px);
  font-weight: bold;
  color: var(--text-gold);
  text-shadow:
    0 0 12px rgba(196, 167, 255, 0.8),
    0 0 24px rgba(139, 92, 246, 0.6),
    0 0 40px rgba(139, 92, 246, 0.3);
  margin-bottom: 12px;
  opacity: 1;
  animation: nameAppear 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  letter-spacing: 4px;
  position: relative;
  z-index: 2;
}
@keyframes nameAppear {
  from { opacity: 0; transform: scale(0.6) translateY(-10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* 日期 */
.date {
  font-size: clamp(13px, 3.5vw, 17px);
  color: var(--crystal-cyan);
  opacity: 0.85;
  margin-bottom: 18px;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.6s both;
  position: relative;
  z-index: 2;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 分隔 */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 16px 0;
  opacity: 1;
  animation: fadeUp 1s ease-out 1s both;
  position: relative;
  z-index: 2;
}
.divider-line {
  height: 1px;
  width: 50px;
  background: linear-gradient(90deg, transparent, var(--crystal-violet), transparent);
}
.divider-star {
  font-size: 12px;
  color: var(--crystal-pink);
  text-shadow: 0 0 6px var(--crystal-glow);
}

/* 祝福语 */
.blessing {
  font-size: clamp(16px, 4.5vw, 22px);
  color: var(--text-light);
  line-height: 1.8;
  margin-bottom: 22px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  opacity: 1;
  animation: fadeUp 1.2s ease-out 1.2s both;
  position: relative;
  z-index: 2;
}

/* 署名 */
.from {
  font-size: clamp(13px, 3.5vw, 17px);
  color: var(--crystal-pink);
  opacity: 0.9;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.4s both;
  letter-spacing: 2px;
  position: relative;
  z-index: 2;
}

/* 装饰星星 */
.star-deco {
  position: absolute;
  color: var(--crystal-violet);
  opacity: 0.3;
  font-size: 16px;
  z-index: 1;
  animation: twinkle 3s ease-in-out infinite;
}
.star-deco-1 { top: 12%; left: 8%; animation-delay: 0s; }
.star-deco-2 { top: 20%; right: 10%; animation-delay: 1s; font-size: 12px; }
.star-deco-3 { bottom: 18%; left: 12%; animation-delay: 2s; }
.star-deco-4 { bottom: 12%; right: 8%; animation-delay: 0.5s; font-size: 14px; }
.star-deco-5 { top: 35%; left: 5%; animation-delay: 1.5s; font-size: 10px; }
.star-deco-6 { top: 40%; right: 6%; animation-delay: 2.5s; }

/* 神秘符文装饰 */
.mystic-rune {
  position: absolute;
  font-size: 24px;
  color: var(--crystal-violet);
  opacity: 0.15;
  z-index: 1;
  animation: runeGlow 4s ease-in-out infinite;
}
@keyframes runeGlow {
  0%, 100% { opacity: 0.1; text-shadow: none; }
  50% { opacity: 0.25; text-shadow: 0 0 10px var(--crystal-glow); }
}
.mystic-rune-1 { top: 10%; right: 12%; }
.mystic-rune-2 { bottom: 15%; left: 10%; font-size: 20px; }
</style>
</head>
<body>

<!-- 边框 -->
<div class="border-frame"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="crystal-orb">🔮</div>
    <div class="star-deco star-deco-1">✦</div>
    <div class="star-deco star-deco-2">✦</div>
    <div class="star-deco star-deco-3">✦</div>
    <div class="star-deco star-deco-4">✦</div>
    <div class="star-deco star-deco-5">✦</div>
    <div class="star-deco star-deco-6">✦</div>
    <div class="mystic-rune mystic-rune-1">✧</div>
    <div class="mystic-rune mystic-rune-2">⚝</div>

    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-star">✦</span>
      <div class="divider-line"></div>
    </div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿命运为你揭开迷雾，指引你找到心中的答案';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 背景星星
function createStar() {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + 'vw';
  star.style.top = Math.random() * 100 + 'vh';
  star.style.animationDuration = (2 + Math.random() * 4) + 's';
  star.style.animationDelay = Math.random() * 4 + 's';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 10000);
}
for (let i = 0; i < 50; i++) createStar();

// 浮动符文
function createRune() {
  const runes = ['☽', '✧', '⚝', '✦', '☾', '⚹', '✶'];
  const rune = document.createElement('div');
  rune.className = 'rune';
  rune.textContent = runes[Math.floor(Math.random() * runes.length)];
  rune.style.left = (10 + Math.random() * 80) + 'vw';
  rune.style.bottom = (10 + Math.random() * 30) + 'vh';
  rune.style.animationDuration = (5 + Math.random() * 6) + 's';
  document.body.appendChild(rune);
  setTimeout(() => rune.remove(), 14000);
}
setInterval(createRune, 1200);
for (let i = 0; i < 6; i++) createRune();

// 减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.star, .rune, .star-deco, .mystic-rune').forEach(el => el.style.animation = 'none');
  document.querySelectorAll('.card-wrap').forEach(el => el.style.animation = 'none');
}
</script>
</body>
</html>
