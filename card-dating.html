<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋爱纪念</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #2d1b3d 0%, #4a2040 40%, #6b3050 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 背景极光 === */
.body-aurora {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.body-aurora::before {
  content: '';
  position: absolute; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 25% 20%, rgba(255,100,150,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 80%, rgba(220,80,160,0.2) 0%, transparent 50%);
  animation: auroraPulse 8s ease-in-out infinite;
}
.body-aurora::after {
  content: '';
  position: absolute; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 30% 70%, rgba(255,130,170,0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 70% 30%, rgba(240,100,180,0.18) 0%, transparent 50%);
  animation: auroraPulse 11s ease-in-out infinite reverse;
}
@keyframes auroraPulse {
  0%, 100% { transform: scale(1) translate(0,0); opacity: 0.7; }
  50% { transform: scale(1.05) translate(1%, 1%); opacity: 1; }
}

/* === 飘浮爱心 === */
.heart {
  position: fixed; font-size: 14px;
  animation: heartRise linear infinite;
  z-index: 1; pointer-events: none;
  filter: drop-shadow(0 0 6px rgba(255,100,150,0.5));
}
@keyframes heartRise {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.3); opacity: 0; }
  8% { opacity: 0.8; }
  92% { opacity: 0.6; }
  100% { transform: translateY(-8vh) rotate(30deg) scale(1); opacity: 0; }
}

/* === 星星闪烁 === */
.star {
  position: fixed; width: 3px; height: 3px;
  background: #fff;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 4px rgba(255,200,220,0.8);
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* === 速度线 === */
.speed-line {
  position: fixed; width: 60px; height: 1.5px;
  background: linear-gradient(to right, transparent, rgba(255,180,200,0.5), transparent);
  border-radius: 2px; animation: speedLine linear infinite;
  z-index: 2; pointer-events: none;
}
@keyframes speedLine {
  0% { transform: translateX(-80px); opacity: 0; }
  20% { opacity: 0.6; }
  80% { opacity: 0.5; }
  100% { transform: translateX(100vw); opacity: 0; }
}

/* === 卡片包装 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 30px;
  background: linear-gradient(135deg, #ff6b9d, #c44569, #ff6b9d, #e84a7f, #c44569);
  background-size: 300% 300%;
  animation: borderPulse 4s ease infinite;
  z-index: 10;
}
@keyframes borderPulse {
  0% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(255,107,157,0.4); }
  50% { background-position: 100% 50%; box-shadow: 0 0 35px rgba(255,107,157,0.6); }
  100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(255,107,157,0.4); }
}

/* === 卡片主体 === */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px) saturate(1.3);
  -webkit-backdrop-filter: blur(12px) saturate(1.3);
  border-radius: 27px;
  padding: 48px 52px;
  text-align: center;
  max-width: 500px;
  width: 88vw;
  border: 1px solid rgba(255,180,200,0.25);
  box-shadow: 0 16px 48px rgba(160,50,90,0.25), inset 0 0 40px rgba(255,150,180,0.08);
  animation: cardFloat 4s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.3deg); }
  50% { transform: translateY(-8px) rotate(0.3deg); }
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,200,220,0.12) 0%, transparent 60%);
  animation: shimmer 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(8%, 8%); }
}

/* 图标 */
.card-icon {
  font-size: 40px; display: block; margin-bottom: 14px;
  animation: iconBounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 10px rgba(255,100,150,0.4));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  25% { transform: scale(1.12) translateY(-5px); }
  50% { transform: scale(0.96) translateY(0); }
  75% { transform: scale(1.06) translateY(-2px); }
}

/* === 文字 === */
.name {
  font-size: clamp(26px, 7vw, 48px);
  color: #ffd0e0; letter-spacing: 6px; margin-bottom: 12px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
  text-shadow: 0 2px 12px rgba(255,100,150,0.4);
}
.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: #e8a0b8; letter-spacing: 4px; margin-bottom: 28px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;
}
.blessing {
  font-size: clamp(15px, 3.5vw, 20px);
  color: #ffc0d0; line-height: 1.85; letter-spacing: 1.5px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
}
.from {
  font-size: clamp(11px, 2vw, 14px);
  color: #d898b0; margin-top: 22px; letter-spacing: 3px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* === 装饰爱心 === */
.decor-heart {
  position: fixed; font-size: 12px;
  animation: decorFloat ease-in-out infinite;
  z-index: 3; pointer-events: none;
  opacity: 0.7;
}
@keyframes decorFloat {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-12px) rotate(10deg); }
}

/* === 背景气泡 === */
.bubble {
  position: fixed; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), rgba(255,200,220,0.15));
  animation: bubbleRise linear infinite;
  z-index: 1; pointer-events: none;
}
@keyframes bubbleRise {
  0% { transform: translateY(100vh) scale(0.4); opacity: 0; }
  10% { opacity: 0.5; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-8vh) scale(0.9); opacity: 0; }
}

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .heart, .star, .speed-line, .bubble, .decor-heart { animation: none; }
  .card-wrap { animation: none; }
  .card { animation: none; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">💕</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '遇见你，是最美的意外';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 飘浮爱心
const hearts = ['💕', '💗', '💖', '💓', '💝', '❤️', '💘'];
for (let i = 0; i < 18; i++) {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.animationDuration = (5 + Math.random() * 5) + 's';
  h.style.animationDelay = Math.random() * 7 + 's';
  h.style.fontSize = (10 + Math.random() * 10) + 'px';
  document.body.appendChild(h);
}

// 星星
for (let i = 0; i < 25; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
  s.style.animationDelay = Math.random() * 4 + 's';
  document.body.appendChild(s);
}

// 速度线
for (let i = 0; i < 4; i++) {
  const line = document.createElement('div');
  line.className = 'speed-line';
  line.style.top = (15 + Math.random() * 70) + 'vh';
  line.style.animationDuration = (2.5 + Math.random() * 2) + 's';
  line.style.animationDelay = Math.random() * 5 + 's';
  document.body.appendChild(line);
}

// 背景气泡
for (let i = 0; i < 8; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  b.style.left = Math.random() * 100 + 'vw';
  b.style.width = b.style.height = (5 + Math.random() * 12) + 'px';
  b.style.animationDuration = (7 + Math.random() * 5) + 's';
  b.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(b);
}

// 固定装饰爱心
const decorPositions = [
  {l: 5, t: 15}, {l: 92, t: 22}, {l: 8, t: 75}, {l: 88, t: 80}
];
decorPositions.forEach((pos, i) => {
  const d = document.createElement('div');
  d.className = 'decor-heart';
  d.textContent = hearts[i % hearts.length];
  d.style.left = pos.l + 'vw';
  d.style.top = pos.t + 'vh';
  d.style.animationDuration = (3 + i * 0.5) + 's';
  d.style.animationDelay = (i * 0.7) + 's';
  document.body.appendChild(d);
});
</script>
</body>
</html>
