<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送别祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(170deg, #1a0a2e 0%, #2d1b4e 20%, #5c3d6e 45%, #c47c5a 70%, #e8a87c 88%, #f5c49c 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 日落光芒 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 50% 85%, rgba(255,180,80,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 70%, rgba(255,140,60,0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 70% 75%, rgba(255,200,120,0.12) 0%, transparent 40%);
  animation: sunsetGlow 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes sunsetGlow {
  0%, 100% { opacity: 0.8; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

/* 羽毛飘落 */
.feather {
  position: fixed;
  font-size: 14px;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.1));
  animation: featherFall linear infinite;
}
@keyframes featherFall {
  0% { transform: translateY(-8vh) translateX(0) rotate(0deg) scale(0.8); opacity: 0; }
  10% { opacity: 0.85; }
  50% { transform: translateY(50vh) translateX(40px) rotate(180deg) scale(1); }
  85% { opacity: 0.5; }
  100% { transform: translateY(108vh) translateX(-20px) rotate(360deg) scale(0.9); opacity: 0; }
}

/* 纸飞机 */
.airplane {
  position: fixed;
  font-size: 16px;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.12));
  animation: airplaneFly linear infinite;
}
@keyframes airplaneFly {
  0% { transform: translate(0, 0) rotate(-15deg) scale(0.7); opacity: 0; }
  8% { opacity: 0.9; }
  60% { transform: translate(35vw, -20vh) rotate(10deg) scale(1); opacity: 0.7; }
  90% { opacity: 0.2; }
  100% { transform: translate(90vw, -5vh) rotate(5deg) scale(0.8); opacity: 0; }
}

/* 漂浮光点 */
.glow-dot {
  position: fixed;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255,220,150,0.7);
  animation: dotFloat ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes dotFloat {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
  50% { transform: translateY(-25px) scale(1.4); opacity: 0.9; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 32px;
  background: linear-gradient(135deg, #e8a87c, #c47c5a, #e8a87c, #d4906a);
  background-size: 400% 400%;
  animation: sunsetBorder 5s ease infinite;
  box-shadow: 0 8px 36px rgba(200,100,60,0.32), 0 0 55px rgba(255,180,120,0.15);
}
@keyframes sunsetBorder {
  0% { background-position: 0% 50%; box-shadow: 0 8px 36px rgba(200,100,60,0.32), 0 0 45px rgba(255,180,120,0.1); }
  50% { background-position: 100% 50%; box-shadow: 0 8px 44px rgba(210,110,70,0.4), 0 0 75px rgba(255,190,130,0.22); }
  100% { background-position: 0% 50%; box-shadow: 0 8px 36px rgba(200,100,60,0.32), 0 0 45px rgba(255,180,120,0.1); }
}

.card {
  background: rgba(255,252,248,0.9);
  border-radius: 30px;
  padding: clamp(36px, 7vw, 52px) clamp(28px, 6vw, 44px);
  text-align: center;
  max-width: min(500px, 92vw);
  width: 100%;
  box-shadow: 0 12px 40px rgba(180,80,50,0.15), inset 0 0 28px rgba(255,220,180,0.25);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.4deg); }
  50% { transform: translateY(-7px) rotate(0.4deg); }
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,220,180,0.2) 0%, transparent 60%);
  animation: shimmer 6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(8%, 8%); }
}

/* 图标 */
.card-icon {
  font-size: clamp(46px, 10vw, 68px);
  display: block;
  margin-bottom: 14px;
  animation: iconBounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(200,100,60,0.3));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  30% { transform: scale(1.12) translateY(-4px); }
  60% { transform: scale(0.96) translateY(0); }
  80% { transform: scale(1.06) translateY(-2px); }
}

/* 名字 */
.name {
  font-size: clamp(28px, 7.5vw, 50px);
  color: #7a3826;
  letter-spacing: 5px;
  margin-bottom: 12px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 日期 */
.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: #a06040;
  letter-spacing: 3px;
  margin-bottom: 28px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.48s both;
}

/* 祝福语 */
.blessing {
  font-size: clamp(15px, 3.5vw, 20px);
  color: #5a3020;
  line-height: 1.9;
  letter-spacing: 1.5px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.65s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 2.8vw, 16px);
  color: #a07050;
  letter-spacing: 2px;
  margin-top: 28px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.82s both;
}

/* 装饰：纸飞机轨迹 */
.card::after {
  content: '✈';
  position: absolute;
  top: 12px; right: 16px;
  font-size: clamp(20px, 4vw, 28px);
  opacity: 0.15;
  animation: planeTrail 4s ease-in-out infinite;
}
@keyframes planeTrail {
  0%, 100% { transform: translate(0, 0) rotate(-20deg); opacity: 0.12; }
  50% { transform: translate(8px, -6px) rotate(-10deg); opacity: 0.2; }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .feather, .airplane, .glow-dot, .card-wrap, .card, .card-icon, .name, .date, .blessing, .from { animation: none !important; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">🛫</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你前路坦荡，一路平安';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.feather, .airplane, .glow-dot').forEach(el => el.remove());
}

// 生成羽毛
const featherEmojis = ['🪶', '🍃', '🌿'];
for (let i = 0; i < 14; i++) {
  const f = document.createElement('div');
  f.className = 'feather';
  f.textContent = featherEmojis[i % featherEmojis.length];
  f.style.left = Math.random() * 100 + 'vw';
  f.style.animationDuration = (7 + Math.random() * 7) + 's';
  f.style.animationDelay = (Math.random() * 10) + 's';
  f.style.fontSize = (11 + Math.random() * 8) + 'px';
  document.body.appendChild(f);
}

// 生成纸飞机
for (let i = 0; i < 4; i++) {
  const a = document.createElement('div');
  a.className = 'airplane';
  a.textContent = '✈';
  a.style.top = (20 + Math.random() * 50) + 'vh';
  a.style.left = '-10vw';
  a.style.animationDuration = (8 + Math.random() * 6) + 's';
  a.style.animationDelay = (2 + Math.random() * 8) + 's';
  a.style.fontSize = (12 + Math.random() * 8) + 'px';
  document.body.appendChild(a);
}

// 生成漂浮光点
for (let i = 0; i < 12; i++) {
  const d = document.createElement('div');
  d.className = 'glow-dot';
  d.style.left = Math.random() * 100 + 'vw';
  d.style.top = Math.random() * 100 + 'vh';
  d.style.animationDuration = (4 + Math.random() * 4) + 's';
  d.style.animationDelay = (Math.random() * 5) + 's';
  document.body.appendChild(d);
}
</script>
</body>
</html>
