<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晨露花园</title>
<meta property="og:title" content="🌸 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --dew-morning: #e8f4f0;
  --dew-sky: #d0e8f0;
  --dew-green: #a8d8b9;
  --dew-mint: #b8e8d0;
  --petal-pink: #f4c8d0;
  --petal-soft: #fce0e8;
  --rose-gold: #e8b8c8;
  --text-forest: #3a6a5a;
  --card-bg: rgba(255, 255, 255, 0.82);
  --glow-dew: rgba(180, 230, 210, 0.6);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #e8f4f0 0%,
    #d8eee4 20%,
    #d0e8f0 40%,
    #c8e0e8 60%,
    #c0d8e0 80%,
    #b8d0d8 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 晨光柔光 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 10%, rgba(255, 250, 230, 0.5) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 20%, rgba(255, 240, 220, 0.3) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* 花瓣飘落 */
@keyframes petalFall {
  0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(105vh) rotate(540deg) translateX(var(--drift)); opacity: 0; }
}

.petal {
  position: fixed;
  top: -30px;
  font-size: clamp(12px, 3vw, 18px);
  z-index: 1;
  pointer-events: none;
  animation: petalFall var(--duration) var(--ease) var(--delay) infinite;
  --drift: 30px;
}

/* 露珠 */
@keyframes dewDrop {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.85; }
  50% { transform: translateY(-6px) scale(1.08); opacity: 1; }
}

.dew {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%,
    rgba(255, 255, 255, 0.95) 0%,
    rgba(200, 235, 225, 0.7) 40%,
    rgba(150, 210, 190, 0.4) 70%,
    rgba(120, 190, 170, 0.2) 100%);
  box-shadow:
    inset 0 1px 2px rgba(255, 255, 255, 0.9),
    0 2px 8px rgba(150, 210, 190, 0.4),
    0 4px 16px rgba(100, 180, 160, 0.2);
  z-index: 1;
  pointer-events: none;
  animation: dewDrop var(--dur) ease-in-out var(--d) infinite;
}

/* 露珠光点闪烁 */
@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0); }
  50% { opacity: 1; transform: scale(1); }
}

.sparkle {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, rgba(255,255,200,0.8) 50%, transparent 100%);
  z-index: 2;
  pointer-events: none;
  animation: sparkle 2s ease-in-out var(--d) infinite;
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 24px;
  background: linear-gradient(135deg, #a8d8b9, #f4c8d0, #b8e8d0, #e8b8c8);
  background-size: 300% 300%;
  animation: borderBreath 5s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(168, 216, 185, 0.4),
    0 8px 32px rgba(100, 180, 160, 0.25);
}

@keyframes borderBreath {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(168, 216, 185, 0.4), 0 8px 32px rgba(100, 180, 160, 0.25); }
  50% { background-position: 100% 50%; box-shadow: 0 0 30px rgba(244, 200, 208, 0.5), 0 8px 32px rgba(232, 184, 200, 0.3); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: clamp(28px, 7vw, 48px) clamp(24px, 6vw, 48px);
  text-align: center;
  max-width: 90vw;
  width: 420px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 40%);
  pointer-events: none;
  border-radius: 22px;
}

.icon-emoji {
  font-size: clamp(36px, 9vw, 56px);
  display: block;
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

@keyframes iconDrop {
  from { transform: translateY(-40px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.name {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: 700;
  color: var(--text-forest);
  margin-bottom: 12px;
  letter-spacing: 2px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.3s both;
  text-shadow: 0 2px 8px rgba(58, 106, 90, 0.15);
}

.blessing {
  font-size: clamp(14px, 4vw, 18px);
  color: var(--text-forest);
  line-height: 1.8;
  margin-bottom: 14px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.5s both;
}

.date {
  font-size: clamp(11px, 3vw, 14px);
  color: rgba(58, 106, 90, 0.55);
  letter-spacing: 2px;
  margin-bottom: 6px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.8s both;
}

.from {
  font-size: clamp(11px, 3vw, 14px);
  color: rgba(58, 106, 90, 0.5);
  font-style: italic;
  opacity: 1;
  animation: textIn 1.2s ease-out 1.0s both;
}

@keyframes textIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 小花装饰 */
.flower-deco {
  position: fixed;
  font-size: clamp(10px, 2.5vw, 14px);
  z-index: 1;
  pointer-events: none;
  animation: floatUp 6s ease-in-out infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0%, 100% { transform: translateY(0) rotate(var(--rot)); }
  50% { transform: translateY(-12px) rotate(calc(var(--rot) + 8deg)); }
}

/* 叶子飘落 */
@keyframes leafDrift {
  0% { transform: translateY(-30px) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% { transform: translateY(105vh) rotate(360deg) translateX(var(--dx)); opacity: 0; }
}

.leaf {
  position: fixed;
  top: -30px;
  z-index: 1;
  pointer-events: none;
  animation: leafDrift var(--dur) linear var(--delay) infinite;
}

@media (prefers-reduced-motion: reduce) {
  .petal, .dew, .sparkle, .card-wrap, .name, .blessing, .date, .from, .icon-emoji, .flower-deco, .leaf {
    animation: none !important;
  }
}
</style>
</head>
<body>

<script>
// 花瓣飘落
function createPetals() {
  const petals = ['🌸', '💮', '🩷', '🌷', '💐'];
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    const x = Math.random() * 100;
    const dur = 6 + Math.random() * 6;
    const delay = Math.random() * 8;
    const drift = (Math.random() - 0.5) * 80;
    const ease = Math.random() > 0.5 ? 'ease-in-out' : 'ease-in';
    p.style.cssText = `
      left: ${x}%;
      --duration: ${dur}s;
      --delay: ${delay}s;
      --ease: ${ease};
      --drift: ${drift}px;
      font-size: ${10 + Math.random() * 10}px;
    `;
    document.body.appendChild(p);
  }
}

// 露珠
function createDews() {
  const positions = [
    {l: 5, t: 8, s: 12}, {l: 88, t: 12, s: 10}, {l: 15, t: 70, s: 14},
    {l: 78, t: 65, s: 11}, {l: 50, t: 5, s: 9}, {l: 92, t: 40, s: 13},
    {l: 3, t: 45, s: 8}, {l: 60, t: 82, s: 12}, {l: 35, t: 88, s: 10},
    {l: 72, t: 90, s: 9}, {l: 25, t: 15, s: 11}, {l: 85, t: 28, s: 8},
    {l: 45, t: 35, s: 7}, {l: 10, t: 92, s: 10}, {l: 68, t: 18, s: 9},
  ];
  positions.forEach((pos, i) => {
    const d = document.createElement('div');
    d.className = 'dew';
    d.style.cssText = `
      left: ${pos.l}%;
      top: ${pos.t}%;
      width: ${pos.s}px;
      height: ${pos.s}px;
      --dur: ${2 + Math.random() * 2}s;
      --d: ${Math.random() * 3}s;
    `;
    document.body.appendChild(d);

    // 配套光点
    if (i % 3 === 0) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.cssText = `
        left: ${pos.l + 1}%;
        top: ${pos.t + 1}%;
        --d: ${Math.random() * 2}s;
      `;
      document.body.appendChild(s);
    }
  });
}

// 小花装饰
function createFlowers() {
  const flowers = ['🌼', '🌻', '🌺', '🪻', '✨'];
  for (let i = 0; i < 6; i++) {
    const f = document.createElement('div');
    f.className = 'flower-deco';
    f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
    const x = 5 + Math.random() * 88;
    const y = 10 + Math.random() * 75;
    const rot = (Math.random() - 0.5) * 30;
    f.style.cssText = `
      left: ${x}%;
      top: ${y}%;
      --rot: ${rot}deg;
      animation-delay: ${Math.random() * 4}s;
    `;
    document.body.appendChild(f);
  }
}

// 叶子飘落
function createLeaves() {
  const leafEmojis = ['🍃', '🍂', '☘️'];
  for (let i = 0; i < 5; i++) {
    const l = document.createElement('div');
    l.className = 'leaf';
    l.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
    const x = Math.random() * 100;
    const dur = 8 + Math.random() * 5;
    const delay = Math.random() * 6;
    const dx = (Math.random() - 0.5) * 100;
    l.style.cssText = `
      left: ${x}%;
      --dur: ${dur}s;
      --delay: ${delay}s;
      --dx: ${dx}px;
      font-size: ${12 + Math.random() * 8}px;
    `;
    document.body.appendChild(l);
  }
}

// URL参数
const p = new URLSearchParams(location.search);
const nameEl = document.getElementById('nameEl');
const dateEl = document.getElementById('dateEl');
const blessingEl = document.getElementById('blessingEl');
const fromEl = document.getElementById('fromEl');
if (nameEl) nameEl.textContent = p.get('n') || '亲爱的你';
if (dateEl) dateEl.textContent = p.get('d') || '';
if (blessingEl) blessingEl.textContent = p.get('b') || '晨露晶莹，愿你如花朵般绽放每一天';
if (fromEl) fromEl.textContent = p.get('f') ? '— ' + p.get('f') : '';

createPetals();
createDews();
createFlowers();
createLeaves();
</script>

<div class="card-wrap">
  <div class="card">
    <span class="icon-emoji">🌸</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>
</body>
</html>
