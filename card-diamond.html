<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金婚钻石婚纪念</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0a0515 0%, #1a0a30 40%, #0d0520 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 浪漫光晕 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(220,150,255,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 30%, rgba(180,80,200,0.1) 0%, transparent 40%),
    radial-gradient(ellipse at 70% 30%, rgba(255,150,200,0.08) 0%, transparent 40%);
  z-index: 0;
  pointer-events: none;
  animation: romGlow 5s ease-in-out infinite;
}
@keyframes romGlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* 钻石粒子 */
.diamond-particle {
  position: fixed;
  width: 4px; height: 4px;
  background: #fff;
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  animation: diamondSparkle ease-in-out infinite;
  z-index: 1;
}
@keyframes diamondSparkle {
  0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(45deg); }
}

/* 爱心飘落 */
.heart-float {
  position: fixed;
  font-size: 14px;
  animation: heartRise ease-out forwards;
  z-index: 2;
  opacity: 0;
}
@keyframes heartRise {
  0% { transform: translateY(105vh) rotate(-20deg) scale(0.5); opacity: 0; }
  15% { opacity: 0.8; }
  80% { opacity: 0.5; }
  100% { transform: translateY(-10vh) rotate(15deg) scale(0.8); opacity: 0; }
}

/* 金色光丝 */
.gold-thread {
  position: fixed;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.6), transparent);
  animation: threadShine linear infinite;
  z-index: 1;
}
@keyframes threadShine {
  0% { opacity: 0; transform: translateX(-20%) scaleX(0.3); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: translateX(120%) scaleX(1.5); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 22px;
  background: linear-gradient(135deg, #ffd700, #c8a870, #ffd700, #e8c878, #ffd700);
  background-size: 400% 400%;
  animation: goldBorder 4s ease infinite;
  box-shadow:
    0 0 30px rgba(255,215,0,0.4),
    0 0 60px rgba(200,168,112,0.2);
}
@keyframes goldBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: linear-gradient(160deg, #100820 0%, #1e0a38 50%, #120a28 100%);
  border-radius: 20px;
  padding: clamp(28px, 7vw, 52px) clamp(24px, 6vw, 48px);
  text-align: center;
  max-width: 90vw;
  width: 460px;
  position: relative;
  overflow: hidden;
}

/* 顶部钻石图标 */
.diamond-icon {
  font-size: clamp(36px, 10vw, 58px);
  display: block;
  margin-bottom: 10px;
  animation: iconPop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 14px rgba(255,215,0,0.5));
}
@keyframes iconPop {
  from { opacity: 0; transform: scale(0.3) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.tag {
  display: inline-block;
  background: linear-gradient(135deg, #ffd700, #c8a870);
  color: #2a1a00;
  font-size: clamp(11px, 2.5vw, 13px);
  font-weight: bold;
  padding: 4px 16px;
  border-radius: 20px;
  margin-bottom: 14px;
  letter-spacing: 2px;
  font-family: 'Arial', sans-serif;
  opacity: 1;
  animation: slideUp 1s ease-out 0.3s both;
}

.name {
  font-size: clamp(28px, 8vw, 54px);
  font-weight: bold;
  background: linear-gradient(135deg, #ffd700, #fff8d0, #ffd700, #ffe080);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out both;
  line-height: 1.2;
}
.blessing {
  font-size: clamp(14px, 3.8vw, 21px);
  color: rgba(240,220,255,0.9);
  line-height: 1.7;
  margin-bottom: 16px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.15s both;
}
.date {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(220,200,255,0.65);
  margin-bottom: 8px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.3s both;
  letter-spacing: 1px;
}
.from {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(220,200,255,0.6);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
  font-style: italic;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的';
const blessing = p.get('b') || '岁月相伴，与子成说\n愿你们白头偕老，福寿安康';
const date = p.get('d') || '';
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').innerHTML = blessing.replace(/\n/g, '<br>');
document.getElementById('dateEl').textContent = date;
document.getElementById('fromEl').textContent = from ? '— ' + from : '';

// 钻石粒子
for (let i = 0; i < 30; i++) {
  const d = document.createElement('div');
  d.className = 'diamond-particle';
  d.style.cssText = `
    left: ${Math.random()*100}vw;
    top: ${Math.random()*100}vh;
    animation-duration: ${2+Math.random()*3}s;
    animation-delay: ${Math.random()*5}s;
    width: ${2+Math.random()*5}px;
    height: ${2+Math.random()*5}px;
  `;
  document.body.appendChild(d);
}

// 爱心飘落
const heartIcons = ['💕','💗','💖','💝','💞'];
for (let i = 0; i < 10; i++) {
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = heartIcons[i % heartIcons.length];
  h.style.cssText = `
    left: ${5+Math.random()*88}%;
    animation-duration: ${5+Math.random()*4}s;
    animation-delay: ${Math.random()*6}s;
    font-size: ${10+Math.random()*12}px;
  `;
  document.body.appendChild(h);
}

// 金色光丝
for (let i = 0; i < 5; i++) {
  const t = document.createElement('div');
  t.className = 'gold-thread';
  t.style.cssText = `
    top: ${10+Math.random()*80}%;
    width: ${100+Math.random()*200}px;
    left: ${-200+Math.random()*50}px;
    animation-duration: ${2+Math.random()*2}s;
    animation-delay: ${Math.random()*5}s;
  `;
  document.body.appendChild(t);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.diamond-particle,.heart-float,.gold-thread').forEach(e => e.remove());
}
</script>

<div class="card-wrap">
  <div class="card">
    <span class="diamond-icon">💎</span>
    <div class="tag">💛 金婚钻石纪念</div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
