<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>端午祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(175deg, #0d3b2e 0%, #1a5c3a 30%, #2d7a4e 60%, #3d9460 100%);
  font-family: 'Georgia', 'Songti SC', 'SimSun', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 背景艾草光斑 === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 25%, rgba(80,180,100,0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 75%, rgba(40,140,80,0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(100,200,120,0.08) 0%, transparent 55%);
  animation: bgBreath 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes bgBreath {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.03); }
}

/* === 竹叶飘落 === */
.bamboo-leaf {
  position: fixed;
  font-size: 14px;
  animation: leafFall linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}
@keyframes leafFall {
  0% { transform: translateY(-30px) rotate(0deg) translateX(0); opacity: 0; }
  8% { opacity: 0.85; }
  90% { opacity: 0.85; }
  100% { transform: translateY(100vh) rotate(180deg) translateX(80px); opacity: 0; }
}

/* === 粽子漂浮 === */
.zongzi {
  position: fixed;
  font-size: 32px;
  animation: zongziFloat ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}
@keyframes zongziFloat {
  0%, 100% { transform: translateY(0px) rotate(-3deg); }
  50% { transform: translateY(-12px) rotate(3deg); }
}

/* === 咸蛋黄光点 === */
.yolk-dot {
  position: fixed;
  width: 6px; height: 6px;
  background: radial-gradient(circle at 35% 35%, #ffe066, #e6a800);
  border-radius: 50%;
  animation: yolkRise linear infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 8px rgba(255,200,0,0.6);
}
@keyframes yolkRise {
  0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
  10% { opacity: 0.9; }
  85% { opacity: 0.9; }
  100% { transform: translateY(-5vh) scale(1); opacity: 0; }
}

/* === 边框脉冲 === */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg, #a8e6cf, #56ab2f, #a8e6cf, #56ab2f);
  background-size: 300% 300%;
  animation: borderFlow 4s ease-in-out infinite;
  box-shadow: 0 0 24px rgba(86,171,47,0.4), 0 0 48px rgba(86,171,47,0.2);
}
@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 24px rgba(86,171,47,0.4), 0 0 48px rgba(86,171,47,0.2); }
  50% { background-position: 100% 50%; box-shadow: 0 0 36px rgba(86,171,47,0.6), 0 0 72px rgba(86,171,47,0.3); }
}

/* === 卡片主体 === */
.card {
  position: relative;
  background: linear-gradient(165deg, rgba(240,250,240,0.95), rgba(220,245,225,0.92));
  border-radius: 22px;
  padding: clamp(28px, 7vw, 56px) clamp(24px, 6vw, 48px);
  max-width: 520px;
  width: 90vw;
  text-align: center;
  box-shadow: inset 0 2px 12px rgba(255,255,255,0.4), 0 8px 32px rgba(0,0,0,0.15);
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(86,171,47,0.05) 100%);
  border-radius: 22px;
  pointer-events: none;
}

/* === 顶部粽子图标 === */
.card-icon {
  font-size: clamp(40px, 10vw, 64px);
  margin-bottom: 12px;
  display: block;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-40px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* === 名字 === */
.name {
  font-size: clamp(22px, 6vw, 38px);
  font-weight: bold;
  color: #2d5a30;
  margin-bottom: 8px;
  letter-spacing: 0.08em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
  text-shadow: 0 1px 4px rgba(86,171,47,0.2);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === 祝福语 === */
.blessing {
  font-size: clamp(16px, 4.5vw, 24px);
  color: #3d6b40;
  line-height: 1.7;
  margin: 16px 0;
  padding: 0 8px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.7s both;
}

/* === 日期 === */
.date {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #5a8a5c;
  letter-spacing: 0.12em;
  margin-bottom: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
}

/* === 署名 === */
.from {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #4a7a4e;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}

/* === 底部装饰文字 === */
.card-footer {
  margin-top: 18px;
  font-size: clamp(11px, 2.8vw, 14px);
  color: #7aaa7e;
  letter-spacing: 0.15em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.3s both;
}

/* === 粽子小图标装饰 === */
.zongzi-deco {
  position: absolute;
  font-size: 18px;
  opacity: 0.18;
  pointer-events: none;
  z-index: 0;
}
.zongzi-deco:nth-child(1) { top: 12%; left: 8%; transform: rotate(-15deg); }
.zongzi-deco:nth-child(2) { top: 20%; right: 10%; transform: rotate(20deg); }
.zongzi-deco:nth-child(3) { bottom: 18%; left: 6%; transform: rotate(10deg); }
.zongzi-deco:nth-child(4) { bottom: 12%; right: 8%; transform: rotate(-20deg); }

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .bamboo-leaf, .zongzi, .yolk-dot { animation: none; opacity: 0.5; }
  .card-icon, .name, .blessing, .date, .from, .card-footer { animation: none; }
  .card-wrap { animation: none; }
}
</style>
</head>
<body>

<!-- 竹叶飘落 -->
<script>
(function(){
  const leafCount = 12;
  const leaves = ['\u2618','\u2618','\u2618'];
  for(let i=0; i<leafCount; i++){
    const leaf = document.createElement('div');
    leaf.className = 'bamboo-leaf';
    leaf.textContent = leaves[i % leaves.length];
    leaf.style.left = Math.random() * 100 + 'vw';
    leaf.style.fontSize = (8 + Math.random() * 10) + 'px';
    leaf.style.color = `hsl(${120 + Math.random() * 30}, ${60 + Math.random()*20}%, ${35 + Math.random()*20}%)`;
    leaf.style.animationDuration = (6 + Math.random() * 5) + 's';
    leaf.style.animationDelay = Math.random() * 8 + 's';
    document.body.appendChild(leaf);
  }

  // 粽子漂浮
  const zongziCount = 5;
  const zongziImgs = ['\u{1F95E}','\u{1F95E}','\u{1F95E}'];
  for(let i=0; i<zongziCount; i++){
    const z = document.createElement('div');
    z.className = 'zongzi';
    z.textContent = zongziImgs[i % zongziImgs.length];
    z.style.left = Math.random() * 100 + 'vw';
    z.style.top = Math.random() * 100 + 'vh';
    z.style.animationDuration = (3 + Math.random() * 2) + 's';
    z.style.animationDelay = Math.random() * 4 + 's';
    z.style.opacity = 0.15 + Math.random() * 0.2;
    document.body.appendChild(z);
  }

  // 咸蛋黄光点
  const dotCount = 10;
  for(let i=0; i<dotCount; i++){
    const dot = document.createElement('div');
    dot.className = 'yolk-dot';
    dot.style.left = Math.random() * 100 + 'vw';
    dot.style.animationDuration = (4 + Math.random() * 4) + 's';
    dot.style.animationDelay = Math.random() * 6 + 's';
    document.body.appendChild(dot);
  }

  // URL参数
  const p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '端午节安康';
  document.getElementById('blessingEl').textContent = p.get('b') || '粽香飘满堂，艾草挂门旁，愿你端午安康，幸福绵长';
  const d = p.get('d');
  document.getElementById('dateEl').textContent = d ? '\u7b1b\u5370\u5df4\u5c71 \u00b7 ' + d : '\u7b1b\u5370\u5df4\u5c71';
  document.getElementById('fromEl').textContent = p.get('f') ? '\u2014 ' + p.get('f') : '';
})();
</script>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="zongzi-deco">\u{1F95E}</span>
    <span class="zongzi-deco">\u{1F95E}</span>
    <span class="zongzi-deco">\u{1F95E}</span>
    <span class="zongzi-deco">\u{1F95E}</span>

    <span class="card-icon">\u{1F95E}</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="card-footer">\u00b7 \u00b7 \u00b7 \u00b7 \u00b7 \u00b7</div>
  </div>
</div>

</body>
</html>
