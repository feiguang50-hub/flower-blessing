<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦境泡泡</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --dream-purple: #9b59b6;
  --dream-blue: #3498db;
  --dream-pink: #e91e8a;
  --dream-soft: #f8e8ff;
  --bubble-hue: 280;
  --text-light: #f0e6ff;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #1a0a2e 0%,
    #2d1b4e 25%,
    #4a2c6a 50%,
    #6b3fa0 75%,
    #9b59b6 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 梦幻光晕 */
body::before {
  content: '';
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 80vw; height: 80vh;
  background: radial-gradient(ellipse, rgba(155,89,182,0.2) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: dreamPulse 5s ease-in-out infinite;
}

@keyframes dreamPulse {
  0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
}

/* 星星背景 */
.stars {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

.star:nth-child(1) { width: 3px; height: 3px; top: 8%; left: 15%; animation-duration: 2.5s; }
.star:nth-child(2) { width: 2px; height: 2px; top: 12%; left: 45%; animation-duration: 3.1s; animation-delay: 0.5s; }
.star:nth-child(3) { width: 4px; height: 4px; top: 5%; left: 70%; animation-duration: 2.8s; animation-delay: 1s; }
.star:nth-child(4) { width: 2px; height: 2px; top: 20%; left: 85%; animation-duration: 3.3s; animation-delay: 0.3s; }
.star:nth-child(5) { width: 3px; height: 3px; top: 25%; left: 25%; animation-duration: 2.6s; animation-delay: 1.5s; }
.star:nth-child(6) { width: 2px; height: 2px; top: 18%; left: 55%; animation-duration: 2.9s; animation-delay: 0.8s; }
.star:nth-child(7) { width: 3px; height: 3px; top: 30%; left: 8%; animation-duration: 3s; animation-delay: 2s; }
.star:nth-child(8) { width: 2px; height: 2px; top: 15%; left: 92%; animation-duration: 2.7s; animation-delay: 1.2s; }
.star:nth-child(9) { width: 4px; height: 4px; top: 35%; left: 40%; animation-duration: 3.2s; animation-delay: 0.6s; }
.star:nth-child(10) { width: 2px; height: 2px; top: 22%; left: 68%; animation-duration: 2.4s; animation-delay: 1.8s; }

/* 泡泡 */
.bubbles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 2;
  overflow: hidden;
}

.bubble {
  position: absolute;
  border-radius: 50%;
  animation: bubbleFloat linear infinite;
  opacity: 0;
}

/* 泡泡光泽效果 */
.bubble::before {
  content: '';
  position: absolute;
  top: 12%; left: 18%;
  width: 30%; height: 25%;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  filter: blur(1px);
}

.bubble::after {
  content: '';
  position: absolute;
  bottom: 15%; right: 20%;
  width: 18%; height: 15%;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  filter: blur(1px);
}

@keyframes bubbleFloat {
  0% { transform: translateY(105vh) scale(0.6); opacity: 0; }
  10% { opacity: 0.7; }
  85% { opacity: 0.4; }
  100% { transform: translateY(-15vh) scale(1.1) rotate(20deg); opacity: 0; }
}

/* 彩虹泡泡配色 */
.bubble:nth-child(1) { width: 28px; height: 28px; background: radial-gradient(circle at 35% 35%, rgba(255,182,193,0.7), rgba(255,105,180,0.5)); border: 1px solid rgba(255,255,255,0.3); left: 8%; animation-duration: 12s; animation-delay: 0s; }
.bubble:nth-child(2) { width: 40px; height: 40px; background: radial-gradient(circle at 35% 35%, rgba(173,216,230,0.7), rgba(100,149,237,0.5)); border: 1px solid rgba(255,255,255,0.3); left: 18%; animation-duration: 15s; animation-delay: 4s; }
.bubble:nth-child(3) { width: 22px; height: 22px; background: radial-gradient(circle at 35% 35%, rgba(221,160,221,0.7), rgba(186,85,211,0.5)); border: 1px solid rgba(255,255,255,0.3); left: 30%; animation-duration: 11s; animation-delay: 2s; }
.bubble:nth-child(4) { width: 35px; height: 35px; background: radial-gradient(circle at 35% 35%, rgba(255,218,185,0.7), rgba(255,160,122,0.5)); border: 1px solid rgba(255,255,255,0.3); left: 42%; animation-duration: 14s; animation-delay: 7s; }
.bubble:nth-child(5) { width: 25px; height: 25px; background: radial-gradient(circle at 35% 35%, rgba(144,238,144,0.7), rgba(60,179,113,0.5)); border: 1px solid rgba(255,255,255,0.3); left: 55%; animation-duration: 13s; animation-delay: 1s; }
.bubble:nth-child(6) { width: 45px; height: 45px; background: radial-gradient(circle at 35% 35%, rgba(255,255,224,0.7), rgba(255,215,0,0.5)); border: 1px solid rgba(255,255,255,0.3); left: 68%; animation-duration: 16s; animation-delay: 5s; }
.bubble:nth-child(7) { width: 30px; height: 30px; background: radial-gradient(circle at 35% 35%, rgba(175,238,238,0.7), rgba(0,206,209,0.5)); border: 1px solid rgba(255,255,255,0.3); left: 80%; animation-duration: 12s; animation-delay: 9s; }
.bubble:nth-child(8) { width: 20px; height: 20px; background: radial-gradient(circle at 35% 35%, rgba(255,181,181,0.7), rgba(220,120,120,0.5)); border: 1px solid rgba(255,255,255,0.3); left: 90%; animation-duration: 11s; animation-delay: 3s; }

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(400px, 90vw);
  min-height: 500px;
  background: rgba(30, 10, 50, 0.75);
  border-radius: 28px;
  padding: 44px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 2px solid rgba(200, 150, 255, 0.35);
  animation: cardFloat 5s ease-in-out infinite;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow:
    0 12px 40px rgba(100, 50, 150, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-10px) rotate(0.5deg); }
}

/* 紫色边框流光 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 30px;
  background: linear-gradient(135deg,
    rgba(155,89,182,0.6),
    rgba(52,152,219,0.4),
    rgba(233,30,138,0.4),
    rgba(155,89,182,0.6));
  background-size: 200% 200%;
  animation: purpleGlow 4s ease-in-out infinite;
  z-index: -1;
  opacity: 0.45;
}

@keyframes purpleGlow {
  0%, 100% { background-position: 0% 50%; opacity: 0.35; }
  50% { background-position: 100% 50%; opacity: 0.6; }
}

/* 图标 */
.icon {
  font-size: 52px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 16px rgba(200,150,255,0.5));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分隔线 */
.divider {
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(200,150,255,0.7), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字 */
.name {
  font-size: clamp(24px, 7vw, 42px);
  color: var(--text-light);
  font-weight: 700;
  text-align: center;
  letter-spacing: 3px;
  text-shadow: 0 2px 14px rgba(150,80,200,0.5);
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(240,230,255,0.7);
  letter-spacing: 4px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(14px, 4vw, 17px);
  color: rgba(240,230,255,0.88);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  font-style: italic;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(12px, 3.5vw, 14px);
  color: rgba(240,230,255,0.6);
  letter-spacing: 3px;
  margin-top: 4px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

/* 底部文字 */
.dream-text {
  position: absolute;
  bottom: 18px;
  font-size: 11px;
  color: rgba(200,150,255,0.5);
  letter-spacing: 2px;
  text-align: center;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .bubble, .star {
    animation: none;
  }
  .name, .date, .blessing, .from, .divider, .dream-text {
    opacity: 1;
  }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; min-height: 450px; }
  .bubble:nth-child(4), .bubble:nth-child(6) { display: none; }
}
</style>
</head>
<body>

<div class="stars">
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🫧</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="dream-text">梦境泡泡 · 童心永存</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的梦里也有彩虹泡泡，每一天醒来都带着微笑';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
