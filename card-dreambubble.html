<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦幻泡泡</title>
<meta property="og:title" content="🫧 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-top: #a8edea;
  --sky-bottom: #fed6e3;
  --bubble-pink: rgba(255,182,193,0.7);
  --bubble-blue: rgba(173,216,230,0.6);
  --bubble-gold: rgba(255,215,0,0.4);
  --text-pink: #c0607a;
  --text-rose: #8b4557;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #c9e8f5 0%,
    #b8dff0 20%,
    #d8b8e8 50%,
    #f5c6db 75%,
    #ffd6e8 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 柔和光晕 */
body::before {
  content: '';
  position: fixed;
  top: -30%; right: -20%;
  width: 70vw; height: 70vw;
  background: radial-gradient(circle, rgba(255,220,240,0.5) 0%, rgba(255,200,230,0.2) 40%, transparent 70%);
  animation: softGlow 6s ease-in-out infinite;
  z-index: 0; pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -20%; left: -15%;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(200,235,255,0.45) 0%, transparent 65%);
  animation: softGlow 6s ease-in-out infinite reverse;
  z-index: 0; pointer-events: none;
}
@keyframes softGlow {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

/* 泡泡 */
.bubble {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%,
    rgba(255,255,255,0.9),
    rgba(200,220,255,0.4) 40%,
    rgba(180,200,240,0.15) 70%,
    rgba(150,180,220,0.05) 100%);
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow:
    inset -3px -3px 8px rgba(255,255,255,0.4),
    inset 2px 2px 6px rgba(255,255,255,0.2),
    0 0 12px rgba(200,220,255,0.3);
  animation: bubbleRise linear infinite;
  opacity: 0;
  z-index: 1;
}
@keyframes bubbleRise {
  0% { transform: translateY(105vh) scale(0.6) rotate(0deg); opacity: 0; }
  8% { opacity: 0.75; }
  85% { opacity: 0.6; }
  100% { transform: translateY(-15vh) scale(1.1) rotate(20deg); opacity: 0; }
}

/* 小气泡群 */
.bubble-cluster {
  position: fixed;
  z-index: 2; pointer-events: none;
}
.bubble-mini {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.8), rgba(200,220,255,0.3));
  border: 1px solid rgba(255,255,255,0.5);
  animation: miniBubble linear infinite;
}
@keyframes miniBubble {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  100% { transform: translateY(-30px) scale(0.5); opacity: 0; }
}

/* 爱心上浮 */
.heart {
  position: fixed;
  font-size: 14px;
  animation: heartFloat ease-out forwards;
  opacity: 0; z-index: 2;
}
@keyframes heartFloat {
  0% { transform: translateY(10px) scale(0); opacity: 0; }
  20% { opacity: 0.8; transform: translateY(-10px) scale(1); }
  100% { transform: translateY(-80px) scale(0.6); opacity: 0; }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(400px, 90vw);
  min-height: 480px;
  background: rgba(255,255,255,0.55);
  border-radius: 28px;
  padding: 44px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 2px solid rgba(255,255,255,0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  animation: cardFloat 5s ease-in-out infinite;
  box-shadow:
    0 16px 48px rgba(200,100,130,0.15),
    0 4px 12px rgba(200,100,130,0.1),
    inset 0 1px 0 rgba(255,255,255,0.9);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-10px) rotate(0.5deg); }
}

/* 彩虹边框 */
.card::before {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 31px;
  background: linear-gradient(135deg,
    rgba(255,182,193,0.7),
    rgba(255,218,185,0.5),
    rgba(200,230,255,0.5),
    rgba(220,200,255,0.5),
    rgba(255,182,193,0.7));
  background-size: 300% 300%;
  animation: rainbowBorder 4s ease-in-out infinite;
  z-index: -1;
  opacity: 0.5;
}
@keyframes rainbowBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 泡泡图标 */
.icon {
  font-size: 50px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(200,150,170,0.4));
}
@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分隔线 */
.divider {
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(200,150,170,0.6), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字 */
.name {
  font-size: clamp(26px, 7vw, 44px);
  color: var(--text-rose);
  font-weight: 700;
  text-align: center;
  letter-spacing: 3px;
  text-shadow: 0 2px 12px rgba(200,100,130,0.2);
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(160,100,120,0.7);
  letter-spacing: 4px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(14px, 4vw, 17px);
  color: rgba(140,70,90,0.9);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  font-style: italic;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(12px, 3.5vw, 14px);
  color: rgba(160,100,120,0.6);
  letter-spacing: 3px;
  margin-top: 4px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

.bubble-text {
  position: absolute;
  bottom: 18px;
  font-size: 11px;
  color: rgba(160,100,120,0.45);
  letter-spacing: 2px;
  text-align: center;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card { animation: none; }
  .bubble { animation: none; opacity: 0.4; }
  .heart, .bubble-mini { animation: none; opacity: 0; }
  .name, .date, .blessing, .from, .divider, .bubble-text { opacity: 1; }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; min-height: 430px; }
}
</style>
</head>
<body>

<div class="bubble-cluster" id="cluster1">
  <div class="bubble-mini" style="left:0;top:0;width:8px;height:8px;animation-duration:2.5s;animation-delay:0s;"></div>
  <div class="bubble-mini" style="left:15px;top:5px;width:6px;height:6px;animation-duration:2s;animation-delay:0.5s;"></div>
  <div class="bubble-mini" style="left:30px;top:2px;width:10px;height:10px;animation-duration:3s;animation-delay:1s;"></div>
</div>
<div class="bubble-cluster" id="cluster2">
  <div class="bubble-mini" style="left:0;top:0;width:7px;height:7px;animation-duration:2.2s;animation-delay:2s;"></div>
  <div class="bubble-mini" style="left:12px;top:3px;width:5px;height:5px;animation-duration:1.8s;animation-delay:2.5s;"></div>
  <div class="bubble-mini" style="left:22px;top:0;width:9px;height:9px;animation-duration:2.8s;animation-delay:3s;"></div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🫧</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="bubble-text">梦幻泡泡 · 愿每一天都闪闪发光</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活像泡泡一样轻盈闪耀';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');

  // 大泡泡
  var bubbleColors = [
    'rgba(255,200,220,0.5)',
    'rgba(200,220,255,0.45)',
    'rgba(255,230,200,0.4)',
    'rgba(220,200,255,0.4)',
    'rgba(200,255,230,0.35)'
  ];
  for (var i = 0; i < 14; i++) {
    var b = document.createElement('div');
    b.className = 'bubble';
    var size = 18 + Math.random() * 40;
    b.style.cssText =
      'left:' + (3 + Math.random() * 90) + '%;' +
      'width:' + size + 'px;' +
      'height:' + size + 'px;' +
      'animation-duration:' + (7 + Math.random() * 7) + 's;' +
      'animation-delay:' + (Math.random() * 10) + 's;';
    document.body.appendChild(b);
  }

  // 爱心上浮
  var hearts = ['💕', '💗', '💖', '✨', '🌸'];
  for (var j = 0; j < 8; j++) {
    var h = document.createElement('div');
    h.className = 'heart';
    h.textContent = hearts[j % hearts.length];
    h.style.cssText =
      'left:' + (10 + Math.random() * 80) + '%;' +
      'bottom:' + (5 + Math.random() * 15) + '%;' +
      'animation-duration:' + (2 + Math.random() * 2) + 's;' +
      'animation-delay:' + (Math.random() * 5) + 's;';
    document.body.appendChild(h);
  }

  // 气泡群位置
  var c1 = document.getElementById('cluster1');
  c1.style.cssText = 'left:8%;top:15%;';
  var c2 = document.getElementById('cluster2');
  c2.style.cssText = 'right:10%;top:25%;';

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('.bubble,.heart').forEach(function(e){ e.remove(); });
  }
})();
</script>
</body>
</html>
