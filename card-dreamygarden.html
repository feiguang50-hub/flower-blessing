<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦幻花园</title>
<meta property="og:title" content="🌸 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #0d1a0f 0%,
    #112218 30%,
    #1a3025 60%,
    #0f1a12 100%
  );
  font-family: 'Noto Serif SC', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 月光 */
body::before {
  content: '';
  position: fixed;
  top: -10%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,250,230,0.15) 0%, rgba(255,250,230,0.05) 40%, transparent 70%);
  animation: moonPulse 6s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes moonPulse {
  0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
  50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
}

/* 背景光晕 */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 70%, rgba(100,200,120,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 30%, rgba(80,160,100,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(60,140,80,0.05) 0%, transparent 60%);
  z-index: 0;
  pointer-events: none;
}

/* 花瓣 */
.petal {
  position: fixed;
  font-size: 13px;
  animation: petalFall linear infinite;
  z-index: 2;
  pointer-events: none;
  filter: drop-shadow(0 0 6px rgba(255,180,160,0.3));
}
@keyframes petalFall {
  0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
  8% { opacity: 0.7; }
  90% { opacity: 0.4; }
  100% { transform: translateY(105vh) rotate(280deg) translateX(50px); opacity: 0; }
}

/* 萤火虫 */
.firefly {
  position: fixed;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffffaa, #aaff66);
  box-shadow: 0 0 8px 2px rgba(180,255,100,0.6);
  animation: fireflyGlow ease-in-out infinite;
  z-index: 3;
  pointer-events: none;
}
@keyframes fireflyGlow {
  0%, 100% { opacity: 0; transform: scale(0.3); }
  30% { opacity: 1; transform: scale(1); }
  70% { opacity: 0.8; transform: scale(0.8); }
}

/* 花园围栏装饰 */
.fence {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  display: flex;
  justify-content: center;
  gap: 8px;
  z-index: 1;
  pointer-events: none;
  opacity: 0.3;
}
.fence-post {
  width: 6px;
  height: 30px;
  background: linear-gradient(to bottom, #4a3020, #2a1810);
  border-radius: 2px 2px 0 0;
}
.fence-rail {
  position: absolute;
  width: 100%;
  height: 4px;
  background: linear-gradient(to right, transparent, #4a3020, #2a1810, #4a3020, transparent);
  left: 0;
}
.fence-rail.top { top: 4px; }
.fence-rail.bottom { top: 18px; }

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 32px;
  background: linear-gradient(135deg,
    rgba(180,255,200,0.5),
    rgba(100,200,150,0.3),
    rgba(200,255,180,0.4),
    rgba(100,200,150,0.5)
  );
  background-size: 300% 300%;
  animation: gardenBorder 5s ease-in-out infinite;
  box-shadow:
    0 0 35px rgba(100,200,120,0.3),
    0 0 80px rgba(80,180,100,0.15),
    0 8px 40px rgba(0,0,0,0.4);
}
@keyframes gardenBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 35px rgba(100,200,120,0.3), 0 0 80px rgba(80,180,100,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 50px rgba(120,220,150,0.45), 0 0 100px rgba(80,180,100,0.25); }
}

/* 卡片本体 */
.card {
  background: rgba(10, 25, 15, 0.88);
  backdrop-filter: blur(18px) saturate(1.3);
  -webkit-backdrop-filter: blur(18px) saturate(1.3);
  border-radius: 30px;
  padding: clamp(36px, 7vw, 56px) clamp(28px, 6vw, 48px);
  text-align: center;
  max-width: min(500px, 92vw);
  border: 1px solid rgba(150,220,150,0.2);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.3deg); }
  50% { transform: translateY(-8px) rotate(0.3deg); }
}

/* 卡片内月光效果 */
.card::before {
  content: '';
  position: absolute;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,250,200,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* 图标 */
.icon {
  font-size: clamp(38px, 8vw, 56px);
  display: block;
  margin-bottom: 14px;
  animation: iconDrop 1s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 4px 12px rgba(255,200,150,0.3));
}
@keyframes iconDrop {
  from { transform: translateY(-30px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* 场合标签 */
.occasion {
  font-size: clamp(10px, 2.2vw, 12px);
  color: rgba(150,220,150,0.6);
  letter-spacing: 8px;
  margin-bottom: 16px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.4s both;
  position: relative;
  z-index: 1;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 名字 */
.name {
  font-size: clamp(26px, 7vw, 46px);
  font-weight: 600;
  color: #c8f0c8;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  opacity: 1;
  animation: nameAppear 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.6s both;
  text-shadow: 0 0 20px rgba(150,255,150,0.3);
  position: relative;
  z-index: 1;
}
@keyframes nameAppear {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 日期 */
.date-line {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(150,200,150,0.55);
  letter-spacing: 4px;
  margin-bottom: 24px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.9s both;
  position: relative;
  z-index: 1;
}

/* 分隔线 */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 24px;
  animation: fadeUp 1s ease-out 1.1s both;
  opacity: 1;
  position: relative;
  z-index: 1;
}
.divider-line {
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(150,220,150,0.4), transparent);
}
.divider-star {
  font-size: 10px;
  color: rgba(180,255,180,0.5);
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 3.5vw, 18px);
  color: rgba(200,240,200,0.85);
  line-height: 2;
  letter-spacing: 1px;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.3s both;
  position: relative;
  z-index: 1;
}

/* 署名 */
.from {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(150,200,150,0.55);
  text-align: right;
  margin-top: 24px;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.6s both;
  position: relative;
  z-index: 1;
}

/* 角落花朵装饰 */
.corner-flower {
  position: absolute;
  font-size: 16px;
  opacity: 0.25;
  z-index: 0;
  pointer-events: none;
}

@media (prefers-reduced-motion: reduce) {
  .petal, .firefly, .card-wrap, .card, .icon, .name { animation: none; }
  .name, .date-line, .blessing, .from, .divider, .icon { opacity: 1; }
}
</style>
</head>
<body>

<script>
// 花瓣
const petalEmojis = ['🌸', '🩷', '💮', '🌺', '🪷'];
for (let i = 0; i < 16; i++) {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.textContent = petalEmojis[i % petalEmojis.length];
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.fontSize = (9 + Math.random() * 10) + 'px';
  petal.style.animationDuration = (7 + Math.random() * 6) + 's';
  petal.style.animationDelay = Math.random() * 10 + 's';
  document.body.appendChild(petal);
}

// 萤火虫
for (let i = 0; i < 12; i++) {
  const ff = document.createElement('div');
  ff.className = 'firefly';
  ff.style.left = (10 + Math.random() * 80) + 'vw';
  ff.style.top = (20 + Math.random() * 60) + 'vh';
  ff.style.animationDuration = (3 + Math.random() * 4) + 's';
  ff.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(ff);
}

if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.petal, .firefly').forEach(el => el.remove());
}
</script>

<!-- 花园围栏 -->
<div class="fence">
  <div class="fence-rail top"></div>
  <div class="fence-rail bottom"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
  <div class="fence-post"></div>
</div>

<!-- 贺卡 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">🌿</span>
    <div class="occasion" id="occasionEl">梦幻花园</div>
    <div class="name" id="nameEl"></div>
    <div class="date-line" id="dateEl"></div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-star">✦</span>
      <div class="divider-line"></div>
    </div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <span class="corner-flower" style="top:14px;left:14px;">🌼</span>
    <span class="corner-flower" style="top:14px;right:14px;">🌷</span>
    <span class="corner-flower" style="bottom:14px;left:14px;">🌺</span>
    <span class="corner-flower" style="bottom:14px;right:14px;">🌻</span>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的你';
const date = p.get('d') || '';
const blessing = p.get('b') || '愿你如花园般美好，\n每一天都充满花香与温柔。';
const from = p.get('f') || '';
const icon = p.get('i') || '🌿';
const occasion = p.get('o') || '梦幻花园';

document.getElementById('nameEl').textContent = name;
document.getElementById('dateEl').textContent = date;
document.getElementById('blessingEl').textContent = blessing;
document.getElementById('fromEl').textContent = from ? '— ' + from : '';
document.getElementById('iconEl').textContent = icon;
document.getElementById('occasionEl').textContent = occasion;
</script>
</body>
</html>
