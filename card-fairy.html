<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦幻仙子</title>
<meta property="og:title" content="🧚 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --fairy-pink: #e8a0c8;
  --fairy-lavender: #c5a0d8;
  --fairy-mint: #a8d8c8;
  --fairy-gold: #f0d080;
  --fairy-bg: #1a1030;
  --fairy-light: rgba(240, 200, 255, 0.15);
  --glow-soft: rgba(200, 160, 220, 0.5);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #0f0820 0%,
    #1a0f30 30%,
    #251845 60%,
    #1a1030 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 极光背景 */
.aurora-bg {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(160,100,200,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 70%, rgba(100,180,200,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 100% 60% at 50% 50%, rgba(200,140,220,0.05) 0%, transparent 70%);
  animation: auroraShift 10s ease-in-out infinite alternate;
}

@keyframes auroraShift {
  0% { opacity: 0.7; filter: hue-rotate(0deg); }
  100% { opacity: 1; filter: hue-rotate(20deg); }
}

/* 星星 */
.stars {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.8);
  animation: starTwinkle var(--dur, 3s) ease-in-out infinite;
}

@keyframes starTwinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 仙子光芒粒子 */
.sparkles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 2;
  overflow: hidden;
}

.sparkle {
  position: absolute;
  border-radius: 50%;
  background: var(--fairy-gold);
  box-shadow: 0 0 6px 2px rgba(240,200,100,0.6);
  animation: sparkleFloat 4s ease-out forwards;
  pointer-events: none;
}

@keyframes sparkleFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-120px) scale(0); }
}

/* 花卉装饰 */
.flowers {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.flower-deco {
  position: absolute;
  font-size: 18px;
  animation: flowerSway var(--dur, 4s) ease-in-out infinite alternate;
  opacity: 0.5;
  filter: drop-shadow(0 0 6px rgba(200,160,255,0.5));
}

@keyframes flowerSway {
  0% { transform: rotate(-15deg) translateY(0); }
  100% { transform: rotate(15deg) translateY(-8px); }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  background: linear-gradient(135deg, #d8b0e8, #a0c8e0, #c8e0a0, #f0d080, #e8a0c8);
  background-size: 300% 300%;
  animation: borderFlow 6s ease-in-out infinite;
  border-radius: 18px;
  box-shadow:
    0 0 20px rgba(200,160,220,0.3),
    0 0 40px rgba(200,160,220,0.15),
    0 8px 32px rgba(0,0,0,0.4);
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 卡片主体 */
.card {
  background: rgba(15, 8, 30, 0.88);
  border-radius: 16px;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 44px);
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(200,160,220,0.2);
  min-width: 280px;
  max-width: 460px;
  animation: cardFloat 5s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-8px) rotate(0.5deg); }
}

/* 仙子翅膀装饰 */
.wing-deco {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
  filter: drop-shadow(0 0 16px rgba(200,160,255,0.6));
  animation: wingPulse 3s ease-in-out infinite;
}

@keyframes wingPulse {
  0%, 100% { transform: translateX(-50%) scale(1); filter: drop-shadow(0 0 16px rgba(200,160,255,0.6)); }
  50% { transform: translateX(-50%) scale(1.08); filter: drop-shadow(0 0 24px rgba(200,160,255,0.9)); }
}

/* 仙子图标 */
.fairy-icon {
  font-size: clamp(38px, 8vw, 56px);
  margin: 16px 0 8px;
  animation: iconBounce 1s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 0 14px rgba(255,200,255,0.5));
}

@keyframes iconBounce {
  from { opacity: 0; transform: scale(0.3) translateY(-20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* 装饰线 */
.decor {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 10px auto;
  opacity: 0.5;
}

.decor-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--fairy-gold);
}

.decor-line {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--fairy-gold), transparent);
}

/* 名字 */
.name {
  font-size: clamp(24px, 7vw, 42px);
  font-weight: bold;
  color: #f8e8ff;
  text-shadow: 0 0 20px var(--glow-soft), 0 0 40px rgba(200,160,220,0.3);
  margin: 10px 0 6px;
  opacity: 1;
  animation: fadeSlideUp 1.2s ease-out 0.4s both;
  letter-spacing: 2px;
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 日期 */
.date {
  font-size: clamp(11px, 3vw, 14px);
  color: var(--fairy-lavender);
  opacity: 0.7;
  margin-bottom: 14px;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeSlideUp 1.2s ease-out 0.6s both;
}

/* 分隔 */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 14px auto;
  opacity: 0.4;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  max-width: 50px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--fairy-pink));
}

.divider::after {
  background: linear-gradient(90deg, var(--fairy-pink), transparent);
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 4vw, 19px);
  color: rgba(248, 232, 255, 0.9);
  line-height: 1.9;
  margin: 12px 0;
  opacity: 1;
  animation: fadeSlideUp 1.2s ease-out 0.8s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--fairy-gold);
  opacity: 0.75;
  margin-top: 10px;
  font-style: italic;
  opacity: 1;
  animation: fadeSlideUp 1.2s ease-out 1s both;
}

/* 底部花语 */
.bottom-text {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(200,160,220,0.4);
  letter-spacing: 3px;
  z-index: 5;
  white-space: nowrap;
}

@media (prefers-reduced-motion: reduce) {
  .card, .card-wrap, .aurora-bg, .fairy-icon, .name, .date, .blessing, .from, .wing-deco {
    animation: none !important;
  }
}
</style>
</head>
<body>

<div class="aurora-bg"></div>
<div class="stars" id="starsEl"></div>
<div class="sparkles" id="sparklesEl"></div>
<div class="flowers" id="flowersEl"></div>

<div class="card-wrap">
  <div class="card">
    <div class="wing-deco">🧚‍♀️</div>
    <div class="fairy-icon">✨</div>
    <div class="decor">
      <div class="decor-line"></div>
      <div class="decor-dot"></div>
      <div class="decor-dot"></div>
      <div class="decor-dot"></div>
      <div class="decor-line"></div>
    </div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<div class="bottom-text">✨ 仙子魔法 · 梦幻祝福 ✨</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你被世界温柔以待，愿美好如约而至';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 星星
const starsEl = document.getElementById('starsEl');
for (let i = 0; i < 35; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = 1 + Math.random() * 2;
  star.style.cssText = `
    left: ${Math.random()*100}%;
    top: ${Math.random()*100}%;
    width: ${size}px; height: ${size}px;
    --dur: ${2+Math.random()*3}s;
    animation-delay: ${Math.random()*3}s;
  `;
  starsEl.appendChild(star);
}

// 仙子光粒
const sparklesEl = document.getElementById('sparklesEl');
function createSparkle() {
  const s = document.createElement('div');
  s.className = 'sparkle';
  const size = 2 + Math.random() * 4;
  s.style.cssText = `
    left: ${10 + Math.random()*80}%;
    bottom: ${10 + Math.random()*30}%;
    width: ${size}px; height: ${size}px;
  `;
  sparklesEl.appendChild(s);
  setTimeout(() => s.remove(), 4000);
}
setInterval(createSparkle, 600);

// 花朵装饰
const flowersEl = document.getElementById('flowersEl');
const flowerEmos = ['🌸', '💐', '🌺', '💮', '🪻', '🌷', '🌻'];
for (let i = 0; i < 12; i++) {
  const f = document.createElement('div');
  f.className = 'flower-deco';
  f.textContent = flowerEmos[Math.floor(Math.random() * flowerEmos.length)];
  f.style.cssText = `
    left: ${Math.random()*100}%;
    top: ${10 + Math.random()*80}%;
    --dur: ${3+Math.random()*3}s;
    animation-delay: ${Math.random()*3}s;
    font-size: ${12+Math.random()*10}px;
  `;
  flowersEl.appendChild(f);
}
</script>
</body>
</html>
