<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爸爸，您是我的骄傲</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0d1b3e 0%, #1a2f5e 50%, #0f2040 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星空光晕 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 50% 5%, rgba(255,215,0,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(100,150,255,0.06) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 60%, rgba(255,200,100,0.05) 0%, transparent 35%);
  animation: nightSky 12s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes nightSky {
  0%, 100% { opacity: 0.8; transform: translate(0,0); }
  50% { opacity: 1; transform: translate(-1%,1%); }
}

/* 小星星 */
.star {
  position: fixed;
  width: 2.5px;
  height: 2.5px;
  border-radius: 50%;
  background: rgba(255,240,180,0.9);
  animation: starTwinkle linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: blur(0.5px);
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.6); }
  50% { opacity: 1; transform: scale(1.4); }
}

/* 金色羽毛飘落 */
.feather {
  position: fixed;
  font-size: 11px;
  animation: featherFall linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 0 5px rgba(255,215,0,0.3));
}
@keyframes featherFall {
  0% { transform: translateY(-8vh) rotate(0deg) translateX(0); opacity: 0; }
  8% { opacity: 0.75; }
  85% { opacity: 0.6; }
  100% { transform: translateY(105vh) rotate(540deg) translateX(60px); opacity: 0; }
}

/* 上升光点 */
.glow-dot {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,220,80,0.9), rgba(255,180,50,0.5));
  animation: glowRise linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes glowRise {
  0% { transform: translateY(100vh) scale(0.2); opacity: 0; }
  10% { opacity: 0.75; }
  88% { opacity: 0.5; }
  100% { transform: translateY(-5vh) scale(1); opacity: 0; }
}

/* 边框流光（金色） */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 28px;
  background: linear-gradient(135deg,
    #c9a830,
    #f0d060,
    #c9a830,
    #f5e080,
    #c9a830);
  background-size: 400% 400%;
  animation: goldBorder 4.5s ease infinite;
  box-shadow:
    0 0 30px rgba(200,168,48,0.45),
    0 0 70px rgba(200,168,48,0.2),
    inset 0 0 20px rgba(255,240,150,0.1);
  z-index: 10;
}
@keyframes goldBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(200,168,48,0.45), 0 0 70px rgba(200,168,48,0.2); }
  50% { background-position: 100% 50%; box-shadow: 0 0 48px rgba(240,208,96,0.65), 0 0 90px rgba(200,168,48,0.3); }
  100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(200,168,48,0.45), 0 0 70px rgba(200,168,48,0.2); }
}

/* 卡片内容 */
.card {
  background: linear-gradient(160deg, rgba(10,20,50,0.96), rgba(20,35,70,0.93));
  border-radius: 26px;
  padding: clamp(36px, 7vw, 58px) clamp(28px, 5vw, 50px);
  text-align: center;
  position: relative;
  z-index: 11;
  display: flex;
  flex-direction: column;
  align-items: center;
  border: 1px solid rgba(255,215,0,0.25);
  box-shadow: inset 0 2px 20px rgba(100,150,255,0.08);
}

.card-icon {
  font-size: clamp(36px, 7vw, 56px);
  display: block;
  margin-bottom: 18px;
  opacity: 1;
  animation: iconDrop 1s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
  filter: drop-shadow(0 4px 10px rgba(200,168,48,0.4));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-28px) scale(0.6); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(30px, 7vw, 54px);
  font-weight: 700;
  color: #f0d060;
  margin-bottom: 12px;
  letter-spacing: 6px;
  opacity: 1;
  animation: nameReveal 1.1s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;
  text-shadow: 0 0 20px rgba(240,208,80,0.35), 0 2px 12px rgba(0,0,0,0.3);
}
@keyframes nameReveal {
  from { opacity: 0; transform: translateY(22px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: rgba(200,220,255,0.7);
  letter-spacing: 4px;
  margin-bottom: 26px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.4s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.blessing {
  font-size: clamp(15px, 3.5vw, 21px);
  color: rgba(240,230,180,0.95);
  line-height: 1.9;
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.55s both;
}

.from {
  font-size: clamp(12px, 2vw, 15px);
  color: rgba(200,220,255,0.7);
  margin-top: 22px;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.75s both;
}

/* 无障碍 */
@media (prefers-reduced-motion: reduce) {
  .star, .feather, .glow-dot { animation: none !important; }
  .card-icon, .name, .date, .blessing, .from { animation: none !important; opacity: 1; }
  body::before { animation: none !important; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">🎩</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '爸爸';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '爸爸，您是我的骄傲\n感谢您一直以来的守护与教诲';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 小星星
for (let i = 0; i < 30; i++) {
  const el = document.createElement('div');
  el.className = 'star';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = Math.random() * 80 + 'vh';
  el.style.animationDuration = (2 + Math.random() * 3) + 's';
  el.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(el);
}

// 金色羽毛
const feathers = ['🪶', '✨', '⭐', '✨', '🪶'];
for (let i = 0; i < 12; i++) {
  const el = document.createElement('div');
  el.className = 'feather';
  el.textContent = feathers[Math.floor(Math.random() * feathers.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (9 + Math.random() * 9) + 'px';
  el.style.animationDuration = (8 + Math.random() * 6) + 's';
  el.style.animationDelay = Math.random() * 10 + 's';
  document.body.appendChild(el);
}

// 上升光点
for (let i = 0; i < 15; i++) {
  const el = document.createElement('div');
  el.className = 'glow-dot';
  el.style.left = Math.random() * 100 + 'vw';
  const size = 3 + Math.random() * 7;
  el.style.width = el.style.height = size + 'px';
  el.style.animationDuration = (5 + Math.random() * 5) + 's';
  el.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(el);
}
</script>
</body>
</html>
