<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽毛轻飘</title>
<meta property="og:title" content="🪶 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --feather-gold: #d4a050;
  --feather-amber: #e8b870;
  --feather-cream: #f5e8d0;
  --feather-warm: #c89060;
  --text-warm: #5a3a20;
  --text-light: #f5efe0;
  --card-bg: rgba(255, 248, 235, 0.9);
  --glow-warm: rgba(212, 160, 80, 0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #2a1a08 0%,
    #3d2810 20%,
    #5a3a18 40%,
    #7a5028 60%,
    #c89060 85%,
    #e8c090 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 温暖光晕 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255, 200, 100, 0.2) 0%, transparent 55%),
    radial-gradient(ellipse at 30% 80%, rgba(200, 140, 60, 0.15) 0%, transparent 45%),
    radial-gradient(ellipse at 70% 70%, rgba(255, 180, 80, 0.12) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: warmPulse 5s ease-in-out infinite;
}
@keyframes warmPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* 羽毛 */
.feather {
  position: fixed;
  font-size: 28px;
  z-index: 1;
  pointer-events: none;
  animation: featherFall linear infinite;
  filter: drop-shadow(0 2px 6px rgba(200, 160, 80, 0.3));
}
@keyframes featherFall {
  0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
  8% { opacity: 0.9; }
  85% { opacity: 0.7; }
  100% { transform: translateY(105vh) translateX(var(--drift, 40px)) rotate(var(--rot, 360deg)); opacity: 0; }
}

/* 光点上升 */
.sparkle {
  position: fixed;
  width: 4px; height: 4px;
  background: radial-gradient(circle, #ffe080 0%, #ffd050 100%);
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
  animation: sparkleRise ease-in infinite;
  box-shadow: 0 0 6px rgba(255, 220, 80, 0.8);
}
@keyframes sparkleRise {
  0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
  15% { opacity: 0.9; }
  85% { opacity: 0.5; }
  100% { transform: translateY(-8vh) scale(1); opacity: 0; }
}

/* 金色粒子 */
.gold-dust {
  position: fixed;
  width: 3px; height: 3px;
  background: #ffd060;
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
  animation: dustFloat ease-in-out infinite;
}
@keyframes dustFloat {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
  33% { transform: translate(15px, -20px) scale(1.2); opacity: 0.9; }
  66% { transform: translate(-10px, -35px) scale(0.8); opacity: 0.5; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  padding: 3px;
  background: linear-gradient(135deg, #d4a050, #e8c070, #f0d090, #d4a050);
  background-size: 300% 300%;
  animation: goldBorder 5s ease infinite;
  border-radius: 20px;
  z-index: 10;
  box-shadow:
    0 0 40px rgba(212, 160, 80, 0.5),
    0 0 80px rgba(212, 160, 80, 0.2),
    0 20px 60px rgba(80, 40, 10, 0.3);
}
@keyframes goldBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 卡片主体 */
.card {
  background: linear-gradient(160deg, rgba(255, 250, 240, 0.95) 0%, rgba(245, 235, 215, 0.97) 100%);
  border-radius: 18px;
  padding: clamp(34px, 9vw, 56px) clamp(26px, 7vw, 48px);
  text-align: center;
  max-width: min(520px, 94vw);
  min-height: min(380px, 70vh);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  animation: cardFloat 5s ease-in-out infinite alternate;
  border: 1px solid rgba(212, 160, 80, 0.35);
}
@keyframes cardFloat {
  0% { transform: translateY(0); }
  100% { transform: translateY(-8px); }
}

/* 卡片顶部装饰 */
.card::before {
  content: '🪶';
  position: absolute;
  top: 12px; right: 16px;
  font-size: 22px;
  opacity: 0.55;
}
.card::after {
  content: '✨';
  position: absolute;
  top: 14px; left: 18px;
  font-size: 18px;
  opacity: 0.5;
}

/* 名字 */
.name {
  font-size: clamp(30px, 8vw, 52px);
  font-weight: 700;
  color: var(--text-warm);
  margin-bottom: 14px;
  text-shadow: 0 2px 14px rgba(180, 120, 40, 0.25);
  opacity: 1;
  animation: slideIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  letter-spacing: 0.05em;
}

/* 日期 */
.date {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #a07040;
  margin-bottom: 18px;
  opacity: 1;
  animation: slideIn 1.2s ease-out 0.5s both;
  letter-spacing: 0.12em;
}

/* 祝福语 */
.blessing {
  font-size: clamp(17px, 4.5vw, 24px);
  color: #6a4828;
  line-height: 1.85;
  max-width: 400px;
  opacity: 1;
  animation: slideIn 1.2s ease-out 0.8s both;
}

/* 署名 */
.from {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #a08060;
  margin-top: 22px;
  opacity: 1;
  animation: slideIn 1.2s ease-out 1.1s both;
  font-style: italic;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- 羽毛 -->
<script>
const featherEmojis = ['🪶', '🍂', '✨', '🪶', '✨', '🍂'];
const driftValues = ['-30px', '30px', '-50px', '60px', '-20px', '40px'];
const rotValues = ['300deg', '420deg', '-300deg', '360deg', '450deg', '-400deg'];

// 羽毛
for (let i = 0; i < 8; i++) {
  const f = document.createElement('div');
  f.className = 'feather';
  f.textContent = featherEmojis[i % featherEmojis.length];
  f.style.cssText = `
    left: ${5 + Math.random() * 88}%;
    --drift: ${driftValues[i % driftValues.length]};
    --rot: ${rotValues[i % rotValues.length]};
    animation-duration: ${10 + Math.random() * 7}s;
    animation-delay: ${-Math.random() * 12}s;
    font-size: ${20 + Math.random() * 14}px;
    opacity: ${0.7 + Math.random() * 0.3};
  `;
  document.body.appendChild(f);
}

// 光点上升
for (let i = 0; i < 10; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.cssText = `
    left: ${8 + Math.random() * 84}%;
    animation-duration: ${7 + Math.random() * 5}s;
    animation-delay: ${-Math.random() * 9}s;
    width: ${3 + Math.random() * 4}px;
    height: ${3 + Math.random() * 4}px;
  `;
  document.body.appendChild(s);
}

// 金色尘埃
for (let i = 0; i < 12; i++) {
  const d = document.createElement('div');
  d.className = 'gold-dust';
  d.style.cssText = `
    left: ${5 + Math.random() * 90}%;
    top: ${20 + Math.random() * 70}%;
    animation-duration: ${4 + Math.random() * 4}s;
    animation-delay: ${-Math.random() * 6}s;
  `;
  document.body.appendChild(d);
}
</script>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '温暖的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你被世界温柔以待，愿每一天都充满阳光';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>

</body>
</html>
