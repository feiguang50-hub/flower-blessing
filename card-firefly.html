<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萤火虫之夜</title>
<meta property="og:title" content="✨ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-deep: #040d05;
  --night-mid: #071408;
  --night-light: #0a2010;
  --firefly-glow: #b8ff5a;
  --firefly-soft: #7de84a;
  --grass-dark: #051005;
  --text-warm: #d4f0b0;
  --card-bg: rgba(10, 28, 14, 0.88);
  --card-border: rgba(160, 220, 100, 0.35);
}

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 0%, #0a2010 0%, #051008 40%, #030805 70%, #020404 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 夜空微弱星光 */
.star-field {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}
.star {
  position: absolute;
  width: 1.5px; height: 1.5px;
  background: rgba(200, 255, 180, 0.5);
  border-radius: 50%;
  animation: starTwinkle 4s ease-in-out infinite;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.1; }
  50% { opacity: 0.6; }
}

/* 萤火虫 */
.firefly {
  position: absolute;
  width: 5px; height: 5px;
  background: var(--firefly-glow);
  border-radius: 50%;
  box-shadow: 0 0 8px 3px var(--firefly-glow), 0 0 16px 6px rgba(160, 255, 80, 0.3);
  animation: fireflyFloat var(--d, 6s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes fireflyFloat {
  0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
  15% { opacity: 1; transform: translate(calc(var(--dx, 10px)), calc(var(--dy, -15px))) scale(1); }
  35% { opacity: 1; transform: translate(calc(var(--dx) * 0.6), calc(var(--dy) * 0.4)) scale(0.8); }
  55% { opacity: 0.7; transform: translate(calc(var(--dx) * -0.4), calc(var(--dy) * 0.2)) scale(1.1); }
  75% { opacity: 1; transform: translate(calc(var(--dx) * 0.2), calc(var(--dy) * -0.3)) scale(0.9); }
  90% { opacity: 0.3; transform: translate(0, 0) scale(0.6); }
  100% { opacity: 0; transform: translate(0, 0) scale(0.5); }
}

/* 草丛剪影 */
.grass-ground {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  z-index: 1;
  pointer-events: none;
}
.grass-blade {
  position: absolute;
  bottom: 0;
  width: 3px;
  background: var(--grass-dark);
  border-radius: 2px 2px 0 0;
  transform-origin: bottom center;
  animation: grassSway 3s ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes grassSway {
  0%, 100% { transform: rotate(calc(var(--lean, 0deg) - 5deg)); }
  50% { transform: rotate(calc(var(--lean, 0deg) + 5deg)); }
}

/* 树木剪影 */
.tree-left, .tree-right {
  position: fixed;
  bottom: 60px;
  z-index: 1;
  pointer-events: none;
}
.tree-left { left: 0; }
.tree-right { right: 0; }

/* 贺卡主体 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  background: linear-gradient(135deg, rgba(150, 230, 100, 0.5), rgba(100, 200, 80, 0.3), rgba(150, 230, 100, 0.5));
  border-radius: 20px;
  animation: borderGlow 3s ease-in-out infinite;
}
@keyframes borderGlow {
  0%, 100% { box-shadow: 0 0 12px rgba(150, 230, 100, 0.3), 0 0 30px rgba(100, 200, 80, 0.15); }
  50% { box-shadow: 0 0 22px rgba(150, 230, 100, 0.5), 0 0 50px rgba(100, 200, 80, 0.25); }
}
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: clamp(28px, 8vw, 50px) clamp(28px, 10vw, 60px);
  text-align: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  max-width: 90vw;
  width: 420px;
  animation: cardFloat 4s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.name {
  color: var(--firefly-glow);
  font-size: clamp(24px, 6vw, 38px);
  font-weight: normal;
  letter-spacing: 4px;
  margin-bottom: 18px;
  text-shadow: 0 0 20px rgba(180, 255, 90, 0.5);
  opacity: 1;
  animation: fadeDown 1.2s ease-out both;
}

.date {
  color: rgba(180, 230, 140, 0.6);
  font-size: clamp(12px, 3vw, 15px);
  letter-spacing: 3px;
  margin-bottom: 22px;
  opacity: 1;
  animation: fadeDown 1.2s ease-out 0.2s both;
}

.blessing {
  color: var(--text-warm);
  font-size: clamp(15px, 4vw, 19px);
  line-height: 1.9;
  margin-bottom: 24px;
  opacity: 1;
  animation: fadeDown 1.2s ease-out 0.4s both;
}

.from {
  color: rgba(160, 220, 100, 0.55);
  font-size: clamp(12px, 3vw, 15px);
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeDown 1.2s ease-out 0.6s both;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .firefly, .grass-blade, .card, .star { animation: none; }
}
</style>
</head>
<body>

<!-- 星星背景 -->
<div class="star-field" id="starField"></div>

<!-- 萤火虫 -->
<div id="fireflyField"></div>

<!-- 左侧树剪影 -->
<svg class="tree-left" width="120" height="300" viewBox="0 0 120 300" fill="none">
  <path d="M60 300 L60 180 Q30 160 20 120 Q10 80 40 60 Q20 30 50 10 Q60 0 70 10 Q100 30 80 60 Q110 80 100 120 Q90 160 60 180 L60 300Z" fill="#040d05"/>
  <rect x="50" y="180" width="20" height="120" fill="#040d05"/>
</svg>

<!-- 右侧树剪影 -->
<svg class="tree-right" width="100" height="260" viewBox="0 0 100 260" fill="none">
  <path d="M50 260 L50 150 Q20 130 15 100 Q5 65 35 50 Q15 20 45 5 Q50 -5 55 5 Q85 20 65 50 Q95 65 85 100 Q80 130 50 150 L50 260Z" fill="#040d05"/>
  <rect x="42" y="150" width="16" height="110" fill="#040d05"/>
</svg>

<!-- 草丛 -->
<div class="grass-ground" id="grassGround"></div>

<!-- 贺卡 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的夜晚，总有微光相伴';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 星星
const starField = document.getElementById('starField');
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 60 + '%';
  s.style.animationDuration = (3 + Math.random() * 3) + 's';
  s.style.animationDelay = Math.random() * 4 + 's';
  starField.appendChild(s);
}

// 萤火虫
const ff = document.getElementById('fireflyField');
const ffData = [
  {x:12,y:25,dx:15,dy:-20,d:5.5,delay:0},
  {x:82,y:30,dx:-12,dy:-18,d:6.2,delay:1.2},
  {x:25,y:55,dx:8,dy:-25,d:7.0,delay:2.1},
  {x:70,y:45,dx:-18,dy:-15,d:5.8,delay:0.5},
  {x:55,y:20,dx:10,dy:-30,d:6.5,delay:3.0},
  {x:38,y:65,dx:14,dy:-22,d:5.2,delay:1.8},
  {x:88,y:60,dx:-8,dy:-12,d:7.5,delay:4.2},
  {x:8,y:70,dx:20,dy:-18,d:6.0,delay:2.5},
  {x:45,y:35,dx:-6,dy:-28,d:5.7,delay:0.8},
  {x:62,y:72,dx:12,dy:-20,d:6.8,delay:3.5},
  {x:30,y:15,dx:8,dy:-15,d:5.3,delay:1.0},
  {x:78,y:80,dx:-15,dy:-22,d:6.3,delay:2.8},
];
ffData.forEach(f => {
  const el = document.createElement('div');
  el.className = 'firefly';
  el.style.left = f.x + '%';
  el.style.top = f.y + '%';
  el.style.setProperty('--dx', f.dx + 'px');
  el.style.setProperty('--dy', f.dy + 'px');
  el.style.setProperty('--d', f.d + 's');
  el.style.setProperty('--delay', f.delay + 's');
  ff.appendChild(el);
});

// 草丛
const ground = document.getElementById('grassGround');
for (let i = 0; i < 60; i++) {
  const blade = document.createElement('div');
  blade.className = 'grass-blade';
  blade.style.left = (i / 60 * 100) + '%';
  blade.style.height = (25 + Math.random() * 45) + 'px';
  blade.style.setProperty('--lean', (Math.random() * 20 - 10) + 'deg');
  blade.style.setProperty('--delay', (Math.random() * 2) + 's');
  ground.appendChild(blade);
}
</script>
</body>
</html>
