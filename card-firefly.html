<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萤火虫之夜</title>
<meta property="og:title" content="✨ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #020a05 0%, #051208 30%, #0a1f10 60%, #020a05 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 森林背景 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(100,200,80,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 10% 90%, rgba(50,150,60,0.05) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 85%, rgba(80,180,80,0.04) 0%, transparent 40%);
  z-index: 0;
  pointer-events: none;
}

/* 树叶剪影 */
.trees {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 40%;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.tree-left {
  position: absolute;
  bottom: 0; left: -20px;
  width: 200px; height: 100%;
  background: radial-gradient(ellipse 120px 200px at 50% 100%, #011a06 70%, transparent 100%);
  opacity: 0.7;
}
.tree-right {
  position: absolute;
  bottom: 0; right: -20px;
  width: 200px; height: 100%;
  background: radial-gradient(ellipse 140px 220px at 50% 100%, #011a06 70%, transparent 100%);
  opacity: 0.6;
}
.tree-mid {
  position: absolute;
  bottom: 0; left: 30%;
  width: 300px; height: 80%;
  background: radial-gradient(ellipse 180px 280px at 50% 100%, #021a08 60%, transparent 100%);
  opacity: 0.5;
}

/* 萤火虫 */
.firefly {
  position: fixed;
  width: 4px; height: 4px;
  background: radial-gradient(circle, #ffff88 0%, #aaff44 40%, rgba(150,255,50,0) 100%);
  border-radius: 50%;
  animation: fireflyFloat ease-in-out infinite, fireflyGlow ease-in-out infinite;
  z-index: 3;
  pointer-events: none;
  box-shadow: 0 0 6px 3px rgba(180,255,80,0.6);
}
@keyframes fireflyFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(12px, -18px) scale(1.1); }
  50% { transform: translate(-8px, -30px) scale(0.9); }
  75% { transform: translate(15px, -15px) scale(1.05); }
}
@keyframes fireflyGlow {
  0%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
  60% { opacity: 0.7; }
}

/* 边框 */
.card-wrap {
  position: relative;
  padding: 2px;
  border-radius: 24px;
  background: linear-gradient(135deg, rgba(100,255,80,0.4), rgba(50,200,100,0.2), rgba(150,255,120,0.4));
  animation: borderPulse 3s ease-in-out infinite;
  z-index: 10;
}
@keyframes borderPulse {
  0%, 100% { box-shadow: 0 0 12px 2px rgba(100,255,80,0.25), 0 0 30px 6px rgba(50,200,80,0.12); }
  50% { box-shadow: 0 0 20px 4px rgba(120,255,100,0.4), 0 0 50px 10px rgba(60,220,90,0.18); }
}

.card {
  background: linear-gradient(160deg, rgba(5,20,8,0.92) 0%, rgba(8,30,12,0.95) 100%);
  border-radius: 22px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  max-width: 520px;
  width: 90vw;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(100,220,80,0.15);
}

.card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(100,255,80,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.name {
  font-size: clamp(28px, 7vw, 50px);
  font-weight: bold;
  background: linear-gradient(135deg, #88ff88, #ccff99, #ffffaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  opacity: 1;
  animation: slideUp 1.2s ease-out both;
  text-shadow: none;
}

.date {
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(150,255,120,0.5);
  margin-bottom: 24px;
  letter-spacing: 3px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.15s both;
}

.blessing {
  font-size: clamp(16px, 4.5vw, 24px);
  color: rgba(200,255,180,0.9);
  line-height: 1.8;
  margin-bottom: 28px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.3s both;
}

.from {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(150,220,100,0.6);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.45s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="trees">
  <div class="tree-left"></div>
  <div class="tree-mid"></div>
  <div class="tree-right"></div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的夜晚总有萤火虫点亮';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 生成萤火虫
const count = 22;
for (let i = 0; i < count; i++) {
  const ff = document.createElement('div');
  ff.className = 'firefly';
  ff.style.left = Math.random() * 100 + 'vw';
  ff.style.top = (15 + Math.random() * 65) + 'vh';
  const dur1 = (2.5 + Math.random() * 3).toFixed(2);
  const dur2 = (1.2 + Math.random() * 2).toFixed(2);
  ff.style.animationDuration = dur1 + 's, ' + dur2 + 's';
  ff.style.animationDelay = (-Math.random() * 6) + 's, ' + (-Math.random() * 4) + 's';
  ff.style.width = (3 + Math.random() * 3) + 'px';
  ff.style.height = ff.style.width;
  document.body.appendChild(ff);
}
</script>

<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
