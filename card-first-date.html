<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初次约会纪念</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #1a1020 0%, #2d1832 40%, #3d2245 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 星光洒落 === */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(255,220,100,0.08) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 85%, rgba(255,180,220,0.06) 0%, transparent 40%);
  animation: starGlow 10s ease-in-out infinite;
  pointer-events: none; z-index: 0;
}
@keyframes starGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* === 星星 === */
.star {
  position: fixed; width: 2.5px; height: 2.5px;
  background: #fff8e0;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 5px rgba(255,230,150,0.9);
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.7); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* === 萤火虫 === */
.firefly {
  position: fixed; width: 4px; height: 4px;
  background: radial-gradient(circle, #ffe066, #ff9900);
  border-radius: 50%;
  animation: fireflyGlow ease-in-out infinite;
  z-index: 2; pointer-events: none;
  box-shadow: 0 0 8px 2px rgba(255,200,50,0.6);
}
@keyframes fireflyGlow {
  0%, 100% { opacity: 0.1; transform: translate(0, 0); }
  25% { opacity: 0.9; transform: translate(8px, -6px); }
  50% { opacity: 0.4; transform: translate(-5px, 8px); }
  75% { opacity: 1; transform: translate(6px, 4px); }
}

/* === 月牙 === */
.moon-glow {
  position: fixed; top: 8%; right: 12%;
  width: 60px; height: 60px;
  background: radial-gradient(circle at 60% 40%, #fff8dc 0%, #ffeaa7 40%, transparent 70%);
  border-radius: 50%;
  animation: moonPulse 6s ease-in-out infinite;
  z-index: 0; pointer-events: none;
  box-shadow: 0 0 30px rgba(255,240,180,0.3);
}
@keyframes moonPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.08); opacity: 1; }
}

/* === 卡片包装 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 28px;
  background: linear-gradient(135deg, #daa520, #f0c060, #daa520, #e8b840, #daa520);
  background-size: 300% 300%;
  animation: goldenBorder 4s ease infinite;
  z-index: 10;
}
@keyframes goldenBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 18px rgba(218,165,32,0.35); }
  50% { background-position: 100% 50%; box-shadow: 0 0 30px rgba(218,165,32,0.55); }
  100% { background-position: 0% 50%; box-shadow: 0 0 18px rgba(218,165,32,0.35); }
}

/* === 卡片主体 === */
.card {
  background: rgba(20,12,28,0.85);
  backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2);
  border-radius: 25px;
  padding: 48px 50px;
  text-align: center;
  max-width: 490px;
  width: 88vw;
  border: 1px solid rgba(218,165,32,0.2);
  box-shadow: 0 18px 50px rgba(0,0,0,0.4), inset 0 0 35px rgba(218,165,32,0.05);
  animation: cardFloat 4.5s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.4deg); }
  50% { transform: translateY(-10px) rotate(0.4deg); }
}

/* 内发光 */
.card::before {
  content: '';
  position: absolute; top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,220,120,0.08) 0%, transparent 55%);
  animation: shimmer 6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(6%, 6%); }
}

/* 装饰框 */
.card-frame {
  position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
  border: 1px solid rgba(218,165,32,0.12);
  border-radius: 20px;
  pointer-events: none;
}

/* 图标 */
.card-icon {
  font-size: 38px; display: block; margin-bottom: 14px;
  animation: iconFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 4px 10px rgba(218,165,32,0.35));
}
@keyframes iconFloat {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-8px) rotate(3deg); }
}

/* === 文字 === */
.name {
  font-size: clamp(25px, 7vw, 46px);
  color: #ffeaa7; letter-spacing: 5px; margin-bottom: 12px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
  text-shadow: 0 2px 14px rgba(218,165,32,0.5);
}
.date {
  font-size: clamp(11px, 2.5vw, 14px);
  color: #d4a855; letter-spacing: 3px; margin-bottom: 26px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;
}
.blessing {
  font-size: clamp(14px, 3.5vw, 19px);
  color: #f5d89a; line-height: 1.8; letter-spacing: 1.5px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
}
.from {
  font-size: clamp(11px, 2vw, 13px);
  color: #c49a3a; margin-top: 20px; letter-spacing: 2.5px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* === 咖啡杯/浪漫元素 === */
.romantic-icon {
  position: fixed; font-size: 18px;
  animation: romanticFloat ease-in-out infinite;
  z-index: 3; pointer-events: none;
  opacity: 0.65;
}
@keyframes romanticFloat {
  0%, 100% { transform: translateY(0) rotate(-8deg); }
  50% { transform: translateY(-15px) rotate(8deg); }
}

/* === 速度线 === */
.speed-line {
  position: fixed; width: 50px; height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,220,150,0.4), transparent);
  border-radius: 1px; animation: speedLine linear infinite;
  z-index: 2; pointer-events: none;
}
@keyframes speedLine {
  0% { transform: translateX(-60px); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.4; }
  100% { transform: translateX(100vw); opacity: 0; }
}

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .star, .firefly, .speed-line, .romantic-icon { animation: none; }
  .card-wrap { animation: none; }
  .card { animation: none; }
}
</style>
</head>
<body>

<div class="moon-glow"></div>

<div class="card-wrap">
  <div class="card">
    <div class="card-frame"></div>
    <span class="card-icon">🌙</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '那天的星光，至今还在心里闪烁';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 星星
for (let i = 0; i < 35; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDuration = (1.2 + Math.random() * 2.5) + 's';
  s.style.animationDelay = Math.random() * 5 + 's';
  document.body.appendChild(s);
}

// 萤火虫
for (let i = 0; i < 8; i++) {
  const f = document.createElement('div');
  f.className = 'firefly';
  f.style.left = Math.random() * 90 + 'vw';
  f.style.top = Math.random() * 90 + 'vh';
  f.style.animationDuration = (3 + Math.random() * 4) + 's';
  f.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(f);
}

// 速度线
for (let i = 0; i < 3; i++) {
  const line = document.createElement('div');
  line.className = 'speed-line';
  line.style.top = (20 + Math.random() * 60) + 'vh';
  line.style.animationDuration = (3 + Math.random() * 2) + 's';
  line.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(line);
}

// 浪漫装饰图标
const romanticIcons = ['☕', '🌹', '🎻', '💫', '✨', '🌸'];
const romanticPos = [
  {l: 4, t: 20}, {l: 93, t: 15}, {l: 6, t: 78}, {l: 90, t: 82}, {l: 3, t: 50}, {l: 94, t: 55}
];
romanticPos.forEach((pos, i) => {
  const r = document.createElement('div');
  r.className = 'romantic-icon';
  r.textContent = romanticIcons[i];
  r.style.left = pos.l + 'vw';
  r.style.top = pos.t + 'vh';
  r.style.animationDuration = (4 + i * 0.6) + 's';
  r.style.animationDelay = (i * 0.8) + 's';
  document.body.appendChild(r);
});
</script>
</body>
</html>
