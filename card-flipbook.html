<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>回忆相册</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --page-bg: rgba(255, 252, 248, 0.95);
  --card-shadow: 0 8px 40px rgba(0,0,0,0.15);
  --accent: #e91e63;
}

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #1a1a2e 0%, #2d1b3d 50%, #1a1a2e 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 极光 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(233,30,99,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(156,39,176,0.1) 0%, transparent 50%);
  animation: aurora 9s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes aurora {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.04); }
}

/* === 书本容器 === */
.book-wrap {
  position: relative;
  z-index: 10;
  perspective: 2000px;
  width: min(380px, 90vw);
  height: min(520px, 75vh);
}

.book {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
}

/* === 每一页 === */
.page {
  position: absolute;
  inset: 0;
  background: var(--page-bg);
  border-radius: 4px 16px 16px 4px;
  padding: clamp(20px, 5vw, 32px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  transform-origin: left center;
  box-shadow: var(--card-shadow);
  cursor: pointer;
  transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
}

.page:hover {
  box-shadow: 0 12px 50px rgba(0,0,0,0.22);
}

/* 左页（偶数页）背面 */
.page.even {
  transform: rotateY(180deg);
}

/* 当前显示的页面 */
.page.active {
  z-index: 20;
}

/* 已翻过的页 */
.page.passed {
  z-index: 5;
  transform: rotateY(-180deg);
  pointer-events: none;
}

/* 未翻的页（下一页） */
.page.next {
  z-index: 10;
  transform: rotateY(0deg);
}

/* === 页面内容 === */
.page-num {
  font-size: clamp(11px, 2.5vw, 13px);
  color: rgba(0,0,0,0.25);
  letter-spacing: 2px;
  position: absolute;
  bottom: 16px;
  right: 20px;
}

.page-icon {
  font-size: clamp(40px, 10vw, 56px);
  margin-bottom: 16px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
}

.page-title {
  font-size: clamp(18px, 5vw, 26px);
  color: #c2185b;
  margin-bottom: 14px;
  text-align: center;
}

.page-text {
  font-size: clamp(14px, 3.5vw, 17px);
  color: #555;
  line-height: 1.9;
  text-align: center;
  max-width: 280px;
}

.page-photo {
  width: clamp(120px, 35vw, 160px);
  height: clamp(120px, 35vw, 160px);
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid rgba(233,30,99,0.2);
  margin-bottom: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}

.page-divider {
  font-size: clamp(16px, 4vw, 22px);
  color: rgba(233,30,99,0.3);
  letter-spacing: 6px;
  margin: 12px 0;
}

/* === 封面特殊样式 === */
.page.cover {
  background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
  border-radius: 4px 16px 16px 4px;
}
.page.cover .page-icon { font-size: clamp(52px, 13vw, 72px); }
.page.cover .page-title { color: #ad1457; font-size: clamp(22px, 6vw, 32px); }
.page.cover .page-text { color: #880e4f; }

/* === 最后一页（封底） === */
.page.back-cover {
  background: linear-gradient(135deg, #1a1a2e 0%, #2d1b3d 100%);
  border-radius: 16px 4px 4px 16px;
}
.page.back-cover .page-icon { font-size: clamp(36px, 9vw, 50px); }
.page.back-cover .page-title { color: #f48fb1; font-size: clamp(16px, 4vw, 22px); }
.page.back-cover .page-text { color: rgba(255,255,255,0.7); }

/* === 进度指示 === */
.progress {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 30;
}
.progress-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transition: all 0.3s;
}
.progress-dot.active {
  background: #f48fb1;
  transform: scale(1.3);
  box-shadow: 0 0 8px rgba(244,143,177,0.6);
}

/* === 提示文字 === */
.hint {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 2px;
  z-index: 30;
  animation: hintPulse 2.5s ease-in-out infinite;
  white-space: nowrap;
}
@keyframes hintPulse {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 0.65; }
}

/* === 页码按钮（封面和封底） === */
.nav-btn {
  position: absolute;
  font-size: clamp(12px, 3vw, 14px);
  color: rgba(0,0,0,0.35);
  letter-spacing: 1px;
  z-index: 25;
  cursor: pointer;
  transition: color 0.2s;
  padding: 8px 14px;
}
.nav-btn:hover { color: rgba(0,0,0,0.7); }
.nav-btn.next-btn { bottom: 16px; right: 20px; }
.nav-btn.prev-btn { bottom: 16px; left: 20px; }

@media (max-width: 480px) {
  .hint { display: none; }
}
</style>
</head>
<body>

<div class="book-wrap" id="book">
  <!-- 页面由JS生成 -->
</div>

<div class="progress" id="progress"></div>
<div class="hint" id="hintEl">← 点击页面翻阅 →</div>

<script>
// 参数：p1=照片1URL, m1=文字1, p2,p3... 最多7组; n=收礼人; f=署名
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的你';
const from = p.get('f') || '';
const totalPages = 6; // 封面 + 4张照片 + 封底

// 收集照片组
const photoData = [];
for (let i = 1; i <= 7; i++) {
  const photoUrl = p.get(`p${i}`);
  const msg = p.get(`m${i}`);
  if (photoUrl || msg) {
    photoData.push({ url: photoUrl, msg: msg || '' });
  }
}

// 如果没有照片数据，显示示例
const hasPhotos = photoData.length > 0;
const displayPhotos = hasPhotos ? photoData.slice(0, 4) : [
  { url: '', msg: '还记得那次旅行吗？我们走过的每一步都算数。' },
  { url: '', msg: '那天的笑容，是我心里最温暖的光。' },
  { url: '', msg: '无论多远，你一直都在我的故事里。' },
  { url: '', msg: '谢谢你出现在我的生命里，一直都是。' },
];

// 构建页面
const icons = ['💌', '📷', '💕', '🌸', '✨', '🌙'];
const titles = ['封面', '第一页', '第二页', '第三页', '第四页', '尾声'];
const coverTexts = [
  `送给 ${name}`,
  '一份专属于你的回忆',
  '翻开来，慢慢看',
];
const backTexts = [
  '回忆是时光里的琥珀',
  '封存美好，永不褪色',
  from ? `— ${from}` : '— 爱你的TA',
];

const pages = [];

// 封面
pages.push({ type: 'cover', icon: '💌', title: name, text: '点击翻开我们的回忆', isLast: false });
// 照片页
displayPhotos.forEach((item, idx) => {
  pages.push({ type: 'photo', icon: icons[idx + 1], title: titles[idx + 1], text: item.msg, photo: item.url, isLast: false });
});
// 封底
pages.push({ type: 'back', icon: '🌙', title: 'To ' + name, text: backTexts.join('\n'), isLast: true });

let currentPage = 0;
const book = document.getElementById('book');
const progress = document.getElementById('progress');
const hint = document.getElementById('hintEl');

// 生成进度点
for (let i = 0; i < pages.length; i++) {
  const dot = document.createElement('div');
  dot.className = 'progress-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goToPage(i);
  progress.appendChild(dot);
}

// 渲染页面
function renderPages() {
  book.innerHTML = '';
  pages.forEach((page, idx) => {
    const el = document.createElement('div');
    el.className = 'page';

    if (idx === 0) el.classList.add('cover');
    else if (idx === pages.length - 1) el.classList.add('back-cover');
    else if (idx % 2 === 0) el.classList.add('even');

    if (idx === currentPage) el.classList.add('active');
    else if (idx < currentPage) el.classList.add('passed');
    else el.classList.add('next');

    // 页面内容
    let content = '';
    if (page.type === 'cover') {
      content = `
        <div class="page-icon">${page.icon}</div>
        <div class="page-title">${page.title}</div>
        <div class="page-divider">♡</div>
        <div class="page-text">${page.text}</div>
        <div class="page-num">${idx + 1} / ${pages.length}</div>
      `;
    } else if (page.type === 'photo') {
      const photoHtml = page.photo
        ? `<img class="page-photo" src="${page.photo}" alt="回忆${idx}" onerror="this.style.display='none'">`
        : `<div class="page-icon">${page.icon}</div>`;
      content = `
        ${photoHtml}
        <div class="page-title">${page.title}</div>
        <div class="page-text">${page.text}</div>
        <div class="page-num">${idx + 1} / ${pages.length}</div>
      `;
    } else {
      const lines = page.text.split('\n');
      content = `
        <div class="page-icon">${page.icon}</div>
        <div class="page-title">${page.title}</div>
        <div class="page-divider">♡</div>
        <div class="page-text">${lines.join('<br>')}</div>
        <div class="page-num">${idx + 1} / ${pages.length}</div>
      `;
    }

    el.innerHTML = content;
    el.onclick = (e) => {
      if (e.target.classList.contains('progress-dot')) return;
      flipNext();
    };
    book.appendChild(el);
  });
  updateProgress();
}

function flipNext() {
  if (currentPage < pages.length - 1) {
    currentPage++;
    renderPages();
  }
}

function goToPage(idx) {
  currentPage = Math.max(0, Math.min(idx, pages.length - 1));
  renderPages();
}

function updateProgress() {
  const dots = progress.querySelectorAll('.progress-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === currentPage);
  });
  if (currentPage === pages.length - 1 || currentPage === 0) {
    hint.style.display = 'none';
  } else {
    hint.style.display = 'block';
  }
}

// 键盘支持
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') flipNext();
  if (e.key === 'ArrowLeft' && currentPage > 0) {
    currentPage--;
    renderPages();
  }
});

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.page').forEach(el => {
    el.style.transition = 'none';
  });
}

renderPages();
</script>
</body>
</html>
