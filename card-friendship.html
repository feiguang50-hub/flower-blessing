<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>友谊祝福</title>
<meta property="og:title" content="💕 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #fff0f6 0%, #ffe4f0 40%, #ffd6eb 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 柔光漏光 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 30% 25%, rgba(255,150,200,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 75%, rgba(255,180,220,0.15) 0%, transparent 45%);
  animation: softFlare 7s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes softFlare {
  0%, 100% { transform: translate(0, 0); opacity: 0.8; }
  40% { transform: translate(1.2%, 0.8%); opacity: 1; }
  70% { transform: translate(-0.8%, 0.4%); opacity: 0.7; }
}

/* 漂浮爱心 */
.heart {
  position: fixed;
  font-size: 14px;
  animation: heartFloat linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 2px 6px rgba(220,80,140,0.15));
}
@keyframes heartFloat {
  0% { transform: translateY(105vh) translateX(0) rotate(0deg) scale(0.6); opacity: 0; }
  10% { opacity: 0.8; }
  85% { opacity: 0.5; }
  100% { transform: translateY(-10vh) translateX(30px) rotate(20deg) scale(1); opacity: 0; }
}

/* 星星闪烁 */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.4); }
}

/* 蝴蝶飘动 */
.butterfly {
  position: fixed;
  font-size: 16px;
  animation: butterflyFloat ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 3px 6px rgba(180,80,160,0.12));
}
@keyframes butterflyFloat {
  0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  50% { transform: translate(40px, -30px) rotate(15deg); }
  90% { opacity: 0.4; }
  100% { transform: translate(60px, -5vh) rotate(-10deg); opacity: 0; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  border-radius: 32px;
  padding: 2px;
  background: linear-gradient(135deg, #ff9ab0, #ff6b9d, #ffaac8, #ff9ab0, #ff6b9d);
  background-size: 400% 400%;
  animation: pinkBorder 5s ease infinite;
  box-shadow: 0 8px 32px rgba(240,100,160,0.28), 0 0 50px rgba(255,140,180,0.15);
}
@keyframes pinkBorder {
  0% { background-position: 0% 50%; box-shadow: 0 8px 32px rgba(240,100,160,0.28), 0 0 40px rgba(255,140,180,0.1); }
  50% { background-position: 100% 50%; box-shadow: 0 8px 40px rgba(245,110,165,0.38), 0 0 70px rgba(255,150,190,0.2); }
  100% { background-position: 0% 50%; box-shadow: 0 8px 32px rgba(240,100,160,0.28), 0 0 40px rgba(255,140,180,0.1); }
}

.card {
  background: rgba(255,252,255,0.85);
  border-radius: 30px;
  padding: clamp(36px, 7vw, 52px) clamp(28px, 6vw, 44px);
  text-align: center;
  max-width: min(500px, 92vw);
  width: 100%;
  box-shadow: 0 12px 40px rgba(200,90,150,0.15), inset 0 0 28px rgba(255,220,240,0.3);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.4deg); }
  50% { transform: translateY(-7px) rotate(0.4deg); }
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,200,230,0.22) 0%, transparent 60%);
  animation: shimmer 6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(8%, 8%); }
}

/* 图标 */
.card-icon {
  font-size: clamp(46px, 10vw, 68px);
  display: block;
  margin-bottom: 14px;
  animation: iconBounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(220,80,150,0.3));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  30% { transform: scale(1.12) translateY(-4px); }
  60% { transform: scale(0.96) translateY(0); }
  80% { transform: scale(1.06) translateY(-2px); }
}

/* 名字 */
.name {
  font-size: clamp(28px, 7.5vw, 50px);
  color: #c0306a;
  letter-spacing: 5px;
  margin-bottom: 12px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 日期 */
.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: #d07090;
  letter-spacing: 3px;
  margin-bottom: 28px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.48s both;
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 3.5vw, 20px);
  color: #a03060;
  line-height: 1.9;
  letter-spacing: 1.5px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.66s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 2.8vw, 15px);
  color: #c06080;
  margin-top: 20px;
  letter-spacing: 2px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.84s both;
}

/* 底部装饰 */
.footer-deco {
  margin-top: 18px;
  font-size: clamp(20px, 4vw, 28px);
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 1s both;
}

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .heart, .star, .butterfly, .card, .card::before, .card-wrap { animation: none !important; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">💕</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="footer-deco">🌸✨🌸</div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '友谊长存，愿我们的故事永远继续！';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 漂浮爱心
const hearts = ['💕', '💗', '💖', '💓', '🩷', '🤍', '💜'];
for (let i = 0; i < 16; i++) {
  const el = document.createElement('div');
  el.className = 'heart';
  el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (10 + Math.random() * 10) + 'px';
  el.style.animationDuration = (6 + Math.random() * 7) + 's';
  el.style.animationDelay = Math.random() * 10 + 's';
  el.style.opacity = 0.5 + Math.random() * 0.4;
  document.body.appendChild(el);
}

// 星星
for (let i = 0; i < 30; i++) {
  const el = document.createElement('div');
  el.className = 'star';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = Math.random() * 100 + 'vh';
  const size = 1 + Math.random() * 3;
  el.style.width = el.style.height = size + 'px';
  el.style.animationDuration = (2 + Math.random() * 4) + 's';
  el.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(el);
}

// 蝴蝶飘动
const butterflies = ['🦋', '✨', '🌸'];
for (let i = 0; i < 6; i++) {
  const el = document.createElement('div');
  el.className = 'butterfly';
  el.textContent = butterflies[Math.floor(Math.random() * butterflies.length)];
  el.style.left = Math.random() * 80 + 'vw';
  el.style.top = (60 + Math.random() * 40) + 'vh';
  el.style.fontSize = (12 + Math.random() * 8) + 'px';
  el.style.animationDuration = (8 + Math.random() * 6) + 's';
  el.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(el);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.heart,.star,.butterfly').forEach(el => el.remove());
}
</script>
</body>
</html>
