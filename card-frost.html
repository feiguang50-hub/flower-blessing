<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>极光冰晶</title>
<meta property="og:title" content="❄️ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-deep: #0a0a1a;
  --sky-mid: #0d1b2a;
  --aurora-green: #00ff88;
  --aurora-cyan: #00ddff;
  --aurora-purple: #aa66ff;
  --aurora-pink: #ff66aa;
  --ice-blue: #a0e8ff;
  --ice-white: #e8f8ff;
  --frost-glow: rgba(0, 221, 255, 0.5);
  --text-light: #e0f4ff;
  --text-cream: #c8e8ff;
  --card-bg: rgba(10, 20, 40, 0.85);
  --card-border: rgba(0, 221, 255, 0.3);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #050510 0%,
    #0a0a1a 20%,
    #0d1b2a 40%,
    #1a2a4a 60%,
    #0d1b2a 80%,
    #0a0a1a 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 极光效果 */
.aurora {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

.aurora::before {
  content: '';
  position: absolute;
  top: 0;
  left: -20%;
  right: -20%;
  height: 60%;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(0, 255, 136, 0.15) 20%,
    rgba(0, 221, 255, 0.2) 40%,
    rgba(170, 102, 255, 0.15) 60%,
    rgba(255, 102, 170, 0.1) 80%,
    transparent 100%);
  animation: auroraWave 8s ease-in-out infinite;
  filter: blur(30px);
}

.aurora::after {
  content: '';
  position: absolute;
  top: 10%;
  left: -10%;
  right: -10%;
  height: 50%;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(0, 221, 255, 0.1) 30%,
    rgba(0, 255, 136, 0.15) 50%,
    rgba(170, 102, 255, 0.1) 70%,
    transparent 100%);
  animation: auroraWave 10s ease-in-out infinite reverse;
  filter: blur(40px);
}

@keyframes auroraWave {
  0%, 100% { transform: translateX(-5%) skewX(-2deg); }
  25% { transform: translateX(3%) skewX(1deg); }
  50% { transform: translateX(-2%) skewX(-3deg); }
  75% { transform: translateX(4%) skewX(2deg); }
}

/* 星星背景 */
.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: starTwinkle 3s ease-in-out infinite;
}

@keyframes starTwinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 冰晶 */
.crystals {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.crystal {
  position: absolute;
  opacity: 0;
  animation: crystalFloat linear infinite;
  color: var(--ice-blue);
  text-shadow: 0 0 10px var(--frost-glow), 0 0 20px var(--frost-glow);
}

.c1 { left: 5%; animation-duration: 12s; animation-delay: 0s; font-size: 24px; }
.c2 { left: 15%; animation-duration: 15s; animation-delay: 1s; font-size: 18px; }
.c3 { left: 25%; animation-duration: 11s; animation-delay: 2s; font-size: 22px; }
.c4 { left: 38%; animation-duration: 14s; animation-delay: 0.5s; font-size: 20px; }
.c5 { left: 52%; animation-duration: 13s; animation-delay: 1.5s; font-size: 26px; }
.c6 { left: 65%; animation-duration: 16s; animation-delay: 3s; font-size: 16px; }
.c7 { left: 78%; animation-duration: 10s; animation-delay: 0.8s; font-size: 24px; }
.c8 { left: 88%; animation-duration: 14s; animation-delay: 2.5s; font-size: 20px; }

@keyframes crystalFloat {
  0% { top: -10%; opacity: 0; transform: rotate(0deg) scale(0.5); }
  10% { opacity: 0.8; transform: rotate(15deg) scale(1); }
  50% { transform: rotate(-10deg) scale(1.1); }
  90% { opacity: 0.8; transform: rotate(20deg) scale(1); }
  100% { top: 105%; opacity: 0; transform: rotate(-15deg) scale(0.6); }
}

/* 月亮 */
.moon {
  position: fixed;
  top: 10%;
  right: 15%;
  width: 70px;
  height: 70px;
  background: radial-gradient(circle at 35% 35%, #e8f4ff, #a0d0ff);
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(160, 208, 255, 0.6), 0 0 80px rgba(160, 208, 255, 0.3);
  z-index: 1;
  animation: moonGlow 5s ease-in-out infinite;
}

@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 40px rgba(160, 208, 255, 0.6), 0 0 80px rgba(160, 208, 255, 0.3); }
  50% { box-shadow: 0 0 60px rgba(160, 208, 255, 0.8), 0 0 100px rgba(160, 208, 255, 0.4); }
}

/* 卡片包装 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, #00ddff, #aa66ff, #ff66aa, #00ff88, #00ddff);
  background-size: 400% 400%;
  border-radius: 24px;
  animation: borderFlow 5s ease infinite;
  box-shadow: 0 8px 40px rgba(0, 221, 255, 0.4), 0 0 60px rgba(170, 102, 255, 0.2);
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 8px 40px rgba(0, 221, 255, 0.4); }
  50% { background-position: 100% 50%; box-shadow: 0 12px 60px rgba(0, 221, 255, 0.6), 0 0 80px rgba(170, 102, 255, 0.3); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: 50px 55px;
  text-align: center;
  min-width: 300px;
  max-width: 90vw;
  backdrop-filter: blur(10px);
  border: 1px solid var(--card-border);
  position: relative;
  overflow: hidden;
}

/* 冰晶装饰 */
.card::before {
  content: '❄️';
  position: absolute;
  top: 12px;
  left: 18px;
  font-size: 28px;
  opacity: 0.6;
  animation: sparkle 3s ease-in-out infinite;
}

.card::after {
  content: '✦';
  position: absolute;
  top: 15px;
  right: 22px;
  font-size: 22px;
  color: var(--ice-blue);
  opacity: 0.5;
  animation: sparkle 2.5s ease-in-out infinite;
}

@keyframes sparkle {
  0%, 100% { opacity: 0.4; transform: scale(0.9) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
}

/* 顶部图标 */
.top-icon {
  font-size: 55px;
  margin-bottom: 18px;
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  filter: drop-shadow(0 0 15px var(--frost-glow));
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-40px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(30px, 7vw, 48px);
  font-weight: bold;
  background: linear-gradient(135deg, #00ddff, #aa66ff, #ff66aa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 15px;
  animation: slideUp 1.2s ease-out 0.3s both;
  text-shadow: none;
}

.date {
  font-size: clamp(14px, 3vw, 17px);
  color: rgba(160, 208, 255, 0.7);
  margin-bottom: 25px;
  animation: slideUp 1.2s ease-out 0.5s both;
  letter-spacing: 2px;
}

.blessing {
  font-size: clamp(17px, 4vw, 24px);
  color: var(--text-cream);
  line-height: 1.9;
  margin-bottom: 25px;
  animation: slideUp 1.2s ease-out 0.7s both;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
}

.from {
  font-size: clamp(14px, 3vw, 17px);
  color: rgba(160, 200, 220, 0.65);
  animation: slideUp 1.2s ease-out 0.9s both;
  font-style: italic;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 底部装饰 */
.bottom-stars {
  margin-top: 22px;
  font-size: 22px;
  opacity: 0.7;
  animation: slideUp 1.2s ease-out 1.1s both;
}

.bottom-stars span {
  margin: 0 8px;
  display: inline-block;
  animation: starBounce 2s ease-in-out infinite;
}

.bottom-stars span:nth-child(1) { animation-delay: 0s; }
.bottom-stars span:nth-child(2) { animation-delay: 0.3s; }
.bottom-stars span:nth-child(3) { animation-delay: 0.6s; }
.bottom-stars span:nth-child(4) { animation-delay: 0.9s; }
.bottom-stars span:nth-child(5) { animation-delay: 1.2s; }

@keyframes starBounce {
  0%, 100% { transform: translateY(0); opacity: 0.5; }
  50% { transform: translateY(-6px); opacity: 1; }
}

/* 响应式 */
@media (max-width: 480px) {
  .card { padding: 40px 30px; }
  .moon { width: 50px; height: 50px; top: 8%; right: 10%; }
  .crystal { font-size: 18px; }
}
</style>
</head>
<body>

<!-- 极光背景 -->
<div class="aurora"></div>

<!-- 星星 -->
<div class="stars" id="stars"></div>

<!-- 月亮 -->
<div class="moon"></div>

<!-- 冰晶飘落 -->
<div class="crystals">
  <div class="crystal c1">❄️</div>
  <div class="crystal c2">✨</div>
  <div class="crystal c3">❅</div>
  <div class="crystal c4">✦</div>
  <div class="crystal c5">❄️</div>
  <div class="crystal c6">✨</div>
  <div class="crystal c7">❅</div>
  <div class="crystal c8">✦</div>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="top-icon" id="iconEl">❄️</div>
    <div class="name" id="nameEl">亲爱的朋友</div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl">愿你如极光般璀璨<br>如冰晶般纯净而坚强</div>
    <div class="from" id="fromEl"></div>
    <div class="bottom-stars">
      <span>❄️</span><span>✨</span><span>❅</span><span>✦</span><span>❄️</span>
    </div>
  </div>
</div>

<script>
// 生成星星
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 50; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 60 + '%';
  star.style.width = (Math.random() * 3 + 1) + 'px';
  star.style.height = star.style.width;
  star.style.animationDelay = Math.random() * 3 + 's';
  star.style.animationDuration = (Math.random() * 2 + 2) + 's';
  starsContainer.appendChild(star);
}

// 参数读取
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的朋友';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').innerHTML = (p.get('b') || '愿你如极光般璀璨\n如冰晶般纯净而坚强').replace(/\n/g, '<br>');
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');

// 减少动效
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (reducedMotion) {
  document.querySelectorAll('.crystal, .star, .aurora').forEach(el => {
    el.style.animation = 'none';
  });
}
</script>
</body>
</html>
