<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艺术画廊</title>
<meta property="og:title" content="🖼️ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --wall-dark: #1a1418;
  --wall-mid: #2a1f24;
  --gold-light: #d4a84b;
  --gold-deep: #b8860b;
  --gold-bright: #ffd700;
  --cream: #f5e6c8;
  --text-main: #f5e6c8;
  --text-muted: rgba(245, 230, 200, 0.6);
  --card-bg: rgba(20, 12, 14, 0.88);
  --spotlight: rgba(255, 240, 200, 0.12);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #1a1418 0%,
    #2a1f24 40%,
    #1e1618 70%,
    #140e10 100%);
  font-family: 'Georgia', 'Palatino Linotype', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 墙面纹理 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 80px,
      rgba(255,255,255,0.02) 80px,
      rgba(255,255,255,0.02) 82px
    ),
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 60px,
      rgba(255,255,255,0.015) 60px,
      rgba(255,255,255,0.015) 62px
    );
  pointer-events: none;
  z-index: 1;
}

/* 聚光灯 */
body::after {
  content: '';
  position: fixed;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 180%;
  height: 100%;
  background: radial-gradient(ellipse at 50% 0%,
    rgba(255, 240, 200, 0.15) 0%,
    rgba(255, 220, 150, 0.06) 20%,
    transparent 45%);
  pointer-events: none;
  z-index: 1;
  animation: spotlightPulse 5s ease-in-out infinite;
}
@keyframes spotlightPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* 画框装饰 */
.frame-deco {
  position: fixed;
  font-size: 60px;
  z-index: 2;
  pointer-events: none;
  opacity: 0.5;
  animation: frameFloat 6s ease-in-out infinite;
}
@keyframes frameFloat {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
}

/* 星星 */
.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.star {
  position: absolute;
  background: rgba(212, 168, 75, 0.7);
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.8); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

/* 金色光点 */
.sparkles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
.sparkle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #ffd700;
  border-radius: 50%;
  animation: sparkleRise 4s ease-out infinite;
  box-shadow: 0 0 6px rgba(255, 215, 0, 0.8);
}
@keyframes sparkleRise {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  20% { opacity: 1; transform: translateY(-20px) scale(1); }
  80% { opacity: 0.6; transform: translateY(-80px) scale(0.8); }
  100% { opacity: 0; transform: translateY(-100px) scale(0); }
}

/* 画框边框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 6px;
  background: linear-gradient(135deg,
    #d4a84b 0%,
    #ffd700 15%,
    #f5e6c8 30%,
    #d4a84b 45%,
    #b8860b 60%,
    #ffd700 75%,
    #d4a84b 100%);
  background-size: 400% 400%;
  animation: goldBorder 6s ease-in-out infinite;
  border-radius: 8px;
  box-shadow:
    0 0 30px rgba(212, 168, 75, 0.4),
    0 0 60px rgba(255, 215, 0, 0.2),
    0 12px 40px rgba(0, 0, 0, 0.5),
    inset 0 0 20px rgba(255, 255, 255, 0.1);
}
@keyframes goldBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 内层画框 */
.card-wrap::before {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid rgba(245, 230, 200, 0.3);
  border-radius: 6px;
  pointer-events: none;
}

/* 外层画框阴影 */
.card-wrap::after {
  content: '';
  position: absolute;
  inset: -2px;
  border: 2px solid rgba(0, 0, 0, 0.5);
  border-radius: 10px;
  pointer-events: none;
}

.card {
  background: rgba(20, 12, 14, 0.88);
  border-radius: 4px;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 44px);
  max-width: 460px;
  width: 88vw;
  text-align: center;
  position: relative;
  animation: cardFloat 5s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* 画框角落装饰 */
.corner-ornament {
  position: absolute;
  font-size: 18px;
  color: #d4a84b;
  opacity: 0.7;
}
.corner-ornament.tl { top: 8px; left: 8px; }
.corner-ornament.tr { top: 8px; right: 8px; }
.corner-ornament.bl { bottom: 8px; left: 8px; }
.corner-ornament.br { bottom: 8px; right: 8px; }

/* 主图标 */
.icon {
  font-size: clamp(42px, 9vw, 64px);
  display: block;
  margin-bottom: 14px;
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  filter: drop-shadow(0 4px 16px rgba(212, 168, 75, 0.5));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-40px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(24px, 6.5vw, 40px);
  font-weight: bold;
  color: #ffd700;
  margin-bottom: 12px;
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 2px 4px rgba(0,0,0,0.5);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
  font-family: 'Georgia', 'PingFang SC', serif;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.date {
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(245, 230, 200, 0.55);
  margin-bottom: 18px;
  letter-spacing: 3px;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.6s both;
}

.blessing {
  font-size: clamp(16px, 4vw, 22px);
  color: #f5e6c8;
  line-height: 1.8;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.8s both;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

.from {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(212, 168, 75, 0.8);
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1s both;
}

.from::before {
  content: '— ';
}

/* 分割线 */
.divider {
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    #d4a84b 20%,
    #ffd700 50%,
    #d4a84b 80%,
    transparent 100%);
  margin: 16px auto;
  opacity: 0.5;
}

/* 标签 */
.label {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(212, 168, 75, 0.6);
  letter-spacing: 2px;
  white-space: nowrap;
  font-family: 'Georgia', serif;
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .star, .sparkle, .frame-deco, .card {
    animation: none;
  }
  .name, .date, .blessing, .from, .icon {
    animation: none;
    opacity: 1;
  }
}
</style>
</head>
<body>

<!-- 星星 -->
<div class="stars" id="stars"></div>

<!-- 光点 -->
<div class="sparkles" id="sparkles"></div>

<!-- 画框装饰 -->
<div class="frame-deco" style="top: 5%; left: 4%; font-size: 50px;">🖼️</div>
<div class="frame-deco" style="top: 12%; right: 6%; font-size: 40px; animation-delay: -2s;">🎨</div>
<div class="frame-deco" style="bottom: 18%; left: 3%; font-size: 44px; animation-delay: -4s;">🖌️</div>
<div class="frame-deco" style="bottom: 8%; right: 5%; font-size: 36px; animation-delay: -1s;">🖼️</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="corner-ornament tl">❧</span>
    <span class="corner-ornament tr">❧</span>
    <span class="corner-ornament bl">❧</span>
    <span class="corner-ornament br">❧</span>

    <span class="icon" id="iconEl">🖼️</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>

    <div class="label">EXCLUSIVE GALLERY</div>
  </div>
</div>

<script>
// 参数读取
const p = new URLSearchParams(location.search);
const iconMap = { '🖼️': '🖼️', '🎨': '🎨', '🖌️': '🖌️', '✒️': '✒️', '📜': '📜', '🏵️': '🏵️' };
const icon = p.get('i') || '🖼️';
document.getElementById('iconEl').textContent = icon;
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活如艺术品般精彩绝伦';
document.getElementById('fromEl').textContent = p.get('f') || '';

// 生成星星
const starsEl = document.getElementById('stars');
for (let i = 0; i < 25; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.width = (1.5 + Math.random() * 3) + 'px';
  star.style.height = star.style.width;
  star.style.animationDuration = (2 + Math.random() * 3) + 's';
  star.style.animationDelay = Math.random() * 3 + 's';
  starsEl.appendChild(star);
}

// 生成金色光点
const sparklesEl = document.getElementById('sparkles');
for (let i = 0; i < 15; i++) {
  const sparkle = document.createElement('div');
  sparkle.className = 'sparkle';
  sparkle.style.left = (10 + Math.random() * 80) + '%';
  sparkle.style.bottom = (5 + Math.random() * 20) + '%';
  sparkle.style.animationDuration = (3 + Math.random() * 3) + 's';
  sparkle.style.animationDelay = Math.random() * 4 + 's';
  sparklesEl.appendChild(sparkle);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.star, .sparkle, .frame-deco, .card').forEach(el => {
    el.style.animation = 'none';
  });
}
</script>
</body>
</html>
