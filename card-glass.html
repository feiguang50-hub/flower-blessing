<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩绘玻璃窗</title>
<meta property="og:title" content="🏰 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --glass-deep: #0a0510;
  --glass-purple: #2a1040;
  --glass-crimson: #8a1530;
  --glass-blue: #1a4a7a;
  --glass-teal: #1a6a6a;
  --glass-gold: #c9a030;
  --glass-amber: #c07020;
  --glass-rose: #a03050;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #0a0510 0%,
    #150820 30%,
    #1a0a20 60%,
    #0d0515 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 光芒射线 */
.light-rays {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  background: radial-gradient(
    ellipse 80% 60% at 50% 20%,
    rgba(200, 160, 60, 0.12) 0%,
    transparent 70%
  );
  animation: raysPulse 6s ease-in-out infinite;
}

@keyframes raysPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* 背景光斑 */
.light-spots {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 1;
}

.spot {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  animation: spotFloat var(--dur, 8s) ease-in-out infinite;
}

.spot-1 {
  width: 300px; height: 300px;
  top: -50px; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(200, 150, 50, 0.15), transparent);
  animation-delay: 0s;
}

.spot-2 {
  width: 200px; height: 200px;
  bottom: 10%; left: 10%;
  background: radial-gradient(circle, rgba(150, 80, 180, 0.1), transparent);
  animation-delay: 3s;
}

@keyframes spotFloat {
  0%, 100% { opacity: 0.4; transform: translateY(0); }
  50% { opacity: 0.8; transform: translateY(-10px); }
}

/* 彩绘玻璃窗装饰 - 顶部 */
.glass-window {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 120px;
  z-index: 2;
  pointer-events: none;
  opacity: 0.6;
}

.glass-frame {
  position: absolute;
  background: rgba(255, 220, 150, 0.15);
  border: 1px solid rgba(200, 160, 80, 0.4);
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 16px;
  background: linear-gradient(135deg,
    var(--glass-crimson),
    var(--glass-blue),
    var(--glass-teal),
    var(--glass-gold),
    var(--glass-amber),
    var(--glass-rose),
    var(--glass-purple),
    var(--glass-crimson)
  );
  background-size: 400% 400%;
  animation: glassBorder 8s ease infinite;
  box-shadow:
    0 0 30px rgba(200, 150, 80, 0.3),
    0 0 60px rgba(150, 80, 180, 0.15),
    inset 0 0 20px rgba(200, 180, 100, 0.1);
}

@keyframes glassBorder {
  0% { background-position: 0% 50%; }
  25% { background-position: 100% 0%; }
  50% { background-position: 100% 100%; }
  75% { background-position: 0% 100%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: linear-gradient(180deg,
    rgba(15, 8, 25, 0.97) 0%,
    rgba(20, 12, 35, 0.95) 50%,
    rgba(12, 6, 20, 0.97) 100%);
  border-radius: 14px;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 42px);
  text-align: center;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  min-width: 300px;
  max-width: 480px;
}

/* 卡片内彩色玻璃纹理 */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(180, 60, 60, 0.08), transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 30%, rgba(60, 80, 180, 0.08), transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 80%, rgba(180, 120, 40, 0.06), transparent 60%),
    radial-gradient(ellipse 30% 40% at 10% 70%, rgba(120, 60, 150, 0.06), transparent 60%),
    radial-gradient(ellipse 35% 35% at 90% 80%, rgba(40, 120, 120, 0.06), transparent 60%);
  pointer-events: none;
}

/* 卡片边框模拟玻璃窗格 */
.card::after {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(200, 180, 100, 0.15);
  border-radius: 8px;
  pointer-events: none;
  background: linear-gradient(135deg,
    rgba(200, 60, 60, 0.03) 0%, transparent 30%,
    rgba(60, 80, 180, 0.03) 50%, transparent 70%,
    rgba(180, 120, 40, 0.03) 100%);
}

.icon {
  font-size: clamp(40px, 10vw, 64px);
  display: block;
  margin-bottom: clamp(12px, 3vw, 20px);
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.5));
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(26px, 7vw, 48px);
  font-weight: 600;
  background: linear-gradient(135deg,
    #c9a84c 0%,
    #e8d090 25%,
    #c9a84c 50%,
    #f0d8a0 75%,
    #c9a84c 100%
  );
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldShimmer 4s ease-in-out infinite;
  margin-bottom: clamp(10px, 2.5vw, 18px);
  opacity: 1;
  position: relative; z-index: 1;
}

@keyframes goldShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.date {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(200, 180, 130, 0.65);
  letter-spacing: 3px;
  margin-bottom: clamp(16px, 4vw, 28px);
  opacity: 1;
  position: relative; z-index: 1;
}

.blessing {
  font-size: clamp(16px, 4vw, 22px);
  color: rgba(220, 210, 190, 0.9);
  line-height: 1.9;
  margin-bottom: clamp(20px, 5vw, 36px);
  opacity: 1;
  animation: fadeSlideIn 1.2s ease-out 0.4s both;
  position: relative; z-index: 1;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.from {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(200, 180, 130, 0.55);
  font-style: italic;
  opacity: 1;
  animation: fadeSlideIn 1.2s ease-out 0.6s both;
  position: relative; z-index: 1;
}

/* 背面 */
.card.flipped {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  backface-visibility: hidden;
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 42px);
  border-radius: 14px;
}

.card-back {
  transform: rotateY(180deg);
  background: linear-gradient(180deg,
    rgba(10, 5, 20, 0.98) 0%,
    rgba(18, 8, 30, 0.96) 100%
  );
}

.card-back::before {
  background:
    radial-gradient(ellipse 50% 40% at 70% 30%, rgba(180, 60, 60, 0.1), transparent 60%),
    radial-gradient(ellipse 40% 50% at 30% 70%, rgba(60, 80, 180, 0.1), transparent 60%);
}

.back-title {
  font-size: clamp(18px, 4.5vw, 26px);
  background: linear-gradient(135deg, #c9a84c, #e8d090, #c9a84c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: clamp(12px, 3vw, 20px);
  opacity: 1;
  position: relative; z-index: 1;
}

.back-text {
  font-size: clamp(14px, 3.5vw, 18px);
  color: rgba(220, 210, 190, 0.8);
  line-height: 1.9;
  opacity: 1;
  animation: fadeSlideIn 1.2s ease-out 0.3s both;
  position: relative; z-index: 1;
}

.back-text em {
  color: rgba(255, 200, 120, 0.9);
  font-style: normal;
}

/* 底部装饰 */
.glass-hint {
  position: absolute;
  bottom: 10px;
  font-size: 10px;
  color: rgba(200, 180, 120, 0.25);
  letter-spacing: 5px;
  text-transform: uppercase;
  opacity: 1;
  z-index: 1;
}

/* 无障碍 */
@media (prefers-reduced-motion: reduce) {
  .icon, .name, .blessing, .from, .spot, .light-rays {
    animation: none !important;
  }
  .card-wrap {
    animation: none !important;
  }
}
</style>
</head>
<body>

<div class="light-rays"></div>
<div class="light-spots">
  <div class="spot spot-1"></div>
  <div class="spot spot-2"></div>
</div>

<div class="card-wrap" id="cardWrap">
  <div class="card" id="card">
    <div class="card-front">
      <span class="icon" id="iconEl">🏰</span>
      <div class="name" id="nameEl"></div>
      <div class="date" id="dateEl"></div>
      <div class="blessing" id="blessingEl"></div>
      <div class="from" id="fromEl"></div>
      <div class="glass-hint">stained glass</div>
    </div>
    <div class="card-back">
      <div class="back-title" id="backTitle">专属寄语</div>
      <div class="back-text" id="backEl"></div>
    </div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿光芒穿透黑暗，照亮你前行的每一步';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

const icon = p.get('i') || '🏰';
document.getElementById('iconEl').textContent = icon;

if (p.get('back')) {
  document.getElementById('backEl').innerHTML = p.get('back').replace(/\\n/g, '<br>');
  document.getElementById('backTitle').textContent = p.get('backTitle') || '专属寄语';
}

// 3D翻转
const card = document.getElementById('card');
card.addEventListener('click', function() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  card.classList.toggle('flipped');
});
</script>
</body>
</html>
