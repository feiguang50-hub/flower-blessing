<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万圣节祝福</title>
<meta property="og:title" content="🎃 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #0d0018 0%, #1a0a2e 30%, #2d1b4e 60%, #1a0a2e 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 夜空紫光呼吸 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(120,0,180,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255,80,0,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(60,0,120,0.15) 0%, transparent 60%);
  animation: purpleBreath 5s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes purpleBreath {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* 星星背景 */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: twinkle linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.4); }
}

/* 蝙蝠 */
.bat {
  position: fixed;
  font-size: 20px;
  animation: batFly linear infinite;
  z-index: 2;
  pointer-events: none;
}
@keyframes batFly {
  0% { transform: translate(0, 0) scaleX(1); opacity: 0; }
  5% { opacity: 0.9; }
  25% { transform: translate(25vw, -8vh) scaleX(-1); }
  50% { transform: translate(50vw, 5vh) scaleX(1); }
  75% { transform: translate(75vw, -5vh) scaleX(-1); }
  95% { opacity: 0.8; }
  100% { transform: translate(100vw, 0) scaleX(1); opacity: 0; }
}

/* 幽灵 */
.ghost {
  position: fixed;
  font-size: 22px;
  animation: ghostFloat ease-in-out infinite;
  z-index: 2;
  pointer-events: none;
  text-shadow: 0 0 12px rgba(200,180,255,0.6);
}
@keyframes ghostFloat {
  0%, 100% { transform: translateY(0) rotate(-3deg); opacity: 0.75; }
  50% { transform: translateY(-20px) rotate(3deg); opacity: 0.95; }
}

/* 南瓜光斑 */
.pumpkin-glow {
  position: fixed;
  width: 6px; height: 6px;
  background: radial-gradient(circle, #ff9900, transparent);
  border-radius: 50%;
  animation: glowPulse ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.8); }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg, #ff6600, #6a0dad, #ff6600, #6a0dad);
  background-size: 300% 300%;
  animation: borderPulse 4s ease-in-out infinite;
  box-shadow: 0 0 24px rgba(255,100,0,0.5), 0 0 48px rgba(106,13,173,0.3);
}
@keyframes borderPulse {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 24px rgba(255,100,0,0.5), 0 0 48px rgba(106,13,173,0.3); }
  50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(255,100,0,0.7), 0 0 80px rgba(106,13,173,0.5); }
}

/* 卡片主体 */
.card {
  position: relative;
  background: linear-gradient(165deg, rgba(25,10,40,0.97), rgba(35,18,60,0.94));
  border-radius: 22px;
  padding: clamp(28px, 7vw, 56px) clamp(24px, 6vw, 48px);
  max-width: 520px;
  width: 90vw;
  text-align: center;
  box-shadow: inset 0 2px 12px rgba(150,100,200,0.15), 0 8px 32px rgba(0,0,0,0.4);
  overflow: hidden;
}

/* 卡片内发光流动 */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,150,0,0.05) 0%, transparent 40%, rgba(150,0,255,0.05) 100%);
  animation: shimmer 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* 图标 */
.card-icon {
  font-size: clamp(40px, 10vw, 64px);
  display: block;
  margin-bottom: 14px;
  opacity: 1;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  filter: drop-shadow(0 0 10px rgba(255,150,0,0.5));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-40px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 名字 */
.name {
  font-size: clamp(22px, 6vw, 38px);
  font-weight: bold;
  color: #ffaa00;
  margin-bottom: 8px;
  letter-spacing: 0.08em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
  text-shadow: 0 0 8px rgba(255,170,0,0.4);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 祝福语 */
.blessing {
  font-size: clamp(15px, 4.5vw, 22px);
  color: #d4aaff;
  line-height: 1.8;
  margin: 16px 0;
  padding: 0 8px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.7s both;
}

/* 日期 */
.date {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #a080c0;
  letter-spacing: 0.12em;
  margin-bottom: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
}

/* 署名 */
.from {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #c090e0;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}

/* 底部装饰 */
.card-footer {
  margin-top: 18px;
  font-size: clamp(11px, 2.8vw, 14px);
  color: #8060a0;
  letter-spacing: 0.2em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.3s both;
}

/* 角落装饰 */
.deco-corner {
  position: absolute;
  font-size: 18px;
  opacity: 0.12;
  pointer-events: none;
  z-index: 0;
}
.deco-corner:nth-child(1) { top: 10%; left: 8%; transform: rotate(-10deg); }
.deco-corner:nth-child(2) { top: 15%; right: 10%; transform: rotate(15deg); }
.deco-corner:nth-child(3) { bottom: 15%; left: 6%; transform: rotate(8deg); }
.deco-corner:nth-child(4) { bottom: 10%; right: 8%; transform: rotate(-12deg); }

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .bat, .ghost, .pumpkin-glow, .card-wrap, .card-icon, .name, .blessing, .date, .from, .card-footer { animation: none; opacity: 0.8; }
  .star { animation: none; opacity: 0.4; }
}
</style>
</head>
<body>

<script>
(function(){
  // 星星
  const starCount = 35;
  for(let i=0; i<starCount; i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.width = s.style.height = (1 + Math.random() * 2.5) + 'px';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    s.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(s);
  }

  // 蝙蝠
  const batCount = 4;
  const batChars = ['\u{1F987}', '\u{1F987}', '\u{1F98B}', '\u{1F987}'];
  for(let i=0; i<batCount; i++){
    const bat = document.createElement('div');
    bat.className = 'bat';
    bat.textContent = batChars[i % batChars.length];
    bat.style.left = (-10 + Math.random() * 5) + 'vw';
    bat.style.top = (5 + Math.random() * 25) + 'vh';
    bat.style.fontSize = (16 + Math.random() * 14) + 'px';
    bat.style.animationDuration = (8 + Math.random() * 6) + 's';
    bat.style.animationDelay = Math.random() * 10 + 's';
    document.body.appendChild(bat);
  }

  // 幽灵
  const ghostCount = 5;
  const ghostChars = ['\u{1F47B}', '\u{1F47B}', '\u{1F47B}', '\u{1F47B}', '\u{1F47B}'];
  for(let i=0; i<ghostCount; i++){
    const g = document.createElement('div');
    g.className = 'ghost';
    g.textContent = ghostChars[i % ghostChars.length];
    g.style.left = (5 + Math.random() * 85) + 'vw';
    g.style.top = (60 + Math.random() * 30) + 'vh';
    g.style.fontSize = (16 + Math.random() * 12) + 'px';
    g.style.animationDuration = (4 + Math.random() * 4) + 's';
    g.style.animationDelay = Math.random() * 8 + 's';
    document.body.appendChild(g);
  }

  // 南瓜光斑
  const glowCount = 12;
  for(let i=0; i<glowCount; i++){
    const g = document.createElement('div');
    g.className = 'pumpkin-glow';
    g.style.left = Math.random() * 100 + 'vw';
    g.style.top = Math.random() * 100 + 'vh';
    g.style.animationDuration = (2 + Math.random() * 3) + 's';
    g.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(g);
  }

  // URL参数
  const p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '万圣节快乐';
  document.getElementById('blessingEl').textContent = p.get('b') || '不给糖就捣蛋！愿你今晚收获满满的惊喜和糖果';
  const d = p.get('d');
  document.getElementById('dateEl').textContent = d ? '\u3010 ' + d + ' \u3011 不给糖就捣蛋';
  document.getElementById('fromEl').textContent = p.get('f') ? '\u2014 ' + p.get('f') : '';
})();
</script>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="deco-corner">🎃</span>
    <span class="deco-corner">🎃</span>
    <span class="deco-corner">🎃</span>
    <span class="deco-corner">🎃</span>

    <span class="card-icon">🎃</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="card-footer">✨ ✨ ✨ ✨ ✨</div>
  </div>
</div>

</body>
</html>
