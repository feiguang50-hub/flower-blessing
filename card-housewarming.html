<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乔迁之喜</title>
<meta property="og:title" content="🏠 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #faf6f0 0%, #f5e8d8 40%, #f0e0c8 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 暖光漏光 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,220,160,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(255,200,120,0.15) 0%, transparent 45%);
  animation: warmFlare 8s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes warmFlare {
  0%, 100% { transform: translate(0, 0); opacity: 0.8; }
  40% { transform: translate(1.5%, 1%); opacity: 1; }
  70% { transform: translate(-1%, 0.5%); opacity: 0.7; }
}

/* 金色光点上升 */
.golden-particle {
  position: fixed;
  background: radial-gradient(circle, #ffd700, #f0a500);
  border-radius: 50%;
  animation: goldenRise linear infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 5px rgba(255,200,0,0.5);
}
@keyframes goldenRise {
  0% { transform: translateY(105vh) scale(0.3); opacity: 0; }
  10% { opacity: 0.85; }
  85% { opacity: 0.4; }
  100% { transform: translateY(-8vh) scale(0.8); opacity: 0; }
}

/* 羽毛飘落 */
.feather {
  position: fixed;
  font-size: 13px;
  animation: featherFall linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 2px 5px rgba(180,140,80,0.15));
}
@keyframes featherFall {
  0% { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity: 0; }
  8% { opacity: 0.8; }
  88% { opacity: 0.6; }
  100% { transform: translateY(105vh) translateX(40px) rotate(280deg); opacity: 0; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  border-radius: 28px;
  padding: 2px;
  background: linear-gradient(135deg, #d4a853, #c9952c, #e8c060, #d4a853, #c9952c);
  background-size: 400% 400%;
  animation: warmBorder 5s ease infinite;
  box-shadow: 0 8px 32px rgba(200,150,50,0.25), 0 0 50px rgba(220,170,60,0.12);
}
@keyframes warmBorder {
  0% { background-position: 0% 50%; box-shadow: 0 8px 32px rgba(200,150,50,0.25), 0 0 40px rgba(220,170,60,0.1); }
  50% { background-position: 100% 50%; box-shadow: 0 8px 40px rgba(210,160,60,0.35), 0 0 70px rgba(230,180,70,0.18); }
  100% { background-position: 0% 50%; box-shadow: 0 8px 32px rgba(200,150,50,0.25), 0 0 40px rgba(220,170,60,0.1); }
}

.card {
  background: rgba(255,250,240,0.88);
  border-radius: 26px;
  padding: clamp(36px, 7vw, 52px) clamp(28px, 6vw, 44px);
  text-align: center;
  max-width: min(500px, 92vw);
  width: 100%;
  box-shadow: 0 12px 40px rgba(160,110,40,0.15), inset 0 0 28px rgba(255,235,195,0.25);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.4deg); }
  50% { transform: translateY(-7px) rotate(0.4deg); }
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,220,160,0.2) 0%, transparent 60%);
  animation: shimmer 6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(8%, 8%); }
}

/* 图标 */
.card-icon {
  font-size: clamp(46px, 10vw, 68px);
  display: block;
  margin-bottom: 14px;
  animation: iconBounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(180,130,40,0.3));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  30% { transform: scale(1.12) translateY(-4px); }
  60% { transform: scale(0.96) translateY(0); }
  80% { transform: scale(1.06) translateY(-2px); }
}

/* 标题 */
.title {
  font-size: clamp(13px, 3vw, 17px);
  color: #b08030;
  letter-spacing: 6px;
  margin-bottom: 10px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  text-transform: uppercase;
}

/* 名字 */
.name {
  font-size: clamp(28px, 7.5vw, 50px);
  color: #7a4a10;
  letter-spacing: 6px;
  margin-bottom: 12px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.35s both;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 日期 */
.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: #c09050;
  letter-spacing: 3px;
  margin-bottom: 28px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 3.5vw, 20px);
  color: #8a5a20;
  line-height: 1.9;
  letter-spacing: 1.5px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.65s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 2.8vw, 15px);
  color: #b08040;
  margin-top: 20px;
  letter-spacing: 2px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
}

/* 底部装饰 */
.footer-deco {
  margin-top: 18px;
  font-size: clamp(20px, 4vw, 28px);
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 1s both;
}

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .golden-particle, .feather, .card, .card::before, .card-wrap { animation: none !important; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">🏠</span>
    <div class="title">乔迁之喜</div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="footer-deco">✨🌟✨</div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '新居落成，福气盈门，愿一切美好如期而至！';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 金色光点上升
for (let i = 0; i < 18; i++) {
  const el = document.createElement('div');
  el.className = 'golden-particle';
  el.style.left = Math.random() * 100 + 'vw';
  const size = 3 + Math.random() * 5;
  el.style.width = el.style.height = size + 'px';
  el.style.animationDuration = (6 + Math.random() * 7) + 's';
  el.style.animationDelay = Math.random() * 10 + 's';
  document.body.appendChild(el);
}

// 羽毛飘落（温暖米色系）
const feathers = ['🪶', '🍂', '✨', '🌾'];
for (let i = 0; i < 14; i++) {
  const el = document.createElement('div');
  el.className = 'feather';
  el.textContent = feathers[Math.floor(Math.random() * feathers.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (9 + Math.random() * 9) + 'px';
  el.style.animationDuration = (7 + Math.random() * 6) + 's';
  el.style.animationDelay = Math.random() * 8 + 's';
  el.style.opacity = 0.4 + Math.random() * 0.5;
  document.body.appendChild(el);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.golden-particle,.feather').forEach(el => el.remove());
}
</script>
</body>
</html>
