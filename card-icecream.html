<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏日冰淇淋</title>
<meta property="og:title" content="🍦 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-pink: #ffd4e8;
  --sky-peach: #ffe4cc;
  --sky-mint: #d4f0e8;
  --sky-lavender: #e4d4ff;
  --cone-brown: #c8956a;
  --cone-dark: #a07040;
  --text-dark: #5a3a2a;
  --text-light: #8a6a5a;
  --card-bg: rgba(255,255,255,0.88);
  --border-pink: rgba(255,180,210,0.6);
  --glow-warm: rgba(255,200,160,0.5);
  --sprinkle-1: #ff6b9d;
  --sprinkle-2: #6bffb8;
  --sprinkle-3: #6bb8ff;
  --sprinkle-4: #ffe06b;
  --sprinkle-5: #ff8c6b;
  --sprinkle-6: #c86bff;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 30% 10%, rgba(255,200,230,0.6) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 15%, rgba(255,220,180,0.4) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 85%, rgba(200,240,220,0.3) 0%, transparent 50%),
    linear-gradient(180deg,
      #ffe4f0 0%,
      #ffd8e8 20%,
      #ffe4d8 50%,
      #d4f0e8 80%,
      #e4d4ff 100%
    );
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 冰淇淋球装饰 */
.icecream-ball {
  position: fixed;
  border-radius: 50%;
  z-index: 2;
  pointer-events: none;
  animation: ballBob 3s ease-in-out infinite;
}
.ball-1 {
  width: 50px; height: 50px;
  background: radial-gradient(circle at 35% 35%, #ffccd8, #ff9ebc);
  top: 10%; left: 8%;
  animation-delay: 0s;
}
.ball-2 {
  width: 38px; height: 38px;
  background: radial-gradient(circle at 35% 35%, #d4f0ff, #9ec8ff);
  top: 15%; right: 10%;
  animation-delay: 1s;
}
.ball-3 {
  width: 44px; height: 44px;
  background: radial-gradient(circle at 35% 35%, #d4ffe8, #7ed8a0);
  top: 8%; right: 25%;
  animation-delay: 0.5s;
}
.ball-4 {
  width: 32px; height: 32px;
  background: radial-gradient(circle at 35% 35%, #ffe8d4, #ffc89c);
  top: 22%; left: 18%;
  animation-delay: 1.5s;
}
.ball-5 {
  width: 36px; height: 36px;
  background: radial-gradient(circle at 35% 35%, #e8d4ff, #c89cff);
  bottom: 18%; right: 12%;
  animation-delay: 2s;
}

@keyframes ballBob {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-10px) scale(1.05); }
}

/* 糖屑飘落 */
.sprinkle {
  position: fixed;
  width: 6px; height: 3px;
  border-radius: 3px;
  z-index: 1;
  pointer-events: none;
  animation: sprinkleFall var(--d, 6s) linear infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes sprinkleFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}

/* 气泡上浮 */
.bubble {
  position: fixed;
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
  background: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.6);
  animation: bubbleRise var(--d, 8s) ease-in infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes bubbleRise {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  20% { opacity: 0.7; }
  80% { opacity: 0.5; }
  100% { transform: translateY(-60vh) scale(0.5); opacity: 0; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg,
    #ff9ec8, #ffb8d4,
    #b8e4ff, #b8f0d4,
    #ffe4a0, #e4c8ff,
    #ff9ec8
  );
  background-size: 400% 400%;
  border-radius: 24px;
  animation: icecreamBorder 6s ease-in-out infinite;
  box-shadow:
    0 6px 30px rgba(255,150,190,0.3),
    0 12px 50px rgba(180,200,255,0.2);
}
@keyframes icecreamBorder {
  0% { background-position: 0% 50%; }
  25% { background-position: 50% 0%; }
  50% { background-position: 100% 50%; }
  75% { background-position: 50% 100%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: var(--card-bg);
  border-radius: 21px;
  padding: clamp(32px, 8vw, 52px) clamp(28px, 7vw, 48px);
  width: min(480px, 90vw);
  text-align: center;
  position: relative;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  animation: cardFloat 4s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* 冰淇淋图标 */
.card-icon {
  font-size: clamp(42px, 10vw, 60px);
  display: block;
  margin-bottom: 16px;
  filter: drop-shadow(0 4px 12px rgba(255,150,180,0.4));
  animation: iconBounce 2.5s ease-in-out infinite;
}
@keyframes iconBounce {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-8px) rotate(3deg); }
}

/* 姓名 */
.card-name {
  font-size: clamp(24px, 6vw, 38px);
  font-weight: bold;
  color: var(--text-dark);
  margin-bottom: 12px;
  letter-spacing: 4px;
  text-shadow: 0 2px 8px rgba(255,150,180,0.3);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.15s both;
}

/* 日期 */
.card-date {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-light);
  letter-spacing: 3px;
  margin-bottom: 20px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.3s both;
}

/* 分隔线 */
.card-divider {
  width: 70%;
  height: 2px;
  margin: 0 auto 20px;
  background: linear-gradient(90deg,
    transparent,
    var(--sprinkle-1) 20%,
    var(--sprinkle-3) 40%,
    var(--sprinkle-4) 60%,
    var(--sprinkle-2) 80%,
    transparent
  );
  border-radius: 2px;
  animation: widthGrow 1s ease-out 0.4s both;
}
@keyframes widthGrow {
  from { width: 0; opacity: 0; }
  to { width: 70%; opacity: 1; }
}

/* 祝福语 */
.card-blessing {
  font-size: clamp(14px, 4vw, 19px);
  color: var(--text-dark);
  line-height: 1.8;
  letter-spacing: 1px;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}

/* 署名 */
.card-from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-light);
  letter-spacing: 2px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.7s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 甜筒装饰 */
.cone-deco {
  position: absolute;
  pointer-events: none;
}
.cone-left {
  left: -20px;
  bottom: 30px;
  font-size: 56px;
  transform: rotate(-15deg);
  filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.15));
}
.cone-right {
  right: -16px;
  top: 20px;
  font-size: 44px;
  transform: rotate(15deg) scaleX(-1);
  filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.15));
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .card-icon { animation: none; }
  .card { opacity: 1; }
  .card-wrap { animation: none; background: #ff9ec8; }
  .sprinkle, .bubble, .icecream-ball { animation: none; }
}
</style>

</head>
<body>

<!-- 冰淇淋球装饰 -->
<div class="icecream-ball ball-1"></div>
<div class="icecream-ball ball-2"></div>
<div class="icecream-ball ball-3"></div>
<div class="icecream-ball ball-4"></div>
<div class="icecream-ball ball-5"></div>

<!-- 糖屑飘落（通过JS生成） -->
<div id="sprinkles"></div>

<!-- 气泡上浮 -->
<div id="bubbles"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="cone-deco cone-left">🍦</div>
    <div class="cone-deco cone-right">🍦</div>

    <span class="card-icon">🍦</span>
    <div class="card-name" id="nameEl">亲爱的</div>
    <div class="card-date" id="dateEl"></div>
    <div class="card-divider"></div>
    <div class="card-blessing" id="blessingEl">愿你的每一天<br>都像冰淇淋一样甜蜜美好</div>
    <div class="card-from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的';
const blessing = p.get('b') || '愿你的每一天\n都像冰淇淋一样甜蜜美好';
const date = p.get('d') || '';
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').innerHTML = blessing.replace(/\n/g, '<br>');
document.getElementById('dateEl').textContent = date;
document.getElementById('fromEl').textContent = from ? '— ' + from : '';

// 生成糖屑
const sprinkleColors = ['#ff6b9d','#6bffb8','#6bb8ff','#ffe06b','#ff8c6b','#c86bff'];
const sprinkleContainer = document.getElementById('sprinkles');
for (let i = 0; i < 20; i++) {
  const s = document.createElement('div');
  s.className = 'sprinkle';
  s.style.left = Math.random() * 100 + '%';
  s.style.background = sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)];
  s.style.setProperty('--d', (5 + Math.random() * 5) + 's');
  s.style.setProperty('--delay', (Math.random() * 6) + 's');
  sprinkleContainer.appendChild(s);
}

// 生成气泡
const bubbleContainer = document.getElementById('bubbles');
for (let i = 0; i < 10; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const size = 6 + Math.random() * 14;
  b.style.width = size + 'px';
  b.style.height = size + 'px';
  b.style.left = Math.random() * 100 + '%';
  b.style.bottom = (Math.random() * 30) + '%';
  b.style.setProperty('--d', (6 + Math.random() * 6) + 's');
  b.style.setProperty('--delay', (Math.random() * 8) + 's');
  bubbleContainer.appendChild(b);
}
</script>

</body>
</html>
