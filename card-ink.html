<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水墨寄情</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #1a1a1a;
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(60,50,40,0.5) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(40,35,45,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(30,28,32,0.3) 0%, transparent 70%);
  font-family: 'Georgia', 'STKaiti', 'KaiTi', 'FangSong', 'STFangsong', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 水墨晕染背景 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 85%, rgba(80,70,60,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(60,50,70,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 30%, rgba(50,45,55,0.2) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  animation: inkBreath 10s ease-in-out infinite;
}
@keyframes inkBreath {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* 墨滴飘落 */
.ink-drop {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(100,90,80,0.6) 0%, rgba(60,50,40,0.3) 50%, transparent 70%);
  animation: inkFall linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes inkFall {
  0% { transform: translateY(-5vh) scale(1); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(105vh) scale(0.5); opacity: 0; }
}

/* 梅花飘落 */
.plum {
  position: fixed;
  font-size: 12px;
  animation: plumFall linear infinite;
  z-index: 2;
  pointer-events: none;
  opacity: 0;
}
@keyframes plumFall {
  0% { transform: translateY(-5vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.4; }
  100% { transform: translateY(105vh) rotate(180deg); opacity: 0; }
}

/* 印章装饰 */
.seal {
  position: absolute;
  top: 22px;
  right: 22px;
  width: 44px;
  height: 44px;
  border: 2px solid #c0392b;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #c0392b;
  font-weight: bold;
  font-family: 'STKaiti', 'KaiTi', serif;
  writing-mode: vertical-rl;
  text-orientation: upright;
  letter-spacing: 2px;
  opacity: 0.85;
  animation: sealStamp 1.5s ease-out 0.8s both;
  box-shadow: 0 0 8px rgba(192,57,43,0.3);
}
@keyframes sealStamp {
  0% { transform: scale(1.8) rotate(-10deg); opacity: 0; }
  50% { transform: scale(1.1) rotate(3deg); opacity: 0.9; }
  100% { transform: scale(1) rotate(0deg); opacity: 0.85; }
}

/* 卡片外框 — 水墨渐变边框 */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 12px;
  background: linear-gradient(135deg, #d4c4a8, #8b7355, #d4c4a8, #c8b898, #d4c4a8);
  background-size: 400% 400%;
  animation: inkBorder 8s ease infinite;
  z-index: 10;
  box-shadow: 0 0 30px rgba(100,90,70,0.3), 0 0 60px rgba(60,50,40,0.15);
}
@keyframes inkBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card {
  background: linear-gradient(145deg, #2a2520 0%, #1e1c18 50%, #252220 100%);
  border-radius: 10px;
  padding: clamp(32px, 7vw, 52px) clamp(24px, 6vw, 44px);
  text-align: center;
  max-width: 480px;
  width: 88vw;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(180,160,120,0.15);
}

/* 卡片内的水墨光晕 */
.card::before {
  content: '';
  position: absolute;
  top: -80px; left: -80px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(100,90,70,0.12) 0%, transparent 70%);
  pointer-events: none;
  animation: cardShimmer 7s ease-in-out infinite;
}
@keyframes cardShimmer {
  0%, 100% { transform: translate(0,0); opacity: 0.4; }
  50% { transform: translate(20px, 20px); opacity: 0.8; }
}

/* 顶部装饰线 */
.top-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.1s both;
}
.top-line::before, .top-line::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180,160,120,0.5), transparent);
}
.top-ornament {
  color: rgba(180,160,120,0.6);
  font-size: 14px;
  letter-spacing: 8px;
}

.date {
  font-size: clamp(11px, 2.8vw, 14px);
  color: rgba(180,160,120,0.6);
  letter-spacing: 4px;
  margin-bottom: 18px;
  font-style: italic;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.2s both;
}

.name {
  font-size: clamp(30px, 8vw, 54px);
  font-weight: bold;
  color: #e8dcc8;
  margin-bottom: 20px;
  font-family: 'Georgia', 'STKaiti', 'KaiTi', serif;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.3s both;
  text-shadow: 0 2px 12px rgba(100,90,70,0.5);
  letter-spacing: 4px;
  position: relative;
}

/* 名字下划线 — 毛笔质感 */
.name::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 50%; transform: translateX(-50%);
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(180,160,120,0.4), rgba(192,57,43,0.3), rgba(180,160,120,0.4), transparent);
}

.blessing {
  font-size: clamp(14px, 3.8vw, 20px);
  color: rgba(220,210,190,0.9);
  line-height: 2;
  margin: 20px 0;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.45s both;
  font-family: 'Georgia', 'STKaiti', 'KaiTi', 'FangSong', serif;
  letter-spacing: 1px;
}

/* 分隔装饰 */
.sep {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 18px 0;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.55s both;
}
.sep::before, .sep::after {
  content: '';
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180,160,120,0.4), transparent);
}
.sep-dot {
  color: rgba(180,160,120,0.5);
  font-size: 10px;
}

.from {
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(180,160,120,0.65);
  font-style: italic;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.65s both;
  letter-spacing: 1px;
}

/* 底部墨迹装饰 */
.bottom-ink {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to top, rgba(40,35,30,0.8), transparent);
  pointer-events: none;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .ink-drop, .plum { animation: none; opacity: 0; }
  .card-wrap, body::before, .card::before { animation: none; }
}
</style>
</head>
<body>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '知己';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '淡墨素笺，寄君一语';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 墨滴
for (let i = 0; i < 8; i++) {
  const d = document.createElement('div');
  d.className = 'ink-drop';
  const sz = 20 + Math.random() * 40;
  d.style.cssText = `
    left: ${Math.random() * 100}%;
    width: ${sz}px; height: ${sz}px;
    animation-duration: ${8 + Math.random() * 8}s;
    animation-delay: ${Math.random() * 8}s;
  `;
  document.body.appendChild(d);
}

// 梅花飘落
const plumEmoji = ['❀', '✿', '❁', '✤'];
for (let i = 0; i < 10; i++) {
  const m = document.createElement('div');
  m.className = 'plum';
  m.textContent = plumEmoji[Math.floor(Math.random() * plumEmoji.length)];
  m.style.cssText = `
    left: ${Math.random() * 100}%;
    color: rgba(200,180,160,${0.3 + Math.random() * 0.4});
    font-size: ${8 + Math.random() * 10}px;
    animation-duration: ${6 + Math.random() * 6}s;
    animation-delay: ${Math.random() * 8}s;
  `;
  document.body.appendChild(m);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.ink-drop,.plum').forEach(e => e.remove());
}
</script>

<div class="card-wrap">
  <div class="card">
    <div class="seal">印</div>
    <div class="top-line"><span class="top-ornament">· · ·</span></div>
    <div class="date" id="dateEl"></div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="sep"><span class="sep-dot">◆</span></div>
    <div class="from" id="fromEl"></div>
    <div class="bottom-ink"></div>
  </div>
</div>

</body>
</html>
