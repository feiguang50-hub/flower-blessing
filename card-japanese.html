<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和风祭典</title>
<meta property="og:title" content="🏮 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-dark: #0a0510;
  --night-deep: #1a0a28;
  --lantern-red: #e63946;
  --lantern-glow: #ff6b6b;
  --lantern-gold: #ffd166;
  --paper-white: #f8f0e8;
  --torii-red: #c1121f;
  --torii-dark: #8a0a14;
  --text-cream: #fff8f0;
  --text-muted: rgba(255,240,225,0.65);
  --card-bg: rgba(20,5,30,0.88);
  --card-border: rgba(230,57,70,0.35);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #0a0510 0%,
    #1a0a28 15%,
    #2d1040 30%,
    #1a0a28 45%,
    #0a0510 60%,
    #150818 80%,
    #0a0510 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星星 */
.stars {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}
.star {
  position: absolute;
  width: 1.5px; height: 1.5px;
  background: rgba(255,240,200,0.7);
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.3); }
}

/* 鸟居 */
.torii {
  position: fixed;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  pointer-events: none;
  font-size: 64px;
  filter: drop-shadow(0 0 8px rgba(230,57,70,0.4));
  animation: toriiGlow 3s ease-in-out infinite;
}
@keyframes toriiGlow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(230,57,70,0.4)); }
  50% { filter: drop-shadow(0 0 18px rgba(230,57,70,0.65)); }
}

/* 灯笼串 */
.lanterns {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 3;
  pointer-events: none;
  display: flex;
  justify-content: center;
  gap: 0;
}
.lantern {
  font-size: 22px;
  animation: lanternSway 3.5s ease-in-out infinite;
  margin: 0 18px;
}
.lantern:nth-child(1) { animation-delay: 0s; }
.lantern:nth-child(2) { animation-delay: 0.5s; }
.lantern:nth-child(3) { animation-delay: 1s; }
.lantern:nth-child(4) { animation-delay: 1.5s; }
.lantern:nth-child(5) { animation-delay: 2s; }
.lantern:nth-child(6) { animation-delay: 2.5s; }
.lantern:nth-child(7) { animation-delay: 3s; }
@keyframes lanternSway {
  0%, 100% { transform: rotate(-4deg) translateY(0); }
  50% { transform: rotate(4deg) translateY(-3px); }
}

/* 灯笼下垂线 */
.lantern-string {
  position: fixed;
  top: 0; left: 50%;
  width: 1px;
  height: 60px;
  background: linear-gradient(180deg, rgba(200,180,160,0.6), rgba(200,180,160,0.2));
  z-index: 3;
  pointer-events: none;
  transform: translateX(-50%);
}

/* 和风纸屑/樱花 */
.petal {
  position: fixed;
  z-index: 5; pointer-events: none;
  font-size: 12px;
  animation: petalFall var(--dur, 7s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes petalFall {
  0% { transform: translateY(-10px) translateX(0) rotate(0deg); opacity: 0; }
  8% { opacity: 1; }
  50% { transform: translateY(55vh) translateX(calc(var(--dx, 15px))) rotate(180deg); }
  100% { transform: translateY(110vh) translateX(calc(var(--dx) * 0.3)) rotate(360deg); opacity: 0; }
}

/* 烟花星星 */
.firework {
  position: fixed;
  z-index: 4;
  pointer-events: none;
  width: 3px; height: 3px;
  border-radius: 50%;
  animation: fireworkBurst 2.5s ease-out infinite;
}
@keyframes fireworkBurst {
  0% { transform: scale(0); opacity: 1; box-shadow: none; }
  20% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1); opacity: 0; }
}
.firework::before, .firework::after {
  content: '';
  position: absolute;
  width: 3px; height: 12px;
  background: inherit;
  border-radius: 50%;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
}
.firework::before { transform: translate(-50%, -50%) rotate(0deg); }
.firework::after  { transform: translate(-50%, -50%) rotate(90deg); }

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  padding: 2px;
  border-radius: 20px;
  background: linear-gradient(135deg,
    rgba(230,57,70,0.5) 0%,
    rgba(255,209,102,0.35) 50%,
    rgba(230,57,70,0.5) 100%);
  background-size: 200% 200%;
  animation: borderFlow 4s ease-in-out infinite;
  box-shadow:
    0 0 25px rgba(230,57,70,0.3),
    0 8px 32px rgba(0,0,0,0.5);
}
@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(230,57,70,0.3), 0 8px 32px rgba(0,0,0,0.5); }
  50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(255,107,107,0.45), 0 8px 32px rgba(0,0,0,0.5); }
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 44px);
  text-align: center;
  max-width: min(420px, 92vw);
  animation: cardFloat 4s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.name {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: normal;
  color: var(--lantern-glow);
  margin-bottom: 10px;
  letter-spacing: 0.1em;
  opacity: 1;
  animation: fadeUp 1.2s ease-out both;
  text-shadow: 0 0 12px rgba(255,107,107,0.5);
}

.date {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-muted);
  margin-bottom: 20px;
  letter-spacing: 0.15em;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.2s both;
}

.divider {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--lantern-glow), transparent);
  margin: 16px auto;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.4s both;
}

.blessing {
  font-size: clamp(14px, 3.5vw, 17px);
  color: var(--text-cream);
  line-height: 1.9;
  margin-bottom: 22px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.5s both;
}

.from {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-muted);
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.8s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="lantern-string"></div>

<div class="lanterns">
  <div class="lantern">🏮</div>
  <div class="lantern">🏮</div>
  <div class="lantern">🏮</div>
  <div class="lantern">🏮</div>
  <div class="lantern">🏮</div>
  <div class="lantern">🏮</div>
  <div class="lantern">🏮</div>
</div>

<div class="torii">⛩️</div>

<div id="fireworks"></div>

<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = params.get('n') || '祭典的你';
document.getElementById('dateEl').textContent = params.get('d') || '';
document.getElementById('blessingEl').textContent = params.get('b') || '愿你所愿皆如愿，所行皆坦途';
document.getElementById('fromEl').textContent = params.get('f') ? '— ' + params.get('f') : '';

// 星星
const starsEl = document.getElementById('stars');
for (let i = 0; i < 35; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 45 + '%';
  s.style.animationDuration = (2 + Math.random() * 3) + 's';
  s.style.animationDelay = Math.random() * 3 + 's';
  starsEl.appendChild(s);
}

// 樱花花瓣
const petals = ['🌸', '💮', '✿'];
for (let i = 0; i < 12; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petals[Math.floor(Math.random() * petals.length)];
  p.style.left = Math.random() * 100 + '%';
  p.style.top = (Math.random() * -10 - 5) + '%';
  p.style.setProperty('--dur', (5 + Math.random() * 6) + 's');
  p.style.setProperty('--delay', Math.random() * 8 + 's');
  p.style.setProperty('--dx', (Math.random() > 0.5 ? 1 : -1) * (10 + Math.random() * 25) + 'px');
  p.style.fontSize = (10 + Math.random() * 8) + 'px';
  document.body.appendChild(p);
}

// 烟花
const fwContainer = document.getElementById('fireworks');
const fwColors = ['#ff6b6b', '#ffd166', '#ff9eb5', '#fff8f0', '#ff7e5f'];
for (let i = 0; i < 5; i++) {
  const fw = document.createElement('div');
  fw.className = 'firework';
  fw.style.left = (15 + Math.random() * 70) + '%';
  fw.style.top = (10 + Math.random() * 30) + '%';
  fw.style.background = fwColors[Math.floor(Math.random() * fwColors.length)];
  fw.style.animationDelay = (Math.random() * 4) + 's';
  fw.style.animationDuration = (2 + Math.random() * 1.5) + 's';
  fw.style.boxShadow = `0 0 6px 3px ${fwColors[Math.floor(Math.random() * fwColors.length)]}`;
  fwContainer.appendChild(fw);
}

if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.star, .lantern, .torii, .card-wrap, .card, .petal, .firework').forEach(el => {
    el.style.animation = 'none';
  });
}
</script>
</body>
</html>
