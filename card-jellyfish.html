<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水母祝福</title>
<meta property="og:title" content="🪼 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --jelly-purple: #7b5ea7;
  --jelly-pink: #e879c9;
  --jelly-blue: #64b5f6;
  --jelly-cyan: #4dd0e1;
  --jelly-lavender: #ce93d8;
  --text-light: #f0e6ff;
  --card-bg: rgba(120, 60, 180, 0.7);
  --glow-jelly: rgba(200, 120, 255, 0.5);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #0a0520 0%,
    #0f0530 15%,
    #1a0a40 30%,
    #2a1060 50%,
    #3a1878 65%,
    #5a30a0 80%,
    #8060c0 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 深海发光粒子 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(150, 80, 220, 0.15) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 20%, rgba(100, 180, 255, 0.1) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(200, 100, 220, 0.12) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: deepPulse 6s ease-in-out infinite;
}
@keyframes deepPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* 水母身体 */
.jellyfish {
  position: fixed;
  z-index: 1;
  pointer-events: none;
  animation: jellyFloat linear infinite;
  filter: drop-shadow(0 0 12px var(--glow-jelly));
}
@keyframes jellyFloat {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  5% { opacity: 0.85; }
  50% { transform: translateY(45vh) translateX(var(--drift, 30px)); }
  95% { opacity: 0.85; }
  100% { transform: translateY(-15vh) translateX(calc(var(--drift, 30px) * -0.5)); opacity: 0; }
}

/* 水母头部 */
.jelly-head {
  width: var(--size, 60px);
  height: calc(var(--size, 60px) * 0.65);
  background: radial-gradient(ellipse at 50% 40%,
    rgba(220, 160, 255, 0.9) 0%,
    rgba(180, 100, 220, 0.7) 30%,
    rgba(120, 60, 180, 0.5) 60%,
    rgba(80, 40, 140, 0.3) 100%);
  border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
  position: relative;
  animation: jellyPulse 2.5s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(200, 140, 255, 0.4),
    inset 0 -8px 20px rgba(100, 40, 160, 0.3),
    inset 0 8px 20px rgba(255, 200, 255, 0.2);
}
@keyframes jellyPulse {
  0%, 100% { transform: scaleX(1) scaleY(1); }
  30% { transform: scaleX(1.06) scaleY(0.94); }
  70% { transform: scaleX(0.96) scaleY(1.04); }
}

/* 触须 */
.jelly-tentacles {
  display: flex;
  justify-content: center;
  gap: 4px;
  position: relative;
  top: -2px;
}
.tentacle {
  width: 3px;
  height: var(--tentacle-len, 50px);
  background: linear-gradient(180deg,
    rgba(200, 160, 255, 0.7) 0%,
    rgba(160, 100, 220, 0.5) 40%,
    rgba(120, 60, 180, 0.2) 100%);
  border-radius: 0 0 3px 3px;
  animation: tentacleWave ease-in-out infinite;
  transform-origin: top center;
}
@keyframes tentacleWave {
  0%, 100% { transform: rotate(calc(var(--base-rot, 0deg) + -8deg)); }
  50% { transform: rotate(calc(var(--base-rot, 0deg) + 8deg)); }
}

/* 气泡 */
.bubble {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%,
    rgba(255, 255, 255, 0.8) 0%,
    rgba(200, 220, 255, 0.4) 50%,
    rgba(150, 180, 255, 0.1) 100%);
  border: 1px solid rgba(255, 255, 255, 0.3);
  z-index: 1;
  pointer-events: none;
  animation: bubbleRise linear infinite;
}
@keyframes bubbleRise {
  0% { transform: translateY(100vh) translateX(0) scale(0.5); opacity: 0; }
  10% { opacity: 0.8; transform: translateY(90vh) translateX(5px) scale(0.6); }
  50% { transform: translateY(45vh) translateX(var(--bx, 10px)) scale(0.8); }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) translateX(var(--bx2, -5px)) scale(0.5); opacity: 0; }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, #c080ff, #80c8ff, #c080ff);
  border-radius: 24px;
  animation: borderGlow 3s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(160, 100, 255, 0.4);
}
@keyframes borderGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(160, 100, 255, 0.3), 0 0 60px rgba(160, 100, 255, 0.1); }
  50% { box-shadow: 0 0 35px rgba(180, 120, 255, 0.5), 0 0 80px rgba(160, 100, 255, 0.2); }
}

.card {
  background: linear-gradient(160deg,
    rgba(60, 20, 100, 0.85) 0%,
    rgba(40, 10, 80, 0.9) 100%);
  border-radius: 22px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(200, 160, 255, 0.2);
  min-width: 280px;
  max-width: 480px;
  box-shadow: inset 0 0 40px rgba(150, 80, 220, 0.15);
}

.name {
  font-size: clamp(28px, 7vw, 48px);
  font-weight: 700;
  color: #e8d0ff;
  text-shadow: 0 0 20px rgba(200, 160, 255, 0.8), 0 0 40px rgba(160, 80, 255, 0.4);
  margin-bottom: 12px;
  animation: nameIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
}
@keyframes nameIn {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.blessing {
  font-size: clamp(15px, 4vw, 22px);
  color: rgba(230, 210, 255, 0.92);
  line-height: 1.8;
  margin-bottom: 16px;
  animation: slideUp 1.2s ease-out 0.6s both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(200, 170, 240, 0.7);
  letter-spacing: 2px;
  margin-bottom: 6px;
  animation: slideUp 1.2s ease-out 0.9s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(200, 170, 240, 0.6);
  font-style: italic;
  animation: slideUp 1.2s ease-out 1.1s both;
}

.icon-emoji {
  font-size: clamp(36px, 9vw, 60px);
  margin-bottom: 16px;
  display: block;
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  filter: drop-shadow(0 0 16px rgba(200, 160, 255, 0.6));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@media (prefers-reduced-motion: reduce) {
  .jellyfish, .bubble, .card-wrap, .name, .blessing, .date, .from, .icon-emoji {
    animation: none !important;
  }
}
</style>
</head>
<body>

<script>
// 水母生成
function createJellyfish() {
  const colors = [
    { head: 'rgba(180,100,220,0.85)', glow: 'rgba(200,140,255,0.5)' },
    { head: 'rgba(100,180,245,0.85)', glow: 'rgba(120,200,255,0.5)' },
    { head: 'rgba(220,120,200,0.85)', glow: 'rgba(255,160,220,0.5)' },
    { head: 'rgba(150,200,220,0.85)', glow: 'rgba(180,220,240,0.5)' },
    { head: 'rgba(200,140,180,0.85)', glow: 'rgba(230,180,210,0.5)' },
  ];
  const c = colors[Math.floor(Math.random() * colors.length)];
  const size = 40 + Math.random() * 40;
  const tentacleCount = 4 + Math.floor(Math.random() * 4);
  const tentacleLen = 30 + Math.random() * 40;
  const duration = 12 + Math.random() * 10;
  const x = Math.random() * 90 + 5;
  const drift = (Math.random() - 0.5) * 60;

  const el = document.createElement('div');
  el.className = 'jellyfish';
  el.style.cssText = `
    left: ${x}vw;
    --size: ${size}px;
    --drift: ${drift}px;
    --tentacle-len: ${tentacleLen}px;
    animation-duration: ${duration}s;
    animation-delay: ${Math.random() * -duration}s;
  `;

  let tentaclesHTML = '<div class="jelly-tentacles">';
  for (let i = 0; i < tentacleCount; i++) {
    const rot = (i - tentacleCount / 2) * (15 / tentacleCount);
    const delay = (Math.random() * 0.8).toFixed(2);
    const dur = (1.5 + Math.random() * 1).toFixed(2);
    tentaclesHTML += `<div class="tentacle" style="
      --base-rot: ${rot}deg;
      --tentacle-len: ${tentacleLen * (0.7 + Math.random() * 0.6)}px;
      animation-delay: ${delay}s;
      animation-duration: ${dur}s;
    "></div>`;
  }
  tentaclesHTML += '</div>';

  el.innerHTML = `
    <div class="jelly-head" style="
      background: radial-gradient(ellipse at 50% 40%,
        rgba(220,160,255,0.9) 0%,
        ${c.head} 60%,
        rgba(80,40,140,0.3) 100%);
      box-shadow:
        0 0 20px ${c.glow},
        inset 0 -8px 20px rgba(100,40,160,0.3),
        inset 0 8px 20px rgba(255,200,255,0.2);
    "></div>
    ${tentaclesHTML}
  `;
  document.body.appendChild(el);
}

// 气泡生成
function createBubbles() {
  for (let i = 0; i < 15; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 6 + Math.random() * 18;
    const x = Math.random() * 90 + 5;
    const dur = 8 + Math.random() * 10;
    const delay = Math.random() * -dur;
    const bx = (Math.random() - 0.5) * 30;
    const bx2 = (Math.random() - 0.5) * 30;
    b.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${x}vw;
      --bx: ${bx}px; --bx2: ${bx2}px;
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
    `;
    document.body.appendChild(b);
  }
}

const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!reducedMotion) {
  for (let i = 0; i < 6; i++) {
    setTimeout(createJellyfish, i * 600);
  }
  createBubbles();
}

// URL参数
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你像水母一样，自由而轻盈';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
document.getElementById('iconEl').textContent = p.get('i') || '🪼';
</script>

<div class="card-wrap">
  <div class="card">
    <span class="icon-emoji" id="iconEl">🪼</span>
    <div class="name" id="nameEl">亲爱的你</div>
    <div class="blessing" id="blessingEl">愿你像水母一样，自由而轻盈</div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
