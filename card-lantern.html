<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元宵节祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg, #0a1628 0%, #0d1f3c 40%, #1a3a6e 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 月亮 === */
.moon {
  position: fixed;
  top: 6%;
  right: 12%;
  width: clamp(60px, 12vw, 110px);
  height: clamp(60px, 12vw, 110px);
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, #fffde7, #ffd54f, #ffb300);
  box-shadow: 0 0 30px rgba(255,220,100,0.6), 0 0 80px rgba(255,200,80,0.3), 0 0 120px rgba(255,180,60,0.15);
  animation: moonGlow 4s ease-in-out infinite;
  z-index: 1;
}
@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(255,220,100,0.6), 0 0 80px rgba(255,200,80,0.3); }
  50% { box-shadow: 0 0 45px rgba(255,225,110,0.8), 0 0 100px rgba(255,210,90,0.4); }
}

/* === 星星 === */
.star {
  position: fixed;
  background: radial-gradient(circle, #fff9c4, #ffe082);
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.7); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* === 孔明灯上升 === */
.lantern {
  position: fixed;
  z-index: 2;
  animation: lanternRise ease-in-out infinite;
}
.lantern-body {
  width: clamp(22px, 4vw, 36px);
  height: clamp(28px, 5vw, 46px);
  background: radial-gradient(ellipse at 50% 60%, #ff6b35, #c62828, #b71c1c);
  border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
  position: relative;
  box-shadow: 0 0 12px rgba(255,100,50,0.5), inset 0 0 8px rgba(255,200,100,0.2);
}
.lantern-body::before {
  content: '';
  position: absolute;
  top: -4px; left: 50%;
  transform: translateX(-50%);
  width: 55%; height: 6px;
  background: linear-gradient(90deg, #8b0000, #cc0000, #8b0000);
  border-radius: 3px;
}
.lantern-body::after {
  content: '';
  position: absolute;
  bottom: -8px; left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 10px;
  background: linear-gradient(180deg, #ffd700, transparent);
}
.lantern-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60%; height: 50%;
  background: radial-gradient(ellipse, rgba(255,200,100,0.5), transparent);
  border-radius: 50%;
  animation: lanternFlicker 1.5s ease-in-out infinite alternate;
}
@keyframes lanternFlicker {
  0% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}
@keyframes lanternRise {
  0% { transform: translateY(0) translateX(0) rotate(-3deg); opacity: 0; }
  8% { opacity: 0.85; }
  90% { opacity: 0.75; }
  100% { transform: translateY(-110vh) translateX(30px) rotate(3deg); opacity: 0; }
}

/* === 烟花火星 === */
.spark {
  position: fixed;
  width: 3px; height: 3px;
  border-radius: 50%;
  animation: sparkFloat ease-out infinite;
  z-index: 1;
}
@keyframes sparkFloat {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  10% { opacity: 1; }
  80% { opacity: 0.5; }
  100% { transform: translateY(-80px) scale(0.3); opacity: 0; }
}

/* === 雪花飘落 === */
.snow {
  position: fixed;
  color: rgba(255,255,255,0.7);
  animation: snowFall linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes snowFall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.6; }
  100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}

/* === 卡片外框 === */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg, #ffd700, #ff6b35, #ffd700);
  background-size: 300% 300%;
  animation: lanternBorder 4s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(255,150,50,0.5), 0 0 60px rgba(255,100,50,0.25);
}
@keyframes lanternBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(255,150,50,0.5), 0 0 60px rgba(255,100,50,0.25); }
  50% { background-position: 100% 50%; box-shadow: 0 0 45px rgba(255,180,80,0.7), 0 0 80px rgba(255,130,60,0.35); }
}

/* === 卡片主体 === */
.card {
  background: linear-gradient(160deg, rgba(5,15,35,0.97), rgba(10,25,55,0.97));
  border-radius: 22px;
  padding: clamp(32px, 6vw, 56px) clamp(28px, 5vw, 50px);
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,200,100,0.25);
}

/* 温暖光晕 */
.card::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,180,80,0.08) 0%, transparent 65%);
  animation: warmPulse 4s ease-in-out infinite;
  z-index: 0;
}
@keyframes warmPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}

.icon-top {
  font-size: clamp(32px, 8vw, 56px);
  opacity: 1;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 0 10px rgba(255,180,80,0.7));
  position: relative;
  z-index: 1;
}
@keyframes iconDrop {
  from { transform: translateY(-30px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.title {
  font-size: clamp(20px, 5vw, 36px);
  color: #ffd54f;
  letter-spacing: 0.25em;
  margin: 10px 0 6px;
  text-shadow: 0 0 20px rgba(255,200,80,0.6), 0 0 40px rgba(255,160,50,0.3);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.3s both;
  position: relative;
  z-index: 1;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.name {
  font-size: clamp(26px, 7vw, 52px);
  color: #ffffff;
  font-weight: bold;
  margin: 8px 0;
  text-shadow: 0 0 20px rgba(255,200,80,0.5);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.45s both;
  position: relative;
  z-index: 1;
}

.date {
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(255,220,150,0.75);
  letter-spacing: 0.2em;
  margin-bottom: 16px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.6s both;
  position: relative;
  z-index: 1;
}

.blessing {
  font-size: clamp(15px, 4vw, 22px);
  color: rgba(255,255,255,0.92);
  line-height: 1.7;
  margin: 14px 0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.75s both;
  position: relative;
  z-index: 1;
}

.from {
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(255,200,100,0.8);
  margin-top: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
  position: relative;
  z-index: 1;
}

.footer-deco {
  font-size: clamp(22px, 5vw, 36px);
  opacity: 0.7;
  margin-top: 14px;
  animation: slideUp 1.2s ease-out 1s both;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 0 6px rgba(255,180,80,0.5));
}
</style>
</head>
<body>

<div class="moon"></div>

<div class="card-wrap">
  <div class="card">
    <div class="icon-top">🏮</div>
    <div class="title">元 宵 节 快 乐</div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="footer-deco">🏮🏮🏮</div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '月圆人团圆，元宵节快乐';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 孔明灯
function createLantern() {
  const l = document.createElement('div');
  l.className = 'lantern';
  const lBody = document.createElement('div');
  lBody.className = 'lantern-body';
  const glow = document.createElement('div');
  glow.className = 'lantern-glow';
  lBody.appendChild(glow);
  l.appendChild(lBody);
  l.style.left = (5 + Math.random() * 85) + 'vw';
  l.style.bottom = '-60px';
  l.style.animationDuration = (10 + Math.random() * 10) + 's';
  document.body.appendChild(l);
  setTimeout(() => l.remove(), 20000);
}
for (let i = 0; i < 6; i++) {
  setTimeout(createLantern, i * 3000);
}
setInterval(createLantern, 4000);

// 星星
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 70 + 'vh';
  const sz = 1 + Math.random() * 2.5;
  s.style.width = s.style.height = sz + 'px';
  s.style.animationDuration = (1.5 + Math.random() * 3) + 's';
  s.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(s);
}

// 烟花火星
const sparkColors = ['#ffd700','#ff6b35','#ff9800','#ffe082','#ff5722','#ffeb3b'];
function createSpark() {
  const s = document.createElement('div');
  s.className = 'spark';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.bottom = (10 + Math.random() * 30) + 'vh';
  s.style.background = sparkColors[Math.floor(Math.random() * sparkColors.length)];
  s.style.boxShadow = `0 0 4px ${s.style.background}`;
  s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 4000);
}
setInterval(createSpark, 800);
for (let i = 0; i < 8; i++) setTimeout(createSpark, i * 300);

// 雪花（营造氛围）
for (let i = 0; i < 10; i++) {
  const s = document.createElement('div');
  s.className = 'snow';
  s.textContent = '❄';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.fontSize = (6 + Math.random() * 8) + 'px';
  s.style.animationDuration = (8 + Math.random() * 8) + 's';
  s.style.animationDelay = Math.random() * 12 + 's';
  document.body.appendChild(s);
}
</script>
</body>
</html>
