<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灯笼之夜</title>
<meta property="og:title" content="🏮 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-dark: #0a0518;
  --night-mid: #1a0a2e;
  --lantern-red: #e83000;
  --lantern-gold: #f5c518;
  --lantern-orange: #f0883e;
  --glow-warm: rgba(255,150,50,0.6);
  --text-cream: #f5e6d0;
  --card-bg: rgba(30,10,10,0.85);
  --border-red: #c42020;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    var(--night-dark) 0%,
    #120828 40%,
    var(--night-mid) 70%,
    #2a1040 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', 'STKaiti', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 夜空星光 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(1px 1px at 15% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 8%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 6%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 8% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 4%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 14%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 20%, rgba(255,255,255,0.3) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* 月亮 */
.moon {
  position: fixed;
  top: 8%;
  right: 12%;
  width: 70px;
  height: 70px;
  background: radial-gradient(circle at 35% 35%, #fffde8, #ffe566 50%, #f5c518 100%);
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(255,238,100,0.4), 0 0 80px rgba(255,220,50,0.2);
  pointer-events: none;
  z-index: 1;
  animation: moonGlow 4s ease-in-out infinite;
}

@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 40px rgba(255,238,100,0.4), 0 0 80px rgba(255,220,50,0.2); }
  50% { box-shadow: 0 0 55px rgba(255,238,100,0.55), 0 0 100px rgba(255,220,50,0.3); }
}

/* 灯笼 */
.lanterns { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

.lantern {
  position: absolute;
  animation: lanternFloat ease-in-out infinite;
  filter: drop-shadow(0 0 10px var(--glow-warm));
}

@keyframes lanternFloat {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-18px) rotate(2deg); }
}

.lantern-body {
  width: 44px;
  height: 58px;
  background: radial-gradient(ellipse at 40% 30%, #ff6040, var(--lantern-red) 60%, #a01010 100%);
  border-radius: 50% / 45%;
  position: relative;
  border: 2px solid rgba(200,160,40,0.5);
  box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3), 0 0 20px rgba(255,100,50,0.3);
}

.lantern-body::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  height: 10px;
  background: linear-gradient(to bottom, #d4956a, #8b6914);
  border-radius: 3px 3px 0 0;
  border: 1px solid rgba(180,140,40,0.4);
}

.lantern-body::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 12px;
  background: linear-gradient(to bottom, #8b6914, #5a4010);
  border-radius: 0 0 3px 3px;
}

/* 灯笼发光核心 */
.lantern-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 28px;
  background: radial-gradient(ellipse, rgba(255,220,100,0.8) 0%, transparent 70%);
  border-radius: 50%;
  animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* 挂绳 */
.lantern-string {
  position: absolute;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 50px;
  background: rgba(180,140,60,0.4);
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--lantern-red), var(--lantern-gold), var(--lantern-orange), var(--lantern-red));
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
  box-shadow: 0 0 30px rgba(232,48,0,0.5), 0 0 60px rgba(245,197,24,0.25);
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card {
  background: var(--card-bg);
  border-radius: 19px;
  padding: 40px 36px;
  text-align: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  max-width: 380px;
  width: 88vw;
  border: 1px solid rgba(200,100,50,0.2);
  position: relative;
  overflow: hidden;
}

/* 卡片四个角的灯笼装饰 */
.card::before {
  content: '🏮';
  position: absolute;
  top: 10px;
  left: 12px;
  font-size: 18px;
  opacity: 0.6;
}

.card::after {
  content: '🏮';
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 18px;
  opacity: 0.6;
}

.icon-emoji {
  font-size: clamp(40px, 10vw, 60px);
  display: block;
  margin-bottom: 14px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 3px 8px rgba(255,100,50,0.4));
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.6); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(22px, 6vw, 32px);
  font-weight: 700;
  color: var(--text-cream);
  margin-bottom: 14px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
  letter-spacing: 3px;
  text-shadow: 0 2px 10px rgba(255,150,50,0.3);
}

.blessing {
  font-size: clamp(15px, 4vw, 18px);
  color: #e8d0b0;
  line-height: 1.9;
  margin-bottom: 18px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
}

.date {
  font-size: clamp(12px, 3vw, 14px);
  color: #c0a090;
  margin-bottom: 6px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.85s both;
}

.from {
  font-size: clamp(12px, 3vw, 14px);
  color: #d0b0a0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1s both;
  font-style: italic;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .lantern, .moon { animation: none; }
  .card-wrap { animation: none; background: linear-gradient(135deg, var(--lantern-red), var(--lantern-gold)); }
}
</style>
</head>
<body>

<div class="moon"></div>

<div class="lanterns" id="lanterns"></div>

<script>
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!reducedMotion) {
  const lanterns = document.getElementById('lanterns');

  // 创建灯笼
  const positions = [
    { left: 8, top: 15, size: 1, delay: 0 },
    { left: 22, top: 25, size: 0.8, delay: 1.2 },
    { left: 78, top: 18, size: 0.9, delay: 0.5 },
    { left: 88, top: 30, size: 0.75, delay: 2 },
    { left: 50, top: 10, size: 1.1, delay: 1.8 },
  ];

  positions.forEach((pos, i) => {
    const lantern = document.createElement('div');
    lantern.className = 'lantern';
    lantern.innerHTML = `
      <div class="lantern-string"></div>
      <div class="lantern-body">
        <div class="lantern-glow"></div>
      </div>
    `;
    lantern.style.cssText = `
      left: ${pos.left}%;
      top: ${pos.top}%;
      transform: scale(${pos.size});
      animation-duration: ${4 + Math.random() * 2}s;
      animation-delay: ${pos.delay}s;
    `;
    lanterns.appendChild(lantern);
  });
}

// URL参数
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('blessingEl').textContent = p.get('b') || '愿这盏灯笼为你照亮前路，愿你被岁月温柔以待';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>

<div class="card-wrap">
  <div class="card">
    <span class="icon-emoji" id="iconEl">🏮</span>
    <div class="name" id="nameEl">亲爱的你</div>
    <div class="blessing" id="blessingEl">愿这盏灯笼为你照亮前路，愿你被岁月温柔以待</div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
