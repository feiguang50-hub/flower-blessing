<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薰衣草庄园</title>
<meta property="og:title" content="💜 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --lav-hue: 270;
  --lav-deep: #4a2882;
  --lav-mid: #7c5cbf;
  --lav-light: #b49fdd;
  --lav-pale: #e8dff5;
  --lav-white: #f5f0ff;
  --sky-from: #c5b3e8;
  --sky-to: #8b6fc0;
  --text-deep: #3d2466;
  --text-light: #f0e8ff;
  --card-bg: rgba(245, 240, 255, 0.88);
  --card-border: rgba(180, 140, 220, 0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #c5b3e8 0%, #8b6fc0 25%, #6b4fa0 50%, #4a2882 75%, #3a1f6e 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 天空光晕 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 50% 5%, rgba(255,255,255,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 15%, rgba(255,255,255,0.1) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* 薰衣草田 */
.field {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 200px;
  z-index: 1; pointer-events: none;
}

.row {
  position: absolute;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 4px;
}

.row-1 { bottom: 0; }
.row-2 { bottom: 30px; transform: scaleY(0.85); opacity: 0.85; }
.row-3 { bottom: 55px; transform: scaleY(0.7); opacity: 0.7; }

.bloom {
  width: 6px; height: 18px;
  background: linear-gradient(180deg, #d4b8f0 0%, #9b6ecf 50%, #6b489e 100%);
  border-radius: 3px 3px 1px 1px;
  position: relative;
  animation: sway 3s ease-in-out infinite;
}

.bloom::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 10px; height: 8px;
  background: radial-gradient(ellipse, #c8a8e8 0%, #a078d0 100%);
  border-radius: 50%;
}

@keyframes sway {
  0%, 100% { transform: rotate(-2deg); }
  50% { transform: rotate(2deg); }
}

/* 罗马柱装饰 */
.pillar {
  position: fixed;
  bottom: 180px;
  width: 22px;
  background: linear-gradient(90deg, rgba(200,180,230,0.5) 0%, rgba(240,220,255,0.6) 40%, rgba(200,180,230,0.5) 100%);
  border-radius: 4px 4px 0 0;
  z-index: 2;
  animation: pillarSway 5s ease-in-out infinite;
}

.pillar::before {
  content: '';
  position: absolute;
  top: -10px; left: -4px;
  width: 30px; height: 12px;
  background: rgba(220,200,240,0.5);
  border-radius: 3px;
}

.pillar::after {
  content: '';
  position: absolute;
  bottom: -6px; left: -3px;
  width: 28px; height: 8px;
  background: rgba(200,180,230,0.4);
  border-radius: 0 0 2px 2px;
}

.pillar-1 { left: 8%; height: 100px; animation-delay: 0s; }
.pillar-2 { right: 10%; height: 80px; animation-delay: 1.5s; }

@keyframes pillarSway {
  0%, 100% { transform: rotate(-0.5deg); }
  50% { transform: rotate(0.5deg); }
}

/* 薰衣草花瓣飘落 */
.petal {
  position: fixed;
  font-size: 14px;
  z-index: 3;
  pointer-events: none;
  animation: petalFall linear infinite;
  opacity: 0.7;
}

@keyframes petalFall {
  0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.6; }
  100% { transform: translateY(100vh) rotate(360deg) translateX(40px); opacity: 0; }
}

/* 蝴蝶 */
.butterfly {
  position: fixed;
  font-size: 16px;
  z-index: 4;
  pointer-events: none;
  animation: flutter 8s ease-in-out infinite;
}

@keyframes flutter {
  0% { transform: translate(0, 0) rotate(5deg); }
  25% { transform: translate(60px, -30px) rotate(-5deg); }
  50% { transform: translate(120px, 10px) rotate(8deg); }
  75% { transform: translate(60px, -15px) rotate(-3deg); }
  100% { transform: translate(0, 0) rotate(5deg); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(420px, 90vw);
  min-height: 480px;
  background: var(--card-bg);
  border-radius: 24px;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  box-shadow:
    0 16px 50px rgba(60,20,100,0.35),
    0 4px 16px rgba(80,40,140,0.2),
    inset 0 1px 0 rgba(255,255,255,0.5);
  border: 1px solid var(--card-border);
  animation: cardFloat 6s ease-in-out infinite;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-8px) rotate(0.5deg); }
}

/* 边框流光 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, rgba(180,140,220,0.5), rgba(220,200,255,0.2), rgba(180,140,220,0.5));
  background-size: 200% 200%;
  animation: borderFlow 5s ease-in-out infinite;
  z-index: -1;
  opacity: 0.5;
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; opacity: 0.3; }
  50% { background-position: 100% 50%; opacity: 0.6; }
}

/* 图标 */
.icon {
  font-size: 44px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(180,140,220,0.4));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分割线 */
.divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(160,120,200,0.5), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字 */
.name {
  font-size: clamp(26px, 7vw, 44px);
  color: var(--text-deep);
  font-weight: 600;
  text-align: center;
  letter-spacing: 4px;
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
  text-shadow: 0 2px 12px rgba(160,120,200,0.2);
}

.date {
  font-size: clamp(11px, 3.5vw, 14px);
  color: rgba(100,60,160,0.6);
  letter-spacing: 5px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(13px, 4vw, 16px);
  color: rgba(60,30,100,0.82);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(11px, 3.5vw, 13px);
  color: rgba(100,60,160,0.55);
  letter-spacing: 3px;
  margin-top: 4px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

.bottom-text {
  position: absolute;
  bottom: 18px;
  font-size: 10px;
  color: rgba(150,110,200,0.4);
  letter-spacing: 3px;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .bloom { animation: none; }
  .name, .date, .blessing, .from, .divider, .bottom-text, .icon { opacity: 1; }
}

@media (max-width: 480px) {
  .card { padding: 36px 24px; min-height: 420px; }
  .pillar { display: none; }
  .row-3 { display: none; }
}
</style>
</head>
<body>

<!-- 罗马柱 -->
<div class="pillar pillar-1"></div>
<div class="pillar pillar-2"></div>

<!-- 薰衣草田 -->
<div class="field">
  <div class="row row-3" id="row3"></div>
  <div class="row row-2" id="row2"></div>
  <div class="row row-1" id="row1"></div>
</div>

<!-- 飘落花瓣 -->
<div class="petal" style="left:10%;animation-duration:12s;animation-delay:0s;opacity:0.6;">💮</div>
<div class="petal" style="left:25%;animation-duration:14s;animation-delay:2s;opacity:0.5;">🩷</div>
<div class="petal" style="left:40%;animation-duration:11s;animation-delay:4s;opacity:0.7;">💮</div>
<div class="petal" style="left:55%;animation-duration:13s;animation-delay:1s;opacity:0.5;">🪻</div>
<div class="petal" style="left:70%;animation-duration:15s;animation-delay:3s;opacity:0.6;">💮</div>
<div class="petal" style="left:85%;animation-duration:12s;animation-delay:5s;opacity:0.5;">🩷</div>
<div class="petal" style="left:33%;animation-duration:10s;animation-delay:6s;opacity:0.4;">🪻</div>
<div class="petal" style="left:62%;animation-duration:14s;animation-delay:7s;opacity:0.4;">💮</div>

<!-- 蝴蝶 -->
<div class="butterfly" style="top:20%;left:15%;animation-delay:0s;font-size:14px;">🦋</div>
<div class="butterfly" style="top:28%;right:20%;animation-delay:3s;font-size:12px;">🦋</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">💜</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="bottom-text">薰衣草庄园 · 浪漫相随</div>
  </div>
</div>

<script>
(function() {
  // 生成薰衣草花丛
  function makeBloom() {
    var b = document.createElement('div');
    b.className = 'bloom';
    b.style.animationDelay = (Math.random() * 2) + 's';
    return b;
  }

  var row1 = document.getElementById('row1');
  var row2 = document.getElementById('row2');
  var row3 = document.getElementById('row3');

  for (var i = 0; i < 22; i++) row1.appendChild(makeBloom());
  for (var i = 0; i < 18; i++) row2.appendChild(makeBloom());
  for (var i = 0; i < 14; i++) row3.appendChild(makeBloom());

  // URL参数
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿普罗旺斯的微风带去我的思念，愿每一片薰衣草都为你绽放';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
