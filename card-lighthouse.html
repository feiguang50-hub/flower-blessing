<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灯塔之光</title>
<meta property="og:title" content="🗼 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-top: #0a1628;
  --night-mid: #0d2840;
  --night-bottom: #1a4a6a;
  --sea-deep: #0a2a3a;
  --sea-mid: #0d3a50;
  --sea-light: #1a5a7a;
  --lighthouse-white: #fff8e7;
  --lighthouse-glow: rgba(255, 240, 180, 0.9);
  --beam-color: rgba(255, 240, 180, 0.25);
  --text-warm: #ffeaa0;
  --text-cream: #f5e6c8;
  --card-bg: rgba(10, 22, 40, 0.85);
  --card-border: rgba(255, 240, 180, 0.2);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #0a1628 0%,
    #0d2840 25%,
    #1a4a6a 50%,
    #0d3a50 65%,
    #0a2a3a 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星空背景 */
.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.star {
  position: absolute;
  background: rgba(255, 255, 255, 0.8);
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 月亮 */
.moon {
  position: fixed;
  top: 8%;
  right: 12%;
  width: 60px;
  height: 60px;
  background: radial-gradient(circle at 35% 35%, #fffde7, #ffd54f);
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255, 253, 200, 0.6), 0 0 60px rgba(255, 213, 79, 0.3);
  z-index: 1;
  animation: moonGlow 4s ease-in-out infinite;
}
@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 253, 200, 0.6), 0 0 60px rgba(255, 213, 79, 0.3); }
  50% { box-shadow: 0 0 40px rgba(255, 253, 200, 0.8), 0 0 80px rgba(255, 213, 79, 0.4); }
}

/* 灯塔 */
.lighthouse {
  position: fixed;
  bottom: 28%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  pointer-events: none;
  font-size: 100px;
  filter: drop-shadow(0 0 20px rgba(255, 240, 180, 0.6));
  animation: lighthouseRock 6s ease-in-out infinite;
}
@keyframes lighthouseRock {
  0%, 100% { transform: translateX(-50%) rotate(-1deg); }
  50% { transform: translateX(-50%) rotate(1deg); }
}

/* 灯塔光芒旋转 */
.lighthouse-beam {
  position: fixed;
  top: 25%;
  left: 50%;
  width: 300px;
  height: 300px;
  transform-origin: center bottom;
  z-index: 1;
  pointer-events: none;
  animation: beamRotate 8s linear infinite;
}
.lighthouse-beam::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 250px;
  background: linear-gradient(180deg,
    rgba(255, 240, 180, 0.5) 0%,
    rgba(255, 240, 180, 0.15) 40%,
    transparent 100%);
  clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);
  transform-origin: center bottom;
}
@keyframes beamRotate {
  0% { transform: translateX(-50%) rotate(-30deg); }
  100% { transform: translateX(-50%) rotate(30deg); }
}

/* 海浪 */
.waves {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 30%;
  z-index: 1;
  pointer-events: none;
}
.wave {
  position: absolute;
  bottom: 0;
  left: -10%;
  width: 120%;
  height: 100%;
  background: linear-gradient(180deg, transparent 0%, #0d3a50 30%, #0a2a3a 100%);
  border-radius: 50% 50% 0 0;
  animation: waveMove 6s ease-in-out infinite;
}
.wave:nth-child(2) {
  height: 80%;
  animation-delay: -2s;
  opacity: 0.6;
}
.wave:nth-child(3) {
  height: 60%;
  animation-delay: -4s;
  opacity: 0.4;
}
@keyframes waveMove {
  0%, 100% { transform: translateX(-5%) scaleY(1); }
  50% { transform: translateX(5%) scaleY(1.05); }
}

/* 波光 */
.ripples {
  position: fixed;
  bottom: 5%;
  left: 0;
  width: 100%;
  height: 20%;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.ripple {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(120, 200, 240, 0.5);
  border-radius: 50%;
  animation: rippleShine 3s ease-out infinite;
}
@keyframes rippleShine {
  0% { opacity: 0; transform: scale(0) translateX(0); box-shadow: none; }
  30% { opacity: 0.8; transform: scale(1) translateX(0); box-shadow: 0 0 8px rgba(120, 200, 240, 0.8); }
  100% { opacity: 0; transform: scale(2) translateX(40px); box-shadow: none; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 20px;
  background: linear-gradient(135deg,
    #ffeaa0 0%,
    #ffd54f 25%,
    #fff8e7 50%,
    #ffd54f 75%,
    #ffeaa0 100%);
  background-size: 300% 300%;
  animation: lighthouseBorder 5s ease-in-out infinite;
  box-shadow:
    0 0 30px rgba(255, 240, 180, 0.5),
    0 0 60px rgba(255, 200, 100, 0.2),
    0 12px 40px rgba(0, 0, 0, 0.4);
}
@keyframes lighthouseBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card {
  background: rgba(10, 22, 40, 0.88);
  border-radius: 18px;
  padding: clamp(28px, 6vw, 52px) clamp(24px, 5vw, 48px);
  max-width: 480px;
  width: 90vw;
  text-align: center;
  position: relative;
  border: 1px solid rgba(255, 240, 180, 0.15);
  animation: cardFloat 5s ease-in-out infinite;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.icon {
  font-size: clamp(44px, 10vw, 72px);
  display: block;
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  filter: drop-shadow(0 4px 16px rgba(255, 240, 180, 0.5));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-50px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(26px, 7vw, 44px);
  font-weight: bold;
  color: #ffeaa0;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(255, 234, 160, 0.6), 0 2px 4px rgba(0,0,0,0.4);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.date {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(255, 240, 200, 0.6);
  margin-bottom: 16px;
  letter-spacing: 2px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.6s both;
}

.blessing {
  font-size: clamp(17px, 4.5vw, 24px);
  color: #f5e6c8;
  line-height: 1.7;
  margin-bottom: 20px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.8s both;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.from {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(255, 234, 160, 0.7);
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1s both;
}

.from::before { content: '— '; }

/* 角落装饰 */
.corner-deco {
  position: absolute;
  font-size: 22px;
  opacity: 0.5;
  pointer-events: none;
}
.corner-deco.tl { top: 10px; left: 12px; }
.corner-deco.tr { top: 10px; right: 12px; }
.corner-deco.bl { bottom: 10px; left: 12px; }
.corner-deco.br { bottom: 10px; right: 12px; }

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .star, .wave, .lighthouse, .card {
    animation: none;
  }
  .name, .date, .blessing, .from, .icon {
    animation: none;
    opacity: 1;
  }
}
</style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>

<!-- 月亮 -->
<div class="moon"></div>

<!-- 灯塔光芒 -->
<div class="lighthouse-beam"></div>

<!-- 灯塔 -->
<div class="lighthouse">🗼</div>

<!-- 海浪 -->
<div class="waves">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<!-- 波光 -->
<div class="ripples" id="ripples"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="corner-deco tl">🗼</span>
    <span class="corner-deco tr">🌙</span>
    <span class="corner-deco bl">⭐</span>
    <span class="corner-deco br">🌊</span>

    <span class="icon" id="iconEl">🗼</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
// 参数读取
const p = new URLSearchParams(location.search);
const icon = p.get('i') || '🗼';
document.getElementById('iconEl').textContent = icon;
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你成为自己的光，照亮前行的方向';
document.getElementById('fromEl').textContent = p.get('f') || '';

// 生成星星
const starsEl = document.getElementById('stars');
for (let i = 0; i < 40; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 55 + '%';
  star.style.width = (1 + Math.random() * 3) + 'px';
  star.style.height = star.style.width;
  star.style.animationDuration = (2 + Math.random() * 3) + 's';
  star.style.animationDelay = Math.random() * 3 + 's';
  starsEl.appendChild(star);
}

// 生成波光
const ripplesEl = document.getElementById('ripples');
for (let i = 0; i < 12; i++) {
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = (5 + Math.random() * 90) + '%';
  ripple.style.bottom = (Math.random() * 30) + '%';
  ripple.style.animationDuration = (2.5 + Math.random() * 2) + 's';
  ripple.style.animationDelay = Math.random() * 3 + 's';
  ripplesEl.appendChild(ripple);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.star, .wave, .lighthouse, .ripple, .card').forEach(el => {
    el.style.animation = 'none';
  });
}
</script>
</body>
</html>
