<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>棉花糖云</title>
<meta property="og:title" content="💗 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --marsh-pink: #ffb8d0;
  --marsh-rose: #ff8fbf;
  --marsh-lavender: #d4b8ff;
  --marsh-mint: #b8f0e0;
  --marsh-cream: #fff5f8;
  --marsh-white: #ffffff;
  --text-rose: #8b4060;
  --card-bg: rgba(255, 252, 255, 0.88);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #ffd6e8 0%,
    #ffe4f0 20%,
    #f0e4ff 45%,
    #d4e8ff 70%,
    #e4f4ff 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 背景彩色光晕 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(255, 180, 210, 0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 25%, rgba(210, 180, 255, 0.3) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 85%, rgba(180, 240, 220, 0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%, rgba(255, 180, 200, 0.2) 0%, transparent 45%);
  pointer-events: none;
  z-index: 0;
  animation: bgPulse 6s ease-in-out infinite;
}
@keyframes bgPulse {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

/* 棉花糖云 */
.cloud {
  position: fixed;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 4px 12px rgba(200, 150, 180, 0.3));
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 50%;
}
.cloud::before {
  width: 60px; height: 55px;
  top: -25px; left: 20px;
}
.cloud::after {
  width: 75px; height: 65px;
  top: -35px; left: 55px;
}
.cloud-body {
  position: relative;
  background: rgba(255, 255, 255, 0.88);
  border-radius: 50%;
  width: 110px; height: 50px;
}
.cloud-puff {
  position: absolute;
  background: rgba(255, 255, 255, 0.85);
  border-radius: 50%;
}
.cloud-puff:nth-child(1) { width: 45px; height: 40px; top: -18px; left: 10px; }
.cloud-puff:nth-child(2) { width: 55px; height: 48px; top: -25px; left: 40px; }
.cloud-puff:nth-child(3) { width: 40px; height: 36px; top: -12px; left: 75px; }

@keyframes cloudDrift {
  0% { transform: translateX(-120px) translateY(0); }
  100% { transform: translateX(calc(100vw + 120px)) translateY(-20px); }
}

/* 气球 */
.balloon {
  position: fixed;
  font-size: 26px;
  z-index: 1;
  pointer-events: none;
  animation: balloonFloat linear infinite;
}
@keyframes balloonFloat {
  0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
  8% { opacity: 0.9; }
  90% { opacity: 0.7; }
  100% { transform: translateY(-12vh) rotate(15deg); opacity: 0; }
}

/* 糖果飘落 */
.candy {
  position: fixed;
  font-size: 18px;
  z-index: 1;
  pointer-events: none;
  animation: candyFall linear infinite;
}
@keyframes candyFall {
  0% { transform: translateY(-8vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.85; }
  90% { opacity: 0.75; }
  100% { transform: translateY(108vh) rotate(400deg); opacity: 0; }
}

/* 爱心上浮 */
.heart-float {
  position: fixed;
  font-size: 16px;
  z-index: 1;
  pointer-events: none;
  animation: heartRise ease-in infinite;
}
@keyframes heartRise {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  15% { opacity: 0.8; }
  85% { opacity: 0.6; }
  100% { transform: translateY(-8vh) scale(1.1); opacity: 0; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  padding: 3px;
  background: linear-gradient(135deg, #ffb8d0, #d4b8ff, #b8f0e0, #ffb8d0);
  background-size: 400% 400%;
  animation: borderFlow 6s ease infinite;
  border-radius: 24px;
  z-index: 10;
  box-shadow: 0 0 35px rgba(255, 150, 190, 0.4), 0 16px 50px rgba(150, 100, 150, 0.18);
}
@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 卡片主体 */
.card {
  background: linear-gradient(160deg, rgba(255, 252, 255, 0.96) 0%, rgba(255, 248, 252, 0.98) 100%);
  border-radius: 22px;
  padding: clamp(34px, 9vw, 56px) clamp(26px, 7vw, 48px);
  text-align: center;
  max-width: min(520px, 94vw);
  min-height: min(380px, 70vh);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  animation: cardFloat 5s ease-in-out infinite alternate;
  border: 1px solid rgba(255, 180, 210, 0.25);
}
@keyframes cardFloat {
  0% { transform: translateY(0); }
  100% { transform: translateY(-8px); }
}

/* 卡片角落丝带 */
.card::before {
  content: '🎀';
  position: absolute;
  top: 10px; right: 14px;
  font-size: 20px;
  opacity: 0.6;
}
.card::after {
  content: '✨';
  position: absolute;
  bottom: 12px; left: 16px;
  font-size: 16px;
  opacity: 0.5;
}

/* 名字 */
.name {
  font-size: clamp(30px, 8vw, 52px);
  font-weight: 700;
  color: var(--text-rose);
  margin-bottom: 12px;
  text-shadow: 0 2px 12px rgba(255, 120, 160, 0.3);
  opacity: 1;
  animation: slideIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  letter-spacing: 0.06em;
}

/* 日期 */
.date {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #b87090;
  margin-bottom: 18px;
  opacity: 1;
  animation: slideIn 1.2s ease-out 0.5s both;
  letter-spacing: 0.12em;
}

/* 祝福语 */
.blessing {
  font-size: clamp(17px, 4.5vw, 24px);
  color: #6a3555;
  line-height: 1.8;
  max-width: 400px;
  opacity: 1;
  animation: slideIn 1.2s ease-out 0.8s both;
}

/* 署名 */
.from {
  font-size: clamp(13px, 3.5vw, 17px);
  color: #b080a0;
  margin-top: 20px;
  opacity: 1;
  animation: slideIn 1.2s ease-out 1.1s both;
  font-style: italic;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- 棉花糖云 -->
<div class="cloud" style="top: 8%; animation: cloudDrift 22s linear infinite;">
  <div class="cloud-puff"></div>
  <div class="cloud-puff"></div>
  <div class="cloud-puff"></div>
  <div class="cloud-body"></div>
</div>
<div class="cloud" style="top: 22%; animation: cloudDrift 30s linear infinite; animation-delay: -8s; opacity: 0.8;">
  <div class="cloud-puff"></div>
  <div class="cloud-puff"></div>
  <div class="cloud-puff"></div>
  <div class="cloud-body"></div>
</div>
<div class="cloud" style="top: 5%; animation: cloudDrift 26s linear infinite; animation-delay: -15s; opacity: 0.7; transform: scale(0.7);">
  <div class="cloud-puff"></div>
  <div class="cloud-puff"></div>
  <div class="cloud-puff"></div>
  <div class="cloud-body"></div>
</div>

<!-- 气球 -->
<script>
const balloonEmojis = ['🎈', '🎀', '💖', '🌸', '💕', '🎀'];
const candyEmojis = ['🍬', '🍭', '🧁', '🍩', '💮', '✨'];
const heartEmojis = ['💗', '💕', '💖', '💓'];
const candyColors = ['#ffb8d0', '#d4b8ff', '#b8f0e0', '#ffe066', '#ffb347', '#ff8fbf'];

// 气球
for (let i = 0; i < 6; i++) {
  const b = document.createElement('div');
  b.className = 'balloon';
  b.textContent = balloonEmojis[i % balloonEmojis.length];
  b.style.cssText = `
    left: ${8 + i * 15}%;
    animation-duration: ${10 + Math.random() * 6}s;
    animation-delay: ${-Math.random() * 12}s;
  `;
  document.body.appendChild(b);
}

// 糖果
for (let i = 0; i < 8; i++) {
  const c = document.createElement('div');
  c.className = 'candy';
  c.textContent = candyEmojis[i % candyEmojis.length];
  c.style.cssText = `
    left: ${5 + Math.random() * 88}%;
    animation-duration: ${7 + Math.random() * 5}s;
    animation-delay: ${-Math.random() * 8}s;
  `;
  document.body.appendChild(c);
}

// 爱心上浮
for (let i = 0; i < 5; i++) {
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = heartEmojis[i % heartEmojis.length];
  h.style.cssText = `
    left: ${10 + Math.random() * 78}%;
    animation-duration: ${8 + Math.random() * 5}s;
    animation-delay: ${-Math.random() * 9}s;
  `;
  document.body.appendChild(h);
}
</script>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '甜甜的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的每一天都像棉花糖一样甜蜜';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>

</body>
</html>
