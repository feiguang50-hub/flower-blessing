<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人鱼公主祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ocean-deep: #0077b6;
  --ocean-mid: #00b4d8;
  --ocean-light: #90e0ef;
  --ocean-foam: #caf0f8;
  --mermaid-pink: #ff6b9d;
  --mermaid-gold: #ffd700;
  --mermaid-purple: #9b59b6;
  --card-bg: rgba(200,240,255,0.75);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #005f73 0%,
    #0a9396 20%,
    #00b4d8 40%,
    #48cae4 55%,
    #90e0ef 70%,
    #ade8f4 85%,
    #caf0f8 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 水面光斑 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 10%, rgba(255,255,255,0.3) 0%, transparent 40%),
    radial-gradient(ellipse at 70% 15%, rgba(144,224,239,0.3) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 5%, rgba(255,255,255,0.2) 0%, transparent 30%);
  pointer-events: none;
  z-index: 0;
  animation: waterShimmer 4s ease-in-out infinite;
}

@keyframes waterShimmer {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

/* 气泡 */
.bubbles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.bubble-item {
  position: absolute;
  border-radius: 50%;
  animation: rise linear infinite;
  opacity: 0;
}

.b1 { width: 12px; height: 12px; left: 5%; animation-duration: 8s; animation-delay: 0s; background: radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(144,224,239,0.5)); border: 1px solid rgba(144,224,239,0.5); }
.b2 { width: 20px; height: 20px; left: 15%; animation-duration: 10s; animation-delay: 1s; background: radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(0,180,216,0.5)); border: 1px solid rgba(0,180,216,0.5); }
.b3 { width: 8px; height: 8px; left: 25%; animation-duration: 7s; animation-delay: 0.5s; }
.b4 { width: 16px; height: 16px; left: 38%; animation-duration: 9s; animation-delay: 2s; }
.b5 { width: 24px; height: 24px; left: 50%; animation-duration: 11s; animation-delay: 1.5s; }
.b6 { width: 10px; height: 10px; left: 62%; animation-duration: 8.5s; animation-delay: 0.8s; }
.b7 { width: 18px; height: 18px; left: 75%; animation-duration: 9.5s; animation-delay: 3s; }
.b8 { width: 14px; height: 14px; left: 88%; animation-duration: 7.5s; animation-delay: 2.5s; }
.b9 { width: 22px; height: 22px; left: 30%; animation-duration: 10.5s; animation-delay: 4s; }
.b10 { width: 9px; height: 9px; left: 70%; animation-duration: 8s; animation-delay: 1.2s; }

@keyframes rise {
  0% { bottom: -60px; opacity: 0; transform: translateX(0) scale(0.5); }
  10% { opacity: 0.7; transform: translateX(5px) scale(1); }
  40% { transform: translateX(-5px) scale(1.05); }
  70% { opacity: 0.4; transform: translateX(5px) scale(0.95); }
  100% { bottom: 110vh; opacity: 0; transform: translateX(-3px) scale(0.6); }
}

/* 鱼鳞闪光 */
.scales {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.scale-item {
  position: absolute;
  width: 8px; height: 8px;
  background: radial-gradient(ellipse, rgba(255,215,0,0.5), rgba(255,107,157,0.3), transparent);
  border-radius: 50%;
  opacity: 0;
  animation: scaleSparkle 3s ease-in-out infinite;
}

.s1 { top: 20%; left: 5%; animation-delay: 0s; }
.s2 { top: 35%; left: 92%; animation-delay: 0.5s; }
.s3 { top: 50%; left: 3%; animation-delay: 1s; }
.s4 { top: 15%; left: 88%; animation-delay: 1.5s; }
.s5 { top: 60%; left: 95%; animation-delay: 2s; }
.s6 { top: 45%; left: 7%; animation-delay: 2.5s; }
.s7 { top: 25%; left: 96%; animation-delay: 0.8s; }
.s8 { top: 55%; left: 1%; animation-delay: 1.8s; }

@keyframes scaleSparkle {
  0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.5) rotate(180deg); }
}

/* 珍珠装饰 */
.pearls {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.pearl-item {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffffff 0%, #f5e6e8 40%, #e8d0d4 100%);
  box-shadow: 0 0 6px rgba(255,200,210,0.6), inset 0 0 4px rgba(255,255,255,0.8);
  opacity: 0;
  animation: pearlFloat 5s ease-in-out infinite;
}

.p1 { width: 10px; height: 10px; top: 10%; left: 10%; animation-delay: 0s; }
.p2 { width: 8px; height: 8px; top: 20%; left: 85%; animation-delay: 0.7s; }
.p3 { width: 12px; height: 12px; top: 40%; left: 5%; animation-delay: 1.4s; }
.p4 { width: 7px; height: 7px; top: 55%; left: 92%; animation-delay: 2.1s; }
.p5 { width: 9px; height: 9px; top: 70%; left: 8%; animation-delay: 2.8s; }
.p6 { width: 11px; height: 11px; top: 30%; left: 95%; animation-delay: 3.5s; }

@keyframes pearlFloat {
  0%, 100% { opacity: 0; transform: translateY(0); }
  30% { opacity: 0.8; transform: translateY(-15px); }
  70% { opacity: 0.5; transform: translateY(-8px); }
}

/* 卡片包装 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 28px;
  background: linear-gradient(135deg,
    rgba(0,119,182,0.7),
    rgba(0,180,216,0.7),
    rgba(144,224,239,0.7),
    rgba(255,107,157,0.6),
    rgba(157,89,182,0.6),
    rgba(0,119,182,0.7));
  background-size: 400% 400%;
  animation: oceanBorder 5s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(0,180,216,0.4),
    0 0 40px rgba(0,180,216,0.2),
    0 8px 32px rgba(0,0,0,0.15);
}

@keyframes oceanBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card {
  background: rgba(200,240,255,0.88);
  border-radius: 26px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  max-width: 90vw;
  width: 420px;
}

.icon {
  font-size: clamp(40px, 10vw, 64px);
  display: block;
  margin-bottom: 12px;
  animation: bounceIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  filter: drop-shadow(0 4px 8px rgba(0,180,216,0.4));
}

@keyframes bounceIn {
  from { opacity: 0; transform: scale(0.3) translateY(30px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.name {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: 700;
  background: linear-gradient(90deg, #0077b6, #00b4d8, #ff6b9d, #9b59b6);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both, shimmer 4s ease-in-out 1.7s infinite;
}

@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.blessing {
  font-size: clamp(16px, 4.5vw, 22px);
  color: #005f73;
  line-height: 1.6;
  margin-bottom: 14px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.8s both;
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: #0077b6;
  margin-bottom: 6px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: #9b59b6;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.3s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .bubble-item, .scale-item, .pearl-item, .card-wrap, body::before {
    animation: none;
  }
  .name, .blessing, .date, .from { animation: none; opacity: 1; }
  .icon { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 气泡 -->
<div class="bubbles">
  <div class="bubble-item b1"></div>
  <div class="bubble-item b2"></div>
  <div class="bubble-item b3" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(144,224,239,0.4));border:1px solid rgba(144,224,239,0.4);"></div>
  <div class="bubble-item b4" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(0,180,216,0.4));border:1px solid rgba(0,180,216,0.4);"></div>
  <div class="bubble-item b5"></div>
  <div class="bubble-item b6" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(144,224,239,0.4));border:1px solid rgba(144,224,239,0.4);"></div>
  <div class="bubble-item b7"></div>
  <div class="bubble-item b8" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(0,180,216,0.4));border:1px solid rgba(0,180,216,0.4);"></div>
  <div class="bubble-item b9"></div>
  <div class="bubble-item b10" style="background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.9),rgba(144,224,239,0.4));border:1px solid rgba(144,224,239,0.4);"></div>
</div>

<!-- 鱼鳞闪光 -->
<div class="scales">
  <div class="scale-item s1"></div>
  <div class="scale-item s2"></div>
  <div class="scale-item s3"></div>
  <div class="scale-item s4"></div>
  <div class="scale-item s5"></div>
  <div class="scale-item s6"></div>
  <div class="scale-item s7"></div>
  <div class="scale-item s8"></div>
</div>

<!-- 珍珠 -->
<div class="pearls">
  <div class="pearl-item p1"></div>
  <div class="pearl-item p2"></div>
  <div class="pearl-item p3"></div>
  <div class="pearl-item p4"></div>
  <div class="pearl-item p5"></div>
  <div class="pearl-item p6"></div>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">🧜‍♀️</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '人鱼公主';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你如海般深邃，如泡般轻盈，每一天都闪闪发光';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
</script>
</body>
</html>
