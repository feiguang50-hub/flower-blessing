<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中秋祝福</title>
<meta property="og:title" content="🌕 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="🌕 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg, #06061a 0%, #0d0d2b 40%, #1a1040 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 动漫漏光 === */
body::before {
  content: '';
  position: fixed;
  top: -30%;
  left: -20%;
  width: 70%;
  height: 70%;
  background: radial-gradient(ellipse, rgba(255,220,100,0.06) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
  animation: lensFlare 10s ease-in-out infinite;
}
@keyframes lensFlare {
  0%, 100% { opacity: 0.6; transform: translate(0, 0) scale(1); }
  50% { opacity: 1; transform: translate(5%, 3%) scale(1.08); }
}

/* === 月亮 === */
.moon {
  position: fixed;
  top: 8%;
  right: 12%;
  width: clamp(100px, 18vw, 200px);
  height: clamp(100px, 18vw, 200px);
  border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #fffde0 0%, #ffe89a 30%, #ffcc44 70%, #ffaa00 100%);
  box-shadow:
    0 0 30px rgba(255,220,100,0.5),
    0 0 80px rgba(255,200,60,0.3),
    0 0 120px rgba(255,180,40,0.15),
    inset -8px -8px 20px rgba(200,140,0,0.3);
  z-index: 1;
  animation: moonGlow 6s ease-in-out infinite;
}
.moon::after {
  content: '';
  position: absolute;
  top: 20%;
  left: 25%;
  width: 15%;
  height: 12%;
  border-radius: 50%;
  background: rgba(200,160,60,0.25);
  box-shadow:
    40px 15px 0 rgba(200,160,60,0.2),
    15px 40px 0 rgba(200,160,60,0.15),
    50px 50px 0 rgba(200,160,60,0.1);
}
@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(255,220,100,0.5), 0 0 80px rgba(255,200,60,0.3), 0 0 120px rgba(255,180,40,0.15), inset -8px -8px 20px rgba(200,140,0,0.3); }
  50% { box-shadow: 0 0 45px rgba(255,220,100,0.65), 0 0 100px rgba(255,200,60,0.4), 0 0 160px rgba(255,180,40,0.2), inset -8px -8px 20px rgba(200,140,0,0.3); }
}

/* === 玉兔剪影 === */
.rabbit {
  position: fixed;
  top: 11%;
  right: 18%;
  width: clamp(40px, 7vw, 80px);
  height: clamp(50px, 9vw, 100px);
  z-index: 2;
  animation: rabbitBounce 4s ease-in-out infinite;
}
.rabbit svg { width: 100%; height: 100%; }
@keyframes rabbitBounce {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-6px) rotate(1deg); }
}

/* === 星星 === */
.star {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle, #fff8e0, #ffe0a0);
  animation: starTwinkle linear infinite;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* === 灯笼 === */
.lantern {
  position: fixed;
  font-size: clamp(18px, 3vw, 32px);
  animation: lanternSwing ease-in-out infinite;
  z-index: 1;
  transform-origin: top center;
}
@keyframes lanternSwing {
  0%, 100% { transform: rotate(-4deg); }
  50% { transform: rotate(4deg); }
}

/* === 云彩 === */
.cloud {
  position: fixed;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
  filter: blur(20px);
  z-index: 1;
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100vw); }
}

/* === 卡片外框 === */
.card-wrap {
  position: relative;
  z-index: 10;
  perspective: 1200px;
}
.card {
  width: clamp(300px, 88vw, 520px);
  background: rgba(255, 248, 230, 0.12);
  backdrop-filter: blur(18px) saturate(1.5);
  -webkit-backdrop-filter: blur(18px) saturate(1.5);
  border: 1px solid rgba(255, 220, 150, 0.35);
  border-radius: 24px;
  padding: clamp(28px, 6vw, 48px) clamp(20px, 5vw, 36px);
  text-align: center;
  box-shadow:
    0 0 40px rgba(255, 200, 80, 0.2),
    0 8px 32px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.15);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  animation: shimmer 4s ease-in-out infinite;
}
@keyframes shimmer {
  0% { left: -100%; }
  100% { left: 100%; }
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* === 月相光效 === */
.card-moon-glow {
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,230,120,0.18) 0%, transparent 70%);
  pointer-events: none;
}

/* === 文字内容 === */
.label {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(255, 230, 150, 0.65);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 10px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.2s both;
}
.name {
  font-size: clamp(30px, 8vw, 60px);
  font-weight: 400;
  color: #ffe89a;
  text-shadow:
    0 0 20px rgba(255,220,100,0.7),
    0 0 50px rgba(255,180,60,0.4);
  margin-bottom: 8px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.5s both;
  line-height: 1.2;
}
.date {
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(255, 220, 160, 0.6);
  letter-spacing: 3px;
  margin-bottom: 20px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.8s both;
}
.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,210,100,0.6), transparent);
  margin: 0 auto 20px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 1s both;
}
.blessing {
  font-size: clamp(15px, 4vw, 22px);
  color: rgba(255, 250, 235, 0.92);
  line-height: 1.8;
  margin-bottom: 24px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 1.2s both;
}
.from {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(255, 220, 160, 0.7);
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 1.6s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* === 减少动画 === */
@media (prefers-reduced-motion: reduce) {
  .card, .moon, .rabbit, .lantern { animation: none; }
  .star, .body::before { animation: none; opacity: 0.7; }
  .card::before { animation: none; }
  .name, .date, .blessing, .from, .label, .divider { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 月亮 -->
<div class="moon"></div>

<!-- 玉兔 -->
<div class="rabbit">
  <svg viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 耳朵 -->
    <ellipse cx="26" cy="18" rx="9" ry="22" fill="rgba(255,240,200,0.7)" transform="rotate(-8 26 18)"/>
    <ellipse cx="54" cy="18" rx="9" ry="22" fill="rgba(255,240,200,0.7)" transform="rotate(8 54 18)"/>
    <ellipse cx="26" cy="18" rx="5" ry="15" fill="rgba(255,200,160,0.4)" transform="rotate(-8 26 18)"/>
    <ellipse cx="54" cy="18" rx="5" ry="15" fill="rgba(255,200,160,0.4)" transform="rotate(8 54 18)"/>
    <!-- 头 -->
    <ellipse cx="40" cy="55" rx="26" ry="24" fill="rgba(255,240,200,0.75)"/>
    <!-- 眼睛 -->
    <ellipse cx="32" cy="52" rx="4" ry="5" fill="rgba(80,40,20,0.8)"/>
    <ellipse cx="48" cy="52" rx="4" ry="5" fill="rgba(80,40,20,0.8)"/>
    <circle cx="33" cy="51" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="49" cy="51" r="1.5" fill="white" opacity="0.8"/>
    <!-- 鼻子 -->
    <ellipse cx="40" cy="60" rx="3" ry="2.5" fill="rgba(255,160,140,0.6)"/>
    <!-- 身体 -->
    <ellipse cx="40" cy="90" rx="22" ry="18" fill="rgba(255,240,200,0.7)"/>
  </svg>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="card-moon-glow"></div>
    <div class="label" id="labelEl">中秋快乐</div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
(function() {
  const p = new URLSearchParams(location.search);

  const nameEl = document.getElementById('nameEl');
  const dateEl = document.getElementById('dateEl');
  const blessingEl = document.getElementById('blessingEl');
  const fromEl = document.getElementById('fromEl');
  const labelEl = document.getElementById('labelEl');

  if (nameEl) nameEl.textContent = p.get('n') || '亲爱的你';
  if (dateEl) dateEl.textContent = p.get('d') || '';
  if (blessingEl) blessingEl.textContent = p.get('b') || '月圆人团圆，愿你中秋快乐，阖家幸福';
  if (fromEl && p.get('f')) {
    fromEl.textContent = '— ' + p.get('f');
    fromEl.style.display = '';
  } else if (fromEl) {
    fromEl.style.display = 'none';
  }
  if (labelEl && p.get('l')) labelEl.textContent = p.get('l');

  // 星星
  const starCount = 60;
  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 1;
    star.style.cssText = `
      width: ${size}px; height: ${size}px;
      top: ${Math.random() * 70}%;
      left: ${Math.random() * 95}%;
      animation-duration: ${Math.random() * 3 + 2}s;
      animation-delay: ${Math.random() * 4}s;
    `;
    document.body.appendChild(star);
  }

  // 灯笼
  const lanternEmojis = ['🏮', '🏮', '✨'];
  const lanternPositions = [
    {left: '5%', top: '15%'}, {left: '92%', top: '25%'},
    {left: '3%', top: '60%'}, {left: '96%', top: '55%'}
  ];
  lanternPositions.forEach((pos, i) => {
    const ln = document.createElement('div');
    ln.className = 'lantern';
    ln.textContent = lanternEmojis[i % lanternEmojis.length];
    ln.style.cssText = `left: ${pos.left}; top: ${pos.top}; font-size: ${Math.random() * 10 + 20}px; animation-duration: ${Math.random() * 2 + 3}s; animation-delay: ${Math.random() * 2}s;`;
    document.body.appendChild(ln);
  });

  // 云彩
  for (let i = 0; i < 4; i++) {
    const cloud = document.createElement('div');
    cloud.className = 'cloud';
    const w = Math.random() * 200 + 100;
    cloud.style.cssText = `width: ${w}px; height: ${w * 0.4}px; top: ${Math.random() * 80}%; animation-duration: ${Math.random() * 30 + 40}s; animation-delay: ${Math.random() * 20}s;`;
    document.body.appendChild(cloud);
  }
})();
</script>
</body>
</html>
