<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月光</title>
<meta property="og:title" content="🌙 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-deep: #050a1a;
  --night-water: #0a1428;
  --moon-glow: #fff9e6;
  --moon-soft: #e8d49b;
  --water-shimmer: rgba(200, 220, 255, 0.25);
  --text-warm: #f0e6c8;
  --text-muted: rgba(240, 230, 200, 0.6);
  --card-bg: rgba(10, 20, 40, 0.85);
  --card-border: rgba(255, 249, 230, 0.3);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #050a1a 0%,
    #0a1428 30%,
    #0f1e3a 55%,
    #0a1428 75%,
    #071020 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星光背景 */
.stars {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}
.star {
  position: absolute;
  width: 1.5px; height: 1.5px;
  background: rgba(220, 230, 255, 0.7);
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.3); }
}

/* 月亮光晕 */
.moon-halo {
  position: fixed;
  top: 8%; left: 50%;
  transform: translateX(-50%);
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,249,230,0.18) 0%, rgba(255,249,230,0.08) 40%, transparent 70%);
  border-radius: 50%;
  z-index: 1; pointer-events: none;
  animation: haloPulse 5s ease-in-out infinite;
}
@keyframes haloPulse {
  0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
  50% { transform: translateX(-50%) scale(1.08); opacity: 1; }
}

/* 月亮 */
.moon {
  position: fixed;
  top: 6%; left: 50%;
  transform: translateX(-50%);
  width: 90px; height: 90px;
  background: radial-gradient(circle at 35% 35%, #fffef0 0%, #fff9e6 50%, #e8d49b 100%);
  border-radius: 50%;
  z-index: 2; pointer-events: none;
  box-shadow:
    0 0 20px 8px rgba(255,249,230,0.4),
    0 0 60px 20px rgba(255,249,230,0.15),
    0 0 100px 40px rgba(255,249,230,0.06);
  animation: moonGlow 4s ease-in-out infinite;
}
@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 20px 8px rgba(255,249,230,0.4), 0 0 60px 20px rgba(255,249,230,0.15); }
  50% { box-shadow: 0 0 28px 12px rgba(255,249,230,0.5), 0 0 80px 30px rgba(255,249,230,0.2); }
}

/* 月亮表面阴影 */
.moon::after {
  content: '';
  position: absolute;
  top: 10%; left: 15%;
  width: 30%; height: 30%;
  background: rgba(200,180,120,0.15);
  border-radius: 50%;
  filter: blur(4px);
}

/* 湖面 */
.lake {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 38%;
  z-index: 3; pointer-events: none;
  overflow: hidden;
}

.lake-surface {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    rgba(15,30,60,0.6) 0%,
    rgba(10,20,40,0.85) 30%,
    rgba(5,12,28,0.95) 100%);
}

/* 湖面波光 */
.wave {
  position: absolute;
  left: -10%; right: -10%;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, var(--water-shimmer) 30%, rgba(200,220,255,0.4) 50%, var(--water-shimmer) 70%, transparent 100%);
  border-radius: 50%;
  animation: waveMove 4s ease-in-out infinite;
}
.wave:nth-child(1) { top: 18%; animation-duration: 3.5s; }
.wave:nth-child(2) { top: 32%; animation-duration: 4.2s; animation-delay: 0.8s; }
.wave:nth-child(3) { top: 46%; animation-duration: 3.8s; animation-delay: 1.5s; }
.wave:nth-child(4) { top: 60%; animation-duration: 4.5s; animation-delay: 0.3s; }
.wave:nth-child(5) { top: 74%; animation-duration: 3.2s; animation-delay: 2s; }

@keyframes waveMove {
  0%, 100% { transform: translateX(-5%) scaleX(0.95); opacity: 0.4; }
  50% { transform: translateX(5%) scaleX(1.05); opacity: 0.8; }
}

/* 月亮倒影 */
.moon-reflection {
  position: absolute;
  top: 8%;
  left: 50%; transform: translateX(-50%);
  width: 60px; height: 60px;
  background: radial-gradient(circle, rgba(255,249,230,0.5) 0%, rgba(255,249,230,0.1) 60%, transparent 80%);
  border-radius: 50%;
  animation: reflectionShimmer 3s ease-in-out infinite;
  filter: blur(3px);
}
@keyframes reflectionShimmer {
  0%, 100% { transform: translateX(-50%) scaleY(1) scaleX(1); opacity: 0.6; }
  50% { transform: translateX(-50%) scaleY(0.6) scaleX(1.3); opacity: 0.9; }
}

/* 荷叶/睡莲 */
.lotus {
  position: absolute;
  bottom: 20%; z-index: 4;
  font-size: 22px;
  animation: lotusFloat 5s ease-in-out infinite;
}
.lotus:nth-child(7) { left: 15%; animation-delay: 0s; }
.lotus:nth-child(8) { left: 75%; animation-delay: 1.2s; font-size: 18px; }
@keyframes lotusFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-4px) rotate(2deg); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 20px;
  background: linear-gradient(135deg,
    rgba(255,249,230,0.4) 0%,
    rgba(200,180,120,0.3) 50%,
    rgba(255,249,230,0.4) 100%);
  background-size: 200% 200%;
  animation: borderFlow 4s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(255,249,230,0.2),
    0 8px 32px rgba(0,0,0,0.4);
}
@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(255,249,230,0.2), 0 8px 32px rgba(0,0,0,0.4); }
  50% { background-position: 100% 50%; box-shadow: 0 0 30px rgba(255,249,230,0.35), 0 8px 32px rgba(0,0,0,0.4); }
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 44px);
  text-align: center;
  max-width: min(420px, 92vw);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  animation: cardFloat 4s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.name {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: normal;
  color: var(--moon-soft);
  margin-bottom: 10px;
  letter-spacing: 0.1em;
  opacity: 1;
  animation: fadeUp 1.2s ease-out both;
  text-shadow: 0 0 12px rgba(255,249,230,0.5);
}

.date {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-muted);
  margin-bottom: 20px;
  letter-spacing: 0.15em;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.2s both;
}

.divider {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--moon-soft), transparent);
  margin: 16px auto;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.4s both;
}

.blessing {
  font-size: clamp(14px, 3.5vw, 17px);
  color: var(--text-warm);
  line-height: 1.9;
  margin-bottom: 22px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.5s both;
}

.from {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-muted);
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.8s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="moon-halo"></div>
<div class="moon"></div>

<div class="lake">
  <div class="lake-surface"></div>
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="moon-reflection"></div>
  <div class="lotus">🪷</div>
  <div class="lotus">🪷</div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '月光下的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿月光温柔，岁月静好';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 生成星星
const starsEl = document.getElementById('stars');
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 50 + '%';
  s.style.animationDuration = (2.5 + Math.random() * 3) + 's';
  s.style.animationDelay = Math.random() * 3 + 's';
  s.style.width = s.style.height = (1 + Math.random() * 1.5) + 'px';
  starsEl.appendChild(s);
}

// 减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.star, .moon-halo, .moon, .wave, .card-wrap, .card, .lotus, .moon-reflection').forEach(el => {
    el.style.animation = 'none';
  });
}
</script>
</body>
</html>
