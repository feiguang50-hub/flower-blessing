<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月华如练</title>
<meta property="og:title" content="🌙 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --moon-blue: #0a1628;
  --moon-silver: #c8d8f0;
  --moon-glow: #e8f0ff;
  --ripple-blue: #2a4a7a;
  --text-light: #d0e0f0;
  --card-bg: rgba(15, 30, 60, 0.82);
  --glow-moon: rgba(200, 220, 255, 0.5);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #050a18 0%,
    #0a1628 20%,
    #0f1e3a 40%,
    #152a4a 60%,
    #1a3660 80%,
    #0f2040 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 月光 */
body::before {
  content: '';
  position: fixed;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  background: radial-gradient(circle,
    rgba(240, 245, 255, 0.25) 0%,
    rgba(200, 220, 255, 0.12) 30%,
    rgba(180, 210, 255, 0.05) 50%,
    transparent 70%);
  border-radius: 50%;
  z-index: 0;
  animation: moonPulse 4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes moonPulse {
  0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
  50% { transform: translateX(-50%) scale(1.08); opacity: 1; }
}

/* 月亮本体 */
.moon {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%,
    #fffef0 0%,
    #f8f0e0 40%,
    #e8e0c8 100%);
  box-shadow:
    0 0 30px rgba(255, 250, 220, 0.5),
    0 0 80px rgba(200, 210, 255, 0.3),
    0 0 120px rgba(180, 200, 255, 0.15);
  z-index: 1;
  pointer-events: none;
  animation: moonGlow 3s ease-in-out infinite;
}
@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(255,250,220,0.5), 0 0 80px rgba(200,210,255,0.3); }
  50% { box-shadow: 0 0 45px rgba(255,252,225,0.65), 0 0 100px rgba(200,215,255,0.4); }
}

/* 星星 */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
  animation: starTwinkle ease-in-out infinite;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 湖面 */
.lake {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 45%;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

/* 波浪层 */
.wave {
  position: absolute;
  left: -5%;
  width: 110%;
  height: 100%;
  background-repeat: repeat-x;
  pointer-events: none;
}
.wave-1 {
  bottom: 0;
  height: 30px;
  background: linear-gradient(180deg, transparent 0%, rgba(30, 70, 130, 0.6) 100%);
  animation: waveMove 8s linear infinite;
}
.wave-2 {
  bottom: 10px;
  height: 25px;
  background: linear-gradient(180deg, transparent 0%, rgba(20, 60, 120, 0.5) 100%);
  animation: waveMove 10s linear infinite reverse;
}
.wave-3 {
  bottom: 20px;
  height: 35px;
  background: linear-gradient(180deg, transparent 0%, rgba(15, 50, 100, 0.4) 100%);
  animation: waveMove 12s linear infinite;
}

@keyframes waveMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* 水波纹 */
.ripple {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(180, 210, 255, 0.25);
  pointer-events: none;
  animation: rippleExpand ease-out infinite;
}
@keyframes rippleExpand {
  0% { width: 10px; height: 5px; opacity: 0.8; transform: translate(-50%, -50%); }
  100% { width: 120px; height: 40px; opacity: 0; transform: translate(-50%, -50%); }
}

/* 月光倒影 */
.moon-reflection {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(ellipse,
    rgba(240, 245, 255, 0.3) 0%,
    rgba(200, 220, 255, 0.15) 40%,
    transparent 70%);
  animation: reflectionShimmer 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes reflectionShimmer {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
  50% { opacity: 1; transform: translateX(-50%) scaleX(1.3); }
}

/* 萤火虫 */
.firefly {
  position: fixed;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #ffffc0;
  box-shadow: 0 0 6px 2px rgba(255, 255, 180, 0.8);
  z-index: 3;
  pointer-events: none;
  animation: fireflyGlow ease-in-out infinite;
}
@keyframes fireflyGlow {
  0%, 100% { opacity: 0.2; transform: translate(0, 0); }
  30% { opacity: 1; transform: translate(var(--ff-dx1, 10px), var(--ff-dy1, -8px)); }
  60% { opacity: 0.5; transform: translate(var(--ff-dx2, -5px), var(--ff-dy2, -15px)); }
  100% { opacity: 0.2; transform: translate(0, 0); }
}

/* 柳枝 */
.willow {
  position: fixed;
  top: 0;
  pointer-events: none;
  z-index: 2;
}
.willow-branch {
  position: absolute;
  top: 0;
  width: 2px;
  background: linear-gradient(180deg,
    rgba(60, 90, 50, 0.7) 0%,
    rgba(50, 80, 40, 0.4) 100%);
  border-radius: 0 0 2px 2px;
  transform-origin: top center;
  animation: willowSway ease-in-out infinite;
}
@keyframes willowSway {
  0%, 100% { transform: rotate(calc(var(--w-angle, 0deg) - 5deg)); }
  50% { transform: rotate(calc(var(--w-angle, 0deg) + 5deg)); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, #c8d8f0, #a0c0e0, #c8d8f0);
  border-radius: 24px;
  animation: moonBorder 4s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(180, 210, 255, 0.4), 0 8px 40px rgba(0,0,0,0.3);
}
@keyframes moonBorder {
  0%, 100% { box-shadow: 0 0 25px rgba(180, 210, 255, 0.35), 0 8px 40px rgba(0,0,0,0.3); }
  50% { box-shadow: 0 0 40px rgba(200, 225, 255, 0.55), 0 8px 40px rgba(0,0,0,0.35); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  min-width: 280px;
  max-width: 460px;
  border: 1px solid rgba(180, 210, 255, 0.2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.icon-emoji {
  font-size: clamp(40px, 10vw, 64px);
  margin-bottom: 16px;
  display: block;
  animation: iconIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  filter: drop-shadow(0 0 14px rgba(200, 220, 255, 0.6));
}
@keyframes iconIn {
  from { opacity: 0; transform: translateY(-20px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(28px, 7vw, 48px);
  font-weight: 700;
  color: var(--moon-glow);
  text-shadow: 0 0 20px rgba(200, 220, 255, 0.8), 0 0 40px rgba(150, 190, 255, 0.3);
  margin-bottom: 12px;
  opacity: 1;
  animation: nameIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
}
@keyframes nameIn {
  from { opacity: 0; transform: translateY(18px) scale(0.85); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.blessing {
  font-size: clamp(15px, 4vw, 22px);
  color: rgba(200, 220, 240, 0.9);
  line-height: 1.8;
  margin-bottom: 16px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.6s both;
}
@keyframes textIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(180, 200, 230, 0.7);
  letter-spacing: 2px;
  margin-bottom: 6px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.9s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(180, 200, 230, 0.6);
  font-style: italic;
  opacity: 1;
  animation: textIn 1.2s ease-out 1.1s both;
}

@media (prefers-reduced-motion: reduce) {
  .star, .ripple, .firefly, .moon, .card-wrap, .name, .blessing, .date, .from, .icon-emoji, .willow-branch, .wave {
    animation: none !important;
  }
}
</style>
</head>
<body>

<script>
// 月亮
const moon = document.createElement('div');
moon.className = 'moon';
document.body.appendChild(moon);

// 星星
function createStars() {
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = 1 + Math.random() * 2.5;
    star.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 55}%;
      animation-duration: ${2 + Math.random() * 3}s;
      animation-delay: ${Math.random() * 3}s;
    `;
    document.body.appendChild(star);
  }
}

// 湖面
function createLake() {
  const lake = document.createElement('div');
  lake.className = 'lake';

  const wave1 = document.createElement('div');
  wave1.className = 'wave wave-1';
  const wave2 = document.createElement('div');
  wave2.className = 'wave wave-2';
  const wave3 = document.createElement('div');
  wave3.className = 'wave wave-3';

  lake.appendChild(wave1);
  lake.appendChild(wave2);
  lake.appendChild(wave3);

  // 月光倒影
  const refl = document.createElement('div');
  refl.className = 'moon-reflection';
  lake.appendChild(refl);

  // 水波纹
  function addRipple() {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.cssText = `
      left: ${35 + Math.random() * 30}%;
      bottom: ${10 + Math.random() * 30}%;
      animation-duration: ${3 + Math.random() * 2}s;
    `;
    lake.appendChild(r);
    setTimeout(() => r.remove(), 5000);
  }
  addRipple();
  setInterval(addRipple, 1800);

  document.body.appendChild(lake);
}

// 萤火虫
function createFireflies() {
  for (let i = 0; i < 6; i++) {
    const ff = document.createElement('div');
    ff.className = 'firefly';
    const dx1 = (Math.random() - 0.5) * 30;
    const dy1 = -5 - Math.random() * 15;
    const dx2 = (Math.random() - 0.5) * 25;
    const dy2 = -10 - Math.random() * 20;
    ff.style.cssText = `
      left: ${10 + Math.random() * 80}%;
      top: ${30 + Math.random() * 50}%;
      animation-duration: ${4 + Math.random() * 3}s;
      animation-delay: ${Math.random() * 4}s;
      --ff-dx1: ${dx1}px;
      --ff-dy1: ${dy1}px;
      --ff-dx2: ${dx2}px;
      --ff-dy2: ${dy2}px;
    `;
    document.body.appendChild(ff);
  }
}

// 柳枝
function createWillow() {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden';
  document.body.appendChild(container);

  for (let side = 0; side < 2; side++) {
    const xBase = side === 0 ? 5 : 92;
    for (let i = 0; i < 12; i++) {
      const branch = document.createElement('div');
      branch.className = 'willow-branch';
      const h = 120 + Math.random() * 200;
      const x = xBase + (Math.random() - 0.5) * 8;
      const delay = Math.random() * 2;
      const duration = 3 + Math.random() * 2;
      const angle = side === 0 ? (10 + Math.random() * 20) : -(10 + Math.random() * 20);
      branch.style.cssText = `
        left: ${x}%;
        height: ${h}px;
        animation-delay: ${delay}s;
        animation-duration: ${duration}s;
        --w-angle: ${angle}deg;
      `;
      container.appendChild(branch);
    }
  }
}

// URL参数
const p = new URLSearchParams(location.search);
const nameEl = document.getElementById('nameEl');
const dateEl = document.getElementById('dateEl');
const blessingEl = document.getElementById('blessingEl');
const fromEl = document.getElementById('fromEl');
if (nameEl) nameEl.textContent = p.get('n') || '亲爱的你';
if (dateEl) dateEl.textContent = p.get('d') || '';
if (blessingEl) blessingEl.textContent = p.get('b') || '愿月光常照，愿思念温柔';
if (fromEl) fromEl.textContent = p.get('f') ? '— ' + p.get('f') : '';

createStars();
createLake();
createFireflies();
createWillow();
</script>

<!-- 卡片内容 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon-emoji">🌙</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
