<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>妈妈，您辛苦了</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #fff5f8 0%, #ffe0ee 50%, #ffd6e8 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 柔和光线 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 30% 10%, rgba(255,200,220,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(255,160,200,0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 90%, rgba(255,180,210,0.15) 0%, transparent 40%);
  animation: softGlow 10s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes softGlow {
  0%, 100% { transform: translate(0,0); opacity: 0.7; }
  50% { transform: translate(1%,-1%); opacity: 1; }
}

/* 康乃馨花瓣 */
.petal {
  position: fixed;
  font-size: 14px;
  animation: petalFall linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 0 6px rgba(255,150,180,0.3));
}
@keyframes petalFall {
  0% { transform: translateY(-8vh) rotate(0deg) translateX(0); opacity: 0; }
  8% { opacity: 0.85; }
  85% { opacity: 0.7; }
  100% { transform: translateY(105vh) rotate(720deg) translateX(40px); opacity: 0; }
}

/* 光点上升 */
.sparkle {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,200,230,0.9), rgba(255,150,200,0.5));
  animation: sparkleRise linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes sparkleRise {
  0% { transform: translateY(100vh) scale(0.2); opacity: 0; }
  12% { opacity: 0.8; }
  88% { opacity: 0.6; }
  100% { transform: translateY(-5vh) scale(1.2); opacity: 0; }
}

/* 爱心漂浮 */
.love {
  position: fixed;
  font-size: 10px;
  animation: loveFloat linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 0 4px rgba(255,120,160,0.4));
}
@keyframes loveFloat {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
  12% { opacity: 0.8; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-5vh) rotate(360deg) scale(1); opacity: 0; }
}

/* 边框流光（玫瑰粉） */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 28px;
  background: linear-gradient(135deg,
    #e87aaa,
    #f4a0c0,
    #e87aaa,
    #f7c0d8,
    #e87aaa);
  background-size: 400% 400%;
  animation: roseBorder 5s ease infinite;
  box-shadow:
    0 0 30px rgba(232,122,170,0.45),
    0 0 70px rgba(232,122,170,0.2),
    inset 0 0 20px rgba(255,220,235,0.15);
  z-index: 10;
}
@keyframes roseBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(232,122,170,0.45), 0 0 70px rgba(232,122,170,0.2); }
  50% { background-position: 100% 50%; box-shadow: 0 0 45px rgba(244,160,192,0.65), 0 0 90px rgba(232,122,170,0.3); }
  100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(232,122,170,0.45), 0 0 70px rgba(232,122,170,0.2); }
}

/* 卡片内容 */
.card {
  background: linear-gradient(160deg, rgba(255,248,252,0.97), rgba(255,240,248,0.93));
  border-radius: 26px;
  padding: clamp(36px, 7vw, 58px) clamp(28px, 5vw, 50px);
  text-align: center;
  position: relative;
  z-index: 11;
  display: flex;
  flex-direction: column;
  align-items: center;
  border: 1px solid rgba(255,255,255,0.55);
  box-shadow: inset 0 2px 20px rgba(255,200,220,0.15);
}

.card-icon {
  font-size: clamp(36px, 7vw, 56px);
  display: block;
  margin-bottom: 18px;
  opacity: 1;
  animation: iconBounce 1s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
  filter: drop-shadow(0 4px 10px rgba(200,80,130,0.25));
}
@keyframes iconBounce {
  from { opacity: 0; transform: translateY(-28px) scale(0.6); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(30px, 7vw, 54px);
  font-weight: 700;
  color: #b05080;
  margin-bottom: 12px;
  letter-spacing: 6px;
  opacity: 1;
  animation: nameReveal 1.1s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;
  text-shadow: 0 2px 12px rgba(180,60,110,0.15);
}
@keyframes nameReveal {
  from { opacity: 0; transform: translateY(22px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: #c080a0;
  letter-spacing: 4px;
  margin-bottom: 26px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.4s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.blessing {
  font-size: clamp(15px, 3.5vw, 21px);
  color: #904070;
  line-height: 1.9;
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.55s both;
}

.from {
  font-size: clamp(12px, 2vw, 15px);
  color: #b07090;
  margin-top: 22px;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.75s both;
}

/* 无障碍 */
@media (prefers-reduced-motion: reduce) {
  .petal, .sparkle, .love { animation: none !important; }
  .card-icon, .name, .date, .blessing, .from { animation: none !important; opacity: 1; }
  body::before { animation: none !important; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">🌷</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '妈妈';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '妈妈，您辛苦了\n感谢您一路的付出与陪伴';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 康乃馨花瓣
const petals = ['🌸', '🩷', '💮', '🩷', '🌺'];
for (let i = 0; i < 18; i++) {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = petals[Math.floor(Math.random() * petals.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (9 + Math.random() * 11) + 'px';
  el.style.animationDuration = (7 + Math.random() * 7) + 's';
  el.style.animationDelay = Math.random() * 10 + 's';
  document.body.appendChild(el);
}

// 光点上升
for (let i = 0; i < 15; i++) {
  const el = document.createElement('div');
  el.className = 'sparkle';
  el.style.left = Math.random() * 100 + 'vw';
  const size = 4 + Math.random() * 8;
  el.style.width = el.style.height = size + 'px';
  el.style.animationDuration = (5 + Math.random() * 5) + 's';
  el.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(el);
}

// 爱心漂浮
const hearts = ['💗', '💕', '💖', '🩷', '🤍'];
for (let i = 0; i < 10; i++) {
  const el = document.createElement('div');
  el.className = 'love';
  el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (8 + Math.random() * 9) + 'px';
  el.style.animationDuration = (6 + Math.random() * 5) + 's';
  el.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(el);
}
</script>
</body>
</html>
