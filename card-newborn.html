<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喜迎新生</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #fff0f3 0%, #ffe4ec 40%, #ffd6e0 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 温暖光晕 === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 30%, rgba(255,180,200,0.3) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 70%, rgba(255,150,180,0.2) 0%, transparent 45%),
              radial-gradient(ellipse at 50% 10%, rgba(255,220,200,0.25) 0%, transparent 40%);
  animation: warmGlow 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes warmGlow {
  0%, 100% { transform: translate(0,0); opacity: 0.7; }
  50% { transform: translate(1%, 1%); opacity: 1; }
}

/* === 爱心飘落 === */
.heart {
  position: fixed;
  font-size: 14px;
  animation: heartFall linear infinite;
  z-index: 1;
  filter: drop-shadow(0 2px 6px rgba(255,100,150,0.3));
}
@keyframes heartFall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  8% { opacity: 0.8; }
  92% { opacity: 0.8; }
  100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}

/* === 小星星 === */
.sparkle {
  position: fixed;
  width: 3px; height: 3px;
  background: #ffaacc;
  border-radius: 50%;
  animation: sparkleTwinkle ease-in-out infinite;
  z-index: 1;
  box-shadow: 0 0 5px #ffaacc;
}
@keyframes sparkleTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.8); }
}

/* === 气球飘空 === */
.balloon {
  position: fixed;
  width: 30px; height: 40px;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  animation: balloonUp linear infinite;
  z-index: 2;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}
@keyframes balloonUp {
  0% { transform: translateY(100vh) rotate(-5deg); opacity: 0; }
  8% { opacity: 0.85; }
  95% { opacity: 0.85; }
  100% { transform: translateY(-60px) rotate(5deg); opacity: 0; }
}

/* === 卡片 === */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 28px;
  background: linear-gradient(135deg, #ff9a9e, #ffb6c1, #ff9a9e, #ffb6c1);
  background-size: 300% 300%;
  animation: borderPulse 3s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(255,150,180,0.35), 0 0 60px rgba(255,150,180,0.15);
}
@keyframes borderPulse {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(255,150,180,0.35), 0 0 60px rgba(255,150,180,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 50px rgba(255,150,180,0.55), 0 0 80px rgba(255,150,180,0.25); }
}

.card {
  background: linear-gradient(145deg, rgba(255,240,245,0.97), rgba(255,230,240,0.97));
  border-radius: 26px;
  padding: clamp(32px, 7vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  max-width: 480px;
  width: 90vw;
  border: 1px solid rgba(255,150,180,0.25);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: -60px; left: -60px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(255,180,200,0.18) 0%, transparent 70%);
  animation: cardShimmer 5s ease-in-out infinite;
}
@keyframes cardShimmer {
  0%, 100% { transform: translate(0, 0); opacity: 0.5; }
  50% { transform: translate(30px, 30px); opacity: 1; }
}

.tag {
  display: inline-block;
  background: linear-gradient(135deg, #ff9a9e, #ff6b8a);
  color: #fff;
  font-size: clamp(12px, 2.5vw, 15px);
  font-weight: bold;
  padding: 6px 18px;
  border-radius: 20px;
  margin-bottom: 18px;
  letter-spacing: 2px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.1s both;
}

.name {
  font-size: clamp(28px, 7vw, 52px);
  font-weight: bold;
  color: #c04070;
  text-shadow: 0 0 16px rgba(255,120,160,0.4), 0 2px 6px rgba(0,0,0,0.08);
  margin-bottom: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.2s both;
}
.blessing {
  font-size: clamp(16px, 4vw, 22px);
  color: #7a3050;
  line-height: 1.8;
  margin: 16px 0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.35s both;
}
.date {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(180,80,120,0.7);
  letter-spacing: 2px;
  margin-bottom: 8px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}
.from {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(200,80,130,0.85);
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-7px); }
}
.card { animation: cardFloat 4s ease-in-out infinite; }
</style>
</head>
<body>

<script>
// 爱心
const hearts = ['💕', '💗', '💖', '💓', '💝', '❤️', '🩷'];
function spawnHeart(){
  const el = document.createElement('div');
  el.className = 'heart';
  el.textContent = hearts[Math.floor(Math.random()*hearts.length)];
  el.style.left = Math.random()*95 + 'vw';
  el.style.animationDuration = (5 + Math.random()*4) + 's';
  el.style.animationDelay = Math.random()*2 + 's';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 10000);
}
spawnHeart();
setInterval(spawnHeart, 1200);

// 小星星
for(let i=0; i<30; i++){
  const s = document.createElement('div');
  s.className = 'sparkle';
  const sz = 2 + Math.random()*2.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*80}vh;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
  document.body.appendChild(s);
}

// 气球
const balloonColors = ['#ffb6c1','#ff9a9e','#ffc0cb','#ff69b4','#ffafd0'];
function spawnBalloon(){
  const el = document.createElement('div');
  el.className = 'balloon';
  el.style.background = balloonColors[Math.floor(Math.random()*balloonColors.length)];
  el.style.left = Math.random()*85 + 'vw';
  el.style.animationDuration = (6 + Math.random()*4) + 's';
  el.style.animationDelay = Math.random()*3 + 's';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 12000);
}
spawnBalloon();
setInterval(spawnBalloon, 2500);

// URL参数
const p = new URLSearchParams(location.search);
const name = p.get('n') || '小天使';
const blessing = p.get('b') || '恭喜你们迎来新生命，愿宝宝健康成长，家庭幸福美满';
const date = p.get('d') || '';
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').textContent = blessing;
if(date) document.getElementById('dateEl').textContent = date;
if(from) document.getElementById('fromEl').textContent = '— ' + from;
</script>

<div class="card-wrap">
  <div class="card">
    <div class="tag">🍼 喜迎新生</div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
