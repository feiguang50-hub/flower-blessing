<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽毛草甸祝福</title>
<meta property="og:title" content="🌿 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --warm-cream: #f5e6d3;
  --warm-apricot: #e8c9a0;
  --warm-tan: #d4a574;
  --pampas-silver: #c8beb0;
  --pampas-light: #e0d8cc;
  --grass-green: #8fbc8f;
  --butterfly-gold: #d4a574;
  --text-warm: #5a4a3a;
  --card-bg: rgba(245, 235, 220, 0.88);
  --glow-warm: rgba(210, 160, 100, 0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #fdf6ee 0%,
    #f5e8d8 20%,
    #eedcc8 40%,
    #e8d4bc 60%,
    #e0c8a8 80%,
    #d8bea0 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 柔光效果 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255, 240, 210, 0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(210, 180, 140, 0.2) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 90%, rgba(200, 170, 130, 0.15) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* 蒲苇草 */
.pampas {
  position: fixed;
  bottom: 0;
  pointer-events: none;
  z-index: 1;
}
.pampas-plume {
  position: absolute;
  width: 3px;
  background: linear-gradient(180deg,
    rgba(200, 190, 176, 0.9) 0%,
    rgba(220, 208, 192, 0.7) 50%,
    rgba(240, 228, 212, 0.4) 100%);
  border-radius: 50% 50% 0 0;
  transform-origin: bottom center;
  animation: pampasSway ease-in-out infinite;
}
@keyframes pampasSway {
  0%, 100% { transform: rotate(calc(var(--base-angle, 0deg) - 6deg)); }
  50% { transform: rotate(calc(var(--base-angle, 0deg) + 6deg)); }
}

/* 草地 */
.grass-field {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  z-index: 2;
  pointer-events: none;
}
.grass-blade {
  position: absolute;
  bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, #7ab07a 0%, #5a9a5a 100%);
  border-radius: 2px 2px 0 0;
  transform-origin: bottom center;
  animation: grassSway ease-in-out infinite;
}
@keyframes grassSway {
  0%, 100% { transform: rotate(calc(var(--g-angle, 0deg) - 4deg)); }
  50% { transform: rotate(calc(var(--g-angle, 0deg) + 4deg)); }
}

/* 小蝴蝶 */
.butterfly {
  position: fixed;
  font-size: 16px;
  z-index: 3;
  pointer-events: none;
  animation: butterflyFly ease-in-out infinite;
  filter: drop-shadow(0 0 4px rgba(180, 140, 80, 0.4));
}
@keyframes butterflyFly {
  0% { transform: translate(0, 0) rotate(var(--bf-angle, 0deg)) scale(1); }
  25% { transform: translate(calc(var(--bf-dx1, 20px)), calc(var(--bf-dy1, -15px))) rotate(calc(var(--bf-angle, 0deg) + 15deg)) scale(1); }
  50% { transform: translate(calc(var(--bf-dx2, -10px)), calc(var(--bf-dy2, -25px))) rotate(calc(var(--bf-angle, 0deg) - 10deg)) scale(0.9); }
  75% { transform: translate(calc(var(--bf-dx3, 15px)), calc(var(--bf-dy3, -10px))) rotate(calc(var(--bf-angle, 0deg) + 5deg)) scale(1.05); }
  100% { transform: translate(0, 0) rotate(var(--bf-angle, 0deg)) scale(1); }
}

/* 浮动光斑 */
.light-spot {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255, 240, 200, 0.6) 0%,
    rgba(255, 220, 160, 0.3) 40%,
    transparent 70%);
  pointer-events: none;
  z-index: 1;
  animation: lightFloat ease-in-out infinite;
}
@keyframes lightFloat {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
  50% { transform: translateY(-12px) scale(1.1); opacity: 0.9; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, #d4a574, #c8beb0, #e8c9a0, #d4a574);
  background-size: 300% 300%;
  border-radius: 24px;
  animation: borderBreathe 4s ease-in-out infinite, borderFlow 6s ease-in-out infinite;
  box-shadow: 0 0 25px rgba(210, 160, 100, 0.35), 0 8px 32px rgba(0,0,0,0.08);
}
@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes borderBreathe {
  0%, 100% { box-shadow: 0 0 20px rgba(210, 160, 100, 0.3), 0 8px 32px rgba(0,0,0,0.08); }
  50% { box-shadow: 0 0 35px rgba(220, 170, 110, 0.5), 0 8px 32px rgba(0,0,0,0.1); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  min-width: 280px;
  max-width: 460px;
  border: 1px solid rgba(210, 180, 140, 0.3);
}

.icon-emoji {
  font-size: clamp(40px, 10vw, 64px);
  margin-bottom: 16px;
  display: block;
  animation: iconIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  filter: drop-shadow(0 0 12px rgba(200, 160, 100, 0.4));
}
@keyframes iconIn {
  from { opacity: 0; transform: translateY(-20px) scale(0.6); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(28px, 7vw, 48px);
  font-weight: 700;
  color: var(--text-warm);
  margin-bottom: 12px;
  opacity: 1;
  animation: nameIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
}
@keyframes nameIn {
  from { opacity: 0; transform: translateY(18px) scale(0.85); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.blessing {
  font-size: clamp(15px, 4vw, 22px);
  color: rgba(80, 65, 50, 0.88);
  line-height: 1.8;
  margin-bottom: 16px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.6s both;
}
@keyframes textIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(130, 110, 85, 0.7);
  letter-spacing: 2px;
  margin-bottom: 6px;
  opacity: 1;
  animation: textIn 1.2s ease-out 0.9s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(130, 110, 85, 0.6);
  font-style: italic;
  opacity: 1;
  animation: textIn 1.2s ease-out 1.1s both;
}

/* 底部草地图案 */
.grass-scene {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  z-index: 2;
  overflow: hidden;
  pointer-events: none;
}
.grass-row {
  position: absolute;
  bottom: 0;
  display: flex;
  gap: 3px;
}

@media (prefers-reduced-motion: reduce) {
  .pampas-plume, .grass-blade, .butterfly, .light-spot, .card-wrap, .name, .blessing, .date, .from, .icon-emoji {
    animation: none !important;
  }
}
</style>
</head>
<body>

<script>
// 蒲苇草
function createPampas() {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden';
  document.body.appendChild(container);

  for (let i = 0; i < 30; i++) {
    const plume = document.createElement('div');
    plume.className = 'pampas-plume';
    const height = 120 + Math.random() * 180;
    const left = Math.random() * 105;
    const delay = Math.random() * 3;
    const duration = 3 + Math.random() * 2;
    const baseAngle = (Math.random() - 0.5) * 20;
    const plumeWidth = 2 + Math.random() * 2;
    plume.style.cssText = `
      left: ${left}%;
      height: ${height}px;
      bottom: -20px;
      animation-delay: ${delay}s;
      animation-duration: ${duration}s;
      --base-angle: ${baseAngle}deg;
      width: ${plumeWidth}px;
      opacity: ${0.4 + Math.random() * 0.5};
    `;
    container.appendChild(plume);
  }
}

// 草地
function createGrass() {
  const scene = document.createElement('div');
  scene.className = 'grass-scene';
  document.body.appendChild(scene);

  const rows = [
    { bottom: 0, count: 40, maxH: 35, color: '#6a9a6a' },
    { bottom: 5, count: 35, maxH: 45, color: '#7ab07a' },
    { bottom: 10, count: 30, maxH: 55, color: '#8ac08a' },
  ];

  rows.forEach(row => {
    for (let i = 0; i < row.count; i++) {
      const blade = document.createElement('div');
      blade.className = 'grass-blade';
      const h = 15 + Math.random() * row.maxH;
      const left = (i / row.count) * 100 + (Math.random() - 0.5) * 3;
      const delay = Math.random() * 2;
      const duration = 2.5 + Math.random() * 1.5;
      const gAngle = (Math.random() - 0.5) * 12;
      blade.style.cssText = `
        left: ${left}%;
        height: ${h}px;
        background: linear-gradient(180deg, ${row.color} 0%, ${row.color}88 100%);
        animation-delay: ${delay}s;
        animation-duration: ${duration}s;
        --g-angle: ${gAngle}deg;
      `;
      scene.appendChild(blade);
    }
  });
}

// 小蝴蝶
function createButterflies() {
  const butterflies = ['🦋', '🦋', '✨'];
  for (let i = 0; i < 4; i++) {
    const bf = document.createElement('div');
    bf.className = 'butterfly';
    bf.textContent = butterflies[Math.floor(Math.random() * butterflies.length)];
    const x = 10 + Math.random() * 80;
    const y = 15 + Math.random() * 55;
    const dx1 = (Math.random() - 0.5) * 60;
    const dy1 = -10 - Math.random() * 30;
    const dx2 = (Math.random() - 0.5) * 40;
    const dy2 = -20 - Math.random() * 30;
    const dx3 = (Math.random() - 0.5) * 50;
    const dy3 = -5 - Math.random() * 20;
    const angle = (Math.random() - 0.5) * 30;
    const duration = 6 + Math.random() * 4;
    const delay = Math.random() * 4;
    bf.style.cssText = `
      left: ${x}%;
      top: ${y}%;
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
      --bf-dx1: ${dx1}px;
      --bf-dy1: ${dy1}px;
      --bf-dx2: ${dx2}px;
      --bf-dy2: ${dy2}px;
      --bf-dx3: ${dx3}px;
      --bf-dy3: ${dy3}px;
      --bf-angle: ${angle}deg;
    `;
    document.body.appendChild(bf);
  }
}

// 光斑
function createLightSpots() {
  for (let i = 0; i < 6; i++) {
    const spot = document.createElement('div');
    spot.className = 'light-spot';
    const size = 40 + Math.random() * 80;
    spot.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 90}%;
      top: ${Math.random() * 70}%;
      animation-duration: ${4 + Math.random() * 3}s;
      animation-delay: ${Math.random() * 3}s;
    `;
    document.body.appendChild(spot);
  }
}

// URL参数
const p = new URLSearchParams(location.search);
const nameEl = document.getElementById('nameEl');
const dateEl = document.getElementById('dateEl');
const blessingEl = document.getElementById('blessingEl');
const fromEl = document.getElementById('fromEl');
if (nameEl) nameEl.textContent = p.get('n') || '亲爱的你';
if (dateEl) dateEl.textContent = p.get('d') || '';
if (blessingEl) blessingEl.textContent = p.get('b') || '愿你如清风般自在，如暖阳般温柔';
if (fromEl) fromEl.textContent = p.get('f') ? '— ' + p.get('f') : '';

createPampas();
createGrass();
createButterflies();
createLightSpots();
</script>

<!-- 卡片内容 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon-emoji">🌿</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
