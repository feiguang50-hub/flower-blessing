<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纸飞机祝福</title>
<meta property="og:title" content="✈️ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-top: #a8d8f0;
  --sky-mid: #c8e8f8;
  --sky-low: #e0f0fa;
  --paper-white: #f8f8f5;
  --paper-cream: #f0ead8;
  --accent-blue: #4a9fd4;
  --accent-orange: #f08040;
  --text-dark: #2a3a4a;
  --card-bg: rgba(255, 252, 245, 0.92);
  --fold-shadow: rgba(100, 80, 60, 0.15);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #7ab8d8 0%,
    #9fccd8 15%,
    #b8d8ec 30%,
    #cce4f4 50%,
    #daf0f8 70%,
    #e8f4f8 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 天空云朵 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 15% 12%, rgba(255,255,255,0.7) 0%, transparent 35%),
    radial-gradient(ellipse at 85% 8%, rgba(255,255,255,0.6) 0%, transparent 30%),
    radial-gradient(ellipse at 60% 20%, rgba(255,255,255,0.5) 0%, transparent 25%),
    radial-gradient(ellipse at 30% 6%, rgba(255,255,255,0.8) 0%, transparent 30%);
  pointer-events: none;
  z-index: 0;
}

/* 纸飞机 */
.paper-plane {
  position: fixed;
  font-size: 32px;
  z-index: 1;
  pointer-events: none;
  animation: planeFly linear infinite;
  filter: drop-shadow(2px 4px 6px rgba(60,100,140,0.25));
}
@keyframes planeFly {
  0% { transform: translateY(-10vh) translateX(-10vw) rotate(-15deg); opacity: 0; }
  8% { opacity: 0.85; }
  90% { opacity: 0.7; }
  100% { transform: translateY(110vh) translateX(20vw) rotate(10deg); opacity: 0; }
}

/* 纸片飘落 */
.paper-piece {
  position: fixed;
  font-size: 18px;
  z-index: 1;
  pointer-events: none;
  animation: paperFall linear infinite;
  filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.1));
}
@keyframes paperFall {
  0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  85% { opacity: 0.6; }
  100% { transform: translateY(105vh) translateX(var(--drift, 30px)) rotate(var(--rot, 360deg)); opacity: 0; }
}

/* 卡片 - 折叠纸质感 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, #b8d8f0, #f0d8b8, #b8d8f0);
  border-radius: 20px;
  animation: paperBorder 4s ease-in-out infinite;
  box-shadow: 0 8px 32px rgba(60, 120, 180, 0.2);
}
@keyframes paperBorder {
  0%, 100% { box-shadow: 0 4px 20px rgba(60, 120, 180, 0.15); }
  50% { box-shadow: 0 8px 40px rgba(60, 120, 180, 0.25); }
}

.card {
  background: var(--card-bg);
  border-radius: 18px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  min-width: 280px;
  max-width: 480px;
  position: relative;
  /* 纸张纹理 */
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 28px,
      rgba(180, 160, 120, 0.06) 28px,
      rgba(180, 160, 120, 0.06) 29px
    );
  box-shadow:
    inset 0 0 60px rgba(240, 230, 210, 0.5),
    0 2px 8px rgba(100, 80, 60, 0.08);
}

/* 折痕装饰线 */
.card::before {
  content: '';
  position: absolute;
  top: 20%; left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 1px;
  background: rgba(180, 160, 120, 0.2);
}
.card::after {
  content: '';
  position: absolute;
  bottom: 30%; left: 50%;
  transform: translateX(-50%);
  width: 40%;
  height: 1px;
  background: rgba(180, 160, 120, 0.15);
}

.icon-emoji {
  font-size: clamp(36px, 9vw, 56px);
  margin-bottom: 14px;
  display: block;
  animation: iconIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
}
@keyframes iconIn {
  from { opacity: 0; transform: translateY(-24px) scale(0.5) rotate(-10deg); }
  to { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
}

.name {
  font-size: clamp(26px, 7vw, 46px);
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 14px;
  letter-spacing: 2px;
  animation: slideUp 1.2s ease-out 0.3s both;
  font-family: 'Georgia', 'PingFang SC', serif;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.blessing {
  font-size: clamp(14px, 4vw, 20px);
  color: rgba(60, 80, 100, 0.88);
  line-height: 1.9;
  margin-bottom: 18px;
  font-style: italic;
  animation: slideUp 1.2s ease-out 0.6s both;
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(100, 130, 160, 0.7);
  letter-spacing: 3px;
  margin-bottom: 6px;
  animation: slideUp 1.2s ease-out 0.9s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(100, 130, 160, 0.6);
  font-style: italic;
  animation: slideUp 1.2s ease-out 1.1s both;
}

/* 信封装饰 */
.envelope-deco {
  position: absolute;
  top: -8px; right: 16px;
  font-size: 22px;
  opacity: 0.6;
  transform: rotate(12deg);
}

@media (prefers-reduced-motion: reduce) {
  .paper-plane, .paper-piece, .card-wrap, .name, .blessing, .date, .from, .icon-emoji {
    animation: none !important;
  }
}
</style>
</head>
<body>

<script>
// 纸飞机
function createPlane() {
  const planes = ['✈️', '🛩️', '📄'];
  const el = document.createElement('div');
  el.className = 'paper-plane';
  el.textContent = planes[Math.floor(Math.random() * planes.length)];
  const x = Math.random() * 60 + 10;
  const dur = 10 + Math.random() * 8;
  const delay = Math.random() * -dur;
  el.style.cssText = `
    left: ${x}vw;
    font-size: ${22 + Math.random() * 18}px;
    animation-duration: ${dur}s;
    animation-delay: ${delay}s;
  `;
  document.body.appendChild(el);
}

// 纸片
function createPaperPiece() {
  const pieces = ['📃', '🗒️', '📋', '✂️'];
  const el = document.createElement('div');
  el.className = 'paper-piece';
  el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
  const x = Math.random() * 80 + 10;
  const dur = 12 + Math.random() * 8;
  const delay = Math.random() * -dur;
  const drift = (Math.random() - 0.5) * 60;
  const rot = (Math.random() - 0.5) * 600;
  el.style.cssText = `
    left: ${x}vw;
    --drift: ${drift}px;
    --rot: ${rot}deg;
    animation-duration: ${dur}s;
    animation-delay: ${delay}s;
  `;
  document.body.appendChild(el);
}

const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!reducedMotion) {
  for (let i = 0; i < 5; i++) {
    setTimeout(createPlane, i * 1200);
  }
  for (let i = 0; i < 8; i++) {
    setTimeout(createPaperPiece, i * 800 + Math.random() * 400);
  }
}

// URL参数
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你像纸飞机一样，飞向想去的地方';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
document.getElementById('iconEl').textContent = p.get('i') || '✈️';
</script>

<div class="card-wrap">
  <div class="card">
    <div class="envelope-deco">💌</div>
    <span class="icon-emoji" id="iconEl">✈️</span>
    <div class="name" id="nameEl">亲爱的你</div>
    <div class="blessing" id="blessingEl">愿你像纸飞机一样，飞向想去的地方</div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
