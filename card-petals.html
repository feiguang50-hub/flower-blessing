<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花瓣轻语</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --petal-pink: #f4a8ba;
  --petal-light: #fcd5df;
  --petal-cream: #fff5f7;
  --petal-soft: #ffe4ec;
  --card-bg: rgba(255,250,252,0.9);
  --card-border: rgba(244,168,186,0.35);
  --text-rose: #8b4a5e;
  --text-light: #c07888;
}

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #fff5f8 0%, #ffe4ef 35%, #ffd6e0 65%, #f8c8d8 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 花瓣漂浮 */
.petals {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
  overflow: hidden;
}

.petal {
  position: absolute;
  font-size: 16px;
  animation: petalFall linear infinite;
  opacity: 0;
}

@keyframes petalFall {
  0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
  5% { opacity: 0.8; }
  25% { transform: translateY(25vh) rotate(90deg) translateX(20px); opacity: 0.7; }
  50% { transform: translateY(50vh) rotate(180deg) translateX(-15px); opacity: 0.6; }
  75% { transform: translateY(75vh) rotate(270deg) translateX(25px); opacity: 0.4; }
  95% { opacity: 0.1; }
  100% { transform: translateY(105vh) rotate(360deg) translateX(-10px); opacity: 0; }
}

.petal:nth-child(1) { left: 8%; animation-duration: 10s; animation-delay: 0s; font-size: 14px; }
.petal:nth-child(2) { left: 18%; animation-duration: 13s; animation-delay: 2s; font-size: 18px; }
.petal:nth-child(3) { left: 28%; animation-duration: 11s; animation-delay: 4s; font-size: 13px; }
.petal:nth-child(4) { left: 40%; animation-duration: 14s; animation-delay: 1s; font-size: 17px; }
.petal:nth-child(5) { left: 52%; animation-duration: 10s; animation-delay: 6s; font-size: 15px; }
.petal:nth-child(6) { left: 62%; animation-duration: 12s; animation-delay: 3s; font-size: 14px; }
.petal:nth-child(7) { left: 74%; animation-duration: 15s; animation-delay: 5s; font-size: 18px; }
.petal:nth-child(8) { left: 85%; animation-duration: 11s; animation-delay: 7s; font-size: 13px; }
.petal:nth-child(9) { left: 35%; animation-duration: 9s; animation-delay: 8s; font-size: 16px; }
.petal:nth-child(10) { left: 92%; animation-duration: 13s; animation-delay: 2.5s; font-size: 15px; }

/* 柔和光斑 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(255,200,215,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(255,180,200,0.25) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(420px, 90vw);
  min-height: 480px;
  background: var(--card-bg);
  border-radius: 28px;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  box-shadow:
    0 16px 50px rgba(200,120,150,0.15),
    0 4px 16px rgba(200,120,150,0.1),
    inset 0 1px 0 rgba(255,255,255,0.9);
  border: 1.5px solid var(--card-border);
  animation: cardFloat 6s ease-in-out infinite;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-8px) rotate(0.5deg); }
}

/* 边框呼吸 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 30px;
  background: linear-gradient(135deg, rgba(244,168,186,0.5), rgba(255,200,215,0.2), rgba(244,168,186,0.5));
  background-size: 200% 200%;
  animation: petalBorder 5s ease-in-out infinite;
  z-index: -1;
  opacity: 0.4;
}

@keyframes petalBorder {
  0%, 100% { background-position: 0% 50%; opacity: 0.3; }
  50% { background-position: 100% 50%; opacity: 0.5; }
}

/* 图标 */
.icon {
  font-size: 48px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 10px rgba(200,120,150,0.25));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 装饰线 */
.divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(200,120,150,0.5), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字 */
.name {
  font-size: clamp(26px, 7vw, 42px);
  color: var(--text-rose);
  font-weight: 600;
  text-align: center;
  letter-spacing: 4px;
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(11px, 3.5vw, 14px);
  color: var(--text-light);
  letter-spacing: 5px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(13px, 4vw, 16px);
  color: rgba(139,74,94,0.82);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(11px, 3.5vw, 13px);
  color: var(--text-light);
  letter-spacing: 3px;
  margin-top: 4px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

.bottom-text {
  position: absolute;
  bottom: 18px;
  font-size: 10px;
  color: rgba(200,120,150,0.45);
  letter-spacing: 3px;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card { animation: none; }
  .petal { animation: none; opacity: 0.5; }
  .name, .date, .blessing, .from, .divider, .bottom-text { opacity: 1; }
}

@media (max-width: 480px) {
  .card { padding: 36px 24px; min-height: 420px; }
  .petal:nth-child(n+8) { display: none; }
}
</style>
</head>
<body>

<!-- 花瓣 -->
<div class="petals">
  <div class="petal">🌸</div>
  <div class="petal">💮</div>
  <div class="petal">🌸</div>
  <div class="petal">🩷</div>
  <div class="petal">🌸</div>
  <div class="petal">💮</div>
  <div class="petal">🌸</div>
  <div class="petal">🩷</div>
  <div class="petal">🌸</div>
  <div class="petal">💮</div>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🌸</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="bottom-text">花瓣轻语 · 春风相伴</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活如花瓣般轻盈美好，每一天都被温柔以待';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
