<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寒梅傲雪</title>
<meta property="og:title" content="🌸 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --winter-deep: #0c1420;
  --winter-blue: #162035;
  --plum-dark: #c0355a;
  --plum-pink: #e8607a;
  --plum-light: #f8a0b8;
  --plum-pale: #ffd4e0;
  --snow-white: rgba(255, 255, 255, 0.85);
  --card-bg: rgba(12, 18, 35, 0.88);
  --card-border: rgba(232, 96, 122, 0.35);
  --text-warm: rgba(255, 220, 230, 0.9);
  --text-muted: rgba(200, 160, 180, 0.6);
  --gold: #d4a84b;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(192, 53, 90, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(100, 140, 200, 0.06) 0%, transparent 45%),
    linear-gradient(180deg,
      #050a14 0%,
      #0c1420 30%,
      #162035 55%,
      #0e1828 80%,
      #080e1a 100%
    );
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 飘雪 */
.snowflake {
  position: fixed;
  color: rgba(255, 255, 255, 0.7);
  font-size: 12px;
  z-index: 1;
  pointer-events: none;
  animation: snowFall var(--d, 10s) linear infinite;
  animation-delay: var(--delay, 0s);
  opacity: 0.6;
}
@keyframes snowFall {
  0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.4; }
  100% { transform: translateY(105vh) translateX(var(--drift, 30px)) rotate(360deg); opacity: 0; }
}

/* 梅花飘落 */
.plum-petal {
  position: fixed;
  font-size: 16px;
  z-index: 2;
  pointer-events: none;
  animation: plumFall var(--d, 10s) linear infinite;
  animation-delay: var(--delay, 0s);
  opacity: 0.8;
}
@keyframes plumFall {
  0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.6; }
  100% { transform: translateY(105vh) translateX(var(--drift, 50px)) rotate(var(--rot, 400deg)); opacity: 0; }
}

/* 星星闪烁 */
.star {
  position: fixed;
  width: 1.5px; height: 1.5px;
  background: #fff;
  border-radius: 50%;
  z-index: 0;
  pointer-events: none;
  animation: starTwinkle var(--dur, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.1; }
  50% { opacity: 0.8; }
}

/* 树枝装饰 */
.branch {
  position: fixed;
  pointer-events: none;
  z-index: 3;
  opacity: 0.55;
}
.branch-left {
  left: -10px; top: 5%;
  font-size: 90px;
  transform: rotate(15deg);
}
.branch-right {
  right: -10px; bottom: 8%;
  font-size: 80px;
  transform: rotate(-20deg) scaleX(-1);
}
.branch-bottom {
  bottom: -5px; left: 50%;
  transform: translateX(-50%);
  font-size: 60px;
  opacity: 0.4;
}

/* 灯笼 */
.lantern {
  position: fixed;
  z-index: 3;
  pointer-events: none;
  font-size: 26px;
  animation: lanternSway 4s ease-in-out infinite;
}
.lantern-1 { top: 12%; left: 8%; animation-delay: 0s; }
.lantern-2 { top: 8%; right: 10%; animation-delay: 1.5s; font-size: 20px; }
@keyframes lanternSway {
  0%, 100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  padding: 3px;
  background: linear-gradient(135deg,
    var(--plum-dark) 0%,
    var(--plum-pink) 30%,
    var(--plum-pale) 50%,
    var(--plum-pink) 70%,
    var(--plum-dark) 100%
  );
  background-size: 400% 400%;
  animation: plumBorder 5s ease-in-out infinite;
  border-radius: 18px;
  z-index: 10;
  box-shadow:
    0 0 35px rgba(192, 53, 90, 0.3),
    0 0 70px rgba(232, 96, 122, 0.15),
    0 8px 40px rgba(0, 0, 0, 0.5);
}
@keyframes plumBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.card {
  background: var(--card-bg);
  border-radius: 15px;
  padding: clamp(36px, 8vw, 56px) clamp(28px, 6vw, 48px);
  text-align: center;
  position: relative;
  overflow: hidden;
  min-width: min(360px, 90vw);
  animation: cardFloat 5s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 顶部装饰 */
.card::before {
  content: '🌸 梅 · 🌸 梅 · 🌸';
  display: block;
  font-size: clamp(9px, 2vw, 12px);
  letter-spacing: 8px;
  margin-bottom: 18px;
  opacity: 0.6;
  animation: fadeIn 1.5s ease-out both;
}

/* 名字 */
.name {
  color: var(--plum-pale);
  font-size: clamp(26px, 7vw, 46px);
  font-weight: normal;
  letter-spacing: 5px;
  margin-bottom: 10px;
  opacity: 1;
  animation: nameReveal 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  text-shadow:
    0 0 20px rgba(248, 160, 184, 0.6),
    0 0 40px rgba(192, 53, 90, 0.3);
}
@keyframes nameReveal {
  from { opacity: 0; transform: translateY(18px) scale(0.9); letter-spacing: 14px; }
  to { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 5px; }
}

/* 分隔线 */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 16px auto;
  opacity: 0;
  animation: fadeIn 1s ease-out 0.5s both;
}
.divider-line {
  height: 1px;
  width: 50px;
  background: linear-gradient(90deg, transparent, var(--plum-pink), transparent);
}
.divider-flower {
  color: var(--plum-light);
  font-size: 10px;
  animation: flowerPulse 2.5s ease-in-out infinite;
}
@keyframes flowerPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 日期 */
.date {
  color: var(--text-muted);
  font-size: clamp(11px, 3vw, 14px);
  letter-spacing: 3px;
  margin-bottom: 18px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 0.7s both;
}

/* 祝福语 */
.blessing {
  color: var(--text-warm);
  font-size: clamp(15px, 4vw, 20px);
  line-height: 1.9;
  margin-bottom: 24px;
  opacity: 1;
  animation: fadeIn 1.4s ease-out 0.9s both;
}

/* 署名 */
.from {
  color: var(--text-muted);
  font-size: clamp(12px, 3vw, 15px);
  letter-spacing: 2px;
  font-style: italic;
  opacity: 1;
  animation: fadeIn 1.6s ease-out 1.1s both;
}

/* 底部装饰 */
.card::after {
  content: '❄️ 雪 · 🌸 梅 · ❄️';
  display: block;
  font-size: clamp(9px, 2vw, 12px);
  letter-spacing: 8px;
  margin-top: 18px;
  opacity: 0.6;
  animation: fadeIn 1.8s ease-out 1.3s both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .card-wrap { animation: none; }
  .snowflake, .plum-petal, .star, .lantern { animation: none; }
  .name, .date, .blessing, .from, .divider,
  .card::before, .card::after { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 飘雪 -->
<div id="snowflakes"></div>

<!-- 梅花飘落 -->
<div id="plumPetals"></div>

<!-- 背景星星 -->
<div id="stars"></div>

<!-- 树枝装饰 -->
<div class="branch branch-left">🌸</div>
<div class="branch branch-right">🌸</div>
<div class="branch branch-bottom">❄️</div>

<!-- 灯笼 -->
<div class="lantern lantern-1">🏮</div>
<div class="lantern lantern-2">🏮</div>

<!-- 主卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-flower">❀</span>
      <div class="divider-line"></div>
    </div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
// 飘雪
const snowflakes = document.getElementById('snowflakes');
const snowChars = ['❄', '❅', '❆', '✦', '·'];
for (let i = 0; i < 25; i++) {
  const s = document.createElement('div');
  s.className = 'snowflake';
  s.textContent = snowChars[Math.floor(Math.random() * snowChars.length)];
  s.style.left = Math.random() * 100 + '%';
  s.style.setProperty('--d', (8 + Math.random() * 10) + 's');
  s.style.setProperty('--delay', (Math.random() * 10) + 's');
  s.style.setProperty('--drift', ((Math.random() - 0.5) * 60) + 'px');
  s.style.fontSize = (8 + Math.random() * 10) + 'px';
  snowflakes.appendChild(s);
}

// 梅花飘落
const plumPetals = document.getElementById('plumPetals');
const petalEmojis = ['🌸', '梅', '💮'];
for (let i = 0; i < 12; i++) {
  const p = document.createElement('div');
  p.className = 'plum-petal';
  p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
  p.style.left = Math.random() * 100 + '%';
  p.style.setProperty('--d', (8 + Math.random() * 8) + 's');
  p.style.setProperty('--delay', (Math.random() * 10) + 's');
  p.style.setProperty('--drift', ((Math.random() - 0.5) * 80) + 'px');
  p.style.setProperty('--rot', (300 + Math.random() * 400) + 'deg');
  p.style.fontSize = (12 + Math.random() * 10) + 'px';
  plumPetals.appendChild(p);
}

// 背景星星
const stars = document.getElementById('stars');
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 60 + '%';
  s.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
  s.style.setProperty('--delay', (Math.random() * 6) + 's');
  stars.appendChild(s);
}

// URL参数
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '寒梅傲雪，香自苦寒\n愿你如冬梅绽放，温柔而坚强';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>

</body>
</html>
