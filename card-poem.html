<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗词卷轴</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(180,140,80,0.15) 0%, transparent 60%),
    linear-gradient(180deg, #1a1208 0%, #2c1e0a 40%, #1a1208 100%);
  font-family: 'Noto Serif SC', 'SimSun', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 宣纸纹理背景 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(200,180,120,0.02) 3px, rgba(200,180,120,0.02) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(200,180,120,0.015) 3px, rgba(200,180,120,0.015) 4px);
  pointer-events: none;
  z-index: 0;
}

/* 墨迹晕染效果 */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(80,50,20,0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
  animation: inkBreath 8s ease-in-out infinite;
}
@keyframes inkBreath {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* 卷轴上下两端 */
.scroll-top, .scroll-bottom {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  width: clamp(300px, 85vw, 520px);
  height: 28px;
  background: linear-gradient(180deg, #8b6914, #c8a050, #8b6914);
  border-radius: 14px;
  z-index: 20;
  box-shadow: 0 3px 12px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,220,120,0.4);
}
.scroll-top { top: clamp(20px, 5vh, 40px); }
.scroll-bottom { bottom: clamp(20px, 5vh, 40px); }

/* 卷轴装饰线 */
.scroll-top::before, .scroll-bottom::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 30px;
  height: 14px;
  background: linear-gradient(135deg, #d4a030, #a07020);
  border-radius: 3px;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}

/* 卷轴纸芯露出部分 */
.scroll-shaft {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  width: clamp(304px, 86vw, 524px);
  height: 6px;
  background: linear-gradient(180deg, #6b5010, #c8a050, #6b5010);
  z-index: 19;
}
.scroll-shaft.top { top: calc(clamp(20px, 5vh, 40px) + 28px); }
.scroll-shaft.bottom { bottom: calc(clamp(20px, 5vh, 40px) + 28px); }

/* 主体卷轴 */
.card-wrap {
  position: relative;
  z-index: 10;
  width: clamp(300px, 85vw, 520px);
  animation: scrollOpen 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes scrollOpen {
  from { opacity: 0; transform: scaleY(0.5); }
  to { opacity: 1; transform: scaleY(1); }
}

.card {
  background: linear-gradient(180deg, #f5ead8 0%, #ede0c4 50%, #f5ead8 100%);
  padding: clamp(32px, 8vw, 50px) clamp(24px, 6vw, 44px);
  position: relative;
  box-shadow: inset 0 0 30px rgba(160,130,80,0.15), 0 8px 32px rgba(0,0,0,0.4);
  min-height: 55vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 竖排文字容器 */
.vertical-text {
  writing-mode: vertical-rl;
  text-orientation: upright;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: clamp(20px, 5vw, 36px);
  padding: 10px 0;
}

/* 诗词文字 */
.name {
  font-family: 'Ma Shan Zheng', 'KaiTi', serif;
  font-size: clamp(26px, 7vw, 42px);
  color: #3a2510;
  text-align: center;
  margin-bottom: 8px;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.6s both;
  letter-spacing: 6px;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.date {
  font-size: clamp(11px, 2.8vw, 14px);
  color: rgba(100,70,30,0.6);
  text-align: center;
  margin-bottom: 16px;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.8s both;
  letter-spacing: 3px;
}

.blessing {
  font-family: 'Ma Shan Zheng', 'KaiTi', serif;
  font-size: clamp(20px, 5.5vw, 30px);
  color: #4a3020;
  text-align: center;
  line-height: 2.2;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 1s both;
  letter-spacing: 4px;
  padding: 8px 4px;
}

.from {
  text-align: center;
  font-size: clamp(14px, 3.5vw, 18px);
  color: rgba(100,70,30,0.7);
  margin-top: 20px;
  opacity: 1;
  animation: fadeIn 1s ease-out 1.3s both;
  letter-spacing: 3px;
}

/* 印章装饰 */
.seal {
  position: absolute;
  bottom: clamp(18px, 4vw, 28px);
  right: clamp(18px, 4vw, 28px);
  width: clamp(36px, 8vw, 48px);
  height: clamp(36px, 8vw, 48px);
  border: 2px solid rgba(180,50,50,0.7);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(180,50,50,0.75);
  font-weight: bold;
  font-family: 'Ma Shan Zheng', serif;
  animation: fadeIn 1s ease-out 1.5s both;
  transform: rotate(-3deg);
  opacity: 1;
}
.seal-text {
  font-size: clamp(9px, 2.2vw, 12px);
  text-align: center;
  line-height: 1.3;
  letter-spacing: 1px;
}

/* 上下装饰线 */
.card::before, .card::after {
  content: '';
  position: absolute;
  left: clamp(24px, 6vw, 44px);
  right: clamp(24px, 6vw, 44px);
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(160,120,60,0.4), transparent);
}
.card::before { top: 16px; }
.card::after { bottom: 16px; }

/* reduced motion */
@media (prefers-reduced-motion: reduce) {
  .card-wrap, .name, .date, .blessing, .from, .seal { animation: none; }
  .name, .date, .blessing, .from, .seal { opacity: 1; }
}
</style>
</head>
<body>

<div class="scroll-shaft top"></div>
<div class="scroll-top"></div>

<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="seal">
      <div class="seal-text" id="fromSeal"></div>
    </div>
  </div>
</div>

<div class="scroll-bottom"></div>
<div class="scroll-shaft bottom"></div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你被岁月温柔以待';
const fromText = p.get('f') || '';
document.getElementById('fromEl').textContent = fromText ? '— ' + fromText : '';
// 印章用署名最后一两个字
if (fromText.length > 0) {
  const lastChar = fromText.slice(-1);
  document.getElementById('fromSeal').textContent = lastChar;
}
</script>
</body>
</html>
