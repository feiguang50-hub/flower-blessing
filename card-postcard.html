<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>远方来信</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #e8dcc8;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 29px,
      rgba(160,140,100,0.1) 29px,
      rgba(160,140,100,0.1) 30px
    );
  font-family: 'Caveat', 'Comic Sans MS', cursive;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 纸张泛黄感 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(180,140,60,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 85%, rgba(160,120,40,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* 邮票齿孔效果 */
.stamp-ring {
  position: fixed;
  top: 20px;
  right: 28px;
  width: 90px;
  height: 110px;
  border: 2px dashed rgba(160,120,60,0.5);
  border-radius: 3px;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(200,170,100,0.15) 0%, transparent 70%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  animation: stampDrop 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
.stamp-ring::before {
  content: '✉';
  font-size: 36px;
  opacity: 0.6;
}
@keyframes stampDrop {
  from { transform: translateY(-20px) rotate(-5deg); opacity: 0; }
  to { transform: translateY(0) rotate(-2deg); opacity: 1; }
}

/* 邮戳 */
.postmark {
  position: fixed;
  top: 32px;
  right: 34px;
  width: 72px;
  height: 72px;
  border: 3px solid rgba(180,80,60,0.7);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 6;
  animation: stampDrop 1s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
  transform: rotate(-8deg);
}
.postmark-inner {
  width: 58px;
  height: 58px;
  border: 2px solid rgba(180,80,60,0.7);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
}
.postmark-text {
  font-size: 9px;
  color: rgba(180,80,60,0.85);
  font-weight: bold;
  letter-spacing: 1px;
  text-align: center;
}
.postmark-year {
  font-size: 11px;
  color: rgba(180,80,60,0.9);
  font-weight: bold;
}

/* 明信片主体 */
.card-wrap {
  position: relative;
  padding: 3px;
  background: linear-gradient(135deg, #c8a870, #a08040, #c8a870, #b09050, #c8a870);
  background-size: 400% 400%;
  animation: borderGlow 7s ease infinite;
  border-radius: 6px;
  z-index: 10;
  box-shadow: 6px 6px 20px rgba(100,80,40,0.35), -2px -2px 6px rgba(255,240,200,0.3);
}
@keyframes borderGlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 6px 6px 20px rgba(100,80,40,0.35), -2px -2px 6px rgba(255,240,200,0.3); }
  50% { background-position: 100% 50%; box-shadow: 6px 6px 24px rgba(160,130,60,0.5), -2px -2px 8px rgba(255,240,200,0.4); }
}

.card {
  background: #f5eadc;
  border-radius: 4px;
  padding: clamp(28px, 7vw, 44px) clamp(22px, 5vw, 40px);
  max-width: 480px;
  width: 88vw;
  position: relative;
  z-index: 1;
}

/* 手写地址线 */
.address-lines {
  position: absolute;
  bottom: clamp(70px, 12vw, 90px);
  left: clamp(22px, 5vw, 40px);
  right: clamp(22px, 5vw, 40px);
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.address-line {
  border-bottom: 1px dashed rgba(160,130,80,0.4);
  height: 1px;
}

/* 明信片内容 */
.name {
  font-size: clamp(32px, 9vw, 56px);
  color: #5a3e1b;
  text-align: center;
  margin-bottom: 10px;
  opacity: 1;
  animation: nameWrite 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  letter-spacing: 2px;
}
@keyframes nameWrite {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.date {
  font-size: clamp(14px, 3.5vw, 18px);
  color: rgba(120,90,50,0.7);
  text-align: center;
  margin-bottom: 20px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.6s both;
  letter-spacing: 2px;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.blessing {
  font-size: clamp(20px, 5.5vw, 30px);
  color: #4a3020;
  text-align: center;
  line-height: 1.8;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.9s both;
  padding: 0 5px;
}

.from {
  text-align: right;
  font-size: clamp(17px, 4vw, 22px);
  color: rgba(100,75,40,0.8);
  margin-top: 24px;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.3s both;
  letter-spacing: 1px;
}

/* 角落装饰：小花 */
.corner-deco {
  position: absolute;
  font-size: 18px;
  opacity: 0.5;
}
.corner-deco.tl { top: 12px; left: 14px; }
.corner-deco.tr { top: 12px; right: 14px; }
.corner-deco.bl { bottom: 12px; left: 14px; }
.corner-deco.br { bottom: 12px; right: 14px; }

/* 邮寄信息栏 */
.mail-bar {
  position: absolute;
  top: -3px;
  left: clamp(22px, 5vw, 40px);
  right: clamp(22px, 5vw, 40px);
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(160,120,60,0.4) 20%, rgba(160,120,60,0.4) 80%, transparent);
  border-radius: 2px;
}

/* reduced motion */
@media (prefers-reduced-motion: reduce) {
  .stamp-ring, .postmark, .name, .date, .blessing, .from { animation: none; }
  .name, .date, .blessing, .from { opacity: 1; }
}
</style>
</head>
<body>

<!-- 邮票 -->
<div class="stamp-ring"></div>
<div class="postmark">
  <div class="postmark-inner">
    <div class="postmark-text">AIR MAIL</div>
    <div class="postmark-year" id="dateEl"></div>
  </div>
</div>

<div class="card-wrap">
  <div class="mail-bar"></div>
  <div class="card">
    <span class="corner-deco tl">✿</span>
    <span class="corner-deco tr">❀</span>
    <span class="corner-deco bl">✿</span>
    <span class="corner-deco br">❀</span>

    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl2"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>

    <!-- 手写地址线 -->
    <div class="address-lines">
      <div class="address-line"></div>
      <div class="address-line"></div>
    </div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你被岁月温柔以待';
const rawDate = p.get('d') || '';
document.getElementById('dateEl').textContent = rawDate;
document.getElementById('dateEl2').textContent = rawDate;
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>
</body>
</html>
