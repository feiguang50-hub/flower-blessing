<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>升职加薪</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #050d1a 0%, #0a2040 40%, #0d3060 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 星空光晕 === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(255,200,50,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 20%, rgba(100,150,255,0.12) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 30%, rgba(100,150,255,0.1) 0%, transparent 35%);
  animation: starryPulse 4s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes starryPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* === 星星粒子 === */
.star {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.6); }
}

/* === 火箭上升 === */
.rocket {
  position: fixed;
  font-size: 26px;
  z-index: 3;
  filter: drop-shadow(0 0 12px rgba(255,150,50,0.6));
  animation: rocketLaunch ease-out forwards;
}
@keyframes rocketLaunch {
  0% { transform: translateY(100vh) rotate(-15deg) scale(0.5); opacity: 0; }
  15% { opacity: 1; transform: translateY(70vh) rotate(-5deg) scale(1); }
  70% { transform: translateY(20vh) rotate(5deg) scale(1.1); opacity: 1; }
  100% { transform: translateY(-15vh) rotate(20deg) scale(0.7); opacity: 0; }
}

/* === 光点上升 === */
.sparkle {
  position: fixed;
  width: 3px; height: 3px;
  background: #ffd700;
  border-radius: 50%;
  animation: sparkleRise linear infinite;
  z-index: 1;
  box-shadow: 0 0 6px #ffd700;
}
@keyframes sparkleRise {
  0% { transform: translateY(100vh); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* === 速度线 === */
.speedline {
  position: fixed;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,215,0,0.6), transparent);
  animation: speedLine linear infinite;
  z-index: 2;
}
@keyframes speedLine {
  0% { transform: translateX(-100%); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateX(100vw); opacity: 0; }
}

/* === 卡片 === */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 28px;
  background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700, #ff8800);
  background-size: 300% 300%;
  animation: goldPulse 3s ease-in-out infinite;
  box-shadow: 0 0 35px rgba(255,200,0,0.4), 0 0 70px rgba(255,200,0,0.15);
}
@keyframes goldPulse {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 35px rgba(255,200,0,0.4), 0 0 70px rgba(255,200,0,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 55px rgba(255,200,0,0.6), 0 0 90px rgba(255,200,0,0.25); }
}

.card {
  background: linear-gradient(145deg, rgba(5,13,26,0.97), rgba(10,32,64,0.97));
  border-radius: 26px;
  padding: clamp(32px, 7vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  max-width: 480px;
  width: 90vw;
  border: 1px solid rgba(255,200,0,0.2);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: -70px; left: -70px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,200,0,0.1) 0%, transparent 70%);
  animation: cardShimmer 4s ease-in-out infinite;
}
@keyframes cardShimmer {
  0%, 100% { transform: translate(0,0); opacity: 0.5; }
  50% { transform: translate(35px, 35px); opacity: 1; }
}

.tag {
  display: inline-block;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  color: #050d1a;
  font-size: clamp(12px, 2.5vw, 15px);
  font-weight: bold;
  padding: 6px 18px;
  border-radius: 20px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.1s both;
}

.name {
  font-size: clamp(28px, 7vw, 52px);
  font-weight: bold;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,200,0,0.6), 0 2px 8px rgba(0,0,0,0.5);
  margin-bottom: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.2s both;
}
.blessing {
  font-size: clamp(16px, 4vw, 22px);
  color: #c8e4ff;
  line-height: 1.8;
  margin: 16px 0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.35s both;
}
.date {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(200,220,255,0.65);
  letter-spacing: 2px;
  margin-bottom: 8px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}
.from {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(255,200,0,0.8);
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.card { animation: cardFloat 4s ease-in-out infinite; }
</style>
</head>
<body>

<script>
// 星星
for (let i = 0; i < 50; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = 1.5 + Math.random() * 3;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*85}vh;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
  document.body.appendChild(s);
}

// 火箭
function spawnRocket(){
  const el = document.createElement('div');
  el.className = 'rocket';
  el.textContent = '🚀';
  el.style.left = (15 + Math.random() * 65) + 'vw';
  el.style.animationDuration = (3.5 + Math.random() * 2.5) + 's';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 7000);
}
spawnRocket();
setInterval(spawnRocket, 5000);

// 光点上升
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'sparkle';
  p.style.cssText = `left:${Math.random()*100}vw;animation-duration:${3.5+Math.random()*5}s;animation-delay:${Math.random()*5}s;`;
  document.body.appendChild(p);
}

// 速度线
function spawnSpeedLine(){
  const el = document.createElement('div');
  el.className = 'speedline';
  const y = 10 + Math.random() * 70;
  el.style.cssText = `top:${y}vh;left:0;width:${60+Math.random()*40}vw;animation-duration:${0.8+Math.random()*1}s;opacity:0;`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}
spawnRocket();
setInterval(spawnSpeedLine, 1500);

// URL参数
const p = new URLSearchParams(location.search);
const name = p.get('n') || '事业腾飞';
const blessing = p.get('b') || '恭喜荣升，愿你前程似锦，再创辉煌';
const date = p.get('d') || '';
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').textContent = blessing;
if(date) document.getElementById('dateEl').textContent = date;
if(from) document.getElementById('fromEl').textContent = '— ' + from;
</script>

<div class="card-wrap">
  <div class="card">
    <div class="tag">🚀 升职加薪</div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

</body>
</html>
