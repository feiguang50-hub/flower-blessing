<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求婚告白</title>
<meta property="og:title" content="💍 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0a0a1a 0%, #1a1030 40%, #2d1b4e 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 星空背景 === */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(100,60,180,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(60,30,120,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,200,100,0.08) 0%, transparent 60%);
  animation: nightShift 8s ease-in-out infinite;
  z-index: 0; pointer-events: none;
}
@keyframes nightShift {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

/* === 星星 === */
.star {
  position: fixed;
  width: 2px; height: 2px;
  background: white;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

/* === 玫瑰金光环 === */
.ring-glow {
  position: fixed;
  top: 50%; left: 50%;
  width: 180px; height: 180px;
  transform: translate(-50%, -50%);
  border: 3px solid rgba(255,215,0,0.6);
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.15);
  animation: ringPulse 3s ease-in-out infinite;
  z-index: 2;
}
.ring-glow::after {
  content: '💍';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  animation: iconBeat 1.5s ease-in-out infinite;
}
@keyframes ringPulse {
  0%, 100% { transform: translate(-50%,-50%) scale(1); box-shadow: 0 0 30px rgba(255,215,0,0.3); }
  50% { transform: translate(-50%,-50%) scale(1.06); box-shadow: 0 0 50px rgba(255,215,0,0.5); }
}
@keyframes iconBeat {
  0%, 100% { transform: translate(-50%,-50%) scale(1); }
  15% { transform: translate(-50%,-50%) scale(1.15); }
  30% { transform: translate(-50%,-50%) scale(1); }
}

/* === 3D翻转卡片 === */
.card-wrap {
  perspective: 1200px;
  z-index: 10;
  margin: 40px 16px;
}
.card {
  position: relative;
  width: min(90vw, 380px);
  min-height: 520px;
  transform-style: preserve-3d;
  cursor: pointer;
  transition: transform 1.1s cubic-bezier(0.34,1.20,0.64,1);
}
.card.flipped {
  transform: rotateY(180deg);
}
.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: 20px;
  padding: 36px 28px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  border: 1.5px solid rgba(255,215,0,0.3);
  box-shadow: 0 0 40px rgba(255,215,0,0.12), inset 0 0 60px rgba(100,60,180,0.08);
}
.card-front {
  background: linear-gradient(160deg, rgba(30,15,55,0.92) 0%, rgba(50,25,80,0.92) 100%);
  backdrop-filter: blur(14px);
}
.card-back {
  background: linear-gradient(160deg, rgba(50,20,40,0.95) 0%, rgba(30,10,30,0.95) 100%);
  transform: rotateY(180deg);
  border-color: rgba(255,180,200,0.3);
}

/* === 边框呼吸光效 === */
.card-wrap::before {
  content: '';
  position: absolute; inset: -1.5px;
  border-radius: 22px;
  background: conic-gradient(from 0deg, #ffd700, #c08040, #ffd700, #c08040, #ffd700);
  background-size: 300% 300%;
  animation: borderFlow 4s linear infinite;
  z-index: -1;
  opacity: 0.55;
}
@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* === 文字 === */
.title-text {
  font-size: clamp(14px, 4vw, 17px);
  letter-spacing: 6px;
  color: rgba(255,215,0,0.7);
  text-transform: uppercase;
  margin-bottom: 16px;
  opacity: 0.8;
}
.name {
  font-size: clamp(28px, 8vw, 46px);
  font-weight: normal;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 50px rgba(255,215,0,0.25);
  margin-bottom: 12px;
  opacity: 1;
}
.blessing {
  font-size: clamp(16px, 4.5vw, 21px);
  color: rgba(255,240,200,0.9);
  line-height: 1.7;
  margin: 8px 0;
  opacity: 1;
}
.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(255,215,0,0.5);
  letter-spacing: 3px;
  margin-top: 20px;
  opacity: 1;
}
.from {
  font-size: clamp(13px, 3.5vw, 16px);
  color: rgba(255,220,180,0.75);
  margin-top: 16px;
  font-style: italic;
  opacity: 1;
}
.hint {
  font-size: clamp(11px, 3vw, 13px);
  color: rgba(255,215,0,0.35);
  margin-top: 28px;
  letter-spacing: 2px;
}
.back-title {
  font-size: clamp(18px, 5vw, 24px);
  color: rgba(255,200,220,0.9);
  margin-bottom: 16px;
  text-shadow: 0 0 15px rgba(255,150,180,0.5);
}
.back-text {
  font-size: clamp(14px, 4vw, 18px);
  color: rgba(255,240,250,0.85);
  line-height: 1.9;
  font-style: italic;
}
.back-from {
  font-size: clamp(13px, 3.5vw, 16px);
  color: rgba(255,200,180,0.7);
  margin-top: 20px;
  font-style: italic;
}

/* === 浮动爱心 === */
.heart {
  position: fixed;
  font-size: 12px;
  animation: heartRise linear infinite;
  z-index: 3;
  pointer-events: none;
}
@keyframes heartRise {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  85% { opacity: 0.5; }
  100% { transform: translateY(-100vh) rotate(20deg); opacity: 0; }
}

/* === 响应式 === */
@media (max-width: 400px) {
  .card { min-height: 480px; }
  .card-face { padding: 28px 20px; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card" id="card" onclick="this.classList.toggle('flipped')">
    <div class="card-face card-front">
      <div class="title-text">Will You Marry Me</div>
      <div class="name" id="nameEl">亲爱的你</div>
      <div class="blessing" id="blessingEl">愿与你共度余生</div>
      <div class="date" id="dateEl"></div>
      <div class="from" id="fromEl"></div>
      <div class="hint">▼ 点击翻开 ▼</div>
    </div>
    <div class="card-face card-back">
      <div class="back-title">💍 永远爱你</div>
      <div class="back-text" id="backEl">从遇见你的那一刻起<br>我就知道<br>你是我这辈子唯一的答案</div>
      <div class="back-from" id="backFromEl"></div>
    </div>
  </div>
</div>

<div class="ring-glow"></div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('blessingEl').textContent = p.get('b') || '愿与你共度余生';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('back')) document.getElementById('backEl').innerHTML = p.get('back').replace(/\\n/g,'<br>');
if (p.get('f')) document.getElementById('backFromEl').textContent = '— ' + p.get('f');

// 星星
const starCount = 40;
for (let i = 0; i < starCount; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.animationDuration = (1.5 + Math.random()*3)+'s';
  s.style.animationDelay = Math.random()*4+'s';
  document.body.appendChild(s);
}

// 浮动爱心
const hearts = ['❤️','💕','💗','💖','💓'];
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
  h.style.left = (5 + Math.random()*90)+'%';
  h.style.bottom = '-20px';
  h.style.fontSize = (10 + Math.random()*16)+'px';
  h.style.animationDuration = (5 + Math.random()*6)+'s';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), 12000);
}
for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i*1500);
setInterval(spawnHeart, 2000);
</script>
</body>
</html>
