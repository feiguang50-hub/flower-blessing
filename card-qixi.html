<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七夕祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0a0015 0%, #1a0a30 40%, #2a1050 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 星河背景 === */
.starry-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.star-particle {
  position: fixed; width: 2px; height: 2px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff8e0, #ffe0a0);
  animation: starTwinkle linear infinite;
  opacity: 0;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.1; transform: scale(0.8); }
  50% { opacity: 0.9; transform: scale(1.2); }
}

/* === 银河渐变光带 === */
.milkway {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 50%, rgba(180,120,220,0.08) 0%, transparent 70%),
    linear-gradient(180deg, transparent 0%, rgba(140,80,200,0.06) 50%, transparent 100%);
  animation: milkwayFlow 8s ease-in-out infinite;
}
@keyframes milkwayFlow {
  0%, 100% { opacity: 0.6; transform: scaleY(1); }
  50% { opacity: 1; transform: scaleY(1.08); }
}

/* === 喜鹊 === */
.magpie {
  position: fixed; font-size: 22px;
  animation: magpieFly linear infinite;
  z-index: 1; pointer-events: none;
  filter: drop-shadow(0 0 8px rgba(200,160,255,0.3));
}
@keyframes magpieFly {
  0% { transform: translateX(-60px) translateY(0) scaleX(1); }
  49% { transform: translateX(105vw) translateY(-30px) scaleX(1); }
  50% { transform: translateX(105vw) translateY(-30px) scaleX(-1); }
  99% { transform: translateX(-60px) translateY(0) scaleX(-1); }
  100% { transform: translateX(-60px) translateY(0) scaleX(1); }
}

/* === 漂浮爱心 === */
.heart {
  position: fixed; font-size: 16px;
  animation: heartRise linear infinite;
  z-index: 1; pointer-events: none;
  filter: drop-shadow(0 0 6px rgba(255,120,180,0.35));
}
@keyframes heartRise {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0; }
  8% { opacity: 0.75; }
  90% { opacity: 0.7; }
  100% { transform: translateY(-10vh) rotate(25deg) scale(1); opacity: 0; }
}

/* === 粉色花瓣 === */
.petal {
  position: fixed; font-size: 13px;
  animation: petalDrift linear infinite;
  z-index: 1; pointer-events: none;
}
@keyframes petalDrift {
  0% { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity: 0; }
  8% { opacity: 0.65; }
  90% { opacity: 0.5; }
  100% { transform: translateY(105vh) translateX(50px) rotate(300deg); opacity: 0; }
}

/* === 紫色边框 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 34px;
  background: linear-gradient(135deg,
    rgba(220,150,255,0.8),
    rgba(180,100,220,0.5),
    rgba(255,180,230,0.7),
    rgba(160,80,200,0.5),
    rgba(220,150,255,0.8));
  background-size: 300% 300%;
  animation: qixiBorder 5s ease infinite;
  box-shadow:
    0 0 30px rgba(200,120,255,0.4),
    0 0 70px rgba(160,80,220,0.18),
    inset 0 0 20px rgba(240,180,255,0.12);
  z-index: 10;
}
@keyframes qixiBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(200,120,255,0.4), 0 0 70px rgba(160,80,220,0.18); }
  50% { background-position: 100% 50%; box-shadow: 0 0 45px rgba(220,140,255,0.6), 0 0 90px rgba(180,100,240,0.28); }
  100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(200,120,255,0.4), 0 0 70px rgba(160,80,220,0.18); }
}

/* === 3D场景 === */
.scene {
  background: rgba(255,255,255,0.03);
  border-radius: 32px;
  padding: 40px;
  perspective: 1200px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.card-inner {
  width: 300px;
  height: 430px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  transform: rotateY(-180deg);
}
.card-inner.opened {
  transform: rotateY(0deg);
}

/* 两面通用 */
.card-front, .card-back {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px; text-align: center;
}

/* 封面：七夕星空意象 */
.card-front {
  background: linear-gradient(160deg, rgba(30,10,60,0.7) 0%, rgba(50,15,90,0.85) 100%);
  border: 1px solid rgba(200,150,255,0.3);
  box-shadow: 0 10px 40px rgba(120,60,180,0.3);
}
.cover-emoji {
  font-size: 64px; margin-bottom: 20px;
  animation: coverPulse 2.5s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(220,180,255,0.5));
}
@keyframes coverPulse {
  0%, 100% { transform: scale(1) rotate(-2deg); }
  50% { transform: scale(1.12) rotate(2deg); }
}
.cover-title {
  font-size: clamp(20px, 5vw, 30px);
  color: #f0d8ff; letter-spacing: 6px; margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(200,150,255,0.5);
}
.cover-sub {
  font-size: clamp(11px, 2vw, 14px);
  color: rgba(200,170,255,0.6); letter-spacing: 4px; margin-bottom: 6px;
}
.cover-date {
  font-size: clamp(10px, 2vw, 12px);
  color: rgba(180,150,220,0.4); letter-spacing: 3px; margin-bottom: 20px;
}
.cover-hint {
  position: absolute; bottom: 28px;
  font-size: clamp(10px, 2vw, 12px);
  color: rgba(200,170,255,0.35); letter-spacing: 4px;
  animation: hintPulse 2s ease-in-out infinite;
}
@keyframes hintPulse {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 0.75; }
}

/* 背面内容 */
.card-back {
  background: linear-gradient(160deg, rgba(60,20,100,0.6) 0%, rgba(40,10,80,0.8) 100%);
  border: 1px solid rgba(200,150,255,0.25);
  transform: rotateY(180deg);
  box-shadow: 0 10px 40px rgba(120,60,200,0.25);
}
.qixi-label {
  font-size: clamp(10px, 2.2vw, 13px);
  color: rgba(220,180,255,0.65); letter-spacing: 10px; margin-bottom: 16px;
  opacity: 1; animation: fadeUp 1s ease-out 1.5s both;
}
.deco-line {
  width: 60px; height: 2px;
  background: linear-gradient(to right, transparent, rgba(220,180,255,0.4), transparent);
  margin: 12px auto;
  animation: lineExpand 1s ease-out 2.4s both;
}
@keyframes lineExpand {
  from { transform: scaleX(0); opacity: 0; }
  to { transform: scaleX(1); opacity: 1; }
}
.name {
  font-size: clamp(26px, 6vw, 42px); color: #f0e4ff;
  letter-spacing: 6px; margin-bottom: 18px;
  text-shadow: 0 0 30px rgba(200,150,255,0.5), 0 0 60px rgba(180,100,255,0.2);
  opacity: 1; animation: nameReveal 1.2s cubic-bezier(0.34,1.56,0.64,1) 1.8s both;
}
@keyframes nameReveal {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.date-display {
  font-size: clamp(14px, 3vw, 20px);
  color: rgba(220,190,255,0.8); letter-spacing: 4px; margin-bottom: 24px;
  opacity: 1; animation: fadeUp 1s ease-out 2.1s both;
}
.blessing {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(240,230,255,0.88); line-height: 2; letter-spacing: 2px;
  opacity: 1; animation: fadeUp 1s ease-out 2.4s both;
}
.from {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(200,170,255,0.55); margin-top: 20px; letter-spacing: 4px;
  opacity: 1; animation: fadeUp 1s ease-out 2.7s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.qixi-deco {
  font-size: 24px; margin-top: 16px;
  animation: qixiPulse 2s ease-in-out 0.5s infinite;
  display: block;
}
@keyframes qixiPulse {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.15) rotate(5deg); }
}

/* 点击提示 */
.tap-hint {
  position: fixed; bottom: 40px;
  font-size: 12px; color: rgba(200,170,255,0.35);
  letter-spacing: 4px; animation: hintPulse 2s ease-in-out infinite;
  z-index: 100;
}
</style>
</head>
<body>

<div class="starry-bg"></div>
<div class="milkway"></div>

<div class="card-wrap">
  <div class="scene">
    <div class="card-inner" id="cardInner" onclick="this.classList.toggle('opened')">
      <div class="card-front">
        <div class="cover-emoji">🌌</div>
        <div class="cover-title">七夕快乐</div>
        <div class="cover-sub">星河鹊桥 · 牛郎织女</div>
        <div class="cover-date" id="dateEl"></div>
        <div class="cover-hint">✦ 点击打开 ✦</div>
      </div>
      <div class="card-back">
        <div class="qixi-label">✦ QIXI ✦</div>
        <div class="name" id="nameEl"></div>
        <div class="date-display" id="dateBackEl"></div>
        <div class="deco-line"></div>
        <div class="blessing" id="blessingEl"></div>
        <div class="from" id="fromEl"></div>
        <span class="qixi-deco">🌹</span>
      </div>
    </div>
  </div>
</div>

<div class="tap-hint">点击卡片打开</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '';
const date = p.get('d') || '';
document.getElementById('nameEl').textContent = name;
document.getElementById('dateEl').textContent = date;
document.getElementById('dateBackEl').textContent = date;
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 星星背景
const starryBg = document.querySelector('.starry-bg');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star-particle';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.width = s.style.height = (1 + Math.random() * 2.5) + 'px';
  s.style.animationDuration = (2 + Math.random() * 4) + 's';
  s.style.animationDelay = Math.random() * 6 + 's';
  starryBg.appendChild(s);
}

// 喜鹊飞过（两只）
const magpieEmojis = ['🪶', '🕊️'];
for (let i = 0; i < 2; i++) {
  const m = document.createElement('div');
  m.className = 'magpie';
  m.textContent = magpieEmojis[i % 2];
  m.style.top = (15 + i * 35) + 'vh';
  m.style.fontSize = (16 + i * 8) + 'px';
  m.style.animationDuration = (14 + i * 4) + 's';
  m.style.animationDelay = (i * 7) + 's';
  document.body.appendChild(m);
}

// 爱心
const heartEmojis = ['💕', '💗', '💖', '💓', '♥️', '💘'];
for (let i = 0; i < 18; i++) {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = heartEmojis[i % heartEmojis.length];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.fontSize = (10 + Math.random() * 14) + 'px';
  h.style.animationDuration = (6 + Math.random() * 6) + 's';
  h.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(h);
}

// 花瓣
const petalEmojis = ['🌸', '💮', '🩷', '🌺'];
for (let i = 0; i < 12; i++) {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.textContent = petalEmojis[i % petalEmojis.length];
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.fontSize = (9 + Math.random() * 10) + 'px';
  petal.style.animationDuration = (7 + Math.random() * 6) + 's';
  petal.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(petal);
}
</script>
</body>
</html>
