<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩虹</title>
<meta property="og:title" content="🌈 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-top: #4a9fd4;
  --sky-mid: #87ceeb;
  --sky-low: #c5e8f8;
  --cloud-white: #ffffff;
  --rainbow-red: #ff6b6b;
  --rainbow-orange: #ffa94d;
  --rainbow-yellow: #ffd43b;
  --rainbow-green: #69db7c;
  --rainbow-blue: #4dabf7;
  --rainbow-purple: #da77f2;
  --text-dark: #3a5068;
  --text-light: #ffffff;
  --card-bg: rgba(255, 255, 255, 0.92);
  --card-border: rgba(255, 255, 255, 0.7);
  --glow-warm: rgba(255, 220, 100, 0.5);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #4a9fd4 0%,
    #74b9e0 20%,
    #a8d4f0 45%,
    #c5e8f8 65%,
    #e8f4fb 85%,
    #f0f8ff 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 彩虹 */
.rainbow {
  position: fixed;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: min(600px, 95vw);
  height: min(300px, 48vw);
  border-radius: 50% 50% 0 0;
  background: conic-gradient(
    from 180deg at 50% 100%,
    transparent 0deg,
    var(--rainbow-red) 0deg,
    var(--rainbow-orange) 41deg,
    var(--rainbow-yellow) 82deg,
    var(--rainbow-green) 123deg,
    var(--rainbow-blue) 164deg,
    var(--rainbow-purple) 205deg,
    transparent 246deg
  );
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 0 12px rgba(255, 150, 100, 0.3));
  animation: rainbowShine 4s ease-in-out infinite;
}
.rainbow::before {
  content: '';
  position: absolute;
  inset: 8%;
  border-radius: 50% 50% 0 0;
  background: inherit;
  filter: brightness(1.15);
}
.rainbow::after {
  content: '';
  position: absolute;
  inset: 16%;
  border-radius: 50% 50% 0 0;
  background: inherit;
  filter: brightness(1.2);
}

@keyframes rainbowShine {
  0%, 100% { filter: drop-shadow(0 0 12px rgba(255, 150, 100, 0.3)) drop-shadow(0 0 4px rgba(255,255,255,0.2)); }
  50% { filter: drop-shadow(0 0 20px rgba(255, 180, 120, 0.5)) drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
}

/* 云朵 */
.clouds {
  position: fixed; inset: 0;
  z-index: 2; pointer-events: none;
}
.cloud {
  position: absolute;
  font-size: 40px;
  opacity: 0.9;
  animation: cloudDrift linear infinite;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
}
@keyframes cloudDrift {
  0% { transform: translateX(-80px); }
  100% { transform: translateX(calc(100vw + 80px)); }
}

/* 热气球 */
.balloons {
  position: fixed; inset: 0;
  z-index: 3; pointer-events: none;
}
.balloon {
  position: absolute;
  font-size: 36px;
  animation: balloonFloat 6s ease-in-out infinite;
}
@keyframes balloonFloat {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-18px) rotate(3deg); }
}

/* 彩虹光晕边框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg,
    rgba(255,107,107,0.6),
    rgba(255,169,77,0.6),
    rgba(255,212,59,0.6),
    rgba(105,219,124,0.6),
    rgba(77,171,247,0.6),
    rgba(218,119,242,0.6)
  );
  background-size: 300% 300%;
  animation: rainbowBorder 6s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(255, 150, 100, 0.3),
    0 8px 32px rgba(0, 0, 0, 0.15);
}
@keyframes rainbowBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(255,150,100,0.3), 0 8px 32px rgba(0,0,0,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 30px rgba(218,119,242,0.4), 0 8px 32px rgba(0,0,0,0.2); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: clamp(28px, 6vw, 52px) clamp(24px, 5vw, 48px);
  text-align: center;
  max-width: min(520px, 92vw);
  min-height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
  animation: cardFloat 5s ease-in-out infinite;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--card-border);
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.name {
  font-size: clamp(28px, 7vw, 50px);
  font-weight: bold;
  color: var(--text-dark);
  opacity: 1;
  animation: slideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  text-shadow: 0 2px 8px rgba(100,160,220,0.2);
}
.date {
  font-size: clamp(13px, 3vw, 17px);
  color: var(--text-dark);
  opacity: 0.55;
  opacity: 1;
  animation: slideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
  letter-spacing: 2px;
}
.blessing {
  font-size: clamp(16px, 4vw, 23px);
  color: var(--text-dark);
  line-height: 1.7;
  max-width: 380px;
  opacity: 1;
  animation: slideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
}
.from {
  font-size: clamp(13px, 3vw, 16px);
  color: var(--text-dark);
  opacity: 0.5;
  opacity: 1;
  animation: slideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) 1.1s both;
  margin-top: 4px;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .card, .rainbow, .cloud, .balloon { animation: none; }
  .name, .date, .blessing, .from { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 彩虹 -->
<div class="rainbow"></div>

<!-- 云朵 -->
<div class="clouds">
  <span class="cloud" style="top:6%; animation-duration:55s; animation-delay:0s;">☁️</span>
  <span class="cloud" style="top:14%; animation-duration:70s; animation-delay:-20s;">☁️</span>
  <span class="cloud" style="top:22%; animation-duration:48s; animation-delay:-35s;">🌤️</span>
  <span class="cloud" style="top:10%; animation-duration:62s; animation-delay:-12s;">☁️</span>
  <span class="cloud" style="top:18%; animation-duration:58s; animation-delay:-42s;">☁️</span>
</div>

<!-- 热气球 -->
<div class="balloons">
  <span class="balloon" style="top:12%; left:8%; animation-delay:0s;">🎈</span>
  <span class="balloon" style="top:18%; left:78%; animation-delay:-2.5s;">🎈</span>
  <span class="balloon" style="top:8%; left:55%; animation-delay:-1s;">🎈</span>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活像彩虹一样绚烂多彩';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>
</body>
</html>
