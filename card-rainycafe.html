<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨天咖啡馆</title>
<meta property="og:title" content="☕ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cafe-brown: #8b6f5c;
  --cafe-cream: #f5e6d3;
  --cafe-dark: #3d2b1f;
  --cafe-warm: #c9a882;
  --rain-gray: #7a8b9a;
  --rain-light: #a8b8c8;
  --window-frame: #5c4a3a;
  --card-bg: rgba(255, 248, 242, 0.92);
  --text-coffee: #4a3228;
  --glow-lamp: rgba(255, 200, 120, 0.35);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #4a5568 0%,
    #6b7a8a 30%,
    #8a9aaa 50%,
    #a8b8c8 70%,
    #c8d4e0 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 窗户框架 */
.window-frame {
  position: fixed;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  width: clamp(280px, 80vw, 400px);
  height: clamp(200px, 50vw, 280px);
  border: 8px solid var(--window-frame);
  border-radius: 12px;
  background: linear-gradient(180deg,
    #5a6a7a 0%,
    #7a8a9a 40%,
    #9aaab8 70%,
    #b8c8d8 100%);
  box-shadow:
    inset 0 0 30px rgba(100, 130, 160, 0.4),
    0 8px 32px rgba(0, 0, 0, 0.3);
  z-index: 1;
  overflow: hidden;
}

/* 窗户分隔条 */
.window-frame::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 6px;
  background: var(--window-frame);
  transform: translateY(-50%);
}

.window-frame::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 6px;
  background: var(--window-frame);
  transform: translateX(-50%);
}

/* 雨滴 */
.raindrop {
  position: fixed;
  width: 2px;
  background: linear-gradient(180deg, transparent, rgba(180, 200, 220, 0.6));
  border-radius: 0 0 2px 2px;
  z-index: 2;
  pointer-events: none;
  animation: rainFall linear infinite;
  opacity: 0.5;
}

@keyframes rainFall {
  0% {
    transform: translateY(-20px);
    opacity: 0;
  }
  10% { opacity: 0.5; }
  100% {
    transform: translateY(110vh);
    opacity: 0.3;
  }
}

/* 室内暖光 */
body::before {
  content: '';
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 50%;
  background: radial-gradient(ellipse at 50% 100%,
    rgba(255, 220, 160, 0.2) 0%,
    rgba(255, 200, 140, 0.1) 30%,
    transparent 60%);
  pointer-events: none;
  z-index: 3;
}

/* 卡片 */
.card {
  position: relative;
  z-index: 10;
  width: clamp(300px, 85vw, 400px);
  min-height: clamp(380px, 85vw, 500px);
  background: var(--card-bg);
  border-radius: 20px;
  padding: 32px 28px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 40px var(--glow-lamp),
    0 20px 60px rgba(60, 40, 30, 0.15);
  border: 1px solid rgba(200, 170, 130, 0.4);
  animation: cardFloat 5s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

/* 咖啡杯图标 */
.cafe-icon {
  font-size: 48px;
  margin-bottom: 14px;
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  filter: drop-shadow(0 3px 6px rgba(100, 70, 50, 0.25));
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-25px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 咖啡蒸汽 */
.steam {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  opacity: 0;
  animation: steamRise 2.5s ease-out infinite;
  pointer-events: none;
}

.steam:nth-child(1) { left: 45%; animation-delay: 0s; }
.steam:nth-child(2) { left: 50%; animation-delay: 0.8s; }
.steam:nth-child(3) { left: 55%; animation-delay: 1.6s; }

@keyframes steamRise {
  0% { opacity: 0; transform: translateX(-50%) translateY(0) scale(0.8); }
  30% { opacity: 0.7; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1.2); }
}

.date-display {
  font-size: 13px;
  color: var(--cafe-brown);
  letter-spacing: 2px;
  margin-bottom: 10px;
  opacity: 0;
  animation: slideUp 1s ease-out 0.5s both;
}

.name-display {
  font-size: clamp(30px, 8vw, 48px);
  font-weight: 700;
  color: var(--text-coffee);
  margin-bottom: 18px;
  opacity: 0;
  animation: slideUp 1.2s ease-out 0.7s both;
  text-shadow: 0 2px 8px rgba(100, 70, 50, 0.1);
}

.blessing-display {
  font-size: clamp(14px, 4.5vw, 17px);
  line-height: 1.9;
  color: #6a4840;
  max-width: 300px;
  opacity: 0;
  animation: slideUp 1.2s ease-out 0.9s both;
}

.from-display {
  font-size: 14px;
  color: var(--cafe-brown);
  margin-top: 22px;
  opacity: 0;
  animation: slideUp 1.2s ease-out 1.1s both;
}

.cup-wrapper {
  position: relative;
  display: inline-block;
  margin-bottom: 10px;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 窗框装饰 */
.frame-decoration {
  position: fixed;
  font-size: 22px;
  opacity: 0.6;
  z-index: 5;
  pointer-events: none;
}

.frame-decoration.left { left: 3%; top: 50%; }
.frame-decoration.right { right: 3%; top: 50%; }

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .steam {
    animation: none;
  }
  .raindrop {
    animation: none;
    opacity: 0.3;
  }
  .name-display, .blessing-display, .from-display, .date-display {
    animation: none;
    opacity: 1;
  }
}
</style>
</head>
<body>

<!-- 窗户 -->
<div class="window-frame"></div>

<!-- 雨滴 -->
<script>
for (let i = 0; i < 60; i++) {
  const drop = document.createElement('div');
  drop.className = 'raindrop';
  drop.style.left = Math.random() * 100 + 'vw';
  drop.style.height = (15 + Math.random() * 25) + 'px';
  drop.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
  drop.style.animationDelay = Math.random() * 3 + 's';
  document.body.appendChild(drop);
}
</script>

<!-- 卡片 -->
<div class="card">
  <div class="cup-wrapper">
    <span class="steam">☁️</span>
    <span class="steam">☁️</span>
    <span class="steam">☁️</span>
    <div class="cafe-icon">☕</div>
  </div>
  <div class="date-display" id="dateEl"></div>
  <div class="name-display" id="nameEl"></div>
  <div class="blessing-display" id="blessingEl"></div>
  <div class="from-display" id="fromEl"></div>
</div>

<!-- 窗框装饰 -->
<div class="frame-decoration left">🪴</div>
<div class="frame-decoration right">🕯️</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '窗外有雨，心中有你，这样的时光刚刚好';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>
</body>
</html>
