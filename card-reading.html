<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书香时光</title>
<meta property="og:title" content="📚 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --paper: #f5e6d0;
  --paper-dark: #e8d5b5;
  --ink: #3a2518;
  --gold: #8b6914;
  --accent: #c9a84c;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #2a1f15 0%, #3d2a1a 40%, #2a1f15 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 书桌木纹光晕 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(139,105,20,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 50%);
  z-index: 0;
  pointer-events: none;
}

/* 书本 */
.book {
  position: relative;
  width: clamp(260px, 75vw, 380px);
  height: clamp(180px, 50vw, 260px);
  z-index: 2;
  perspective: 800px;
}

/* 左页 */
.page-left {
  position: absolute;
  left: 0; top: 0;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, var(--paper-dark) 0%, var(--paper) 8%, var(--paper) 100%);
  border-radius: 8px 0 0 8px;
  transform-origin: right center;
  transform: rotateY(-15deg);
  box-shadow: -4px 0 12px rgba(0,0,0,0.25);
  padding: 30px 20px 30px 25px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
}

/* 右页 */
.page-right {
  position: absolute;
  right: 0; top: 0;
  width: 50%; height: 100%;
  background: linear-gradient(270deg, var(--paper-dark) 0%, var(--paper) 8%, var(--paper) 100%);
  border-radius: 0 8px 8px 0;
  box-shadow: 2px 2px 12px rgba(0,0,0,0.25);
  padding: 30px 25px 30px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
}

/* 书脊 */
.spine {
  position: absolute;
  left: 50%; top: 0;
  width: 10px; height: 100%;
  background: linear-gradient(90deg, #6b4a20, #8b6520, #6b4a20);
  transform: translateX(-50%);
  z-index: 3;
  border-radius: 2px;
}

/* 书页线条装饰 */
.page-lines {
  position: absolute;
  left: 15px; right: 15px;
  top: 0; bottom: 0;
  background: repeating-linear-gradient(
    transparent,
    transparent 28px,
    rgba(58,37,24,0.08) 28px,
    rgba(58,37,24,0.08) 29px
  );
  pointer-events: none;
}

/* 文字内容 */
.card {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0 20px;
  max-width: 90vw;
}

.name {
  font-size: clamp(20px, 5.5vw, 34px);
  color: var(--accent);
  text-shadow: 0 0 18px rgba(201,168,76,0.5);
  margin-bottom: 8px;
  animation: inkFade 1.4s ease-out both;
}

.date {
  font-size: clamp(11px, 3vw, 15px);
  color: rgba(245,230,208,0.6);
  letter-spacing: 2px;
  margin-bottom: 14px;
  animation: inkFade 1.4s ease-out 0.3s both;
}

.blessing {
  font-size: clamp(13px, 3.5vw, 18px);
  color: var(--paper);
  line-height: 1.9;
  max-width: 300px;
  margin: 0 auto 12px;
  animation: inkFade 1.4s ease-out 0.6s both;
}

.from {
  font-size: clamp(11px, 3vw, 15px);
  color: rgba(201,168,76,0.8);
  animation: inkFade 1.4s ease-out 0.9s both;
}

@keyframes inkFade {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 羽毛笔装饰 */
.feather {
  position: fixed;
  bottom: 12%; right: 10%;
  width: 60px; height: 100px;
  z-index: 3;
  animation: featherFloat 5s ease-in-out infinite;
}
.feather svg {
  width: 100%; height: 100%;
  filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.3));
}
@keyframes featherFloat {
  0%, 100% { transform: rotate(-8deg) translateY(0); }
  50% { transform: rotate(-5deg) translateY(-8px); }
}

/* 墨滴飘落 */
.ink-drop {
  position: fixed;
  width: 4px; height: 4px;
  background: var(--ink);
  border-radius: 50%;
  opacity: 0.4;
  animation: inkFall var(--d, 4s) ease-in infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes inkFall {
  0% { transform: translateY(-20px); opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { transform: translateY(100vh); opacity: 0; }
}

/* 翻页闪光 */
.book::after {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  width: 2px; height: 100%;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.3), transparent);
  z-index: 4;
  animation: pageGlint 4s ease-in-out infinite;
}
@keyframes pageGlint {
  0%, 80%, 100% { opacity: 0; }
  85% { opacity: 1; }
}
</style>
</head>
<body>

<!-- 书 -->
<div class="book">
  <div class="page-left">
    <div class="page-lines"></div>
  </div>
  <div class="page-right">
    <div class="page-lines"></div>
  </div>
  <div class="spine"></div>
</div>

<!-- 文字 -->
<div class="card">
  <div class="name" id="nameEl"></div>
  <div class="date" id="dateEl"></div>
  <div class="blessing" id="blessingEl"></div>
  <div class="from" id="fromEl"></div>
</div>

<!-- 羽毛笔 -->
<div class="feather">
  <svg viewBox="0 0 60 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M30 5 Q35 20 32 40 Q30 60 28 80 L26 95 Q30 90 30 80 Q32 60 30 40 Q28 20 30 5Z" fill="#f5e6d0"/>
    <path d="M30 5 Q20 25 22 50 Q24 70 26 95" stroke="#d4c4a0" stroke-width="1" fill="none"/>
    <path d="M30 5 Q40 25 38 50 Q36 70 34 95" stroke="#d4c4a0" stroke-width="1" fill="none"/>
    <line x1="28" y1="80" x2="30" y2="100" stroke="#8b6914" stroke-width="2"/>
  </svg>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你在文字里找到安宁与光';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 墨滴
for (let i = 0; i < 8; i++) {
  const drop = document.createElement('div');
  drop.className = 'ink-drop';
  drop.style.left = (10 + Math.random() * 80) + '%';
  drop.style.setProperty('--d', (3 + Math.random() * 5) + 's');
  drop.style.setProperty('--delay', Math.random() * 5 + 's');
  drop.style.width = drop.style.height = (3 + Math.random() * 3) + 'px';
  document.body.appendChild(drop);
}
</script>
</body>
</html>
