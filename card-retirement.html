<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退休快乐</title>
<meta property="og:title" content="🌅 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #1a2a3a 0%, #2c4a6a 30%, #3a6090 60%, #4a7ab0 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 晚霞天空 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 60% 30%, rgba(255,150,80,0.45) 0%, transparent 45%),
    radial-gradient(ellipse at 30% 70%, rgba(255,100,50,0.25) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 80%, rgba(255,180,80,0.2) 0%, transparent 40%),
    radial-gradient(ellipse at 20% 20%, rgba(100,160,255,0.2) 0%, transparent 50%);
  animation: sunsetGlow 8s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes sunsetGlow {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; }
}

/* 夕阳大圆 */
.sun {
  position: fixed;
  width: 80px; height: 80px;
  background: radial-gradient(circle, #ffe066 0%, #ffaa00 60%, #ff7700 100%);
  border-radius: 50%;
  top: 15%; right: 18%;
  box-shadow: 0 0 40px #ffaa00, 0 0 80px #ff7700;
  animation: sunPulse 4s ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes sunPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 40px #ffaa00, 0 0 80px #ff7700; }
  50% { transform: scale(1.06); box-shadow: 0 0 55px #ffaa00, 0 0 100px #ff8800; }
}

/* 飞鸟 */
.bird {
  position: fixed;
  font-size: 14px;
  animation: birdFly linear infinite;
  z-index: 1;
  pointer-events: none;
  opacity: 0.6;
}
@keyframes birdFly {
  0% { transform: translateX(-5vw) translateY(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.4; }
  100% { transform: translateX(105vw) translateY(-30px); opacity: 0; }
}

/* 星星 */
.star {
  position: fixed;
  width: 3px; height: 3px;
  background: #ffe066;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 5px #ffe066;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.7); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 上升光点 */
.rise-dot {
  position: fixed;
  width: 4px; height: 4px;
  background: radial-gradient(circle, #ffe066, #ffaa00);
  border-radius: 50%;
  animation: riseUp linear infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 6px #ffaa00;
}
@keyframes riseUp {
  0% { transform: translateY(100vh); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 0.5; }
  100% { transform: translateY(-8vh); opacity: 0; }
}

/* 鸽子/羽毛飘落 */
.feather {
  position: fixed;
  animation: featherFall linear infinite;
  z-index: 1;
  pointer-events: none;
  opacity: 0.7;
  filter: drop-shadow(0 2px 6px rgba(255,220,150,0.4));
}
@keyframes featherFall {
  0% { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  88% { opacity: 0.5; }
  100% { transform: translateY(105vh) translateX(-50px) rotate(180deg); opacity: 0; }
}

/* === 3D翻转卡片 === */
.card-wrap {
  position: relative;
  z-index: 10;
  perspective: 1200px;
  width: clamp(300px, 85vw, 520px);
  min-height: clamp(420px, 75vw, 580px);
}

.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.2s cubic-bezier(0.34,1.2,0.64,1);
  cursor: pointer;
  min-height: clamp(420px, 75vw, 580px);
}

.card.flipped {
  transform: rotateY(180deg);
}

.card-front,
.card-back {
  position: absolute;
  width: 100%;
  min-height: clamp(420px, 75vw, 580px);
  backface-visibility: hidden;
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(28px, 7vw, 50px) clamp(24px, 6vw, 44px);
  gap: clamp(12px, 3vw, 20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.2);
}

.card-front {
  background: linear-gradient(145deg, #fffdf5 0%, #f9f0dc 50%, #ede0c0 100%);
  animation: cardFloat 5s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.card-back {
  background: linear-gradient(145deg, #2c3e55 0%, #1a2a3a 50%, #0f1a2a 100%);
  transform: rotateY(180deg);
  color: #ffe066;
  text-align: center;
}

.flip-hint {
  font-size: clamp(10px, 2.5vw, 12px);
  color: #c8a255;
  letter-spacing: 1px;
  text-align: center;
  margin-top: 8px;
  opacity: 0.7;
  animation: fadeIn 1.5s ease-out 2.5s both;
}

/* 正面顶部图标 */
.front-icon {
  font-size: clamp(40px, 9vw, 60px);
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 14px rgba(255,150,50,0.35));
}
@keyframes iconDrop {
  from { transform: translateY(-40px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* 正面标题 */
.front-title {
  font-size: clamp(18px, 4.5vw, 26px);
  color: #7a5c10;
  letter-spacing: 5px;
  text-align: center;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.divider {
  width: 55%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #c8a255, transparent);
  animation: fadeIn 1.2s ease-out 0.8s both;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* 正面名字 */
.front-name {
  font-size: clamp(28px, 7vw, 48px);
  color: #8b6914;
  text-align: center;
  font-weight: bold;
  text-shadow: 0 2px 8px rgba(139,105,20,0.15);
  opacity: 1;
  animation: slideUp 1.2s ease-out 1s both;
}

/* 正面祝福语 */
.front-blessing {
  font-size: clamp(14px, 3.8vw, 20px);
  color: #6b5520;
  text-align: center;
  line-height: 1.9;
  max-width: 90%;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.3s both;
}

/* 正面署名 */
.front-from {
  font-size: clamp(12px, 3vw, 17px);
  color: #9a7832;
  text-align: right;
  align-self: flex-end;
  margin-top: 6px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.6s both;
}

/* 正面日期 */
.front-date {
  font-size: clamp(11px, 2.8vw, 13px);
  color: #b8944a;
  text-align: center;
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 1.9s both;
}

/* 正面底部图标 */
.front-bottom {
  font-size: clamp(26px, 6vw, 38px);
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 2s both;
  filter: drop-shadow(0 3px 10px rgba(255,150,50,0.3));
}

/* === 背面内容 === */
.back-icon {
  font-size: clamp(36px, 8vw, 52px);
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 0 20px rgba(255,220,100,0.5));
}
.back-title {
  font-size: clamp(20px, 5vw, 30px);
  color: #ffe066;
  letter-spacing: 3px;
  text-align: center;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}
.back-subtitle {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(255,224,102,0.7);
  text-align: center;
  line-height: 1.8;
  max-width: 85%;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
}
.back-divider {
  width: 50%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,224,102,0.5), transparent);
  animation: fadeIn 1.2s ease-out 1.1s both;
}
.back-quote {
  font-size: clamp(14px, 3.5vw, 19px);
  color: rgba(255,224,102,0.85);
  font-style: italic;
  text-align: center;
  line-height: 1.9;
  max-width: 88%;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.4s both;
}
.back-from {
  font-size: clamp(12px, 3vw, 16px);
  color: rgba(255,224,102,0.6);
  text-align: right;
  align-self: flex-end;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.7s both;
}
.back-footer {
  font-size: clamp(10px, 2.5vw, 12px);
  color: rgba(255,224,102,0.4);
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 2s both;
}

/* 背面背面文字 */
.back-msg {
  font-size: clamp(13px, 3.2vw, 17px);
  color: rgba(255,224,102,0.75);
  text-align: center;
  line-height: 1.9;
  max-width: 85%;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.2s both;
}

/* === 点击提示 === */
.click-tip {
  position: absolute;
  bottom: clamp(12px, 3vw, 20px);
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(10px, 2.2vw, 12px);
  color: rgba(200,162,85,0.6);
  letter-spacing: 1px;
  white-space: nowrap;
  opacity: 1;
  animation: fadeIn 1.5s ease-out 3s both;
}

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .card-front, .card-back,
  .bird, .star, .rise-dot, .feather,
  .front-icon, .front-title, .divider, .front-name,
  .front-blessing, .front-from, .front-date, .front-bottom,
  .back-icon, .back-title, .back-subtitle, .back-divider,
  .back-quote, .back-from, .back-footer, .back-msg, .click-tip,
  .flip-hint {
    animation: none !important;
  }
  .card { transform: none !important; }
}
</style>
</head>
<body>

<script>
// 夕阳
const sunEl = document.createElement('div');
sunEl.className = 'sun';
document.body.appendChild(sunEl);

// 飞鸟
function createBird() {
  const el = document.createElement('div');
  el.className = 'bird';
  el.style.top = Math.random() * 30 + 5 + 'vh';
  el.style.animationDuration = (Math.random() * 6 + 8) + 's';
  el.style.animationDelay = (Math.random() * 5) + 's';
  el.textContent = '🕊';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 18000);
}

// 星星
function createStar() {
  const el = document.createElement('div');
  el.className = 'star';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = Math.random() * 70 + 'vh';
  el.style.animationDuration = (Math.random() * 2.5 + 1.5) + 's';
  el.style.animationDelay = (Math.random() * 3) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 9000);
}

// 上升光点
function createRiseDot() {
  const el = document.createElement('div');
  el.className = 'rise-dot';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.animationDuration = (Math.random() * 4 + 5) + 's';
  el.style.animationDelay = (Math.random() * 4) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 13000);
}

// 羽毛
function createFeather() {
  const el = document.createElement('div');
  el.className = 'feather';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (Math.random() * 10 + 10) + 'px';
  el.style.animationDuration = (Math.random() * 6 + 7) + 's';
  el.style.animationDelay = (Math.random() * 5) + 's';
  el.textContent = ['🪶','✦','✧','⁕'][Math.floor(Math.random() * 4)];
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 16000);
}

const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!reducedMotion) {
  for (let i = 0; i < 6; i++) setTimeout(createBird, i * 2000);
  setInterval(createBird, 12000);
  for (let i = 0; i < 15; i++) setTimeout(createStar, i * 500);
  setInterval(createStar, 1500);
  for (let i = 0; i < 8; i++) setTimeout(createRiseDot, i * 700);
  setInterval(createRiseDot, 1800);
  for (let i = 0; i < 10; i++) setTimeout(createFeather, i * 900);
  setInterval(createFeather, 2500);
}

// 点击翻转
document.querySelector('.card').addEventListener('click', function() {
  this.classList.toggle('flipped');
});

// URL参数读取
const p = new URLSearchParams(location.search);
const nameEl = document.getElementById('nameEl');
const dateEl = document.getElementById('dateEl');
const blessingEl = document.getElementById('blessingEl');
const fromEl = document.getElementById('fromEl');
const backNameEl = document.getElementById('backNameEl');
if (nameEl) nameEl.textContent = p.get('n') || '尊敬的前辈';
if (dateEl) dateEl.textContent = p.get('d') || '';
if (blessingEl) blessingEl.textContent = p.get('b') || '感谢您多年的付出与坚守';
if (fromEl) fromEl.textContent = p.get('f') ? '— ' + p.get('f') : '';
if (backNameEl) backNameEl.textContent = p.get('n') || '尊敬的前辈';
</script>

<!-- 3D翻转卡片 -->
<div class="card-wrap">
  <div class="card" id="flipCard">
    <!-- 正面 -->
    <div class="card-front">
      <div class="front-icon">🌅</div>
      <div class="front-title">退 休 快 乐</div>
      <div class="divider"></div>
      <div class="front-name" id="nameEl"></div>
      <div class="front-blessing" id="blessingEl"></div>
      <div class="front-from" id="fromEl"></div>
      <div class="front-date" id="dateEl"></div>
      <div class="front-bottom">🎉</div>
      <div class="click-tip">点击卡片 · 翻开背面</div>
    </div>
    <!-- 背面 -->
    <div class="card-back">
      <div class="back-icon">🌟</div>
      <div class="back-title">开启新篇章</div>
      <div class="back-subtitle">辛苦了半辈子，接下来的人生</div>
      <div class="back-divider"></div>
      <div class="back-msg">愿您余生精彩，岁月静好<br>去看看想看的风景<br>去陪伴想陪伴的人</div>
      <div class="back-divider"></div>
      <div class="back-from" id="backNameEl"></div>
      <div class="back-footer">— 致敬美好人生 —</div>
    </div>
  </div>
</div>

</body>
</html>
