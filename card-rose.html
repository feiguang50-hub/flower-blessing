<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玫瑰之约</title>
<meta property="og:title" content="🌹 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --rose-deep: #8b0020;
  --rose-red: #c41e3a;
  --rose-pink: #e87090;
  --rose-light: #ffc8d8;
  --gold: #d4a574;
  --gold-light: #f0d8b0;
  --text-warm: #fff0f4;
  --text-muted: rgba(255, 210, 220, 0.7);
  --card-bg: rgba(80, 0, 20, 0.85);
  --card-border: rgba(255, 100, 140, 0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #1a0008 0%,
    #2d000f 25%,
    #3d0018 45%,
    #2d000f 65%,
    #1a0008 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星光 */
.stars {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}
.star {
  position: absolute;
  width: 1.5px; height: 1.5px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.4); }
}

/* 玫瑰花瓣飘落 */
.petal {
  position: fixed;
  z-index: 5; pointer-events: none;
  opacity: 0.8;
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0%   { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
  10%  { opacity: 0.9; }
  90%  { opacity: 0.7; }
  100% { transform: translateY(105vh) rotate(360deg) translateX(30px); opacity: 0; }
}

/* 心形气泡上浮 */
.bubble {
  position: fixed;
  z-index: 3; pointer-events: none;
  font-size: 12px;
  bottom: -20px;
  animation: bubbleRise ease-in infinite;
}
@keyframes bubbleRise {
  0%   { transform: translateY(0) scale(0.8); opacity: 0; }
  20%  { opacity: 0.8; }
  100% { transform: translateY(-90vh) scale(1.1); opacity: 0; }
}

/* 卡片外框呼吸光效 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 24px;
  background: linear-gradient(135deg, #c41e3a, #8b0020, #e87090, #c41e3a);
  background-size: 300% 300%;
  animation: borderFlow 4s ease-in-out infinite;
  box-shadow:
    0 0 25px rgba(196, 30, 58, 0.5),
    0 0 50px rgba(196, 30, 58, 0.25);
}
@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(196,30,58,0.5), 0 0 50px rgba(196,30,58,0.25); }
  50%       { background-position: 100% 50%; box-shadow: 0 0 40px rgba(232,112,144,0.7), 0 0 80px rgba(196,30,58,0.35); }
}

/* 卡片主体 */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 22px;
  padding: clamp(28px, 6vw, 50px) clamp(24px, 5vw, 44px);
  max-width: 90vw;
  width: 480px;
  text-align: center;
  animation: cardFloat 4s ease-in-out infinite;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-8px); }
}

/* 玫瑰图标 */
.rose-icon {
  font-size: clamp(30px, 7vw, 48px);
  margin-bottom: 12px;
  display: block;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 0 12px rgba(232, 112, 144, 0.8));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.5) rotate(-10deg); }
  to   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
}

.name {
  font-size: clamp(24px, 6vw, 42px);
  color: var(--text-warm);
  margin-bottom: 14px;
  font-weight: normal;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.4s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.date {
  font-size: clamp(12px, 3vw, 16px);
  color: var(--text-muted);
  margin-bottom: 22px;
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.7s both;
}

.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: var(--rose-light);
  line-height: 1.9;
  margin-bottom: 28px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 1.0s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--gold-light);
  letter-spacing: 1px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 1.3s both;
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .petal, .bubble, .star, .card-wrap, .card, .rose-icon { animation: none !important; }
  .petal, .bubble { display: none; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card-wrap">
  <div class="card">
    <span class="rose-icon">🌹</span>
    <div class="name"  id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent     = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent     = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿这朵玫瑰诉说我所有未曾说出口的爱意';
document.getElementById('fromEl').textContent     = p.get('f') ? '— ' + p.get('f') : '';

// 花瓣
function createPetals() {
  const petals = ['🌹', '🌸', '💮', '🏵️', '🌺'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = petals[Math.floor(Math.random() * petals.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (10 + Math.random() * 14) + 'px';
    el.style.animationDuration = (6 + Math.random() * 8) + 's';
    el.style.animationDelay = Math.random() * 8 + 's';
    el.style.opacity = 0.5 + Math.random() * 0.5;
    document.body.appendChild(el);
  }
}

// 爱心气泡
function createBubbles() {
  const hearts = ['💕', '💗', '💖', '💓', '✨'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'bubble';
    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (10 + Math.random() * 12) + 'px';
    el.style.animationDuration = (4 + Math.random() * 5) + 's';
    el.style.animationDelay = Math.random() * 6 + 's';
    document.body.appendChild(el);
  }
}

// 星星
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top  = Math.random() * 80 + '%';
    s.style.animationDuration = (2 + Math.random() * 4) + 's';
    s.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(s);
  }
}

const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!reduced) {
  createStars();
  createPetals();
  createBubbles();
}
</script>
</body>
</html>
