<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玫瑰花园</title>
<meta property="og:title" content="🌹 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-light: #e8f0ff;
  --sky-warm: #fdf0e8;
  --grass-green: #3a6b35;
  --grass-light: #5a8a50;
  --rose-red: #d4486b;
  --rose-pink: #e87090;
  --rose-light: #f0a0b8;
  --fence-brown: #6b4020;
  --text-dark: #4a2a3a;
  --text-muted: rgba(100, 60, 80, 0.7);
  --card-bg: rgba(255, 245, 248, 0.92);
  --card-border: rgba(212, 72, 107, 0.3);
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(255, 200, 180, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 0%, rgba(255, 180, 200, 0.25) 0%, transparent 50%),
    linear-gradient(180deg, #e8f0ff 0%, #f8e8f0 40%, #f0e8e0 70%, #e0d8c8 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 篱笆 */
.fence {
  position: fixed;
  bottom: 28%;
  left: 0; right: 0;
  height: 60px;
  z-index: 2;
  pointer-events: none;
}

/* 草地 */
.grass-ground {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 30%;
  background: linear-gradient(180deg,
    rgba(90, 138, 80, 0.4) 0%,
    rgba(58, 107, 53, 0.6) 40%,
    rgba(45, 85, 40, 0.8) 100%);
  z-index: 3;
  border-radius: 50% 50% 0 0 / 10% 10% 0 0;
}

/* 花瓣飘落 */
.petal {
  position: fixed;
  font-size: 12px;
  opacity: 0.75;
  animation: petalFall linear infinite;
  pointer-events: none;
  z-index: 4;
}
@keyframes petalFall {
  0% { transform: translateY(-10px) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 0.8; }
  50% { transform: translateY(50vh) rotate(180deg) translateX(20px); opacity: 0.6; }
  90% { opacity: 0.5; }
  100% { transform: translateY(105vh) rotate(360deg) translateX(-10px); opacity: 0; }
}

/* 蝴蝶 */
.butterfly {
  position: fixed;
  font-size: 16px;
  z-index: 5;
  pointer-events: none;
  animation: butterflyFly 12s ease-in-out infinite;
}
@keyframes butterflyFly {
  0% { transform: translate(0, 0) rotate(5deg); }
  25% { transform: translate(30vw, -20px) rotate(-5deg); }
  50% { transform: translate(60vw, 10px) rotate(8deg); }
  75% { transform: translate(30vw, -15px) rotate(-3deg); }
  100% { transform: translate(0, 0) rotate(5deg); }
}

/* 花丛装饰 */
.bush {
  position: fixed;
  font-size: 28px;
  z-index: 3;
  pointer-events: none;
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 20px;
  background: linear-gradient(135deg,
    rgba(212, 72, 107, 0.5) 0%,
    rgba(224, 112, 144, 0.3) 50%,
    rgba(212, 72, 107, 0.5) 100%);
  background-size: 200% 200%;
  animation: borderRose 4s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(212, 72, 107, 0.25),
    0 8px 32px rgba(0, 0, 0, 0.15);
}
@keyframes borderRose {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(212, 72, 107, 0.25), 0 8px 32px rgba(0,0,0,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 35px rgba(224, 112, 144, 0.4), 0 8px 32px rgba(0,0,0,0.15); }
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 44px);
  text-align: center;
  max-width: min(420px, 92vw);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  animation: cardFloat 4s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.name {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: normal;
  color: var(--rose-red);
  margin-bottom: 10px;
  letter-spacing: 0.08em;
  opacity: 1;
  animation: fadeUp 1.2s ease-out both;
}

.date {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-muted);
  margin-bottom: 20px;
  letter-spacing: 0.15em;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.2s both;
}

.divider {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rose-red), transparent);
  margin: 16px auto;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.4s both;
}

.blessing {
  font-size: clamp(14px, 3.5vw, 17px);
  color: var(--text-dark);
  line-height: 1.9;
  margin-bottom: 22px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.5s both;
}

.from {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-muted);
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.8s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .petal, .butterfly, .card-wrap, .card { animation: none; }
}
</style>
</head>
<body>

<!-- 篱笆背景 -->
<svg class="fence" viewBox="0 0 1440 60" preserveAspectRatio="xMidYMax slice">
  <!-- 栅栏板 -->
  <rect x="0" y="20" width="1440" height="8" fill="#6b4020"/>
  <rect x="0" y="35" width="1440" height="8" fill="#5a3518"/>
  <rect x="0" y="48" width="1440" height="10" fill="#4a2a10"/>
  <!-- 栅栏柱 -->
  <rect x="30" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="150" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="270" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="390" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="510" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="630" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="750" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="870" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="990" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="1110" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="1230" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="1350" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <rect x="1410" y="5" width="12" height="55" fill="#7a4a28" rx="2"/>
  <!-- 栅栏柱顶部 -->
  <path d="M30 5 L36 0 L42 5Z" fill="#8a5530"/>
  <path d="M150 5 L156 0 L162 5Z" fill="#8a5530"/>
  <path d="M270 5 L276 0 L282 5Z" fill="#8a5530"/>
  <path d="M390 5 L396 0 L402 5Z" fill="#8a5530"/>
  <path d="M510 5 L516 0 L522 5Z" fill="#8a5530"/>
  <path d="M630 5 L636 0 L642 5Z" fill="#8a5530"/>
  <path d="M750 5 L756 0 L762 5Z" fill="#8a5530"/>
  <path d="M870 5 L876 0 L882 5Z" fill="#8a5530"/>
  <path d="M990 5 L996 0 L1002 5Z" fill="#8a5530"/>
  <path d="M1110 5 L1116 0 L1122 5Z" fill="#8a5530"/>
  <path d="M1230 5 L1236 0 L1242 5Z" fill="#8a5530"/>
  <path d="M1350 5 L1356 0 L1362 5Z" fill="#8a5530"/>
  <path d="M1410 5 L1416 0 L1422 5Z" fill="#8a5530"/>
</svg>

<!-- 花丛 -->
<div class="bush" style="left: 5%; bottom: 28%;">🌹🌷🌸</div>
<div class="bush" style="right: 8%; bottom: 29%;">🌺🌻🌼</div>
<div class="bush" style="left: 18%; bottom: 30%;">🌹🌸</div>
<div class="bush" style="right: 18%; bottom: 28%;">🌷🌺</div>

<!-- 蝴蝶 -->
<div class="butterfly" style="top: 20%; left: 10%;">🦋</div>
<div class="butterfly" style="top: 30%; left: 70%; animation-delay: 3s; font-size: 14px;">🦋</div>

<!-- 草地 -->
<div class="grass-ground"></div>

<!-- 花瓣飘落 -->
<div id="petalField"></div>

<!-- 贺卡 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '花园里的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活如花园般绚烂，每天都有花开的声音';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 花瓣
const petalField = document.getElementById('petalField');
const petals = ['🌹', '🌸', '🌺', '💮', '✿', '❀'];
for (let i = 0; i < 25; i++) {
  const s = document.createElement('div');
  s.className = 'petal';
  s.textContent = petals[Math.floor(Math.random() * petals.length)];
  s.style.left = Math.random() * 100 + '%';
  s.style.fontSize = (10 + Math.random() * 12) + 'px';
  s.style.opacity = 0.5 + Math.random() * 0.4;
  s.style.animationDuration = (6 + Math.random() * 10) + 's';
  s.style.animationDelay = Math.random() * 12 + 's';
  petalField.appendChild(s);
}

if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.petal, .butterfly, .card-wrap, .card').forEach(el => {
    el.style.animation = 'none';
  });
}
</script>
</body>
</html>
