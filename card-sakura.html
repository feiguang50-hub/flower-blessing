<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱花祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg, #ffeef2 0%, #ffd6e0 50%, #ffb8c8 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 动漫漏光 === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(255,200,220,0.3) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(255,150,180,0.2) 0%, transparent 40%);
  animation: lensFlare 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes lensFlare {
  0%, 100% { transform: translate(0, 0); opacity: 0.6; }
  33% { transform: translate(2%, 1%); opacity: 0.8; }
  66% { transform: translate(-1%, 2%); opacity: 0.5; }
}

/* === 樱花飘落 === */
.petal {
  position: fixed; width: 14px; height: 14px;
  background: #ffb7c5; border-radius: 50% 0 50% 0;
  opacity: 0.85; animation: fall linear infinite;
  z-index: 1; filter: blur(0.3px);
}
@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  5% { opacity: 0.85; }
  95% { opacity: 0.85; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* === 速度线 === */
.speed-line {
  position: fixed; width: 80px; height: 2px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
  border-radius: 2px; animation: speedLine linear infinite;
  z-index: 2; pointer-events: none;
}
@keyframes speedLine {
  0% { transform: translateX(-100px); opacity: 0; }
  20% { opacity: 0.7; }
  80% { opacity: 0.7; }
  100% { transform: translateX(100vw); opacity: 0; }
}

/* === 卡片主体 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 34px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ff9a9e, #fbc2eb, #ff9a9e);
  background-size: 300% 300%;
  animation: borderRainbow 4s ease infinite;
  z-index: 10;
}
@keyframes borderRainbow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: rgba(255,255,255,0.72);
  border-radius: 31px;
  padding: 48px 56px;
  text-align: center;
  max-width: 520px;
  width: 90vw;
  box-shadow: 0 16px 48px rgba(200,100,130,0.2), inset 0 0 30px rgba(255,200,220,0.1);
  animation: cardFloat 4s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-10px) rotate(0.5deg); }
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 60%);
  animation: shimmer 4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(10%, 10%); }
}

/* 樱花装饰 */
.card-icon {
  font-size: 36px; display: block; margin-bottom: 16px;
  animation: iconBounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(200,100,130,0.3));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  25% { transform: scale(1.1) translateY(-4px); }
  50% { transform: scale(0.95) translateY(0); }
  75% { transform: scale(1.05) translateY(-2px); }
}

/* === 文字动画 === */
.name {
  font-size: clamp(28px, 7vw, 52px);
  color: #8b4557; letter-spacing: 8px; margin-bottom: 16px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) both, nameGlow 3s ease-in-out infinite 1.2s;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(24px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes nameGlow {
  0%, 100% { text-shadow: 0 2px 8px rgba(200,100,130,0.2); }
  50% { text-shadow: 0 2px 16px rgba(200,100,130,0.4), 0 0 30px rgba(255,180,200,0.3); }
}
.date {
  font-size: clamp(12px, 2.5vw, 16px);
  color: #b87085; letter-spacing: 4px; margin-bottom: 32px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
.blessing {
  font-size: clamp(16px, 3.5vw, 22px);
  color: #c0607a; line-height: 1.9; letter-spacing: 2px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.6s both;
}
.from {
  font-size: clamp(12px, 2vw, 15px);
  color: #d4a0b0; margin-top: 24px; letter-spacing: 3px;
  opacity: 1; animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.9s both;
}

/* === 背景气泡 === */
.bubble {
  position: fixed; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
  animation: bubbleRise linear infinite;
  z-index: 1; pointer-events: none;
}
@keyframes bubbleRise {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">🌸</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

for (let i = 0; i < 30; i++) {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.animationDuration = (4 + Math.random() * 5) + 's';
  petal.style.animationDelay = Math.random() * 6 + 's';
  petal.style.width = petal.style.height = (8 + Math.random() * 12) + 'px';
  petal.style.background = `hsl(${330 + Math.random()*20}, ${70 + Math.random()*20}%, ${85 + Math.random()*10}%)`;
  document.body.appendChild(petal);
}
for (let i = 0; i < 6; i++) {
  const line = document.createElement('div');
  line.className = 'speed-line';
  line.style.top = (10 + Math.random() * 80) + 'vh';
  line.style.animationDuration = (2 + Math.random() * 2) + 's';
  line.style.animationDelay = Math.random() * 4 + 's';
  document.body.appendChild(line);
}
for (let i = 0; i < 10; i++) {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.left = Math.random() * 100 + 'vw';
  bubble.style.width = bubble.style.height = (6 + Math.random() * 14) + 'px';
  bubble.style.animationDuration = (6 + Math.random() * 6) + 's';
  bubble.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(bubble);
}
</script>
</body>
</html>
