<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱花祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg, #ffeef2 0%, #ffd6e0 50%, #ffb8c8 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 樱花飘落 - CSS动画版 */
.petal {
  position: fixed;
  width: 14px;
  height: 14px;
  background: #ffb7c5;
  border-radius: 50% 0 50% 0;
  opacity: 0.8;
  animation: fall linear infinite;
  z-index: 1;
}
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.8; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0.3; }
}

/* 卡片 */
.card {
  background: rgba(255,255,255,0.6);
  border: 2px solid rgba(255,255,255,0.8);
  border-radius: 28px;
  padding: 48px 56px;
  text-align: center;
  max-width: 520px;
  width: 90vw;
  box-shadow: 0 16px 48px rgba(200,100,130,0.2);
  animation: float 4s ease-in-out infinite;
  position: relative;
  z-index: 10;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* 文字动画 */
.name {
  font-size: clamp(28px, 7vw, 52px);
  color: #8b4557;
  letter-spacing: 8px;
  margin-bottom: 16px;
  animation: fadeIn 1.5s ease-out both;
}
.date {
  font-size: clamp(12px, 2.5vw, 16px);
  color: #b87085;
  letter-spacing: 4px;
  margin-bottom: 32px;
  animation: fadeIn 1.5s ease-out 0.3s both;
}
.blessing {
  font-size: clamp(16px, 3.5vw, 22px);
  color: #c0607a;
  line-height: 1.9;
  letter-spacing: 2px;
  animation: fadeIn 1.5s ease-out 0.6s both;
}
.from {
  font-size: clamp(12px, 2vw, 15px);
  color: #d4a0b0;
  margin-top: 24px;
  letter-spacing: 3px;
  animation: fadeIn 1.5s ease-out 0.9s both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 底部装饰 */
.card::before {
  content: '🌸';
  font-size: 32px;
  display: block;
  margin-bottom: 16px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}
</style>
</head>
<body>

<div class="card">
  <div class="name" id="nameEl"></div>
  <div class="date" id="dateEl"></div>
  <div class="blessing" id="blessingEl"></div>
  <div class="from" id="fromEl"></div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 生成樱花花瓣
for (let i = 0; i < 28; i++) {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.animationDuration = (4 + Math.random() * 4) + 's';
  petal.style.animationDelay = Math.random() * 6 + 's';
  petal.style.width = petal.style.height = (8 + Math.random() * 10) + 'px';
  petal.style.background = `hsl(${330 + Math.random()*20}, ${70 + Math.random()*20}%, ${85 + Math.random()*10}%)`;
  document.body.appendChild(petal);
}
</script>
</body>
</html>
