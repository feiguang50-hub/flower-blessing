<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱花树下</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sakura-pink: #ffb7c5;
  --sakura-light: #ffe4e8;
  --sakura-deep: #e8708a;
  --sky-blue: #a8d8ea;
  --sky-light: #d4eeff;
  --grass-green: #7bc67e;
  --text-dark: #5a3040;
  --card-white: rgba(255, 255, 255, 0.88);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #a8d8ea 0%,
    #d4eeff 20%,
    #ffe4e8 50%,
    #ffd4de 75%,
    #ffc8d5 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 草地 */
.grass {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 15vh;
  background: linear-gradient(180deg, #90d87a 0%, #6ab85e 50%, #4a9040 100%);
  z-index: 1;
}

.grass::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 20px;
  background: repeating-linear-gradient(90deg,
    transparent 0px, transparent 8px,
    rgba(120,200,90,0.5) 8px, rgba(120,200,90,0.5) 12px);
  filter: blur(1px);
}

/* 樱花树 */
.tree {
  position: fixed;
  bottom: 12vh;
  z-index: 2;
  pointer-events: none;
}

/* 树干 */
.trunk {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 120px;
  background: linear-gradient(90deg, #6b4226, #8b5a3c, #6b4226);
  border-radius: 4px 4px 8px 8px;
}

/* 树枝 */
.branch {
  position: absolute;
  background: linear-gradient(90deg, #7a4a2a, #8b5a3c);
  border-radius: 3px;
  transform-origin: left center;
}

.branch:nth-child(1) { width: 60px; height: 6px; bottom: 80px; left: calc(50% + 14px); transform: rotate(-25deg); }
.branch:nth-child(2) { width: 45px; height: 5px; bottom: 95px; left: calc(50% + 14px); transform: rotate(-15deg); }
.branch:nth-child(3) { width: 50px; height: 5px; bottom: 70px; left: calc(50% - 74px); transform: rotate(200deg); }
.branch:nth-child(4) { width: 35px; height: 4px; bottom: 88px; left: calc(50% - 49px); transform: rotate(190deg); }
.branch:nth-child(5) { width: 40px; height: 4px; bottom: 60px; left: calc(50% + 14px); transform: rotate(-35deg); }
.branch:nth-child(6) { width: 30px; height: 4px; bottom: 50px; left: calc(50% - 44px); transform: rotate(210deg); }

/* 树冠（樱花云） */
.canopy {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 160px;
  background: radial-gradient(ellipse, rgba(255,183,197,0.9) 0%, rgba(255,160,180,0.7) 40%, rgba(255,130,160,0.4) 70%, transparent 100%);
  border-radius: 50% 50% 45% 45%;
  animation: canopyBreath 6s ease-in-out infinite;
}

.canopy::before, .canopy::after {
  content: '';
  position: absolute;
  background: radial-gradient(ellipse, rgba(255,183,197,0.85) 0%, transparent 70%);
  border-radius: 50%;
}

.canopy::before {
  width: 140px; height: 120px;
  top: -30px; left: -20px;
}

.canopy::after {
  width: 120px; height: 100px;
  top: -20px; right: -10px;
}

@keyframes canopyBreath {
  0%, 100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.03); }
}

.tree-left {
  left: 5%;
  transform: scale(0.7);
}

.tree-right {
  right: 5%;
  transform: scale(0.8);
}

/* 花瓣飘落 */
.petals {
  position: fixed; inset: 0;
  z-index: 5;
  pointer-events: none;
  overflow: hidden;
}

.petal {
  position: absolute;
  font-size: 18px;
  animation: petalFall linear infinite;
  opacity: 0;
}

@keyframes petalFall {
  0% { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity: 0; }
  8% { opacity: 0.9; }
  85% { opacity: 0.5; }
  100% { transform: translateY(105vh) translateX(60px) rotate(540deg); opacity: 0; }
}

.petal:nth-child(1) { left: 10%; animation-duration: 11s; animation-delay: 0s; font-size: 16px; }
.petal:nth-child(2) { left: 20%; animation-duration: 13s; animation-delay: 2s; font-size: 20px; }
.petal:nth-child(3) { left: 32%; animation-duration: 10s; animation-delay: 5s; font-size: 14px; }
.petal:nth-child(4) { left: 45%; animation-duration: 12s; animation-delay: 1s; font-size: 18px; }
.petal:nth-child(5) { left: 58%; animation-duration: 14s; animation-delay: 7s; font-size: 16px; }
.petal:nth-child(6) { left: 70%; animation-duration: 11s; animation-delay: 3s; font-size: 22px; }
.petal:nth-child(7) { left: 82%; animation-duration: 13s; animation-delay: 9s; font-size: 15px; }
.petal:nth-child(8) { left: 92%; animation-duration: 10s; animation-delay: 4s; font-size: 19px; }
.petal:nth-child(9) { left: 15%; animation-duration: 12s; animation-delay: 6s; font-size: 17px; }
.petal:nth-child(10) { left: 75%; animation-duration: 14s; animation-delay: 8s; font-size: 13px; }

/* 蝴蝶 */
.butterfly {
  position: fixed;
  z-index: 6;
  font-size: 20px;
  animation: butterflyFly 8s ease-in-out infinite;
  opacity: 0.8;
}

@keyframes butterflyFly {
  0% { transform: translate(0, 0) rotate(-5deg); }
  25% { transform: translate(80px, -40px) rotate(5deg); }
  50% { transform: translate(160px, 0) rotate(-5deg); }
  75% { transform: translate(80px, 40px) rotate(5deg); }
  100% { transform: translate(0, 0) rotate(-5deg); }
}

.butterfly:nth-child(2) {
  top: 20%;
  left: 10%;
  animation-delay: 3s;
  font-size: 16px;
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(400px, 90vw);
  min-height: 500px;
  background: var(--card-white);
  border-radius: 28px;
  padding: 44px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 2px solid rgba(255, 183, 197, 0.5);
  animation: cardFloat 5s ease-in-out infinite;
  box-shadow:
    0 12px 40px rgba(200, 80, 100, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.8);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-10px) rotate(0.5deg); }
}

/* 粉色边框呼吸 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 30px;
  background: linear-gradient(135deg,
    rgba(255,183,197,0.6),
    rgba(255,160,180,0.3),
    rgba(232,112,138,0.4),
    rgba(255,183,197,0.6));
  background-size: 200% 200%;
  animation: sakuraBorder 4s ease-in-out infinite;
  z-index: -1;
  opacity: 0.5;
}

@keyframes sakuraBorder {
  0%, 100% { background-position: 0% 50%; opacity: 0.4; }
  50% { background-position: 100% 50%; opacity: 0.65; }
}

/* 图标 */
.icon {
  font-size: 52px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(255,130,160,0.4));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分隔线 */
.divider {
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(232,112,138,0.6), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字 */
.name {
  font-size: clamp(24px, 7vw, 42px);
  color: var(--text-dark);
  font-weight: 700;
  text-align: center;
  letter-spacing: 3px;
  text-shadow: 0 1px 8px rgba(200,80,100,0.15);
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(90,48,64,0.65);
  letter-spacing: 4px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(14px, 4vw, 17px);
  color: rgba(90,48,64,0.85);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  font-style: italic;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(12px, 3.5vw, 14px);
  color: rgba(90,48,64,0.55);
  letter-spacing: 3px;
  margin-top: 4px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

/* 底部文字 */
.sakura-text {
  position: absolute;
  bottom: 18px;
  font-size: 11px;
  color: rgba(232,112,138,0.55);
  letter-spacing: 2px;
  text-align: center;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .petal, .butterfly, .canopy {
    animation: none;
  }
  .name, .date, .blessing, .from, .divider, .sakura-text {
    opacity: 1;
  }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; min-height: 450px; }
  .tree-left, .tree-right { display: none; }
  .butterfly:nth-child(2) { display: none; }
}
</style>
</head>
<body>

<div class="grass"></div>

<div class="tree tree-left">
  <div class="trunk"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="canopy"></div>
</div>

<div class="tree tree-right">
  <div class="trunk"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="branch"></div>
  <div class="canopy"></div>
</div>

<div class="petals">
  <div class="petal">🌸</div>
  <div class="petal">💮</div>
  <div class="petal">🌸</div>
  <div class="petal">🩷</div>
  <div class="petal">🌸</div>
  <div class="petal">💮</div>
  <div class="petal">🌸</div>
  <div class="petal">🩷</div>
  <div class="petal">🌸</div>
  <div class="petal">💮</div>
</div>

<div class="butterfly">🦋</div>
<div class="butterfly">🦋</div>

<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🌸</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="sakura-text">樱花树下 · 约定永恒</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿樱花飘落时，我们的约定也悄悄生根发芽';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
