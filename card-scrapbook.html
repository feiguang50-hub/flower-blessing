<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手账日记本</title>
<meta property="og:title" content="📔 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --paper-cream: #fdf6e3;
  --paper-line: #c8d4e8;
  --paper-pink: #ffe4ec;
  --paper-blue: #e4f0ff;
  --paper-yellow: #fff8d4;
  --paper-green: #e4f7e4;
  --ink-dark: #3a3a4a;
  --ink-gray: #6a6a7a;
  --accent-pink: #ff9ebc;
  --accent-blue: #7ab8ff;
  --accent-yellow: #ffd966;
  --accent-green: #7ed87e;
  --deco-pink: rgba(255,158,188,0.6);
  --deco-blue: rgba(122,184,255,0.6);
  --deco-yellow: rgba(255,217,102,0.7);
  --deco-green: rgba(126,216,126,0.6);
  --card-bg: rgba(255,255,255,0.92);
  --card-border: rgba(200,180,220,0.5);
  --border-glow: rgba(255,180,220,0.5);
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255,220,240,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(200,220,255,0.25) 0%, transparent 50%),
    linear-gradient(180deg, #fef9f3 0%, #fdf6e3 50%, #faf0e6 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 背景横格线 */
.paper-lines {
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 29px,
    var(--paper-line) 29px,
    var(--paper-line) 30px
  );
  background-size: 100% 30px;
  opacity: 0.3;
  z-index: 0;
  pointer-events: none;
}

/* 红色左边距线 */
.paper-margin {
  position: fixed;
  left: 60px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: rgba(255,100,100,0.4);
  z-index: 1;
  pointer-events: none;
}

/* 散落贴纸装饰 */
.sticker {
  position: fixed;
  font-size: 28px;
  z-index: 3;
  pointer-events: none;
  animation: stickerFloat 4s ease-in-out infinite;
}
.sticker:nth-child(1) { top: 8%; left: 5%; animation-delay: 0s; }
.sticker:nth-child(2) { top: 12%; right: 8%; animation-delay: 1s; }
.sticker:nth-child(3) { top: 65%; left: 4%; animation-delay: 2s; }
.sticker:nth-child(4) { bottom: 12%; right: 6%; animation-delay: 0.5s; }
.sticker:nth-child(5) { top: 40%; left: 2%; animation-delay: 1.5s; font-size: 22px; }
.sticker:nth-child(6) { top: 30%; right: 3%; animation-delay: 2.5s; font-size: 20px; }

@keyframes stickerFloat {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-8px) rotate(3deg); }
}

/* 星星闪烁 */
.star-deco {
  position: fixed;
  width: 8px;
  height: 8px;
  z-index: 2;
  pointer-events: none;
}
.star-deco::before {
  content: '✦';
  font-size: 14px;
  color: var(--deco-yellow);
  animation: starSparkle 2s ease-in-out infinite;
}
.star-deco:nth-child(7) { top: 15%; left: 15%; animation-delay: 0s; }
.star-deco:nth-child(8) { top: 25%; right: 18%; animation-delay: 0.7s; }
.star-deco:nth-child(9) { bottom: 25%; left: 12%; animation-delay: 1.4s; }
.star-deco:nth-child(10) { bottom: 35%; right: 15%; animation-delay: 0.3s; }

@keyframes starSparkle {
  0%, 100% { opacity: 0.4; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, #ffb6d0, #c8e8ff, #ffe4a0, #c8ffcc, #ffb6d0);
  background-size: 300% 300%;
  border-radius: 16px;
  animation: scrapbookBorder 5s ease-in-out infinite;
  box-shadow:
    0 4px 24px rgba(255,150,190,0.25),
    0 8px 40px rgba(150,180,255,0.15);
}

@keyframes scrapbookBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 贴纸感卡片 */
.card {
  background: var(--card-bg);
  border-radius: 13px;
  padding: clamp(28px, 7vw, 48px) clamp(24px, 6vw, 44px);
  width: min(480px, 88vw);
  position: relative;
  animation: cardDrop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
}

@keyframes cardDrop {
  from { transform: scale(0.8) translateY(-20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

/* 便签便签条 */
.sticky-note {
  position: absolute;
  padding: 10px 14px;
  font-size: clamp(10px, 2.5vw, 13px);
  font-weight: bold;
  letter-spacing: 1px;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.12);
  transform: rotate(var(--r, -3deg));
  z-index: 5;
}
.sticky-note::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: rgba(0,0,0,0.08);
}
.note-top-right {
  top: -18px;
  right: -12px;
  --r: 6deg;
  background: var(--paper-pink);
  color: #c06080;
}
.note-bottom-left {
  bottom: -16px;
  left: -14px;
  --r: -5deg;
  background: var(--paper-yellow);
  color: #9a7020;
}
.note-top-left {
  top: -14px;
  left: -10px;
  --r: -8deg;
  background: var(--paper-blue);
  color: #4080c0;
  font-size: clamp(9px, 2.2vw, 11px);
}

/* 姓名 */
.card-name {
  font-size: clamp(24px, 6vw, 38px);
  font-weight: bold;
  color: var(--ink-dark);
  margin-bottom: 14px;
  letter-spacing: 3px;
  position: relative;
  display: inline-block;
  opacity: 1;
  animation: nameWrite 1s ease-out 0.2s both;
}
.card-name::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-pink), var(--accent-blue));
  border-radius: 2px;
  animation: underlineDraw 0.8s ease-out 0.8s both;
}

@keyframes nameWrite {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes underlineDraw {
  from { width: 0; }
  to { width: 100%; }
}

/* 日期 */
.card-date {
  font-size: clamp(11px, 3vw, 14px);
  color: var(--ink-gray);
  letter-spacing: 2px;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1s ease-out 0.3s both;
}

/* 分隔线（手绘风格） */
.card-divider {
  width: 80%;
  height: 2px;
  margin: 0 auto 22px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--accent-pink) 20%,
    var(--accent-yellow) 40%,
    var(--accent-green) 60%,
    var(--accent-blue) 80%,
    transparent 100%
  );
  border-radius: 2px;
  animation: lineGrow 1s ease-out 0.5s both;
}
@keyframes lineGrow {
  from { width: 0; opacity: 0; }
  to { width: 80%; opacity: 1; }
}

/* 祝福语 */
.card-blessing {
  font-size: clamp(14px, 3.8vw, 18px);
  color: var(--ink-dark);
  line-height: 1.9;
  letter-spacing: 1px;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1s ease-out 0.5s both;
}

/* 署名 */
.card-from {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--ink-gray);
  font-style: italic;
  letter-spacing: 2px;
  opacity: 1;
  animation: slideUp 1s ease-out 0.7s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 角落装饰 */
.corner-deco {
  position: absolute;
  width: 36px;
  height: 36px;
  pointer-events: none;
}
.corner-deco::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border: 3px solid var(--deco-pink);
  border-radius: 50%;
  opacity: 0.5;
}
.corner-deco::after {
  content: '✿';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 16px;
  color: var(--deco-pink);
}
.corner-tl { top: 8px; left: 8px; }
.corner-tr { top: 8px; right: 8px; transform: scaleX(-1); }
.corner-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
.corner-br { bottom: 8px; right: 8px; transform: scale(-1); }

/* 胶带装饰 */
.tape {
  position: absolute;
  width: 60px;
  height: 18px;
  background: rgba(255,240,150,0.6);
  opacity: 0.7;
  transform: rotate(var(--r, -15deg));
}
.tape-top {
  top: -10px;
  left: 50%;
  transform: translateX(-50%) rotate(-2deg);
  --r: -2deg;
}
.tape-left {
  top: 20px;
  left: -25px;
  --r: 25deg;
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .card-name, .card-date, .card-blessing, .card-from, .card-divider { animation: none; }
  .card { opacity: 1; }
  .card-wrap { animation: none; background: #ffb6d0; }
  .sticker, .star-deco { animation: none; }
}
</style>

</head>
<body>

<!-- 横格纸背景 -->
<div class="paper-lines"></div>
<div class="paper-margin"></div>

<!-- 散落贴纸 -->
<div class="sticker">🌸</div>
<div class="sticker">⭐</div>
<div class="sticker">🎀</div>
<div class="sticker">🌼</div>
<div class="sticker">💫</div>
<div class="sticker">✨</div>

<!-- 星星装饰 -->
<div class="star-deco"></div>
<div class="star-deco"></div>
<div class="star-deco"></div>
<div class="star-deco"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <!-- 胶带 -->
  <div class="tape tape-top"></div>

  <div class="card">
    <!-- 角落装饰 -->
    <div class="corner-deco corner-tl"></div>
    <div class="corner-deco corner-tr"></div>
    <div class="corner-deco corner-bl"></div>
    <div class="corner-deco corner-br"></div>

    <!-- 便签 -->
    <div class="sticky-note note-top-right">戳这里 ✿</div>
    <div class="sticky-note note-bottom-left">珍藏版</div>
    <div class="sticky-note note-top-left">专属</div>

    <!-- 内容 -->
    <div class="card-name" id="nameEl">亲爱的</div>
    <div class="card-date" id="dateEl"></div>
    <div class="card-divider"></div>
    <div class="card-blessing" id="blessingEl">愿你的每一天<br>都如手账般精彩可爱</div>
    <div class="card-from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的';
const blessing = p.get('b') || '愿你的每一天\n都如手账般精彩可爱';
const date = p.get('d') || '';
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').innerHTML = blessing.replace(/\n/g, '<br>');
document.getElementById('dateEl').textContent = date;
document.getElementById('fromEl').textContent = from ? '— ' + from : '';
</script>

</body>
</html>
