<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星光剪影</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-deep: #0a0f1a;
  --night-mid: #1a2744;
  --silhouette-dark: #0d1520;
  --silhouette-mid: #162035;
  --star-warm: #ffd89b;
  --star-white: #e8f0ff;
  --card-bg: rgba(15,20,35,0.88);
  --card-border: rgba(255,216,155,0.3);
  --text-light: #f0e6d3;
  --text-muted: rgba(240,230,211,0.6);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #050810 0%, #0a0f1a 40%, #1a2744 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星星们 */
.stars {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
  overflow: hidden;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: var(--star-white);
  animation: twinkle ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 前景剪影 - 山脉/树林 */
.silhouette {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 180px;
  z-index: 1; pointer-events: none;
}

.hill {
  position: absolute; bottom: 0;
  background: var(--silhouette-dark);
}

.hill-1 {
  left: -5%; width: 50%; height: 120px;
  border-radius: 60% 80% 0 0;
}

.hill-2 {
  left: 30%; width: 55%; height: 160px;
  background: var(--silhouette-mid);
  border-radius: 70% 60% 0 0;
}

.hill-3 {
  right: -5%; width: 45%; height: 100px;
  border-radius: 50% 70% 0 0;
}

/* 树剪影 */
.tree {
  position: absolute;
  bottom: 0;
}

.trunk {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  background: var(--silhouette-dark);
}

.foliage {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-style: solid;
}

.tree-1 { left: 8%; }
.tree-1 .trunk { width: 6px; height: 35px; }
.tree-1 .foliage {
  border-width: 0 18px 40px 18px;
  border-color: transparent transparent var(--silhouette-dark) transparent;
  margin-bottom: 30px;
}

.tree-2 { left: 18%; }
.tree-2 .trunk { width: 5px; height: 28px; }
.tree-2 .foliage {
  border-width: 0 14px 32px 14px;
  border-color: transparent transparent var(--silhouette-dark) transparent;
  margin-bottom: 24px;
}

.tree-3 { right: 12%; }
.tree-3 .trunk { width: 7px; height: 40px; }
.tree-3 .foliage {
  border-width: 0 20px 45px 20px;
  border-color: transparent transparent var(--silhouette-mid) transparent;
  margin-bottom: 35px;
}

.tree-4 { right: 22%; }
.tree-4 .trunk { width: 5px; height: 30px; }
.tree-4 .foliage {
  border-width: 0 15px 35px 15px;
  border-color: transparent transparent var(--silhouette-mid) transparent;
  margin-bottom: 26px;
}

/* 月亮 */
.moon {
  position: fixed;
  top: 12%; right: 18%;
  width: 60px; height: 60px;
  background: radial-gradient(circle at 35% 35%, #fff8e7 0%, #f5e6a3 50%, #e8c86e 100%);
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255,240,150,0.4), 0 0 60px rgba(255,220,100,0.2);
  z-index: 0;
  animation: moonGlow 5s ease-in-out infinite;
}

@keyframes moonGlow {
  0%, 100% { box-shadow: 0 0 30px rgba(255,240,150,0.4), 0 0 60px rgba(255,220,100,0.2); }
  50% { box-shadow: 0 0 40px rgba(255,240,150,0.5), 0 0 80px rgba(255,220,100,0.3); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(420px, 90vw);
  min-height: 480px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  box-shadow:
    0 16px 50px rgba(0,0,0,0.5),
    0 4px 16px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.05);
  border: 1px solid var(--card-border);
  animation: cardFloat 6s ease-in-out infinite;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-8px) rotate(0.5deg); }
}

/* 边框流光 */
.card::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 21px;
  background: linear-gradient(135deg, rgba(255,216,155,0.4), rgba(255,200,100,0.15), rgba(255,216,155,0.4));
  background-size: 200% 200%;
  animation: borderFlow 5s ease-in-out infinite;
  z-index: -1;
  opacity: 0.5;
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; opacity: 0.3; }
  50% { background-position: 100% 50%; opacity: 0.6; }
}

/* 图标月亮装饰 */
.moon-icon {
  font-size: 44px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(255,216,155,0.4));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 装饰线 */
.divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,216,155,0.5), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字 */
.name {
  font-size: clamp(26px, 7vw, 44px);
  color: var(--text-light);
  font-weight: 600;
  text-align: center;
  letter-spacing: 4px;
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
  text-shadow: 0 2px 12px rgba(255,216,155,0.3);
}

.date {
  font-size: clamp(11px, 3.5vw, 14px);
  color: var(--text-muted);
  letter-spacing: 5px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(13px, 4vw, 16px);
  color: rgba(240,230,211,0.82);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(11px, 3.5vw, 13px);
  color: var(--text-muted);
  letter-spacing: 3px;
  margin-top: 4px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

.bottom-text {
  position: absolute;
  bottom: 18px;
  font-size: 10px;
  color: rgba(255,216,155,0.35);
  letter-spacing: 3px;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 流星 */
.shooting-star {
  position: fixed;
  width: 80px; height: 2px;
  background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
  border-radius: 50%;
  z-index: 0;
  animation: shoot linear infinite;
  opacity: 0;
}

@keyframes shoot {
  0% { transform: translateX(0) translateY(0); opacity: 0; }
  5% { opacity: 1; }
  30% { opacity: 0; transform: translateX(200px) translateY(120px); }
  100% { opacity: 0; }
}

.shooting-star:nth-child(1) { top: 15%; left: 60%; animation-duration: 4s; animation-delay: 2s; }
.shooting-star:nth-child(2) { top: 25%; left: 70%; animation-duration: 5s; animation-delay: 7s; width: 60px; }

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .moon { animation: none; }
  .name, .date, .blessing, .from, .divider, .bottom-text { opacity: 1; }
}

@media (max-width: 480px) {
  .card { padding: 36px 24px; min-height: 420px; }
  .moon { width: 45px; height: 45px; top: 10%; right: 15%; }
  .tree-3, .tree-4 { display: none; }
}
</style>
</head>
<body>

<!-- 月亮 -->
<div class="moon"></div>

<div class="stars">

  <div class="star" style="top:5%;left:55%;width:2px;height:2px;animation-duration:3.5s;animation-delay:1s;"></div>
  <div class="star" style="top:18%;left:25%;width:2px;height:2px;animation-duration:2.8s;animation-delay:1.5s;"></div>
  <div class="star" style="top:22%;left:75%;width:3px;height:3px;animation-duration:2.3s;animation-delay:2s;"></div>
  <div class="star" style="top:30%;left:45%;width:2px;height:2px;animation-duration:3.2s;animation-delay:0.8s;"></div>

  <div class="hill hill-2"></div>
  <div class="hill hill-3"></div>

  <div class="tree tree-1">

<script>
