<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晴空万里</title>
<meta property="og:title" content="☁️ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-top: #4a9fd4;
  --sky-mid: #87ceeb;
  --sky-low: #c5e8f8;
  --sky-horizon: #e8f4fb;
  --sun-yellow: #ffe066;
  --sun-glow: rgba(255, 230, 100, 0.6);
  --cloud-white: #ffffff;
  --cloud-shadow: rgba(180, 210, 240, 0.5);
  --card-bg: rgba(255, 255, 255, 0.92);
  --card-border: rgba(135, 206, 235, 0.5);
  --text-main: #2a5a80;
  --text-muted: #5a8aaa;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #4a9fd4 0%,
    #87ceeb 30%,
    #c5e8f8 60%,
    #e8f4fb 85%,
    #f0f8ff 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 阳光光晕 */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: 5%;
  width: 180px;
  height: 180px;
  background: radial-gradient(circle, rgba(255,240,120,0.8) 0%, rgba(255,220,60,0.4) 35%, transparent 65%);
  border-radius: 50%;
  animation: sunPulse 3s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes sunPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* 阳光射线 */
.sun-rays {
  position: fixed;
  top: -30%;
  right: -10%;
  width: 400px;
  height: 400px;
  z-index: 1;
  pointer-events: none;
}

.ray {
  position: absolute;
  width: 3px;
  height: 200px;
  background: linear-gradient(to bottom, rgba(255,240,120,0.7) 0%, transparent 100%);
  transform-origin: center bottom;
  opacity: 0.4;
}

/* 云朵 */
.clouds {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  overflow: hidden;
}

.cloud {
  position: absolute;
  filter: drop-shadow(0 4px 8px rgba(180,210,240,0.4));
  transition: filter 0.3s;
}

@keyframes cloudFloat1 {
  0% { transform: translateX(-160px) translateY(0); }
  50% { transform: translateX(calc(50vw - 80px)) translateY(-8px); }
  100% { transform: translateX(calc(100vw + 160px)) translateY(0); }
}

@keyframes cloudFloat2 {
  0% { transform: translateX(-200px) translateY(0); }
  50% { transform: translateX(calc(50vw - 100px)) translateY(6px); }
  100% { transform: translateX(calc(100vw + 200px)) translateY(0); }
}

/* 热气球 */
.balloon {
  position: fixed;
  z-index: 4;
  font-size: 52px;
  top: 15%;
  left: 12%;
  animation: balloonBob 5s ease-in-out infinite;
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
  pointer-events: none;
}

@keyframes balloonBob {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-16px) rotate(3deg); }
}

/* 飞鸟 */
.birds {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  overflow: hidden;
}

.bird {
  position: absolute;
  font-size: 11px;
  animation: birdSwoop linear infinite;
}

@keyframes birdSwoop {
  0% { transform: translateX(-60px) translateY(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateX(calc(100vw + 60px)) translateY(-30px); opacity: 0; }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  perspective: 1000px;
}

.card {
  position: relative;
  background: var(--card-bg);
  border-radius: 24px;
  padding: clamp(28px, 6vw, 52px) clamp(24px, 5vw, 48px);
  text-align: center;
  box-shadow:
    0 4px 24px rgba(74, 159, 212, 0.25),
    0 12px 40px rgba(100, 170, 210, 0.2),
    0 2px 8px rgba(0,0,0,0.06);
  border: 1.5px solid var(--card-border);
  animation: cardFloat 4s ease-in-out infinite;
  max-width: min(480px, 92vw);
  width: 100%;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-7px) rotate(0.5deg); }
  66% { transform: translateY(-4px) rotate(-0.5deg); }
}

.icon {
  font-size: clamp(38px, 8vw, 58px);
  margin-bottom: 10px;
  display: block;
  animation: iconBounce 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}

@keyframes iconBounce {
  from { opacity: 0; transform: scale(0.4) translateY(-20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.name {
  font-size: clamp(26px, 7vw, 44px);
  font-weight: normal;
  color: var(--text-main);
  margin-bottom: 10px;
  letter-spacing: 0.06em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-muted);
  margin-bottom: 18px;
  letter-spacing: 0.12em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.8s both;
}

.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: var(--text-main);
  line-height: 1.8;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-muted);
  letter-spacing: 0.08em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.4s both;
}

.from::before { content: '— '; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 蓝色渐变边框呼吸 */
.card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, #87ceeb, #4a9fd4, #87ceeb, #ffd060);
  background-size: 300% 300%;
  animation: skyBorder 4s ease-in-out infinite;
  z-index: -1;
  opacity: 0.55;
}

@keyframes skyBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@media (prefers-reduced-motion: reduce) {
  .card, .balloon, .cloud, .bird { animation: none; }
  .name, .date, .blessing, .from, .icon { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 阳光光晕 -->
<div class="sun-rays" id="rays"></div>

<!-- 云朵 -->
<div class="clouds" id="clouds"></div>

<!-- 热气球 -->
<div class="balloon" id="balloon">🎈</div>

<!-- 飞鸟 -->
<div class="birds" id="birds"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">☁️</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
// 读取参数
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的天空永远晴朗';
document.getElementById('fromEl').textContent = p.get('f') || '';
if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');

// 生成阳光射线
const raysEl = document.getElementById('rays');
for (let i = 0; i < 10; i++) {
  const ray = document.createElement('div');
  ray.className = 'ray';
  ray.style.transform = `rotate(${-60 + i * 14}deg)`;
  ray.style.height = (160 + Math.random() * 80) + 'px';
  ray.style.opacity = (0.3 + Math.random() * 0.3).toFixed(2);
  raysEl.appendChild(ray);
}

// 生成云朵
const cloudsEl = document.getElementById('clouds');
const cloudStyles = [
  { emoji: '☁️', size: 52, top: 8, duration: 35, delay: 0 },
  { emoji: '🌤️', size: 38, top: 18, duration: 28, delay: 8 },
  { emoji: '☁️', size: 60, top: 5, duration: 45, delay: 15 },
  { emoji: '🌤️', size: 34, top: 22, duration: 32, delay: 22 },
  { emoji: '☁️', size: 44, top: 12, duration: 40, delay: 5 },
];
cloudStyles.forEach((c, i) => {
  const cloud = document.createElement('div');
  cloud.className = 'cloud';
  cloud.textContent = c.emoji;
  cloud.style.fontSize = c.size + 'px';
  cloud.style.top = c.top + '%';
  cloud.style.left = '0';
  cloud.style.animation = `cloudFloat${(i % 2) + 1} ${c.duration}s linear ${c.delay}s infinite`;
  cloudsEl.appendChild(cloud);
});

// 生成飞鸟
const birdsEl = document.getElementById('birds');
for (let i = 0; i < 4; i++) {
  const bird = document.createElement('div');
  bird.className = 'bird';
  bird.textContent = '🕊️';
  bird.style.top = (10 + i * 5) + '%';
  bird.style.fontSize = (9 + Math.random() * 5) + 'px';
  bird.style.animationDuration = (18 + Math.random() * 10) + 's';
  bird.style.animationDelay = (Math.random() * 15) + 's';
  birdsEl.appendChild(bird);
}

// 减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.ray, .cloud, .bird, .balloon').forEach(el => el.style.display = 'none');
}
</script>
</body>
</html>
