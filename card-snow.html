<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冬日雪夜</title>
<meta property="og:title" content="❄️ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-deep: #0a1628;
  --night-mid: #1a2d4a;
  --snow-white: #e8f4ff;
  --ice-blue: #a8d4f0;
  --warm-glow: #ffd89b;
  --card-bg: rgba(10, 22, 40, 0.88);
  --card-border: rgba(168, 212, 240, 0.25);
  --text-ice: #c8e8ff;
  --text-cream: #f0f8ff;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #0a1628 0%,
    #1a2d4a 40%,
    #2a4a6a 70%,
    #3a5a7a 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 雪花 */
.snow-wrap { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.snowflake {
  position: absolute;
  color: rgba(255,255,255,0.85);
  animation: snowfall linear infinite;
  top: -20px;
  font-size: 14px;
}
@keyframes snowfall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.8; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* 木屋灯光 */
.cabin {
  position: fixed;
  bottom: 18%;
  left: 50%;
  transform: translateX(-60%);
  z-index: 1;
}
.cabin-body {
  width: 50px;
  height: 35px;
  background: #5c3a1e;
  border-radius: 2px;
  position: relative;
}
.cabin-roof {
  position: absolute;
  top: -18px;
  left: -8px;
  width: 0;
  height: 0;
  border-left: 33px solid transparent;
  border-right: 33px solid transparent;
  border-bottom: 20px solid #8b5e3c;
}
.cabin-window {
  position: absolute;
  width: 12px;
  height: 12px;
  background: rgba(255, 220, 120, 0.9);
  border: 1px solid #c8a060;
  top: 8px;
  animation: windowGlow 2s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(255, 200, 100, 0.6);
}
.cabin-window.left { left: 6px; }
.cabin-window.right { right: 6px; }
@keyframes windowGlow {
  0%, 100% { background: rgba(255, 220, 120, 0.85); }
  50% { background: rgba(255, 200, 80, 1); }
}

/* 雪松 */
.tree {
  position: fixed;
  bottom: 15%;
  z-index: 1;
}
.tree.left { left: 8%; }
.tree.right { right: 8%; transform: scaleX(-1); }
.tree svg { width: 60px; height: 90px; opacity: 0.9; }

/* 地面积雪 */
.ground {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 15%;
  background: linear-gradient(180deg, #d8eefe 0%, #e8f4ff 100%);
  border-radius: 50% 50% 0 0 / 20% 20% 0 0;
  z-index: 1;
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  cursor: pointer;
  perspective: 1000px;
  margin: 20px;
}
.card {
  width: min(420px, 92vw);
  min-height: 260px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 36px 32px;
  text-align: center;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow:
    0 0 20px rgba(168, 212, 240, 0.15),
    0 8px 32px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
  animation: borderPulse 4s ease-in-out infinite;
}
@keyframes borderPulse {
  0%, 100% { border-color: rgba(168, 212, 240, 0.2); }
  50% { border-color: rgba(168, 212, 240, 0.5); }
}
.card.flipped { transform: rotateY(180deg); }
.card-front, .card-back {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.card-back {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(20, 50, 80, 0.95), rgba(10, 30, 60, 0.95));
  border: 1px solid rgba(168, 212, 240, 0.3);
  border-radius: 16px;
  padding: 36px 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: rotateY(180deg);
  font-size: clamp(14px, 3.5vw, 17px);
  color: var(--text-ice);
  line-height: 1.8;
  letter-spacing: 0.05em;
  animation: fadeSlideIn 1s ease-out both;
}
.back-text { opacity: 1; }

.name {
  font-size: clamp(28px, 7vw, 48px);
  color: #ffffff;
  text-shadow: 0 0 20px rgba(168, 212, 240, 0.6);
  margin-bottom: 10px;
  animation: fadeSlideIn 1s ease-out 0.3s both;
}
.date {
  font-size: clamp(13px, 3vw, 16px);
  color: var(--ice-blue);
  margin-bottom: 18px;
  letter-spacing: 0.12em;
  animation: fadeSlideIn 1s ease-out 0.6s both;
}
.blessing {
  font-size: clamp(16px, 4vw, 22px);
  color: var(--text-cream);
  line-height: 1.8;
  margin-bottom: 20px;
  animation: fadeSlideIn 1s ease-out 0.9s both;
}
.from {
  font-size: clamp(13px, 3vw, 16px);
  color: var(--ice-blue);
  letter-spacing: 0.1em;
  animation: fadeSlideIn 1s ease-out 1.2s both;
}

.hint {
  position: absolute;
  bottom: 12px;
  right: 16px;
  font-size: 11px;
  color: rgba(168, 212, 240, 0.4);
  animation: fadeSlideIn 1s ease-out 1.5s both;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 极光 */
.aurora {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 45%;
  background: linear-gradient(180deg,
    rgba(80, 160, 200, 0.06) 0%,
    rgba(100, 180, 220, 0.04) 50%,
    transparent 100%);
  z-index: 0;
  animation: auroraWave 8s ease-in-out infinite;
  pointer-events: none;
}
@keyframes auroraWave {
  0%, 100% { opacity: 0.5; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-10px); }
}

/* 响应式 */
@media (max-width: 480px) {
  .card { padding: 28px 20px; min-height: 220px; }
  .tree svg { width: 40px; height: 60px; }
  .cabin-body { width: 36px; height: 26px; }
}
</style>
</head>
<body>

<div class="aurora"></div>
<div class="snow-wrap" id="snowWrap"></div>

<!-- 木屋 -->
<div class="cabin">
  <div class="cabin-roof"></div>
  <div class="cabin-body">
    <div class="cabin-window left"></div>
    <div class="cabin-window right"></div>
  </div>
</div>

<!-- 雪松左 -->
<div class="tree left">
  <svg viewBox="0 0 60 90" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="30,5 55,35 5,35" fill="#1a5c3a"/>
    <polygon points="30,20 58,50 2,50" fill="#1a6c40"/>
    <polygon points="30,38 60,70 0,70" fill="#1a7c48"/>
    <rect x="25" y="70" width="10" height="14" fill="#5c3a1e"/>
    <circle cx="20" cy="30" r="4" fill="rgba(255,255,255,0.7)"/>
    <circle cx="38" cy="45" r="3" fill="rgba(255,255,255,0.6)"/>
    <circle cx="15" cy="55" r="3.5" fill="rgba(255,255,255,0.7)"/>
    <circle cx="42" cy="62" r="2.5" fill="rgba(255,255,255,0.6)"/>
  </svg>
</div>

<!-- 雪松右 -->
<div class="tree right">
  <svg viewBox="0 0 60 90" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="30,5 55,35 5,35" fill="#1a5c3a"/>
    <polygon points="30,20 58,50 2,50" fill="#1a6c40"/>
    <polygon points="30,38 60,70 0,70" fill="#1a7c48"/>
    <rect x="25" y="70" width="10" height="14" fill="#5c3a1e"/>
    <circle cx="22" cy="28" r="3.5" fill="rgba(255,255,255,0.7)"/>
    <circle cx="40" cy="48" r="3" fill="rgba(255,255,255,0.6)"/>
    <circle cx="18" cy="58" r="2.5" fill="rgba(255,255,255,0.7)"/>
  </svg>
</div>

<!-- 积雪地面 -->
<div class="ground"></div>

<!-- 贺卡 -->
<div class="card-wrap" id="cardWrap">
  <div class="card" id="card">
    <div class="card-front">
      <div class="name" id="nameEl"></div>
      <div class="date" id="dateEl"></div>
      <div class="blessing" id="blessingEl"></div>
      <div class="from" id="fromEl"></div>
      <div class="hint">❄️ 点击卡片打开</div>
    </div>
    <div class="card-back">
      <div class="back-text" id="backEl"></div>
    </div>
  </div>
</div>

<script>
// 雪花
const snowWrap = document.getElementById('snowWrap');
const flakes = ['❄', '❅', '❆', '✻', '✼', '❉'];
for (let i = 0; i < 35; i++) {
  const s = document.createElement('div');
  s.className = 'snowflake';
  s.textContent = flakes[Math.floor(Math.random() * flakes.length)];
  s.style.left = Math.random() * 100 + '%';
  s.style.fontSize = (8 + Math.random() * 12) + 'px';
  s.style.animationDuration = (5 + Math.random() * 8) + 's';
  s.style.animationDelay = Math.random() * 8 + 's';
  s.style.opacity = 0.4 + Math.random() * 0.5;
  snowWrap.appendChild(s);
}

// 参数
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的冬天永远温暖如春';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

if (p.get('back')) {
  document.getElementById('backEl').innerHTML = p.get('back').replace(/\\n/g, '<br>');
}

// 翻转
const cardWrap = document.getElementById('cardWrap');
const card = document.getElementById('card');
cardWrap.addEventListener('click', () => {
  card.classList.toggle('flipped');
});
</script>
</body>
</html>
