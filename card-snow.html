<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冬日初雪</title>
<meta property="og:title" content="❄️ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --snow-deep: #0a1628;
  --snow-night: #0f2040;
  --snow-blue: #4a7ab0;
  --snow-light: #a8c8e8;
  --snow-white: #e8f4ff;
  --accent-ice: #88ccff;
  --text-warm: #ddeeff;
  --text-muted: rgba(200, 220, 240, 0.65);
  --card-bg: rgba(10, 25, 50, 0.88);
  --card-border: rgba(136, 204, 255, 0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #0a1628 0%,
    #0f2040 30%,
    #1a3a60 55%,
    #0f2040 75%,
    #0a1628 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 雪花 */
.snowflake {
  position: fixed;
  z-index: 5; pointer-events: none;
  color: #c8e4ff;
  opacity: 0.85;
  font-size: 12px;
  animation: snowfall linear infinite;
  text-shadow: 0 0 4px rgba(136, 204, 255, 0.6);
}
@keyframes snowfall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.9; }
  90%  { opacity: 0.8; }
  100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
}

/* 地面积雪 */
.ground {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(180deg, #c8e0f0 0%, #e8f4ff 100%);
  z-index: 1;
  border-radius: 50% 50% 0 0 / 20px 20px 0 0;
  box-shadow: 0 -8px 30px rgba(200, 220, 255, 0.5);
}
.ground::before {
  content: '';
  position: absolute;
  top: -15px; left: 0; right: 0;
  height: 30px;
  background: radial-gradient(ellipse 80px 30px at 20% 100%, #d8ecff 0%, transparent 70%),
              radial-gradient(ellipse 120px 40px at 50% 100%, #e0f0ff 0%, transparent 70%),
              radial-gradient(ellipse 90px 35px at 80% 100%, #d8ecff 0%, transparent 70%);
}

/* 星星 */
.stars {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}
.star {
  position: absolute;
  width: 1.5px; height: 1.5px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.3); }
}

/* 极光 */
.aurora {
  position: fixed; top: 0; left: 0; right: 0;
  height: 50%;
  z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 30% at 30% 15%, rgba(80, 180, 255, 0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 25% at 70% 20%, rgba(120, 200, 255, 0.10) 0%, transparent 70%);
  animation: auroraShift 8s ease-in-out infinite alternate;
}
@keyframes auroraShift {
  0%   { opacity: 0.6; transform: translateX(-3%); }
  100% { opacity: 1;   transform: translateX(3%); }
}

/* 卡片外框呼吸光效 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 24px;
  background: linear-gradient(135deg, #88ccff, #4a9fd4, #88ccff);
  background-size: 200% 200%;
  animation: borderFlow 4s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(136, 204, 255, 0.3),
    0 0 40px rgba(136, 204, 255, 0.15);
}
@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(136,204,255,0.3), 0 0 40px rgba(136,204,255,0.15); }
  50%       { background-position: 100% 50%; box-shadow: 0 0 30px rgba(136,204,255,0.5), 0 0 60px rgba(136,204,255,0.25); }
}

/* 卡片主体 */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 22px;
  padding: clamp(28px, 6vw, 50px) clamp(24px, 5vw, 44px);
  max-width: 90vw;
  width: 480px;
  text-align: center;
  animation: cardFloat 4s ease-in-out infinite;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-8px); }
}

/* 雪花装饰 */
.snow-icon {
  font-size: clamp(28px, 6vw, 44px);
  margin-bottom: 10px;
  display: block;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 0 8px rgba(136, 204, 255, 0.7));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.5); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(24px, 6vw, 42px);
  color: var(--text-warm);
  margin-bottom: 14px;
  font-weight: normal;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.4s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.date {
  font-size: clamp(12px, 3vw, 16px);
  color: var(--text-muted);
  margin-bottom: 22px;
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.7s both;
}

.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: var(--snow-white);
  line-height: 1.9;
  margin-bottom: 28px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 1.0s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--accent-ice);
  letter-spacing: 1px;
  opacity: 1;
  animation: fadeUp 1.2s ease-out 1.3s both;
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .snowflake, .star, .aurora, .card-wrap, .card, .snow-icon { animation: none !important; }
  .snowflake { display: none; }
}
</style>
</head>
<body>

<div class="aurora"></div>
<div class="stars" id="stars"></div>
<div class="ground"></div>

<div class="card-wrap">
  <div class="card">
    <span class="snow-icon">❄️</span>
    <div class="name"  id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent     = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent     = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的世界里，每一场雪都带着温柔';
document.getElementById('fromEl').textContent     = p.get('f') ? '— ' + p.get('f') : '';

// 雪花生成
function createSnow() {
  const snowflakes = ['❄', '❅', '❆', '✻', '✼', '•'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'snowflake';
    el.textContent = snowflakes[Math.floor(Math.random() * snowflakes.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (8 + Math.random() * 12) + 'px';
    el.style.animationDuration = (5 + Math.random() * 8) + 's';
    el.style.animationDelay = Math.random() * 8 + 's';
    el.style.opacity = 0.4 + Math.random() * 0.6;
    document.body.appendChild(el);
  }
}

// 星星生成
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top  = Math.random() * 60 + '%';
    s.style.animationDuration = (2 + Math.random() * 4) + 's';
    s.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(s);
  }
}

const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!reduced) {
  createStars();
  createSnow();
}
</script>
</body>
</html>
