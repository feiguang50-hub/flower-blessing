<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动健身祝福</title>
<meta property="og:title" content="💪 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0a1628 0%, #1a3a6c 40%, #2d5a8c 100%);
  font-family: 'Arial Black', 'Arial', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 运动光线背景 === */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,140,30,0.3) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 100%, rgba(0,150,255,0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 80%, rgba(255,200,50,0.12) 0%, transparent 40%);
  animation: energyPulse 4s ease-in-out infinite;
  z-index: 0; pointer-events: none;
}
@keyframes energyPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.03); }
}

/* === 速度线 === */
.speed-line {
  position: fixed;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(255,200,50,0.6), transparent);
  animation: speedMove linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes speedMove {
  0% { transform: translateX(-100%); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateX(200vw); opacity: 0; }
}

/* === 卡片 === */
.card-wrap {
  perspective: 1200px;
  z-index: 10;
  margin: 40px 16px;
}
.card {
  position: relative;
  width: min(90vw, 400px);
  min-height: 500px;
  background: linear-gradient(160deg, rgba(15,40,80,0.9) 0%, rgba(25,60,110,0.9) 100%);
  border-radius: 22px;
  padding: 40px 32px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  border: 1.5px solid rgba(255,200,50,0.4);
  box-shadow: 0 0 50px rgba(255,150,0,0.2), inset 0 0 40px rgba(0,120,255,0.08);
  animation: cardFloat 4s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* === 边框脉冲 === */
.card::before {
  content: '';
  position: absolute; inset: -1.5px;
  border-radius: 24px;
  background: conic-gradient(from 0deg, #ff8c00, #ffd700, #ff8c00, #ffd700, #ff8c00);
  background-size: 300% 300%;
  animation: borderFlow 3s linear infinite;
  z-index: -1;
  opacity: 0.5;
}
@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* === 图标区 === */
.icon-row {
  font-size: clamp(36px, 10vw, 56px);
  margin-bottom: 16px;
  opacity: 1;
  animation: iconDrop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes iconDrop {
  from { transform: translateY(-40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* === 文字 === */
.label {
  font-size: clamp(11px, 3vw, 14px);
  letter-spacing: 5px;
  color: rgba(255,200,50,0.7);
  text-transform: uppercase;
  margin-bottom: 10px;
  opacity: 1;
}
.name {
  font-size: clamp(28px, 8vw, 46px);
  font-weight: 900;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,180,0,0.7), 0 0 50px rgba(255,150,0,0.3);
  margin-bottom: 10px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}
.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: rgba(255,255,255,0.9);
  line-height: 1.7;
  margin: 8px 0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.8s both;
}
.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(255,200,50,0.55);
  letter-spacing: 3px;
  margin-top: 18px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}
.from {
  font-size: clamp(13px, 3.5vw, 16px);
  color: rgba(255,220,150,0.8);
  margin-top: 14px;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.3s both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === 运动粒子 === */
.sweat {
  position: fixed;
  font-size: 10px;
  animation: sweatDrop linear infinite;
  z-index: 3;
  pointer-events: none;
}
@keyframes sweatDrop {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  15% { opacity: 0.9; }
  85% { opacity: 0.4; }
  100% { transform: translateY(100vh) scale(0.6); opacity: 0; }
}

/* === 音符 === */
.note {
  position: fixed;
  font-size: 14px;
  animation: noteFloat linear infinite;
  z-index: 2;
  pointer-events: none;
  opacity: 0;
}
@keyframes noteFloat {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  20% { opacity: 0.7; }
  80% { opacity: 0.4; }
  100% { transform: translateY(-80px) rotate(15deg); opacity: 0; }
}

/* === 响应式 === */
@media (max-width: 400px) {
  .card { padding: 30px 20px; min-height: 460px; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <div class="icon-row">💪🏋️‍♂️🔥</div>
    <div class="label">运动祝福</div>
    <div class="name" id="nameEl">运动达人</div>
    <div class="blessing" id="blessingEl">汗水不会辜负你<br>每一次坚持都在靠近更好的自己</div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '运动达人';
document.getElementById('blessingEl').textContent = p.get('b') || '汗水不会辜负你\n每一次坚持都在靠近更好的自己';
document.getElementById('blessingEl').innerHTML = document.getElementById('blessingEl').textContent.replace(/\\n/g,'<br>');
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 速度线
function spawnSpeedLine() {
  const l = document.createElement('div');
  l.className = 'speed-line';
  l.style.top = (5 + Math.random()*90)+'%';
  l.style.width = (60 + Math.random()*150)+'px';
  l.style.animationDuration = (0.8 + Math.random()*1.2)+'s';
  document.body.appendChild(l);
  setTimeout(()=>l.remove(), 3000);
}
setInterval(spawnSpeedLine, 800);
for (let i = 0; i < 4; i++) setTimeout(spawnSpeedLine, i*600);

// 汗水滴
const drops = ['💦','汗','💧'];
function spawnDrop() {
  const d = document.createElement('div');
  d.className = 'sweat';
  d.textContent = drops[Math.floor(Math.random()*drops.length)];
  d.style.left = (5 + Math.random()*90)+'%';
  d.style.top = '-20px';
  d.style.fontSize = (8 + Math.random()*12)+'px';
  d.style.animationDuration = (3 + Math.random()*4)+'s';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(), 8000);
}
for (let i = 0; i < 6; i++) setTimeout(spawnDrop, i*1000);
setInterval(spawnDrop, 1800);

// 音符
const notes = ['♪','♫','♬','🎵'];
function spawnNote() {
  const n = document.createElement('div');
  n.className = 'note';
  n.textContent = notes[Math.floor(Math.random()*notes.length)];
  n.style.left = (10 + Math.random()*80)+'%';
  n.style.bottom = '10%';
  n.style.animationDuration = (3 + Math.random()*4)+'s';
  document.body.appendChild(n);
  setTimeout(()=>n.remove(), 8000);
}
setInterval(spawnNote, 3000);
</script>
</body>
</html>
