<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>踏青游春</title>
<meta property="og:title" content="🌿 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #e8f5e9 0%, #c8e6c9 30%, #a5d6a7 60%, #81c784 85%, #66bb6a 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 阳光光晕 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 60% 15%, rgba(255,255,200,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(180,255,150,0.12) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 70%, rgba(200,255,120,0.1) 0%, transparent 35%);
  animation: sunShine 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes sunShine {
  0%, 100% { opacity: 0.75; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.06); }
}

/* 花瓣飘落 */
.petal {
  position: fixed;
  font-size: 13px;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 2px 5px rgba(0,0,0,0.08));
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0% { transform: translateY(-8vh) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.85; }
  60% { transform: translateY(55vh) translateX(35px) rotate(200deg); }
  85% { opacity: 0.4; }
  100% { transform: translateY(108vh) translateX(-15px) rotate(380deg); opacity: 0; }
}

/* 蝴蝶飞舞 */
.butterfly {
  position: fixed;
  font-size: 14px;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 3px 8px rgba(100,180,80,0.15));
  animation: butterflyFly ease-in-out infinite;
}
@keyframes butterflyFly {
  0% { transform: translate(0, 0) rotate(0deg) scale(0.7); opacity: 0; }
  10% { opacity: 0.85; }
  40% { transform: translate(50px, -40px) rotate(15deg) scale(1); }
  70% { transform: translate(30px, -25px) rotate(-10deg) scale(0.95); }
  90% { opacity: 0.3; }
  100% { transform: translate(80px, -8vh) rotate(10deg) scale(0.8); opacity: 0; }
}

/* 漂浮光点 */
.glow-dot {
  position: fixed;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(150,255,100,0.65);
  animation: dotFloat ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes dotFloat {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
  50% { transform: translateY(-22px) scale(1.4); opacity: 0.85; }
}

/* 草地 */
.grass {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 60px;
  background: linear-gradient(0deg, rgba(56,142,60,0.35) 0%, transparent 100%);
  z-index: 1;
  pointer-events: none;
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 32px;
  background: linear-gradient(135deg, #66bb6a, #43a047, #66bb6a, #4caf50);
  background-size: 400% 400%;
  animation: greenBorder 5s ease infinite;
  box-shadow: 0 8px 36px rgba(67,160,71,0.32), 0 0 55px rgba(120,200,100,0.15);
}
@keyframes greenBorder {
  0% { background-position: 0% 50%; box-shadow: 0 8px 36px rgba(67,160,71,0.32), 0 0 45px rgba(120,200,100,0.1); }
  50% { background-position: 100% 50%; box-shadow: 0 8px 44px rgba(74,175,80,0.42), 0 0 75px rgba(130,210,110,0.22); }
  100% { background-position: 0% 50%; box-shadow: 0 8px 36px rgba(67,160,71,0.32), 0 0 45px rgba(120,200,100,0.1); }
}

.card {
  background: rgba(255,255,248,0.9);
  border-radius: 30px;
  padding: clamp(36px, 7vw, 52px) clamp(28px, 6vw, 44px);
  text-align: center;
  max-width: min(500px, 92vw);
  width: 100%;
  box-shadow: 0 12px 40px rgba(67,160,71,0.15), inset 0 0 28px rgba(200,255,180,0.25);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.4deg); }
  50% { transform: translateY(-7px) rotate(0.4deg); }
}

/* 卡片内光效 */
.card::before {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: radial-gradient(ellipse at 50% 50%, rgba(200,255,150,0.22) 0%, transparent 60%);
  animation: shimmer 6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(8%, 8%); }
}

/* 图标 */
.card-icon {
  font-size: clamp(46px, 10vw, 68px);
  display: block;
  margin-bottom: 14px;
  animation: iconBounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(67,160,71,0.3));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  30% { transform: scale(1.12) translateY(-4px); }
  60% { transform: scale(0.96) translateY(0); }
  80% { transform: scale(1.06) translateY(-2px); }
}

/* 名字 */
.name {
  font-size: clamp(28px, 7.5vw, 50px);
  color: #2e7d32;
  letter-spacing: 5px;
  margin-bottom: 12px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes textSlideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 日期 */
.date {
  font-size: clamp(11px, 2.5vw, 15px);
  color: #558b2f;
  letter-spacing: 3px;
  margin-bottom: 28px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.48s both;
}

/* 祝福语 */
.blessing {
  font-size: clamp(15px, 3.5vw, 20px);
  color: #33691e;
  line-height: 1.9;
  letter-spacing: 1.5px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.65s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 2.8vw, 16px);
  color: #558b2f;
  letter-spacing: 2px;
  margin-top: 28px;
  opacity: 1;
  animation: textSlideIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.82s both;
}

/* 装饰：花朵 */
.card::after {
  content: '🌸';
  position: absolute;
  bottom: 10px; left: 14px;
  font-size: clamp(18px, 3.5vw, 24px);
  opacity: 0.18;
  animation: flowerSway 4s ease-in-out infinite;
}
@keyframes flowerSway {
  0%, 100% { transform: rotate(-8deg) scale(1); }
  50% { transform: rotate(8deg) scale(1.08); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .petal, .butterfly, .glow-dot, .card-wrap, .card, .card-icon, .name, .date, .blessing, .from { animation: none !important; }
}
</style>
</head>
<body>

<div class="grass"></div>

<div class="card-wrap">
  <div class="card">
    <span class="card-icon">🌿</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '春光明媚，愿你心情如春日的风一样轻盈';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.petal, .butterfly, .glow-dot').forEach(el => el.remove());
}

// 生成花瓣
const petalEmojis = ['🌸', '🪷', '💮', '🌺'];
for (let i = 0; i < 14; i++) {
  const f = document.createElement('div');
  f.className = 'petal';
  f.textContent = petalEmojis[i % petalEmojis.length];
  f.style.left = Math.random() * 100 + 'vw';
  f.style.animationDuration = (7 + Math.random() * 7) + 's';
  f.style.animationDelay = (Math.random() * 10) + 's';
  f.style.fontSize = (11 + Math.random() * 8) + 'px';
  document.body.appendChild(f);
}

// 生成蝴蝶
const butterflyEmojis = ['🦋', '🐝', '🪰'];
for (let i = 0; i < 5; i++) {
  const b = document.createElement('div');
  b.className = 'butterfly';
  b.textContent = butterflyEmojis[i % butterflyEmojis.length];
  b.style.top = (10 + Math.random() * 60) + 'vh';
  b.style.left = '-10vw';
  b.style.animationDuration = (6 + Math.random() * 5) + 's';
  b.style.animationDelay = (1 + Math.random() * 8) + 's';
  b.style.fontSize = (12 + Math.random() * 6) + 'px';
  document.body.appendChild(b);
}

// 生成漂浮光点
for (let i = 0; i < 12; i++) {
  const d = document.createElement('div');
  d.className = 'glow-dot';
  d.style.left = Math.random() * 100 + 'vw';
  d.style.top = Math.random() * 100 + 'vh';
  d.style.animationDuration = (4 + Math.random() * 4) + 's';
  d.style.animationDelay = (Math.random() * 5) + 's';
  document.body.appendChild(d);
}
</script>
</body>
</html>
