<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星空许愿</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 50%, #2a1a4a 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星空背景 */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 流星 */
.shooting-star {
  position: fixed;
  width: 3px;
  height: 3px;
  background: linear-gradient(to right, #fff, transparent);
  border-radius: 50%;
  animation: shoot linear infinite;
  z-index: 1;
}
@keyframes shoot {
  0%   { transform: translateX(0) translateY(0); opacity: 1; }
  100% { transform: translateX(-300px) translateY(300px); opacity: 0; }
}

/* 卡片 */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(200,180,255,0.25);
  border-radius: 32px;
  padding: 52px 60px;
  text-align: center;
  max-width: 540px;
  width: 90vw;
  box-shadow: 0 20px 60px rgba(100,80,200,0.3);
  animation: float 4s ease-in-out infinite, cardIn 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
  position: relative;
  z-index: 10;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.8) translateY(40px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* 星星装饰 */
.card::before {
  content: '✨';
  font-size: 36px;
  display: block;
  margin-bottom: 20px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.2) rotate(10deg); }
}

/* 文字 */
.wish {
  font-size: clamp(16px, 3.5vw, 24px);
  color: rgba(255,255,255,0.5);
  letter-spacing: 6px;
  margin-bottom: 20px;
  opacity: 1;
  animation: fadeIn 1s ease-out 0.5s both;
}
.name {
  font-size: clamp(32px, 8vw, 60px);
  color: #fff;
  letter-spacing: 12px;
  margin-bottom: 24px;
  text-shadow: 0 0 30px rgba(200,180,255,0.6), 0 0 60px rgba(150,130,255,0.3);
  opacity: 1;
  animation: fadeIn 1s ease-out 0.8s both, glow 3s ease-in-out infinite 1.8s;
}
@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px rgba(200,180,255,0.6), 0 0 60px rgba(150,130,255,0.3); }
  50% { text-shadow: 0 0 50px rgba(200,180,255,0.9), 0 0 100px rgba(150,130,255,0.5); }
}
.blessing {
  font-size: clamp(14px, 3vw, 20px);
  color: rgba(255,255,255,0.85);
  line-height: 2;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeIn 1s ease-out 1.1s both;
}
.from {
  font-size: clamp(12px, 2.5vw, 16px);
  color: rgba(200,180,255,0.5);
  margin-top: 28px;
  letter-spacing: 4px;
  opacity: 1;
  animation: fadeIn 1s ease-out 1.4s both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 底部装饰 */
.card::after {
  content: '🌟';
  font-size: 28px;
  display: block;
  margin-top: 20px;
  animation: pulse 2s ease-in-out 0.5s infinite;
}
</style>
</head>
<body>

<div class="card">
  <div class="wish">WISH UPON A STAR</div>
  <div class="name" id="nameEl"></div>
  <div class="blessing" id="blessingEl"></div>
  <div class="from" id="fromEl"></div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 生成星星
const starsContainer = document.createElement('div');
starsContainer.className = 'stars';
document.body.appendChild(starsContainer);
for (let i = 0; i < 120; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + 'vw';
  star.style.top = Math.random() * 100 + 'vh';
  const size = 1 + Math.random() * 2;
  star.style.width = star.style.height = size + 'px';
  star.style.animationDuration = (1.5 + Math.random() * 2) + 's';
  star.style.animationDelay = Math.random() * 3 + 's';
  starsContainer.appendChild(star);
}

// 生成流星
for (let i = 0; i < 4; i++) {
  const meteor = document.createElement('div');
  meteor.className = 'shooting-star';
  meteor.style.left = (30 + Math.random() * 60) + 'vw';
  meteor.style.top = Math.random() * 40 + 'vh';
  meteor.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
  meteor.style.animationDelay = (3 + Math.random() * 5) + 's';
  meteor.style.width = (2 + Math.random() * 2) + 'px';
  meteor.style.height = '2px';
  document.body.appendChild(meteor);
}
</script>
</body>
</html>
