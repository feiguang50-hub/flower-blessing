<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星空许愿</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg, #050510 0%, #0a0a2a 40%, #1a0a3a 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 星云背景 === */
.nebula {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}
.nebula::before {
  content: ''; position: absolute; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(100,50,200,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(50,100,200,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(150,80,255,0.06) 0%, transparent 60%);
  animation: nebulaPulse 8s ease-in-out infinite;
}
@keyframes nebulaPulse {
  0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
  50% { transform: scale(1.1) rotate(5deg); opacity: 1; }
}

/* === 闪烁星星 === */
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

/* === 大星星 === */
.big-star {
  position: fixed; z-index: 2; pointer-events: none;
  animation: bigStarPulse ease-in-out infinite;
}
.big-star::before, .big-star::after {
  content: ''; position: absolute; background: #fff; border-radius: 2px;
}
.big-star::before { width: 2px; height: 20px; left: -1px; top: -10px; }
.big-star::after { width: 20px; height: 2px; left: -10px; top: -1px; }
@keyframes bigStarPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* === 流星 === */
.shooting-star {
  position: fixed; height: 2px;
  background: linear-gradient(to right, #fff, rgba(200,180,255,0.3), transparent);
  border-radius: 2px; animation: shootStar linear infinite;
  z-index: 3; pointer-events: none;
}
@keyframes shootStar {
  0% { transform: translateX(0) translateY(0) rotate(40deg); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translateX(400px) translateY(400px) rotate(40deg); opacity: 0; }
}

/* === 极光 === */
.aurora {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, transparent 60%, rgba(100,80,200,0.08) 80%, rgba(150,100,255,0.12) 90%, transparent 100%);
  animation: auroraWave 6s ease-in-out infinite;
  z-index: 1; pointer-events: none; opacity: 0.6;
}
@keyframes auroraWave {
  0%, 100% { transform: translateY(0) skewX(0deg); opacity: 0.5; }
  50% { transform: translateY(-30px) skewX(3deg); opacity: 0.8; }
}

/* === 星空边框 - 星辰闪烁 === */
.card-wrap {
  position: relative;
  padding: 2px;
  border-radius: 34px;
  background: linear-gradient(135deg,
    rgba(200,180,255,0.6),
    rgba(100,80,200,0.3),
    rgba(200,180,255,0.6),
    rgba(150,100,255,0.4),
    rgba(200,180,255,0.6));
  background-size: 300% 300%;
  animation: starBorder 5s ease infinite;
  box-shadow:
    0 0 25px rgba(150,100,255,0.3),
    0 0 60px rgba(100,80,200,0.15),
    inset 0 0 20px rgba(150,100,255,0.1);
  z-index: 10;
}
@keyframes starBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(150,100,255,0.3), 0 0 60px rgba(100,80,200,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(150,100,255,0.5), 0 0 80px rgba(100,80,200,0.25); }
  100% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(150,100,255,0.3), 0 0 60px rgba(100,80,200,0.15); }
}

/* 卡片 */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 32px;
  padding: 52px 60px;
  text-align: center;
  max-width: 540px;
  width: 90vw;
  box-shadow: inset 0 0 50px rgba(150,100,255,0.05);
  animation: cardFloat 5s ease-in-out infinite, cardIn 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
  position: relative; overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.3deg); }
  50% { transform: translateY(-10px) rotate(0.3deg); }
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.7) translateY(50px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.star-deco {
  font-size: 40px; display: block; margin-bottom: 20px;
  animation: starSpin 4s ease-in-out infinite;
  filter: drop-shadow(0 0 15px rgba(255,255,200,0.6));
}
@keyframes starSpin {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.15) rotate(5deg); }
  75% { transform: scale(0.9) rotate(-5deg); }
}
.wish {
  font-size: clamp(14px, 3vw, 18px); color: rgba(200,180,255,0.6);
  letter-spacing: 8px; margin-bottom: 20px;
  opacity: 1; animation: fadeUp 1s ease-out 0.5s both;
}
.name {
  font-size: clamp(32px, 8vw, 60px); color: #fff;
  letter-spacing: 12px; margin-bottom: 24px;
  opacity: 1; animation: nameIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.8s both, starGlow 3s ease-in-out infinite 2s;
}
@keyframes nameIn {
  from { opacity: 0; transform: translateY(30px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes starGlow {
  0%, 100% { text-shadow: 0 0 30px rgba(200,180,255,0.5), 0 0 60px rgba(150,100,255,0.2); }
  50% { text-shadow: 0 0 50px rgba(200,180,255,0.8), 0 0 100px rgba(150,100,255,0.4); }
}
.blessing {
  font-size: clamp(14px, 3vw, 20px); color: rgba(255,255,255,0.85);
  line-height: 2; letter-spacing: 3px;
  opacity: 1; animation: fadeUp 1s ease-out 1.1s both;
}
.from {
  font-size: clamp(12px, 2.5vw, 16px); color: rgba(200,180,255,0.5);
  margin-top: 28px; letter-spacing: 4px;
  opacity: 1; animation: fadeUp 1s ease-out 1.4s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.bottom-stars {
  font-size: 28px; margin-top: 20px;
  animation: starSpin 3s ease-in-out 0.5s infinite;
  display: block;
}
</style>
</head>
<body>

<div class="nebula"></div>
<div class="aurora"></div>

<div class="card-wrap">
  <div class="card">
    <span class="star-deco">✨</span>
    <div class="wish">WISH UPON A STAR</div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <span class="bottom-stars">🌟</span>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

const starsContainer = document.createElement('div');
starsContainer.className = 'stars';
document.body.appendChild(starsContainer);
for (let i = 0; i < 150; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + 'vw';
  star.style.top = Math.random() * 100 + 'vh';
  const size = 0.5 + Math.random() * 2;
  star.style.width = star.style.height = size + 'px';
  star.style.animationDuration = (1 + Math.random() * 3) + 's';
  star.style.animationDelay = Math.random() * 4 + 's';
  starsContainer.appendChild(star);
}

for (let i = 0; i < 5; i++) {
  const star = document.createElement('div');
  star.className = 'big-star';
  star.style.left = (10 + Math.random() * 80) + 'vw';
  star.style.top = (5 + Math.random() * 85) + 'vh';
  star.style.fontSize = (12 + Math.random() * 16) + 'px';
  star.textContent = '✦';
  star.style.color = `rgba(255,255,${200 + Math.random() * 55},0.9)`;
  star.style.animationDuration = (2 + Math.random() * 2) + 's';
  star.style.animationDelay = Math.random() * 3 + 's';
  document.body.appendChild(star);
}

for (let i = 0; i < 6; i++) {
  const meteor = document.createElement('div');
  meteor.className = 'shooting-star';
  meteor.style.left = (20 + Math.random() * 60) + 'vw';
  meteor.style.top = Math.random() * 50 + 'vh';
  meteor.style.width = (80 + Math.random() * 120) + 'px';
  meteor.style.animationDuration = (1 + Math.random() * 1.5) + 's';
  meteor.style.animationDelay = (2 + Math.random() * 8) + 's';
  document.body.appendChild(meteor);
}
</script>
</body>
</html>
