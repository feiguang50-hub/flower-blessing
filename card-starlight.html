<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璀璨星光</title>
<meta property="og:title" content="✨ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --deep-night: #050918;
  --night-blue: #0a1628;
  --night-purple: #1a0a3a;
  --star-gold: #ffd700;
  --star-white: #ffffff;
  --star-pink: #ffb8d0;
  --star-cyan: #a0e8ff;
  --card-bg: rgba(10, 15, 40, 0.82);
  --card-border: rgba(255, 215, 0, 0.4);
  --text-main: #ffd700;
  --text-muted: rgba(200, 200, 255, 0.7);
  --text-accent: rgba(255, 255, 255, 0.9);
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(100, 80, 200, 0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 70% 30%, rgba(50, 30, 120, 0.25) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(20, 40, 100, 0.3) 0%, transparent 50%),
    linear-gradient(180deg, #050918 0%, #0a1628 35%, #0f1f4a 65%, #1a0a3a 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 星星闪烁 */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  pointer-events: none;
  z-index: 1;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 流星 */
.shooting-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 4px 1px rgba(255, 255, 255, 0.8);
  z-index: 2;
  pointer-events: none;
  animation: shoot linear infinite;
}
@keyframes shoot {
  0% { transform: translateX(0) translateY(0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translateX(-300px) translateY(300px); opacity: 0; }
}

/* 极光波浪 */
.aurora {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 40vh;
  background: linear-gradient(180deg,
    rgba(100, 200, 150, 0.08) 0%,
    rgba(80, 150, 200, 0.1) 40%,
    transparent 100%);
  animation: auroraWave 8s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes auroraWave {
  0%, 100% { opacity: 0.5; transform: scaleY(1); }
  50% { opacity: 0.9; transform: scaleY(1.2); }
}

/* 星尘粒子 */
.stardust {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.6);
  animation: dustFloat linear infinite;
  pointer-events: none;
  z-index: 1;
}
@keyframes dustFloat {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  20% { opacity: 0.8; }
  80% { opacity: 0.6; }
  100% { transform: translateY(-100px) translateX(var(--dx, 20px)); opacity: 0; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 30px;
  background: linear-gradient(135deg, rgba(255,215,0,0.6), rgba(160,232,255,0.4), rgba(255,184,208,0.4), rgba(255,215,0,0.6));
  background-size: 300% 300%;
  animation: starlightBorder 5s ease-in-out infinite;
  box-shadow:
    0 0 40px rgba(255, 215, 0, 0.2),
    0 0 80px rgba(100, 150, 255, 0.1),
    0 8px 40px rgba(0,0,0,0.4);
}
@keyframes starlightBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 40px rgba(255, 215, 0, 0.2), 0 0 80px rgba(100, 150, 255, 0.1), 0 8px 40px rgba(0,0,0,0.4); }
  50% { background-position: 100% 50%; box-shadow: 0 0 60px rgba(255, 215, 0, 0.35), 0 0 100px rgba(160, 232, 255, 0.2), 0 8px 40px rgba(0,0,0,0.4); }
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(16px) saturate(1.2);
  -webkit-backdrop-filter: blur(16px) saturate(1.2);
  border-radius: 28px;
  padding: clamp(36px, 8vw, 60px) clamp(30px, 7vw, 54px);
  text-align: center;
  max-width: min(520px, 92vw);
  animation: cardFloat 4s ease-in-out infinite;
  border: 1px solid rgba(255, 215, 0, 0.25);
  position: relative;
  overflow: hidden;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.3deg); }
  50% { transform: translateY(-10px) rotate(0.3deg); }
}

/* 卡片内星星光效 */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(255, 215, 0, 0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.icon {
  font-size: clamp(40px, 10vw, 60px);
  display: block;
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  position: relative;
  z-index: 1;
}
@keyframes iconDrop {
  from { transform: translateY(-30px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.name {
  font-size: clamp(26px, 7vw, 46px);
  font-weight: normal;
  color: var(--text-main);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
  position: relative;
  z-index: 1;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
}

.date {
  font-size: clamp(11px, 3vw, 14px);
  color: var(--text-muted);
  letter-spacing: 0.2em;
  margin-bottom: 18px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
  position: relative;
  z-index: 1;
}

.divider {
  display: block;
  width: 60px; height: 1.5px;
  background: linear-gradient(to right, transparent, rgba(255,215,0,0.6), transparent);
  margin: 14px auto 18px;
  animation: slideUp 1.2s ease-out 0.8s both;
  opacity: 1;
  position: relative;
  z-index: 1;
}

.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: var(--text-accent);
  line-height: 1.9;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
  position: relative;
  z-index: 1;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-muted);
  letter-spacing: 0.1em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
  position: relative;
  z-index: 1;
}
.from::before { content: '— '; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 角落装饰星 */
.corner-star {
  position: absolute;
  font-size: 20px;
  opacity: 0.3;
  z-index: 0;
  pointer-events: none;
}

@media (prefers-reduced-motion: reduce) {
  .star, .shooting-star, .aurora, .stardust, .card-wrap, .card { animation: none; }
  .name, .date, .blessing, .from, .divider, .icon { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 极光 -->
<div class="aurora"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">✨</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <span class="divider"></span>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <span class="corner-star" style="top:12px;left:14px;">⭐</span>
    <span class="corner-star" style="top:12px;right:14px;">⭐</span>
    <span class="corner-star" style="bottom:12px;left:14px;">✨</span>
    <span class="corner-star" style="bottom:12px;right:14px;">✨</span>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的';
const blessing = p.get('b') || '愿你的心永远有星光指引前行的路';
const date = p.get('d') || '';
const from = p.get('f') || '';
const icon = p.get('i') || '✨';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').textContent = blessing;
document.getElementById('dateEl').textContent = date;
if (from) document.getElementById('fromEl').textContent = from;
else document.getElementById('fromEl').style.display = 'none';
document.getElementById('iconEl').textContent = icon;

// 背景星星
const starColors = ['#ffd700', '#ffffff', '#a0e8ff', '#ffb8d0', '#e8e0ff'];
for (let i = 0; i < 60; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  const size = 1 + Math.random() * 2.5;
  const hue = Math.random();
  star.style.cssText = `
    left:${Math.random() * 100}%;
    top:${Math.random() * 100}%;
    width:${size}px; height:${size}px;
    background:${starColors[Math.floor(Math.random() * starColors.length)]};
    animation: starTwinkle ${2 + Math.random() * 4}s ease-in-out ${Math.random() * 4}s infinite;
    box-shadow: 0 0 ${size * 2}px ${starColors[Math.floor(Math.random() * starColors.length)]};
  `;
  document.body.appendChild(star);
}

// 流星
for (let i = 0; i < 3; i++) {
  const s = document.createElement('div');
  s.className = 'shooting-star';
  const startX = 60 + Math.random() * 35;
  const startY = 5 + Math.random() * 20;
  s.style.cssText = `
    left:${startX}%; top:${startY}%;
    animation-duration:${1.5 + Math.random()}s;
    animation-delay:${3 + i * 4 + Math.random() * 3}s;
    transform-origin: center center;
  `;
  document.body.appendChild(s);
}

// 星尘粒子
for (let i = 0; i < 20; i++) {
  const dust = document.createElement('div');
  dust.className = 'stardust';
  const dx = (Math.random() - 0.5) * 80;
  dust.style.cssText = `
    left:${Math.random() * 100}%;
    top:${30 + Math.random() * 70}%;
    animation-duration:${4 + Math.random() * 4}s;
    animation-delay:${Math.random() * 6}s;
    --dx:${dx}px;
  `;
  document.body.appendChild(dust);
}

if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.star, .shooting-star, .aurora, .stardust').forEach(el => el.remove());
}
</script>
</body>
</html>
