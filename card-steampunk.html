<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蒸汽朋克祝福</title>
<meta property="og:title" content="⚙️ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --brass: #b8860b;
  --brass-light: #daa520;
  --brass-dark: #8b6914;
  --copper: #cd7f32;
  --iron: #484848;
  --steam: rgba(200, 200, 220, 0.4);
  --card-bg: rgba(40, 30, 20, 0.92);
  --glow-warm: rgba(218, 165, 32, 0.5);
  --border-brass: rgba(184, 134, 11, 0.6);
  --text-gold: #daa520;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(139, 105, 20, 0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(205, 127, 50, 0.15) 0%, transparent 45%),
    linear-gradient(180deg,
      #1a1208 0%,
      #2a1a0a 20%,
      #1a1208 40%,
      #0f0a04 60%,
      #1a1208 80%,
      #2a1a0a 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 蒸汽粒子 */
.steam {
  position: fixed;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, rgba(200,200,220,0.6) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
  animation: steamRise linear infinite;
}
@keyframes steamRise {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  15% { opacity: 0.7; }
  85% { opacity: 0.5; }
  100% { transform: translateY(-100px) scale(3); opacity: 0; }
}

/* 背景齿轮 */
.gear-bg {
  position: fixed;
  z-index: 0;
  pointer-events: none;
  opacity: 0.12;
}
.gear-bg-1 { top: -60px; left: -60px; width: 280px; height: 280px; animation: gearSpin 18s linear infinite; }
.gear-bg-2 { bottom: -80px; right: -80px; width: 350px; height: 350px; animation: gearSpin 24s linear infinite reverse; }
.gear-bg-3 { top: 40%; right: -40px; width: 200px; height: 200px; animation: gearSpin 15s linear infinite; }
.gear-bg-4 { bottom: 10%; left: -30px; width: 180px; height: 180px; animation: gearSpin 20s linear infinite reverse; }

@keyframes gearSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 边框装饰 */
.border-frame {
  position: fixed;
  inset: 20px;
  border: 2px solid var(--border-brass);
  z-index: 2;
  pointer-events: none;
}
.border-frame::before,
.border-frame::after {
  content: '';
  position: absolute;
  background: var(--brass);
}
.border-frame::before {
  top: -2px; left: 20%; right: 20%; height: 2px;
  box-shadow: 0 0 10px var(--glow-warm);
}
.border-frame::after {
  bottom: -2px; left: 20%; right: 20%; height: 2px;
  box-shadow: 0 0 10px var(--glow-warm);
}

/* 角落铆钉 */
.corner {
  position: fixed;
  width: 14px;
  height: 14px;
  background: radial-gradient(circle at 40% 40%, var(--brass-light), var(--brass-dark));
  border-radius: 50%;
  z-index: 3;
  box-shadow: 0 0 6px rgba(218,165,32,0.6);
}
.corner-tl { top: 18px; left: 18px; }
.corner-tr { top: 18px; right: 18px; }
.corner-bl { bottom: 18px; left: 18px; }
.corner-br { bottom: 18px; right: 18px; }

/* 卡片容器 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, var(--brass) 0%, var(--brass-dark) 25%, var(--brass-light) 50%, var(--brass-dark) 75%, var(--brass) 100%);
  background-size: 300% 300%;
  border-radius: 12px;
  animation: borderGlow 4s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(218, 165, 32, 0.3),
    0 0 40px rgba(218, 165, 32, 0.15),
    inset 0 0 20px rgba(0,0,0,0.3);
}
@keyframes borderGlow {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 20px rgba(218,165,32,0.3), 0 0 40px rgba(218,165,32,0.15); }
  50% { background-position: 100% 50%; box-shadow: 0 0 30px rgba(218,165,32,0.5), 0 0 60px rgba(218,165,32,0.25); }
}

.card {
  background: var(--card-bg);
  border-radius: 10px;
  padding: clamp(28px, 7vw, 52px) clamp(24px, 6vw, 48px);
  text-align: center;
  position: relative;
  overflow: hidden;
  min-width: min(340px, 88vw);
}

/* 卡片内齿轮装饰 */
.card::before {
  content: '⚙';
  position: absolute;
  top: 12px; right: 16px;
  font-size: 22px;
  color: var(--brass);
  opacity: 0.35;
  animation: gearSpin 10s linear infinite;
}
.card::after {
  content: '⚙';
  position: absolute;
  bottom: 14px; left: 16px;
  font-size: 18px;
  color: var(--copper);
  opacity: 0.3;
  animation: gearSpin 14s linear infinite reverse;
}

/* 铆钉装饰线 */
.card-line-top,
.card-line-bottom {
  position: absolute;
  left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--brass), transparent);
}
.card-line-top { top: 0; }
.card-line-bottom { bottom: 0; }

/* 标题 */
.name {
  font-size: clamp(28px, 7vw, 52px);
  font-weight: bold;
  color: var(--text-gold);
  text-shadow:
    0 0 10px rgba(218,165,32,0.8),
    0 0 20px rgba(218,165,32,0.5),
    0 0 30px rgba(218,165,32,0.3),
    2px 2px 4px rgba(0,0,0,0.5);
  margin-bottom: 12px;
  opacity: 1;
  animation: nameAppear 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  letter-spacing: 3px;
}
@keyframes nameAppear {
  from { opacity: 0; transform: scale(0.5) rotate(-5deg); }
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* 日期 */
.date {
  font-size: clamp(13px, 3.5vw, 17px);
  color: var(--brass);
  opacity: 0.85;
  margin-bottom: 18px;
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.6s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 祝福语 */
.blessing {
  font-size: clamp(16px, 4.5vw, 22px);
  color: #e8d5a3;
  line-height: 1.7;
  margin-bottom: 22px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  opacity: 1;
  animation: fadeUp 1.2s ease-out 0.9s both;
}

/* 分隔装饰 */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 16px 0;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.1s both;
}
.divider-line {
  height: 1px;
  width: 40px;
  background: linear-gradient(90deg, transparent, var(--brass), transparent);
}
.divider-gear {
  font-size: 14px;
  color: var(--brass-light);
}

/* 署名 */
.from {
  font-size: clamp(13px, 3.5vw, 17px);
  color: var(--brass);
  opacity: 0.9;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.3s both;
  letter-spacing: 1px;
}

/* 齿轮装饰元素 */
.gear-deco {
  position: absolute;
  color: var(--brass);
  opacity: 0.2;
  font-size: 40px;
  z-index: 0;
}
.gear-deco-1 { top: 8%; left: 5%; animation: gearSpin 20s linear infinite; }
.gear-deco-2 { bottom: 8%; right: 5%; animation: gearSpin 15s linear infinite reverse; font-size: 32px; }
.gear-deco-3 { top: 15%; right: 10%; animation: gearSpin 25s linear infinite; font-size: 28px; }

/* 蒸汽管道装饰 */
.pipe-left,
.pipe-right {
  position: fixed;
  width: 20px;
  z-index: 1;
  pointer-events: none;
}
.pipe-left {
  left: 30px;
  top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--iron) 0%, var(--brass-dark) 50%, var(--iron) 100%);
  box-shadow: inset 2px 0 4px rgba(0,0,0,0.5), 2px 0 8px rgba(0,0,0,0.3);
}
.pipe-right {
  right: 30px;
  top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--iron) 0%, var(--brass-dark) 50%, var(--iron) 100%);
  box-shadow: inset -2px 0 4px rgba(0,0,0,0.5), -2px 0 8px rgba(0,0,0,0.3);
}

/* 底部铭牌 */
.nameplate {
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, var(--brass-dark) 0%, var(--brass) 50%, var(--brass-dark) 100%);
  padding: 4px 20px;
  border-radius: 6px 6px 0 0;
  font-size: 11px;
  color: #1a1208;
  letter-spacing: 2px;
  text-transform: uppercase;
  box-shadow: 0 -2px 8px rgba(218,165,32,0.4);
  opacity: 1;
  animation: fadeUp 0.8s ease-out 1.5s both;
}
</style>
</head>
<body>

<!-- 蒸汽管道 -->
<div class="pipe-left"></div>
<div class="pipe-right"></div>

<!-- 背景齿轮 -->
<div class="gear-bg gear-bg-1">⚙</div>
<div class="gear-bg gear-bg-2">⚙</div>
<div class="gear-bg gear-bg-3">⚙</div>
<div class="gear-bg gear-bg-4">⚙</div>

<!-- 边框 -->
<div class="border-frame"></div>

<!-- 角落铆钉 -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="card-line-top"></div>
    <div class="card-line-bottom"></div>
    <div class="gear-deco gear-deco-1">⚙</div>
    <div class="gear-deco gear-deco-2">⚙</div>
    <div class="gear-deco gear-deco-3">⚙</div>

    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-gear">⚙</span>
      <div class="divider-line"></div>
    </div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="nameplate">Steam Works</div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活充满机械之美与蒸汽之梦';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 蒸汽粒子
function createSteam() {
  const steam = document.createElement('div');
  steam.className = 'steam';
  steam.style.left = (10 + Math.random() * 80) + 'vw';
  steam.style.bottom = (Math.random() * 20) + 'vh';
  const size = 6 + Math.random() * 12;
  steam.style.width = size + 'px';
  steam.style.height = size + 'px';
  steam.style.animationDuration = (4 + Math.random() * 5) + 's';
  steam.style.animationDelay = Math.random() * 3 + 's';
  document.body.appendChild(steam);
  setTimeout(() => steam.remove(), 12000);
}
setInterval(createSteam, 600);
for (let i = 0; i < 8; i++) createSteam();

// 减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.gear-bg, .gear-deco').forEach(el => el.style.animation = 'none');
}
</script>
</body>
</html>
