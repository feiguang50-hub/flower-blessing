<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>向日葵阳光</title>
<meta property="og:title" content="🌻 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #87ceeb 0%,
    #ffd89b 40%,
    #ffb347 70%,
    #ff8c42 100%
  );
  font-family: 'Noto Serif SC', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 阳光光芒 */
.sun-rays {
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 500px;
  background: conic-gradient(
    from 0deg,
    transparent 0deg,
    rgba(255,230,100,0.12) 5deg,
    transparent 10deg,
    transparent 15deg,
    rgba(255,230,100,0.12) 20deg,
    transparent 25deg,
    transparent 30deg,
    rgba(255,230,100,0.12) 35deg,
    transparent 40deg,
    transparent 45deg,
    rgba(255,230,100,0.12) 50deg,
    transparent 55deg,
    transparent 60deg,
    rgba(255,230,100,0.12) 65deg,
    transparent 70deg,
    transparent 75deg,
    rgba(255,230,100,0.12) 80deg,
    transparent 85deg,
    transparent 90deg
  );
  border-radius: 50%;
  animation: sunRotate 30s linear infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes sunRotate {
  from { transform: translateX(-50%) rotate(0deg); }
  to { transform: translateX(-50%) rotate(360deg); }
}

/* 背景暖光 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 20%, rgba(255,220,80,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255,150,50,0.2) 0%, transparent 50%);
  z-index: 0;
  pointer-events: none;
}

/* 云朵 */
.cloud {
  position: fixed;
  font-size: 30px;
  opacity: 0.4;
  animation: cloudDrift linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes cloudDrift {
  0% { transform: translateX(-10vw); }
  100% { transform: translateX(110vw); }
}

/* 向日葵种子飘落 */
.seed {
  position: fixed;
  font-size: 10px;
  animation: seedFall linear infinite;
  z-index: 2;
  pointer-events: none;
  opacity: 0.6;
}
@keyframes seedFall {
  0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.4; }
  100% { transform: translateY(105vh) rotate(180deg) translateX(30px); opacity: 0; }
}

/* 金色光点 */
.sparkle {
  position: fixed;
  width: 3px; height: 3px;
  background: rgba(255,230,80,0.8);
  border-radius: 50%;
  animation: sparkleRise ease-in-out infinite;
  z-index: 2;
  pointer-events: none;
}
@keyframes sparkleRise {
  0% { transform: translateY(0) scale(0); opacity: 0; }
  30% { opacity: 1; transform: scale(1); }
  100% { transform: translateY(-100px) scale(0.5); opacity: 0; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  border-radius: 30px;
  background: linear-gradient(135deg,
    #ffd700,
    #ffb347,
    #ff8c42,
    #ffc040,
    #ffd700
  );
  background-size: 300% 300%;
  animation: sunflowerBorder 4s ease-in-out infinite;
  box-shadow:
    0 0 40px rgba(255,180,50,0.5),
    0 0 80px rgba(255,140,0,0.25),
    0 8px 40px rgba(0,0,0,0.25);
}
@keyframes sunflowerBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 40px rgba(255,180,50,0.5), 0 0 80px rgba(255,140,0,0.25); }
  50% { background-position: 100% 50%; box-shadow: 0 0 55px rgba(255,200,80,0.65), 0 0 100px rgba(255,140,0,0.35); }
  100% { background-position: 0% 50%; box-shadow: 0 0 40px rgba(255,180,50,0.5), 0 0 80px rgba(255,140,0,0.25); }
}

/* 卡片本体 */
.card {
  background: rgba(255,250,230,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 28px;
  padding: clamp(32px, 6vw, 52px) clamp(28px, 5vw, 46px);
  text-align: center;
  max-width: min(500px, 92vw);
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow: inset 0 0 40px rgba(255,200,50,0.08);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(0.3deg); }
  50% { transform: translateY(-7px) rotate(-0.3deg); }
}

/* 向日葵图标 */
.icon {
  font-size: clamp(40px, 9vw, 60px);
  display: block;
  margin-bottom: 16px;
  animation: iconBounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(255,150,0,0.3));
}
@keyframes iconBounce {
  0%, 100% { transform: scale(1) rotate(-2deg); }
  50% { transform: scale(1.08) rotate(2deg); }
}

/* 场合 */
.occasion {
  font-size: clamp(10px, 2.2vw, 13px);
  color: rgba(180,120,0,0.65);
  letter-spacing: 8px;
  margin-bottom: 16px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.3s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 名字 */
.name {
  font-size: clamp(28px, 7vw, 48px);
  font-weight: 600;
  color: #8B4500;
  letter-spacing: 4px;
  margin-bottom: 14px;
  opacity: 1;
  animation: namePop 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
  text-shadow: 0 2px 8px rgba(255,150,0,0.15);
}
@keyframes namePop {
  from { opacity: 0; transform: translateY(20px) scale(0.7); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 日期 */
.date-line {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(160,100,0,0.55);
  letter-spacing: 4px;
  margin-bottom: 26px;
  opacity: 1;
  animation: fadeUp 1s ease-out 0.8s both;
}

/* 分隔线 */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 26px;
  animation: fadeUp 1s ease-out 1s both;
  opacity: 1;
}
.divider-line {
  flex: 1;
  max-width: 70px;
  height: 1.5px;
  background: linear-gradient(to right, transparent, rgba(200,140,0,0.5), transparent);
}
.divider-icon {
  font-size: 12px;
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 3.5vw, 18px);
  color: #5a3000;
  text-align: left;
  line-height: 2.2;
  letter-spacing: 1px;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.2s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(160,100,0,0.6);
  text-align: right;
  margin-top: 26px;
  letter-spacing: 3px;
  opacity: 1;
  animation: fadeUp 1s ease-out 1.5s both;
}

/* 底部向日葵装饰 */
.sunflower-row {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 28px;
  animation: fadeUp 1s ease-out 1.8s both;
  opacity: 1;
}
.sunflower-icon {
  font-size: 18px;
  animation: sunflowerSway 2s ease-in-out infinite;
}
.sunflower-icon:nth-child(2) { animation-delay: 0.3s; }
.sunflower-icon:nth-child(3) { animation-delay: 0.6s; }
@keyframes sunflowerSway {
  0%, 100% { transform: rotate(-5deg) scale(1); }
  50% { transform: rotate(5deg) scale(1.05); }
}

@media (prefers-reduced-motion: reduce) {
  .seed, .sparkle, .cloud, .sun-rays, .card-wrap, .card { animation: none; }
  .name, .date-line, .blessing, .from, .divider { opacity: 1; }
}
</style>
</head>
<body>

<script>
// 阳光旋转光芒
const rays = document.createElement('div');
rays.className = 'sun-rays';
document.body.appendChild(rays);

// 云朵
for (let i = 0; i < 3; i++) {
  const cloud = document.createElement('div');
  cloud.className = 'cloud';
  cloud.textContent = '☁️';
  cloud.style.top = (5 + i * 12) + '%';
  cloud.style.fontSize = (20 + i * 8) + 'px';
  cloud.style.animationDuration = (25 + i * 10) + 's';
  cloud.style.animationDelay = -(i * 8) + 's';
  document.body.appendChild(cloud);
}

// 向日葵种子飘落
const seeds = ['🌻', '✨', '🍂'];
for (let i = 0; i < 10; i++) {
  const seed = document.createElement('div');
  seed.className = 'seed';
  seed.textContent = seeds[i % seeds.length];
  seed.style.left = Math.random() * 100 + 'vw';
  seed.style.fontSize = (8 + Math.random() * 8) + 'px';
  seed.style.animationDuration = (8 + Math.random() * 6) + 's';
  seed.style.animationDelay = Math.random() * 10 + 's';
  document.body.appendChild(seed);
}

// 光点上升
for (let i = 0; i < 10; i++) {
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.style.left = Math.random() * 100 + 'vw';
  sp.style.bottom = (10 + Math.random() * 20) + '%';
  sp.style.animationDuration = (3 + Math.random() * 3) + 's';
  sp.style.animationDelay = Math.random() * 6 + 's';
  document.body.appendChild(sp);
}

if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.seed, .sparkle, .cloud, .sun-rays').forEach(el => el.remove());
}
</script>

<!-- 贺卡 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">🌻</span>
    <div class="occasion" id="occasionEl">向日葵阳光</div>
    <div class="name" id="nameEl"></div>
    <div class="date-line" id="dateEl"></div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">☀</span>
      <div class="divider-line"></div>
    </div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="sunflower-row">
      <span class="sunflower-icon">🌻</span>
      <span class="sunflower-icon">☀️</span>
      <span class="sunflower-icon">🌻</span>
    </div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的你';
const date = p.get('d') || '';
const blessing = p.get('b') || '愿你像向日葵一样，\n永远向着阳光，温暖而明亮。';
const from = p.get('f') || '';
const icon = p.get('i') || '🌻';
const occasion = p.get('o') || '向日葵阳光';

document.getElementById('nameEl').textContent = name;
document.getElementById('dateEl').textContent = date;
document.getElementById('blessingEl').textContent = blessing;
document.getElementById('fromEl').textContent = from ? '— ' + from : '';
document.getElementById('iconEl').textContent = icon;
document.getElementById('occasionEl').textContent = occasion;
</script>
</body>
</html>
