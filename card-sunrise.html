<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日出晨曦</title>
<meta property="og:title" content="🌅 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sky-deep: #1a0a2e;
  --sky-purple: #3d1a5c;
  --sky-pink: #c0447a;
  --sky-rose: #e8705a;
  --sky-orange: #f4a030;
  --sky-gold: #ffd060;
  --sun-core: #fff8c0;
  --sun-glow: rgba(255, 220, 80, 0.5);
  --card-bg: rgba(255, 248, 235, 0.92);
  --card-border: rgba(255, 200, 100, 0.5);
  --text-main: #4a2800;
  --text-muted: #8b5a2b;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #1a0a2e 0%,
    #3d1a5c 18%,
    #c0447a 38%,
    #e8705a 52%,
    #f4a030 65%,
    #ffd060 78%,
    #fff0a0 88%,
    #fff8d0 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 镜头光晕 */
body::before {
  content: '';
  position: fixed;
  top: 30%; left: 50%;
  transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,255,220,0.35) 0%, rgba(255,200,80,0.15) 40%, transparent 70%);
  border-radius: 50%;
  animation: sunLens 4s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes sunLens {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
}

/* 光芒射线 */
.sun-rays {
  position: fixed;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  z-index: 1;
  pointer-events: none;
  animation: raysRotate 60s linear infinite;
}

@keyframes raysRotate {
  from { transform: translateX(-50%) rotate(0deg); }
  to { transform: translateX(-50%) rotate(360deg); }
}

.ray {
  position: absolute;
  top: 50%; left: 50%;
  width: 2px;
  height: 280px;
  background: linear-gradient(to bottom, rgba(255,255,200,0.6) 0%, transparent 100%);
  transform-origin: center top;
  opacity: 0.5;
}

/* 云朵 */
.clouds {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

.cloud {
  position: absolute;
  font-size: 40px;
  opacity: 0.85;
  filter: drop-shadow(0 2px 8px rgba(255,180,80,0.3));
}

@keyframes cloudDrift {
  from { transform: translateX(-120px); }
  to { transform: translateX(calc(100vw + 120px)); }
}

/* 飞鸟 */
.birds {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  overflow: hidden;
}

.bird {
  position: absolute;
  font-size: 10px;
  opacity: 0.5;
  animation: birdFly linear infinite;
}

@keyframes birdFly {
  from { transform: translateX(-60px); }
  to { transform: translateX(calc(100vw + 60px)); }
}

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 10;
  perspective: 1000px;
}

.card {
  position: relative;
  background: var(--card-bg);
  border-radius: 20px;
  padding: clamp(28px, 6vw, 52px) clamp(24px, 5vw, 48px);
  text-align: center;
  box-shadow:
    0 0 40px rgba(255, 200, 80, 0.4),
    0 8px 40px rgba(180, 80, 40, 0.3),
    0 2px 8px rgba(0,0,0,0.1);
  border: 1.5px solid var(--card-border);
  animation: cardFloat 4s ease-in-out infinite;
  max-width: min(480px, 92vw);
  width: 100%;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

.icon {
  font-size: clamp(36px, 8vw, 56px);
  margin-bottom: 10px;
  display: block;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.7); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.name {
  font-size: clamp(26px, 7vw, 44px);
  font-weight: normal;
  color: var(--text-main);
  margin-bottom: 10px;
  letter-spacing: 0.06em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-muted);
  margin-bottom: 18px;
  letter-spacing: 0.12em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.8s both;
}

.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: var(--text-main);
  line-height: 1.8;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-muted);
  letter-spacing: 0.08em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.4s both;
}

.from::before {
  content: '— ';
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 边框呼吸光效 */
.card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 22px;
  background: linear-gradient(135deg, #ffd060, #e8705a, #ffd060);
  background-size: 200% 200%;
  animation: borderShimmer 3s ease-in-out infinite;
  z-index: -1;
  opacity: 0.6;
}

@keyframes borderShimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 底部地平线光晕 */
.horizon {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(to top, rgba(255,240,150,0.4) 0%, transparent 100%);
  z-index: 1;
  pointer-events: none;
}

@media (prefers-reduced-motion: reduce) {
  .card, .cloud, .bird, .ray, body::before { animation: none; }
  .name, .date, .blessing, .from, .icon { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 光芒射线 -->
<div class="sun-rays" id="rays"></div>

<!-- 云朵 -->
<div class="clouds" id="clouds"></div>

<!-- 飞鸟 -->
<div class="birds" id="birds"></div>

<!-- 地平线 -->
<div class="horizon"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">🌅</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
// 读取参数
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿每一个清晨，都带着光';
document.getElementById('fromEl').textContent = p.get('f') || '';
if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');

// 生成光芒射线
const raysEl = document.getElementById('rays');
for (let i = 0; i < 16; i++) {
  const ray = document.createElement('div');
  ray.className = 'ray';
  ray.style.transform = `rotate(${i * 22.5}deg)`;
  ray.style.opacity = (0.3 + Math.random() * 0.4).toFixed(2);
  ray.style.height = (220 + Math.random() * 80) + 'px';
  ray.style.animationDelay = (Math.random() * 3) + 's';
  raysEl.appendChild(ray);
}

// 生成云朵
const cloudsEl = document.getElementById('clouds');
const cloudEmojis = ['☁️', '🌤️', '☁️'];
for (let i = 0; i < 5; i++) {
  const cloud = document.createElement('div');
  cloud.className = 'cloud';
  cloud.textContent = cloudEmojis[i % cloudEmojis.length];
  cloud.style.top = (5 + Math.random() * 25) + '%';
  cloud.style.fontSize = (28 + Math.random() * 24) + 'px';
  cloud.style.opacity = (0.4 + Math.random() * 0.4).toFixed(2);
  cloud.style.animation = `cloudDrift ${40 + Math.random() * 30}s linear ${Math.random() * 40}s infinite`;
  cloudsEl.appendChild(cloud);
}

// 生成飞鸟
const birdsEl = document.getElementById('birds');
for (let i = 0; i < 3; i++) {
  const bird = document.createElement('div');
  bird.className = 'bird';
  bird.textContent = '🕊️';
  bird.style.top = (8 + i * 6) + '%';
  bird.style.fontSize = (8 + Math.random() * 6) + 'px';
  bird.style.animationDuration = (25 + Math.random() * 15) + 's';
  bird.style.animationDelay = (Math.random() * 20) + 's';
  bird.style.opacity = (0.3 + Math.random() * 0.3).toFixed(2);
  birdsEl.appendChild(bird);
}

// 减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.ray, .cloud, .bird').forEach(el => el.remove());
}
</script>
</body>
</html>
