<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>甜蜜糖果</title>
<meta property="og:title" content="🍬 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #fff5f8 0%, #ffeef5 40%, #f0fff5 75%, #e8fff5 100%);
  font-family: 'Georgia', 'PingFang SC', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 甜蜜漏光 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 25% 20%, rgba(255,180,200,0.22) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 80%, rgba(150,255,200,0.18) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(255,220,240,0.12) 0%, transparent 55%);
  animation: sweetGlow 7s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes sweetGlow {
  0%, 100% { transform: translate(0,0) scale(1); opacity: 0.75; }
  50% { transform: translate(1.5%, 0.5%) scale(1.04); opacity: 1; }
}

/* 糖果粒子 */
.candy-particle {
  position: fixed;
  border-radius: 50%;
  animation: candyFloat linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes candyFloat {
  0% { transform: translateY(105vh) rotate(0deg) scale(0); opacity: 0; }
  10% { opacity: 0.85; transform: scale(1); }
  85% { opacity: 0.4; }
  100% { transform: translateY(-8vh) rotate(360deg) scale(0.5); opacity: 0; }
}

/* 星星闪烁 */
.star-sparkle {
  position: fixed;
  background: #fff;
  border-radius: 50%;
  animation: starBlink ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes starBlink {
  0%, 100% { opacity: 0.1; transform: scale(0.7); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 爱心上浮 */
.love-float {
  position: fixed;
  font-size: 11px;
  animation: loveRise linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 0 4px rgba(255,150,180,0.4));
}
@keyframes loveRise {
  0% { transform: translateY(105vh) rotate(0deg) scale(0); opacity: 0; }
  12% { opacity: 0.9; transform: scale(1); }
  85% { opacity: 0.5; }
  100% { transform: translateY(-10vh) rotate(300deg) scale(0.4); opacity: 0; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  animation: cardFloat 5s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 渐变边框 */
.card-wrap::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 22px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a8edea, #fed6e3, #ff9a9e);
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
  z-index: -1;
}
@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 卡片发光 */
.card-wrap::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 26px;
  background: transparent;
  box-shadow: 0 0 25px rgba(255,150,180,0.25), 0 0 50px rgba(150,255,200,0.15);
  animation: glowPulse 3s ease-in-out infinite;
  z-index: -2;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* 卡片主体 */
.card {
  position: relative;
  background: rgba(255,255,255,0.88);
  border-radius: 20px;
  padding: clamp(32px, 6vw, 52px) clamp(28px, 5vw, 48px);
  max-width: 90vw;
  width: 420px;
  text-align: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow: 0 8px 32px rgba(255,150,180,0.15), 0 2px 8px rgba(0,0,0,0.05);
}

/* 糖果图标 */
.icon {
  font-size: clamp(36px, 8vw, 56px);
  display: block;
  margin-bottom: 14px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes iconDrop {
  from { transform: translateY(-30px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* 收礼人名 */
.name {
  font-size: clamp(24px, 6vw, 40px);
  font-weight: bold;
  background: linear-gradient(135deg, #e87090, #ff9a9e, #a8edea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
}

/* 祝福语 */
.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: #7a5570;
  line-height: 1.8;
  margin: 12px 0;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
}

/* 日期 */
.date {
  font-size: clamp(12px, 3vw, 15px);
  color: #b090a0;
  letter-spacing: 2px;
  margin-bottom: 6px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.85s both;
}

/* 署名 */
.from {
  font-size: clamp(12px, 3vw, 15px);
  color: #c0a0b0;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.0s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card-wrap, body::before { animation: none; }
  .candy-particle, .love-float { animation: none; }
  .card, .name, .blessing, .date, .from { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">🍬</span>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
(function() {
  const p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活像糖果一样甜蜜，每一天都充满小小的惊喜与幸福';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');

  // 糖果粒子
  const candyColors = ['#ff9a9e','#fad0c4','#a8edea','#fed6e3','#d4f0f0','#ffd1dc','#c1ffc1'];
  function spawnCandy() {
    const el = document.createElement('div');
    el.className = 'candy-particle';
    const size = 4 + Math.random() * 8;
    el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;bottom:-10px;background:${candyColors[Math.floor(Math.random()*candyColors.length)]};animation-duration:${5+Math.random()*5}s;animation-delay:${Math.random()*3}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 12000);
  }
  for (let i = 0; i < 14; i++) setTimeout(spawnCandy, i * 400);

  // 星星闪烁
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'star-sparkle';
    const size = 2 + Math.random() * 4;
    el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
    document.body.appendChild(el);
  }

  // 爱心上浮
  function spawnLove() {
    const el = document.createElement('div');
    el.className = 'love-float';
    el.textContent = ['💕','💗','💖','💝','✨'][Math.floor(Math.random()*5)];
    el.style.cssText = `left:${10+Math.random()*80}vw;bottom:-10px;animation-duration:${6+Math.random()*5}s;animation-delay:${Math.random()*2}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 14000);
  }
  setInterval(spawnLove, 1200);
  for (let i = 0; i < 6; i++) setTimeout(spawnLove, i * 300);
})();
</script>
</body>
</html>
