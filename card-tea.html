<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暖茶香</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --tea-brown: #8b5a2b;
  --tea-cream: #f5e6d3;
  --tea-gold: #c8a882;
  --text-dark: #4a3728;
  --steam-color: rgba(255,255,255,0.6);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #2d1f14 0%, #3d2a1a 30%, #4a3520 60%, #2d1f14 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 温暖光晕 */
body::before {
  content: '';
  position: fixed;
  top: 30%; left: 50%;
  transform: translateX(-50%);
  width: 250px; height: 250px;
  background: radial-gradient(ellipse at 50% 80%, rgba(200,168,130,0.2) 0%, rgba(200,168,130,0.08) 40%, transparent 70%);
  animation: teaGlow 4s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes teaGlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* 茶杯 */
.cup-container {
  position: absolute;
  bottom: 15%; left: 50%;
  transform: translateX(-50%);
  z-index: 2;
}

.cup {
  width: 70px; height: 55px;
  background: linear-gradient(180deg, #f5f0e8, #e8dcc8);
  border-radius: 5px 5px 35px 35px;
  position: relative;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.cup::before {
  content: '';
  position: absolute;
  right: -18px; top: 10px;
  width: 20px; height: 28px;
  border: 4px solid #e8dcc8;
  border-left: none;
  border-radius: 0 15px 15px 0;
}

/* 茶水面 */
.cup::after {
  content: '';
  position: absolute;
  top: 8px; left: 5px; right: 5px;
  height: 10px;
  background: linear-gradient(180deg, #c8a882, #a07850);
  border-radius: 50%;
}

/* 蒸汽 */
.steam-container {
  position: absolute;
  bottom: 100%; left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 60px;
}

.steam {
  position: absolute;
  bottom: 0;
  width: 8px;
  height: 30px;
  background: linear-gradient(180deg, transparent, var(--steam-color));
  border-radius: 50%;
  animation: steamRise ease-in-out infinite;
  opacity: 0;
}

@keyframes steamRise {
  0% { transform: translateY(0) scaleX(1); opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.2; }
  100% { transform: translateY(-50px) scaleX(1.5); opacity: 0; }
}

.steam:nth-child(1) { left: 5px; animation-duration: 2.5s; animation-delay: 0s; }
.steam:nth-child(2) { left: 16px; animation-duration: 2.8s; animation-delay: 0.6s; }
.steam:nth-child(3) { left: 27px; animation-duration: 2.3s; animation-delay: 1.2s; }

/* 茶叶漂浮 */
.leaves {
  position: fixed; inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

.leaf-float {
  position: absolute;
  font-size: 12px;
  animation: leafDrift linear infinite;
  opacity: 0;
}

@keyframes leafDrift {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(100vh) rotate(180deg); opacity: 0; }
}

.leaf-float:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
.leaf-float:nth-child(2) { left: 30%; animation-duration: 15s; animation-delay: 3s; }
.leaf-float:nth-child(3) { left: 55%; animation-duration: 11s; animation-delay: 6s; }
.leaf-float:nth-child(4) { left: 75%; animation-duration: 14s; animation-delay: 2s; }
.leaf-float:nth-child(5) { left: 88%; animation-duration: 13s; animation-delay: 8s; }

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(400px, 90vw);
  min-height: 460px;
  background: linear-gradient(160deg, rgba(245,230,211,0.96) 0%, rgba(240,222,205,0.93) 100%);
  border-radius: 24px;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  box-shadow:
    0 12px 40px rgba(45,31,20,0.35),
    0 4px 12px rgba(45,31,20,0.2),
    inset 0 1px 0 rgba(255,255,255,0.8);
  border: 2px solid rgba(200,168,130,0.4);
  animation: cardFloat 5s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50% { transform: translateY(-8px) rotate(0.5deg); }
}

/* 边框呼吸 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, rgba(200,168,130,0.5), rgba(139,90,43,0.3), rgba(200,168,130,0.5));
  background-size: 200% 200%;
  animation: teaBorder 4s ease-in-out infinite;
  z-index: -1;
  opacity: 0.4;
}

@keyframes teaBorder {
  0%, 100% { background-position: 0% 50%; opacity: 0.3; }
  50% { background-position: 100% 50%; opacity: 0.5; }
}

/* 图标 */
.icon {
  font-size: 50px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 10px rgba(139,90,43,0.3));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分隔线 */
.divider {
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(139,90,43,0.5), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字样式 */
.name {
  font-size: clamp(26px, 7vw, 42px);
  color: var(--text-dark);
  font-weight: 700;
  text-align: center;
  letter-spacing: 3px;
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(74,55,40,0.6);
  letter-spacing: 4px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(14px, 4vw, 17px);
  color: rgba(74,55,40,0.85);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(12px, 3.5vw, 14px);
  color: rgba(74,55,40,0.55);
  letter-spacing: 3px;
  margin-top: 6px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

/* 底部文字 */
.tea-text {
  position: absolute;
  bottom: 18px;
  font-size: 11px;
  color: rgba(139,90,43,0.5);
  letter-spacing: 2px;
  text-align: center;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .steam, .leaf-float {
    animation: none;
  }
  .name, .date, .blessing, .from, .divider, .tea-text {
    opacity: 1;
  }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; min-height: 400px; }
  .cup { width: 56px; height: 44px; }
  .cup::before { right: -14px; width: 16px; height: 22px; }
}
</style>
</head>
<body>

<div class="leaves">
  <div class="leaf-float">🍃</div>
  <div class="leaf-float">🍂</div>
  <div class="leaf-float">🍃</div>
  <div class="leaf-float">🍂</div>
  <div class="leaf-float">🍃</div>
</div>

<div class="cup-container">
  <div class="steam-container">
    <div class="steam"></div>
    <div class="steam"></div>
    <div class="steam"></div>
  </div>
  <div class="cup"></div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🍵</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="tea-text">一盏暖茶 · 一份心意</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿这杯热茶能温暖你的心';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
