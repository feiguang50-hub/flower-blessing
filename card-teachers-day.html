<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教师节祝福</title>
<meta property="og:title" content="🌻 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #f5efe0 0%, #e8d5b0 40%, #d4b87a 80%, #c8a255 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 暖光背景 */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 25% 20%, rgba(255,230,150,0.5) 0%, transparent 45%),
    radial-gradient(ellipse at 75% 80%, rgba(255,200,100,0.3) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(255,220,130,0.2) 0%, transparent 55%);
  animation: warmGlow 7s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes warmGlow {
  0%, 100% { opacity: 0.8; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

/* 粉笔灰粒子 */
.chalk {
  position: fixed;
  animation: chalkFall linear infinite;
  z-index: 1;
  pointer-events: none;
  opacity: 0.7;
  filter: blur(0.5px);
}
@keyframes chalkFall {
  0% { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity: 0; }
  8% { opacity: 0.7; }
  88% { opacity: 0.5; }
  100% { transform: translateY(105vh) translateX(60px) rotate(200deg); opacity: 0; }
}

/* 苹果漂浮 */
.apple {
  position: fixed;
  font-size: 20px;
  animation: appleFloat ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
}
@keyframes appleFloat {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-18px) rotate(5deg); }
}

/* 星星闪烁 */
.star {
  position: fixed;
  width: 4px; height: 4px;
  background: #ffd700;
  border-radius: 50%;
  animation: starTwinkle ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 6px #ffd700, 0 0 12px #ffd700;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 金色光点上升 */
.gold-dot {
  position: fixed;
  width: 3px; height: 3px;
  background: radial-gradient(circle, #ffe066, #ffcc00);
  border-radius: 50%;
  animation: goldRise linear infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 4px #ffcc00;
}
@keyframes goldRise {
  0% { transform: translateY(100vh); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-5vh); opacity: 0; }
}

/* === 卡片外框 === */
.card-wrap {
  position: relative;
  z-index: 10;
  perspective: 1000px;
}

.card-inner {
  position: relative;
  width: clamp(300px, 85vw, 520px);
  min-height: clamp(420px, 75vw, 600px);
  background: linear-gradient(145deg, #fffdf5 0%, #f9f0dc 50%, #f0e4c2 100%);
  border-radius: 24px;
  padding: clamp(28px, 7vw, 48px) clamp(24px, 6vw, 44px);
  box-shadow:
    0 20px 60px rgba(120,70,0,0.25),
    0 8px 24px rgba(120,70,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(14px, 3vw, 22px);
  animation: cardFloat 5s ease-in-out infinite;
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 卡片顶部装饰条 */
.card-inner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, #c8a255, #e8c56c, #c8a255, #e8c56v, #c8a255);
  background-size: 200% 100%;
  border-radius: 24px 24px 0 0;
  animation: stripFlow 3s linear infinite;
}
@keyframes stripFlow {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

/* 苹果图标 */
.top-icon {
  font-size: clamp(38px, 9vw, 58px);
  animation: iconBounce 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  filter: drop-shadow(0 4px 12px rgba(200,50,50,0.3));
}
@keyframes iconBounce {
  from { transform: translateY(-40px) scale(0.5); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* 标题 */
.title {
  font-size: clamp(20px, 5vw, 30px);
  color: #7a5c10;
  letter-spacing: 4px;
  text-align: center;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 分隔线 */
.divider {
  width: 60%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #c8a255, transparent);
  animation: fadeIn 1.2s ease-out 0.7s both;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* 收礼人名字 */
.name {
  font-size: clamp(30px, 8vw, 52px);
  color: #8b6914;
  text-align: center;
  font-weight: bold;
  text-shadow: 0 2px 8px rgba(139,105,20,0.2);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
  line-height: 1.3;
}

/* 祝福语 */
.blessing {
  font-size: clamp(15px, 4vw, 22px);
  color: #6b5520;
  text-align: center;
  line-height: 1.8;
  max-width: 90%;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.2s both;
}

/* 署名 */
.from {
  font-size: clamp(13px, 3.5vw, 18px);
  color: #9a7832;
  text-align: right;
  align-self: flex-end;
  margin-top: 8px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.5s both;
}

/* 日期 */
.date {
  font-size: clamp(11px, 3vw, 14px);
  color: #b8944a;
  text-align: center;
  letter-spacing: 2px;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 1.8s both;
}

/* 底部苹果装饰 */
.bottom-icon {
  font-size: clamp(28px, 6vw, 40px);
  animation: iconBounce 0.9s cubic-bezier(0.34,1.56,0.64,1) 1.8s both;
  filter: drop-shadow(0 4px 10px rgba(200,50,50,0.25));
}

/* 底部装饰文字 */
.footer-text {
  font-size: clamp(10px, 2.5vw, 12px);
  color: #c8a255;
  letter-spacing: 2px;
  text-align: center;
  opacity: 1;
  animation: fadeIn 1.2s ease-out 2s both;
}

/* === 减少动效 === */
@media (prefers-reduced-motion: reduce) {
  .chalk, .apple, .star, .gold-dot,
  .card-inner, .top-icon, .title, .divider,
  .name, .blessing, .from, .date, .bottom-icon, .footer-text {
    animation: none !important;
  }
  .card-inner { transform: none; }
}
</style>
</head>
<body>

<script>
// === 粉笔灰粒子 ===
const chalkColors = ['#f0ede8','#e8e4dc','#d8d4cc','#c8c4bc','#ffffff'];
function createChalk() {
  const el = document.createElement('div');
  el.className = 'chalk';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (Math.random() * 10 + 6) + 'px';
  el.style.color = chalkColors[Math.floor(Math.random() * chalkColors.length)];
  el.style.animationDuration = (Math.random() * 5 + 7) + 's';
  el.style.animationDelay = (Math.random() * 8) + 's';
  el.textContent = '✦';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 15000);
}
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!reducedMotion) {
  for (let i = 0; i < 18; i++) setTimeout(createChalk, i * 600);
  setInterval(createChalk, 900);
}

// === 苹果漂浮 ===
const appleEmojis = ['🍎','🍏','📚','✏️','🌻','⭐'];
function createApple() {
  const el = document.createElement('div');
  el.className = 'apple';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = Math.random() * 70 + 10 + 'vh';
  el.style.animationDuration = (Math.random() * 3 + 3) + 's';
  el.style.animationDelay = (Math.random() * 4) + 's';
  el.textContent = appleEmojis[Math.floor(Math.random() * appleEmojis.length)];
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 12000);
}
if (!reducedMotion) {
  for (let i = 0; i < 6; i++) setTimeout(createApple, i * 1000);
  setInterval(createApple, 3000);
}

// === 星星闪烁 ===
function createStar() {
  const el = document.createElement('div');
  el.className = 'star';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = Math.random() * 80 + 5 + 'vh';
  el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
  el.style.animationDelay = (Math.random() * 3) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 8000);
}
if (!reducedMotion) {
  for (let i = 0; i < 12; i++) setTimeout(createStar, i * 400);
  setInterval(createStar, 1800);
}

// === 金色光点上升 ===
function createGoldDot() {
  const el = document.createElement('div');
  el.className = 'gold-dot';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.animationDuration = (Math.random() * 4 + 5) + 's';
  el.style.animationDelay = (Math.random() * 3) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 12000);
}
if (!reducedMotion) {
  for (let i = 0; i < 8; i++) setTimeout(createGoldDot, i * 800);
  setInterval(createGoldDot, 2000);
}

// === URL参数读取 ===
const p = new URLSearchParams(location.search);
const nameEl = document.getElementById('nameEl');
const dateEl = document.getElementById('dateEl');
const blessingEl = document.getElementById('blessingEl');
const fromEl = document.getElementById('fromEl');
if (nameEl) nameEl.textContent = p.get('n') || '亲爱的老师';
if (dateEl) dateEl.textContent = p.get('d') || '';
if (blessingEl) blessingEl.textContent = p.get('b') || '师恩如海，铭记于心';
if (fromEl) fromEl.textContent = p.get('f') ? '— ' + p.get('f') : '';
</script>

<!-- 卡片内容 -->
<div class="card-wrap">
  <div class="card-inner">
    <div class="top-icon">🌻</div>
    <div class="title">教 师 节 快 乐</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="bottom-icon">🍎</div>
    <div class="footer-text">— 感恩有您 —</div>
  </div>
</div>

</body>
</html>
