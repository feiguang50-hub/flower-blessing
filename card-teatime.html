<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下午茶时光</title>
<meta property="og:title" content="🍪 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #fdf6e8;
  --cream-dark: #f0e4cc;
  --rose-pink: #e8a0a0;
  --rose-deep: #c47070;
  --sage: #7a9e7e;
  --sage-light: #a8c5a0;
  --caramel: #c8854a;
  --text-dark: #5a3825;
  --card-bg: rgba(253, 246, 232, 0.88);
  --card-border: rgba(200, 133, 74, 0.4);
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 15% 85%, rgba(168, 197, 160, 0.2) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 80%, rgba(232, 160, 160, 0.15) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 0%, rgba(200, 133, 74, 0.1) 0%, transparent 50%),
    linear-gradient(170deg, #fdf6e8 0%, #f5e8d4 30%, #ede0c8 60%, #e8d4b8 100%);
  font-family: 'Georgia', 'PingFang SC', 'Microsoft YaHei', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 饼干屑飘落 */
.crumb {
  position: absolute;
  font-size: 12px;
  opacity: 0.6;
  animation: crumbFall linear infinite;
  z-index: 1;
  pointer-events: none;
}
@keyframes crumbFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.5; }
  100% { transform: translateY(105vh) rotate(var(--rot, 360deg)); opacity: 0; }
}

/* 茶杯蒸汽 */
.steam {
  position: absolute;
  width: 5px; height: 18px;
  background: rgba(200, 180, 160, 0.4);
  border-radius: 3px;
  animation: steamRise 3.5s ease-out infinite;
  filter: blur(2px);
  z-index: 5;
  pointer-events: none;
}
@keyframes steamRise {
  0% { transform: translateY(0) scaleX(1); opacity: 0.5; }
  100% { transform: translateY(-55px) scaleX(2) rotate(15deg); opacity: 0; }
}

/* 糖粒光点 */
.sparkle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255, 240, 200, 0.8);
  animation: sparklePulse 3s ease-in-out infinite;
  pointer-events: none;
  z-index: 1;
}
@keyframes sparklePulse {
  0%, 100% { transform: scale(0.5); opacity: 0.3; }
  50% { transform: scale(1.5); opacity: 1; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 28px;
  background: linear-gradient(135deg, var(--caramel), var(--rose-pink), var(--sage-light), var(--caramel));
  background-size: 300% 300%;
  animation: teaBorder 6s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(200, 133, 74, 0.2), 0 8px 40px rgba(0,0,0,0.1);
}
@keyframes teaBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(200, 133, 74, 0.2), 0 8px 40px rgba(0,0,0,0.1); }
  50% { background-position: 100% 50%; box-shadow: 0 0 45px rgba(232, 160, 160, 0.3), 0 8px 40px rgba(0,0,0,0.12); }
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 26px;
  padding: clamp(32px, 8vw, 56px) clamp(28px, 7vw, 52px);
  text-align: center;
  max-width: min(500px, 92vw);
  animation: cardFloat 5s ease-in-out infinite;
  border: 1px solid rgba(255,255,255,0.6);
  position: relative;
  overflow: visible;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.icon {
  font-size: clamp(40px, 10vw, 60px);
  display: block;
  margin-bottom: 10px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes iconDrop {
  from { transform: translateY(-28px) scale(0.6); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.name {
  font-size: clamp(24px, 6vw, 42px);
  font-weight: normal;
  color: var(--text-dark);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
}

.date {
  font-size: clamp(11px, 3vw, 14px);
  color: var(--caramel);
  letter-spacing: 0.18em;
  margin-bottom: 18px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.65s both;
}

.divider {
  display: block;
  width: 56px; height: 1.5px;
  background: linear-gradient(to right, transparent, var(--rose-pink), transparent);
  margin: 14px auto;
  animation: slideUp 1.2s ease-out 0.8s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: var(--text-dark);
  line-height: 1.9;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
}

.from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--sage);
  letter-spacing: 0.1em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}
.from::before { content: '— '; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 茶杯装饰 */
.cup-decoration {
  position: absolute;
  bottom: -8px;
  right: -8px;
  font-size: 48px;
  opacity: 0.15;
  transform: rotate(-15deg);
  pointer-events: none;
}

/* 饼干装饰 */
.biscuit-decoration {
  position: absolute;
  font-size: 28px;
  opacity: 0.2;
  pointer-events: none;
}

@media (prefers-reduced-motion: reduce) {
  .crumb, .steam, .sparkle, .card-wrap, .card { animation: none; }
  .name, .date, .blessing, .from, .divider, .icon { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">🍪</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <span class="divider"></span>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="cup-decoration">🫖</div>
    <div class="biscuit-decoration" style="top:-10px;left:-10px;">🍪</div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的';
const blessing = p.get('b') || '愿你的每一天都如下午茶般温馨甜蜜';
const date = p.get('d') || '';
const from = p.get('f') || '';
const icon = p.get('i') || '🍪';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').textContent = blessing;
document.getElementById('dateEl').textContent = date;
if (from) document.getElementById('fromEl').textContent = from;
else document.getElementById('fromEl').style.display = 'none';
document.getElementById('iconEl').textContent = icon;

// 饼干屑
const crumbEmoji = ['🍪', '🧁', '🧇'];
for (let i = 0; i < 10; i++) {
  const crumb = document.createElement('div');
  crumb.className = 'crumb';
  crumb.textContent = crumbEmoji[i % crumbEmoji.length];
  const drift = (Math.random() - 0.5) * 60;
  const rot = (Math.random() - 0.5) * 540;
  const dur = 8 + Math.random() * 5;
  const delay = Math.random() * 10;
  crumb.style.cssText = `left:${Math.random() * 100}%;top:-30px;--rot:${rot}deg;animation-duration:${dur}s;animation-delay:${delay}s;font-size:${10 + Math.random() * 8}px`;
  document.body.appendChild(crumb);
}

// 茶杯蒸汽
const card = document.querySelector('.card');
for (let i = 0; i < 4; i++) {
  const steam = document.createElement('div');
  steam.className = 'steam';
  steam.style.cssText = `left:${35 + i * 12}%;top:-8px;animation-delay:${i * 0.7}s;animation-duration:${3 + Math.random() * 2}s`;
  card.appendChild(steam);
}

// 糖粒光点
for (let i = 0; i < 12; i++) {
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;animation-delay:${Math.random() * 3}s;animation-duration:${2.5 + Math.random() * 2}s`;
  document.body.appendChild(sp);
}

if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.crumb, .steam, .sparkle').forEach(el => el.remove());
}
</script>
</body>
</html>
