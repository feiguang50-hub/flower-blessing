<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小荧贺卡</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💌 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
/* ═══════════════════════════════════════
   主题变量 — 改这里切换4种风格
   可选 data-theme: sakura | birthday | starry | anniversary
═══════════════════════════════════════ */
:root {
  --bg-from:       #1a1a2e;
  --bg-to:         #0f3460;
  --border-from:   #ffd700;
  --border-to:     #daa520;
  --glow-color:    rgba(255,215,0,0.4);
  --glow-strong:   rgba(255,215,0,0.65);
  --text-primary:  #ffd700;
  --text-secondary:#e8c87a;
  --text-accent:   #fff4cc;
  --card-bg:       rgba(10,10,30,0.82);
  --shadow-card:   rgba(0,0,0,0.55);
  --particle-hue:  48;           /* HSL色相，粒子颜色基准 */
}

[data-theme="sakura"] {
  --bg-from:       #ffeef2;
  --bg-to:         #ffb8c8;
  --border-from:   #ff9a9e;
  --border-to:     #fbc2eb;
  --glow-color:    rgba(255,150,180,0.35);
  --glow-strong:   rgba(255,150,180,0.6);
  --text-primary:  #c0306a;
  --text-secondary:#d4607a;
  --text-accent:   #8b1a40;
  --card-bg:       rgba(255,240,245,0.80);
  --shadow-card:   rgba(180,60,100,0.18);
  --particle-hue:  340;
}

[data-theme="starry"] {
  --bg-from:       #050510;
  --bg-to:         #1a0a3a;
  --border-from:   #9b59f7;
  --border-to:     #c8a8ff;
  --glow-color:    rgba(150,100,255,0.3);
  --glow-strong:   rgba(150,100,255,0.55);
  --text-primary:  #d4b8ff;
  --text-secondary:#b090e0;
  --text-accent:   #ede0ff;
  --card-bg:       rgba(8,4,28,0.85);
  --shadow-card:   rgba(0,0,0,0.7);
  --particle-hue:  270;
}

[data-theme="anniversary"] {
  --bg-from:       #1a0515;
  --bg-to:         #3a1535;
  --border-from:   #ff96b4;
  --border-to:     #b43c6e;
  --glow-color:    rgba(255,100,150,0.35);
  --glow-strong:   rgba(255,100,150,0.6);
  --text-primary:  #ffb3cb;
  --text-secondary:#e880a0;
  --text-accent:   #ffe0ec;
  --card-bg:       rgba(30,5,20,0.83);
  --shadow-card:   rgba(0,0,0,0.65);
  --particle-hue:  340;
}

/* ═══════════════════════════════════════
   重置 & 基础
═══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, var(--bg-from) 0%, var(--bg-to) 100%);
  font-family: 'Georgia', 'Noto Serif SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 背景粒子画布 */
#bgCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════
   3D 翻转容器
═══════════════════════════════════════ */
.flip-scene {
  perspective: 1200px;
  z-index: 10;
  cursor: pointer;
}

.flip-card {
  position: relative;
  width: min(520px, 92vw);
  transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
  transform-style: preserve-3d;
}

.flip-scene.flipped .flip-card {
  transform: rotateY(180deg);
}

/* 正面 / 背面共用 */
.flip-front,
.flip-back {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.flip-back {
  position: absolute;
  inset: 0;
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 提示文字 */
.flip-hint {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: var(--text-secondary);
  opacity: 0.6;
  letter-spacing: 2px;
  white-space: nowrap;
  animation: hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse {
  0%,100% { opacity:0.4; }
  50%      { opacity:0.8; }
}

/* ═══════════════════════════════════════
   发光边框包裹层
═══════════════════════════════════════ */
.card-wrap {
  position: relative;
  padding: 2px;
  border-radius: 34px;
  background: linear-gradient(135deg, var(--border-from), var(--border-to), var(--border-from));
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
  box-shadow: 0 0 25px var(--glow-color);
}

@keyframes borderFlow {
  0%   { background-position: 0% 50%;   box-shadow: 0 0 25px var(--glow-color); }
  50%  { background-position: 100% 50%; box-shadow: 0 0 45px var(--glow-strong); }
  100% { background-position: 0% 50%;   box-shadow: 0 0 25px var(--glow-color); }
}

/* 边框内层光晕 */
.card-wrap::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 35px;
  background: inherit;
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
  filter: blur(8px);
  opacity: 0.5;
  z-index: -1;
}

/* ═══════════════════════════════════════
   卡片主体
═══════════════════════════════════════ */
.card {
  background: var(--card-bg);
  border-radius: 32px;
  padding: clamp(32px, 6vw, 56px) clamp(28px, 7vw, 60px);
  text-align: center;
  width: 100%;
  box-shadow:
    0 16px 48px var(--shadow-card),
    inset 0 1px 0 rgba(255,255,255,0.08);
  animation: cardFloat 5s ease-in-out infinite;
  position: relative;
  overflow: hidden;
  /* 毛玻璃 */
  backdrop-filter: blur(18px) saturate(1.4);
  -webkit-backdrop-filter: blur(18px) saturate(1.4);
}

/* 卡片内顶部光晕 */
.card::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%; transform: translateX(-50%);
  width: 70%; height: 120px;
  background: radial-gradient(ellipse, var(--glow-color) 0%, transparent 70%);
  pointer-events: none;
}

@keyframes cardFloat {
  0%,100% { transform: translateY(0)    rotate(-0.4deg); }
  50%     { transform: translateY(-10px) rotate( 0.4deg); }
}

/* ═══════════════════════════════════════
   卡片背面
═══════════════════════════════════════ */
.card-back-wrap {
  padding: 2px;
  border-radius: 34px;
  background: linear-gradient(135deg, var(--border-to), var(--border-from));
  width: 100%;
}
.card-back {
  background: var(--card-bg);
  border-radius: 32px;
  padding: clamp(32px, 6vw, 56px) clamp(28px, 7vw, 60px);
  text-align: center;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}
.back-text {
  font-size: clamp(14px, 3.5vw, 18px);
  color: var(--text-secondary);
  line-height: 2.1;
  letter-spacing: 1.5px;
}

/* ═══════════════════════════════════════
   卡片内容 — 分层入场
═══════════════════════════════════════ */
.card-icon {
  display: block;
  font-size: clamp(36px, 9vw, 60px);
  margin-bottom: 12px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  filter: drop-shadow(0 4px 12px var(--glow-color));
}
@keyframes iconDrop {
  from { opacity:0; transform: scale(0.5) translateY(-20px); }
  to   { opacity:1; transform: scale(1)   translateY(0); }
}

.name {
  font-size: clamp(26px, 7vw, 52px);
  color: var(--text-primary);
  letter-spacing: clamp(4px, 1.5vw, 10px);
  margin-bottom: 14px;
  text-shadow: 0 0 20px var(--glow-color);
  animation: slideUp 1.1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-secondary);
  letter-spacing: 3px;
  margin-bottom: 24px;
  opacity: 0.85;
  animation: slideUp 1s ease 0.5s both;
}

.divider {
  width: 48px; height: 1.5px;
  margin: 0 auto 20px;
  background: linear-gradient(90deg, transparent, var(--border-from), transparent);
  border-radius: 2px;
  animation: slideUp 0.8s ease 0.65s both;
}

.blessing {
  font-size: clamp(13px, 3.5vw, 16px);
  color: var(--text-accent);
  line-height: 2;
  letter-spacing: 1.5px;
  max-width: 340px;
  margin: 0 auto 28px;
  animation: slideUp 1s ease 0.75s both;
}

.from {
  font-size: clamp(11px, 2.5vw, 13px);
  color: var(--text-secondary);
  letter-spacing: 2px;
  opacity: 0.75;
  animation: slideUp 0.9s ease 0.95s both;
}

@keyframes slideUp {
  from { opacity:0; transform: translateY(20px) scale(0.97); }
  to   { opacity:1; transform: translateY(0)    scale(1); }
}

/* ═══════════════════════════════════════
   无障碍：减少动效
═══════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  .card, .card-wrap, .card-icon, .name, .date, .divider, .blessing, .from, .flip-hint {
    animation: none !important;
  }
  .flip-card { transition: none !important; }
}

/* ═══════════════════════════════════════
   手机端微调
═══════════════════════════════════════ */
@media (max-width: 400px) {
  .card { padding: 28px 20px; }
  .name { letter-spacing: 4px; }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- 3D翻转场景，点击翻面 -->
<div class="flip-scene" id="flipScene">
  <div class="flip-card" id="flipCard">

    <!-- 正面 -->
    <div class="flip-front">
      <div class="card-wrap">
        <div class="card">
          <span class="card-icon" id="iconEl">🎂</span>
          <div class="name"     id="nameEl"></div>
          <div class="date"     id="dateEl"></div>
          <div class="divider"></div>
          <div class="blessing" id="blessingEl"></div>
          <div class="from"     id="fromEl"></div>
        </div>
      </div>
    </div>

    <!-- 背面 -->
    <div class="flip-back">
      <div class="card-back-wrap">
        <div class="card-back">
          <div class="back-text" id="backEl">
            愿每一天都充满光亮<br>
            愿所有心愿悄然实现<br>
            ✨
          </div>
        </div>
      </div>
    </div>

  </div>
  <div class="flip-hint">点击翻转 · tap to flip</div>
</div>

<script>
/* ═══════════════════════════════
   URL 参数解析
   n = 名字  d = 日期  b = 祝福语
   f = 署名  t = 主题  i = 图标
   back = 背面文字
═══════════════════════════════ */
const p = new URLSearchParams(location.search);

const theme = p.get('t') || 'birthday'; // sakura | birthday | starry | anniversary
document.documentElement.dataset.theme = theme === 'birthday' ? '' : theme;
// birthday 用 :root 默认值，其余覆盖

document.getElementById('iconEl').textContent      = p.get('i') || getDefaultIcon(theme);
document.getElementById('nameEl').textContent      = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent      = p.get('d') || '';
document.getElementById('blessingEl').textContent  = p.get('b') || '愿岁月温柔，愿一切美好如期而至';
document.getElementById('fromEl').textContent      = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('back')) {
  document.getElementById('backEl').innerHTML = p.get('back').replace(/\\n/g,'<br>');
}

function getDefaultIcon(t) {
  return { sakura:'🌸', birthday:'🎂', starry:'⭐', anniversary:'💌' }[t] || '🎉';
}

/* ═══════════════════════════════
   3D 翻转
═══════════════════════════════ */
document.getElementById('flipScene').addEventListener('click', function() {
  this.classList.toggle('flipped');
});

/* ═══════════════════════════════
   粒子系统（Canvas）
   根据主题 --particle-hue 自动配色
═══════════════════════════════ */
(function initParticles() {
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');

  // 从 CSS 变量读取色相
  const hue = parseInt(
    getComputedStyle(document.documentElement).getPropertyValue('--particle-hue').trim()
  ) || 48;

  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // 粒子数量根据屏幕面积动态调整，手机上自动减少
  function targetCount() {
    return Math.min(120, Math.floor(W * H / 10000));
  }

  class Particle {
    constructor() { this.reset(true); }
    reset(init) {
      this.x    = Math.random() * W;
      this.y    = init ? Math.random() * H : H + 10;
      this.size = Math.random() * 2.5 + 0.5;
      this.speedY = -(Math.random() * 0.4 + 0.15);
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.life   = 0;
      this.maxLife= Math.random() * 200 + 100;
      this.hue    = hue + (Math.random() - 0.5) * 30;
      this.sat    = Math.random() * 30 + 70;
      this.lit    = Math.random() * 20 + 70;
    }
    update() {
      this.x += this.speedX + Math.sin(this.life * 0.03) * 0.2;
      this.y += this.speedY;
      this.life++;
      if (this.life > this.maxLife || this.y < -10) this.reset(false);
    }
    draw() {
      const t  = this.life / this.maxLife;
      const a  = t < 0.15 ? t / 0.15 : t > 0.8 ? (1 - t) / 0.2 : 1;
      ctx.save();
      ctx.globalAlpha = a * 0.75;
      ctx.fillStyle   = `hsl(${this.hue},${this.sat}%,${this.lit}%)`;
      ctx.shadowColor = `hsl(${this.hue},${this.sat}%,${this.lit}%)`;
      ctx.shadowBlur  = this.size * 3;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // 初始化
  for (let i = 0; i < targetCount(); i++) particles.push(new Particle());

  // 检测 prefers-reduced-motion
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function loop() {
    if (reducedMotion) return; // 减少动效模式跳过粒子
    ctx.clearRect(0, 0, W, H);

    // 补充/裁剪粒子数
    const tc = targetCount();
    while (particles.length < tc) particles.push(new Particle());
    while (particles.length > tc) particles.pop();

    particles.forEach(pt => { pt.update(); pt.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

</body>
</html>
