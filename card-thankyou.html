<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感恩祝福</title>
<meta property="og:title" content="🌻 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(160deg, #2d2006 0%, #5c3d00 30%, #8b6914 60%, #c49a2a 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 温暖阳光背景 === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,220,100,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(255,180,50,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,200,80,0.15) 0%, transparent 60%);
  animation: sunGlow 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes sunGlow {
  0%, 100% { transform: scale(1) translate(0,0); opacity: 0.85; }
  50% { transform: scale(1.08) translate(1%, 1%); opacity: 1; }
}

/* === 飘落羽毛 === */
.feather {
  position: fixed;
  font-size: 16px;
  animation: featherFall linear infinite;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 2px 8px rgba(255,200,80,0.5));
}
@keyframes featherFall {
  0% { transform: translateY(-8vh) translateX(0) rotate(0deg) scale(0.8); opacity: 0; }
  10% { opacity: 1; }
  85% { opacity: 0.9; }
  100% { transform: translateY(108vh) translateX(80px) rotate(360deg) scale(1.1); opacity: 0; }
}

/* === 光点上升 === */
.light-dot {
  position: fixed;
  width: 4px; height: 4px;
  background: radial-gradient(circle, #ffe066, #ffcc00);
  border-radius: 50%;
  animation: lightRise linear infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 6px #ffcc00, 0 0 12px #ffcc00;
}
@keyframes lightRise {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.8; }
  100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
}

/* === 卡片外框发光 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 24px;
  background: linear-gradient(135deg, #ffe066, #ffb347, #ff8c00, #ffd700);
  background-size: 300% 300%;
  animation: borderFlow 4s ease-in-out infinite, floatCard 6s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(255,180,50,0.5), 0 0 60px rgba(255,150,0,0.3);
  z-index: 10;
}
@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes floatCard {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* === 卡片主体 === */
.card {
  background: linear-gradient(165deg, rgba(60,35,0,0.92) 0%, rgba(40,25,5,0.95) 100%);
  border-radius: 22px;
  padding: clamp(28px, 6vw, 48px) clamp(24px, 5vw, 44px);
  text-align: center;
  max-width: 90vw;
  width: 400px;
  position: relative;
  overflow: hidden;
}

/* === 卡片内光效 === */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,200,80,0.08) 0%, transparent 60%);
  pointer-events: none;
}

/* === 向日葵图标 === */
.icon-wrap {
  font-size: clamp(40px, 10vw, 64px);
  margin-bottom: 16px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(255,180,50,0.6));
}
@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* === 标题 === */
.title {
  font-size: clamp(18px, 5vw, 26px);
  color: #ffd700;
  letter-spacing: 6px;
  margin-bottom: 24px;
  text-shadow: 0 0 20px rgba(255,200,80,0.5);
  animation: fadeIn 1.2s ease-out 0.5s both;
}

/* === 收礼人名字 === */
.name {
  font-size: clamp(28px, 8vw, 48px);
  color: #ffe066;
  font-weight: bold;
  margin-bottom: 12px;
  text-shadow: 0 0 24px rgba(255,220,100,0.7);
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

/* === 祝福语 === */
.blessing {
  font-size: clamp(15px, 4vw, 20px);
  color: #fff8e1;
  line-height: 1.8;
  margin-bottom: 20px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
}

/* === 日期 === */
.date {
  font-size: clamp(12px, 3vw, 15px);
  color: rgba(255,220,150,0.7);
  margin-bottom: 10px;
  letter-spacing: 2px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.1s both;
}

/* === 署名 === */
.from {
  font-size: clamp(13px, 3.5vw, 16px);
  color: #ffcc66;
  font-style: italic;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.3s both;
}

/* === 装饰线 === */
.divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, #ffd700, transparent);
  margin: 16px auto;
  animation: fadeIn 1s ease-out 1s both;
}

/* === 动画关键帧 === */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === 响应式 === */
@media (max-width: 480px) {
  .card { padding: 24px 20px; }
}
</style>
</head>
<body>

<!-- 飘落羽毛 -->
<script>
const feathers = ['🪶', '✨', '🌻', '💛'];
const count = 12;
for (let i = 0; i < count; i++) {
  const el = document.createElement('div');
  el.className = 'feather';
  el.textContent = feathers[Math.floor(Math.random() * feathers.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (12 + Math.random() * 10) + 'px';
  el.style.animationDuration = (8 + Math.random() * 6) + 's';
  el.style.animationDelay = (Math.random() * 8) + 's';
  document.body.appendChild(el);
}

// 光点上升
const dotCount = 15;
for (let i = 0; i < dotCount; i++) {
  const dot = document.createElement('div');
  dot.className = 'light-dot';
  dot.style.left = Math.random() * 100 + 'vw';
  dot.style.animationDuration = (4 + Math.random() * 4) + 's';
  dot.style.animationDelay = (Math.random() * 6) + 's';
  dot.style.width = (3 + Math.random() * 4) + 'px';
  dot.style.height = dot.style.width;
  document.body.appendChild(dot);
}
</script>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="icon-wrap">🌻</div>
    <div class="title">THANK YOU</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="divider"></div>
    <div class="date" id="dateEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('blessingEl').textContent = p.get('b') || '感谢一路有你，愿温暖与美好永远相伴';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 无障碍：减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.feather, .light-dot, .card-wrap').forEach(el => {
    el.style.animation = 'none';
  });
}
</script>

</body>
</html>
