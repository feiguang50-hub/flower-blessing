<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浪漫车票</title>
<meta property="og:title" content="🎫 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --paper-cream: #f5e6c8;
  --paper-warm: #e8d4a8;
  --paper-dark: #c8a870;
  --ink-brown: #3d2b1f;
  --ink-light: #6b4c30;
  --stamp-red: #c0392b;
  --stamp-blue: #1a3a6e;
  --line-gold: #b8860b;
  --text-warm: #3d2b1f;
  --card-bg: rgba(245, 230, 200, 0.96);
  --card-border: rgba(139, 90, 43, 0.5);
  --glow-warm: rgba(218, 165, 32, 0.3);
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(218, 165, 32, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(180, 120, 50, 0.1) 0%, transparent 50%),
    linear-gradient(180deg,
      #d4b896 0%,
      #c8a870 25%,
      #bfa060 45%,
      #c8a870 65%,
      #d4b896 80%,
      #e0c89a 100%);
  font-family: 'Georgia', 'Times New Roman', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 旧纸纹理 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 28px,
      rgba(100, 70, 30, 0.06) 28px,
      rgba(100, 70, 30, 0.06) 29px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 28px,
      rgba(100, 70, 30, 0.04) 28px,
      rgba(100, 70, 30, 0.04) 29px
    ),
    radial-gradient(ellipse at 30% 30%, rgba(139, 90, 43, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 70%, rgba(139, 90, 43, 0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* 装饰角花纹 */
.corner-ornament {
  position: fixed;
  width: 140px; height: 140px;
  z-index: 2; pointer-events: none;
  opacity: 0.35;
}
.corner-ornament.top-left { top: 8px; left: 8px; }
.corner-ornament.top-right { top: 8px; right: 8px; transform: scaleX(-1); }
.corner-ornament.bottom-left { bottom: 8px; left: 8px; transform: scaleY(-1); }
.corner-ornament.bottom-right { bottom: 8px; right: 8px; transform: scale(-1); }

/* 票根装饰孔洞 */
.ticket-perfs {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 20px;
  z-index: 3; pointer-events: none;
  display: flex; flex-direction: column;
  justify-content: space-around;
  padding: 40px 0;
}
.perf-hole {
  width: 14px; height: 14px;
  background: #bfa060;
  border-radius: 50%;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}

/* 票面 */
.ticket {
  position: relative;
  z-index: 10;
  width: min(520px, 92vw);
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow:
    0 4px 24px rgba(61, 43, 31, 0.25),
    0 1px 4px rgba(61, 43, 31, 0.15),
    inset 0 0 0 1px var(--card-border);
  overflow: hidden;
  animation: ticketAppear 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
}
@keyframes ticketAppear {
  from { transform: scale(0.85) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

/* 撕边效果 */
.ticket::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 60px;
  width: 2px;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    var(--paper-warm) 5%,
    transparent 10%,
    var(--paper-warm) 20%,
    transparent 25%,
    var(--paper-warm) 35%,
    transparent 40%,
    var(--paper-warm) 50%,
    transparent 55%,
    var(--paper-warm) 65%,
    transparent 70%,
    var(--paper-warm) 80%,
    transparent 85%,
    var(--paper-warm) 95%,
    transparent 100%
  );
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 8px,
    var(--paper-warm) 8px,
    transparent 12px
  );
  z-index: 5;
}

/* 票面顶部分隔线 */
.ticket-top {
  padding: 22px 28px 16px;
  border-bottom: 2px dashed rgba(139, 90, 43, 0.35);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

/* 目的地信息 */
.destination-area { flex: 1; }
.departure-label {
  font-size: clamp(9px, 2.5vw, 11px);
  color: var(--ink-light);
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.75;
  margin-bottom: 4px;
}
.destination-city {
  font-size: clamp(20px, 5.5vw, 30px);
  color: var(--text-warm);
  font-weight: bold;
  letter-spacing: 2px;
  line-height: 1.1;
  text-shadow: 1px 1px 0 rgba(218, 165, 32, 0.2);
}
.departure-city {
  font-size: clamp(13px, 3.5vw, 17px);
  color: var(--ink-light);
  margin-top: 4px;
  letter-spacing: 1px;
}

/* 日期区 */
.date-area {
  text-align: right;
  flex-shrink: 0;
}
.date-label {
  font-size: clamp(9px, 2.5vw, 11px);
  color: var(--ink-light);
  letter-spacing: 2px;
  opacity: 0.75;
  margin-bottom: 3px;
}
.date-value {
  font-size: clamp(13px, 3.5vw, 16px);
  color: var(--text-warm);
  font-weight: bold;
  letter-spacing: 1px;
}
.passenger-label {
  font-size: clamp(9px, 2.5vw, 11px);
  color: var(--ink-light);
  letter-spacing: 2px;
  opacity: 0.75;
  margin-top: 8px;
  margin-bottom: 3px;
}
.passenger-name {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-warm);
  font-style: italic;
}

/* 票面主体 */
.ticket-body {
  padding: 16px 28px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* 车票图标装饰 */
.ticket-icon {
  font-size: clamp(32px, 8vw, 48px);
  animation: iconFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 2px 6px rgba(139, 90, 43, 0.3));
}
@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* 祝福语 */
.blessing {
  font-size: clamp(14px, 4vw, 19px);
  color: var(--text-warm);
  text-align: center;
  line-height: 1.7;
  letter-spacing: 1px;
  padding: 0 8px;
}

/* 署名 */
.from {
  font-size: clamp(11px, 3vw, 14px);
  color: var(--ink-light);
  letter-spacing: 2px;
  font-style: italic;
  padding-top: 4px;
  border-top: 1px solid rgba(139, 90, 43, 0.25);
  width: 100%;
  text-align: right;
  padding-right: 4px;
}

/* 票面底部分隔线 */
.ticket-bottom {
  padding: 14px 28px 20px;
  border-top: 2px dashed rgba(139, 90, 43, 0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 座位号/等级 */
.seat-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.seat-label {
  font-size: clamp(8px, 2vw, 10px);
  color: var(--ink-light);
  letter-spacing: 2px;
  opacity: 0.7;
}
.seat-value {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--stamp-red);
  font-weight: bold;
  letter-spacing: 1px;
}

/* 票价区 */
.price-area {
  text-align: center;
}
.price-label {
  font-size: clamp(8px, 2vw, 10px);
  color: var(--ink-light);
  letter-spacing: 2px;
  opacity: 0.7;
}
.price-value {
  font-size: clamp(11px, 3vw, 14px);
  color: var(--ink-light);
  letter-spacing: 1px;
}

/* 车次 */
.train-num {
  text-align: right;
}
.train-label {
  font-size: clamp(8px, 2vw, 10px);
  color: var(--ink-light);
  letter-spacing: 2px;
  opacity: 0.7;
}
.train-value {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--stamp-blue);
  font-weight: bold;
  letter-spacing: 2px;
}

/* 票根（右侧副券） */
.副券 {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 60px;
  background: linear-gradient(90deg, rgba(200, 168, 112, 0.3) 0%, rgba(200, 168, 112, 0.15) 100%);
  border-left: 2px dashed rgba(139, 90, 43, 0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 0;
}
.stub-icon { font-size: clamp(18px, 4vw, 24px); }
.stub-text {
  font-size: clamp(8px, 2vw, 10px);
  color: var(--ink-light);
  letter-spacing: 2px;
  writing-mode: vertical-rl;
}
.stub-line {
  width: 1px;
  height: 40px;
  background: rgba(139, 90, 43, 0.3);
}

/* 边框流光 */
.ticket-wrap {
  position: relative;
  padding: 2px;
  background: linear-gradient(135deg, var(--line-gold), #daa520, var(--line-gold), #daa520, var(--line-gold));
  background-size: 200% 200%;
  border-radius: 14px;
  animation: borderFlow 4s ease-in-out infinite;
  box-shadow:
    0 0 16px var(--glow-warm),
    0 0 40px rgba(218, 165, 32, 0.15);
}
@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 票根孔洞（右侧） */
.ticket-wrap::after {
  content: '';
  position: absolute;
  right: -1px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  background: #bfa060;
  border-radius: 50%;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  z-index: 20;
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .ticket, .ticket-icon { animation: none; }
  .ticket { opacity: 1; }
  .ticket-wrap { animation: none; background: var(--line-gold); }
}
</style>

<body>

<!-- 角饰 -->
<svg class="corner-ornament top-left" viewBox="0 0 140 140" fill="none">
  <path d="M10 130 Q10 10 130 10" stroke="#8b5a2b" stroke-width="1.5" fill="none"/>
  <path d="M20 120 Q20 20 120 20" stroke="#8b5a2b" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="15" cy="15" r="3" fill="#8b5a2b" opacity="0.6"/>
  <path d="M5 50 Q10 30 30 25" stroke="#8b5a2b" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M50 5 Q30 10 25 30" stroke="#8b5a2b" stroke-width="0.8" fill="none" opacity="0.4"/>
</svg>
<svg class="corner-ornament top-right" viewBox="0 0 140 140" fill="none">
  <path d="M10 130 Q10 10 130 10" stroke="#8b5a2b" stroke-width="1.5" fill="none"/>
  <path d="M20 120 Q20 20 120 20" stroke="#8b5a2b" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="15" cy="15" r="3" fill="#8b5a2b" opacity="0.6"/>
  <path d="M5 50 Q10 30 30 25" stroke="#8b5a2b" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M50 5 Q30 10 25 30" stroke="#8b5a2b" stroke-width="0.8" fill="none" opacity="0.4"/>
</svg>
<svg class="corner-ornament bottom-left" viewBox="0 0 140 140" fill="none">
  <path d="M10 130 Q10 10 130 10" stroke="#8b5a2b" stroke-width="1.5" fill="none"/>
  <path d="M20 120 Q20 20 120 20" stroke="#8b5a2b" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="15" cy="15" r="3" fill="#8b5a2b" opacity="0.6"/>
  <path d="M5 50 Q10 30 30 25" stroke="#8b5a2b" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M50 5 Q30 10 25 30" stroke="#8b5a2b" stroke-width="0.8" fill="none" opacity="0.4"/>
</svg>
<svg class="corner-ornament bottom-right" viewBox="0 0 140 140" fill="none">
  <path d="M10 130 Q10 10 130 10" stroke="#8b5a2b" stroke-width="1.5" fill="none"/>
  <path d="M20 120 Q20 20 120 20" stroke="#8b5a2b" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="15" cy="15" r="3" fill="#8b5a2b" opacity="0.6"/>
  <path d="M5 50 Q10 30 30 25" stroke="#8b5a2b" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M50 5 Q30 10 25 30" stroke="#8b5a2b" stroke-width="0.8" fill="none" opacity="0.4"/>
</svg>

<!-- 左侧撕边孔洞 -->
<div class="ticket-perfs">
  <div class="perf-hole"></div>
  <div class="perf-hole"></div>
  <div class="perf-hole"></div>
  <div class="perf-hole"></div>
  <div class="perf-hole"></div>
  <div class="perf-hole"></div>
  <div class="perf-hole"></div>
</div>

<div class="ticket-wrap">
  <div class="ticket">
    <!-- 顶部 -->
    <div class="ticket-top">
      <div class="destination-area">
        <div class="departure-label">TO · 目的地</div>
        <div class="destination-city" id="nameEl">幸福站</div>
        <div class="departure-city" style="margin-top:6px">FROM · 出发</div>
        <div class="departure-city" style="font-size:clamp(10px,2.8vw,13px);color:var(--ink-light);">爱你的朋友</div>
      </div>
      <div class="date-area">
        <div class="date-label">DATE · 日期</div>
        <div class="date-value" id="dateEl">2026.07.09</div>
        <div class="passenger-label">PASSENGER · 旅客</div>
        <div class="passenger-name" id="fromEl"></div>
      </div>
    </div>

    <!-- 主体 -->
    <div class="ticket-body">
      <div class="ticket-icon">🚂</div>
      <div class="blessing" id="blessingEl">愿这趟旅程<br>开往皆是美好</div>
      <div class="from" id="fromBottomEl"></div>
    </div>

    <!-- 底部 -->
    <div class="ticket-bottom">
      <div class="seat-info">
        <div class="seat-label">CLASS · 座位</div>
        <div class="seat-value">VIP · 专属</div>
      </div>
      <div class="price-area">
        <div class="price-label">PRICE ·票价</div>
        <div class="price-value">无价</div>
      </div>
      <div class="train-num">
        <div class="train-label">TRAIN · 车次</div>
        <div class="train-value">❤️ 001</div>
      </div>
    </div>

    <!-- 副券 -->
    <div class="副券">
      <div class="stub-line"></div>
      <div class="stub-icon">🎫</div>
      <div class="stub-line"></div>
      <div class="stub-text">副券</div>
      <div class="stub-line"></div>
    </div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '幸福站';
const blessing = p.get('b') || '愿这趟旅程\n开往皆是美好';
const date = p.get('d') || new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'.');
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').innerHTML = blessing.replace(/\n/g,'<br>');
document.getElementById('dateEl').textContent = date;
if (from) {
  document.getElementById('fromEl').textContent = from;
  document.getElementById('fromBottomEl').textContent = '— ' + from;
} else {
  document.getElementById('fromEl').style.display = 'none';
  document.getElementById('fromBottomEl').style.display = 'none';
}
</script>

</body>
</html>
