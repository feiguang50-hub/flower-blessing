<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行手账</title>
<meta property="og:title" content="🛫 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --paper-aged: #f4ead5;
  --paper-cream: #faf6ee;
  --stamp-red: #c84040;
  --stamp-blue: #3a6abf;
  --stamp-green: #3a8a5a;
  --ink-brown: #5a3a2a;
  --ink-dark: #3a2a1a;
  --ink-faded: #8a7a6a;
  --accent-gold: #c8a050;
  --accent-teal: #3a9090;
  --card-bg: rgba(250,246,238,0.92);
  --border-wood: #8a6a4a;
  --text-main: #4a3a2a;
  --text-sub: #7a6a5a;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(200,180,140,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(180,200,180,0.15) 0%, transparent 45%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(200,180,140,0.04) 10px,
      rgba(200,180,140,0.04) 20px
    ),
    linear-gradient(180deg, #e8dcc8 0%, #f0e4d0 50%, #e8dcc8 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 邮戳装饰 */
.postmark {
  position: fixed;
  width: 60px;
  height: 60px;
  border: 3px solid var(--stamp-red);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: bold;
  color: var(--stamp-red);
  opacity: 0.55;
  transform: rotate(-15deg);
  z-index: 2;
  pointer-events: none;
  letter-spacing: 1px;
}
.postmark::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid var(--stamp-red);
  border-radius: 50%;
  opacity: 0.5;
}
.postmark-1 { top: 12%; left: 6%; }
.postmark-2 { top: 20%; right: 10%; transform: rotate(12deg); border-color: var(--stamp-blue); color: var(--stamp-blue); }
.postmark-2::before { border-color: var(--stamp-blue); }
.postmark-3 { bottom: 18%; left: 8%; transform: rotate(-8deg); border-color: var(--stamp-green); color: var(--stamp-green); }
.postmark-3::before { border-color: var(--stamp-green); }

/* 机票碎片装饰 */
.ticket-frag {
  position: fixed;
  background: var(--paper-cream);
  border: 1px solid rgba(180,160,120,0.4);
  z-index: 1;
  pointer-events: none;
  opacity: 0.7;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
}
.ticket-1 {
  top: 8%;
  right: 15%;
  width: 80px;
  height: 40px;
  border-radius: 6px;
  transform: rotate(8deg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--accent-teal);
  letter-spacing: 2px;
}
.ticket-2 {
  bottom: 22%;
  right: 6%;
  width: 60px;
  height: 30px;
  border-radius: 4px;
  transform: rotate(-12deg);
}

/* 虚线路径装饰 */
.dotted-line {
  position: fixed;
  z-index: 0;
  pointer-events: none;
  border-top: 2px dashed rgba(180,140,100,0.35);
}
.dotted-1 {
  top: 35%;
  left: 0;
  width: 15%;
  transform: rotate(-10deg);
}
.dotted-2 {
  bottom: 30%;
  right: 0;
  width: 12%;
  transform: rotate(8deg);
}

/* 卡片外框（木纹边框） */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background:
    repeating-linear-gradient(
      90deg,
      #8a6a4a 0px,
      #a07850 3px,
      #8a6a4a 6px,
      #7a5a3a 9px,
      #8a6a4a 12px
    );
  border-radius: 6px;
  box-shadow:
    0 6px 24px rgba(90,60,30,0.25),
    0 2px 8px rgba(90,60,30,0.15),
    inset 0 1px 0 rgba(255,255,255,0.1);
  animation: woodGrain 8s ease-in-out infinite;
}
@keyframes woodGrain {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.05); }
}

.card {
  background: var(--card-bg);
  border-radius: 4px;
  padding: clamp(28px, 7vw, 48px) clamp(24px, 6vw, 44px);
  width: min(480px, 88vw);
  position: relative;
  animation: cardReveal 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}

@keyframes cardReveal {
  from { transform: scale(0.88) rotate(-1deg); opacity: 0; }
  to { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 机票风格顶部装饰 */
.ticket-header {
  background: var(--stamp-blue);
  margin: -28px -44px 24px;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}
.ticket-header::before,
.ticket-header::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 16px;
  background: #e8dcc8;
  border-radius: 50%;
}
.ticket-header::before { left: -8px; }
.ticket-header::after { right: -8px; }

.ticket-title {
  font-size: clamp(13px, 3vw, 16px);
  color: #fff;
  letter-spacing: 4px;
  font-weight: bold;
}
.ticket-icon {
  font-size: clamp(20px, 5vw, 28px);
}

.ticket-dots {
  display: flex;
  gap: 5px;
}
.ticket-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
}

/* 收礼人姓名 */
.card-name {
  font-size: clamp(24px, 6vw, 38px);
  font-weight: normal;
  color: var(--ink-dark);
  margin-bottom: 14px;
  letter-spacing: 5px;
  font-style: italic;
  position: relative;
  display: inline-block;
  opacity: 1;
  animation: inkWrite 1.2s ease-out 0.2s both;
}
.card-name::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 100%;
  height: 1px;
  background: var(--accent-gold);
  opacity: 0.6;
}
@keyframes inkWrite {
  from { opacity: 0; letter-spacing: 10px; }
  to { opacity: 1; letter-spacing: 5px; }
}

/* 日期 */
.card-date {
  font-size: clamp(11px, 3vw, 14px);
  color: var(--ink-faded);
  letter-spacing: 3px;
  margin-bottom: 24px;
  opacity: 1;
  animation: slideUp 1s ease-out 0.35s both;
}

/* 分隔线 */
.card-divider {
  width: 100%;
  height: 1px;
  background: repeating-linear-gradient(
    90deg,
    var(--ink-faded) 0px,
    var(--ink-faded) 4px,
    transparent 4px,
    transparent 8px
  );
  margin-bottom: 24px;
  opacity: 0.4;
  animation: widthGrow 1s ease-out 0.5s both;
}
@keyframes widthGrow {
  from { width: 0; opacity: 0; }
  to { width: 100%; opacity: 0.4; }
}

/* 祝福语 */
.card-blessing {
  font-size: clamp(14px, 3.8vw, 18px);
  color: var(--text-main);
  line-height: 1.9;
  letter-spacing: 1.5px;
  margin-bottom: 24px;
  opacity: 1;
  animation: slideUp 1s ease-out 0.55s both;
}

/* 署名 */
.card-from {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--text-sub);
  letter-spacing: 2px;
  opacity: 1;
  animation: slideUp 1s ease-out 0.75s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 底部印章 */
.card-stamp {
  position: absolute;
  bottom: 12px;
  right: 16px;
  font-size: 11px;
  color: var(--stamp-red);
  border: 2px solid var(--stamp-red);
  padding: 3px 8px;
  border-radius: 3px;
  opacity: 0.6;
  transform: rotate(-6deg);
  letter-spacing: 2px;
  font-weight: bold;
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card { animation: none; }
  .card { opacity: 1; }
  .card-wrap { animation: none; }
}
</style>

</head>
<body>

<!-- 邮戳 -->
<div class="postmark postmark-1">POST</div>
<div class="postmark postmark-2">AIR</div>
<div class="postmark postmark-3">MAIL</div>

<!-- 机票碎片 -->
<div class="ticket-frag ticket-1">✈ BOARDING</div>
<div class="ticket-frag ticket-2"></div>

<!-- 虚线路径 -->
<div class="dotted-line dotted-1"></div>
<div class="dotted-line dotted-2"></div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <!-- 机票头部 -->
    <div class="ticket-header">
      <div class="ticket-title">BOARDING PASS</div>
      <div class="ticket-icon">✈</div>
      <div class="ticket-dots">
        <div class="ticket-dot"></div>
        <div class="ticket-dot"></div>
        <div class="ticket-dot"></div>
      </div>
    </div>

    <!-- 内容 -->
    <div class="card-name" id="nameEl">亲爱的旅客</div>
    <div class="card-date" id="dateEl"></div>
    <div class="card-divider"></div>
    <div class="card-blessing" id="blessingEl">愿你的每一段旅程<br>都充满惊喜与美好</div>
    <div class="card-from" id="fromEl"></div>

    <!-- 邮戳印章 -->
    <div class="card-stamp">MEMORY</div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的旅客';
const blessing = p.get('b') || '愿你的每一段旅程\n都充满惊喜与美好';
const date = p.get('d') || '';
const from = p.get('f') || '';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').innerHTML = blessing.replace(/\n/g, '<br>');
document.getElementById('dateEl').textContent = date;
document.getElementById('fromEl').textContent = from ? '— ' + from : '';
</script>

</body>
</html>
