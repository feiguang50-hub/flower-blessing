<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄昏玫瑰庭园</title>
<meta property="og:title" content="🌅 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --twilight-purple: #6b3fa0;
  --twilight-pink: #e87fa0;
  --twilight-rose: #d4607a;
  --twilight-gold: #f5c842;
  --twilight-orange: #f4845f;
  --twilight-cream: #fff0e8;
  --card-bg: rgba(255, 240, 248, 0.88);
  --text-wine: #7a3055;
  --glow-rose: rgba(230, 100, 130, 0.4);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg,
    #2d1b4e 0%,
    #5a2d7a 20%,
    #a0406a 40%,
    #d4607a 55%,
    #f4845f 70%,
    #f5c842 85%,
    #fff0e8 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  perspective: 1200px;
}

/* 夕阳余晖 */
body::before {
  content: '';
  position: fixed;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  width: 280px;
  height: 280px;
  background: radial-gradient(circle,
    rgba(255, 240, 200, 0.6) 0%,
    rgba(255, 180, 100, 0.4) 30%,
    rgba(255, 120, 60, 0.2) 50%,
    transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: sunGlow 4s ease-in-out infinite;
}

@keyframes sunGlow {
  0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
}

/* 玫瑰花瓣 */
.petal {
  position: fixed;
  font-size: 18px;
  z-index: 1;
  pointer-events: none;
  animation: petalFall linear infinite;
  opacity: 0.75;
}

@keyframes petalFall {
  0% {
    transform: translateY(-40px) rotate(0deg) translateX(0px);
    opacity: 0;
  }
  10% { opacity: 0.75; }
  90% { opacity: 0.75; }
  100% {
    transform: translateY(110vh) rotate(360deg) translateX(80px);
    opacity: 0;
  }
}

/* 萤火虫光点 */
.sparkle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: radial-gradient(circle, #fff8c0, #f5c842);
  border-radius: 50%;
  z-index: 1;
  pointer-events: none;
  animation: sparkleFloat ease-in-out infinite;
  box-shadow: 0 0 6px 2px rgba(245, 200, 66, 0.6);
}

@keyframes sparkleFloat {
  0%, 100% { opacity: 0.2; transform: translateY(0px) scale(0.8); }
  50% { opacity: 1; transform: translateY(-20px) scale(1.2); }
}

/* 翻转卡片容器 */
.card-wrap {
  perspective: 1200px;
  z-index: 10;
}

.card-scene {
  width: clamp(300px, 85vw, 420px);
  min-height: clamp(420px, 85vw, 560px);
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.9s cubic-bezier(0.34, 1.2, 0.64, 1);
  cursor: pointer;
  margin: 20px;
}

.card-scene.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  text-align: center;
}

/* 卡片外框发光 */
.card-wrap::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, #f4845f, #e87fa0, #a0406a, #6b3fa0, #f5c842);
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
  z-index: -1;
  opacity: 0.8;
  padding: 2px;
}

@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card-front {
  background: var(--card-bg);
  box-shadow:
    0 0 30px var(--glow-rose),
    0 20px 60px rgba(100, 40, 80, 0.2);
}

.card-back {
  background: linear-gradient(145deg, #2d1b4e, #5a2d7a);
  transform: rotateY(180deg);
  color: #fff0e8;
  box-shadow:
    0 0 30px rgba(140, 60, 160, 0.4),
    0 20px 60px rgba(50, 20, 80, 0.3);
}

/* 翻转提示 */
.flip-hint {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: var(--twilight-pink);
  opacity: 0.7;
  animation: hintPulse 2s ease-in-out infinite;
  white-space: nowrap;
}

@keyframes hintPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.9; }
}

.flip-hint-back {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: rgba(255, 240, 232, 0.6);
  animation: hintPulse 2s ease-in-out infinite;
  white-space: nowrap;
}

/* 玫瑰装饰 */
.rose-icon {
  font-size: 48px;
  margin-bottom: 16px;
  animation: iconDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  filter: drop-shadow(0 4px 8px rgba(200, 80, 100, 0.3));
}

@keyframes iconDrop {
  from { opacity: 0; transform: translateY(-30px) scale(0.5); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.date-display {
  font-size: 13px;
  color: var(--twilight-rose);
  letter-spacing: 2px;
  margin-bottom: 10px;
  opacity: 0;
  animation: slideUp 1s ease-out 0.5s both;
}

.name-display {
  font-size: clamp(32px, 9vw, 52px);
  font-weight: 700;
  color: var(--text-wine);
  margin-bottom: 20px;
  opacity: 0;
  animation: slideUp 1.2s ease-out 0.7s both;
  text-shadow: 0 2px 10px rgba(200, 80, 120, 0.15);
}

.blessing-display {
  font-size: clamp(15px, 4.5vw, 18px);
  line-height: 1.8;
  color: #6a3050;
  max-width: 320px;
  opacity: 0;
  animation: slideUp 1.2s ease-out 0.9s both;
}

.from-display {
  font-size: 14px;
  color: var(--twilight-pink);
  margin-top: 24px;
  opacity: 0;
  animation: slideUp 1.2s ease-out 1.1s both;
}

/* 背面内容 */
.back-title {
  font-size: 22px;
  color: var(--twilight-gold);
  margin-bottom: 20px;
  opacity: 0;
  animation: slideUp 1s ease-out 0.4s both;
}

.back-message {
  font-size: clamp(14px, 4vw, 16px);
  line-height: 1.9;
  color: rgba(255, 240, 232, 0.9);
  max-width: 300px;
  opacity: 0;
  animation: slideUp 1.2s ease-out 0.6s both;
}

.rose-divider {
  font-size: 28px;
  margin: 16px 0;
  opacity: 0;
  animation: slideUp 1s ease-out 0.5s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .petal, .sparkle, .card-wrap::before, .flip-hint, .flip-hint-back {
    animation: none;
    opacity: 0.5;
  }
  .name-display, .blessing-display, .from-display, .date-display,
  .back-title, .back-message, .rose-divider {
    animation: none;
    opacity: 1;
  }
}
</style>
</head>
<body>

<div class="card-wrap">
  <div class="card-scene" id="cardScene" onclick="this.classList.toggle('flipped')">
    <div class="card-face card-front">
      <div class="rose-icon">🌹</div>
      <div class="date-display" id="dateEl"></div>
      <div class="name-display" id="nameEl"></div>
      <div class="blessing-display" id="blessingEl"></div>
      <div class="from-display" id="fromEl"></div>
      <div class="flip-hint">👆 点击翻开</div>
    </div>
    <div class="card-face card-back">
      <div class="back-title">💌 专属留言</div>
      <div class="rose-divider">🌸</div>
      <div class="back-message" id="backEl"></div>
      <div class="flip-hint-back">👆 点击翻回</div>
    </div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿你的生活如黄昏般温柔，每一天都值得期待';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
if (p.get('back')) {
  document.getElementById('backEl').innerHTML = p.get('back').replace(/\\n/g, '<br>');
} else {
  document.getElementById('backEl').innerHTML = '有你的日子，<br>每一天都是礼物。';
}

// 玫瑰花瓣
const petals = ['🌹', '🌸', '💮', '🥀'];
for (let i = 0; i < 10; i++) {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = petals[Math.floor(Math.random() * petals.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.animationDuration = (5 + Math.random() * 5) + 's';
  el.style.animationDelay = Math.random() * 8 + 's';
  el.style.fontSize = (14 + Math.random() * 10) + 'px';
  document.body.appendChild(el);
}

// 萤火虫光点
for (let i = 0; i < 12; i++) {
  const el = document.createElement('div');
  el.className = 'sparkle';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = (20 + Math.random() * 60) + 'vh';
  el.style.animationDuration = (2 + Math.random() * 3) + 's';
  el.style.animationDelay = Math.random() * 5 + 's';
  document.body.appendChild(el);
}
</script>
</body>
</html>
