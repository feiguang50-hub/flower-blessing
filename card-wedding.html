<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚礼祝福</title>
<meta property="og:title" content="💍 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="💍 收到一份专属贺卡">
<meta name="twitter:description" content="点击打开，你们的专属回忆在里面哦">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #fdf6ee 0%, #f5e6d3 40%, #edd9c0 100%);
  font-family: 'Georgia', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* === 背景光晕 === */
.body-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.body-glow::before {
  content: '';
  position: absolute; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 25% 20%, rgba(255,220,160,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 80%, rgba(255,200,140,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,240,200,0.1) 0%, transparent 60%);
  animation: warmGlow 7s ease-in-out infinite;
}
@keyframes warmGlow {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.04); opacity: 1; }
}

/* === 飘落花瓣 === */
.petal {
  position: fixed; font-size: 14px;
  animation: petalFall linear infinite;
  z-index: 1; pointer-events: none;
  filter: drop-shadow(0 0 5px rgba(255,180,140,0.3));
}
@keyframes petalFall {
  0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
  8% { opacity: 0.7; }
  90% { opacity: 0.5; }
  100% { transform: translateY(105vh) rotate(300deg) translateX(40px); opacity: 0; }
}

/* === 戒指闪烁 === */
.ring-sparkle {
  position: fixed; width: 4px; height: 4px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffe066, #ffcc00);
  animation: sparkleFloat linear infinite;
  z-index: 1; pointer-events: none;
  filter: blur(0.5px);
}
@keyframes sparkleFloat {
  0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
  10% { opacity: 0.9; }
  85% { opacity: 0.7; }
  100% { transform: translateY(-5vh) scale(1); opacity: 0; }
}

/* === 金色边框 === */
.card-wrap {
  position: relative;
  padding: 3px;
  border-radius: 34px;
  background: linear-gradient(135deg,
    #d4a843,
    #f0d080,
    #d4a843,
    #e8c860,
    #d4a843);
  background-size: 300% 300%;
  animation: goldBorder 4s ease infinite;
  box-shadow:
    0 0 30px rgba(212,168,67,0.4),
    0 0 70px rgba(212,168,67,0.18),
    inset 0 0 20px rgba(255,220,100,0.15);
  z-index: 10;
}
@keyframes goldBorder {
  0% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(212,168,67,0.4), 0 0 70px rgba(212,168,67,0.18); }
  50% { background-position: 100% 50%; box-shadow: 0 0 45px rgba(240,200,80,0.6), 0 0 90px rgba(212,168,67,0.28); }
  100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(212,168,67,0.4), 0 0 70px rgba(212,168,67,0.18); }
}

/* === 3D场景 === */
.scene {
  background: rgba(255,252,245,0.06);
  border-radius: 32px;
  padding: 40px;
  perspective: 1200px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.card-inner {
  width: 300px;
  height: 430px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  transform: rotateY(-180deg);
}
.card-inner.opened {
  transform: rotateY(0deg);
}

/* 两面通用 */
.card-front, .card-back {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px; text-align: center;
}

/* 封面：戒指盒 */
.card-front {
  background: linear-gradient(135deg, rgba(240,225,200,0.5) 0%, rgba(220,195,160,0.65) 100%);
  border: 1px solid rgba(212,168,67,0.5);
  box-shadow: 0 10px 40px rgba(180,140,60,0.25);
}
.box-lid {
  width: 120px; height: 90px;
  background: linear-gradient(160deg, #f8f0e0, #e8d8b8);
  border-radius: 12px 12px 0 0;
  border: 2px solid rgba(212,168,67,0.6);
  border-bottom: none;
  position: relative;
  transform-origin: bottom;
  transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: inset 0 0 20px rgba(255,240,200,0.3);
}
.box-lid::before {
  content: '💍';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 36px;
  animation: ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.15); }
}
.box-body {
  width: 120px; height: 60px;
  background: linear-gradient(160deg, #f0e4cc, #dcc8a0);
  border-radius: 0 0 12px 12px;
  border: 2px solid rgba(212,168,67,0.6);
  border-top: 1px solid rgba(212,168,67,0.3);
  display: flex; align-items: center; justify-content: center;
}
.box-ribbon {
  width: 20px; height: 60px;
  background: linear-gradient(to right, #c49030, #e8c050, #c49030);
  position: absolute;
  left: 50%; transform: translateX(-50%);
}
.ring-box-wrap {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 24px;
}
.card-inner.opened .box-lid {
  transform: rotateX(-110deg);
}
.cover-text {
  font-size: clamp(12px, 2.5vw, 15px);
  color: rgba(160,120,60,0.8); letter-spacing: 8px; margin-bottom: 8px;
}
.cover-sub {
  font-size: clamp(10px, 2vw, 12px);
  color: rgba(180,140,80,0.5); letter-spacing: 4px;
}
.cover-hint {
  position: absolute; bottom: 28px;
  font-size: clamp(10px, 2vw, 12px);
  color: rgba(160,120,60,0.4); letter-spacing: 4px;
  animation: hintBlink 2s ease-in-out infinite;
}
@keyframes hintBlink {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* 背面内容 */
.card-back {
  background: linear-gradient(135deg, rgba(255,250,240,0.12) 0%, rgba(255,245,230,0.06) 100%);
  border: 1px solid rgba(212,168,67,0.35);
  transform: rotateY(180deg);
  box-shadow: 0 10px 40px rgba(160,120,40,0.2);
}
.anniversary-label {
  font-size: clamp(10px, 2.2vw, 13px);
  color: rgba(180,140,60,0.7); letter-spacing: 10px; margin-bottom: 16px;
  opacity: 1; animation: fadeUp 1s ease-out 1.5s both;
}
.deco-line {
  width: 60px; height: 2px;
  background: linear-gradient(to right, transparent, rgba(212,168,67,0.5), transparent);
  margin: 12px auto;
  animation: lineExpand 1s ease-out 2.4s both;
}
@keyframes lineExpand {
  from { transform: scaleX(0); opacity: 0; }
  to { transform: scaleX(1); opacity: 1; }
}
.name {
  font-size: clamp(26px, 6vw, 42px); color: #5a3800;
  letter-spacing: 6px; margin-bottom: 18px;
  text-shadow: 0 0 20px rgba(212,168,67,0.35), 0 0 40px rgba(212,168,67,0.15);
  opacity: 1; animation: nameReveal 1.2s cubic-bezier(0.34,1.56,0.64,1) 1.8s both;
}
@keyframes nameReveal {
  from { opacity: 0; transform: translateY(20px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.date-display {
  font-size: clamp(14px, 3vw, 20px);
  color: rgba(140,100,40,0.85); letter-spacing: 4px; margin-bottom: 24px;
  opacity: 1; animation: fadeUp 1s ease-out 2.1s both;
}
.blessing {
  font-size: clamp(13px, 3vw, 17px);
  color: rgba(100,75,30,0.88); line-height: 2; letter-spacing: 2px;
  opacity: 1; animation: fadeUp 1s ease-out 2.4s both;
}
.from {
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(160,120,60,0.6); margin-top: 20px; letter-spacing: 4px;
  opacity: 1; animation: fadeUp 1s ease-out 2.7s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.rose-deco {
  font-size: 26px; margin-top: 16px;
  animation: roseBreath 2.5s ease-in-out infinite;
  display: block;
}
@keyframes roseBreath {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.1) rotate(3deg); }
}

/* 点击提示 */
.tap-hint {
  position: fixed; bottom: 40px;
  font-size: 12px; color: rgba(160,120,60,0.4);
  letter-spacing: 4px; animation: hintBlink 2s ease-in-out infinite;
  z-index: 100;
}
</style>
</head>
<body>

<div class="body-glow"></div>

<div class="card-wrap">
  <div class="scene">
    <div class="card-inner" id="cardInner" onclick="this.classList.toggle('opened')">
      <div class="card-front">
        <div class="ring-box-wrap">
          <div class="box-lid"></div>
          <div class="box-body">
            <div class="box-ribbon"></div>
          </div>
        </div>
        <div class="cover-text">一份心意</div>
        <div class="cover-sub">致最珍贵的你</div>
        <div class="cover-hint">✦ 点击打开 ✦</div>
      </div>
      <div class="card-back">
        <div class="anniversary-label">✦ WEDDING ✦</div>
        <div class="name" id="nameEl"></div>
        <div class="date-display" id="dateEl"></div>
        <div class="deco-line"></div>
        <div class="blessing" id="blessingEl"></div>
        <div class="from" id="fromEl"></div>
        <span class="rose-deco">🌹</span>
      </div>
    </div>
  </div>
</div>

<div class="tap-hint">点击卡片打开</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 花瓣
const petalEmojis = ['🌸', '🌺', '💮', '🩷'];
for (let i = 0; i < 14; i++) {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.textContent = petalEmojis[i % petalEmojis.length];
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.fontSize = (10 + Math.random() * 12) + 'px';
  petal.style.animationDuration = (7 + Math.random() * 6) + 's';
  petal.style.animationDelay = Math.random() * 8 + 's';
  document.body.appendChild(petal);
}
// 戒指闪烁光点
for (let i = 0; i < 18; i++) {
  const s = document.createElement('div');
  s.className = 'ring-sparkle';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.width = s.style.height = (3 + Math.random() * 4) + 'px';
  s.style.animationDuration = (5 + Math.random() * 5) + 's';
  s.style.animationDelay = Math.random() * 7 + 's';
  document.body.appendChild(s);
}
</script>
</body>
</html>
