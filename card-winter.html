<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冬日暖雪</title>
<meta property="og:title" content="❄️ 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --night-blue: #0d1b2a;
  --night-mid: #1b3a5c;
  --snow-white: #e8f4fc;
  --frost-blue: #a8d0e6;
  --warm-glow: #ffd194;
  --text-soft: #d0e8f8;
  --card-bg: rgba(13, 27, 42, 0.85);
  --card-border: rgba(168, 208, 230, 0.3);
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 50% 0%, #1b3a5c 0%, #0d1b2a 50%, #060e18 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 窗户框架 */
.window-frame {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}

/* 雪花 */
.snowflake {
  position: absolute;
  color: rgba(232, 244, 252, 0.85);
  font-size: 16px;
  animation: snowFall linear infinite;
  text-shadow: 0 0 4px rgba(168, 208, 230, 0.6);
  z-index: 1;
}
@keyframes snowFall {
  0% { transform: translateY(-40px) translateX(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.9; }
  90% { opacity: 0.7; }
  100% { transform: translateY(105vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
}

/* 室内暖光 */
body::before {
  content: '';
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 120%;
  height: 35%;
  background: radial-gradient(ellipse at 50% 100%, rgba(255, 209, 148, 0.15) 0%, transparent 65%);
  z-index: 0; pointer-events: none;
}

/* 星星 */
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: rgba(232, 244, 252, 0.7);
  border-radius: 50%;
  animation: starTwinkle 3s ease-in-out infinite;
  z-index: 0;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 0.8; }
}

/* 卡片外框 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 2px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--frost-blue), #c8e8f8, var(--warm-glow), var(--frost-blue));
  background-size: 300% 300%;
  animation: winterBorder 6s ease-in-out infinite;
  box-shadow: 0 0 28px rgba(168, 208, 230, 0.2), 0 0 56px rgba(168, 208, 230, 0.08);
}
@keyframes winterBorder {
  0%, 100% { background-position: 0% 50%; box-shadow: 0 0 28px rgba(168, 208, 230, 0.2), 0 0 56px rgba(168, 208, 230, 0.08); }
  50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(255, 209, 148, 0.3), 0 0 70px rgba(168, 208, 230, 0.15); }
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: clamp(32px, 8vw, 54px) clamp(28px, 7vw, 50px);
  text-align: center;
  max-width: min(520px, 92vw);
  animation: cardFloat 6s ease-in-out infinite;
  border: 1px solid rgba(168, 208, 230, 0.25);
}
@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-7px); }
}

.icon {
  font-size: clamp(40px, 10vw, 60px);
  display: block;
  margin-bottom: 12px;
  animation: iconDrop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes iconDrop {
  from { transform: translateY(-24px) scale(0.7); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.name {
  font-size: clamp(24px, 6vw, 40px);
  font-weight: 600;
  color: var(--snow-white);
  letter-spacing: 0.06em;
  margin-bottom: 10px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.4s both;
}

.date {
  font-size: clamp(12px, 3vw, 15px);
  color: var(--frost-blue);
  letter-spacing: 0.15em;
  margin-bottom: 18px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.6s both;
  opacity: 0.7;
}

.blessing {
  font-size: clamp(15px, 4vw, 21px);
  color: var(--text-soft);
  line-height: 1.9;
  margin-bottom: 22px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.8s both;
}

.from {
  font-size: clamp(12px, 3vw, 16px);
  color: var(--frost-blue);
  letter-spacing: 0.08em;
  opacity: 1;
  animation: slideUp 1.2s ease-out 1.0s both;
}
.from::before { content: '— '; }

.divider {
  display: block;
  width: 48px; height: 2px;
  background: linear-gradient(to right, transparent, var(--frost-blue), transparent);
  margin: 16px auto;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .snowflake, .star, .card-wrap, .card { animation: none; }
  .name, .date, .blessing, .from, .divider, .icon { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<div id="scene"></div>

<div class="card-wrap">
  <div class="card">
    <span class="icon" id="iconEl">❄️</span>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <span class="divider"></span>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const name = p.get('n') || '亲爱的';
const blessing = p.get('b') || '愿你的冬天温暖如初雪般纯净美好';
const date = p.get('d') || '';
const from = p.get('f') || '';
const icon = p.get('i') || '❄️';

document.getElementById('nameEl').textContent = name;
document.getElementById('blessingEl').textContent = blessing;
document.getElementById('dateEl').textContent = date;
if (from) document.getElementById('fromEl').textContent = from;
else document.getElementById('fromEl').style.display = 'none';
document.getElementById('iconEl').textContent = icon;

// 雪花
const snowCount = 28;
const snowEmoji = ['❄', '❅', '❆', '✻', '✼'];
const scene = document.getElementById('scene');
for (let i = 0; i < snowCount; i++) {
  const s = document.createElement('div');
  s.className = 'snowflake';
  s.textContent = snowEmoji[i % snowEmoji.length];
  const drift = (Math.random() - 0.5) * 60;
  const dur = 8 + Math.random() * 8;
  const delay = Math.random() * 10;
  const startX = Math.random() * 100;
  s.style.cssText = `left:${startX}%;top:-40px;--drift:${drift}px;animation-duration:${dur}s;animation-delay:${delay}s;font-size:${12 + Math.random() * 12}px`;
  scene.appendChild(s);
}

// 星星
for (let i = 0; i < 35; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*60}%;animation-delay:${Math.random()*5}s;animation-duration:${2.5 + Math.random()*3}s`;
  scene.appendChild(star);
}

// 减少动效
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.snowflake, .star').forEach(el => el.remove());
}
</script>
</body>
</html>
