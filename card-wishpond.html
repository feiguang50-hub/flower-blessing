<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>许愿池畔</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pond-blue: #4a90a4;
  --pond-deep: #1a4a5e;
  --gold-coin: #ffd700;
  --gold-light: #ffe066;
  --stone-gray: #8fa8b8;
  --text-cream: #f0e6d3;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #87ceeb 0%, #b8d4e3 30%, #d4c4a8 60%, #c8b88a 100%);
  font-family: 'Georgia', 'PingFang SC', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 天空渐变 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 10%, rgba(255,255,255,0.4) 0%, transparent 40%),
    radial-gradient(ellipse at 70% 5%, rgba(255,248,220,0.3) 0%, transparent 35%);
  pointer-events: none;
  z-index: 0;
}

/* 云朵 */
.clouds {
  position: fixed; top: 0; left: 0; right: 0;
  height: 35vh;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.cloud {
  position: absolute;
  background: rgba(255,255,255,0.6);
  border-radius: 50px;
  animation: cloudDrift linear infinite;
}

.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
}

.cloud:nth-child(1) {
  width: 100px; height: 35px;
  top: 8%; left: -100px;
  animation-duration: 35s;
}
.cloud:nth-child(1)::before { width: 50px; height: 50px; top: -25px; left: 15px; }
.cloud:nth-child(1)::after { width: 40px; height: 40px; top: -18px; left: 50px; }

.cloud:nth-child(2) {
  width: 120px; height: 40px;
  top: 15%; left: -120px;
  animation-duration: 45s;
  animation-delay: 10s;
}
.cloud:nth-child(2)::before { width: 60px; height: 60px; top: -30px; left: 20px; }
.cloud:nth-child(2)::after { width: 45px; height: 45px; top: -22px; left: 60px; }

@keyframes cloudDrift {
  0% { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 200px)); }
}

/* 罗马柱装饰 */
.column {
  position: absolute;
  width: 30px;
  bottom: 0;
  background: linear-gradient(90deg, #d4c4a8, #e8dcc8, #c8b898);
  border-radius: 4px 4px 0 0;
}

.column::before {
  content: '';
  position: absolute;
  top: -15px; left: -8px;
  width: 46px; height: 15px;
  background: linear-gradient(90deg, #d4c4a8, #e8dcc8, #c8b898);
  border-radius: 3px;
}

.column::after {
  content: '';
  position: absolute;
  top: -35px; left: -5px;
  width: 40px; height: 20px;
  background: linear-gradient(90deg, #d4c4a8, #e8dcc8, #c8b898);
  border-radius: 3px 3px 0 0;
}

.column-left { left: 5%; height: 45vh; }
.column-right { right: 5%; height: 45vh; }

/* 浮动金币 */
.coins {
  position: fixed; inset: 0;
  z-index: 3;
  pointer-events: none;
  overflow: hidden;
}

.coin {
  position: absolute;
  width: 16px; height: 16px;
  background: radial-gradient(circle at 35% 35%, #ffe066, #ffd700, #c8a800);
  border-radius: 50%;
  border: 1.5px solid #c8a800;
  animation: coinFloat linear infinite;
  opacity: 0;
}

.coin::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.4);
}

@keyframes coinFloat {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
  10% { opacity: 0.9; }
  80% { opacity: 0.5; }
  100% { transform: translateY(-120px) rotate(360deg) scale(0.8); opacity: 0; }
}

.coin:nth-child(1) { left: 15%; bottom: 20%; animation-duration: 4s; animation-delay: 0s; }
.coin:nth-child(2) { left: 25%; bottom: 25%; animation-duration: 5s; animation-delay: 1.5s; }
.coin:nth-child(3) { left: 45%; bottom: 18%; animation-duration: 4.5s; animation-delay: 0.8s; }
.coin:nth-child(4) { left: 60%; bottom: 22%; animation-duration: 5.5s; animation-delay: 2.2s; }
.coin:nth-child(5) { left: 75%; bottom: 20%; animation-duration: 4s; animation-delay: 3s; }
.coin:nth-child(6) { left: 35%; bottom: 28%; animation-duration: 5s; animation-delay: 1s; }
.coin:nth-child(7) { left: 85%; bottom: 24%; animation-duration: 4.5s; animation-delay: 2.5s; }
.coin:nth-child(8) { left: 10%; bottom: 30%; animation-duration: 5.5s; animation-delay: 0.5s; }

/* 水波纹 */
.water-ripple {
  position: fixed; inset: 0;
  z-index: 4;
  pointer-events: none;
  overflow: hidden;
}

.ripple {
  position: absolute;
  border: 1px solid rgba(74,144,164,0.3);
  border-radius: 50%;
  animation: rippleExpand linear infinite;
  opacity: 0;
}

@keyframes rippleExpand {
  0% { transform: scale(0.3); opacity: 0.8; }
  100% { transform: scale(2.5); opacity: 0; }
}

.ripple:nth-child(1) { left: 20%; bottom: 15%; animation-duration: 3s; animation-delay: 0s; width: 30px; height: 15px; }
.ripple:nth-child(2) { left: 50%; bottom: 18%; animation-duration: 3.5s; animation-delay: 1s; width: 25px; height: 12px; }
.ripple:nth-child(3) { left: 70%; bottom: 14%; animation-duration: 4s; animation-delay: 2s; width: 35px; height: 18px; }
.ripple:nth-child(4) { left: 35%; bottom: 22%; animation-duration: 3.2s; animation-delay: 0.5s; width: 28px; height: 14px; }

/* 卡片 */
.card-wrap {
  position: relative;
  z-index: 20;
  perspective: 1000px;
}

.card {
  position: relative;
  width: min(400px, 90vw);
  min-height: 520px;
  background: linear-gradient(160deg, rgba(26,74,94,0.92) 0%, rgba(74,144,164,0.88) 100%);
  border-radius: 24px;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  box-shadow:
    0 12px 40px rgba(26,74,94,0.4),
    0 4px 12px rgba(26,74,94,0.3),
    inset 0 1px 0 rgba(255,255,255,0.1);
  border: 2px solid rgba(255,215,0,0.3);
  animation: cardFloat 5s ease-in-out infinite;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(0.5deg); }
}

/* 金色边框呼吸 */
.card::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, rgba(255,215,0,0.5), rgba(255,224,102,0.3), rgba(255,215,0,0.5));
  background-size: 200% 200%;
  animation: goldGlow 3s ease-in-out infinite;
  z-index: -1;
}

@keyframes goldGlow {
  0%, 100% { background-position: 0% 50%; opacity: 0.4; }
  50% { background-position: 100% 50%; opacity: 0.7; }
}

/* 金币图标 */
.icon {
  font-size: 50px;
  animation: iconDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  filter: drop-shadow(0 4px 12px rgba(255,215,0,0.5));
}

@keyframes iconDrop {
  0% { transform: scale(0) rotate(-30deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* 分隔线 */
.divider {
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.6), transparent);
  animation: fadeIn 1.2s ease-out 0.4s both;
  opacity: 1;
}

/* 文字样式 */
.name {
  font-size: clamp(24px, 7vw, 40px);
  color: var(--text-cream);
  font-weight: 700;
  text-align: center;
  letter-spacing: 3px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  animation: slideUp 1.2s ease-out 0.5s both;
  opacity: 1;
}

.date {
  font-size: clamp(12px, 3.5vw, 15px);
  color: rgba(240,230,211,0.7);
  letter-spacing: 4px;
  text-align: center;
  animation: slideUp 1.2s ease-out 0.7s both;
  opacity: 1;
}

.blessing {
  font-size: clamp(14px, 4vw, 17px);
  color: rgba(240,230,211,0.9);
  text-align: center;
  line-height: 1.9;
  max-width: 300px;
  font-style: italic;
  animation: slideUp 1.2s ease-out 0.9s both;
  opacity: 1;
}

.from {
  font-size: clamp(12px, 3.5vw, 14px);
  color: rgba(240,230,211,0.6);
  letter-spacing: 3px;
  margin-top: 6px;
  animation: slideUp 1.2s ease-out 1.1s both;
  opacity: 1;
}

/* 许愿池文字 */
.wish-text {
  position: absolute;
  bottom: 18px;
  font-size: 11px;
  color: rgba(255,215,0,0.5);
  letter-spacing: 2px;
  text-align: center;
  animation: fadeIn 1.5s ease-out 1.3s both;
  opacity: 1;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 减少动效 */
@media (prefers-reduced-motion: reduce) {
  .card, .cloud, .coin, .ripple {
    animation: none;
  }
  .name, .date, .blessing, .from, .divider, .wish-text {
    opacity: 1;
  }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; min-height: 460px; }
  .column { width: 20px; }
  .column::before { width: 36px; left: -8px; }
  .column::after { width: 30px; left: -5px; }
}
</style>
</head>
<body>

<div class="clouds">
  <div class="cloud"></div>
  <div class="cloud"></div>
</div>

<div class="column column-left"></div>
<div class="column column-right"></div>

<div class="coins">
  <div class="coin"></div>
  <div class="coin"></div>
  <div class="coin"></div>
  <div class="coin"></div>
  <div class="coin"></div>
  <div class="coin"></div>
  <div class="coin"></div>
  <div class="coin"></div>
</div>

<div class="water-ripple">
  <div class="ripple"></div>
  <div class="ripple"></div>
  <div class="ripple"></div>
  <div class="ripple"></div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="icon" id="iconEl">🌹</div>
    <div class="divider"></div>
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
    <div class="wish-text">许愿池畔 · 浪漫永恒</div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(location.search);
  document.getElementById('nameEl').textContent = p.get('n') || '亲爱的';
  document.getElementById('dateEl').textContent = p.get('d') || '';
  document.getElementById('blessingEl').textContent = p.get('b') || '愿你许下的愿望都能成真';
  document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';
  if (p.get('i')) document.getElementById('iconEl').textContent = p.get('i');
})();
</script>
</body>
</html>
