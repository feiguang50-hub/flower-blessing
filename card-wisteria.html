<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫藤花语祝福</title>
<meta property="og:title" content="💌 收到一份专属贺卡">
<meta property="og:description" content="点击打开，你们的专属回忆在里面哦">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --wisteria-purple: #9b6d9e;
  --wisteria-pink: #c9a0b5;
  --wisteria-light: #e8d0e0;
  --wisteria-dark: #5c3d6e;
  --card-bg: rgba(255, 248, 252, 0.88);
  --text-purple: #6b3a6b;
  --glow-pink: rgba(201, 160, 181, 0.5);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, 
    #f5e6f0 0%, 
    #e8d0e0 25%, 
    #dcc0d8 50%, 
    #d4b8d0 75%, 
    #c9a0b5 100%
  );
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* 紫藤花串装饰 */
.wisteria-decor {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.wisteria-vine {
  position: absolute;
  top: -20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: sway 4s ease-in-out infinite;
}

.wisteria-vine.left { left: 5%; }
.wisteria-vine.right { right: 5%; animation-delay: -2s; }

.vine-segment {
  width: 8px;
  height: 18px;
  background: linear-gradient(180deg, var(--wisteria-purple), var(--wisteria-pink));
  border-radius: 50%;
  margin: 2px 0;
  opacity: 0.85;
  animation: swaySmall 3s ease-in-out infinite;
}

.vine-segment:nth-child(odd) { animation-delay: -1s; }
.vine-segment:nth-child(3n) { width: 10px; height: 22px; }
.vine-segment:nth-child(5n) { width: 6px; height: 14px; opacity: 0.7; }

@keyframes sway {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

@keyframes swaySmall {
  0%, 100% { transform: translateX(-2px); }
  50% { transform: translateX(2px); }
}

/* 蝴蝶飞舞 */
.butterfly {
  position: absolute;
  font-size: 20px;
  animation: butterflyFly 12s ease-in-out infinite;
  opacity: 0.8;
}

.butterfly:nth-child(1) { left: 15%; top: 20%; animation-delay: 0s; }
.butterfly:nth-child(2) { left: 75%; top: 30%; animation-delay: -4s; animation-duration: 14s; }
.butterfly:nth-child(3) { left: 25%; top: 60%; animation-delay: -8s; animation-duration: 11s; }

@keyframes butterflyFly {
  0% { transform: translate(0, 0) rotate(0deg); opacity: 0.8; }
  25% { transform: translate(60px, -40px) rotate(10deg); opacity: 0.9; }
  50% { transform: translate(120px, 20px) rotate(-5deg); opacity: 0.7; }
  75% { transform: translate(80px, -30px) rotate(8deg); opacity: 0.85; }
  100% { transform: translate(0, 0) rotate(0deg); opacity: 0.8; }
}

/* 花瓣飘落 */
.petal {
  position: absolute;
  font-size: 14px;
  animation: petalFall linear infinite;
  opacity: 0.7;
}

@keyframes petalFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* 卡片包装 */
.card-wrap {
  position: relative;
  z-index: 10;
  padding: 3px;
  background: linear-gradient(135deg, var(--wisteria-purple), var(--wisteria-pink), var(--wisteria-light), var(--wisteria-purple));
  background-size: 300% 300%;
  border-radius: 24px;
  animation: borderFlow 4s ease-in-out infinite, cardFloat 6s ease-in-out infinite;
  box-shadow: 
    0 0 30px var(--glow-pink),
    0 8px 32px rgba(92, 61, 110, 0.3);
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: clamp(32px, 8vw, 56px) clamp(24px, 6vw, 48px);
  text-align: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  max-width: 90vw;
}

.name {
  font-size: clamp(28px, 8vw, 52px);
  font-weight: 600;
  color: var(--text-purple);
  margin-bottom: 12px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.3s both;
  text-shadow: 0 2px 8px var(--glow-pink);
}

.date {
  font-size: clamp(14px, 3.5vw, 18px);
  color: var(--wisteria-dark);
  margin-bottom: 20px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.5s both;
  letter-spacing: 2px;
}

.blessing {
  font-size: clamp(18px, 5vw, 28px);
  color: var(--wisteria-purple);
  line-height: 1.6;
  margin-bottom: 24px;
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.7s both;
}

.blessing::before { content: '🌸 '; }
.blessing::after { content: ' 🌸'; }

.from {
  font-size: clamp(14px, 3.5vw, 18px);
  color: var(--wisteria-dark);
  opacity: 1;
  animation: slideUp 1.2s ease-out 0.9s both;
}

.from::before { content: '— '; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 浮动光点 */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--wisteria-pink);
  border-radius: 50%;
  animation: sparkleFloat 5s ease-in-out infinite;
  opacity: 0.6;
}

@keyframes sparkleFloat {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
  50% { transform: translateY(-30px) scale(1.2); opacity: 0.3; }
}

/* 减少动画 */
@media (prefers-reduced-motion: reduce) {
  .wisteria-vine, .butterfly, .petal, .sparkle { animation: none; }
  .card-wrap { animation: none; }
  .name, .date, .blessing, .from { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<div class="wisteria-decor">
  <!-- 紫藤花串左侧 -->
  <div class="wisteria-vine left">
    <div class="vine-segment"></div><div class="vine-segment"></div>
    <div class="vine-segment"></div><div class="vine-segment"></div>
    <div class="vine-segment"></div><div class="vine-segment"></div>
    <div class="vine-segment"></div><div class="vine-segment"></div>
    <div class="vine-segment"></div><div class="vine-segment"></div>
  </div>
  <!-- 紫藤花串右侧 -->
  <div class="wisteria-vine right">
    <div class="vine-segment"></div><div class="vine-segment"></div>
    <div class="vine-segment"></div><div class="vine-segment"></div>
    <div class="vine-segment"></div><div class="vine-segment"></div>
    <div class="vine-segment"></div><div class="vine-segment"></div>
    <div class="vine-segment"></div><div class="vine-segment"></div>
  </div>
  
  <!-- 蝴蝶 -->
  <div class="butterfly">🦋</div>
  <div class="butterfly">🦋</div>
  <div class="butterfly">🦋</div>
</div>

<!-- 卡片 -->
<div class="card-wrap">
  <div class="card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>

<!-- 浮动光点 -->
<div class="sparkle" style="left: 20%; top: 70%;"></div>
<div class="sparkle" style="left: 80%; top: 40%; animation-delay: -2s;"></div>
<div class="sparkle" style="left: 50%; top: 80%; animation-delay: -3.5s;"></div>
<div class="sparkle" style="left: 35%; top: 30%; animation-delay: -1s;"></div>

<script>
// URL参数读取
const p = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = p.get('n') || '亲爱的你';
document.getElementById('dateEl').textContent = p.get('d') || '';
document.getElementById('blessingEl').textContent = p.get('b') || '愿时光温柔，愿你被世界温柔以待';
document.getElementById('fromEl').textContent = p.get('f') ? '— ' + p.get('f') : '';

// 花瓣飘落动画
const petals = ['🌸', '💮', '🩷', '💜'];
function createPetal() {
  const petal = document.createElement('div');
  petal.className = 'petal';
  petal.textContent = petals[Math.floor(Math.random() * petals.length)];
  petal.style.left = Math.random() * 100 + '%';
  petal.style.animationDuration = (8 + Math.random() * 6) + 's';
  petal.style.animationDelay = Math.random() * 5 + 's';
  document.querySelector('.wisteria-decor').appendChild(petal);
  
  setTimeout(() => petal.remove(), 15000);
}
setInterval(createPetal, 800);
for (let i = 0; i < 6; i++) createPetal();

// 减少动画
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.querySelectorAll('.petal').forEach(p => p.remove());
}
</script>
</body>
</html>
