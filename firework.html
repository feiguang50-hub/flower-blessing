<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烟花祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; width: 100vw; height: 100vh; background: linear-gradient(180deg, #0a0015 0%, #1a0030 60%, #2d0a4e 100%); font-family: 'Georgia', serif; }
canvas { position: fixed; top: 0; left: 0; z-index: 0; }
.layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.name { font-size: clamp(22px, 5vw, 48px); color: #fff; letter-spacing: 8px; text-shadow: 0 0 20px rgba(255,200,100,0.5); margin-bottom: 14px; font-weight: normal; }
.date { font-size: clamp(11px, 2vw, 15px); color: #f0d0a0; letter-spacing: 4px; margin-bottom: 24px; }
.blessing { font-size: clamp(13px, 2.8vw, 18px); color: #ffe8c0; letter-spacing: 1px; text-align: center; max-width: 80%; line-height: 1.9; }
.from { font-size: clamp(11px, 2vw, 13px); color: #e0c080; margin-top: 18px; letter-spacing: 2px; }
.glass-card { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,200,100,0.35); border-radius: 24px; padding: clamp(28px, 6vw, 48px) clamp(24px, 6vw, 56px); text-align: center; max-width: 88vw; box-shadow: 0 8px 32px rgba(255,100,50,0.2); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="layer">
  <div class="glass-card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = params.get('n') || '';
document.getElementById('dateEl').textContent = params.get('d') || '';
document.getElementById('blessingEl').textContent = params.get('b') || '';
document.getElementById('fromEl').textContent = params.get('f') ? '— ' + params.get('f') : '';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, fireworks = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

const COLORS = [
  ['#ff6b6b','#ff2d2d'], ['#ffd93d','#ff9d00'], ['#6bff6b','#00d94d'],
  ['#6bdfff','#00b4ff'], ['#c06bff','#9400ff'], ['#ff6bcf','#ff00a8'],
  ['#ffffff','#e0e0ff']
];

class Firework {
  constructor() {
    this.x = 0.1 + Math.random() * 0.8;
    this.y = 0.1 + Math.random() * 0.4;
    this.delay = Math.random() * 120;
    this.done = false;
    this.particles = [];
  }
  launch() {
    const cx = this.x * W, cy = this.y * H;
    const col = COLORS[Math.floor(Math.random() * COLORS.length)];
    const count = 60 + Math.floor(Math.random() * 40);
    for (let i = 0; i < count; i++) {
      const ang = (i / count) * Math.PI * 2;
      const spd = 1.5 + Math.random() * 3;
      this.particles.push({
        x: cx, y: cy, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        col: col[Math.floor(Math.random() * col.length)],
        life: 1, decay: 0.012 + Math.random() * 0.008, sz: 1.5 + Math.random() * 2
      });
    }
  }
  update() {
    if (this.delay > 0) { this.delay--; return; }
    this.particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.life -= p.decay;
    });
    this.particles = this.particles.filter(p => p.life > 0);
    if (this.particles.length === 0) this.done = true;
  }
  draw() {
    if (this.delay > 0) return;
    this.particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.col;
      ctx.shadowColor = p.col;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }
}

let ticker = 0;
function loop() {
  ctx.fillStyle = 'rgba(10,0,21,0.15)';
  ctx.fillRect(0, 0, W, H);

  ticker++;
  if (ticker % 80 === 0) fireworks.push(new Firework());
  fireworks.forEach(fw => { fw.update(); fw.draw(); });
  fireworks = fireworks.filter(fw => !fw.done);

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
