<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定制花束祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* === 通用样式 === */
:root {
  --bg: #0a0a14;
  --card-bg: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.07);
  --text: #e8e4f0;
  --text-dim: #666;
  --accent: #a78bfa;
  --accent-bg: rgba(167,139,250,0.12);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* === 背景光效 === */
.ambient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
.orb {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12;
  animation: float 12s ease-in-out infinite alternate;
}
.orb:nth-child(1) { width: 500px; height: 500px; background: #7c3aed; top: -150px; left: -150px; }
.orb:nth-child(2) { width: 400px; height: 400px; background: #0ea5e9; top: 50%; right: -150px; animation-delay: -4s; }
.orb:nth-child(3) { width: 450px; height: 450px; background: #f59e0b; bottom: -150px; left: 30%; animation-delay: -8s; }
@keyframes float {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(40px,30px) scale(1.08); }
}

/* === 顶部 === */
header {
  padding: 28px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,20,0.85);
}
.logo { font-size: 17px; letter-spacing: 3px; font-weight: 600; }
.header-tag {
  font-size: 11px; color: var(--accent); background: var(--accent-bg);
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(167,139,250,0.25);
}

/* === 步骤导航 === */
.steps {
  display: flex; justify-content: center; gap: 0; padding: 40px 20px 30px;
}
.step {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #444; padding: 0 20px;
}
.step-num {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid #333; display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.step.active { color: var(--accent); }
.step.active .step-num { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.step.done { color: #888; }
.step.done .step-num { border-color: #444; background: rgba(255,255,255,0.05); color: #666; }
.step-arrow { color: #333; font-size: 18px; }

/* === 表单容器 === */
.container {
  max-width: 680px; margin: 0 auto; padding: 10px 20px 80px;
}
.section-label {
  font-size: 11px; color: var(--text-dim); letter-spacing: 4px; text-transform: uppercase;
  margin-bottom: 20px; padding-left: 4px;
}

/* === 输入框 === */
.field { margin-bottom: 28px; }
.field-title { font-size: 14px; margin-bottom: 12px; color: #ccc; }
.text-input {
  width: 100%; background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; font-size: 16px; color: #fff;
  outline: none; transition: border-color 0.3s;
}
.text-input:focus { border-color: rgba(167,139,250,0.4); }
.text-input::placeholder { color: #444; }
.textarea-input { resize: none; height: 100px; line-height: 1.6; }

/* === 选项卡片网格 === */
.options-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.opt-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 16px; cursor: pointer;
  transition: border-color 0.25s, transform 0.2s;
  display: flex; flex-direction: column; gap: 6px;
}
.opt-card:hover { border-color: rgba(167,139,250,0.25); transform: translateY(-2px); }
.opt-card.selected { border-color: var(--accent); background: var(--accent-bg); }
.opt-card:active { transform: scale(0.98); }

.opt-name { font-size: 15px; font-weight: 600; color: #ddd; }
.opt-desc { font-size: 12px; color: #666; }
.opt-check {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid #444;
  margin-top: 4px; align-self: flex-end;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, background 0.2s;
}
.opt-card.selected .opt-check { border-color: var(--accent); background: var(--accent); }
.opt-card.selected .opt-check::after {
  content: '✓'; font-size: 10px; color: #fff;
}

/* 花材预览圆点 */
.material-dot {
  width: 24px; height: 24px; border-radius: 50%;
  box-shadow: 0 0 8px currentColor;
}

/* === 按钮 === */
.btn-primary {
  width: 100%; padding: 18px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
  letter-spacing: 2px; margin-top: 10px;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(124,58,237,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(124,58,237,0.4); }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary {
  width: 100%; padding: 14px; border: 1px solid var(--border);
  border-radius: 14px; background: transparent; color: #888;
  font-size: 14px; cursor: pointer; margin-top: 12px;
  transition: border-color 0.2s, color 0.2s;
}
.btn-secondary:hover { border-color: #555; color: #aaa; }

/* === 预览区 === */
.preview-box {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 30px 24px; margin-top: 30px;
  text-align: center; position: relative; overflow: hidden;
}
.preview-box::before {
  content: ''; position: absolute; top: -60%; left: -60%;
  width: 220%; height: 220%;
  background: radial-gradient(circle, rgba(167,139,250,0.04) 0%, transparent 55%);
  animation: pulse-bg 8s ease-in-out infinite alternate;
}
@keyframes pulse-bg {
  0% { opacity: 0.4; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.05); }
}
.preview-label { font-size: 11px; color: var(--text-dim); letter-spacing: 3px; margin-bottom: 20px; }
.preview-blessing {
  font-size: 24px; color: #fff; margin-bottom: 28px;
  text-shadow: 0 0 25px rgba(167,139,250,0.25);
  position: relative;
}
.preview-flowers { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; position: relative; }
.mini-flower { width: 50px; height: 70px; position: relative; }
.mini-petal {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 26px; height: 40px;
  clip-path: polygon(50% 0%, 100% 30%, 85% 100%, 15% 100%, 0% 30%);
  box-shadow: 0 0 12px currentColor;
}
.mini-center {
  position: absolute; width: 12px; height: 12px;
  border-radius: 50%; top: 22px; left: 50%; transform: translateX(-50%);
  box-shadow: 0 0 10px currentColor;
}
.preview-vase {
  width: 48px; height: 42px; margin: 0 auto;
  background: linear-gradient(180deg, rgba(200,180,150,0.55), rgba(140,110,70,0.35));
  border-radius: 4px 4px 14px 14px; position: relative;
}
.preview-vase-text {
  font-size: 6px; color: rgba(80,60,40,0.65); text-align: center;
  padding-top: 10px; font-family: Georgia, serif; line-height: 1.3;
}
.preview-meta { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 16px; position: relative; }
.preview-material-tag {
  display: inline-block; font-size: 10px; padding: 3px 10px;
  border-radius: 10px; background: rgba(255,255,255,0.05);
  color: #888; margin-top: 12px; position: relative;
}

/* === 步骤面板 === */
.panel { display: none; }
.panel.active { display: block; }

/* === 结果页 === */
.result-page {
  text-align: center; padding: 40px 20px;
}
.result-icon {
  font-size: 48px; margin-bottom: 20px;
}
.result-title { font-size: 22px; margin-bottom: 10px; }
.result-desc { font-size: 14px; color: #888; margin-bottom: 30px; line-height: 1.7; }
.result-url-box {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
  display: flex; gap: 10px; align-items: center;
}
.result-url {
  flex: 1; font-size: 13px; color: var(--accent); word-break: break-all;
  text-align: left;
}
.copy-btn {
  padding: 8px 16px; border: 1px solid var(--border);
  border-radius: 8px; background: transparent; color: #aaa;
  font-size: 13px; cursor: pointer; white-space: nowrap;
  transition: border-color 0.2s, color 0.2s;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: #86efac; color: #86efac; }
.result-tip { font-size: 12px; color: #555; line-height: 1.8; }
.result-tip span { color: #777; }

/* === 分割线 === */
.divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 30px 0; }

/* === 响应式 === */
@media (max-width: 600px) {
  header { padding: 20px; }
  .steps { padding: 28px 16px 24px; gap: 0; }
  .step { padding: 0 10px; font-size: 12px; }
  .container { padding: 10px 16px 60px; }
  .options-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt-card { padding: 14px 12px; }
  .preview-blessing { font-size: 20px; }
  .preview-flowers { gap: 14px; }
}
</style>
</head>
<body>

<div class="ambient">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<header>
  <div class="logo">FLOWER</div>
  <div class="header-tag">定制祝福</div>
</header>

<!-- 步骤导航 -->
<div class="steps" id="stepNav">
  <div class="step active" id="s1">
    <div class="step-num">1</div>
    <span>填写信息</span>
  </div>
  <div class="step-arrow">›</div>
  <div class="step" id="s2">
    <div class="step-num">2</div>
    <span>选择样式</span>
  </div>
  <div class="step-arrow">›</div>
  <div class="step" id="s3">
    <div class="step-num">3</div>
    <span>生成链接</span>
  </div>
</div>

<div class="container">

  <!-- ========== 步骤1：填写信息 ========== -->
  <div class="panel active" id="panel1">
    <div class="section-label">Step 1 · 收礼人信息</div>

    <div class="field">
      <div class="field-title">祝福语（可选）</div>
      <input class="text-input" id="blessingInput" placeholder="如：愿你如星般璀璨" maxlength="50">
    </div>

    <div class="field">
      <div class="field-title">收礼人姓名</div>
      <input class="text-input" id="nameInput" placeholder="如：小琳">
    </div>

    <div class="field">
      <div class="field-title">日期</div>
      <input class="text-input" id="dateInput" type="date" style="color:#fff;">
    </div>

    <div class="field">
      <div class="field-title">送礼人（可选）</div>
      <input class="text-input" id="fromInput" placeholder="如：爱你的家人">
    </div>

    <button class="btn-primary" onclick="goStep(2)">下一步 ›</button>
  </div>

  <!-- ========== 步骤2：选择样式 ========== -->
  <div class="panel" id="panel2">
    <div class="section-label">Step 2 · 选择花材</div>
    <div class="options-grid" id="materialGrid"></div>

    <div class="divider"></div>
    <div class="section-label">选择排布</div>
    <div class="options-grid" id="arrangeGrid"></div>

    <div class="preview-box" id="previewBox">
      <div class="preview-label">PREVIEW</div>
      <div class="preview-blessing" id="previewBlessing">愿你如星般璀璨</div>
      <div class="preview-flowers" id="previewFlowers"></div>
      <div class="preview-vase">
        <div class="preview-vase-text" id="previewVaseText">收礼人姓名</div>
      </div>
      <div class="preview-meta" id="previewMeta">YYYY.MM.DD</div>
      <div class="preview-material-tag" id="previewTag">紫水晶 · Amethyst</div>
    </div>

    <button class="btn-primary" onclick="generateLink()">生成专属链接</button>
    <button class="btn-secondary" onclick="goStep(1)">‹ 上一步</button>
  </div>

  <!-- ========== 步骤3：生成链接 ========== -->
  <div class="panel" id="panel3">
    <div class="result-page">
      <div class="result-icon">🌸</div>
      <div class="result-title">链接已生成</div>
      <div class="result-desc" id="resultDesc">复制链接发给收礼人<br>永久有效，可直接打开</div>
      <div class="result-url-box">
        <div class="result-url" id="resultUrl"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyLink()">复制</button>
      </div>
      <div class="result-tip">
        链接有效期：<span>永久</span><br>
        版权说明：<span>仅授权购买者使用</span>
      </div>
    </div>
    <button class="btn-secondary" onclick="resetForm()">再生成一份</button>
  </div>

</div>

<script src="config.js"></script>
<script>
// ========== 状态 ==========
let state = {
  blessing: CONFIG.defaultBlessing,
  name: '',
  date: '',
  from: '',
  material: 'amethyst',
  arrangement: 'hemisphere',
};

// ========== 初始化 ==========
function init() {
  // 读取 URL 参数（如果有）
  const params = new URLSearchParams(window.location.search);
  if (params.has('name')) { renderViewPage(params); return; }

  // 渲染选项
  renderMaterialOptions();
  renderArrangeOptions();

  // 日期默认今天
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dateInput').value = today;

  // 实时预览
  document.getElementById('blessingInput').addEventListener('input', updatePreview);
  document.getElementById('nameInput').addEventListener('input', updatePreview);
  document.getElementById('dateInput').addEventListener('change', updatePreview);
  document.getElementById('fromInput').addEventListener('input', updatePreview);

  updatePreview();
}

// ========== 渲染花材选项 ==========
function renderMaterialOptions() {
  const grid = document.getElementById('materialGrid');
  grid.innerHTML = CONFIG.materials.map(m => `
    <div class="opt-card${m.value === state.material ? ' selected' : ''}" onclick="selectMaterial('${m.value}')">
      <div class="material-dot" style="background: linear-gradient(135deg, ${m.color1}, ${m.color2}); color: ${m.color1}"></div>
      <div class="opt-name">${m.label}</div>
      <div class="opt-desc">${m.labelEn}</div>
      <div class="opt-check"></div>
    </div>
  `).join('');
}

function selectMaterial(val) {
  state.material = val;
  renderMaterialOptions();
  updatePreview();
}

// ========== 渲染排布选项 ==========
function renderArrangeOptions() {
  const grid = document.getElementById('arrangeGrid');
  grid.innerHTML = CONFIG.arrangements.map(a => `
    <div class="opt-card${a.value === state.arrangement ? ' selected' : ''}" onclick="selectArrange('${a.value}')">
      <div class="opt-name">${a.label}</div>
      <div class="opt-desc">${a.scene}</div>
      <div class="opt-check"></div>
    </div>
  `).join('');
}

function selectArrange(val) {
  state.arrangement = val;
  renderArrangeOptions();
  updatePreview();
}

// ========== 更新预览 ==========
function updatePreview() {
  state.blessing = document.getElementById('blessingInput').value || CONFIG.defaultBlessing;
  state.name = document.getElementById('nameInput').value || '收礼人姓名';
  state.date = document.getElementById('dateInput').value;
  state.from = document.getElementById('fromInput').value;

  const mat = CONFIG.materials.find(m => m.value === state.material);
  const arr = CONFIG.arrangements.find(a => a.value === state.arrangement);

  document.getElementById('previewBlessing').textContent = state.blessing;
  document.getElementById('previewVaseText').textContent = state.from ? state.name + ' · ' + state.from : state.name;
  document.getElementById('previewMeta').textContent = state.date ? state.date.replace(/-/g, '.') : '';
  document.getElementById('previewTag').textContent = mat ? `${mat.label} · ${mat.labelEn}` : '';

  // 渲染花朵
  renderPreviewFlowers(mat, arr);
}

function renderPreviewFlowers(mat, arr) {
  const container = document.getElementById('previewFlowers');
  const count = arr && arr.value === 'horizontal' ? 6 : arr && arr.value === 'lshape' ? 5 : 4;
  const colors = ['#c084fc','#7dd3fc','#fde68a','#f9a8d4','#86efac','#fda4af'];
  let html = '';
  for (let i = 0; i < count; i++) {
    const c = mat ? colors[i % colors.length] : colors[i % colors.length];
    const h = [45,38,42,35,28][i % 5];
    html += `
      <div class="mini-flower">
        <div class="mini-petal" style="background: linear-gradient(135deg, ${mat ? mat.color1 : c}, ${mat ? mat.color2 : c}); color: ${mat ? mat.color1 : c}; height: ${h}px; top: ${70-h}px"></div>
        <div class="mini-center" style="background: radial-gradient(circle, ${mat ? mat.color1 : c}, ${mat ? mat.color2 : c}); color: ${mat ? mat.color1 : c}; top: ${22 + (i%2)*3}px"></div>
      </div>
    `;
  }
  container.innerHTML = html;
}

// ========== 步骤切换 ==========
function goStep(n) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + n).classList.add('active');

  document.querySelectorAll('.step').forEach((s, i) => {
    s.classList.remove('active', 'done');
    if (i+1 < n) s.classList.add('done');
    if (i+1 === n) s.classList.add('active');
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========== 生成链接 ==========
function generateLink() {
  if (!state.name || state.name === '收礼人姓名') {
    alert('请填写收礼人姓名');
    return;
  }

  // 用名字做简短ID（去掉空格，全拼+日期混排）
  const id = state.name.trim()
    .toLowerCase()
    .replace(/\s+/g, '')
    .substring(0, 8)
    + '_' + (state.date || '').replace(/-/g, '').substring(2);

  const params = new URLSearchParams({
    b: state.blessing,
    n: state.name,
    d: state.date,
    f: state.from,
    m: state.material,
    a: state.arrangement,
  });

  // 部署后这里的 baseURL 要替换成实际的 GitHub Pages 地址
  const baseURL = window.location.origin + window.location.pathname.replace('index.html', '');
  const url = baseURL + '?' + params.toString();

  document.getElementById('resultUrl').textContent = url;
  document.getElementById('resultDesc').innerHTML =
    `<strong>${state.name}</strong> 的专属祝福页<br>复制链接发给收礼人，永久有效`;

  goStep(3);
}

function copyLink() {
  const url = document.getElementById('resultUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  });
}

function resetForm() {
  state = { blessing: CONFIG.defaultBlessing, name: '', date: '', from: '', material: 'amethyst', arrangement: 'hemisphere' };
  document.getElementById('blessingInput').value = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('fromInput').value = '';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dateInput').value = today;
  goStep(1);
  updatePreview();
}

// ========== 查看模式（URL带参数时） ==========
function renderViewPage(params) {
  const b = params.get('b') || CONFIG.defaultBlessing;
  const n = params.get('n') || '收礼人';
  const d = params.get('d') || '';
  const f = params.get('f') || '';
  const m = params.get('m') || 'amethyst';
  const a = params.get('a') || 'hemisphere';

  const mat = CONFIG.materials.find(x => x.value === m) || CONFIG.materials[0];
  const arr = CONFIG.arrangements.find(x => x.value === a) || CONFIG.arrangements[0];

  document.getElementById('panel1')?.remove();
  document.getElementById('panel2')?.remove();
  document.getElementById('panel3')?.remove();
  document.getElementById('stepNav').remove();

  const container = document.querySelector('.container');
  container.innerHTML = `
    <div class="preview-box" style="margin-top: 40px;">
      <div class="preview-label">CUSTOM BLESSING</div>
      <div class="preview-blessing">${b}</div>
      <div class="preview-flowers" id="pvFlowers"></div>
      <div class="preview-vase">
        <div class="preview-vase-text">${f ? n + ' · ' + f : n}</div>
      </div>
      <div class="preview-meta">${d ? d.replace(/-/g, '.') : ''}</div>
      <div class="preview-material-tag">${mat.label} · ${mat.labelEn}</div>
    </div>
    <div class="result-tip" style="text-align:center; margin-top: 30px;">
      ${CONFIG.copyright}
    </div>
  `;

  const count = a === 'horizontal' ? 6 : a === 'lshape' ? 5 : 4;
  const colors = ['#c084fc','#7dd3fc','#fde68a','#f9a8d4','#86efac','#fda4af'];
  let html = '';
  for (let i = 0; i < count; i++) {
    const c = colors[i % colors.length];
    const h = [45,38,42,35,28][i % 5];
    html += `
      <div class="mini-flower">
        <div class="mini-petal" style="background: linear-gradient(135deg, ${mat.color1}, ${mat.color2}); color: ${mat.color1}; height: ${h}px; top: ${70-h}px"></div>
        <div class="mini-center" style="background: radial-gradient(circle, ${mat.color1}, ${mat.color2}); color: ${mat.color1}; top: ${22 + (i%2)*3}px"></div>
      </div>
    `;
  }
  document.getElementById('pvFlowers').innerHTML = html;
}

init();
