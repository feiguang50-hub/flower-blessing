<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱花祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; width: 100vw; height: 100vh; background: linear-gradient(180deg, #ffeef2 0%, #ffd6e0 40%, #ffc4d6 100%); font-family: 'Georgia', serif; }
canvas { position: fixed; top: 0; left: 0; z-index: 0; }
.layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
.name { font-size: clamp(24px, 6vw, 52px); color: #8b4557; letter-spacing: 6px; text-shadow: 0 2px 12px rgba(180,100,130,0.15); margin-bottom: 14px; font-weight: normal; }
.date { font-size: clamp(12px, 2.5vw, 16px); color: #b87085; letter-spacing: 4px; margin-bottom: 28px; }
.blessing { font-size: clamp(14px, 3vw, 20px); color: #c0607a; letter-spacing: 2px; text-align: center; max-width: 80%; line-height: 1.8; }
.from { font-size: clamp(11px, 2vw, 14px); color: #d4a0b0; margin-top: 20px; letter-spacing: 2px; }
.glass-card { background: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.6); border-radius: 24px; padding: clamp(28px, 6vw, 48px) clamp(24px, 6vw, 56px); text-align: center; max-width: 88vw; box-shadow: 0 8px 32px rgba(180,80,120,0.15); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="layer">
  <div class="glass-card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = params.get('n') || '';
document.getElementById('dateEl').textContent = params.get('d') || '';
document.getElementById('blessingEl').textContent = params.get('b') || '';
document.getElementById('fromEl').textContent = params.get('f') ? '— ' + params.get('f') : '';

// ===== 樱花粒子系统 =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, sakura = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Sakura {
  constructor(reset) {
    if (reset) { this.x = Math.random() * W; this.y = -20; this.sz = 8 + Math.random() * 12; }
    else { this.x = Math.random() * W; this.y = Math.random() * H; }
    this.vx = -0.4 + Math.random() * 0.8;
    this.vy = 0.6 + Math.random() * 1.2;
    this.rot = Math.random() * Math.PI * 2;
    this.rotS = (Math.random() - 0.5) * 0.04;
    this.op = 0.5 + Math.random() * 0.5;
    this.s1 = Math.random(); this.s2 = Math.random(); this.s3 = Math.random();
  }
  update() {
    this.x += this.vx + Math.sin(this.s1 * 10 + Date.now() * 0.001) * 0.4;
    this.y += this.vy;
    this.rot += this.rotS;
    if (this.y > H + 20) { this.x = Math.random() * W; this.y = -20; this.vx = -0.4 + Math.random() * 0.8; }
  }
  draw() {
    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot); ctx.globalAlpha = this.op;
    ctx.fillStyle = `hsl(${330 + this.s3 * 20}, ${70 + this.s2 * 20}%, ${85 + this.s1 * 10}%)`;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.sz * 0.55, this.sz, 0, 0, Math.PI * 2);
    ctx.fill();
    // 花瓣缺口
    ctx.fillStyle = 'rgba(255,240,245,0.5)';
    ctx.beginPath();
    ctx.ellipse(this.sz * 0.3, 0, this.sz * 0.2, this.sz * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

for (let i = 0; i < 60; i++) sakura.push(new Sakura(false));
// 底部草
function drawGrass() {
  ctx.fillStyle = 'rgba(100,180,120,0.3)';
  for (let x = 0; x < W; x += 8) {
    const h = 12 + Math.sin(x * 0.08) * 6;
    ctx.fillRect(x, H - h, 4, h);
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  sakura.forEach(s => { s.update(); s.draw(); });
  drawGrass();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
