<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>深空水晶玫瑰 · Crystal Rose</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@200;300&family=Cormorant:ital,wght@1,200&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@200;300&display=swap" rel="stylesheet"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000005;overflow:hidden;touch-action:none;}
canvas{display:block;position:fixed;top:0;left:0;}
#starCanvas{z-index:1;background:#000005;}
#roseCanvas{z-index:2;background:transparent;}
#curtain{position:fixed;inset:0;z-index:100;background:#000005;pointer-events:none;animation:cf 2s ease 0.4s both;}
@keyframes cf{0%{opacity:1}100%{opacity:0}}
.content{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:44px 48px;}
.brand{animation:fu 1.6s ease 1.8s both;}
.brand-sub{font-family:'Cormorant Garamond','Times New Roman',Georgia,serif;font-weight:300;font-size:9px;letter-spacing:5px;color:rgba(200,210,240,0.28);text-transform:uppercase;margin-bottom:10px;}
.brand-title{font-family:'Cormorant Garamond','Times New Roman',Georgia,serif;font-weight:200;font-size:30px;letter-spacing:13px;color:rgba(235,238,255,0.68);}
.brand-italic{font-family:'Cormorant','Times New Roman',Georgia,serif;font-style:italic;font-weight:200;font-size:13px;letter-spacing:4px;color:rgba(190,205,240,0.32);margin-top:8px;}
.footer{animation:fu 1.6s ease 2.2s both;text-align:center;}
.footer-line{font-family:'Cormorant Garamond','Times New Roman',Georgia,serif;font-size:10px;letter-spacing:3px;color:rgba(200,210,240,0.20);margin-bottom:5px;}
.footer-line span{color:rgba(210,220,250,0.40);}
.footer-hint{font-family:'Cormorant Garamond','Times New Roman',Georgia,serif;font-size:9px;letter-spacing:3px;color:rgba(200,210,240,0.14);animation:pulse 3s ease-in-out infinite;}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.2}50%{opacity:0.6}}
.corner{position:fixed;width:30px;height:30px;z-index:10;animation:fu 2s ease 2.4s both;}
.corner-tl{top:32px;left:32px;border-top:1px solid rgba(200,210,255,0.10);border-left:1px solid rgba(200,210,255,0.10);}
.corner-tr{top:32px;right:32px;border-top:1px solid rgba(200,210,255,0.10);border-right:1px solid rgba(200,210,255,0.10);}
.corner-bl{bottom:32px;left:32px;border-bottom:1px solid rgba(200,210,255,0.10);border-left:1px solid rgba(200,210,255,0.10);}
.corner-br{bottom:32px;right:32px;border-bottom:1px solid rgba(200,210,255,0.10);border-right:1px solid rgba(200,210,255,0.10);}
</style>
</head>
<body>
<div id="curtain"></div>
<canvas id="starCanvas"></canvas>
<canvas id="roseCanvas"></canvas>
<div class="corner corner-tl"></div><div class="corner corner-tr"></div>
<div class="corner corner-bl"></div><div class="corner corner-br"></div>
<div class="content">
  <div class="brand">
    <div class="brand-sub">Bespoke Collection · Celestial Series</div>
    <div class="brand-title">CRYSTAL ROSE</div>
    <div class="brand-italic">深空水晶</div>
  </div>
  <div class="footer">
    <div class="footer-line">私人定制 · 仅供授权使用</div>
    <div class="footer-line">Flower Blessing · Open Source Project</div>
    <div class="footer-hint">· TOUCH TO ROTATE ·</div>
  </div>
</div>
<script>
var SC=document.getElementById('starCanvas'), RC=document.getElementById('roseCanvas');
var sCtx=SC.getContext('2d'), rCtx=RC.getContext('2d');
var W=0,H=0;
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  SC.width=RC.width=W;SC.height=RC.height=H;
  sCtx.fillStyle='#000005';sCtx.fillRect(0,0,W,H);
}
resize();window.addEventListener('resize',resize);

// 星场
var stars=[];
for(var i=0;i<230;i++)stars.push({x:Math.random(),y:Math.random(),r:0.3+Math.random()*0.85,a:0.05+Math.random()*0.16,ph:Math.random()*Math.PI*2,sp:0.3+Math.random()*0.6});
var sT=0;
function drawStars(){
  sCtx.fillStyle='#000005';sCtx.fillRect(0,0,W,H);sT+=0.016;
  for(var i=0;i<stars.length;i++){var s=stars[i];var a=s.a*(0.6+0.4*Math.sin(sT*s.sp+s.ph));sCtx.beginPath();sCtx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);sCtx.fillStyle='rgba(115,128,160,'+a.toFixed(3)+')';sCtx.fill();}
}

// 3D
var RX=0.30, RY=0.85; // RX偏大→明显侧视角
var drag=false,lx=0,ly=0,auto=true;
function tr(x,y,z){
  var c1=Math.cos(RX),s1=Math.sin(RX),y1=y*c1-z*s1,z1=y*s1+z*c1;
  var c2=Math.cos(RY),s2=Math.sin(RY);
  return [x*c2+z1*s2, y1, -x*s2+z1*c2];
}
var FOV=460;
function pj(v,cx,cy,sc){
  var dz=v[2]+FOV*0.5;if(dz<1)dz=1;var f=FOV/dz;
  return [cx+v[0]*sc*f, cy+v[1]*sc*f, f];
}

// ============================================================
// 核心新思路：用花瓣在3D空间的两个端点来确定投影后方向
//   · base: 花瓣基部3D坐标
//   · tip:  花瓣顶端3D坐标（base + 沿径向伸出 + 倾斜角）
//   · 两点投影到屏幕后，连线方向就是花瓣在屏幕上的正确朝向
// ============================================================
function buildRose(){
  var P=[];
  // 每片花瓣定义：
  //   ang: 方位角（花瓣在圆周上的位置）
  //   rad: 基部离轴半径
  //   baseY: 基部高度（正=花心上方，负=下垂）
  //   len: 花瓣长度（3D单位）
  //   wid: 花瓣宽度
  //   openAng: 张开角（0=竖直，PI/2=水平，>PI/2=下垂）
  //   layer: 层编号（影响颜色）
  //   baseAlpha: 单片最大alpha

  function ring(count, rad, baseY, len, wid, openAng, layer, baseAlpha, offset){
    offset = offset||0;
    for(var i=0;i<count;i++){
      var ang = (i/count)*Math.PI*2 + offset;
      P.push({ang:ang, rad:rad, baseY:baseY, len:len, wid:wid, openAng:openAng, layer:layer, baseAlpha:baseAlpha});
    }
  }

  // 玫瑰花瓣结构：内层包拢，外层微张，螺旋错开
  // 思路：层少、片少、宽短、内收
  // 花苞（基本竖立，只有微小缝隙）
  ring(5,  0.000, 0.14, 0.10, 0.065, 0.04, 0, 0.30, 0.0);
  ring(6,  0.032, 0.13, 0.13, 0.078, 0.09, 1, 0.28, 0.52);
  ring(7,  0.060, 0.11, 0.16, 0.092, 0.16, 2, 0.26, 0.18);
  // 内层（微微张开，像半开玫瑰）
  ring(7,  0.095, 0.08, 0.20, 0.108, 0.28, 3, 0.24, 0.36);
  ring(8,  0.135, 0.04, 0.24, 0.120, 0.40, 4, 0.22, 0.08);
  // 中层（正常张开，不要垂）
  ring(8,  0.180, 0.00, 0.28, 0.130, 0.55, 5, 0.20, 0.24);
  ring(9,  0.230,-0.05, 0.32, 0.138, 0.68, 6, 0.18, 0.06);
  // 外层（略垂但不过分）
  ring(9,  0.288,-0.12, 0.36, 0.142, 0.80, 7, 0.16, 0.14);
  ring(8,  0.348,-0.20, 0.38, 0.140, 0.90, 8, 0.14, -0.22);
  // 萼片（外翻但不过度）
  ring(5,  0.400,-0.28, 0.32, 0.110, 1.20, 9, 0.12, 0.38);

  return P;
}
var allPetals = buildRose();

// 获取花瓣在3D空间的基部、顶端、左右翼坐标，然后投影
function getPetalPoints(p){
  var ang = p.ang;
  // 基部（在茎上）
  var bx = Math.cos(ang)*p.rad;
  var by = p.baseY;
  var bz = Math.sin(ang)*p.rad;

  // 花瓣伸出方向：径向 + 竖向 混合，由 openAng 控制
  // openAng=0: 沿Y轴向上; openAng=PI/2: 沿径向水平; openAng>PI/2: 向下
  var radDirX = Math.cos(ang);  // 径向方向
  var radDirZ = Math.sin(ang);

  // 花瓣尖端 = 基部 + len*(sin(openAng)*径向 - cos(openAng)*Y轴)
  var tx = bx + p.len * Math.sin(p.openAng) * radDirX;
  var ty = by - p.len * Math.cos(p.openAng);
  var tz = bz + p.len * Math.sin(p.openAng) * radDirZ;

  // 花瓣宽度方向：垂直于(径向,Y轴)平面的切线方向
  var wx = -Math.sin(ang);  // 切线方向
  var wz =  Math.cos(ang);

  // 左右翼中点（花瓣最宽处，约在60%长度位置）
  var midFrac = 0.62;
  var mx = bx + p.len*midFrac * Math.sin(p.openAng) * radDirX;
  var my = by - p.len*midFrac * Math.cos(p.openAng);
  var mz = bz + p.len*midFrac * Math.sin(p.openAng) * radDirZ;
  var halfW = p.wid * 0.5;

  return {
    base:  tr(bx, by, bz),
    tip:   tr(tx, ty, tz),
    left:  tr(mx + wx*halfW, my, mz + wz*halfW),
    right: tr(mx - wx*halfW, my, mz - wz*halfW),
    // 控制点：花瓣左右两侧弧度
    lc1:   tr(bx + wx*halfW*0.4,  by,                     bz + wz*halfW*0.4),
    lc2:   tr(mx + wx*halfW*1.1,  my + p.len*0.05,        mz + wz*halfW*1.1),
    rc1:   tr(bx - wx*halfW*0.4,  by,                     bz - wz*halfW*0.4),
    rc2:   tr(mx - wx*halfW*1.1,  my + p.len*0.05,        mz - wz*halfW*1.1),
    // 顶端收口控制点
    ltip:  tr(tx + wx*halfW*0.15, ty + p.len*0.04,        tz + wz*halfW*0.15),
    rtip:  tr(tx - wx*halfW*0.15, ty + p.len*0.04,        tz - wz*halfW*0.15),
    depthZ: tr(bx,by,bz)[2]  // 用基部z排序
  };
}

// 花瓣颜色
function petalRGB(layer){
  if(layer<=1) return [252,254,255];
  if(layer<=3) return [230,242,255];
  if(layer<=5) return [205,225,255];
  if(layer<=7) return [180,208,255];
  return [155,188,248];
}

// 花瓣形状：菱形宽瓣 + bezier弧边
// left/right是花瓣最宽处的中点（非尖端）
function drawPetal(p, cx, cy, sc){
  var pts = getPetalPoints(p);

  var pb  = pj(pts.base,  cx,cy,sc);
  var pt  = pj(pts.tip,   cx,cy,sc);
  var pl  = pj(pts.left,  cx,cy,sc);
  var pr2 = pj(pts.right, cx,cy,sc);

  if(pb[2]<=0 || pt[2]<=0) return;

  var f = Math.max(0, Math.min(1,(pb[2]-0.5)/1.0));
  var baseA = Math.min(0.30, p.baseAlpha * (0.7 + f*0.3));

  var rgb = petalRGB(p.layer);
  var R=rgb[0],G=rgb[1],B=rgb[2];

  // 沿花瓣长度方向做渐变（基部→尖端）
  var grd = rCtx.createLinearGradient(pb[0],pb[1], pt[0],pt[1]);
  grd.addColorStop(0,   'rgba('+R+','+G+','+B+','+baseA.toFixed(3)+')');
  grd.addColorStop(0.45,'rgba('+R+','+G+','+B+','+(baseA*0.78).toFixed(3)+')');
  grd.addColorStop(0.80,'rgba('+R+','+G+','+B+','+(baseA*0.45).toFixed(3)+')');
  grd.addColorStop(1,   'rgba('+R+','+G+','+B+','+(baseA*0.10).toFixed(3)+')');

  // 花瓣路径：左半翼→尖端→右半翼→回基部
  // 左半翼：base → 左翼顶(最宽) → 尖端
  rCtx.beginPath();
  rCtx.moveTo(pb[0], pb[1]);
  rCtx.quadraticCurveTo(pl[0]*0.80 + pb[0]*0.20, pl[1]*0.80 + pb[1]*0.20, pl[0], pl[1]);
  rCtx.quadraticCurveTo(pt[0]*0.55 + pl[0]*0.45, pt[1]*0.55 + pl[1]*0.45, pt[0], pt[1]);
  // 右半翼：尖端 → 右翼顶 → 回基部
  rCtx.quadraticCurveTo(pt[0]*0.55 + pr2[0]*0.45, pt[1]*0.55 + pr2[1]*0.45, pr2[0], pr2[1]);
  rCtx.quadraticCurveTo(pr2[0]*0.80 + pb[0]*0.20, pr2[1]*0.80 + pb[1]*0.20, pb[0], pb[1]);
  rCtx.closePath();
  rCtx.fillStyle = grd;
  rCtx.fill();

  // 中脉（近处可见）
  if(f > 0.28){
    var mx=(pb[0]+pt[0])/2, my=(pb[1]+pt[1])/2;
    rCtx.beginPath();
    rCtx.moveTo(pb[0],pb[1]);
    rCtx.lineTo(pt[0],pt[1]);
    rCtx.strokeStyle='rgba(255,255,255,'+(f*0.12).toFixed(3)+')';
    rCtx.lineWidth=Math.max(0.3, f*sc*0.004);
    rCtx.lineCap='round';
    rCtx.stroke();
  }
}

// 花心
function drawCenter(cx,cy,sc){
  for(var i=0;i<12;i++){
    var a=(i/12)*Math.PI*2, r=0.020+(i%3)*0.005;
    var v=tr(Math.cos(a)*r, 0.148, Math.sin(a)*r);
    var p=pj(v,cx,cy,sc); if(p[2]<=0) continue;
    var ss=sc*p[2]; var al=Math.max(0.35,Math.min(0.88,p[2]*1.2));
    rCtx.beginPath();rCtx.arc(p[0],p[1],ss*0.038,0,Math.PI*2);
    rCtx.fillStyle='rgba(255,255,255,'+al.toFixed(3)+')';rCtx.fill();
  }
  // 花心亮点（极小）
  var cv=tr(0,0.152,0),cp=pj(cv,cx,cy,sc);
  if(cp[2]>0){
    var g=rCtx.createRadialGradient(cp[0],cp[1],0,cp[0],cp[1],sc*cp[2]*0.08);
    g.addColorStop(0,'rgba(255,255,255,0.90)');g.addColorStop(1,'rgba(255,255,255,0)');
    rCtx.beginPath();rCtx.arc(cp[0],cp[1],sc*cp[2]*0.08,0,Math.PI*2);
    rCtx.fillStyle=g;rCtx.fill();
  }
}

// 茎
function drawStem(cx,cy,sc){
  for(var i=0;i<22;i++){
    var t1=i/22,t2=(i+1)/22;
    var y1=0.10+t1*2.10,y2=0.10+t2*2.10;
    var x1=Math.sin(t1)*0.016,x2=Math.sin(t2)*0.016;
    var v1=tr(x1,y1,0),v2=tr(x2,y2,0);
    var p1=pj(v1,cx,cy,sc),p2=pj(v2,cx,cy,sc);
    if(p1[2]<=0||p2[2]<=0)continue;
    var al=0.32+(1-t1)*0.20, th=Math.max(0.5,(0.055-t1*0.028)*sc*(p1[2]+p2[2])/2);
    rCtx.beginPath();rCtx.moveTo(p1[0],p1[1]);rCtx.lineTo(p2[0],p2[1]);
    rCtx.strokeStyle='rgba(192,215,255,'+al.toFixed(3)+')';rCtx.lineWidth=th;rCtx.lineCap='round';rCtx.stroke();
  }
}

// 叶子
function drawLeaf(cx,cy,sc,stemY,leafAng,sz){
  var rx0=Math.cos(leafAng)*0.04,rz0=Math.sin(leafAng)*0.04;
  var rtp=tr(rx0,stemY,rz0);
  var rpr=pj(rtp,cx,cy,sc); if(rpr[2]<=0)return;
  var spx=rpr[0],spy=rpr[1],f=rpr[2];
  var s=sc*f*sz, al=Math.max(0.35,Math.min(0.62,f*0.95));
  var sa=leafAng+RY+0.45, cA=Math.cos(sa),sA=Math.sin(sa);
  function lp(lx,ly){return[spx+lx*cA-ly*sA,spy+lx*sA+ly*cA];}
  var q0=lp(0,0),q1=lp(s*0.38,s*0.16),q2=lp(s*0.60,s*0.65),q3=lp(s*0.20,s*1.30);
  var q4=lp(0,s*1.48),q5=lp(-s*0.20,s*1.30),q6=lp(-s*0.60,s*0.65),q7=lp(-s*0.38,s*0.16);
  var gs=lp(0,0),ge=lp(0,s*1.3);
  var grd=rCtx.createLinearGradient(gs[0],gs[1],ge[0],ge[1]);
  grd.addColorStop(0,'rgba(185,210,250,'+al.toFixed(3)+')');
  grd.addColorStop(1,'rgba(115,165,228,'+(al*0.40).toFixed(3)+')');
  rCtx.beginPath();rCtx.moveTo(q0[0],q0[1]);
  rCtx.bezierCurveTo(q1[0],q1[1],q2[0],q2[1],q3[0],q3[1]);
  rCtx.bezierCurveTo(q4[0],q4[1],q5[0],q5[1],q5[0],q5[1]);
  rCtx.bezierCurveTo(q6[0],q6[1],q7[0],q7[1],q0[0],q0[1]);
  rCtx.fillStyle=grd;rCtx.fill();
  var v0=lp(0,s*0.05),v1=lp(0,s*1.35);
  rCtx.beginPath();rCtx.moveTo(v0[0],v0[1]);rCtx.lineTo(v1[0],v1[1]);
  rCtx.strokeStyle='rgba(225,240,255,'+(al*0.35).toFixed(3)+')';
  rCtx.lineWidth=Math.max(0.3,s*0.055);rCtx.lineCap='round';rCtx.stroke();
}

// 粒子
var FP=[];
for(var i=0;i<50;i++)FP.push({x:(Math.random()-0.5)*2.2,y:(Math.random()-0.5)*2.8,z:(Math.random()-0.5)*2.2,vy:0.0006+Math.random()*0.0012,ph:Math.random()*Math.PI*2,r:0.5+Math.random()*1.1,al:0.08+Math.random()*0.22});
var pT=0;
function drawParticles(cx,cy,sc){
  pT+=0.012;
  for(var i=0;i<FP.length;i++){
    var p=FP[i];p.y-=p.vy;if(p.y<-1.8)p.y=1.8;
    var v=tr(p.x+Math.sin(pT*0.5+p.ph)*0.035,p.y,p.z);
    var pp=pj(v,cx,cy,sc);if(pp[2]<=0)continue;
    var a=Math.max(0.01,Math.min(0.5,pp[2]*0.65))*p.al;
    var r=p.r*pp[2]*sc*0.012;if(r<0.2)continue;
    rCtx.beginPath();rCtx.arc(pp[0],pp[1],r,0,Math.PI*2);
    rCtx.fillStyle='rgba(208,224,255,'+a.toFixed(3)+')';rCtx.fill();
  }
}

// 极淡外晕
function drawGlow(cx,cy,sc){
  var g=rCtx.createRadialGradient(cx,cy-sc*0.05,sc*0.05,cx,cy,sc*1.45);
  g.addColorStop(0,'rgba(175,200,255,0.06)');g.addColorStop(0.45,'rgba(155,188,255,0.025)');g.addColorStop(1,'rgba(0,0,0,0)');
  rCtx.beginPath();rCtx.arc(cx,cy,sc*1.45,0,Math.PI*2);rCtx.fillStyle=g;rCtx.fill();
}

// 交互
RC.addEventListener('mousedown',function(e){drag=true;auto=false;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mousemove',function(e){if(!drag)return;RY+=(e.clientX-lx)*0.012;RX+=(e.clientY-ly)*0.009;RX=Math.max(-0.45,Math.min(0.85,RX));lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',function(){drag=false;});
RC.addEventListener('touchstart',function(e){drag=true;auto=false;lx=e.touches[0].clientX;ly=e.touches[0].clientY;e.preventDefault();},{passive:false});
window.addEventListener('touchmove',function(e){if(!drag)return;RY+=(e.touches[0].clientX-lx)*0.012;RX+=(e.touches[0].clientY-ly)*0.009;RX=Math.max(-0.45,Math.min(0.85,RX));lx=e.touches[0].clientX;ly=e.touches[0].clientY;e.preventDefault();},{passive:false});
window.addEventListener('touchend',function(){drag=false;});

// 主循环
function drawRose(){
  rCtx.clearRect(0,0,W,H);
  var cx=W*0.5,cy=H*0.46,sc=Math.min(W,H)*0.195;
  if(auto)RY+=0.0018;

  drawGlow(cx,cy,sc);
  drawParticles(cx,cy,sc);
  drawStem(cx,cy,sc);
  drawLeaf(cx,cy,sc,0.78, Math.PI*0.30,0.145);
  drawLeaf(cx,cy,sc,1.12,-Math.PI*0.22,0.122);

  // 排序：基部z小（远）的先画
  var sorted=allPetals.slice().sort(function(a,b){
    return getPetalPoints(a).depthZ - getPetalPoints(b).depthZ;
  });
  for(var i=0;i<sorted.length;i++)drawPetal(sorted[i],cx,cy,sc);
  drawCenter(cx,cy,sc);
}

function loop(){drawStars();drawRose();requestAnimationFrame(loop);}
loop();
</script>
</body>
