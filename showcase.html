<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Crystal Rose</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000005;
  overflow: hidden;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  color: #e8e4f0;
}

canvas { display: block; position: fixed; top: 0; left: 0; }

#roseCanvas { z-index: 2; }
#starCanvas { z-index: 1; }

.content {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 10; pointer-events: none;
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 50px 60px;
}

.brand { animation: fadeIn 2s ease 1s both; }
.brand-sub { font-size: 10px; letter-spacing: 6px; color: rgba(200,200,230,0.35); text-transform: uppercase; margin-bottom: 8px; }
.brand-title { font-size: 28px; font-weight: 300; letter-spacing: 12px; color: rgba(240,240,255,0.7); }

.footer { animation: fadeIn 2s ease 2s both; }
.footer-line { font-size: 11px; letter-spacing: 3px; color: rgba(200,200,230,0.25); text-align: center; margin-bottom: 6px; }
.footer-line span { color: rgba(200,200,230,0.45); }
.footer-hint { font-size: 10px; letter-spacing: 2px; color: rgba(200,200,230,0.18); text-align: center; animation: hint-pulse 2.5s ease-in-out infinite; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes hint-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

.corner { position: fixed; width: 40px; height: 40px; z-index: 10; opacity: 0.2; }
.corner-tl { top: 30px; left: 30px; border-top: 1px solid rgba(200,200,255,0.4); border-left: 1px solid rgba(200,200,255,0.4); }
.corner-tr { top: 30px; right: 30px; border-top: 1px solid rgba(200,200,255,0.4); border-right: 1px solid rgba(200,200,255,0.4); }
.corner-bl { bottom: 30px; left: 30px; border-bottom: 1px solid rgba(200,200,255,0.4); border-left: 1px solid rgba(200,200,255,0.4); }
.corner-br { bottom: 30px; right: 30px; border-bottom: 1px solid rgba(200,200,255,0.4); border-right: 1px solid rgba(200,200,255,0.4); }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<canvas id="roseCanvas"></canvas>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="content">
  <div class="brand">
    <div class="brand-sub">Bespoke Collection · Celestial Series</div>
    <div class="brand-title">CRYSTAL ROSE</div>
  </div>
  <div class="footer">
    <div class="footer-line">私人定制 · 仅供授权使用</div>
    <div class="footer-line">定制服务请私信 <span>@谢荧</span></div>
    <div class="footer-hint">TOUCH TO ROTATE</div>
  </div>
</div>

<script>
// ================================================================
// 深空星场
// ================================================================
const starCanvas = document.getElementById('starCanvas');
const starCtx = starCanvas.getContext('2d');
const roseCanvas = document.getElementById('roseCanvas');
const roseCtx = roseCanvas.getContext('2d');

function resize() {
  starCanvas.width = roseCanvas.width = window.innerWidth;
  starCanvas.height = roseCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 星场
const STAR_COUNT = 500;
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    size: 0.3 + Math.random() * 1.5,
    opacity: 0.2 + Math.random() * 0.8,
    speed: 0.003 + Math.random() * 0.008,
    phase: Math.random() * Math.PI * 2,
  });
}

const NEBULA = 80;
const nebula = [];
for (let i = 0; i < NEBULA; i++) {
  nebula.push({
    x: Math.random(), y: Math.random(),
    size: 40 + Math.random() * 100,
    opacity: 0.006 + Math.random() * 0.015,
    hue: 220 + Math.random() * 70,
  });
}

let st = 0;
function drawStars() {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  starCtx.fillStyle = '#000005';
  starCtx.fillRect(0, 0, starCanvas.width, starCanvas.height);
  st += 0.016;
  const W = starCanvas.width, H = starCanvas.height;

  for (const n of nebula) {
    const g = starCtx.createRadialGradient(n.x*W, n.y*H, 0, n.x*W, n.y*H, n.size);
    g.addColorStop(0, `hsla(${n.hue},50%,25%,${n.opacity})`);
    g.addColorStop(1, 'transparent');
    starCtx.fillStyle = g;
    starCtx.fillRect(0, 0, W, H);
  }

  for (const s of stars) {
    const tw = Math.sin(st * s.speed * 60 + s.phase);
    const op = s.opacity * (0.5 + 0.5 * tw);
    starCtx.beginPath();
    starCtx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
    starCtx.fillStyle = `rgba(220,225,255,${op})`;
    starCtx.fill();
  }
}

// ================================================================
// 水晶玫瑰 — Canvas 2D 绘制
// ================================================================

// 触摸/鼠标拖动旋转
let angleX = 0.15, angleY = 0;
let dragging = false, lastX = 0, lastY = 0;
let autoRotate = true;

roseCanvas.style.cursor = dragging ? 'grabbing' : 'grab';
roseCanvas.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; autoRotate=false; });
roseCanvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  angleY += (e.clientX - lastX) * 0.008;
  angleX += (e.clientY - lastY) * 0.006;
  angleX = Math.max(-0.5, Math.min(0.5, angleX));
  lastX = e.clientX; lastY = e.clientY;
});
roseCanvas.addEventListener('mouseup', () => { dragging=false; });
roseCanvas.addEventListener('mouseleave', () => { dragging=false; });

roseCanvas.addEventListener('touchstart', e => { dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; autoRotate=false; e.preventDefault(); }, {passive:false});
roseCanvas.addEventListener('touchmove', e => {
  if (!dragging) return;
  angleY += (e.touches[0].clientX - lastX) * 0.008;
  angleX += (e.touches[0].clientY - lastY) * 0.006;
  angleX = Math.max(-0.5, Math.min(0.5, angleX));
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  e.preventDefault();
}, {passive:false});
roseCanvas.addEventListener('touchend', () => { dragging=false; });

// 3D 点旋转
function rotatePoint(x, y, z, rx, ry) {
  // 绕X轴
  let y1 = y * Math.cos(rx) - z * Math.sin(rx);
  let z1 = y * Math.sin(rx) + z * Math.cos(rx);
  // 绕Y轴
  let x2 = x * Math.cos(ry) + z1 * Math.sin(ry);
  let z2 = -x * Math.sin(ry) + z1 * Math.cos(ry);
  return [x2, y1, z2];
}

// 水晶光泽渐变
function crystalGrad(ctx, cx, cy, r, angle, baseAlpha) {
  const g = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, 0, cx, cy, r);
  g.addColorStop(0, `rgba(255,255,255,${baseAlpha})`);
  g.addColorStop(0.3, `rgba(240,245,255,${baseAlpha * 0.8})`);
  g.addColorStop(0.7, `rgba(200,210,240,${baseAlpha * 0.5})`);
  g.addColorStop(1, `rgba(150,170,220,${baseAlpha * 0.1})`);
  return g;
}

// 绘制水晶花瓣（3D投影到2D）
function drawPetal(ctx, cx, cy, petal, rx, ry, scale, globalAlpha) {
  const [px, py, pz, length, width, tilt, rotZ] = petal;
  const [rx2, ry2, rz2] = rotatePoint(px, py, pz, rx, ry);

  // 透视投影
  const perspective = 6;
  const screenX = cx + (rx2 / (rz2 + perspective)) * scale * perspective;
  const screenY = cy + (ry2 / (rz2 + perspective)) * scale * perspective;
  const screenSize = scale * perspective / (rz2 + perspective);

  // 裁剪到可见范围
  if (rz2 < -perspective * 0.8) return null;

  // 花瓣透明度（远处更透明）
  const depthAlpha = Math.max(0.05, Math.min(1, (rz2 + perspective) / (perspective * 2)));
  const alpha = globalAlpha * depthAlpha;
  if (alpha < 0.05) return null;

  const len = length * screenSize;
  const wid = width * screenSize;

  ctx.save();
  ctx.translate(screenX, screenY);

  // 花瓣旋转（基于深度产生角度）
  const baseAngle = Math.atan2(ry2, rx2);
  ctx.rotate(baseAngle + tilt * 0.3);

  // 花瓣形状
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(wid * 0.5, len * 0.12, wid, len * 0.45, wid * 0.5, len * 0.85);
  ctx.bezierCurveTo(wid * 0.2, len, -wid * 0.2, len, -wid * 0.5, len * 0.85);
  ctx.bezierCurveTo(-wid, len * 0.45, -wid * 0.5, len * 0.12, 0, 0);

  const grd = ctx.createRadialGradient(-wid*0.2, -len*0.1, 0, 0, len*0.3, len);
  grd.addColorStop(0, `rgba(255,255,255,${alpha})`);
  grd.addColorStop(0.25, `rgba(230,240,255,${alpha * 0.85})`);
  grd.addColorStop(0.6, `rgba(200,215,255,${alpha * 0.6})`);
  grd.addColorStop(1, `rgba(160,185,240,${alpha * 0.2})`);

  ctx.fillStyle = grd;
  ctx.fill();

  // 花瓣高光
  ctx.beginPath();
  ctx.moveTo(-wid * 0.15, len * 0.05);
  ctx.bezierCurveTo(-wid * 0.3, len * 0.3, -wid * 0.2, len * 0.55, -wid * 0.05, len * 0.5);
  ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.5})`;
  ctx.lineWidth = screenSize * 0.8;
  ctx.stroke();

  ctx.restore();
  return { x: screenX, y: screenY, z: rz2 };
}

// 茎
function drawStem(ctx, cx, cy, rx, ry, scale) {
  const segments = 20;
  ctx.save();
  ctx.lineCap = 'round';
  for (let i = 0; i < segments; i++) {
    const t1 = i / segments;
    const t2 = (i + 1) / segments;
    const y1 = cy + t1 * scale * 3.5;
    const y2 = cy + t2 * scale * 3.5;
    const wobble = Math.sin(t1 * Math.PI * 2) * 0.04 * scale;

    const [x1, , z1] = rotatePoint(wobble * scale, (t1 - 0.5) * 2.5, 0, rx, ry);
    const [x2, , z2] = rotatePoint(wobble * scale, (t2 - 0.5) * 2.5, 0, rx, ry);
    const p1 = cx + (x1 / (z1 + 6)) * scale * 6;
    const p2 = cx + (x2 / (z2 + 6)) * scale * 6;
    const alpha = Math.max(0.05, Math.min(0.8, (z1 + 6) / 12));
    const width = (0.04 - t1 * 0.02) * scale * perspective / (z1 + 6);

    ctx.beginPath();
    ctx.moveTo(p1, y1);
    ctx.lineTo(p2, y2);
    ctx.strokeStyle = `rgba(220,230,255,${alpha * 0.4})`;
    ctx.lineWidth = width;
    ctx.stroke();
  }
  ctx.restore();
}

const perspective = 6;
let petalData = [];

// 生成花瓣数据
function buildRose() {
  petalData = [];

  // 花心层
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    petalData.push([Math.cos(a) * 0.05, 0.05, Math.sin(a) * 0.05, 0.28, 0.12, 0.15, a]);
  }
  // 内层
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 + 0.1;
    petalData.push([Math.cos(a) * 0.12, 0.08, Math.sin(a) * 0.12, 0.42, 0.18, 0.28, a]);
  }
  // 中层
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2 - 0.12;
    petalData.push([Math.cos(a) * 0.22, 0.05, Math.sin(a) * 0.22, 0.58, 0.22, 0.38, a]);
  }
  // 外层
  for (let i = 0; i < 18; i++) {
    const a = (i / 18) * Math.PI * 2 + 0.08;
    petalData.push([Math.cos(a) * 0.35, -0.05, Math.sin(a) * 0.35, 0.7, 0.26, 0.52, a]);
  }
  // 最外层
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2 - 0.15;
    petalData.push([Math.cos(a) * 0.48, -0.15, Math.sin(a) * 0.48, 0.78, 0.3, 0.65, a]);
  }
}
buildRose();

// 漂浮粒子
const FLOAT_N = 80;
const floatParts = [];
for (let i = 0; i < FLOAT_N; i++) {
  floatParts.push({
    x: (Math.random() - 0.5) * 3,
    y: (Math.random() - 0.5) * 4,
    z: (Math.random() - 0.5) * 3,
    speed: 0.002 + Math.random() * 0.004,
    size: 0.6 + Math.random() * 1.4,
    alpha: 0.1 + Math.random() * 0.4,
  });
}

let time = 0;

function drawRose() {
  roseCtx.clearRect(0, 0, roseCanvas.width, roseCanvas.height);

  const W = roseCanvas.width, H = roseCanvas.height;
  const cx = W * 0.5, cy = H * 0.48;
  const scale = Math.min(W, H) * 0.16;
  time += 0.005;

  if (autoRotate) {
    angleY += 0.003;
  }

  const rx = angleX;
  const ry = angleY + Math.sin(time * 0.5) * 0.03; // 轻微摇摆

  // 漂浮粒子
  for (const fp of floatParts) {
    const [rx2, ry2, rz2] = rotatePoint(fp.x, fp.y, fp.z, rx * 0.3, ry);
    const sx = cx + (rx2 / (rz2 + 6)) * scale * 6;
    const sy = cy + (ry2 / (rz2 + 6)) * scale * 6;
    const sz = scale * 6 / (rz2 + 6);
    const alpha = Math.max(0.02, Math.min(1, (rz2 + 6) / 12)) * fp.alpha;

    roseCtx.beginPath();
    roseCtx.arc(sx, sy, fp.size * sz * 0.5, 0, Math.PI * 2);
    roseCtx.fillStyle = `rgba(220,230,255,${alpha})`;
    roseCtx.fill();
  }

  // 茎
  drawStem(roseCtx, cx, cy, rx, ry, scale);

  // 花瓣 — 按深度排序（远处先画）
  const petalResults = [];
  for (const pd of petalData) {
    const result = drawPetal(roseCtx, cx, cy, pd, rx, ry, scale, 0.92);
    if (result) petalResults.push(result);
  }

  // 花心
  const [fcx, fcy, fcz] = rotatePoint(0, 0.06, 0, rx, ry);
  const fpx = cx + (fcx / (fcz + 6)) * scale * 6;
  const fpy = cy + (fcy / (fcz + 6)) * scale * 6;
  const fps = scale * 6 / (fcz + 6);
  const fAlpha = Math.max(0.1, Math.min(1, (fcz + 6) / 12));

  const fg = roseCtx.createRadialGradient(fpx - fps*0.3, fpy - fps*0.3, 0, fpx, fpy, fps * 0.18);
  fg.addColorStop(0, `rgba(255,255,255,${fAlpha})`);
  fg.addColorStop(0.5, `rgba(230,240,255,${fAlpha * 0.8})`);
  fg.addColorStop(1, `rgba(180,200,240,${fAlpha * 0.3})`);
  roseCtx.beginPath();
  roseCtx.arc(fpx, fpy, fps * 0.18, 0, Math.PI * 2);
  roseCtx.fillStyle = fg;
  roseCtx.fill();

  // TEST — 亮黄色测试圆
  const testX = cx;
  const testY = cy - scale * 0.3;
  roseCtx.beginPath();
  roseCtx.arc(testX, testY, scale * 0.15, 0, Math.PI * 2);
  roseCtx.fillStyle = 'rgba(255,255,0,0.9)';
  roseCtx.fill();

  // 整体高光
  const hg = roseCtx.createRadialGradient(cx, cy - scale * 0.4, 0, cx, cy, scale * 1.5);
  hg.addColorStop(0, 'rgba(255,255,255,0.06)');
  hg.addColorStop(0.5, 'rgba(200,215,255,0.02)');
  hg.addColorStop(1, 'transparent');
  roseCtx.fillStyle = hg;
  roseCtx.fillRect(0, 0, W, H);
}

function loop() {
  drawStars();
  drawRose();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
