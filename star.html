<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星空祝福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; width: 100vw; height: 100vh; background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 50%, #2d1b4e 100%); font-family: 'Georgia', serif; }
canvas { position: fixed; top: 0; left: 0; z-index: 0; }
.layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.name { font-size: clamp(22px, 5vw, 48px); color: #f0e6ff; letter-spacing: 8px; text-shadow: 0 0 30px rgba(200,180,255,0.6); margin-bottom: 14px; font-weight: normal; }
.date { font-size: clamp(11px, 2vw, 15px); color: #c0b0e0; letter-spacing: 4px; margin-bottom: 24px; }
.blessing { font-size: clamp(13px, 2.8vw, 18px); color: #ddd0ff; letter-spacing: 1px; text-align: center; max-width: 80%; line-height: 1.9; }
.from { font-size: clamp(11px, 2vw, 13px); color: #b0a0d0; margin-top: 18px; letter-spacing: 2px; }
.glass-card { background: rgba(255,255,255,0.12); border: 1px solid rgba(200,180,255,0.35); border-radius: 24px; padding: clamp(28px, 6vw, 48px) clamp(24px, 6vw, 56px); text-align: center; max-width: 88vw; box-shadow: 0 8px 32px rgba(100,80,180,0.2); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="layer">
  <div class="glass-card">
    <div class="name" id="nameEl"></div>
    <div class="date" id="dateEl"></div>
    <div class="blessing" id="blessingEl"></div>
    <div class="from" id="fromEl"></div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
document.getElementById('nameEl').textContent = params.get('n') || '';
document.getElementById('dateEl').textContent = params.get('d') || '';
document.getElementById('blessingEl').textContent = params.get('b') || '';
document.getElementById('fromEl').textContent = params.get('f') ? '— ' + params.get('f') : '';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, stars = [], meteors = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// 静态星星
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * W, y: Math.random() * H,
    r: 0.5 + Math.random() * 1.5,
    phase: Math.random() * Math.PI * 2,
    speed: 0.01 + Math.random() * 0.03
  });
}

// 流星
function newMeteor() {
  return { x: Math.random() * W * 1.5, y: -20, len: 80 + Math.random() * 120, spd: 6 + Math.random() * 8, op: 0.6 + Math.random() * 0.4 };
}
for (let i = 0; i < 3; i++) meteors.push(newMeteor());

function loop() {
  ctx.clearRect(0, 0, W, H);

  // 星星闪烁
  stars.forEach(s => {
    s.phase += s.speed;
    ctx.globalAlpha = 0.3 + Math.abs(Math.sin(s.phase)) * 0.7;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // 流星
  meteors.forEach(m => {
    m.x -= m.spd; m.y += m.spd * 0.6;
    const grad = ctx.createLinearGradient(m.x, m.y, m.x + m.len, m.y - m.len * 0.8);
    grad.addColorStop(0, `rgba(255,255,255,${m.op})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x + m.len, m.y - m.len * 0.8);
    ctx.stroke();
    if (m.y > H + 50) { Object.assign(m, newMeteor()); }
  });

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
